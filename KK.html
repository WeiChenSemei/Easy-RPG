<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萬王之王 - 無盡國戰版</title>
    <style>
        /* 古典魔幻史詩 UI 風格設定 */
        html { width: 100%; height: 100%; background: radial-gradient(circle at center, #2a201a 0%, #0d0a08 100%); }
        body { 
            margin: 0 auto; padding: 0; width: 100%; height: 100%; max-width: 600px; 
            background: linear-gradient(to bottom, #1f1814 0%, #0d0a08 100%); 
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; 
            overflow: hidden; display: flex; flex-direction: column; 
            box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.8); 
            position: relative; border-left: 2px solid #3d2f25; border-right: 2px solid #3d2f25;
        }
        #gameContainer { width: 100%; height: 100%; position: relative; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 10, 8, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .overlay-content { 
            background: linear-gradient(135deg, #2a201a 0%, #1a1410 100%); 
            border: 2px solid #8c7355; border-radius: 12px; padding: 40px 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; width: 85%; max-width: 450px;
        }
        .overlay input { 
            padding: 15px; font-size: 24px; width: 80%; text-align: center; 
            border: 2px solid #6b533e; background: #0a0806; color: #eaddc5; 
            border-radius: 6px; margin-bottom: 25px; outline: none; font-family: inherit;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .overlay input:focus { border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.3), inset 0 2px 5px rgba(0,0,0,0.8); }
        .overlay textarea { 
            width: 85%; height: 180px; padding: 15px; font-size: 16px; 
            background: #0a0806; color: #eaddc5; border: 2px solid #6b533e; 
            border-radius: 6px; margin-bottom: 20px; outline: none; word-break: break-all; resize: none; 
            font-family: monospace; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .overlay button { 
            padding: 12px 30px; font-size: 22px; 
            background: linear-gradient(to bottom, #d4af37 0%, #8c7355 100%); 
            color: #1a1410; border: 1px solid #ffdf73; border-radius: 6px; 
            cursor: pointer; font-weight: bold; margin: 10px; font-family: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); text-shadow: 0 1px 1px rgba(255,255,255,0.4);
        }
        .overlay button:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.5); }
        .btn-row { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .author-text { color: #bca88f; font-size: 22px; text-align: center; line-height: 1.8; margin-bottom: 30px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" oncontextmenu="return false;"></canvas>
        
        <div id="nameInputOverlay" class="overlay">
            <div class="overlay-content">
                <h2 style="color:#d4af37; margin-top:0; margin-bottom:25px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px;">[ 建立你的國家 ]</h2>
                <input type="text" id="countryName" placeholder="例如：白銀王國" maxlength="10" autocomplete="off" spellcheck="false" />
                <button id="btnConfirmName">登基為王</button>
            </div>
        </div>
         <div id="renameKingdomOverlay" class="overlay">
            <div class="overlay-content">
                 <h2 style="color:#d4af37; margin-top:0; margin-bottom:25px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px;">[ 重新命名國家 ]</h2>
                 <input type="text" id="newCountryName" placeholder="例如：白銀王國" maxlength="10" autocomplete="off" spellcheck="false" />
                 <div class="btn-row">
                    <button id="btnConfirmRename">確認詔令</button>
                    <button id="btnCancelRename" style="background: linear-gradient(to bottom, #555 0%, #333 100%); color: #ccc; border-color:#666; text-shadow: 0 1px 1px #000;">取消</button>
                </div>
            </div>
        </div>
        <div id="unitNameOverlay" class="overlay">
             <div class="overlay-content">
                <h2 style="color:#8cafff; margin-top:0; margin-bottom:25px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px;">[ 賜予英雄真名 ]</h2>
                <input type="text" id="unitCustomName" placeholder="例如：阿瑞斯" maxlength="8" autocomplete="off" spellcheck="false" />
                <div class="btn-row">
                    <button id="btnConfirmUnitName">確認賜名</button>
                    <button id="btnCancelUnitName" style="background: linear-gradient(to bottom, #555 0%, #333 100%); color: #ccc; border-color:#666; text-shadow: 0 1px 1px #000;">取消</button>
                </div>
            </div>
        </div>
        <div id="retireOverlay" class="overlay">
             <div class="overlay-content">
                <h2 style="color:#ff6b6b; margin-top:0; margin-bottom:20px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px;">[ 告老還鄉 ]</h2>
                <div style="color:#bca88f; font-size:20px; margin-bottom:30px; text-align:center;">這位英雄將永久解甲歸田。<br>是否頒布退役詔書？</div>
                <div class="btn-row">
                    <button id="btnConfirmRetire" style="background: linear-gradient(to bottom, #c44 0%, #822 100%); color: #fff; border-color:#e66; text-shadow: 0 1px 1px #000;">是 (確認)</button>
                    <button id="btnCancelRetire" style="background: linear-gradient(to bottom, #555 0%, #333 100%); color: #ccc; border-color:#666; text-shadow: 0 1px 1px #000;">否 (取消)</button>
                </div>
            </div>
        </div>
        <div id="authorOverlay" class="overlay">
             <div class="overlay-content">
                <h2 style="color:#8cafff; margin-top:0; margin-bottom:20px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px;">[ 古卷記載 ]</h2>
                <div class="author-text">
                    本遊戲之創意火種，<br>傳承自經典 MUD 萬王之王 (KK)。<br><br>致敬 Ruby 與 Onyx 大神，<br>開創了那片美好的異世界。<br><br><span style="font-size: 16px; color:#887;">- 本作僅供娛樂與回憶，非營利用途 -</span>
                </div>
                <button id="btnCancelAuthor" style="background: linear-gradient(to bottom, #555 0%, #333 100%); color: #ccc; border-color:#666; text-shadow: 0 1px 1px #000;">闔上古卷</button>
            </div>
        </div>
        <div id="exportOverlay" class="overlay">
             <div class="overlay-content">
                <h2 style="color:#d4af37; margin-top:0; margin-bottom:15px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px;">[ 封印靈魂石 ]</h2>
                <div style="color:#bca88f; font-size:16px; margin-bottom:15px; text-align:center;">請妥善保管以下繼承符文：</div>
                <textarea id="exportCode" readonly style="border-color:#d4af37;"></textarea>
                <div class="btn-row">
                    <button id="btnCopyExport">拓印符文</button>
                    <button id="btnCancelExport" style="background: linear-gradient(to bottom, #555 0%, #333 100%); color: #ccc; border-color:#666; text-shadow: 0 1px 1px #000;">關閉</button>
                </div>
            </div>
        </div>
        <div id="importOverlay" class="overlay">
             <div class="overlay-content">
                <h2 style="color:#8cafff; margin-top:0; margin-bottom:15px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px;">[ 解開靈魂石 ]</h2>
                <div style="color:#bca88f; font-size:16px; margin-bottom:15px; text-align:center;">將您的繼承符文嵌入於此：</div>
                <textarea id="importCode" placeholder="貼上符文..."></textarea>
                <div class="btn-row">
                    <button id="btnConfirmImport">解開封印</button>
                    <button id="btnCancelImport" style="background: linear-gradient(to bottom, #555 0%, #333 100%); color: #ccc; border-color:#666; text-shadow: 0 1px 1px #000;">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 全域常數與字典表 (Data-Driven Dictionary)
        // ==========================================
        const TAG = { P: "[我方]", E: "[敵軍]", DIE: "*隕落*", JOIN: "*增援*" };
        const MSG = {
            sys: {
                noArmy: "系統：軍營空無一人！", noGold: "系統：國庫空虛！", full: "系統：軍營已滿",
                rcrtOk: "徵召完畢！", svOk: "系統：古老靈魂石已封印 (存檔成功)", ldOk: "系統：靈魂重塑完成 (讀檔成功)",
                ldFail: "系統：靈魂石已破碎或遺失。", cpOk: "已拓印符文！", impOk: "解開封印成功！",
                rnOk: "國家改名成功！", nmOk: "賜名成功！", rst: "已散盡修為重歸凡人！", proOk: "晉升儀式完成！",
                emp: "國庫已空！",
                retire: g => `英雄退隱！獲 ${g} G`, trans: c => `轉化儀式完成：${c}！`,
                facHit: c => `擴建成功！(速點${c}次傾注國庫)`, facMax: lv => `國庫傾注！連升 ${lv} 級！`, exp: e => `獲得 ${e} 歷練`
            },
            bat: {
                sgStart: n => `*** 開始征伐 [ ${n} ] ***`, sgHard: "!!! 敵方嚴陣以待 (強敵) !!!",
                dgStart: n => `*** 深入探險 [ ${n} ] ***`, dgBoss: "!!! 深處傳來令人窒息的恐怖威壓 (BOSS層) !!!",
                eCnt: c => `> 偵測到敵方總數：${c} 體`, stg: s => `=== 突破戰：${s} ===`,
                stgClr: s => `>>> 成功佔領了 ${s}！`, stgEmp: "> 毫無防備，輕鬆推進！",
                
                join: n => `  ${TAG.JOIN} ${TAG.P} ${n} 拔劍參戰！`,
                joinD: n => `[英雄降臨] ${n} 突入前線，誓言與你戰鬥至最後一刻！`,
                
                stun: n => `  ${n} 遭到定身`, 
                stunD: n => `  [狀態] ${n} 受到束縛，無法行動！`,
                
                psn: (n, d) => `  ${n} 中毒 -${d}`,

                pot: (n, h) => `  ${n} [飲用藥水]+${h}`, 
                potD: n => `  ${n} 灌下藥水，穩住了陣腳！`,
                
                hl: (n, w) => `  ${n} [聖光祈禱]->${w}`, 
                hlD: (n, w) => `  ${n} 吟唱治癒，光芒包覆了 ${w}！`,
                
                hlA: n => `  ${n} [神聖力場]`, 
                hlAD: n => `  ${n} 施展賢者之光，全隊生命力得到了滋潤！`,
                
                bfS: n => `  ${n} [戰吼]`, 
                bfSD: n => `  ${n} 激發潛能，屬性微幅提升！`,
                
                bfB: n => `  ${n} [王者祝福]`, 
                bfBD: n => `  ${n} 接受祝福，戰鬥力大幅飆升！`,
                
                bsk: (n, d) => `  ${n} [嗜血狂化] -${d}`, 
                bskD: n => `  ${n} 雙眼血紅，以生命換取了恐怖的攻擊力！`,
                bskDie: n => `  ${TAG.DIE} ${n} 氣血逆流而亡！`, 
                
                hly: n => `  ${n} [神之庇護]`, 
                hlyD: n => `  ${n} 散發神聖氣息，全隊防禦得到了神之庇護！`,
                
                ntr: n => `  ${n} [淨化之風]`, 
                ntrD: n => `  ${n} 驅散了負面狀態，身形變得更加輕靈！`,
                
                die: n => `  ${TAG.DIE} ${n} 倒在血泊中！`, 
                
                cnt: (n, d) => `  ${n} [絕境反擊] -> ${d}`, 
                cntD: (t, n) => `  ${t} 抓準破綻，凌厲地反擊了 ${n}！`,
                
                wipe: "[全軍覆沒] 你的部隊已潰散...", end: "=== 戰役塵埃落定 ===",
                sgWin: "[榮耀] 征服成功！", sgLose: "[挫敗] 征服失敗...連勝紀錄中斷。",
                dgWin: "[凱旋] 成功掃蕩了該層地下城！", dgLose: "[撤退] 探索受挫，部隊退回營地。",
                
                rsc: n => `[奇遇] 解救了被囚禁的英雄：${n}！`,
                rscD: n => `[史詩] 擊敗領主後，你在深處解救了英雄「${n}」！他已加入殿堂。`,
                
                sumK: k => `* 總計斬殺：${k}`, sumG: g => `$ 繳獲金幣：${g}`, sumE: e => `+ 戰鬥歷練：${e} EXP`
            }
        };

        const P = {
            bgMain: "rgba(26, 20, 16, 0.6)", bgBtn: "#2a201a", bgBtnHover: "#3d2f25", 
            border: "#6b533e", borderGold: "#d4af37", textMain: "#eaddc5", 
            textTitle: "#d4af37", textSub: "#bca88f", textWarn: "#e65a5a", 
            textHeal: "#78d478", textMagic: "#8cafff", textDark: "#b57edc"
        };

        // ==========================================
        // 核心與 UI 狀態
        // ==========================================
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const V_WIDTH = 1080; const V_HEIGHT = 1632; canvas.width = V_WIDTH; canvas.height = V_HEIGHT;
        const STATE_SPLASH=0, STATE_MAIN=1, STATE_ROSTER=2, STATE_UNIT=3, STATE_BATTLE=4, STATE_ENDING=5, STATE_NPC=6, STATE_NPC_UNIT=7;
        let currentState = STATE_SPLASH, activeButtons = [];
        let battleFontSize = 32, mainFontSize = 35, isAutoBattle = true, isBattlePaused = false, battleTimer = null, battleInfo = {pStart:0, eStart:0}; 
        let isSelectingSibling = false, sysMsg = "", sysMsgTimer = null, lastInputTime = 0;
        let isDetailedLog = true, scrollOffset = 0, isAutoScrolling = true, displayLinesCache = [], needRebuildCache = true;
        let isDragging = false, dragStartY = 0, dragDelta = 0, facClicks = { id: null, count: 0, time: 0 };

        function showSysMsg(msg) {
            sysMsg = msg; if(sysMsgTimer) clearTimeout(sysMsgTimer);
            sysMsgTimer = setTimeout(() => { sysMsg = ""; requestAnimationFrame(draw); }, 1200);
            requestAnimationFrame(draw);
        }

        function fNum(n) { 
            if(n >= 1e12) return (n/1e12).toFixed(1).replace(/\.0$/,'') + '兆';
            if(n >= 1e8) return (n/1e8).toFixed(1).replace(/\.0$/,'') + '億';
            if(n >= 1e4) return (n/1e4).toFixed(1).replace(/\.0$/,'') + '萬';
            if(n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + '千';
            return Math.floor(n).toString();
        }

        // ==========================================
        // 資料庫與特質系統
        // ==========================================
        const CLASS_SKILLS = {
            "冒險者": [{n:"揮擊",m:1.0}, {n:"丟石頭",m:1.1}, {n:"奮力一擊",m:1.2}],
            "戰士": [{n:"狂擊",m:1.3}, {n:"斬擊",m:1.4}, {n:"破甲打擊",m:1.5}], "魔法師": [{n:"魔法飛彈",m:1.3}, {n:"火球術",m:1.5}, {n:"閃電雷擊",m:1.6}], "牧師": [{n:"飛拳術",m:1.2}, {n:"聖水術",m:1.4}, {n:"破魔咒",m:1.3}],
            "騎士": [{n:"衝鋒",m:1.5}, {n:"聖光擊",m:1.6}, {n:"騎槍突刺",m:1.7}], "遊俠": [{n:"純潔之刃",m:1.7}, {n:"光速飛踢",m:1.4}, {n:"神之箭矢",m:1.5}], "狂戰士": [{n:"狂暴打擊",m:1.8}, {n:"旋風斬",m:1.6}, {n:"嗜血斬",m:1.7}],
            "巫術士": [{n:"冰刃風暴",m:1.6}, {n:"火龍吐息",m:2.0}, {n:"閃電球",m:1.8}], "魔劍士": [{n:"真空斬",m:1.8}, {n:"匕首雨",m:1.6}, {n:"元素劍",m:1.5}], "咒術師": [{n:"心靈爆破",m:1.7}, {n:"延時炸彈",m:1.9}, {n:"風龍幻象",m:1.6}],
            "賢者": [{n:"聖言術",m:1.8}, {n:"神聖怒火",m:1.7}, {n:"精神衝擊",m:1.5}], "神官": [{n:"心靈之鎚",m:1.6}, {n:"審判",m:1.8}, {n:"神聖爆破",m:1.7}], "祭司": [{n:"降災",m:1.7}, {n:"神聖之擊",m:1.6}, {n:"暗影箭",m:1.5}],
            "聖騎士": [{n:"神聖十字斬",m:2.2}, {n:"聖光風暴",m:1.9}, {n:"天堂之怒",m:2.4}, {n:"信仰護體",m:2.1}], "闇騎士": [{n:"死亡打擊",m:2.3}, {n:"黑暗突刺",m:2.0}, {n:"深淵斬",m:2.1}, {n:"黑炎陣",m:2.4}], "龍騎士": [{n:"龍槍突刺",m:2.2}, {n:"巨龍衝擊",m:2.5}, {n:"翔龍斬",m:2.0}, {n:"龍之吐息",m:2.3}],
            "聖鬥士": [{n:"光速連擊",m:1.9}, {n:"星辰碎裂拳",m:2.6}, {n:"流星拳",m:2.1}, {n:"神聖閃電",m:2.4}], "殺手": [{n:"致命暗殺",m:2.8}, {n:"幻影斬",m:2.0}, {n:"影襲",m:2.2}, {n:"淬毒刃",m:2.3}], "吟遊詩人": [{n:"破壞音波",m:1.8}, {n:"鎮魂曲",m:2.4}, {n:"死亡樂章",m:2.1}, {n:"英雄之歌",m:2.0}],
            "戰將": [{n:"霸體重擊",m:2.5}, {n:"千軍破",m:2.3}, {n:"無雙斬",m:2.1}, {n:"氣刃斬",m:2.4}], "狂魔": [{n:"天魔解體",m:2.7}, {n:"嗜血狂怒",m:2.2}, {n:"魔神斬",m:2.4}, {n:"血怒",m:2.5}], "鬥神": [{n:"鬥氣爆發",m:2.4}, {n:"無雙亂舞",m:2.1}, {n:"轟天擊",m:2.6}, {n:"破天一擊",m:2.5}],
            "戰巫": [{n:"核融合術",m:2.4}, {n:"近戰爆破",m:2.2}, {n:"魔力震盪",m:2.0}, {n:"魔武雙擊",m:2.3}], "巫妖": [{n:"死亡凋零",m:2.5}, {n:"靈魂收割",m:2.7}, {n:"骸骨長矛",m:2.1}, {n:"靈魂尖嘯",m:2.4}], "大法師": [{n:"末日審判",m:3.0}, {n:"絕對零度",m:2.6}, {n:"雷神之怒",m:2.5}, {n:"重力倍增",m:2.7}],

        function packData(d) {
            return {
                name: d.name, gold: d.gold, conquered: d.conquered, streak: d.streak, dungeonFloor: d.dungeonFloor, fac: d.fac,
                army: d.army.map(u => ({ cN: u.className, n: u.customName, lv: u.level, e: u.exp })),
                npcs: d.npcs.map(u => ({ o: u.oName, c: u.customName }))
            };
        }
        function unpackData(p) {
            if(!p) return false;
            let restoreUnit = (u) => {
                let nu = createUnit(u.className || u.cN, u.level || u.lv);
                nu.customName = u.customName || u.n || ""; nu.exp = u.exp || u.e || 0; return nu;
            };
            let army = (p.army||[]).map(restoreUnit);
            let dFloor = p.dungeonFloor || 1;
            let maxArmyLv = army.length > 0 ? Math.max(...army.map(a => a.level)) : 1;
            let targetLevel = maxArmyLv + Math.floor(dFloor / 5);

            gameData = {
                name: p.name || "無名", gold: p.gold || 0, conquered: p.conquered || 0, streak: p.streak || 0, 
                dungeonFloor: dFloor, fac: p.fac || {hp:0, wAtk:0, mAtk:0, pAtk:0, def:0, spd:0}, army: army, 
                npcs: (p.npcs||[]).map(u => {
                    let oN = u.o || u.oN || u.oName; let cN = u.c || u.customName || u.n;
                    let nInfo = Object.values(NPC_DB).find(x => x.n === oN);
                    let nu = createUnit(nInfo ? nInfo.c : (u.cN || "冒險者"), targetLevel);
                    nu.oName = oN; nu.customName = cN || oN; return nu;
                })
            };
            return true;
        }

        function calcStats(cName, lv) {
            let b = CLASS_DB[cName];
            return {
                hp: b.hp + (lv - 1) * Math.floor(b.hp * 0.1),
                atk: b.atk + (lv - 1) * Math.floor(b.atk * 0.1),
                def: b.def + (lv - 1) * Math.floor(b.def * 0.1),
                spd: b.spd + (lv - 1) * Math.floor(b.spd * 0.05),
                exp: Math.floor(100 * Math.pow(lv, 1.2) * (b.tier + 1))
            };
        }

        function syncNpcLevels() {
            if(!gameData.npcs || gameData.npcs.length === 0) return;
            let maxArmyLv = gameData.army.length > 0 ? Math.max(...gameData.army.map(a => a.level)) : 1;
            let targetLevel = maxArmyLv + Math.floor(gameData.dungeonFloor / 5);
            gameData.npcs.forEach(npc => {
                if(npc.level !== targetLevel) {
                    let nInfo = Object.values(NPC_DB).find(x => x.n === npc.oName);
                    let nu = createUnit(nInfo ? nInfo.c : npc.className, targetLevel);
                    Object.assign(npc, nu, { oName: npc.oName, customName: npc.customName });
                }
            });
        }

        function updateTraits(u) {
            u.traits = ['potion'];
            if(u.tier>=1) u.traits.push(u.type==='戰士'?'guard':u.type==='法師'?'pierce':'heal');
            if(u.tier>=2) {
                let m = {"騎士":"protect","遊俠":"buff_s","狂戰士":"berserk","巫術士":"aoe","咒術師":"stun","魔劍士":"combo","賢者":"heal_all","神官":"buff_b","祭司":"crit"};
                let t2 = m[u.className];
                if(!t2) { let pool = u.type==='戰士'?['protect','buff_s','berserk']:u.type==='法師'?['aoe','stun','combo']:['heal_all','buff_b','crit']; t2 = pool[Math.abs(u.className.charCodeAt(0))%3]; }
                u.traits.push(t2);
            }
            if(u.tier>=3) {
                if(u.className.includes('妖') || u.className.includes('魔')) u.traits.push('vampire');
                else u.traits.push(u.faction==='神聖'?'holy':u.faction==='邪惡'?'evil':'neutral');
            }
        }

        function getSkillsForClass(cls, tier) { let pool = CLASS_SKILLS[cls] || [{n: "普攻", m: 1.0}]; return [...pool].sort(()=>0.5-Math.random()).slice(0, tier===0?1:tier===1?2:tier===2?3:4); }
        function getFinalStats(u) {
            let f = gameData.fac;
            return { maxHp: u.maxHp + f.hp * FACILITIES.find(x=>x.id==='hp').eff, hp: u.maxHp + f.hp * FACILITIES.find(x=>x.id==='hp').eff, 
                     atk: u.atk + (u.type==='戰士'?f.wAtk*5 : u.type==='法師'?f.mAtk*5 : u.type==='牧師'?f.pAtk*5 : 0), 
                     def: u.def + f.def * FACILITIES.find(x=>x.id==='def').eff, spd: u.spd + f.spd * FACILITIES.find(x=>x.id==='spd').eff };
        }
        function getCountryName() {
            const p = ["亞伯里亞","魔龍","魔導","天使","夢幻","白銀","神聖","白鹿","銀月","黑龍","蒼鷹","烈日","冰雪","狂風","幽暗","光明","鋼鐵","黃金","水晶","獅鷲","巨獸","暗影","虛空","星辰","太陽","月亮","大地","海洋","烈焰","寒冰","毒牙","利爪","鐵血","精靈","矮人","泰坦","巨龍"];
            const s = ["王國","聯邦","帝國","王朝","共和國","公國","部落","聯盟","同盟","聖國","領域","之島","之界","之地","之都","上國","大陸","皇朝","幻境","遺跡"];
            return p[Math.floor(Math.random()*p.length)] + s[Math.floor(Math.random()*s.length)];
        }

        function createUnit(cName, level = 1) {
            let b = CLASS_DB[cName], s = calcStats(cName, level);
            let u = { customName: "", className: b.name, tier: b.tier, type: b.type, faction: b.faction, level: level, exp: 0, maxExp: s.exp, hp: s.hp, maxHp: s.hp, atk: s.atk, def: s.def, spd: s.spd, skills: getSkillsForClass(b.name, b.tier) };
            updateTraits(u); return u;
        }

        function levelUpUnit(u) { 
            u.level++; let s = calcStats(u.className, u.level);
            u.maxExp = s.exp; u.maxHp = s.hp; u.atk = s.atk; u.def = s.def; u.spd = s.spd; u.hp = u.maxHp; 
        }

        function changeClass(u, nName) {
            let b = CLASS_DB[nName];
            if(b.tier > u.tier && b.tier >= 2) u.level = Math.max(1, u.level - 10);
            u.exp = 0; 
            Object.assign(u, {className: b.name, tier: b.tier, type: b.type, faction: b.faction});
            let s = calcStats(b.name, u.level);
            u.maxExp = s.exp; u.maxHp = s.hp; u.atk = s.atk; u.def = s.def; u.spd = s.spd; u.hp = u.maxHp;
            u.skills = getSkillsForClass(b.name, b.tier); updateTraits(u);
        }

        function swapSiblingClass(u, nName) { 
            let b = CLASS_DB[nName]; Object.assign(u, {className: b.name, type: b.type, faction: b.faction}); 
            let s = calcStats(b.name, u.level);
            u.maxHp = s.hp; u.atk = s.atk; u.def = s.def; u.spd = s.spd; u.hp = Math.min(u.hp, u.maxHp);
            u.skills = getSkillsForClass(b.name, b.tier); updateTraits(u); 
        }

        // ==========================================

        function pushLog(shortTxt, c=P.textSub, detailTxt=null) { battleLogs.push({ type:'text', short: String(shortTxt), detail: String(detailTxt||shortTxt), c: c }); needRebuildCache = true; }
        function wrapText(text, maxWidth, fontStr) {
            if(!text) return []; ctx.font = fontStr; let lines = [], curr = "";
            for(let char of text) { let test = curr + char; if(ctx.measureText(test).width > maxWidth && curr.length > 0) { lines.push(curr); curr = char; } else curr = test; }
            if(curr) lines.push(curr); return lines;
        }
        function buildDisplayCache() {
            displayLinesCache = []; ctx.font = `bold ${battleFontSize}px sans-serif`;
            let shown = battleLogs.slice(0, battleDisplayIndex);
            for(let log of shown) {
                if(log.type === 'pause') continue; 
                wrapText(isDetailedLog ? log.detail : log.short, V_WIDTH - 100, ctx.font).forEach(line => displayLinesCache.push({t: line, c: log.c}));
            }
            needRebuildCache = false;
        }

        function launchCombat(type) {
            if(gameData.army.length === 0) return showSysMsg(MSG.sys.noArmy);
            syncNpcLevels(); 
            
            let eTotal = [], sNames = [], diffMod = 1;

            if(type === 'siege') {
                currentEnemyName = getCountryName();
                if(gameData.streak >= 3 && Math.random() < 0.6) diffMod = 1 + Math.min(0.5, (gameData.streak - 2) * 0.05);
                gameData.army.forEach(pu => {
                    let clsArr = Object.values(CLASS_DB).filter(c => c.tier === pu.tier).map(c => c.name);
                    let eUnit = createUnit(clsArr[Math.floor(Math.random() * clsArr.length)], 1), pFinal = getFinalStats(pu), v = () => (0.9 + Math.random() * 0.2) * diffMod; 
                    eUnit.level = Math.max(1, pu.level + Math.floor(Math.random()*3)-1); eUnit.maxHp = Math.floor(pFinal.maxHp * v()); eUnit.hp = eUnit.maxHp;
                    eUnit.atk = Math.floor(pFinal.atk * v()); eUnit.def = Math.floor(pFinal.def * v()); eUnit.spd = Math.floor(pFinal.spd * v()); eTotal.push(eUnit);
                });
                sNames = ["城門防線", "外圍陣地", "兵營市街", "近衛內城", "王座大廳"];
                battleLogs = []; scrollOffset = 0; isAutoScrolling = true;
                pushLog(MSG.bat.sgStart(currentEnemyName), P.textTitle);
                if(diffMod > 1) pushLog(MSG.bat.sgHard, P.textWarn, `!!! 敵軍察覺了你的連勝威勢，燃起了無與倫比的高昂鬥志 !!!`);
            } else {
                currentEnemyName = `地下城 第 ${gameData.dungeonFloor} 層`;
                let isBossFloor = gameData.dungeonFloor % 5 === 0;
                const M_PRE = ["狂暴的","嗜血的","腐敗的","劇毒的","幽暗的","詛定的","白骨","火焰","寒冰","暗影"];
                const M_SUF = ["哥布林","獸人","食人魔","骷髏兵","石像鬼","惡魔","幽靈","魔像","巨魔","史萊姆"];
                const B_SUF = ["深淵領主","骸骨巨龍","混沌魔王","破壞神","恐懼之王","巫妖王","邪龍使徒"];
                
                let baseTier = gameData.dungeonFloor >= 35 ? 3 : (gameData.dungeonFloor >= 25 ? 2 : 1);
                
                for(let i=0; i<30; i++) {
                    let isBoss = isBossFloor && i===29;
                    let t = isBoss ? Math.min(3, baseTier + 1) : baseTier; 
                    let avail = Object.values(CLASS_DB).filter(c => c.tier === t);
                    if(!avail.length) avail = Object.values(CLASS_DB);
                    
                    let eLevel = Math.max(1, Math.floor(gameData.dungeonFloor * 1.4)); 
                    let eUnit = createUnit(avail[Math.floor(Math.random()*avail.length)].name, eLevel);
                    eUnit.isMon = true; eUnit.isBoss = isBoss; eUnit.customName = M_PRE[Math.floor(Math.random()*M_PRE.length)] + (isBoss ? B_SUF[Math.floor(Math.random()*B_SUF.length)] : M_SUF[Math.floor(Math.random()*M_SUF.length)]);
                    
                    if(isBoss) { eUnit.maxHp*=3; eUnit.hp=eUnit.maxHp; eUnit.atk=Math.floor(eUnit.atk*1.5); eUnit.def=Math.floor(eUnit.def*1.5); }
                    eTotal.push(eUnit);
                }
                sNames = ["幽暗入口", "潮濕走道", "廢棄祭壇", "白骨大廳", isBossFloor ? "深淵王座 (BOSS)" : "下層入口"];
                battleLogs = []; scrollOffset = 0; isAutoScrolling = true;
                pushLog(MSG.bat.dgStart(currentEnemyName), P.textMagic);
                if(isBossFloor) pushLog(MSG.bat.dgBoss, P.textWarn);
            }

            eTotal.sort(() => 0.5 - Math.random());
            if(type === 'dungeon' && gameData.dungeonFloor % 5 === 0) {
                let bossIdx = eTotal.findIndex(u => u.isBoss);
                if(bossIdx >= 0) eTotal.push(eTotal.splice(bossIdx, 1)[0]); 
            }

            let stages = [[], [], [], [], []]; eTotal.forEach((u, idx) => stages[Math.floor(idx/6)].push(u));
            pushLog(MSG.bat.eCnt(eTotal.length), P.textSub);

            let pPool = gameData.army.map(u => { let fs = getFinalStats(u); return {...u, ...fs, isP:true, isNpc:false, curHp: fs.maxHp, bAtk:0, bDef:0, bSpd:0, stun:0, poison:0, oUnit: u}; });
            if(gameData.npcs) gameData.npcs.forEach(n => n._joined = false);

            let totalKills = 0, isWin = false; 
            battleInfo.pStart = pPool.length; battleInfo.eStart = eTotal.length; 

            for(let step=0; step<5; step++) {
                let ePool = stages[step].map(u => ({...u, isP:false, curHp:u.maxHp, bAtk:0, bDef:0, bSpd:0, stun:0, poison:0}));
                pushLog(``); pushLog(MSG.bat.stg(sNames[step]), P.textMain);
                if(ePool.length === 0) { pushLog(MSG.bat.stgEmp, P.textHeal); battleLogs.push({type:'pause'}); continue; }

                if (gameData.npcs && gameData.npcs.length > 0) {
                    let availNpcs = gameData.npcs.filter(n => !n._joined);
                    let joinProbs = [0.06, 0.12, 0.18, 0.24, 0.30]; 
                    let joining = availNpcs.filter(n => Math.random() < joinProbs[step]);
                    let aliveCount = pPool.filter(u => u.curHp > 0).length;
                    
                    if (joining.length > 0 && (aliveCount + joining.length) <= 30) {
                        joining.forEach(npc => {
                            npc._joined = true; let fs = getFinalStats(npc);
                            pPool.unshift({...npc, ...fs, isP:true, isNpc:true, curHp:fs.maxHp, bAtk:0, bDef:0, bSpd:0, stun:0, poison:0, oUnit: npc});
                            pushLog(MSG.bat.join(npc.oName), P.textTitle, MSG.bat.joinD(npc.oName));
                        });
                    }
                }

                let turn = 1;
                while(pPool.some(u=>u.curHp>0) && ePool.some(u=>u.curHp>0) && turn<150) {
                    let pActive = pPool.filter(u=>u.curHp>0).slice(0, 6), eActive = ePool.filter(u=>u.curHp>0).slice(0, 6);
                    let all = [...pActive, ...eActive].sort((a,b) => (b.spd+b.bSpd) - (a.spd+a.bSpd));
                    
                    for(let u of all) {
                        if(u.curHp <= 0) continue;
                        let px = u.isP?TAG.P:TAG.E, dn = getDispName(u), uTeam = u.isP?pActive:eActive, tTeam = u.isP?eActive:pActive;
                        let tgtPool = tTeam.filter(x=>x.curHp>0); if(tgtPool.length === 0) break;
                        
                        if(u.stun > 0) { u.stun--; pushLog(MSG.bat.stun(px+dn), P.textMagic, MSG.bat.stunD(px+dn)); continue; }
                        if(u.poison > 0) { let pd = Math.floor(u.maxHp*0.05); u.curHp -= pd; pushLog(MSG.bat.psn(px+dn, fNum(pd)), P.textDark, MSG.bat.psnD(px+dn)); u.poison--; if(u.curHp<=0) { pushLog(MSG.bat.psnDie(px+dn), P.textWarn); if(!u.isP) totalKills++; continue; } }

                        let aliveAllies = uTeam.filter(x=>x.curHp>0);
                        let has = (t) => u.traits.includes(t) && Math.random() < 0.25;
                        
                        if(has('potion') && u.curHp < u.maxHp*0.4) { let h=Math.floor(u.maxHp*0.15); u.curHp=Math.min(u.maxHp, u.curHp+h); pushLog(MSG.bat.pot(px+dn, fNum(h)), P.textHeal, MSG.bat.potD(px+dn)); continue; }
                        if(has('heal') && aliveAllies.length > 0) { let w = aliveAllies.sort((a,b)=>a.curHp-b.curHp)[0]; let h=Math.floor(w.maxHp*0.2); w.curHp=Math.min(w.maxHp, w.curHp+h); pushLog(MSG.bat.hl(px+dn, getDispName(w)), P.textHeal, MSG.bat.hlD(px+dn, getDispName(w))); continue; }
                        if(has('heal_all') && aliveAllies.length > 0) { aliveAllies.forEach(x=>x.curHp=Math.min(x.maxHp, x.curHp+x.maxHp*0.06)); pushLog(MSG.bat.hlA(px+dn), P.textHeal, MSG.bat.hlAD(px+dn)); continue; }
                        if(has('buff_s')) { u.bAtk+=u.atk*0.15; u.bDef+=u.def*0.15; pushLog(MSG.bat.bfS(px+dn), P.textTitle, MSG.bat.bfSD(px+dn)); continue; }
                        if(has('buff_b')) { u.bAtk+=u.atk*0.3; u.bDef+=u.def*0.3; u.bSpd+=u.spd*0.3; pushLog(MSG.bat.bfB(px+dn), P.textTitle, MSG.bat.bfBD(px+dn)); continue; }
                        if(has('berserk')) { let bh = Math.floor(u.maxHp*0.1); u.curHp -= bh; u.bAtk += Math.floor(u.atk*0.4); pushLog(MSG.bat.bsk(px+dn, fNum(bh)), P.textWarn, MSG.bat.bskD(px+dn)); if(u.curHp<=0) { pushLog(MSG.bat.bskDie(px+dn), P.textWarn); if(!u.isP) totalKills++; } continue; }
                        if(has('holy') && aliveAllies.length > 0) { aliveAllies.forEach(x=>x.bDef+=x.def*0.15); pushLog(MSG.bat.hly(px+dn), P.textTitle, MSG.bat.hlyD(px+dn)); continue; }
                        if(has('neutral')) { u.poison=0; u.bSpd+=u.spd*0.2; pushLog(MSG.bat.ntr(px+dn), P.textMagic, MSG.bat.ntrD(px+dn)); continue; }

                        let sk = u.skills[Math.floor(Math.random()*u.skills.length)], isAoeHit = has('aoe');
                        let tgts = isAoeHit ? tgtPool : [tgtPool[Math.floor(Math.random()*tgtPool.length)]];

                        if (!u.isP && !isAoeHit && tgts[0].isNpc) {
                            let normals = tgtPool.filter(x => !x.isNpc);
                            if (normals.length > 0 && Math.random() < 0.75) tgts[0] = normals[Math.floor(Math.random() * normals.length)];
                        }

                        let doHit = (tgt, isCombo, isAoeFlag) => {
                            if(u.curHp <= 0 || tgt.curHp <= 0) return; 
                            let isPierce = has('pierce'), isCrit = has('crit'), isEvil = has('evil'), isStun = has('stun'), isVampire = u.traits.includes('vampire');
                            let tGuard = tgt.traits.includes('guard') && Math.random()<0.25;
                            let protector = tTeam.find(x => x.curHp>0 && x!==tgt && x.traits.includes('protect'));
                            let tProtect = protector && Math.random()<0.25, rTgt = tProtect ? protector : tgt;

                            let baseAtk = u.atk+u.bAtk, baseDef = isPierce ? 0 : (rTgt.def+rTgt.bDef);
                            let dmg = Math.floor(baseAtk * sk.m - baseDef);
                            if(isAoeFlag) dmg = Math.floor(dmg * 0.45); 
                            if(dmg<1) dmg=1;
                            
                            if((u.type==="法師"&&rTgt.type==="戰士")||(u.type==="戰士"&&rTgt.type==="牧師")||(u.type==="牧師"&&rTgt.type==="法師")) dmg=Math.floor(dmg*1.3);
                            else if((u.type==="戰士"&&rTgt.type==="法師")||(u.type==="牧師"&&rTgt.type==="戰士")||(u.type==="法師"&&rTgt.type==="牧師")) dmg=Math.floor(dmg*0.8);
                            if(u.faction!=="無" && rTgt.faction!=="無") {
                                if((u.faction==="神聖"&&rTgt.faction==="邪惡")||(u.faction==="邪惡"&&rTgt.faction==="中立")||(u.faction==="中立"&&rTgt.faction==="神聖")) dmg=Math.floor(dmg*1.25);
                                else if((u.faction==="邪惡"&&rTgt.faction==="神聖")||(u.faction==="中立"&&rTgt.faction==="邪惡")||(u.faction==="神聖"&&rTgt.faction==="中立")) dmg=Math.floor(dmg*0.85);
                            }

                            if(isCrit) dmg*=2; if(tGuard||tProtect) dmg = Math.floor(dmg*0.5); if(isEvil) { dmg = Math.floor(dmg*1.2); rTgt.poison = 2; }
                            rTgt.curHp -= dmg;
                            
                            let vHeal = 0; if (isVampire && dmg > 0) { vHeal = Math.max(1, Math.floor(dmg * 0.3)); u.curHp = Math.min(u.maxHp, u.curHp + vHeal); }
                            
                            let aTagsS = (isPierce?"[破甲]":"")+(isCrit?"[致命]":"")+(isEvil?"[淬毒]":"")+(isStun?"[定身]":"")+(isVampire?`[吸血+${fNum(vHeal)}]`:"");
                            let aTagsD = (isPierce?"[破甲]":"")+(isCrit?"[致命]":"")+(isEvil?"[淬毒]":"")+(isStun?"[定身]":"")+(isVampire?`[吸血]`:"");
                            
                            let dTags = (tGuard?"[格擋]":"")+(tProtect?"[掩護]":"");
                            if(isStun) rTgt.stun = 1;

                            let r = dmg / rTgt.maxHp, pxTgt = u.isP?TAG.E:TAG.P;
                            let dLvl = r<0.05?"皮肉之傷":r<0.15?"見血的創口":r<0.3?"嚴重的撕裂":r<0.5?"見骨的重傷":r<0.8?"致命的打擊":"徹底的粉碎";
                            
                            let acts = [];
                            if(u.faction === "神聖") acts = ["高舉聖器，引導天界怒火化作", "渾身散發耀眼金芒，施展出", "化作莊嚴的光影，不可阻擋地使出"];
                            else if(u.faction === "邪惡" || isVampire) acts = ["發出令人毛骨悚然的狂笑，釋放出", "周身黑氣繚繞，將深淵詛咒凝聚為", "帶著冰冷的殺意，無情地刺出"];
                            else if(u.type === "法師") acts = ["雙手結出古老法印，引動元素施放", "口中低語禁忌咒語，虛空中凝聚出", "法杖直指蒼穹，牽引星辰魔力爆發出"];
                            else if(u.type === "戰士") acts = ["發出戰吼，以雷霆萬鈞之勢劈出", "身形如電，帶著破空之音剛猛使出", "大步踏碎地面，狂暴無匹地揮出"];
                            else if(u.type === "牧師") acts = ["雙手合十祈求庇護，隨即降下", "吟唱著古老的讚美詩，將精神化為", "目光如炬，以無可動搖的信仰驅動"];
                            else acts = ["身形一閃，出其不意地施展出", "深吸一口氣，凝聚全身真氣使出", "眼神一冷，動作行雲流水般施展"];
                            let actMsg = acts[Math.floor(Math.random() * acts.length)];
                            
                            let logC = u.isP ? P.textMagic : P.textWarn;
                            if (isVampire || isEvil) logC = P.textDark;
                            else if (u.faction === "神聖") logC = P.textTitle;
                            
                            let cTag = isCombo?"[二連]":isAoeFlag?"[掃蕩]":"";
                            let sLog = `${px}${dn} ${cTag}${aTagsS} ${sk.n} -> ${pxTgt}${getDispName(rTgt)} ${dTags}-${fNum(dmg)}`;
                            let dLog = `${px}${dn} ${isCombo?"追加":"趁勢"}${actMsg}「${sk.n}」，對 ${pxTgt}${getDispName(rTgt)} 造成了${dLvl}！${(aTagsD||dTags)?`(${aTagsD}${dTags})`:""}`;
                            
                            pushLog(sLog, logC, dLog);

                            if(rTgt.curHp<=0) { pushLog(MSG.bat.die(pxTgt+getDispName(rTgt)), P.textWarn); if(u.isP) totalKills++; }
                            else if(rTgt.traits.includes('neutral') && Math.random()<0.25 && rTgt.curHp>0) {
                                let cDmg = Math.floor(rTgt.atk*0.8); u.curHp -= cDmg;
                                pushLog(MSG.bat.cnt(pxTgt+getDispName(rTgt), fNum(cDmg)), P.textTitle, MSG.bat.cntD(pxTgt+getDispName(rTgt), dn));
                                if(u.curHp<=0) { pushLog(MSG.bat.die(px+dn), P.textWarn); if(!u.isP) totalKills++; }
                            }
                        };

                        tgts.forEach(tg => doHit(tg, false, isAoeHit));
                        if(has('combo') && !isAoeHit && tgtPool[0].curHp>0 && u.curHp>0) doHit(tgtPool[0], true, false);
                    } turn++;
                }
                if(!pPool.some(u=>u.curHp>0 && u.curHp!==-999)) { pushLog(MSG.bat.wipe, P.textWarn); break; } 
                else { pushLog(MSG.bat.stgClr(sNames[step]), P.textTitle); if(step < 4) battleLogs.push({type:'pause'}); }
            }

            isWin = pPool.some(u=>u.curHp>0 && u.curHp!==-999); pushLog(``); pushLog(MSG.bat.end, P.textMain);
            let gG = 0, gE = 0;
            if(type === 'siege') {
                gG = totalKills * 50; gE = totalKills * 80;
                if(isWin) { gG += gameData.conquered*20 + 200; gE += gameData.conquered*30 + 100; pushLog(MSG.bat.sgWin, P.textTitle); gameData.conquered++; gameData.streak++; } 
                else { pushLog(MSG.bat.sgLose, P.textWarn); gameData.streak = 0; }
            } else {
                gG = totalKills * 15; gE = Math.floor(totalKills * 50 * Math.max(1, Math.floor(Math.sqrt(gameData.dungeonFloor))));
                if(isWin) { 
                    gG += 500 * gameData.dungeonFloor; 
                    gE += 500 * gameData.dungeonFloor; 
                    pushLog(MSG.bat.dgWin, P.textTitle); 
                    let f = gameData.dungeonFloor;
                    if(f % 10 === 0 && NPC_DB[f] && !gameData.npcs.find(x => x.oName === NPC_DB[f].n)) {
                        let nInfo = NPC_DB[f], newNpc = createUnit(nInfo.c, f);
                        newNpc.oName = nInfo.n; newNpc.customName = nInfo.n;
                        gameData.npcs.push(newNpc);
                        pushLog(MSG.bat.rsc(nInfo.n), P.textTitle, MSG.bat.rscD(nInfo.n));
                    }
                    gameData.dungeonFloor++; 
                } else pushLog(MSG.bat.dgLose, P.textWarn);
            }
            
            pushLog(MSG.bat.sumK(fNum(totalKills))); pushLog(MSG.bat.sumG(fNum(gG))); pushLog(MSG.bat.sumE(fNum(gE)));
            gameData.gold += gG; 
            pPool.forEach(u => { if(u.curHp !== 0 && !u.isNpc) { u.oUnit.exp += gE; while(u.oUnit.exp >= u.oUnit.maxExp) { u.oUnit.exp -= u.oUnit.maxExp; levelUpUnit(u.oUnit); } }});

            currentState = STATE_BATTLE; battleDisplayIndex = 1; isBattlePaused = false; isAutoBattle = true;
            if(battleTimer) clearTimeout(battleTimer); 
            if (isAutoBattle) advanceBattleLog(); else requestAnimationFrame(draw);
        }

        function advanceBattleLog() {
            if(currentState !== STATE_BATTLE || !isAutoBattle || isBattlePaused) return; 
            if(battleDisplayIndex < battleLogs.length) {
                if(battleLogs[battleDisplayIndex].type === 'pause') {
                    battleDisplayIndex++; 
                    needRebuildCache = true;
                    requestAnimationFrame(draw); 
                    battleTimer = setTimeout(advanceBattleLog, 1200); // 停頓 1.2 秒後繼續自動走
}            else {
                    battleDisplayIndex++; needRebuildCache = true; requestAnimationFrame(draw);
                    battleTimer = setTimeout(advanceBattleLog, 350); 
                }
            } else requestAnimationFrame(draw); 
        }

        function drawBtn(x, y, w, h, t, cb, bg=P.bgBtn, tc=P.textMain, fSize=35) {
            let isHighlight = tc === "#ccc" || tc === "#faa" || tc === "#aaf" || tc === P.textMain; 
            if(isHighlight) {
                let grad = ctx.createLinearGradient(x, y, x, y+h);
                grad.addColorStop(0, "#2a201a"); grad.addColorStop(1, "#15100d");
                ctx.fillStyle = grad;
                ctx.strokeStyle = P.border;
            } else {
                ctx.fillStyle = bg; ctx.strokeStyle = P.border;
            }
            if(tc === "#ffc" || tc === "#fd0" || bg.includes("1a1a10")) ctx.strokeStyle = P.borderGold; 
            
            ctx.fillRect(x, y, w, h);
            ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
            
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(x, y, w, 4); 
            ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fillRect(x, y+h-4, w, 4); 

            ctx.fillStyle = (tc === "#ccc" || tc === "#fff" || tc === "#000") ? P.textMain : tc;
            if(tc === "#ffc" || tc === "#fd0" || tc === "#000") ctx.fillStyle = tc === "#000" ? "#000" : P.textTitle;

            ctx.font = `bold ${fSize}px sans-serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; 
            
            ctx.shadowColor = tc === "#000" ? "transparent" : "black"; 
            ctx.shadowBlur = tc === "#000" ? 0 : 4; 
            ctx.shadowOffsetX = tc === "#000" ? 0 : 1; 
            ctx.shadowOffsetY = tc === "#000" ? 0 : 1;
            ctx.fillText(t, x+w/2, y+h/2);
            ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; 

            activeButtons.push({x, y, w, h, cb});
        }

            if(c === "#ffd700") ctx.fillStyle = P.textTitle;
            
            ctx.font = `${w} ${sz}px serif`; 
            ctx.textAlign = align; ctx.textBaseline = "top"; 
            
            ctx.shadowColor = "black"; ctx.shadowBlur = 2;

            ctx.shadowBlur = 0;
        }

                drawBtn(V_WIDTH/2+20, 630, V_WIDTH/2-60, 100, "封印靈魂石", () => { document.getElementById('exportCode').value = btoa(encodeURIComponent(JSON.stringify(packData(gameData)))); document.getElementById('exportOverlay').style.display='flex'; }, P.bgBtn, P.textMain, mainFontSize);

                if(gameData.npcs && gameData.npcs.length > 0) drawBtn(40, 750, V_WIDTH/2-60, 100, "英靈殿堂", () => {rosterPage=0; currentState=STATE_NPC;}, "#151b26", P.textMagic, mainFontSize);
                if(gameData.conquered>=10000) drawBtn(V_WIDTH/2+20, 750, V_WIDTH/2-60, 100, "=== 觀看史詩 ===", ()=>currentState=STATE_ENDING, "#262010", P.textTitle, mainFontSize);

                drawTxt("=== 王國建設 ===", V_WIDTH/2, 870, mainFontSize+1, P.textTitle, "center", "bold");
                FACILITIES.forEach((fac, i) => {
                    let lv = gameData.fac[fac.id] || 0; let cost = fac.baseCost * (lv + 1);
                    let x = i%2===0 ? 40 : V_WIDTH/2 + 20, y = 950 + Math.floor(i/2)*160;
                    drawBtn(x, y, V_WIDTH/2-60, 140, "", () => { 
                        let now = Date.now();
                        if(facClicks.id === fac.id && now - facClicks.time < 2000) facClicks.count++;
                        else { facClicks.id = fac.id; facClicks.count = 1; }
                        facClicks.time = now;

                        if(facClicks.count >= 5) {
                            let cGold = gameData.gold, up = 0, curLv = lv;
                            while(true) { let c = fac.baseCost * (curLv + 1); if(cGold >= c) { cGold -= c; curLv++; up++; } else break; }
                            if(up > 0) { gameData.gold = cGold; gameData.fac[fac.id] = curLv; showSysMsg(MSG.sys.facMax(up)); }
                            else showSysMsg(MSG.sys.emp);
                            facClicks.count = 0; 
                        } else {
                            if(gameData.gold >= cost) { gameData.gold -= cost; gameData.fac[fac.id]++; showSysMsg(MSG.sys.facHit(5-facClicks.count)); } 
                            else showSysMsg(MSG.sys.noGold); 
                        }
                    }, P.bgBtn);
                    drawTxt(`${fac.name} Lv.${lv}`, x+30, y+12, mainFontSize-3, P.textTitle, "left", "bold"); drawTxt(`${fac.desc}+${fac.eff}`, x+30, y+58, mainFontSize-7, P.textMagic); drawTxt(`擴建:${fNum(cost)} G`, x+30, y+98, mainFontSize-7, P.textSub);
                });
            }
            else if(currentState === STATE_ROSTER || currentState === STATE_NPC) {
                if(currentState === STATE_NPC) syncNpcLevels(); 
                let isNpcMode = currentState === STATE_NPC, list = isNpcMode ? gameData.npcs : gameData.army;
                drawTxt(isNpcMode ? "=== 英靈殿堂 ===" : "=== 遠征軍名冊 ===", V_WIDTH/2, 50, mainFontSize+10, P.textTitle, "center", "bold");
                let sIdx = rosterPage * 5, eIdx = Math.min(sIdx+5, list.length);
                for(let i=sIdx; i<eIdx; i++) {
                    let u = list[i], fs = getFinalStats(u), y = 140 + (i-sIdx)*230, reqLv = u.tier===0?10 : u.tier===1?25 : u.tier===2?35 : 999, canPro = !isNpcMode && u.level >= reqLv && u.tier < 3;
                    
                    ctx.fillStyle = "rgba(13, 10, 8, 0.7)"; ctx.fillRect(50,y,V_WIDTH-100,210);
                    ctx.strokeStyle = canPro ? P.borderGold : P.border; ctx.lineWidth = canPro ? 3 : 2; ctx.strokeRect(50,y,V_WIDTH-100,210);

                    drawBtn(50, y, V_WIDTH-100, 210, "", () => { selectedUnitIndex=i; isSelectingSibling=false; currentState = isNpcMode ? STATE_NPC_UNIT : STATE_UNIT; }, "transparent", canPro?P.textTitle:"#111"); 
                    drawTxt(`Lv.${u.level} ${getDispName(u)}`, 80, y+20, mainFontSize+5, canPro?P.textTitle:P.textMain, "left", "bold");
                    drawTxt(`HP:${fNum(fs.maxHp)} 攻:${fNum(fs.atk)} 防:${fNum(fs.def)} 速:${fNum(fs.spd)}`, 80, y+80, mainFontSize-3, P.textSub); 
                    if(isNpcMode) drawTxt(`陣營:${u.faction} (能力隨軍隊同步成長)`, 80, y+130, mainFontSize-3, P.textSub);
                    else drawTxt(`Exp:${fNum(u.exp)}/${fNum(u.maxExp)} 陣營:${u.faction}`, 80, y+130, mainFontSize-3, P.textSub);
                    if(canPro) drawTxt("* 準備晉升 *", V_WIDTH-250, y+70, mainFontSize+5, P.textHeal, "left", "bold");
                }
                if(rosterPage>0) drawBtn(50, 1320, 300, 100, "< 翻頁", () => rosterPage--, P.bgBtn, P.textMain, mainFontSize); if(eIdx<list.length) drawBtn(V_WIDTH-350, 1320, 300, 100, "翻頁 >", () => rosterPage++, P.bgBtn, P.textMain, mainFontSize);
                drawBtn(V_WIDTH/2-200, 1460, 400, 100, "返回營地", ()=>currentState=STATE_MAIN, P.bgBtn, P.textTitle, mainFontSize);
            }
            else if(currentState === STATE_UNIT || currentState === STATE_NPC_UNIT) {
                if(currentState === STATE_NPC_UNIT) syncNpcLevels(); 
                let isNpcMode = currentState === STATE_NPC_UNIT, u = isNpcMode ? gameData.npcs[selectedUnitIndex] : gameData.army[selectedUnitIndex], fs = getFinalStats(u);
                drawTxt(isNpcMode ? "=== 英靈靈魂石 ===" : "=== 英雄卷宗 ===", V_WIDTH/2, 60, mainFontSize+15, P.textTitle, "center", "bold");
                
                ctx.fillStyle="rgba(20, 15, 12, 0.8)"; ctx.fillRect(50,130,V_WIDTH-100,340);
                ctx.strokeStyle=P.border; ctx.lineWidth=2; ctx.strokeRect(50,130,V_WIDTH-100,340);

                drawTxt(`真名：${getDispName(u)}`, 100, 150, mainFontSize+10, P.textTitle, "left", "bold"); 
                
                if(isNpcMode) drawTxt(`境界：Lv.${u.level} (能力隨軍隊同步成長)`, 100, 215, mainFontSize, P.textMain);
                else drawTxt(`境界：Lv.${u.level} (${fNum(u.exp)}/${fNum(u.maxExp)})`, 100, 215, mainFontSize, P.textMain);
                
                drawTxt(`HP:${fNum(fs.maxHp)} 攻:${fNum(fs.atk)} 防:${fNum(fs.def)} 速:${fNum(fs.spd)} (含建設)`, 100, 275, mainFontSize-3, P.textMain); drawTxt(`奧義：${u.skills.map(s=>s.n).join(", ")}`, 100, 335, mainFontSize-3, P.textMagic);
                
                let tNames = {"potion":"[藥水]","guard":"[格擋]","pierce":"[破甲]","heal":"[治癒]","protect":"[掩護]","buff_s":"[戰吼]","berserk":"[狂化]","aoe":"[掃蕩]","stun":"[束縛]","combo":"[連擊]","heal_all":"[神聖力場]","buff_b":"[王者祝福]","crit":"[致命]","holy":"[神之庇護]","evil":"[淬毒]","neutral":"[淨化之風]", "vampire":"[血之虹吸]"};
                drawTxt(`血脈特質：${u.traits.map(t=>tNames[t]||"").join(" ")}`, 100, 400, mainFontSize-5, P.textTitle);

                if(isNpcMode) {
                    drawBtn(V_WIDTH/2-200, 480, 400, 100, "賜予真名", () => { document.getElementById('unitNameOverlay').style.display='flex'; document.getElementById('unitCustomName').value = u.customName; }, P.bgBtn, P.textMagic, mainFontSize);
                } else {
                    if (isSelectingSibling) {
                        drawTxt("= 選擇轉化之途 =", V_WIDTH/2, 500, mainFontSize+5, P.textTitle, "center"); let cost = u.tier * 500;
                        SIBLINGS[u.className].filter(s => s !== u.className).forEach((nc, i) => {
                            drawBtn(100, 580+i*130, V_WIDTH-200, 100, `轉化為：${nc}`, () => { if(gameData.gold >= cost) { gameData.gold -= cost; swapSiblingClass(u, nc); isSelectingSibling = false; showSysMsg(MSG.sys.trans(nc)); } else showSysMsg(MSG.sys.noGold); }, P.bgBtn, P.textTitle, mainFontSize);
                        });
                        drawBtn(V_WIDTH/2-200, 1000, 400, 100, "中斷儀式", () => isSelectingSibling=false, P.bgBtn, P.textSub, mainFontSize);
                    } else {
                        drawBtn(100, 480, 260, 100, "苦修 500G", () => { if(gameData.gold >= 500) { gameData.gold-=500; u.exp+=200; while(u.exp>=u.maxExp) { u.exp-=u.maxExp; levelUpUnit(u); } showSysMsg(MSG.sys.exp(200)); } else showSysMsg(MSG.sys.noGold); }, P.bgBtn, P.textMain, mainFontSize - 7);
                        if(u.tier > 0) drawBtn(380, 480, 300, 100, `轉化 ${fNum(u.tier*500)}G`, () => isSelectingSibling = true, P.bgBtn, P.textMain, mainFontSize - 7);
                        drawBtn(700, 480, 280, 100, "賜名", () => { document.getElementById('unitNameOverlay').style.display='flex'; document.getElementById('unitCustomName').value = u.customName; }, P.bgBtn, P.textMagic, mainFontSize);

                        let reqLv = u.tier===0?10 : u.tier===1?25 : u.tier===2?35 : 999;
                        if(u.level>=reqLv && CLASS_DB[u.className].next.length>0) {
                            drawTxt("= 晉升之門已啟 =", V_WIDTH/2, 630, mainFontSize+5, P.textTitle, "center");
                            CLASS_DB[u.className].next.forEach((nc, i) => { drawBtn(100, 690+i*120, V_WIDTH-200, 100, `晉升為：${nc}`, () => { changeClass(u, nc); currentState=STATE_ROSTER; showSysMsg(MSG.sys.proOk); }, P.bgBtn, P.textHeal, mainFontSize); });
                        } else drawTxt(reqLv===999?"(已達傳奇之境)":`(晉升需要 境界 ${reqLv})`, V_WIDTH/2, 680, mainFontSize+5, P.textSub, "center");
                        
                        drawBtn(100, 1320, 400, 100, "散盡修為 5千G", () => { 
                            if(gameData.gold >= 5000) { gameData.gold-=5000; changeClass(u, "冒險者"); showSysMsg(MSG.sys.rst); } else showSysMsg(MSG.sys.noGold);
                        }, "#2a1a1a", P.textSub, mainFontSize - 7);
                        drawBtn(580, 1320, 400, 100, `告老還鄉得 ${fNum(u.level*100)}G`, () => { document.getElementById('retireOverlay').style.display='flex'; }, "#3a1c1c", P.textWarn, mainFontSize - 7);
                    }
                }
                drawBtn(V_WIDTH/2-200, 1460, 400, 100, "闔上卷宗", ()=> { isSelectingSibling=false; currentState = isNpcMode ? STATE_NPC : STATE_ROSTER; }, P.bgBtn, P.textMain, mainFontSize);
            }
            else if(currentState === STATE_BATTLE) {
                if(needRebuildCache) buildDisplayCache();
                
                let aliveP = battleInfo.pStart, aliveE = battleInfo.eStart;
                for(let i=0; i<battleDisplayIndex; i++) { 
                    if(battleLogs[i].type === 'text') { 
                        if(battleLogs[i].short.startsWith(`  ${TAG.DIE} ${TAG.P}`)) aliveP--; 
                        else if(battleLogs[i].short.startsWith(`  ${TAG.DIE} ${TAG.E}`)) aliveE--; 
                        else if(battleLogs[i].short.startsWith(`  ${TAG.JOIN} ${TAG.P}`)) aliveP++; 
                    }
                }

                drawTxt("= 戰場卷宗 =", 50, 45, mainFontSize + 10, P.textSub, "left", "bold");
                drawTxt(`我軍: ${aliveP}   |   敵軍: ${aliveE}`, 380, 50, mainFontSize, P.textTitle, "left", "bold");

                ctx.fillStyle = "rgba(10, 8, 5, 0.5)"; ctx.fillRect(20, 130, V_WIDTH-40, 1220);
                
                let lineH = battleFontSize * 1.5, listStartY = 160, maxVisible = Math.floor(1150 / lineH); 
                let maxScroll = Math.max(0, displayLinesCache.length - maxVisible);
                if(isAutoScrolling) scrollOffset = maxScroll; else scrollOffset = Math.max(0, Math.min(scrollOffset, maxScroll));
                
                let sLine = Math.floor(scrollOffset), eLine = Math.min(displayLinesCache.length, sLine + maxVisible + 1);
                for(let i=sLine; i<eLine; i++) { drawTxt(displayLinesCache[i].t, 50, listStartY + (i - scrollOffset)*lineH, battleFontSize, displayLinesCache[i].c); }

                drawBtn(50, 1400, 180, 100, isDetailedLog ? "戰報" : "史詩", () => { isDetailedLog = !isDetailedLog; needRebuildCache = true; isAutoScrolling = true; requestAnimationFrame(draw); }, P.bgBtn, P.textMain, mainFontSize);
                
                drawBtn(250, 1400, 220, 100, isAutoBattle ? "自動(開)" : "自動(關)", () => { 
                    isAutoBattle = !isAutoBattle; 
                    if(isAutoBattle) {
                        isAutoScrolling = true;
                        if(!isBattlePaused) advanceBattleLog(); 
                    }
                    requestAnimationFrame(draw); 
                }, isAutoBattle ? P.textTitle : P.bgBtn, isAutoBattle ? "#000" : P.textMain, mainFontSize);

                if(battleDisplayIndex >= battleLogs.length) {
                    drawBtn(V_WIDTH-450, 1400, 400, 100, "清點戰果", ()=>currentState=STATE_MAIN, P.bgBtn, P.textTitle, mainFontSize);
                } else if(isBattlePaused) {
                    drawBtn(V_WIDTH-450, 1400, 400, 100, "繼續衝鋒", () => { 
                        isBattlePaused = false; 
                        isAutoScrolling = true; 
                        if(isAutoBattle) advanceBattleLog(); 
                        requestAnimationFrame(draw); 
                    }, "#1a2a1a", P.textHeal, mainFontSize);
                } else {
                    drawBtn(V_WIDTH-450, 1400, 400, 100, "略過本關", () => {
                        if(battleTimer) clearTimeout(battleTimer);
                        isAutoBattle = false;
                        while(battleDisplayIndex < battleLogs.length && battleLogs[battleDisplayIndex].type !== "pause") battleDisplayIndex++;
                        if(battleDisplayIndex < battleLogs.length && battleLogs[battleDisplayIndex].type === "pause") {
                            isBattlePaused = true;
                            battleDisplayIndex++;
                        }
                        needRebuildCache = true; isAutoScrolling = true; requestAnimationFrame(draw);
                    }, P.bgBtn, P.textSub, mainFontSize);

                    if (!isAutoBattle) {
                        drawTxt("- 點擊畫面任意處繼續 -", V_WIDTH/2, 1370, mainFontSize - 11, P.textHeal, "center");
                    }
                }
            }
            else if(currentState === STATE_ENDING) {
                drawTxt("*** 萬王之王 ***", V_WIDTH/2, 400, mainFontSize * 2 + 10, P.textTitle, "center", "bold"); 
                drawTxt("天下一統，四海昇平。", V_WIDTH/2, 600, mainFontSize + 10, P.textMain, "center");
                drawBtn(V_WIDTH/2-200, 1200, 400, 100, "銘記歷史", ()=>currentState=STATE_MAIN, P.bgBtn, P.textTitle, mainFontSize);
            }

            // 全域字體縮放按鈕
            drawBtn(V_WIDTH - 260, 25, 100, 80, "字+", () => { 
                if(currentState === STATE_BATTLE) battleFontSize = Math.min(60, battleFontSize+4); 
                else mainFontSize = Math.min(50, mainFontSize+2); 
                needRebuildCache = true; requestAnimationFrame(draw); 
            }, P.bgBtn, P.textMain, 32);
            
            drawBtn(V_WIDTH - 140, 25, 100, 80, "字-", () => { 
                if(currentState === STATE_BATTLE) battleFontSize = Math.max(20, battleFontSize-4); 
                else mainFontSize = Math.max(20, mainFontSize-2); 
                needRebuildCache = true; requestAnimationFrame(draw); 
            }, P.bgBtn, P.textMain, 32);

            // 底部浮水印 (保留絕對安全區，不佔用版面)
            drawTxt("Inspired by MUD KK", V_WIDTH/2, V_HEIGHT - 60, 24, "#4a3c31", "center", "bold");

            if(sysMsg) { 
                ctx.fillStyle = "rgba(10,8,5,0.9)"; ctx.fillRect(0, V_HEIGHT/2-80, V_WIDTH, 160); 
                ctx.strokeStyle=P.borderGold; ctx.lineWidth=3; ctx.strokeRect(0, V_HEIGHT/2-80, V_WIDTH, 160); 
                drawTxt(sysMsg, V_WIDTH/2, V_HEIGHT/2-25, 50, P.textHeal, "center", "bold"); 
            }
        }

        // ==========================================
        // 互動綁定：極致防護 (原生 Click + TouchStart)
        // ==========================================
        function handleInput(cx, cy) {
            if(sysMsg) return true; 
            let r = canvas.getBoundingClientRect(), x = (cx - r.left) * (V_WIDTH / r.width), y = (cy - r.top) * (V_HEIGHT / r.height);
            for(let i=activeButtons.length-1; i>=0; i--) { let b = activeButtons[i]; if(x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h) { b.cb(); requestAnimationFrame(draw); return true; } }
            return false;
        }
        
        canvas.addEventListener('pointerdown', e => { 
            if(Date.now() - lastInputTime < 150) return; lastInputTime = Date.now();
            let hitBtn = handleInput(e.clientX, e.clientY); 
            dragDelta = 0;
            if(!hitBtn && currentState === STATE_BATTLE) { isDragging = true; dragStartY = e.clientY; }
        });
        canvas.addEventListener('pointermove', e => {
            if(isDragging && currentState === STATE_BATTLE) {
                let r = canvas.getBoundingClientRect(), deltaY = (e.clientY - dragStartY) * (V_HEIGHT / r.height);
                dragDelta += Math.abs(deltaY);
                let canScroll = battleDisplayIndex >= battleLogs.length || !isAutoBattle || isBattlePaused;
                if(canScroll) {
                    scrollOffset -= (deltaY / (battleFontSize * 1.5)); dragStartY = e.clientY; isAutoScrolling = false; requestAnimationFrame(draw);
                }
            }
        });
        canvas.addEventListener('pointerup', e => { 
            if (currentState === STATE_BATTLE && isDragging && dragDelta < 10 && !isAutoBattle && battleDisplayIndex < battleLogs.length && !isBattlePaused) {
                battleDisplayIndex++;
                if(battleDisplayIndex < battleLogs.length && battleLogs[battleDisplayIndex].type === 'pause') {
                    isBattlePaused = true;
                    battleDisplayIndex++;
                }
                needRebuildCache = true;
                isAutoScrolling = true;
                requestAnimationFrame(draw);
            }
            isDragging = false; 
        });
        canvas.addEventListener('pointerleave', () => isDragging = false);
        
        function bindOverlayBtn(id, cb, isCopy = false) {
            let el = document.getElementById(id); if(!el) return;
            if (isCopy) {
                el.addEventListener('click', cb); 
            } else {
                let triggered = false;
                let execute = (e) => {
                    if (e.type !== 'click') e.preventDefault(); 
                    if (triggered) return;
                    triggered = true; setTimeout(() => triggered = false, 400); 
                    document.querySelectorAll('input, textarea').forEach(i=>i.blur()); 
                    cb();
                };
                el.addEventListener('touchstart', execute, {passive: false});
                el.addEventListener('mousedown', execute); 
            }
        }

        bindOverlayBtn('btnConfirmName', () => {
            gameData = { name: document.getElementById('countryName').value.trim() || "無名之國", gold: 1000, conquered: 0, streak: 0, dungeonFloor: 1, army: [createUnit("冒險者"),createUnit("冒險者"),createUnit("冒險者")], npcs: [], allCountries: [], defeatedCountries: [], fac: {hp:0, wAtk:0, mAtk:0, pAtk:0, def:0, spd:0} };
            document.getElementById('nameInputOverlay').style.display = 'none'; currentState = STATE_MAIN; requestAnimationFrame(draw);
        });
        bindOverlayBtn('btnConfirmRename', () => {
            gameData.name = document.getElementById('newCountryName').value.trim() || gameData.name;
            document.getElementById('renameKingdomOverlay').style.display = 'none'; showSysMsg(MSG.sys.rnOk);
        });
        bindOverlayBtn('btnCancelRename', () => document.getElementById('renameKingdomOverlay').style.display = 'none');
        bindOverlayBtn('btnConfirmUnitName', () => {
            if(selectedUnitIndex !== -1) { 
                if(currentState === STATE_NPC_UNIT) gameData.npcs[selectedUnitIndex].customName = document.getElementById('unitCustomName').value.trim();
                else gameData.army[selectedUnitIndex].customName = document.getElementById('unitCustomName').value.trim(); 
                showSysMsg(MSG.sys.nmOk); 
            }
            document.getElementById('unitNameOverlay').style.display = 'none'; requestAnimationFrame(draw);
        });
        bindOverlayBtn('btnCancelUnitName', () => document.getElementById('unitNameOverlay').style.display = 'none');
        bindOverlayBtn('btnCancelAuthor', () => document.getElementById('authorOverlay').style.display = 'none');
        
        bindOverlayBtn('btnCopyExport', () => {
            let ta = document.getElementById('exportCode'); ta.select(); document.execCommand('copy');
            showSysMsg(MSG.sys.cpOk); document.getElementById('exportOverlay').style.display = 'none';
        }, true);
        
        bindOverlayBtn('btnCancelExport', () => document.getElementById('exportOverlay').style.display = 'none');
        
        bindOverlayBtn('btnConfirmImport', () => {
            try {
                let code = document.getElementById('importCode').value.trim(); if(!code) return;
                let parsed = JSON.parse(decodeURIComponent(atob(code)));
                if(unpackData(parsed)) { document.getElementById('importOverlay').style.display = 'none'; currentState = STATE_MAIN; showSysMsg(MSG.sys.impOk); requestAnimationFrame(draw); } 
                else throw new Error();
            } catch(e) { alert(MSG.sys.ldFail); }
        });
        bindOverlayBtn('btnCancelImport', () => document.getElementById('importOverlay').style.display = 'none');

        bindOverlayBtn('btnConfirmRetire', () => {
            let u = gameData.army[selectedUnitIndex]; let earn = u.level * 100;
            gameData.gold += earn; gameData.army.splice(selectedUnitIndex, 1);
            document.getElementById('retireOverlay').style.display = 'none'; currentState = STATE_ROSTER;
            showSysMsg(MSG.sys.retire(fNum(earn))); requestAnimationFrame(draw);
        });
        bindOverlayBtn('btnCancelRetire', () => document.getElementById('retireOverlay').style.display = 'none');

        document.fonts.ready.then(() => requestAnimationFrame(draw)); window.addEventListener('resize', () => requestAnimationFrame(draw));
    </script>
