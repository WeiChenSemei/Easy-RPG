<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萬王之王 - 無盡國戰版</title>
    <style>
       // body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; font-family: monospace, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        html { width: 100%; height: 100%; background-color: #1a1a1a; }
        body { margin: 0 auto; padding: 0; width: 100%; height: 100%; max-width: 600px; background-color: #000; font-family: monospace, sans-serif; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.8); position: relative; }
        #gameContainer { width: 100%; height: 100%; position: relative; background-color: #050505; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; user-select: none; -webkit-user-select: none; }
        #safeArea { width: 100%; height: 15%; background-color: #000; border-top: 2px solid #333; display: flex; align-items: center; justify-content: center; color: #444; font-size: 14px; letter-spacing: 2px; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .overlay input { padding: 15px; font-size: 24px; width: 70%; text-align: center; border: 2px solid #d4af37; background: #111; color: #fff; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .overlay textarea { width: 80%; height: 200px; padding: 15px; font-size: 16px; background: #111; color: #fff; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 20px; outline: none; word-break: break-all; resize: none; }
        .overlay button { padding: 15px 40px; font-size: 24px; background: #ccc; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-row { display: flex; gap: 20px; }
        .author-text { color: #ccc; font-size: 26px; width: 80%; text-align: center; line-height: 1.8; margin-bottom: 40px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" oncontextmenu="return false;"></canvas>
        
        <div id="nameInputOverlay" class="overlay">
            <h2 style="color:#d4af37; margin-bottom:30px;">[ 建立你的國家 ]</h2>
            <input type="text" id="countryName" placeholder="例如：白銀王國" maxlength="10" autocomplete="off" spellcheck="false" />
            <button id="btnConfirmName">登基為王</button>
        </div>
        <div id="unitNameOverlay" class="overlay">
            <h2 style="color:#aaf; margin-bottom:30px;">[ 賜予英雄姓名 ]</h2>
            <input type="text" id="unitCustomName" placeholder="例如：阿瑞斯" maxlength="8" autocomplete="off" spellcheck="false" />
            <div class="btn-row">
                <button id="btnConfirmUnitName">確認賜名</button>
                <button id="btnCancelUnitName" style="background:#555;color:#ccc;">取消</button>
            </div>
        </div>
        <div id="retireOverlay" class="overlay">
            <h2 style="color:#f55; margin-bottom:30px;">[ 退休確認 ]</h2>
            <div style="color:#aaa; font-size:24px; margin-bottom:40px; text-align:center;">該角色將會永久離隊。<br>是否確定？</div>
            <div class="btn-row">
                <button id="btnConfirmRetire" style="background:#a33;color:#fff;">是 (確認)</button>
                <button id="btnCancelRetire" style="background:#555;color:#ccc;">否 (取消)</button>
            </div>
        </div>
        <div id="authorOverlay" class="overlay">
            <h2 style="color:#aaf; margin-bottom:30px;">[ 關於本作 ]</h2>
            <div class="author-text">
                本遊戲的創意發想來自MUD萬王之王（KK），<br>感謝 Ruby 與 Onyx 兩位大神<br>創造了美好的異世界，<br>本作只供娛樂、學習、回憶用，<br>不作任何牟利用途。
            </div>
            <button id="btnCancelAuthor" style="background:#555;color:#ccc;">關閉</button>
        </div>
        <div id="exportOverlay" class="overlay">
            <h2 style="color:#d4af37; margin-bottom:15px;">[ 匯出繼承碼 ]</h2>
            <div style="color:#aaa; font-size:18px; margin-bottom:15px;">請複製並妥善保存以下代碼：</div>
            <textarea id="exportCode" readonly style="border-color:#d4af37;"></textarea>
            <div class="btn-row"><button id="btnCopyExport">複製代碼</button><button id="btnCancelExport" style="background:#555;color:#ccc;">關閉</button></div>
        </div>
        <div id="importOverlay" class="overlay">
            <h2 style="color:#aaf; margin-bottom:15px;">[ 匯入繼承碼 ]</h2>
            <div style="color:#aaa; font-size:18px; margin-bottom:15px;">請貼上您的繼承碼以恢復進度：</div>
            <textarea id="importCode" placeholder="貼上代碼..."></textarea>
            <div class="btn-row"><button id="btnConfirmImport">確認匯入</button><button id="btnCancelImport" style="background:#555;color:#ccc;">取消</button></div>
        </div>
    </div>
   <div id="safeArea">Inspired by MUD KK</div>

        function showSysMsg(msg) {
            sysMsg = msg; if(sysMsgTimer) clearTimeout(sysMsgTimer);

        }

        function fNum(n) { 
            if(n >= 1e12) return (n/1e12).toFixed(1).replace(/\.0$/,'') + 'T';
            if(n >= 1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'') + 'B';
            if(n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
            if(n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
            return Math.floor(n).toString();
        }

            ["冒險者",0,"無","無","戰士,魔法師,牧師",100,10,5,5],
            ["戰士",1,"戰士","無","騎士,遊俠,狂戰士",200,25,15,10], ["魔法師",1,"法師","無","巫術士,魔劍士,咒術師",120,35,5,8], ["牧師",1,"牧師","無","賢者,神官,祭司",150,15,10,6],

        const NPC_DB = {

        const CLASS_DB = {}, SIBLINGS = {}; 
        RAW_CLASSES.forEach(c => { CLASS_DB[c[0]] = { name:c[0], tier:c[1], type:c[2], faction:c[3], next:c[4]?c[4].split(','):[], hp:c[5], atk:c[6], def:c[7], spd:c[8] }; });

        SIBLINGS["戰士"] = SIBLINGS["魔法師"] = SIBLINGS["牧師"] = ["戰士", "魔法師", "牧師"];

        let gameData = { name: "", gold: 1000, conquered: 0, streak: 0, dungeonFloor: 1, army: [], npcs: [], allCountries: [], defeatedCountries: [], fac: {hp:0, wAtk:0, mAtk:0, pAtk:0, def:0, spd:0} };
        let rosterPage = 0, selectedUnitIndex = -1, battleLogs = [], battleDisplayIndex = 0, currentEnemyName = "";

        // ==========================================
        // 核心存檔優化與數值公式化系統 (防通膨)
        // ==========================================
        function packData(d) {
            return {
                name: d.name, gold: d.gold, conquered: d.conquered, streak: d.streak, dungeonFloor: d.dungeonFloor, fac: d.fac,
                army: d.army.map(u => ({ cN: u.className, n: u.customName, lv: u.level, e: u.exp })),
                npcs: d.npcs.map(u => ({ o: u.oName, c: u.customName }))
            };
        }
        function unpackData(p) {
            if(!p) return false;
            let restoreUnit = (u) => {
                let nu = createUnit(u.className || u.cN, u.level || u.lv);
                nu.customName = u.customName || u.n || ""; nu.exp = u.exp || u.e || 0; return nu;
            };
            let army = (p.army||[]).map(restoreUnit);
            let dFloor = p.dungeonFloor || 1;
            let maxArmyLv = army.length > 0 ? Math.max(...army.map(a => a.level)) : 1;
            let targetLevel = maxArmyLv + Math.floor(dFloor / 5);

            gameData = {
                name: p.name || "無名", gold: p.gold || 0, conquered: p.conquered || 0, streak: p.streak || 0, 
                dungeonFloor: dFloor, fac: p.fac || {hp:0, wAtk:0, mAtk:0, pAtk:0, def:0, spd:0}, army: army, 
                npcs: (p.npcs||[]).map(u => {
                    let oN = u.o || u.oN || u.oName; let cN = u.c || u.customName || u.n;
                    let nInfo = Object.values(NPC_DB).find(x => x.n === oN);
                    let nu = createUnit(nInfo ? nInfo.c : (u.cN || "冒險者"), targetLevel);
                    nu.oName = oN; nu.customName = cN || oN; return nu;

        function calcStats(cName, lv) {
            let b = CLASS_DB[cName];
            return {
                hp: b.hp + (lv - 1) * Math.floor(b.hp * 0.1),
                atk: b.atk + (lv - 1) * Math.floor(b.atk * 0.1),
                def: b.def + (lv - 1) * Math.floor(b.def * 0.1),
                spd: b.spd + (lv - 1) * Math.floor(b.spd * 0.05),
                exp: Math.floor(100 * Math.pow(lv, 1.2) * (b.tier + 1))
            };
        }

        function syncNpcLevels() {
            if(!gameData.npcs || gameData.npcs.length === 0) return;
            let maxArmyLv = gameData.army.length > 0 ? Math.max(...gameData.army.map(a => a.level)) : 1;
            let targetLevel = maxArmyLv + Math.floor(gameData.dungeonFloor / 5);
            gameData.npcs.forEach(npc => {
                if(npc.level !== targetLevel) {
                    let nInfo = Object.values(NPC_DB).find(x => x.n === npc.oName);
                    let nu = createUnit(nInfo ? nInfo.c : npc.className, targetLevel);
                    Object.assign(npc, nu, { oName: npc.oName, customName: npc.customName });
                }
            });
        }

        function updateTraits(u) {
            u.traits = ['potion'];
            if(u.tier>=1) u.traits.push(u.type==='戰士'?'guard':u.type==='法師'?'pierce':'heal');
            if(u.tier>=2) {
                let m = {"騎士":"protect","遊俠":"buff_s","狂戰士":"berserk","巫術士":"aoe","咒術師":"stun","魔劍士":"combo","賢者":"heal_all","神官":"buff_b","祭司":"crit"};
                let t2 = m[u.className];
                if(!t2) { let pool = u.type==='戰士'?['protect','buff_s','berserk']:u.type==='法師'?['aoe','stun','combo']:['heal_all','buff_b','crit']; t2 = pool[Math.abs(u.className.charCodeAt(0))%3]; }
                u.traits.push(t2);
            }
            if(u.tier>=3) {
                if(u.className.includes('妖') || u.className.includes('魔')) u.traits.push('vampire');
                else u.traits.push(u.faction==='神聖'?'holy':u.faction==='邪惡'?'evil':'neutral');
            }
        }

                     atk: u.atk + (u.type==='戰士'?f.wAtk*5 : u.type==='法師'?f.mAtk*5 : u.type==='牧師'?f.pAtk*5 : 0),

        }

        function createUnit(cName, level = 1) {
            let b = CLASS_DB[cName], s = calcStats(cName, level);
            let u = { customName: "", className: b.name, tier: b.tier, type: b.type, faction: b.faction, level: level, exp: 0, maxExp: s.exp, hp: s.hp, maxHp: s.hp, atk: s.atk, def: s.def, spd: s.spd, skills: getSkillsForClass(b.name, b.tier) };

        function levelUpUnit(u) {

            u.maxExp = s.exp; u.maxHp = s.hp; u.atk = s.atk; u.def = s.def; u.spd = s.spd; u.hp = u.maxHp;

        function changeClass(u, nName) {

            u.exp = 0; 
            Object.assign(u, {className: b.name, tier: b.tier, type: b.type, faction: b.faction});
            let s = calcStats(b.name, u.level);
            u.maxExp = s.exp; u.maxHp = s.hp; u.atk = s.atk; u.def = s.def; u.spd = s.spd; u.hp = u.maxHp;
            u.skills = getSkillsForClass(b.name, b.tier); updateTraits(u);
        }

        function swapSiblingClass(u, nName) { 
            let b = CLASS_DB[nName]; Object.assign(u, {className: b.name, type: b.type, faction: b.faction}); 
            let s = calcStats(b.name, u.level);
            u.maxHp = s.hp; u.atk = s.atk; u.def = s.def; u.spd = s.spd; u.hp = Math.min(u.hp, u.maxHp);

        }

                            else if(u.type === "法師") acts = ["雙手結印，引動周圍元素湧動，施放", "口中唸誦古老咒語，虛空中凝聚出", "法杖直指蒼穹，牽引天地魔力爆發出"];
                            else if(u.type === "戰士") acts = ["怒吼一聲，以雷霆萬鈞之勢劈出", "身形如電，帶著破空之聲剛猛使出", "大步踏前，地面為之震顫，狂暴揮出"];
                            else if(u.type === "牧師") acts = ["雙手合十，祈求神明庇護，隨即降下", "吟唱著古老讚美詩，將精神力化為", "目光如炬，以無可動搖的信仰之力驅動"];
                            else acts = ["身形一閃，出其不意地施展出", "深吸一口氣，凝聚全身力量使出", "眼神一凝，動作行雲流水般施展"];
                            let actMsg = acts[Math.floor(Math.random() * acts.length)];
                            let logC = u.isP ? "#5af" : "#f55";
                            
                            let sLog = `${px}${dn} ${isCombo?"[連擊]":isAoeFlag?"[全體]":""}${aTagsS} ${sk.n} -> ${pxTgt}${getDispName(rTgt)} ${dTags}-${fNum(dmg)}`;
                            let dLog = `${px}${dn} ${isCombo?"追加":"趁勢"}${actMsg}「${sk.n}」，對 ${pxTgt}${getDispName(rTgt)} 造成了${dLvl}！${(aTagsD||dTags)?`(${aTagsD}${dTags})`:""}`;
                            
                            pushLog(sLog, logC, dLog);

                            if(rTgt.curHp<=0) { pushLog(`  *陣亡* ${pxTgt}${getDispName(rTgt)} 倒下了！`, "#ff5"); if(u.isP) totalKills++; }
                            else if(rTgt.traits.includes('neutral') && Math.random()<0.25 && rTgt.curHp>0) {
                                let cDmg = Math.floor(rTgt.atk*0.8); u.curHp -= cDmg;
                                pushLog(`  ${pxTgt}${getDispName(rTgt)} [反擊] -> ${dn} -${fNum(cDmg)}`, "#fd5", `  ${pxTgt}${getDispName(rTgt)} 抓準破綻，凌厲地反擊了 ${dn}！`);
                                if(u.curHp<=0) { pushLog(`  *陣亡* ${px}${dn} 倒下了！`, "#ff5"); if(!u.isP) totalKills++; }
                            }
                        };

                        tgts.forEach(tg => doHit(tg, false, isAoeHit));
                        if(has('combo') && !isAoeHit && tgtPool[0].curHp>0 && u.curHp>0) doHit(tgtPool[0], true, false);
                    } turn++;
                }
                if(!pPool.some(u=>u.curHp>0 && u.curHp!==-999)) { pushLog(`[全滅] 我方全滅，部隊潰退...`, "#f55"); break; } 
                else { pushLog(`>>> 突破了 ${sNames[step]}！`, "#5f5"); if(step < 4) battleLogs.push({type:'pause'}); }
            }

            isWin = pPool.some(u=>u.curHp>0 && u.curHp!==-999); pushLog(``); pushLog(`=== 戰役結算 ===`, "#fff");
            let gG = 0, gE = 0;
            if(type === 'siege') {
                gG = totalKills * 50; gE = totalKills * 80;
                if(isWin) { gG += gameData.conquered*20 + 200; gE += gameData.conquered*30 + 100; pushLog(`[大勝] 攻城勝利！`, "#5f5"); gameData.conquered++; gameData.streak++; } 
                else { pushLog(`[敗北] 攻城失敗...連勝中斷。`, "#f55"); gameData.streak = 0; }
            } else {
                gG = totalKills * 15; gE = Math.floor(totalKills * 50 * Math.max(1, Math.floor(Math.sqrt(gameData.dungeonFloor))));
                if(isWin) { 
                    gG += 500 * gameData.dungeonFloor; 
                    gE += 500 * gameData.dungeonFloor; 
                    pushLog(`[突破] 成功清理了地下城！`, "#a5f"); 
                    let f = gameData.dungeonFloor;
                    if(f % 10 === 0 && NPC_DB[f] && !gameData.npcs.find(x => x.oName === NPC_DB[f].n)) {
                        let nInfo = NPC_DB[f], newNpc = createUnit(nInfo.c, f);
                        newNpc.oName = nInfo.n; newNpc.customName = nInfo.n;
                        gameData.npcs.push(newNpc);
                        pushLog(`[奇遇] 救出了被困的英雄：${nInfo.n}！`, "#d4af37", `[史詩] 擊敗領主後，你在深處解救了英雄「${nInfo.n}」！他已加入殿堂。`);
                    }
                    gameData.dungeonFloor++; 
                } else pushLog(`[敗北] 探索失敗，退回營地。`, "#f55");
            }
            
            pushLog(`* 總擊殺：${fNum(totalKills)}`); pushLog(`$ 獲得資金：${fNum(gG)} 金幣`); pushLog(`+ 獲得經驗：${fNum(gE)} EXP`);
            gameData.gold += gG; 
            pPool.forEach(u => { if(u.curHp !== 0 && !u.isNpc) { u.oUnit.exp += gE; while(u.oUnit.exp >= u.oUnit.maxExp) { u.oUnit.exp -= u.oUnit.maxExp; levelUpUnit(u.oUnit); } }});

            currentState = STATE_BATTLE; battleDisplayIndex = 0; isBattlePaused = false;
            if(gameData.conquered >= 10000) setTimeout(() => currentState = STATE_ENDING, 4000); 
            if(battleTimer) clearTimeout(battleTimer); advanceBattleLog(); 
        }

        function advanceBattleLog() {
            if(currentState !== STATE_BATTLE || isBattlePaused) return; 
            if(battleDisplayIndex < battleLogs.length) {
                if(battleLogs[battleDisplayIndex].type === 'pause') {
                    isBattlePaused = true; battleDisplayIndex++; requestAnimationFrame(draw); 
                } else {
                    battleDisplayIndex++; needRebuildCache = true; requestAnimationFrame(draw);
                    battleTimer = setTimeout(advanceBattleLog, 350); 
                }
            } else requestAnimationFrame(draw); 
        }

            }
            else if(currentState === STATE_ENDING) {
                drawTxt("*** 萬王之王 ***", V_WIDTH/2, 400, 80, "#d4af37", "center", "bold"); 
                drawTxt("天下一統，四海昇平。", V_WIDTH/2, 600, 45, "#fff", "center");
                drawBtn(V_WIDTH/2-200, 1200, 400, 100, "[ 回主選單 ]", ()=>currentState=STATE_MAIN);
            }

            if(sysMsg) { ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, V_HEIGHT/2-80, V_WIDTH, 160); ctx.strokeStyle="#444"; ctx.lineWidth=4; ctx.strokeRect(0, V_HEIGHT/2-80, V_WIDTH, 160); drawTxt(sysMsg, V_WIDTH/2, V_HEIGHT/2-25, 50, "#0f0", "center", "bold"); }
        }

        // ==========================================
        // 互動綁定：極致防護 (原生 Click + TouchStart)
        // ==========================================
        function handleInput(cx, cy) {
            if(sysMsg) return true; 
            let r = canvas.getBoundingClientRect(), x = (cx - r.left) * (V_WIDTH / r.width), y = (cy - r.top) * (V_HEIGHT / r.height);
            for(let i=activeButtons.length-1; i>=0; i--) { let b = activeButtons[i]; if(x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h) { b.cb(); requestAnimationFrame(draw); return true; } }
            return false;
        }
        
        canvas.addEventListener('pointerdown', e => { 
            if(Date.now() - lastInputTime < 150) return; lastInputTime = Date.now();
            let hitBtn = handleInput(e.clientX, e.clientY); 
            if(!hitBtn && currentState === STATE_BATTLE) { isDragging = true; dragStartY = e.clientY; }
        });
        canvas.addEventListener('pointermove', e => {
            let canScroll = isBattlePaused || battleDisplayIndex >= battleLogs.length;
            if(isDragging && currentState === STATE_BATTLE && canScroll) {
                let r = canvas.getBoundingClientRect(), deltaY = (e.clientY - dragStartY) * (V_HEIGHT / r.height);
                scrollOffset -= (deltaY / (battleFontSize * 1.5)); dragStartY = e.clientY; isAutoScrolling = false; requestAnimationFrame(draw);
            }
        });
        canvas.addEventListener('pointerup', () => isDragging = false); canvas.addEventListener('pointerleave', () => isDragging = false);
        
        function bindOverlayBtn(id, cb, isCopy = false) {
            let el = document.getElementById(id); if(!el) return;
            if (isCopy) {
                el.addEventListener('click', cb); 
            } else {
                let triggered = false;
                let execute = (e) => {
                    if (e.type !== 'click') e.preventDefault(); 
                    if (triggered) return;
                    triggered = true; setTimeout(() => triggered = false, 400); 
                    document.querySelectorAll('input, textarea').forEach(i=>i.blur()); 
                    cb();
                };
                el.addEventListener('touchstart', execute, {passive: false});
                el.addEventListener('mousedown', execute); 
            }
        }

        bindOverlayBtn('btnConfirmName', () => {
            gameData = { name: document.getElementById('countryName').value.trim() || "無名之國", gold: 1000, conquered: 0, streak: 0, dungeonFloor: 1, army: [createUnit("冒險者"),createUnit("冒險者"),createUnit("冒險者")], npcs: [], allCountries: [], defeatedCountries: [], fac: {hp:0, wAtk:0, mAtk:0, pAtk:0, def:0, spd:0} };
            document.getElementById('nameInputOverlay').style.display = 'none'; currentState = STATE_MAIN; requestAnimationFrame(draw);
        });
        bindOverlayBtn('btnConfirmUnitName', () => {
            if(selectedUnitIndex !== -1) { 
                if(currentState === STATE_NPC_UNIT) gameData.npcs[selectedUnitIndex].customName = document.getElementById('unitCustomName').value.trim();
                else gameData.army[selectedUnitIndex].customName = document.getElementById('unitCustomName').value.trim(); 
                showSysMsg("賜名成功！"); 
            }
            document.getElementById('unitNameOverlay').style.display = 'none'; requestAnimationFrame(draw);
        });
        bindOverlayBtn('btnCancelUnitName', () => document.getElementById('unitNameOverlay').style.display = 'none');
        bindOverlayBtn('btnCancelAuthor', () => document.getElementById('authorOverlay').style.display = 'none');
        
        bindOverlayBtn('btnCopyExport', () => {
            let ta = document.getElementById('exportCode'); ta.select(); document.execCommand('copy');
            showSysMsg("已複製繼承碼！"); document.getElementById('exportOverlay').style.display = 'none';
        }, true);
        
        bindOverlayBtn('btnCancelExport', () => document.getElementById('exportOverlay').style.display = 'none');
        
        bindOverlayBtn('btnConfirmImport', () => {
            try {
                let code = document.getElementById('importCode').value.trim(); if(!code) return;
                let parsed = JSON.parse(decodeURIComponent(atob(code)));
                if(unpackData(parsed)) {
                    document.getElementById('importOverlay').style.display = 'none'; currentState = STATE_MAIN; showSysMsg("繼承並解壓縮成功！"); requestAnimationFrame(draw);
                } else throw new Error();
            } catch(e) { alert("繼承碼格式錯誤或已損毀！"); }
        });
        bindOverlayBtn('btnCancelImport', () => document.getElementById('importOverlay').style.display = 'none');

        bindOverlayBtn('btnConfirmRetire', () => {
            let u = gameData.army[selectedUnitIndex];
            let earn = u.level * 100;
            gameData.gold += earn;
            gameData.army.splice(selectedUnitIndex, 1);
            document.getElementById('retireOverlay').style.display = 'none';
            currentState = STATE_ROSTER;
            showSysMsg(`退休成功！獲得 ${fNum(earn)} 金幣`);
            requestAnimationFrame(draw);
        });
        bindOverlayBtn('btnCancelRetire', () => document.getElementById('retireOverlay').style.display = 'none');

        document.fonts.ready.then(() => requestAnimationFrame(draw)); window.addEventListener('resize', () => requestAnimationFrame(draw));
    </script>
</body>
</html>
