<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《毒之紀元：毒物使》- 世界演化</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060906; --text-color: #b0c4b0; --accent-color: #4CAF50; --danger-color: #8B0000;
            --panel-bg: rgba(10, 15, 10, 0.85); --border-color: #2e4a2e; --boss-color: #d4af37;
            --burst-color: #9b59b6; --fatigue-color: #3498db; --event-color: #1abc9c; --weather-color: #f39c12;
            --info-color: #8e44ad; --rare-color: #e67e22; --shield-color: #9b59b6;
            --base-font-size: 16px;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', 'Courier New', monospace; overflow: hidden; touch-action: manipulation; user-select: none; font-size: var(--base-font-size); letter-spacing: 0.02em; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
        #ui-container { position: relative; z-index: 2; max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: var(--panel-bg); box-shadow: 0 0 20px rgba(0, 50, 0, 0.5); }
        .panel { display: none; flex-direction: column; flex: 1; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .panel.active { display: flex; }

        .status-bar { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; margin-bottom: 10px; font-weight: bold; font-size: 0.85em; align-items: center;}
        .weather-tag { color: var(--weather-color); border: 1px solid var(--weather-color); padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }

        .hp-bar-container { width: 100%; height: 9px; background: #161f16; border: 1px solid var(--border-color); margin-top: 4px; position: relative; overflow: hidden; border-radius: 2px; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #2e8b3a, #6fcf52); width: 100%; transition: width 0.35s ease-out, background 0.3s; }
        .hp-bar-fill.danger { background: linear-gradient(90deg, #6b0f0f, #c0392b); animation: hpPulse 1.1s infinite ease-in-out; }
        .hp-bar-fill.boss { background: linear-gradient(90deg, #a3791f, var(--boss-color)); }
        .hp-bar-fill.overheal { background: linear-gradient(90deg, #6c3483, var(--shield-color)); }
        @keyframes hpPulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.45); } }
        .fatigue-bar-fill { height: 4px; background: repeating-linear-gradient(45deg, var(--fatigue-color) 0 6px, #1d6fa5 6px 12px); width: 0%; transition: width 0.3s; margin-top:3px; border-radius: 2px;}

        .art-display { text-align: center; font-size: 70px; margin: 10px 0; text-shadow: 0 0 15px rgba(76, 175, 80, 0.4); animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .boss-art { text-shadow: 0 0 25px rgba(212, 175, 55, 0.6); animation: bossBreathe 3s infinite ease-in-out; }
        @keyframes bossBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .boss-stunned { filter: grayscale(80%) sepia(50%) hue-rotate(180deg); transform: rotate(15deg); animation: none; }
        .rare-art { text-shadow: 0 0 12px rgba(230, 126, 34, 0.55), 0 0 28px rgba(230, 126, 34, 0.35); animation: rareGlow 1.8s infinite ease-in-out; }
        @keyframes rareGlow { 0%, 100% { filter: brightness(1) saturate(1); } 50% { filter: brightness(1.25) saturate(1.3); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .log-box { flex: 1; border: 1px solid var(--border-color); background: rgba(0, 0, 0, 0.5); padding: 10px; overflow-y: auto; font-size: 0.85em; line-height: 1.5; margin-bottom: 10px; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .log-entry { margin-bottom: 5px; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .log-sys { color: #888; } .log-atk { color: #fff; } .log-dmg { color: #ff6b6b; } .log-heal { color: #4CAF50; } .log-skill { color: #a29bfe; }
        .log-boss { color: var(--boss-color); font-weight: bold; } .log-weakness { color: #f1c40f; font-weight: bold; } .log-resist { color: #7f8c8d; font-style: italic; } .log-hunt { color: #e67e22; font-weight: bold;}
        .log-eco { color: var(--info-color); font-weight: bold; } .log-rare { color: var(--rare-color); font-weight: bold; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { background: #0d1a0d; border: 1px solid var(--border-color); color: var(--text-color); padding: 12px; font-size: 1em; font-family: inherit; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        button:active { background: #1f3d1f; transform: scale(0.98); }
        button:disabled { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }
        button.full-width { grid-column: span 2; }
        button.danger { border-color: var(--danger-color); color: #ff9999; }
        button.burst { border-color: var(--burst-color); color: #e056fd; }
        button.phero { border-color: #3498db; color: #3498db; }

        .trait-tag { display: inline-block; background: #1a2b1a; border: 1px solid #3a5a3a; padding: 2px 6px; margin: 2px; font-size: 0.75em; border-radius: 4px; }
        .trait-tag.equipped { border-color: var(--accent-color); background: #2a4b2a;}
        .pref-tag { color: #f39c12; font-size: 0.7em; border: 1px solid #f39c12; border-radius: 3px; padding: 1px 4px; margin-left: 5px; }
        
        .diary-entry { font-size: 0.8em; color: #aaa; margin-top: 4px; border-left: 2px solid #555; padding-left: 8px; font-style: italic; }
        .eco-data { font-size: 0.75em; color: #bdc3c7; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 3px; margin-top: 4px; }
        .eco-data span { color: var(--info-color); font-weight: bold; }
        .bestiary-section-title { color:var(--accent-color); font-weight:bold; margin-top:15px; margin-bottom:5px; border-bottom:1px solid var(--border-color); padding-bottom:3px; }

        .ecology-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; min-height: 25px;}
        .minion-icon { font-size: 1.5em; filter: drop-shadow(0 0 2px red); }
        .minion-icon.infected { filter: drop-shadow(0 0 5px #4CAF50) sepia(100%) hue-rotate(90deg); }
        .terrain-icon { font-size: 1.5em; filter: drop-shadow(0 0 5px #2ecc71); border: 1px dashed #2ecc71; border-radius: 5px; padding: 2px; }

        h1, h2, h3 { text-align: center; font-weight: normal; margin-top: 0;}
        #loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg-color); z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="ui-container">
        <div id="loading-overlay"><div class="art-display">🍄</div><p>同步生態資料庫...</p></div>

        <div id="rename-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:20; align-items:center; justify-content:center;">
            <div style="background:#0d150d; border:1px solid var(--accent-color); border-radius:6px; padding:20px; width:80%; max-width:320px;">
                <div style="margin-bottom:10px; color:var(--accent-color); font-weight:bold;">✏️ 為你的主毒物命名</div>
                <input id="rename-input" type="text" maxlength="10" style="width:100%; box-sizing:border-box; background:#000; border:1px solid var(--border-color); color:var(--text-color); padding:10px; font-family:inherit; font-size:1em; border-radius:4px;">
                <div class="btn-grid" style="margin-top:12px;">
                    <button onclick="Game.cancelRename()">取消</button>
                    <button onclick="Game.confirmRename()" style="border-color:var(--accent-color); color:var(--accent-color);">確認</button>
                </div>
            </div>
        </div>

        <div id="panel-title" class="panel">
            <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                <h1>《毒之紀元》</h1><div style="text-align:center; color:#666; font-size:0.8em; margin-bottom:20px;">—— 世界演化 ——</div>
                <div class="art-display">☠️</div>
                <p style="text-align:center; color:#888; font-size:0.8em;">每個生命都有其歸宿，殺戮並非唯一解。</p>
            </div>
            <div class="btn-grid">
                <button id="btn-continue" class="full-width" style="display:none; border-color:var(--boss-color); color:var(--boss-color);" onclick="Game.loadSavedGame()">繼續探索</button>
                <button class="full-width" onclick="Game.switchPanel('panel-select')">新的旅途</button>
            </div>
        </div>

        <div id="panel-select" class="panel">
            <h2>選擇主毒物</h2>
            <div style="flex:1; overflow-y:auto;">
                <button class="full-width" onclick="Game.startNewGame('snake')" style="margin-bottom:10px; text-align:left;">🐍 毒蛇 <small style="color:#aaa;">(偏好: 劇毒/追獵)</small><br><small>特徵：【劇毒】</small></button>
                <button class="full-width" onclick="Game.startNewGame('scorpion')" style="margin-bottom:10px; text-align:left;">🦂 毒蠍 <small style="color:#aaa;">(偏好: 硬甲/穿刺)</small><br><small>特徵：【硬甲】</small></button>
                <button class="full-width" onclick="Game.startNewGame('spider')" style="margin-bottom:10px; text-align:left;">🕷️ 毒蛛 <small style="color:#aaa;">(偏好: 寄生/孢子)</small><br><small>特徵：【吸血】</small></button>
                <button class="full-width" onclick="Game.startNewGame('frog')" style="margin-bottom:10px; text-align:left;">🐸 毒蛙 <small style="color:#aaa;">(偏好: 麻痺/再生)</small><br><small>特徵：【麻痺】</small></button>
            </div>
            <button class="full-width" id="btn-select-back" onclick="Game.switchPanel('panel-title')">返回</button>
        </div>

        <div id="panel-camp" class="panel">
            <div class="status-bar">
                <span>安全營地 (天數:<span id="ui-days">1</span>) <button onclick="Game.toggleFontSize()" style="padding:2px 8px; font-size:0.8em; margin-left:5px; border-radius:3px;">A</button></span>
                <span id="camp-weather" class="weather-tag">☀️ 晴朗</span>
            </div>
            <div class="art-display" id="camp-pet-art">🐍</div>
            <div style="text-align:center; margin-bottom: 10px;">
                <div id="camp-pet-name">我的毒物</div>
                <button onclick="Game.renamePet()" style="padding:2px 8px; font-size:0.75em; margin-top:2px; border:none; background:transparent; color:#888;">✏️ 改名</button>
                <div class="hp-bar-container"><div id="camp-hp-fill" class="hp-bar-fill"></div></div>
                <div style="font-size:0.8em; margin-top:5px;">HP: <span id="camp-hp-text">100/100</span></div>
            </div>
            <div style="text-align:center; margin-bottom: 10px; font-size:0.8em; color:#aaa;">
                夥伴：<span id="camp-partner">無</span>
            </div>
            <div style="margin-bottom: 10px; text-align:center;">
                <div style="font-size:0.8em; color:#888; margin-bottom:5px;">裝備特徵 (<span id="equip-count">0</span>/4)</div>
                <div id="camp-equipped-traits"></div>
            </div>
            <div class="btn-grid" style="margin-top:auto;">
                <button class="full-width" onclick="Game.explore()" style="border-color:var(--accent-color);">👣 啟程探索</button>
                <button onclick="Game.showTraitMenu()">🧬 毒囊管理</button>
                <button onclick="Game.showBestiary()">📖 觀察日記</button>
            </div>
        </div>

        <div id="panel-traits" class="panel">
            <h2>🧬 毒囊庫</h2>
            <div class="log-box" id="trait-list-box" style="flex:1;"></div>
            <button id="btn-traits-back" class="full-width" onclick="Game.switchPanel('panel-camp')">返回</button>
        </div>

        <div id="panel-bestiary" class="panel">
            <h2>📖 觀察日記</h2>
            <div class="log-box" id="bestiary-list-box" style="flex:1;"></div>
            <button class="full-width" onclick="Game.switchPanel('panel-camp')">返回</button>
        </div>

        <div id="panel-event" class="panel">
            <div class="status-bar"><span>生態事件</span><span style="color:var(--event-color);">未知奇遇</span></div>
            <div class="art-display" id="event-art" style="animation: float 3s ease-in-out infinite;">🌿</div>
            <h3 id="event-title" style="color:var(--event-color);">事件</h3>
            <div class="log-box" id="event-log" style="flex:1; justify-content:center; text-align:center; font-size:0.95em;"></div>
            <div class="btn-grid" id="event-buttons"></div>
        </div>

        <div id="panel-encounter" class="panel">
            <div class="status-bar">
                <span id="encounter-title" style="color:var(--danger-color);">遭遇毒物</span>
                <span id="combat-weather" class="weather-tag">☀️ 晴朗</span>
            </div>
            <div class="ecology-container" id="ecology-view"></div>
            <div style="text-align:center;">
                <div class="art-display" id="enemy-art" style="margin: 5px 0;">🦂</div>
                <div id="enemy-name">未知生物</div>
                <div id="enemy-rare" style="font-size:0.75em; color:var(--rare-color); margin-top:2px;"></div>
                <div id="enemy-habit" style="font-size:0.75em; color:#aaa; margin-top:2px;"></div>
                <div style="width:70%; margin: 5px auto;">
                    <div class="hp-bar-container"><div id="enemy-hp-fill" class="hp-bar-fill danger"></div></div>
                    <div id="fatigue-container" style="display:none; text-align:left;">
                        <div class="fatigue-bar-fill" id="fatigue-bar"></div>
                        <div style="font-size:0.7em; color:var(--fatigue-color);">疲勞值 (滿=倒地)</div>
                    </div>
                </div>
            </div>
            <div style="margin-top:5px;">
                <div style="font-size:0.8em; color:#888;">HP: <span id="combat-player-hp">100/100</span></div>
                <div class="hp-bar-container"><div id="combat-player-hp-fill" class="hp-bar-fill"></div></div>
            </div>
            <div class="log-box" id="combat-log" style="margin-top: 5px;"></div>
            <div id="action-buttons-container">
                <div class="btn-grid" id="action-buttons">
                    <button id="btn-obs" onclick="Game.actionObserve()">👁️ 觀察</button>
                    <button id="btn-tame" onclick="Game.actionTame()">🪤 馴養</button>
                    <button id="btn-atk-start" onclick="Game.startCombat()" class="danger">⚔️ 狩獵開始</button>
                    <button id="btn-flee" onclick="Game.actionFlee()">💨 撤退</button>
                    
                    <button id="btn-atk" class="combat-btn" onclick="Game.combatTurn('attack')" style="display:none;">⚔️ 攻擊</button>
                    <button id="btn-def" class="combat-btn" onclick="Game.combatTurn('defend')" style="display:none;">🛡️ 防禦</button>
                    <button id="btn-skill" class="combat-btn full-width" onclick="Game.combatTurn('skill')" style="display:none; color:#a29bfe; border-color:#a29bfe;">🧪 極限毒技 (耗命10%)</button>
                    
                    <button id="btn-terrain" class="combat-btn terrain full-width" onclick="Game.combatTurn('terrain')" style="display:none;">🗺️ 利用地形</button>
                    <button id="btn-phero-menu" class="combat-btn phero full-width" onclick="Game.showPheroMenu()" style="display:none;">🧫 散發信息素 (單場1次)</button>
                    <button id="btn-burst" class="combat-btn burst full-width" onclick="Game.combatTurn('burst')" style="display:none;">✨ 共生爆發</button>

                    <button id="btn-phero-1" class="phero-sub" onclick="Game.usePheromone('frenzy')" style="display:none; color:#ff6b6b; border-color:#ff6b6b;">🔴 狂暴素<br><small>引發生物錯亂</small></button>
                    <button id="btn-phero-2" class="phero-sub" onclick="Game.usePheromone('lure')" style="display:none; color:#4CAF50; border-color:#4CAF50;">🟢 誘食素<br><small>引發掠食或餵食</small></button>
                    <button id="btn-phero-3" class="phero-sub" onclick="Game.usePheromone('repel')" style="display:none; color:#3498db; border-color:#3498db;">🔵 驅逐素<br><small>破除習性/驅離</small></button>
                    <button id="btn-phero-cancel" class="phero-sub" onclick="Game.hidePheroMenu()" style="display:none;">↩️ 取消</button>
                </div>
            </div>
            <button id="btn-return" onclick="Game.returnToCamp()" class="full-width" style="display:none; margin-top:10px;">繼續</button>
        </div>
    </div>

    <script>
        const DB = {
            weathers: {
                'normal': { id: 'normal', name: '☀️ 晴朗', desc: '普通的荒野日子，萬物穩定生長。' },
                'toxic_rain': { id: 'toxic_rain', name: '🌧️ 毒雨', desc: '空氣中瀰漫劇毒，劇毒特徵觸發率與傷害大幅提升。' },
                'drought': { id: 'drought', name: '🏜️ 乾旱', desc: '水源枯竭，再生與吸血的生命回復效果完全失效。' },
                'spore_season': { id: 'spore_season', name: '🌫️ 孢子季', desc: '真菌活躍，孢子類生物繁衍，幼體出生即被感染。' },
                'breeding': { id: 'breeding', name: '🌸 繁殖季', desc: '萬物發情，Boss 頻繁召喚幼體，但馴養生物也更容易。' }
            },
            partners: {
                'butterfly': { name: '🦋 引路蝶', desc: '具有敏銳的感知，能自動解鎖並揭露敵方 Boss 的弱點與抗性。' },
                'rat': { name: '🐁 尋寶鼠', desc: '對寶物有異常直覺，大幅增加探索時遇到稀有生態事件的機率。' },
                'spore': { name: '🦠 寄生孢', desc: '能散發安撫神經的粉塵，永久提升 20% 的馴養成功率。' }
            },
            traits: {
                'toxic': { name: '劇毒', icon: '🟢', desc: '【神經衰弱】敵方每層中毒會降低其 5% 攻擊力。可點燃地形毒草。' },
                'paralyze': { name: '麻痺', icon: '⚡', desc: '【防禦瓦解】延遲敵方行動累積疲勞，且每次觸發永久削弱敵方防禦。' },
                'lifesteal': { name: '吸血', icon: '🩸', desc: '【過載護盾】吸取生命，血滿時能過量治療至 150% 形成護盾。' },
                'corrosive': { name: '腐蝕', icon: '🧪', desc: '【裝甲崩壞】永久降防，且每層腐蝕使敵方額外承受 5% 所有傷害。' },
                'spore': { name: '孢子', icon: '🍄', desc: '【粉塵反噬】受擊時必定反彈傷害，並自動感染全場敵方幼體。' },
                'hard_shell': { name: '硬甲', icon: '🪨', desc: '【絕對防禦】減免傷害，且完全免疫低於你最大生命值 5% 的微弱攻擊。' },
                'parasite': { name: '寄生', icon: '🐛', desc: '【血肉榨取】每回合強力吸血，並主動寄生幼體為己所用。' },
                'proliferate': { name: '增殖', icon: '🦠', desc: '【無盡分裂】攻擊變為兩段連擊，完美觸發各種攻擊特效。' },
                'mimicry': { name: '擬態', icon: '🍂', desc: '【破綻反擊】受擊有 20% 機率完美迴避，並自動對敵人追加一次致命反擊。' },
                'regen': { name: '再生', icon: '🌿', desc: '【自體淨化】回合結束大量回復 HP，並自動清除身上所有的劇毒層數。' },
                'hunt': { name: '追獵', icon: '👁️', desc: '【越戰越勇】戰鬥時間越長，攻擊力提升倍率極高，對付血牛有奇效。' },
                'bleed': { name: '流血', icon: '🔴', desc: '【劇痛疲勞】造成疊加真實傷害，且每回合撕裂痛楚會增加 Boss 疲勞。' },
                'pierce': { name: '穿刺', icon: '🗡️', desc: '【無視護甲】無視敵方 50% 防禦力，且極易撕裂傷口造成流血。' },
                'acid_blood': { name: '酸血', icon: '💧', desc: '【腐蝕飛濺】受擊時依比例反彈傷害給攻擊者。' }

            initApp: async function() {
                this.initCanvasEffects();
                
                let savedFontSize = localStorage.getItem('epoch_of_poison_fontsize');
                if(savedFontSize) document.documentElement.style.setProperty('--base-font-size', savedFontSize);

                setTimeout(() => this.checkSaveData(true), 100);
            },
            checkSaveData: async function(isLocal=false) {
                document.getElementById('loading-overlay').style.display = 'none'; let hasSave = false;
                try {
                    let localSave = localStorage.getItem('epoch_of_poison_save');
                    if (localSave) { 
                        this.cachedSave = JSON.parse(localSave); 
                        // 相容舊存檔
                        if(!this.cachedSave.discoveredWeathers) this.cachedSave.discoveredWeathers = ['normal'];
                        if(!this.cachedSave.discoveredCombos) this.cachedSave.discoveredCombos = [];
                        if(!this.cachedSave.discoveredPartners) this.cachedSave.discoveredPartners = [];
                        if(!this.cachedSave.traitUsage) this.cachedSave.traitUsage = {};
                        if(!this.cachedSave.bossHistory) this.cachedSave.bossHistory = {};
                        hasSave = true; 
                    }
                } catch(e) { console.error("讀檔失敗", e); }
                
                if (hasSave) document.getElementById('btn-continue').style.display = 'block';
                this.switchPanel('panel-title');
            },
            saveProgress: async function() { 
                try { localStorage.setItem('epoch_of_poison_save', JSON.stringify(this.state)); } catch(e) {} 
            },
            loadSavedGame: function() { if (this.cachedSave) { this.state = this.cachedSave; this.updateCampUI(); this.switchPanel('panel-camp'); } },
            startNewGame: function(petKey) {
                const p = DB.pets[petKey];
                if (this.isReincarnating) {
                    // 保留天數、圖鑑、遺物、毒囊等
                    this.state.player.petId = petKey;
                    this.state.player.name = p.name;
                    this.state.player.art = p.art;
                    this.state.player.hp = p.baseHp;
                    this.state.player.maxHp = p.baseHp;
                    this.state.player.atk = p.baseAtk;
                    this.state.player.def = p.baseDef;
                    this.state.player.equippedTraits = [p.initTrait];
                    this.state.player.prefs = p.prefs;
                    if(!this.state.player.traitsPool.includes(p.initTrait)) this.state.player.traitsPool.push(p.initTrait);
                    this.isReincarnating = false;
                } else {
                    // 全新遊戲
                    this.state = { days: 1, weather: 'normal', weatherDays: 0, partner: null, bestiary: {}, bossResearch: {}, defeatedBosses: [], currentEncounter: null, combat: {}, relics: [], larvaKarma: 0, discoveredWeathers: ['normal'], discoveredCombos: [], discoveredPartners: [], traitUsage: {}, bossHistory: {}, player: { petId: petKey, name: p.name, art: p.art, hp: p.baseHp, maxHp: p.baseHp, atk: p.baseAtk, def: p.baseDef, traitsPool: [p.initTrait], equippedTraits: [p.initTrait], prefs: p.prefs } };
                }
                this.saveProgress(); this.updateCampUI(); 
                document.getElementById('btn-select-back').style.display = 'block';
                const btnReturn = document.getElementById('btn-return');
                btnReturn.innerText = "繼續";
                btnReturn.onclick = () => Game.returnToCamp();
                this.switchPanel('panel-camp');
            },

            toggleFontSize: function() {
                let current = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--base-font-size')) || 16;
                let next = current === 16 ? 18 : (current === 18 ? 20 : 16);
                document.documentElement.style.setProperty('--base-font-size', next + 'px');
                localStorage.setItem('epoch_of_poison_fontsize', next + 'px');
            },

            renamePet: function() {
                const input = document.getElementById('rename-input');
                input.value = this.state.player.name;
                document.getElementById('rename-modal').style.display = 'flex';
                setTimeout(() => input.focus(), 50);
            },
            cancelRename: function() { document.getElementById('rename-modal').style.display = 'none'; },
            confirmRename: function() {
                let newName = document.getElementById('rename-input').value;
                if(newName && newName.trim() !== '') {
                    this.state.player.name = newName.trim().substring(0, 10);
                    this.updateCampUI();
                    this.saveProgress();
                }
                document.getElementById('rename-modal').style.display = 'none';
            },

            switchPanel: function(panelId) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(panelId).classList.add('active'); },
            log: function(msg, type='log-sys') { const box = document.getElementById('combat-log'); const p = document.createElement('div'); p.className = `log-entry ${type}`; p.innerHTML = msg; box.appendChild(p); box.scrollTop = box.scrollHeight; },
            clearLog: function() { document.getElementById('combat-log').innerHTML = ''; },
            sleep: ms => new Promise(r => setTimeout(r, ms)),

            updateWeather: function() {
                this.state.weatherDays++;
                if (this.state.weatherDays >= 4) {
                    this.state.weatherDays = 0; const wList = Object.keys(DB.weathers);
                    this.state.weather = wList[Math.floor(Math.random() * wList.length)];
                    if (!this.state.discoveredWeathers.includes(this.state.weather)) this.state.discoveredWeathers.push(this.state.weather);
                    this.log(`氣候改變了：${DB.weathers[this.state.weather].name}`, 'log-sys');
                }
            },

            updateCampUI: function() {
                const p = this.state.player;
                document.getElementById('ui-days').innerText = this.state.days; document.getElementById('camp-weather').innerText = DB.weathers[this.state.weather].name;
                document.getElementById('camp-pet-art').innerText = p.art; document.getElementById('camp-pet-name').innerText = p.name;
                
                const fill = document.getElementById('camp-hp-fill');
                fill.style.width = Math.min(100, (p.hp/p.maxHp)*100) + '%';
                fill.classList.remove('overheal', 'danger');
                if(p.hp > p.maxHp) fill.classList.add('overheal');
                else if(p.hp <= p.maxHp * 0.3) fill.classList.add('danger');
                document.getElementById('camp-hp-text').innerText = `${Math.floor(p.hp)}/${p.maxHp}`;
                
                document.getElementById('camp-partner').innerText = this.state.partner ? DB.partners[this.state.partner].name : '無';
                
                document.getElementById('equip-count').innerText = p.equippedTraits.length;
                const trDiv = document.getElementById('camp-equipped-traits'); trDiv.innerHTML = '';
                if(p.equippedTraits.length===0) trDiv.innerHTML = '<span style="color:#555;">未裝備</span>';
                else p.equippedTraits.forEach(tId => {
                    const isPref = p.prefs.includes(tId);
                    trDiv.innerHTML += `<span class="trait-tag equipped" title="${DB.traits[tId].desc}">${DB.traits[tId].icon} ${DB.traits[tId].name}${isPref?'<span class="pref-tag">偏好</span>':''}</span>`;
                });
            },
            showTraitMenu: function(fromEvent = false) {
                const box = document.getElementById('trait-list-box'); box.innerHTML = ''; const p = this.state.player;

            explore: function() {
                this.state.days++; this.updateWeather();
                if (this.state.days % 10 === 0) return this.triggerBossEncounter();
                
                let eventChance = this.state.partner === 'rat' ? 0.6 : 0.4;
                if (Math.random() < eventChance) this.triggerRandomEvent();
                else this.triggerEncounter();
            },
            
            triggerRandomEvent: function() {
                const events = [{ id: 'plant', weight: 20 }, { id: 'camp', weight: 15 }, { id: 'partner', weight: (this.state.partner?0:15) }, { id: 'larva', weight: 25 }, { id: 'relic', weight: 15 }];
                
                // 世界記憶事件注入
                if (this.state.bossHistory['boss_toad'] === '生態餵食') events.push({ id: 'memory_toad', weight: 15 });
                if (this.state.bossHistory['boss_beetle'] === '和平驅離' || this.state.bossHistory['boss_beetle'] === '擊敗目標') events.push({ id: 'memory_beetle_nest', weight: 15 });
                if (this.state.bossHistory['boss_iron'] === '懾服巨蟹') events.push({ id: 'memory_iron', weight: 15 });
                
                let r = Math.random() * events.reduce((s,e)=>s+e.weight,0); let selectedEvent = 'plant';
                for(let e of events) if((r-=e.weight)<=0) { selectedEvent = e.id; break; }
                this.setupEventUI(selectedEvent);
            },

                const log = document.getElementById('event-log'); const btns = document.getElementById('event-buttons');

                    case 'camp': art.innerText = '🏕️'; title.innerText = '安全營地'; this.state.player.hp = Math.max(this.state.player.hp, this.state.player.maxHp); log.innerHTML = '找到庇護所，<span style="color:#4CAF50;">生命完全恢復！</span><br>可趁機重新配置毒囊。'; btns.innerHTML = `<button class="event-btn full-width" onclick="Game.showTraitMenu(true)">🧬 整理毒囊</button>${returnBtn}`; break;
                    case 'partner': art.innerText = '🤝'; title.innerText = '共生夥伴'; log.innerHTML = '一隻無害的變異生物願意跟隨你。'; btns.innerHTML = `<button class="event-btn full-width" onclick="Game.resolveEvent('partner_butterfly')">收養 🦋 引路蝶</button><button class="event-btn full-width" onclick="Game.resolveEvent('partner_rat')">收養 🐁 尋寶鼠</button><button class="event-btn full-width" onclick="Game.resolveEvent('partner_spore')">收養 🦠 寄生孢</button>`; break;
                    case 'larva': art.innerText = '🐛'; title.innerText = '幼體毒物'; log.innerHTML = '一隻迷路的變異幼蟲。'; btns.innerHTML = `<button class="danger" onclick="Game.resolveEvent('larva_eat')">吞食 (回血)</button><button class="event-btn" onclick="Game.resolveEvent('larva_tame')">嘗試馴養</button><button class="terrain" onclick="Game.resolveEvent('larva_release')">放生</button>`; break;
                    case 'relic': art.innerText = '✨'; title.innerText = '元素祭壇'; log.innerHTML = '一座散發著古老元素波動的祭壇，上頭漂浮著不屬於這個生態的遺物。'; btns.innerHTML = `<button class="event-btn full-width" onclick="Game.resolveEvent('relic')">取走遺物</button>`; break;
                    case 'memory_toad': art.innerText = '🐸'; title.innerText = '舊日回饋'; log.innerHTML = '你遇到了一隻巨大的巨蟾，牠似乎認出了你曾餵食過牠。<br>牠吐出了一顆晶瑩的基因球作為回報。'; btns.innerHTML = `<button class="event-btn full-width" onclick="Game.resolveEvent('memory_toad')">收下禮物</button>`; break;
                    case 'memory_beetle_nest': art.innerText = '🪲'; title.innerText = '空置的巢穴'; log.innerHTML = '你發現了巨甲蟲遺留下來的空巢。<br>內部因長時間腐熟，長滿了珍稀的毒草。'; btns.innerHTML = `<button class="event-btn full-width" onclick="Game.resolveEvent('plant')">採集毒草</button>`; break;
                    case 'memory_iron': art.innerText = '🦀'; title.innerText = '強者的認可'; log.innerHTML = '鋼鐵巨蟹在遠處看了你一眼，用巨螯為你砸開了一條佈滿補給的捷徑。'; btns.innerHTML = `<button class="event-btn full-width" onclick="Game.resolveEvent('memory_iron')">進入捷徑</button>`; break;
                }
                this.switchPanel('panel-event');
            },

            resolveEvent: function(action) {
                const log = document.getElementById('event-log'); const btns = document.getElementById('event-buttons');
                const returnBtn = `<button class="full-width" onclick="Game.returnToCamp()">繼續旅途</button>`; const p = this.state.player;

                if (action === 'plant') {
                    const unowned = Object.keys(DB.traits).filter(t => !p.traitsPool.includes(t));
                    if (unowned.length > 0 && Math.random() < 0.6) {
                        const tId = unowned[Math.floor(Math.random() * unowned.length)]; p.traitsPool.push(tId); log.innerHTML = `🧬 獲得全新特徵：【${DB.traits[tId].name}】`;
                    } else { p.maxHp += 10; p.hp += 10; log.innerHTML = `<span style="color:#4CAF50;">最大生命值永久 +10</span>`; }
                } else if (action.startsWith('partner_')) {
                    const pType = action.split('_')[1]; this.state.partner = pType; 
                    if (!this.state.discoveredPartners.includes(pType)) this.state.discoveredPartners.push(pType);
                    log.innerHTML = `你收養了 ${DB.partners[pType].name}！<br><span style="color:#a29bfe;">${DB.partners[pType].desc}</span>`;
                } else if (action === 'larva_eat') {
                    let heal = Math.floor(p.maxHp * 0.3); p.hp = Math.min(Math.floor(p.maxHp * 1.5), p.hp + heal); log.innerHTML = `<span style="color:#4CAF50;">過量回復了 ${heal} 點 HP。</span>`;
                } else if (action === 'larva_tame') {
                    if (Math.random() < 0.5) { const tId = 'regen'; if(!p.traitsPool.includes(tId)) p.traitsPool.push(tId); log.innerHTML = `馴養成功！獲得特徵：【再生】。`; } 
                    else { log.innerHTML = `幼蟲嚇跑了...`; }
                } else if (action === 'larva_release') {
                    this.state.larvaKarma += 1; log.innerHTML = `你將幼蟲放生，荒野的意志似乎對你感到滿意。<br><span style="color:#a29bfe;">(下一次遭遇的馴養成功率將大幅提升)</span>`;
                } else if (action === 'relic') {
                    const r = DB.elementalRelics[Math.floor(Math.random() * DB.elementalRelics.length)];
                    if (!this.state.relics.includes(r)) this.state.relics.push(r);
                    log.innerHTML = `你取走了神秘的元素遺物：<span style="color:#f1c40f;">【${r}】</span><br>已記錄至圖鑑羈絆與遺物中。`;
                } else if (action === 'memory_toad') {
                    p.maxHp += 15; p.hp += 15; log.innerHTML = `<span style="color:#4CAF50;">基因球融化在體內，最大生命值永久 +15！</span>`;
                } else if (action === 'memory_iron') {
                    this.state.days += 2; // 跳過天數加速探索
                    p.hp = Math.min(Math.floor(p.maxHp * 1.5), p.hp + 50);
                    log.innerHTML = `<span style="color:#4CAF50;">捷徑讓你避開了危險，並獲得大量補給（HP +50，探索天數 +2）。</span>`;
                }
                btns.innerHTML = returnBtn; this.saveProgress();
            },

            triggerBossEncounter: function() { const b = DB.enemies.filter(e => e.isBoss); this.initEncounter(b[Math.floor(Math.random() * b.length)]); },
            
            triggerEncounter: function() { 
                const n = JSON.parse(JSON.stringify(DB.enemies.filter(e => !e.isBoss)));
                
                // 【動態演化】計算玩家最常使用的特徵
                let topTrait = Object.keys(this.state.traitUsage).reduce((a, b) => this.state.traitUsage[a] > this.state.traitUsage[b] ? a : b, '');

                let totalWeight = 0;
                n.forEach(e => {
                    e.weight = e.weight || 10;
                    
                    // 天氣影響
                    if (this.state.weather === 'toxic_rain') { if (e.traits.includes('toxic') || e.traits.includes('acid_blood')) e.weight *= 3.0; } 
                    else if (this.state.weather === 'drought') { if (e.traits.includes('regen') || e.traits.includes('lifesteal') || e.id === 'toad' || e.id === 'leech') { e.weight = Math.max(1, Math.floor(e.weight * 0.2)); } } 
                    else if (this.state.weather === 'spore_season') { if (e.traits.includes('spore') || e.traits.includes('parasite')) e.weight *= 3.0; } 
                    else if (this.state.weather === 'breeding') { if (e.id === 'larva') e.weight *= 4.0; }

                    // 生態演化影響 (怪物會試圖克制你最常用的特徵)
                    if (topTrait && this.state.traitUsage[topTrait] > 20) {
                        if (topTrait === 'toxic' && e.traits.includes('regen')) e.weight *= 2.0;
                        if (topTrait === 'lifesteal' && e.traits.includes('acid_blood')) e.weight *= 2.0;
                        if (topTrait === 'hard_shell' && e.traits.includes('corrosive')) e.weight *= 2.0;
                        if (topTrait === 'mimicry' && e.traits.includes('spore')) e.weight *= 2.0;
                    }

                    totalWeight += e.weight;
                });
                let r = Math.random() * totalWeight; let selected = n[0];
                for(let e of n) { r -= e.weight; if(r <= 0) { selected = e; break; } }

                // 【稀有個體突變】
                if (Math.random() < 0.20) {
                    let pref = DB.rarePrefixes[Math.floor(Math.random() * DB.rarePrefixes.length)];
                    selected.name = pref.name + selected.name;
                    if (!selected.traits.includes(pref.trait)) selected.traits.push(pref.trait);
                    selected.rareDesc = pref.desc;
                }

                this.initEncounter(selected); 
            },
            initEncounter: function(enemyData, isAmbush = false) {
                const e = JSON.parse(JSON.stringify(enemyData)); if(!e.maxHp) e.maxHp = e.hp;
                this.state.currentEncounter = e;
                this.state.bestiary[e.id] = (this.state.bestiary[e.id] || 0) + 1;
                if(e.isBoss) this.state.bossResearch[e.id] = (this.state.bossResearch[e.id] || 0) + 1;
                this.saveProgress(); this.setupEncounterUI(isAmbush); this.switchPanel('panel-encounter');
            },

                this.clearLog(); const e = this.state.currentEncounter;
                document.getElementById('encounter-title').innerText = e.isBoss ? '⚠️ 首領狩獵' : (isAmbush ? '⚠️ 遭遇伏擊' : '遭遇生物');
                document.getElementById('encounter-title').style.color = e.isBoss || isAmbush ? 'var(--boss-color)' : 'var(--danger-color)';
                document.getElementById('combat-weather').innerText = DB.weathers[this.state.weather].name;
                const art = document.getElementById('enemy-art'); art.innerText = e.art; 
                art.className = 'art-display' + (e.isBoss ? ' boss-art' : '') + (e.rareDesc ? ' rare-art' : '');
                
                document.getElementById('enemy-name').innerText = e.name; document.getElementById('enemy-name').style.color = e.isBoss ? 'var(--boss-color)' : '#fff';
                
                document.getElementById('enemy-rare').innerText = e.rareDesc ? `【突變】${e.rareDesc}` : '';
                document.getElementById('enemy-habit').innerText = e.habitName ? e.habitName : '';

                this.state.combat = {
                    inProgress: false, turnCount: 0, enemyPoison: 0, playerPoison: 0, enemyStunned: false, enemyDefDebuff: 0, defShattered: false, turnLocked: false,
                    playerHuntStacks: 0, enemyBleedStacks: 0, enemyParasiteStacks: 0, bossFatigue: 0, bossStunTurns: 0, minions: [], terrain: null, terrainUsed: false, bossAdaptation: {}, burstUsed: false, bloodBurstActive: false, thornsBurstActive: false, pheroUsed: false,
                    bossNestGuard: e.habit === 'nest_guard', bossStealth: e.habit === 'stealth', bossCounter: 0, queenAloneTurns: 0, ironInterrupts: 0
                };

                if (e.isBoss) {
                    document.getElementById('fatigue-container').style.display = 'block'; document.getElementById('fatigue-bar').style.width = '0%';
                    if (Math.random() < 0.8) this.state.combat.terrain = DB.terrains[Math.floor(Math.random() * DB.terrains.length)];
                } else { document.getElementById('fatigue-container').style.display = 'none'; }

                this.renderEcologyUI(); this.updateCombatBars();
                
                if (isAmbush) this.startCombat(true, "遭到突然襲擊，敵方搶得先機！");
                else this.toggleActionButtons('encounter');
                this.checkSymbiosisCombo();
            },

            renderEcologyUI: function() {
                const container = document.getElementById('ecology-view'); container.innerHTML = '';
                const { minions, terrain } = this.state.combat;
                if (terrain) container.innerHTML += `<div class="terrain-icon" title="${terrain.name}">${terrain.icon}</div>`;
                minions.forEach(m => { container.innerHTML += `<div class="minion-icon ${m.infected ? 'infected' : ''}">${this.state.currentEncounter.minionIcon}</div>`; });
            },

            updateCombatBars: function() {
                const p = this.state.player, e = this.state.currentEncounter;
                
                const pFill = document.getElementById('combat-player-hp-fill');
                pFill.style.width = Math.min(100, (p.hp/p.maxHp)*100) + '%';
                pFill.classList.remove('overheal', 'danger');
                if(p.hp > p.maxHp) pFill.classList.add('overheal');
                else if(p.hp <= p.maxHp * 0.3) pFill.classList.add('danger');
                document.getElementById('combat-player-hp').innerText = `${Math.floor(p.hp)}/${p.maxHp}`;
                
                if(e) {
                    const eFill = document.getElementById('enemy-hp-fill');
                    eFill.style.width = Math.min(100, (e.hp/e.maxHp)*100) + '%';
                    eFill.className = e.isBoss ? 'hp-bar-fill boss' : 'hp-bar-fill danger';
                    if(e.isBoss) {
                        const fatPct = Math.min(100, this.state.combat.bossFatigue);
                        document.getElementById('fatigue-bar').style.width = fatPct + '%';
                        const art = document.getElementById('enemy-art');
                        if (this.state.combat.bossStunTurns > 0) art.classList.add('boss-stunned');
                        else art.classList.remove('boss-stunned');
                    }
                }
            },

            toggleActionButtons: function(mode) {
                document.getElementById('action-buttons-container').style.display = 'block';
                const allComBtns = document.querySelectorAll('.combat-btn'); const allPheroBtns = document.querySelectorAll('.phero-sub');
                
                if(mode === 'encounter') {
                    document.getElementById('btn-obs').style.display='block'; document.getElementById('btn-tame').style.display='block';
                    document.getElementById('btn-atk-start').style.display='block'; document.getElementById('btn-flee').style.display='block';
                    allComBtns.forEach(b => b.style.display='none'); allPheroBtns.forEach(b => b.style.display='none');
                } else if(mode === 'combat') {
                    document.getElementById('btn-obs').style.display='none'; document.getElementById('btn-tame').style.display='none';
                    document.getElementById('btn-atk-start').style.display='none'; document.getElementById('btn-flee').style.display='none';
                    document.getElementById('btn-atk').style.display='block'; document.getElementById('btn-def').style.display='block'; document.getElementById('btn-skill').style.display='block';
                    document.getElementById('btn-phero-menu').style.display = this.state.combat.pheroUsed ? 'none' : 'block';
                    
                    const btnTerrain = document.getElementById('btn-terrain'); const t = this.state.combat.terrain;
                    if(t && !this.state.combat.terrainUsed && this.state.player.equippedTraits.includes(t.req)) { btnTerrain.style.display = 'block'; btnTerrain.innerText = `🗺️ 利用地形: ${t.name}`; } else { btnTerrain.style.display = 'none'; }

                    const btnBurst = document.getElementById('btn-burst');
                    if(this.state.combat.activeCombo && !this.state.combat.burstUsed) { btnBurst.style.display = 'block'; btnBurst.innerText = `✨ ${this.state.combat.activeCombo.name}`; } else { btnBurst.style.display = 'none'; }
                    allPheroBtns.forEach(b => b.style.display='none');
                }
                document.getElementById('btn-return').style.display = 'none'; document.querySelectorAll('#action-buttons button').forEach(b => b.disabled = false);
            },

            showPheroMenu: function() { document.querySelectorAll('.combat-btn').forEach(b => b.style.display='none'); document.querySelectorAll('.phero-sub').forEach(b => b.style.display='block'); },
            hidePheroMenu: function() { this.toggleActionButtons('combat'); },
            checkSymbiosisCombo: function() { const e = this.state.currentEncounter; if(!e.isBoss) { this.state.combat.activeCombo = null; return; } const eq = this.state.player.equippedTraits; if(eq.length < 4) { this.state.combat.activeCombo = null; return; } this.state.combat.activeCombo = DB.symbiosisCombos.find(c => c.req.every(t => eq.includes(t))) || null; },

            actionObserve: function() {
                const e = this.state.currentEncounter;
                if(e.isBoss) this.log(`👁️ 觀察：<br>【生態】${e.desc}`); else this.log(`👁️ 觀察：<br>特徵: <span style="color:#4CAF50">${e.traits.map(t=>DB.traits[t].name).join(' ')||'無'}</span>`);
            },
            
            actionFlee: function() {
                const e = this.state.currentEncounter;
                if(e.id === 'boss_beetle' && !this.state.combat.bossNestGuard && this.state.combat.pheroUsed) {
                    this.log(`巨甲蟲已被趕出巢穴，你緩步退出其領地範圍。巨甲蟲沒有追擊。`, "log-eco"); this.winEncounter('和平驅離'); return;
                }
                if(e.isBoss) return this.startCombat(true, "⚠️ 毒王鎖定了你，無法輕易撤退！");
                if(Math.random() > 0.4) { this.log("💨 撤退成功。"); setTimeout(() => this.returnToCamp(), 1000); }
                else this.startCombat(true, "💨 撤退失敗！被包圍了！");
            },

            actionTame: function() {
                const e = this.state.currentEncounter;
                if(e.id === 'boss_spider') {
                    if ((e.hp / e.maxHp) < 0.3 && this.state.combat.bossStunTurns > 0) {
                        this.log("✨ 魔蛛處於極度虛弱與僵直，馴養成功！", "log-eco");
                        if(!this.state.player.traitsPool.includes('proliferate')) { this.state.player.traitsPool.push('proliferate'); this.log(`🧬 獲得特徵：【增殖】！`, "log-skill"); }
                        this.winEncounter('和平馴服'); return;
                    } else { return this.startCombat(true, "⚠️ 魔蛛仍在極度危險狀態，馴養失敗，遭到反撲！"); }
                }

                if(e.isBoss) return this.startCombat(true, "⚠️ 此霸主無法被馴養！");
                let rate = 0.25 + ((1 - e.hp/e.maxHp) * 0.4);
                if (this.state.partner === 'spore') rate += 0.20; if (this.state.weather === 'breeding') rate += 0.20; if (this.state.larvaKarma > 0) { rate += 0.3; this.state.larvaKarma--; this.log(`(荒野意志加護，馴養率提升)`); }
                if(Math.random() < rate) {
                    this.log("✨ 馴養成功！", "log-heal");
                    if(e.traits.length > 0) {
                        const t = e.traits[Math.floor(Math.random() * e.traits.length)];
                        if(!this.state.player.traitsPool.includes(t)) { this.state.player.traitsPool.push(t); this.log(`🧬 獲得特徵：【${DB.traits[t].name}】！`, "log-skill"); } 
                        else { this.state.player.hp = Math.min(Math.floor(this.state.player.maxHp * 1.5), this.state.player.hp + 30); this.log(`🧬 特徵重複，轉為回復生命。`, "log-heal"); }
                    }
                    this.saveProgress(); this.endEncounter();
                } else { this.startCombat(true, "❌ 馴養失敗！目標發怒！"); }
            },

            startCombat: function(enemyFirst = false, msg = "⚔️ 狩獵開始！") {
                this.state.combat.inProgress = true; this.toggleActionButtons('combat'); this.log(msg, enemyFirst ? "log-dmg" : "log-sys"); const e = this.state.currentEncounter;
                if (e.habit === 'nest_guard') { this.log(`【守護者】巨甲蟲固守原地，防禦力大幅提升！`, 'log-boss'); e.def += 20; }
                else if (e.habit === 'swarm') { this.log(`【領袖】女王呼喚毒蜂護衛湧現！`, 'log-boss'); for(let i=0;i<3;i++) this.state.combat.minions.push({infected:false}); this.renderEcologyUI(); }
                else if (e.habit === 'ambush') { this.log(`【掠食者】深淵魔蛛搶得先手，吐出厚重的黏網並使你中毒！`, 'log-boss'); this.state.combat.playerPoison += 5; for(let i=0;i<2;i++) this.state.combat.minions.push({infected:false}); this.renderEcologyUI(); enemyFirst = true; }
                else if (e.habit === 'stealth') { this.log(`【掠食者】獵手遁入環境中，極難被擊中。`, 'log-boss'); }
                if(enemyFirst) setTimeout(() => this.processEnemyTurnSafe(), 800);
            },

            processEnemyTurnSafe: async function(pDefending=false) {
                try {
                    await this.processEnemyTurn(pDefending);
                    if(this.state.combat.inProgress) { await this.processEndTurnEffects(); if(!await this.checkDeath()) this.unlockButtons(); }
                } catch(err) { console.error(err); this.unlockButtons(); }
            },

            getPrefMultiplier: function(traitId) { return this.state.player.prefs.includes(traitId) ? 1.5 : 1.0; },

            applyTraitWithAdaptation: function(traitId, logName, actionFn) {
                const e = this.state.currentEncounter; if (!e.isBoss) { actionFn(1.0); return; }
                let adaptCount = this.state.combat.bossAdaptation[traitId] || 0; this.state.combat.bossAdaptation[traitId] = adaptCount + 1;
                if (adaptCount >= 4) { this.log(`⚠️ Boss 對【${logName}】產生抗性，效果減半！`, 'log-resist'); actionFn(0.5); } else { actionFn(1.0); }
            },

            addFatigue: function(amount) {
                if(!this.state.currentEncounter.isBoss) return; if(this.state.combat.bossStunTurns > 0) return;
                this.state.combat.bossFatigue += amount;
                if(this.state.combat.bossFatigue >= 100) {
                    this.state.combat.bossFatigue = 0; this.state.combat.bossStunTurns = 2;
                    this.log(`💥 Boss 陷入極度疲勞，重重倒地！(受傷加倍，無法行動)`, 'log-hunt');
                    if (this.state.combat.bossNestGuard) { this.state.combat.bossNestGuard = false; this.state.currentEncounter.def -= 20; this.log(`巨甲蟲被迫離開巢穴，防禦崩潰！`, 'log-skill'); }
                    if (this.state.combat.bossStealth) { this.state.combat.bossStealth = false; this.log(`隱身獵手跌落，隱匿解除！`, 'log-skill'); }
                }
            },

            usePheromone: async function(type) {
                if(!this.state.combat.inProgress || this.state.combat.turnLocked || this.state.combat.pheroUsed) return;
                this.state.combat.turnLocked = true; this.state.combat.pheroUsed = true; 
                this.hidePheroMenu(); document.querySelectorAll('#action-buttons button').forEach(b => b.disabled = true);
                const e = this.state.currentEncounter;
                try {
                if(type === 'frenzy') {
                    this.log(`🔴 散發狂暴素！全場幼體與生態結構陷入混亂！`, "log-skill"); await this.sleep(600);
                    if(this.state.combat.minions.length > 0) {
                        this.log(`幼體在狂暴素作用下發狂，反咬了 Boss！`, "log-dmg");
                        e.hp -= 30 * this.state.combat.minions.length; this.addFatigue(20);
                        if(e.habit === 'symbiosis') { this.state.player.hp = Math.min(Math.floor(this.state.player.maxHp * 1.5), this.state.player.hp + 30); this.log(`共生花體系被氣味混亂，轉而治癒了你！`, "log-heal"); }
                        this.state.combat.minions = []; this.renderEcologyUI();
                    } else this.log(`但場上沒有幼體...`, "log-sys");
                } else if(type === 'lure') {
                    if (e.id === 'boss_toad') {
                        this.log(`🟢 散發誘食素！引來了滿天飛蟲！`, "log-skill"); await this.sleep(600);
                        this.log(`🐸 巨蟾看見最愛的飛蟲，忘記了戰鬥，瘋狂進食！`, "log-eco"); await this.sleep(600);
                        this.log(`巨蟾吃飽喝足，心滿意足地跳回了泥沼深處。`, "log-heal"); this.winEncounter('生態餵食'); return;
                    }
                    this.log(`🟢 散發誘食素！強大而致命的捕食天敵在荒野盤旋！`, "log-skill"); await this.sleep(600);
                    if(this.state.combat.minions.length > 0) {
                        this.log(`捕食鳥俯衝掠過，瞬間啄食了所有幼體！Boss 大受震懾，疲勞激增！`, "log-hunt");
                        this.state.combat.minions = []; this.renderEcologyUI(); this.addFatigue(50);
                    } else { this.log(`捕食天敵發現沒有獵物，在空中不甘地嘶鳴一聲離開了。`, "log-sys"); }
                } else if(type === 'repel') {
                    this.log(`🔵 散發強烈驅逐素！令人極度不適的化學迷霧封鎖戰場！`, "log-skill"); await this.sleep(600);
                    this.addFatigue(30);
                    if (this.state.combat.bossNestGuard) { this.state.combat.bossNestGuard = false; e.def -= 20; this.log(`巨甲蟲因劇烈氣味被驅離巢穴！`, 'log-hunt'); }
                    if (this.state.combat.bossStealth) { this.state.combat.bossStealth = false; this.log(`迷霧破壞了隱形獵手的肌體擬態！`, 'log-hunt'); }
                    if (e.habit === 'counter') { 
                        this.state.combat.bossCounter = 0; this.state.combat.ironInterrupts++; this.log(`鋼鐵巨蟹被熏得暈頭轉向，蓄力被打斷！`, 'log-hunt'); 
                        if(this.state.combat.ironInterrupts >= 3) { await this.sleep(600); this.log(`🦀 鋼鐵巨蟹屢次被打斷蓄力，認可了你的技巧，主動收起雙螯讓出了道路。`, 'log-eco'); this.winEncounter('懾服巨蟹'); return; }
                    }
                    if (e.habit === 'undead') { 
                        e.habit = 'none'; this.log(`宿主體內的寄生中樞被驅逐素完全殺死！`, 'log-hunt'); await this.sleep(600);
                        if (e.id === 'boss_host') { this.log(`🧟 宿主失去了寄生蟲的控制，重獲自由離開了戰場。`, 'log-eco'); this.winEncounter('解除寄生'); return; }
                    }
                }
                
                this.updateCombatBars(); if(await this.checkDeath()) return; await this.processEnemyTurnSafe(false);
                } finally { this.state.combat.turnLocked = false; }
            },

            combatTurn: async function(actionType) {
                if(!this.state.combat.inProgress || this.state.combat.turnLocked) return;
                this.state.combat.turnLocked = true;
                const p = this.state.player, e = this.state.currentEncounter, eq = p.equippedTraits;
                
                if(actionType === 'skill') { const cost = Math.floor(p.maxHp * 0.1); if(p.hp <= cost) { this.log("生命不足以釋放毒技！", "log-sys"); this.state.combat.turnLocked = false; return; } }

                document.querySelectorAll('#action-buttons button').forEach(b => b.disabled = true);
                
                // 記錄演化數據
                eq.forEach(t => { this.state.traitUsage[t] = (this.state.traitUsage[t] || 0) + 1; });

                try {
                    this.state.combat.turnCount++; let pDefending = false;

                    if(actionType === 'burst') {
                        await this.executeBurst();
                    } else if(actionType === 'terrain') {
                        await this.executeTerrain();
                        if (e.id === 'boss_vine' && this.state.combat.terrain.effect === 'poison') {
                            await this.sleep(600); this.log(`🌿 劇烈的毒草爆炸瞬間燒毀了嗜血藤蔓脆弱的共生根系！藤蔓枯萎進入了長眠。`, 'log-eco'); this.winEncounter('環境破壞'); return;
                        }
                    } else if(actionType === 'defend') {
                        pDefending = true; this.log(`➤ ${p.name} 採取防禦姿態。`); await this.sleep(400);
                        if (eq.includes('spore') && this.state.combat.minions.length > 0) {
                            let infectedAny = false; this.state.combat.minions.forEach(m => { if(!m.infected) { m.infected = true; infectedAny = true; } });
                            if (infectedAny) { this.log(`🍄 散發防禦孢子，感染了靠近的幼體！`, 'log-skill'); this.renderEcologyUI(); }
                        }
                    } else {
                        let dmgMultiplier = 1;
                        if(actionType === 'skill') { const cost = Math.floor(p.maxHp * 0.1); p.hp -= cost; dmgMultiplier = 1.8; this.log(`➤ 消耗 ${cost} 生命釋放【極限毒技】！`, "log-skill"); } 
                        else { this.log(`➤ ${p.name} 發動攻擊！`, "log-atk"); }
                        await this.sleep(300);
                        
                        if(this.state.combat.bloodBurstActive) dmgMultiplier *= 2;
                        const huntMult = eq.includes('hunt') ? (this.getPrefMultiplier('hunt') > 1 ? 0.6 : 0.4) : 0;
                        dmgMultiplier *= (1 + huntMult * this.state.combat.playerHuntStacks);
                        if(this.state.combat.bossStunTurns > 0) dmgMultiplier *= 2.0;

                        const hits = eq.includes('proliferate') ? 2 : 1;
                        for(let i=0; i<hits; i++) {
                            if(e.hp<=0) break;
                            let baseAtk = Math.floor(p.atk * dmgMultiplier * (hits===2?0.6:1));
                            
                            this.applyTraitWithAdaptation('corrosive', '腐蝕', (eff) => { 
                                if(eq.includes('corrosive')) {
                                    this.state.combat.enemyDefDebuff += (1*eff); 
                                    if(e.id === 'boss_beetle' && this.state.combat.bossNestGuard) { this.state.combat.bossNestGuard = false; e.def -= 20; this.log(`💥 極高濃度的酸蝕徹底腐蝕了巢穴防線，守巢破除！`, 'log-skill'); }
                                }
                            });
                            
                            let effectiveDef = e.def;
                            if (eq.includes('pierce')) { effectiveDef = Math.floor(effectiveDef * (this.getPrefMultiplier('pierce') > 1 ? 0.3 : 0.5)); if(Math.random()<0.3) this.state.combat.enemyBleedStacks++; }
                            let eDef = this.state.combat.defShattered ? 0 : Math.max(0, effectiveDef - this.state.combat.enemyDefDebuff); 
                            
                            let dmg = Math.max(1, baseAtk - eDef);
                            dmg = Math.floor(dmg * (1 + this.state.combat.enemyDefDebuff * 0.05));

                            let evadeChance = 0; if(e.traits.includes('mimicry')) evadeChance += 0.2; if(this.state.combat.bossStealth) evadeChance += 0.55; if(this.state.combat.bossStunTurns > 0) evadeChance = 0;
                            if(Math.random() < evadeChance) { this.log(`[閃避] 獵物身形模糊，攻擊被完美閃避！`); continue; }
                            if(e.traits.includes('hard_shell')) dmg = Math.floor(dmg*0.8);

                            e.hp -= dmg; this.log(`💥 造成 ${dmg} 傷害！`, "log-dmg");

                            if(eq.includes('lifesteal')) { if(this.state.weather !== 'drought') { let healMult = this.state.combat.bloodBurstActive ? 2.0 : 0.5; p.hp = Math.min(Math.floor(p.maxHp*1.5), p.hp + Math.floor(dmg * healMult)); } }
                            
                            let toxicRate = actionType === 'skill' ? 1.0 : 0.6; if (this.state.weather === 'toxic_rain') toxicRate = 1.0;
                            if(eq.includes('toxic') && Math.random() < toxicRate) { this.applyTraitWithAdaptation('toxic', '劇毒', (eff) => { let stacks = 2 * eff * this.getPrefMultiplier('toxic'); if(this.state.weather === 'toxic_rain') stacks *= 2.0; this.state.combat.enemyPoison += Math.ceil(stacks); }); }
                            
                            let paralyzeRate = actionType === 'skill' ? 1.0 : 0.4;
                            if(eq.includes('paralyze') && Math.random() < paralyzeRate) { 
                                this.applyTraitWithAdaptation('paralyze', '麻痺', (eff) => { 
                                    e.def = Math.max(0, e.def - 1); this.log('[麻痺] 電擊瓦解了敵方防禦結構！', "log-skill");
                                    if(e.isBoss) { 
                                        this.addFatigue(20 * eff * this.getPrefMultiplier('paralyze')); 
                                        if (e.habit === 'counter') { this.state.combat.bossCounter = 0; this.state.combat.ironInterrupts++; this.log(`[麻痺] 鋼鐵巨蟹蓄力被打斷！`, 'log-skill'); }
                                    } else { this.state.combat.enemyStunned = true; } 
                                }); 
                            }
                            
                            if(eq.includes('bleed')) { this.applyTraitWithAdaptation('bleed', '流血', (eff) => { this.state.combat.enemyBleedStacks += Math.ceil(1*eff); }); }
                            if(eq.includes('parasite')) {
                                this.applyTraitWithAdaptation('parasite', '寄生', (eff) => { this.state.combat.enemyParasiteStacks += Math.ceil(1*eff * this.getPrefMultiplier('parasite')); if(e.isBoss) this.addFatigue(5 * eff); });
                                if (this.state.combat.minions.length > 0) { this.state.combat.minions.forEach(m => m.infected = true); this.log(`🐛 寄生蟲感染幼體！`, 'log-skill'); this.renderEcologyUI(); }
                            }
                            await this.sleep(300);
                        }
                    }

                    if (e.id === 'boss_iron' && this.state.combat.ironInterrupts >= 3) {
                        await this.sleep(600); this.log(`🦀 鋼鐵巨蟹屢次被打斷蓄力，認可了你的技巧，主動收起雙螯讓出了道路。`, 'log-eco'); this.winEncounter('懾服巨蟹'); return;
                    }

                    this.updateCombatBars(); if(await this.checkDeath()) return; await this.processEnemyTurnSafe(pDefending);

                } catch(err) { console.error(err); this.unlockButtons(); }
                finally { this.state.combat.turnLocked = false; }
            },

            executeTerrain: async function() {
                const t = this.state.combat.terrain; this.state.combat.terrainUsed = true; document.getElementById('btn-terrain').style.display = 'none';
                this.log(`🗺️ ${t.msg}`, 'log-hunt'); document.querySelector('.terrain-icon').style.filter = 'grayscale(100%)'; await this.sleep(800);
                if(t.effect === 'poison') this.state.combat.enemyPoison += 20; else if (t.effect === 'heal') this.state.player.hp = Math.max(this.state.player.hp, this.state.player.maxHp); else if (t.effect === 'fatigue') this.addFatigue(50);
                this.updateCombatBars();
            },

            executeBurst: async function() {
                const c = this.state.combat.activeCombo, e = this.state.currentEncounter; this.state.combat.burstUsed = true;
                if(!this.state.discoveredCombos.includes(c.id)) this.state.discoveredCombos.push(c.id);
                this.log(`🌟 觸發共生爆發：【${c.name}】！`, "log-boss"); await this.sleep(800);

                if(c.id === 'plague') {
                    this.state.combat.enemyPoison *= 2; this.state.combat.enemyBleedStacks *= 2;
                    if(this.state.combat.minions.length > 0) { this.state.combat.minions.forEach(m => m.infected = true); this.log(`瘟疫擴散！毒素翻倍並感染全場幼體！`, "log-skill"); this.renderEcologyUI(); }
                    else this.log(`瘟疫擴散！毒素層數瞬間翻倍！`, "log-skill");
                } else if(c.id === 'blood') { this.state.combat.bloodBurstActive = true; this.log(`進入鮮血渴望狀態！`, "log-heal"); } 
                else if(c.id === 'domain') { e.def = 0; this.state.combat.defShattered = true; this.state.combat.bossFatigue = 100; this.addFatigue(0); this.log(`絕對領域展開！防禦崩潰，Boss 強制倒地滿疲勞！`, "log-hunt"); } 
                else if(c.id === 'thorns') { this.state.combat.thornsBurstActive = true; this.log(`化身不朽反傷裝甲！`, "log-heal"); }
                document.getElementById('btn-burst').style.display = 'none'; this.updateCombatBars(); this.saveProgress();
            },

            processEnemyTurn: async function(pDefending) {
                const p = this.state.player, e = this.state.currentEncounter, eq = p.equippedTraits;
                let sporeTriggered = false;
                
                if (this.state.combat.minions.length > 0) {
                    let newMinions = [];
                    for(let i=0; i<this.state.combat.minions.length; i++) {
                        let m = this.state.combat.minions[i];
                        if (m.infected) {
                            this.log(`🐛 幼體被寄生控制，發起反叛撕咬 Boss！`, 'log-skill');
                            let backbiteDmg = 15; if (e.id === 'boss_queen' && eq.includes('spore')) { backbiteDmg = 35; this.log(`孢子在蜂群中引發猛烈爆破！`, 'log-skill'); }
                            e.hp -= backbiteDmg; this.addFatigue(10); await this.sleep(300);
                        } else {
                            this.log(`⚠️ 幼體襲擊！`, 'log-dmg');
                            let mDmg = pDefending ? 2 : 5; p.hp -= mDmg;
                            if (eq.includes('spore') && mDmg > 0 && !sporeTriggered) { sporeTriggered = true; }
                            newMinions.push(m); await this.sleep(300);
                        }
                    }
                    this.state.combat.minions = newMinions; 
                    if(p.hp <= 0 || e.hp <= 0) { this.renderEcologyUI(); this.updateCombatBars(); return; }
                }

                if(this.state.combat.bossStunTurns > 0) {
                    this.log(`💤 ${e.name} 陷入疲勞倒地中，無法行動！`, "log-hunt"); this.state.combat.bossStunTurns--;
                    if(this.state.combat.bossStunTurns === 0) this.log(`⚠️ ${e.name} 搖晃著爬了起來！`, "log-sys");
                    this.updateCombatBars(); return;
                }

                if(this.state.combat.enemyStunned) { this.log(`⚡ ${e.name} 被麻痺，無法行動！`, "log-skill"); this.state.combat.enemyStunned = false; return; }

                if(e.habit === 'flee' && (e.hp / e.maxHp) < 0.25 && this.state.combat.bossStunTurns === 0) {
                    this.log(`💨 疫病巨蟾感到恐懼，迅速鑽入泥沼逃跑了！`, "log-sys"); await this.sleep(1000); this.endEncounter(true); return;
                }

                this.log(`▼ ${e.name} 行動！`, "log-sys"); await this.sleep(400);

                let eAtk = e.atk; let summonChance = this.state.weather === 'breeding' ? 0.8 : 0.4;
                if (e.isBoss && Math.random() < summonChance && this.state.combat.minions.length < 3) {
                    this.log(`🦠 Boss 釋放幼體！`, 'log-boss'); let initInfect = (this.state.weather === 'spore_season' && eq.includes('spore'));
                    this.state.combat.minions.push({ infected: initInfect }); if(initInfect) this.log(`[環境孢子] 剛出生的幼體在粉塵中瞬間被孢子寄生控制！`, 'log-skill'); await this.sleep(400);
                }

                if (e.habit === 'counter') { this.state.combat.bossCounter += 2; eAtk += this.state.combat.bossCounter; this.log(`[蓄力] 巨蟹攻擊力不斷積蓄攀升至 ${eAtk}！`, 'log-boss'); }

                let poisonWeakness = Math.max(0.5, 1 - (this.state.combat.enemyPoison * 0.05));
                if (poisonWeakness < 1) { eAtk = Math.floor(eAtk * poisonWeakness); this.log(`[神經衰弱] 劇毒發作，敵方攻擊力降低至 ${eAtk}`, "log-skill"); }

                let dmg = eAtk;
                
                if(eq.includes('mimicry') && Math.random()<0.2) { this.log(`[擬態] 完美閃避，並發動了致命反擊！`, 'log-skill'); e.hp -= Math.floor(p.atk * 1.5); this.updateCombatBars(); return; }
                if(eq.includes('hard_shell')) {
                    dmg = Math.floor(dmg*(this.getPrefMultiplier('hard_shell')>1?0.7:0.8));
                    if (dmg < p.maxHp * 0.05) { this.log(`[硬甲] 攻擊太弱，被硬甲完全彈開！(免疫傷害)`, "log-skill"); dmg = 0; }
                }
                
                if(pDefending) dmg = Math.floor(dmg*0.5);

                dmg = Math.max(1, dmg - p.def); 
                if (dmg > 0) p.hp -= dmg; 
                if (dmg > 0) this.log(`🩸 受到 ${dmg} 傷害！`, "log-dmg");
                
                if(eq.includes('acid_blood') && dmg > 0) { let reflect = Math.floor(dmg * (this.getPrefMultiplier('acid_blood')>1?0.30:0.20)); if(reflect > 0) { e.hp -= reflect; this.log(`[酸血] 濺射強酸液，反彈 ${reflect} 傷害！`, "log-skill"); } }
                if(this.state.combat.thornsBurstActive && dmg > 0) { let reflect = dmg * 3; e.hp -= reflect; this.state.combat.enemyBleedStacks += 2; this.log(`[荊棘] 狂暴刺甲反彈了 ${reflect} 點真實傷害並撕裂其外殼！`, "log-hunt"); }

                if (dmg > 0 && eq.includes('spore')) sporeTriggered = true;
                if (sporeTriggered) {
                    this.state.combat.enemyPoison += 2; let infectedAny = false;
                    this.state.combat.minions.forEach(m => { if(!m.infected) { m.infected = true; infectedAny = true; } });
                    if(infectedAny) this.log(`🍄 受擊散發孢子反噬！感染了全場幼體！`, "log-skill");
                }

                if(e.traits && e.traits.includes('toxic') && Math.random()<0.4) this.state.combat.playerPoison += 2;
                
                this.renderEcologyUI(); await this.sleep(200);
            },

            processEndTurnEffects: async function() {
                const p = this.state.player, e = this.state.currentEncounter, eq = p.equippedTraits;
                let dotMsg = [];

                if(eq.includes('regen') && this.state.weather !== 'drought') { 
                    let r = this.getPrefMultiplier('regen')>1?0.15:0.10; let h=Math.floor(p.maxHp*r); p.hp=Math.max(p.hp, Math.min(p.maxHp, p.hp+h)); dotMsg.push(`[再生] 回復 ${h}`); 
                    if(this.state.combat.playerPoison > 0) { this.state.combat.playerPoison = 0; dotMsg.push(`<span style="color:#4CAF50;">[再生] 自體淨化了所有劇毒</span>`); }
                } else if(eq.includes('regen') && this.state.weather === 'drought') { dotMsg.push(`<span class="log-resist">[再生] 因乾旱環境無法發揮治療作用</span>`); }
                
                if(eq.includes('hunt')) this.state.combat.playerHuntStacks++;

                if(this.state.combat.enemyBleedStacks>0) { let d=this.state.combat.enemyBleedStacks*4; e.hp-=d; dotMsg.push(`[流血] ${d} 真實傷害`); if(e.isBoss) this.addFatigue(this.state.combat.enemyBleedStacks * 2); }
                
                if(this.state.combat.enemyParasiteStacks>0) { 
                    let d=this.state.combat.enemyParasiteStacks*3; 
                    if (e.id === 'boss_toad') { d *= 2; e.hp -= d; p.hp = Math.min(Math.floor(p.maxHp*1.5), p.hp + d); dotMsg.push(`<span class="log-weakness">[寄生] 寄生蟲瘋狂蠶食巨蟾組織，反噬汲取 ${d} 點 HP！</span>`); } 
                    else { e.hp -= d; p.hp = Math.min(Math.floor(p.maxHp*1.5), p.hp + d); dotMsg.push(`[寄生] 汲取 ${d}`); }
                }
                
                if(this.state.combat.enemyPoison>0) { let d=this.state.combat.enemyPoison; e.hp-=d; dotMsg.push(`[劇毒] 毒發 ${d} 傷害`); this.state.combat.enemyPoison=Math.max(0, this.state.combat.enemyPoison-1); }
                if(this.state.combat.playerPoison>0) { let d=this.state.combat.playerPoison; p.hp-=d; dotMsg.push(`⚠️ 毒發 ${d} 傷害`); this.state.combat.playerPoison=Math.max(0, this.state.combat.playerPoison-1); }
                
                if(e.habit === 'symbiosis' && this.state.combat.minions.length > 0) { let heal = 15 * this.state.combat.minions.length; e.hp = Math.min(e.maxHp, e.hp + heal); dotMsg.push(`<span style="color:var(--boss-color);">[共生] 花朵吐出精華治癒了 Boss ${heal} 點 HP！</span>`); }

                if (e.id === 'boss_queen') {
                    if (this.state.combat.minions.length === 0) {
                        this.state.combat.queenAloneTurns++;
                        if (this.state.combat.queenAloneTurns >= 3) {
                            this.log(`🐝 女王長時間沒有感應到幼體的氣息，認為族群已覆滅，黯然撤退了。`, "log-eco");
                            this.updateCombatBars(); await this.sleep(1000); this.winEncounter('族群覆滅'); return;
                        }
                    } else { this.state.combat.queenAloneTurns = 0; }
                }

                if(dotMsg.length>0) { this.log(`-- 狀態結算 --<br>` + dotMsg.join('<br>'), "log-sys"); this.updateCombatBars(); await this.sleep(500); }
            },

            winEncounter: function(reasonText) {
                const p = this.state.player, e = this.state.currentEncounter;
                this.state.combat.inProgress = false; document.getElementById('action-buttons-container').style.display = 'none';
                
                this.log(`✨ 目標達成：${reasonText}！`, "log-eco");
                if(e.isBoss) {
                    if (!this.state.defeatedBosses.includes(e.id)) this.state.defeatedBosses.push(e.id);
                    this.log(`👑 獲得了生態霸主圖鑑紀錄。`, "log-boss");
                    // ★ 記錄世界記憶
                    this.state.bossHistory[e.id] = reasonText;
                }
                
                let heal = 20; p.hp = Math.max(p.hp, Math.min(p.maxHp, p.hp + heal)); this.log(`收集了現場遺留的基因物質，回復 ${heal} 點 HP。`);
                
                this.saveProgress(); document.getElementById('btn-return').style.display = 'block';
            },

            checkDeath: async function() {
                const p = this.state.player, e = this.state.currentEncounter;
                // 玩家死亡優先判定：若雙方同時陣亡（例如毒/流血同時結算），
                // 玩家的死亡永遠優先生效，避免「Boss死了所以算我贏」但玩家其實已經 0 HP 的卡死狀態。
                if(p.hp <= 0) { p.hp = 0; this.updateCombatBars(); await this.metamorphosis(); return true; }
                if(e.hp <= 0) {
                    e.hp = 0; this.updateCombatBars(); 
                    if(e.habit === 'undead') { this.log(`⚠️ 寄生中樞強行電擊心臟！Boss 滿血復活了！`, "log-boss"); e.hp = e.maxHp; e.habit = 'none'; return false; }
                    this.log(`💀 狩獵成功！${e.name} 倒下了！`, "log-heal"); this.winEncounter('擊敗目標'); return true;
                }
                return false;
            },

            endEncounter: function(fled = false) { 
                this.state.combat.inProgress = false; document.getElementById('action-buttons-container').style.display = 'none'; 
                if(!fled && this.state.player.hp > 0 && this.state.currentEncounter.hp <= 0) {
                    let heal = 20; this.state.player.hp = Math.max(this.state.player.hp, Math.min(this.state.player.maxHp, this.state.player.hp + heal)); this.log(`吞食殘骸，回復 ${heal} 點 HP。`);
                }
                document.getElementById('btn-return').style.display = 'block'; 
            },

            metamorphosis: async function() {
                this.state.combat.inProgress = false; document.getElementById('action-buttons-container').style.display = 'none';
                this.log(`☠️ 受到致命傷害...`, "log-dmg"); await this.sleep(1000);
                
                this.state.partner = null; // 清空夥伴
                this.isReincarnating = true;
                
                this.log(`☠️ 毒物之核在荒野中飄蕩，等待下一個宿主...`, "log-skill"); await this.sleep(1500);
                this.saveProgress(); 
                
                const btn = document.getElementById('btn-return'); 
                btn.innerText = "重塑肉殼 (重新選擇主毒物)"; 
                btn.onclick = () => {
                    document.getElementById('btn-select-back').style.display = 'none';
                    Game.switchPanel('panel-select');
                };
                btn.style.display = 'block';
            },

            returnToCamp: function() { 
                document.getElementById('btn-return').innerText = "繼續"; 
                document.getElementById('btn-return').onclick = () => Game.returnToCamp();
                document.getElementById('btn-select-back').style.display = 'block';
                this.state.currentEncounter = null; this.updateCampUI(); this.switchPanel('panel-camp'); 
            },

            unlockButtons: function() { if(this.state.combat.inProgress) { document.getElementById('action-buttons-container').style.display = 'block'; document.querySelectorAll('#action-buttons button').forEach(b => b.disabled = false); this.toggleActionButtons('combat'); } },

            initCanvasEffects: function() {
                const cvs = document.getElementById('bg-canvas'), ctx = cvs.getContext('2d');
                let w = window.innerWidth, h = window.innerHeight; cvs.width = w; cvs.height = h;
                window.addEventListener('resize', () => { cvs.width=w=window.innerWidth; cvs.height=h=window.innerHeight; });
                const pts = Array.from({length: 35}, () => ({ x:Math.random()*w, y:Math.random()*h, r:Math.random()*2+1, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-1)*0.5-0.1, baseHue: Math.random()>0.5 }));
                const weatherTints = {
                    normal:      { top:'#040704', bot:'#0a120a', a:'rgba(76,175,80,0.2)',  b:'rgba(52,152,219,0.1)' },
                    toxic_rain:  { top:'#06090c', bot:'#0d1a08', a:'rgba(120,200,40,0.3)', b:'rgba(139,0,139,0.18)' },
                    drought:     { top:'#0c0a04', bot:'#1a1206', a:'rgba(243,156,18,0.22)',b:'rgba(120,90,30,0.12)' },
                    spore_season:{ top:'#08060c', bot:'#120a18', a:'rgba(155,89,182,0.25)',b:'rgba(180,180,220,0.12)' },
                    breeding:    { top:'#0c0608', bot:'#180a10', a:'rgba(255,105,180,0.2)',b:'rgba(76,175,80,0.15)' }
                };
                const ani = () => {
                    const tint = weatherTints[(Game.state && Game.state.weather) || 'normal'] || weatherTints.normal;
                    ctx.clearRect(0,0,w,h); let grad = ctx.createLinearGradient(0,0,0,h); grad.addColorStop(0,tint.top); grad.addColorStop(1,tint.bot); ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);
                    pts.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.y<-10)p.y=h+10; if(p.x<-10)p.x=w+10; if(p.x>w+10)p.x=-10; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle = p.baseHue ? tint.a : tint.b; ctx.fill(); }); 
                    requestAnimationFrame(ani);
                };
                ani();
            }
        };
        window.onload = () => Game.initApp();
    </script>
</body>
