<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>冒險者公會物語</title>
<style>
:root{
  --bg:#15110c; --panel:#241b13; --panel2:#2e2316; --border:#7a5c34;
  --gold:#d9a544; --text:#ecdfc4; --dim:#a8967a; --danger:#c0392b; --good:#5fa85f;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Heiti TC','Microsoft JhengHei',sans-serif;
  overscroll-behavior:none; -webkit-tap-highlight-color:transparent; user-select:none;}
button{font-family:inherit;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;}

/* ---- topbar ---- */
#topbar{flex-shrink:0;background:linear-gradient(#1c150e,#241b13);border-bottom:2px solid var(--border);padding:6px 10px;}
.topbar-row1{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--gold);font-weight:bold;}
.topbar-row2{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:12px;}
.stat-group{display:flex;gap:10px;}
.stat{display:flex;align-items:center;gap:3px;color:var(--text);}
.speed-controls{display:flex;gap:3px;}
.speed-controls button{background:var(--panel2);color:var(--dim);border:1px solid var(--border);border-radius:6px;
  padding:3px 7px;font-size:11px;}
.speed-controls button.active{background:var(--gold);color:#1a1410;font-weight:bold;}

/* ---- scene ---- */
#sceneWrap{flex-shrink:0;height:148px;position:relative;border-bottom:1px solid var(--border);background:#000;}
#scene{width:100%;height:100%;display:block;}
#ticker{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);color:#fce8b8;font-size:11px;
  padding:3px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#ticker.flash{animation:flashIn .4s;}
@keyframes flashIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ---- content ---- */
#content{flex:1;overflow-y:auto;padding:10px 10px 16px;-webkit-overflow-scrolling:touch;}
.section-title{font-size:13px;color:var(--gold);font-weight:bold;margin:10px 0 6px;display:flex;justify-content:space-between;}
.section-sub{font-size:12px;color:var(--gold);margin:10px 0 4px;border-top:1px solid var(--border);padding-top:8px;}
.hint{font-size:11px;color:var(--dim);font-weight:normal;}
.empty-hint{font-size:12px;color:var(--dim);text-align:center;padding:14px 0;}
.hscroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}

/* ---- recruit card ---- */
.recruit-card{flex-shrink:0;width:140px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px;}
.rc-name{font-size:13px;font-weight:bold;}
.rc-class{font-size:11px;margin:2px 0;}
.rc-traits{font-size:10px;color:var(--dim);margin-bottom:6px;height:14px;overflow:hidden;}
.btn{background:var(--gold);color:#1a1410;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:bold;width:100%;}
.btn.small{padding:5px 8px;font-size:11px;width:auto;}
.btn.tiny{padding:3px 6px;font-size:10px;width:auto;border-radius:6px;}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn.danger{background:var(--danger);color:#fff;}

/* ---- roster ---- */
.roster-list{display:flex;flex-direction:column;gap:8px;}
.adv-card{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:8px 10px;}
.adv-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:bold;color:#1a1410;flex-shrink:0;font-size:14px;}
.adv-info{flex:1;min-width:0;}
.adv-name{font-size:13px;font-weight:bold;}
.adv-lv{font-size:11px;color:var(--dim);font-weight:normal;}
.adv-sub{font-size:11px;color:var(--dim);margin-top:2px;}
.adv-power{font-size:13px;color:var(--gold);font-weight:bold;}

.status-idle{color:#7fd17f;}
.status-onQuest{color:#e0b04a;}
.status-injured{color:#e08a4a;}
.status-disabled{color:#c08ad0;}
.status-retired{color:#888;}
.status-dead{color:#777;text-decoration:line-through;}
.status-betrayed{color:#e05a4a;}

/* ---- quest ---- */
.quest-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 10px;margin-bottom:8px;}
.quest-card.active{border-color:var(--gold);}
.q-head{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.q-name{font-size:13px;font-weight:bold;}
.q-desc{font-size:11px;color:var(--dim);margin-bottom:4px;}
.q-meta{font-size:11px;color:var(--dim);margin:4px 0;}
.q-party{font-size:11px;color:var(--text);margin-bottom:4px;}
.q-eta{font-size:11px;color:var(--dim);margin-top:3px;}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;
  font-size:11px;font-weight:bold;color:#1a1410;flex-shrink:0;}
.rank-E{background:#9b9b9b;} .rank-D{background:#6fbf6f;} .rank-C{background:#5fa8d8;}
.rank-B{background:#b07fe0;} .rank-A{background:#e0a04a;} .rank-S{background:linear-gradient(135deg,#ff5050,#ffd24a);}

.progress-bar{height:8px;background:#1a1410;border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.progress-bar.small{height:5px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#d9a544,#f4d35e);}

/* ---- equipment ---- */
.item-card{background:var(--panel);border:1px solid var(--border);border-left-width:4px;border-radius:8px;
  padding:8px 10px;margin-bottom:8px;}
.item-name{font-size:13px;font-weight:bold;}
.item-sub{font-size:11px;color:var(--dim);margin:2px 0;}
.item-stats{font-size:11px;color:#9fd89f;margin-bottom:6px;}
.item-actions{display:flex;gap:6px;}

/* ---- world ---- */
.kingdom-list{display:flex;flex-direction:column;gap:6px;}
.kingdom-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:7px 10px;}
.k-name{font-size:12px;font-weight:bold;}
.k-bar{height:6px;background:#1a1410;border-radius:3px;margin:4px 0;overflow:hidden;}
.k-fill{height:100%;background:linear-gradient(90deg,#5fa85f,#9fd89f);}
.k-status{font-size:10px;color:var(--dim);}
.world-event-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;
  margin-bottom:6px;font-size:12px;}
.decision-card{background:#2e2014;border:1px solid var(--gold);border-radius:10px;padding:10px;margin-bottom:8px;}
.d-title{font-size:13px;font-weight:bold;color:var(--gold);}
.d-desc{font-size:12px;margin:5px 0 8px;}
.d-choices{display:flex;flex-direction:column;gap:6px;}

/* ---- history ---- */
.chronicle-list{display:flex;flex-direction:column;gap:5px;}
.chron-item{font-size:12px;background:var(--panel);border-left:3px solid var(--border);border-radius:4px;
  padding:5px 8px;line-height:1.45;}
.chron-date{color:var(--dim);font-size:10px;display:block;margin-bottom:1px;}

/* ---- tabbar ---- */
#tabbar{flex-shrink:0;display:flex;background:#1c150e;border-top:2px solid var(--border);
  padding-bottom:max(4px, env(safe-area-inset-bottom));}
.tabbtn{flex:1;background:none;border:none;color:var(--dim);font-size:11px;padding:8px 0 6px;position:relative;}
.tabbtn.active{color:var(--gold);}
.tabbtn.has-badge::after{content:'';position:absolute;top:4px;right:30%;width:7px;height:7px;border-radius:50%;
  background:var(--danger);}

/* ---- modal ---- */
#modalRoot{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;z-index:50;}
#modalRoot.show{pointer-events:auto;opacity:1;}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.6);}
.modal-sheet{position:absolute;left:0;right:0;bottom:0;max-height:82vh;overflow-y:auto;background:var(--panel);
  border-radius:16px 16px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .25s;border-top:2px solid var(--gold);}
#modalRoot.show .modal-sheet{transform:translateY(0);}
.modal-header{font-size:16px;font-weight:bold;color:var(--gold);margin-bottom:8px;}
.modal-sub{font-size:12px;color:var(--dim);font-weight:normal;margin-left:6px;}
.modal-body{font-size:12px;}
.modal-actions{display:flex;gap:8px;margin-top:12px;}
.status-line{margin-bottom:8px;color:var(--dim);}
.death-line{color:var(--danger);margin-bottom:8px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-row span{font-size:11px;color:var(--dim);flex-shrink:0;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.stat-cell{background:var(--panel2);border-radius:6px;padding:5px;text-align:center;}
.stat-cell span{display:block;font-size:10px;color:var(--dim);}
.stat-cell b{font-size:13px;color:var(--text);}
.traits-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.trait-chip{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:2px 9px;font-size:11px;}
.equip-row{display:flex;gap:6px;margin-bottom:6px;}
.equip-slot{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center;}
.slot-label{font-size:10px;color:var(--dim);}
.slot-item{font-size:11px;margin-top:2px;}
.skill-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
.skill-row{background:var(--panel2);border-radius:8px;padding:6px 8px;}
.skill-name{font-size:12px;margin-bottom:3px;}
.skill-lv{color:var(--dim);font-size:10px;}
.skill-row .btn.tiny{margin-top:4px;}
.rel-list{display:flex;flex-direction:column;gap:3px;margin-bottom:6px;}
.rel-row{font-size:11px;color:var(--dim);}
.history-list{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;}
.dispatch-power{font-size:13px;font-weight:bold;text-align:center;padding:6px;border-radius:8px;margin-bottom:8px;
  background:var(--panel2);}
.dispatch-power.good{color:#9fe89f;} .dispatch-power.ok{color:#f0c060;} .dispatch-power.bad{color:#f08070;}
.dispatch-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;}
.dispatch-row{display:flex;justify-content:space-between;background:var(--panel2);border:1px solid var(--border);
  border-radius:8px;padding:8px;font-size:12px;}
.dispatch-row.checked{border-color:var(--gold);background:#3a2d18;}

/* ---- toast ---- */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);background:#000;color:#fff;
  padding:8px 16px;border-radius:20px;opacity:0;transition:all .3s;z-index:100;font-size:13px;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---- 冒險實況 / 流派 / 命運 / 地下城 / 傳聞 (擴充功能) ---- */
.spec-tag{display:inline-block;background:linear-gradient(135deg,#7a4ea0,#c084fc);color:#fff;font-size:9px;
  padding:1px 6px;border-radius:8px;margin-left:3px;vertical-align:middle;}
.choice-badge{background:var(--danger);color:#fff;font-size:10px;padding:1px 7px;border-radius:8px;margin-left:auto;
  animation:pulseBadge 1.4s infinite;}
@keyframes pulseBadge{0%,100%{opacity:1;}50%{opacity:0.55;}}
.exp-latest{font-size:11px;color:var(--dim);background:var(--panel2);border-radius:6px;padding:5px 7px;margin:5px 0;
  line-height:1.4;}
.q-head{position:relative;}
.trait-chip.mutated{background:#3a1820;border-color:var(--danger);color:#ff9b9b;}
.slot-special{font-size:9px;color:#ffb3c8;margin-top:2px;}
.special-tag{color:#ffb3c8;}
.fate-card{background:linear-gradient(135deg,#241b13,#3a2a44);border:1px solid #7a5ca0;border-radius:10px;
  padding:10px;margin-bottom:6px;}
.fate-desc{font-size:11px;color:var(--dim);margin-bottom:8px;line-height:1.5;}
.dungeon-card{border-left:3px solid #8a4a3a;}
.dungeon-fill{background:linear-gradient(90deg,#8a3a3a,#d87a4a);}
.rumor-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 10px;
  margin-bottom:6px;}
.rumor-text{font-size:12px;font-style:italic;color:var(--text);margin-bottom:6px;}
.chron-item.epoch{border-left-color:var(--gold);background:#241c10;font-weight:bold;}
.world-history{margin-bottom:6px;}
</style>
</head>

<body>
<div id="app">
  <div id="topbar">
    <div class="topbar-row1">
      <span id="guildNameDisplay">冒險者公會</span>
      <span id="dateDisplay">第1年1月1日</span>
    </div>
    <div class="topbar-row2">
      <div class="stat-group">
        <span class="stat">💰<span id="goldVal">0</span></span>
        <span class="stat">⭐<span id="repVal">0</span></span>
        <span class="stat">🧑‍🤝‍🧑<span id="memberVal">0</span></span>
      </div>
      <div class="speed-controls" id="speedControls">
        <button data-speed="0">⏸</button>
        <button data-speed="1" class="active">1x</button>
        <button data-speed="2">2x</button>
        <button data-speed="4">4x</button>
      </div>
    </div>
  </div>
  <div id="sceneWrap">
    <canvas id="scene"></canvas>
    <div id="ticker">📰 歡迎來到冒險者公會物語</div>
  </div>
  <div id="content"></div>
  <div id="tabbar">
    <button class="tabbtn active" data-tab="guild">🏰<br>公會</button>
    <button class="tabbtn" data-tab="quest">📜<br>任務</button>
    <button class="tabbtn" data-tab="equip">⚔️<br>裝備</button>
    <button class="tabbtn" data-tab="world">🌍<br>世界</button>
    <button class="tabbtn" data-tab="history">📖<br>紀錄</button>
  </div>
</div>
<div id="modalRoot"></div>

<script>
(function(){
'use strict';
/* =========================================================
   工具函式
========================================================= */
const RNG = Math.random;
function ri(min,max){ return Math.floor(RNG()*(max-min+1))+min; }
function rf(min,max){ return RNG()*(max-min)+min; }
function pick(arr){ return arr[Math.floor(RNG()*arr.length)]; }
function weightedPick(items){
  let total=0; for(const it of items) total+=it[1];
  let r=RNG()*total;
  for(const it of items){ if(r<it[1]) return it[0]; r-=it[1]; }
  return items[items.length-1][0];
}
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
let _idc=1;
function uid(){ return 'id'+(_idc++)+'_'+Math.random().toString(36).slice(2,8); }
function fill(tpl, ctx){
  if(!tpl) return '';
  return tpl.replace(/\{(\w+)\}/g, (m,k)=> (ctx && ctx[k]!==undefined) ? ctx[k] : m);
}
function sampleN(arr, n){
  const pool=arr.slice(); const out=[];
  for(let i=0;i<n && pool.length;i++){
    const idx=Math.floor(RNG()*pool.length);
    out.push(pool[idx]); pool.splice(idx,1);
  }
  return out;
}

/* =========================================================
   遊戲資料表
========================================================= */
const STAT_KEYS=['hp','atk','def','mag','spd','luk'];
const STAT_LABEL={hp:'生命',atk:'攻擊',def:'防禦',mag:'魔力',spd:'速度',luk:'幸運'};

const CLASS_DATA={
  '戰士':{base:{hp:120,atk:14,def:12,mag:2,spd:8,luk:5}, growth:{hp:14,atk:2.2,def:1.8,mag:0.2,spd:0.8,luk:0.5}, skills:['重擊','嘲諷','旋風斬','不屈意志'], color:'#e07b39', focus:['atk','hp'], specs:['狂戰士','劍聖']},
  '聖騎士':{base:{hp:130,atk:11,def:14,mag:8,spd:6,luk:5}, growth:{hp:15,atk:1.8,def:2.0,mag:1.0,spd:0.6,luk:0.5}, skills:['聖光斬','治癒之手','庇護結界','制裁審判'], color:'#f4d35e', focus:['def','hp'], specs:['聖殿執行官','曙光使徒']},
  '騎士':{base:{hp:125,atk:13,def:16,mag:3,spd:7,luk:6}, growth:{hp:15,atk:2.0,def:2.4,mag:0.3,spd:0.7,luk:0.5}, skills:['長槍突刺','盾牆','騎乘衝鋒','榮譽誓言'], color:'#a98467', focus:['def','atk'], specs:['圓桌騎士','黑甲執行者']},
  '遊俠':{base:{hp:95,atk:13,def:7,mag:3,spd:14,luk:8}, growth:{hp:10,atk:1.8,def:0.9,mag:0.3,spd:1.6,luk:0.8}, skills:['連射','陷阱術','鷹眼標記','荒野追蹤'], color:'#6a994e', focus:['spd','atk'], specs:['荒野獵手','風之箭使']},
  '盜賊':{base:{hp:85,atk:14,def:6,mag:2,spd:16,luk:10}, growth:{hp:9,atk:2.0,def:0.7,mag:0.2,spd:1.7,luk:1.0}, skills:['背刺','偷竊技巧','影遁','毒刃'], color:'#577590', focus:['spd','luk'], specs:['影盜之首','千面盜賊']},
  '刺客':{base:{hp:80,atk:17,def:5,mag:2,spd:17,luk:7}, growth:{hp:8,atk:2.3,def:0.6,mag:0.2,spd:1.8,luk:0.7}, skills:['暗殺','連環刺擊','劇毒迷霧','瞬步'], color:'#3d3d3d', focus:['atk','spd'], specs:['夜帷死神','無聲獵殺者']},
  '法師':{base:{hp:70,atk:4,def:5,mag:18,spd:9,luk:6}, growth:{hp:7,atk:0.4,def:0.6,mag:2.4,spd:0.8,luk:0.6}, skills:['火球術','寒冰箭','奧術飛彈','傳送術'], color:'#4361ee', focus:['mag','spd'], specs:['元素掌控者','奧術賢者']},
  '術士':{base:{hp:75,atk:5,def:5,mag:17,spd:8,luk:6}, growth:{hp:8,atk:0.5,def:0.6,mag:2.3,spd:0.7,luk:0.6}, skills:['暗影箝制','召喚惡魔','死亡詛咒','生命汲取'], color:'#7209b7', focus:['mag','hp'], specs:['深淵契約者','魔女領主']},
  '牧師':{base:{hp:90,atk:4,def:8,mag:16,spd:7,luk:7}, growth:{hp:10,atk:0.4,def:0.9,mag:2.1,spd:0.6,luk:0.7}, skills:['治癒術','復生祈禱','群體祝福','驅邪術'], color:'#f8edeb', focus:['mag','def'], specs:['大主教','聖光裁決者']},
  '吟遊詩人':{base:{hp:85,atk:8,def:6,mag:10,spd:11,luk:9}, growth:{hp:9,atk:1.1,def:0.7,mag:1.3,spd:1.1,luk:0.9}, skills:['戰歌','嘲諷之歌','魅惑旋律','鼓舞人心'], color:'#f72585', focus:['luk','mag'], specs:['傳奇敘事者','萬人迷']},
  '德魯伊':{base:{hp:100,atk:9,def:9,mag:13,spd:9,luk:7}, growth:{hp:11,atk:1.2,def:1.1,mag:1.6,spd:0.8,luk:0.7}, skills:['治療之種','變獸形態','纏繞荊棘','自然之怒'], color:'#2d6a4f', focus:['mag','def'], specs:['古林賢者','化獸之主']},
  '死靈法師':{base:{hp:78,atk:6,def:5,mag:17,spd:7,luk:5}, growth:{hp:8,atk:0.6,def:0.6,mag:2.3,spd:0.6,luk:0.5}, skills:['骸骨召喚','腐化之觸','靈魂收割','死亡纏繞'], color:'#5a3d6b', focus:['mag','hp'], specs:['冥界執政官','萬骸之王']},
  '武僧':{base:{hp:105,atk:15,def:10,mag:6,spd:13,luk:6}, growth:{hp:12,atk:2.1,def:1.2,mag:0.6,spd:1.4,luk:0.6}, skills:['連環踢擊','金剛禪定','氣勁爆發','以柔克剛'], color:'#c08552', focus:['atk','spd'], specs:['醉拳宗師','金剛羅漢']}
};
const CLASS_NAMES=Object.keys(CLASS_DATA);
const SPEC_LEVEL=10;

function aliveKingdomNames(){ const n=kingdoms.filter(k=>k.status!=='滅亡').map(k=>k.name); return n.length?n:['無名之地']; }
function avgLevel(){
  const living=adventurers.filter(a=>['idle','onQuest','injured','disabled'].includes(a.status));
  if(!living.length) return 1;
  return living.reduce((s,a)=>s+a.level,0)/living.length;
}
function formatDate(d){
  const year=Math.floor((d-1)/360)+1;
  const rem=(d-1)%360;
  const month=Math.floor(rem/30)+1;
  const dom=(rem%30)+1;
  return `第${year}年${month}月${dom}日`;
}
function formatYear(d){ return Math.floor((d-1)/360)+1; }
function formatStats(stats){
  return Object.keys(stats).map(k=>`+${stats[k]} ${STAT_LABEL[k]}`).join(' ');
}
function expNeed(level){ return Math.round(50*Math.pow(level,1.5)+50); }
function getPower(a, opts){
  const s=a.stats;
  let p = s.hp*0.08+s.atk*1+s.def*0.9+s.mag*1+s.spd*0.6+s.luk*0.4;
  if(opts && opts.monsterTag){
    ['weapon','armor','accessory'].forEach(slot=>{
      const it=a.equipment[slot];
      if(it && it.special==='dragonslayer' && /龍/.test(opts.monsterTag)) p*=1.4;
      if(it && it.special==='holy' && /(亡靈|不死|邪教|骷髏|食屍)/.test(opts.monsterTag)) p*=1.25;
    });
  }
  return p;
}
function hasSpecial(a, key){
  return ['weapon','armor','accessory'].some(slot=> a.equipment[slot] && a.equipment[slot].special===key);
}
function randomSlot(){ return pick(['weapon','armor','accessory']); }
function pushWorldHistory(text){
  worldHistory.unshift({day, year:formatYear(day), text});
  if(worldHistory.length>200) worldHistory.length=200;
}

========================================================= */
function recomputeStats(a){
  const cd=CLASS_DATA[a.class];
  const lvl=a.level;
  const s={};
  for(const k of STAT_KEYS){ s[k]=Math.round(cd.base[k]+cd.growth[k]*(lvl-1)); }
  ['weapon','armor','accessory'].forEach(slot=>{
    const it=a.equipment[slot];
    if(it){
      for(const k in it.stats){ s[k]=(s[k]||0)+it.stats[k]; }
      if(it.special==='cursed'){ s.atk=(s.atk||0)+ri(3,8); s.def=Math.max(1,(s.def||0)-ri(1,4)); }
    }
  });
  for(const k in a.bonus){ s[k]=(s[k]||0)+a.bonus[k]; }
  if(a.specialization && a.specialization.bonus){
    for(const k in a.specialization.bonus){ s[k]=(s[k]||0)+a.specialization.bonus[k]; }
  }
  if(a.status==='disabled' && a.disability){
    s[a.disability.stat]=Math.max(1, Math.round(s[a.disability.stat]*(1-a.disability.penalty)));
  }
  a.stats=s;
}

function genAdventurer(level, parents){
  level=level||1;
  const cls=pick(CLASS_NAMES);
  const a={
    id:uid(), name:genName(), class:cls, level:level, exp:0,
    age: ri(16,30), lifespan: ri(58,88),
    traits: sampleN(CORE_TRAITS,2),
    status:'idle',
    equipment:{weapon:null,armor:null,accessory:null},
    skills: CLASS_DATA[cls].skills.map(s=>({name:s, level:1, prof:0})),
    bonus:{}, relationships:[], history:[],
    isMarried:false, spouseId:null,
    joinDay: day, recoverDays:0, disability:null,
    deathDay:null, causeOfDeath:null,
    specialization:null,
    counters:{combat:0, betrayed:0, cursed:0},
    fateShield:false,
    parents: parents||null,
    mentorId:null, discipleIds:[]
  };
  if(parents){
    a.traits = RNG()<0.5 ? parents.aTraits.slice(0,2) : sampleN(CORE_TRAITS,2);
    a.bonus = {}; STAT_KEYS.forEach(k=>{ if(RNG()<0.5) a.bonus[k]=ri(1,3); });
  }
  recomputeStats(a);
  return a;
}
function genCandidate(){
  const lvl=ri(1, Math.max(3, Math.round(avgLevel())+2));
  const a=genAdventurer(lvl);
  a.hireCost = 80+lvl*45+ri(0,50);
  return a;
}
function genFamilyCandidate(parentA, parentB){
  const lvl=ri(1,3);
  const a=genAdventurer(lvl, {aTraits:parentA.traits});
  a.name = pick(GIVEN_NAMES)+'·'+(parentA.name.split('·')[1]||pick(FAMILY_NAMES));
  a.hireCost = Math.round((40+lvl*25)*0.6);
  a.heritage = `${parentA.name}與${parentB.name}之子女`;
  a.relationships.push({id:parentA.id, name:parentA.name, type:'親屬', value:60});
  a.relationships.push({id:parentB.id, name:parentB.name, type:'親屬', value:60});
  return a;
}
function genEquipment(slot, forcedRarityIdx, advLevel){
  advLevel=advLevel||1;
  let rIdx=forcedRarityIdx;
  if(rIdx===undefined||rIdx===null){ rIdx=weightedPick([[0,50],[1,24],[2,14],[3,7],[4,2.5],[5,0.5]]); }
  const rarity=RARITIES[rIdx];
  const base=pick(BASE_TYPES[slot]);
  const lvlScale=1+advLevel*0.08;
  const stats={};
  if(slot==='weapon'){ stats.atk=Math.round(ri(2,5)*rarity.mult*lvlScale); }
  else if(slot==='armor'){ stats.def=Math.round(ri(2,5)*rarity.mult*lvlScale); stats.hp=Math.round(ri(5,12)*rarity.mult*lvlScale); }
  else { stats.luk=Math.round(ri(1,3)*rarity.mult*lvlScale); }
  let prefixWord=null, suffixWord=null;
  for(let i=0;i<rarity.affixCount;i++){
    const useSuffix = i%2===1;
    const pool = useSuffix? SUFFIX_POOL : AFFIX_POOL;
    const af = pick(pool);
    const val = Math.round(ri(af.val[0],af.val[1])*lvlScale);
    stats[af.stat]=(stats[af.stat]||0)+val;
    if(useSuffix) suffixWord=af.word; else prefixWord=af.word;
  }
  let special=null;
  if(RNG()<specialAffixChance(rIdx)){ special=pick(SPECIAL_AFFIXES).key; }
  let name;
  if(rIdx===5){ name=pick(ARTIFACT_NAMES); }
  else if(rIdx===4){ name=pick(LEGEND_NAMES); }
  else {
    name=(prefixWord?prefixWord:'')+base+(suffixWord?('之'+suffixWord):'');
    if(special){ const sa=SPECIAL_AFFIXES.find(x=>x.key===special); name=`【${sa.name}】`+name; }
  }
  return {id:uid(), name, slot, rarity:rIdx, stats, special};
}
function genQuest(forcedRank, dungeon){
  const rank = forcedRank || weightedPick([['E',30],['D',25],['C',20],['B',15],['A',8],['S',2]]);
  const cfg=RANK_CFG[rank];
  const loc=dungeon?dungeon.location:pick(LOCATIONS);
  const mon=dungeon?(dungeon.race+'群'):pick(MONSTERS);
  const kingdom=pick(aliveKingdomNames());
  let name;
  if(dungeon){
    name = dungeon.leaderAlive && RNG()<0.4
      ? `討伐${dungeon.theme}的${dungeon.leaderTitle}「${dungeon.leaderName}」`
      : `深入${dungeon.theme}清剿${dungeon.race}`;
  } else {
    name = fill(pick(QUEST_NAME_TEMPLATES),{loc,mon,kingdom});
  }
  return {
    id:uid(), name, rank,
    power: Math.round(cfg.powerBase*(0.85+RNG()*0.3)),
    duration: ri(cfg.durMin,cfg.durMax),
    goldReward: Math.round(cfg.goldBase*(0.8+RNG()*0.5)),
    expReward: Math.round(cfg.expBase*(0.8+RNG()*0.4)),
    itemDropChance: cfg.itemChance,
    dangerLow: cfg.dangerLow, dangerHigh: cfg.dangerHigh,
    repReward: cfg.rep,
    desc: `地點：${loc} ｜ 目標：${mon}`,
    expiresIn: ri(15,30),
    partyIds: [], startDay:0, endDay:0, special:false,
    dungeonId: dungeon?dungeon.id:null, location:loc, monsterTag:mon,
    expedition:null
  };
}

function genDungeon(){

  const pop=ri(60,200);
  return {
    id:uid(), theme:t.theme, race:t.race, leaderTitle:t.leaderTitle,
    location:pick(LOCATIONS),
    population:pop, maxPopulation:pop,
    leaderName:pick(DUNGEON_LEADER_NAMES), leaderAlive:true,

}
function dungeonThreatTier(d){
  const ratio=d.population/d.maxPopulation;
  if(d.state==='destroyed') return '已覆滅';
  if(ratio>0.7) return '強盛';
  if(ratio>0.35) return '穩定';
  return '衰弱';
}
function dungeonDailyTick(d){
  if(d.state==='destroyed'){
    d.rebornDay = d.rebornDay||(day+ri(40,90));
    if(day>=d.rebornDay){
      const t=pick(DUNGEON_THEMES);
      d.theme=t.theme; d.race=t.race; d.leaderTitle=t.leaderTitle;
      d.population=ri(40,140); d.maxPopulation=d.population;
      d.leaderName=pick(DUNGEON_LEADER_NAMES); d.leaderAlive=true;
      d.state='thriving'; d.rebornCount++; d.rebornDay=null;
      logGlobal(`🕳️ ${d.location}的廢墟中，新的「${d.theme}」勢力悄然興起，首領「${d.leaderName}」自立為${d.leaderTitle}。`);
    }
    return;
  }
  if(d.population < d.maxPopulation && RNG()<0.04){ d.population=Math.min(d.maxPopulation, d.population+ri(2,6)); }
  if(!d.leaderAlive && RNG()<0.02 && d.population>20){
    d.leaderName=pick(DUNGEON_LEADER_NAMES); d.leaderAlive=true;
    logGlobal(`🕳️ ${d.theme}中誕生了新的首領「${d.leaderName}」，再次統合了${d.race}的勢力。`);
  }
}
function dungeonApplyClear(d, partyPower){
  const dmg=Math.round(clamp(partyPower/8, 3, 60));
  d.population=Math.max(0, d.population-dmg);
  let leaderSlain=false;
  if(d.leaderAlive && partyPower>d.maxPopulation*1.2 && RNG()<0.35){
    d.leaderAlive=false; leaderSlain=true;
    logGlobal(`👑 ${d.theme}的${d.leaderTitle}「${d.leaderName}」被擊敗了！`);
    pushWorldHistory(`${d.theme}的${d.leaderTitle}「${d.leaderName}」殞落`);
  }
  if(d.population<=0 && d.state!=='destroyed'){
    d.state='destroyed';
    logGlobal(`🏴 ${d.theme}（${d.location}）的勢力已被徹底剷除，這片土地暫時恢復了平靜。`);
    pushWorldHistory(`${d.theme}（${d.location}）覆滅`);
  }
  return leaderSlain;
}
function pickDungeonForQuest(){
  const alive=dungeons.filter(d=>d.state!=='destroyed');
  return alive.length? pick(alive) : null;
}

========================================================= */
function gainExp(a, amount){
  a.exp += amount;
  while(a.level<50 && a.exp>=expNeed(a.level)){
    a.exp -= expNeed(a.level);
    a.level++;
    recomputeStats(a);
  }
}
const RANK_SKILL_GAIN={E:5,D:8,C:12,B:18,A:25,S:35};
function trainRandomSkill(a, rank){
  const sk=pick(a.skills);
  sk.prof += (RANK_SKILL_GAIN[rank]||5);
  while(sk.prof>=100 && sk.level<10){
    sk.prof-=100; sk.level++;
    const focus=CLASS_DATA[a.class].focus;
    const st=pick(focus);
    a.bonus[st]=(a.bonus[st]||0)+ri(1,3);
  }
  if(sk.prof>100) sk.prof=100;
  recomputeStats(a);
}

const LOCKED_REL_TYPES=['夫妻','親屬','師徒'];
function upsertRel(a,b,amount){
  let r=a.relationships.find(x=>x.id===b.id);
  if(!r){ r={id:b.id,name:b.name,type:'認識',value:0}; a.relationships.push(r); }
  r.value=clamp(r.value+amount,-100,100); r.name=b.name;
  if(LOCKED_REL_TYPES.includes(r.type)) return r;
  if(r.value>=80) r.type='戀人';
  else if(r.value>=50) r.type='摯友';
  else if(r.value>=20) r.type='朋友';
  else if(r.value<=-60) r.type='宿敵';
  else if(r.value<=-25) r.type='不合';
  else r.type='認識';
  return r;
}
function bumpRelationship(a,b,amount){ upsertRel(a,b,amount); upsertRel(b,a,amount); }
function marryAdventurers(a,b){
  a.isMarried=true; b.isMarried=true; a.spouseId=b.id; b.spouseId=a.id;
  upsertRel(a,b,100); upsertRel(b,a,100);
  const ra=a.relationships.find(r=>r.id===b.id); if(ra) ra.type='夫妻';
  const rb=b.relationships.find(r=>r.id===a.id); if(rb) rb.type='夫妻';
  const sentence=fill(pick(EV_MARRY),{a:a.name,b:b.name});
  logGlobal('💍 '+sentence);
  a.history.unshift({day,text:sentence}); b.history.unshift({day,text:sentence});
}
function formMentorship(mentor, disciple){
  upsertRel(mentor, disciple, 40); upsertRel(disciple, mentor, 40);
  const rm=mentor.relationships.find(r=>r.id===disciple.id); if(rm) rm.type='師徒';
  const rd=disciple.relationships.find(r=>r.id===mentor.id); if(rd) rd.type='師徒';
  mentor.discipleIds.push(disciple.id);
  disciple.mentorId=mentor.id;
  const sentence=`${mentor.name}收${disciple.name}為徒，開始傳授畢生所學。`;
  logGlobal('📖 '+sentence);
  mentor.history.unshift({day,text:sentence}); disciple.history.unshift({day,text:sentence});
}
function triggerDuel(a,b){
  const pa=getPower(a), pb=getPower(b);
  const winner = pa+ri(0,20) > pb+ri(0,20) ? a : b;
  const loser = winner===a ? b : a;
  const lethal = RNG()<0.04;
  const sentence = `${a.name}與${b.name}積怨已久，終於在公會後院展開了一場決鬥，最終由${winner.name}獲勝。`;
  logGlobal('⚔️ '+sentence);
  a.history.unshift({day,text:sentence}); b.history.unshift({day,text:sentence});
  if(lethal){ killAdventurer(loser, `${loser.name}在與${winner.name}的決鬥中不幸身亡。`, '決鬥身亡'); }
  else { injureAdventurer(loser, `${loser.name}在決鬥中落敗，身上添了不少傷。`); }
  upsertRel(a,b,-20); upsertRel(b,a,-20);
}
function tryEquipmentTheft(a, b){
  const slot=randomSlot();
  const item=b.equipment[slot];
  if(!item) return false;
  b.equipment[slot]=null; recomputeStats(b);
  a.equipment[a.equipment[slot]?randomSlot():slot] = a.equipment[slot]?a.equipment[slot]:item;
  if(!a.equipment[slot]) a.equipment[slot]=item;
  recomputeStats(a);
  const sentence=`${a.name}趁{b}不注意，偷走了對方的${SLOT_LABEL[slot]}「${item.name}」！`.replace('{b}',b.name);
  logGlobal('🪙 '+sentence);
  a.history.unshift({day,text:sentence}); b.history.unshift({day,text:sentence});
  bumpRelationship(a,b,-30);
  return true;
}
function tryHaveChild(a,b){
  if(recruitPool.length>=3 && RNG()<0.7) return false;
  const child=genFamilyCandidate(a,b);
  recruitPool.push(child);
  const sentence=`${a.name}與${b.name}有了一個孩子，孩子已經長大，渴望加入公會延續父母的志業。`;
  logGlobal('👶 '+sentence);
  a.history.unshift({day,text:sentence}); b.history.unshift({day,text:sentence});
  return true;
}

/* ---- 人格演變 ---- */
function mutateTrait(a, newTrait, removeCandidates){
  if(a.traits.includes(newTrait)) return;
  if(a.traits.length>=3){
    const rem=removeCandidates.find(t=>a.traits.includes(t));
    if(rem){ a.traits=a.traits.filter(t=>t!==rem); }
    else { a.traits=a.traits.slice(1); }
  }
  a.traits.push(newTrait);
  const sentence=`經歷了重重考驗，${a.name}的性格逐漸變得${newTrait}。`;
  logPersonalOnly(a, sentence);
}
function trackPersonalityShift(a, kind){
  a.counters = a.counters || {combat:0, betrayed:0, cursed:0};
  if(kind==='combat'){
    a.counters.combat++;
    if(a.counters.combat>=20 && !a.traits.includes('勇敢') && RNG()<0.15){ mutateTrait(a,'勇敢',['膽小','悲觀']); }
  } else if(kind==='betrayed'){
    a.counters.betrayed++;
    if(a.counters.betrayed>=3 && !a.traits.includes('多疑') && RNG()<0.25){ mutateTrait(a,'多疑',['樂觀','浪漫']); }
  } else if(kind==='cursed'){
    a.counters.cursed++;
    if(a.counters.cursed>=4 && !a.traits.includes('瘋狂') && RNG()<0.2){ mutateTrait(a,'瘋狂',['冷靜','謹慎']); }
  }
}

/* ---- 流派 / 進階 ---- */
function trySpecialize(a){
  if(a.specialization || a.level<SPEC_LEVEL) return;
  const specs=CLASS_DATA[a.class].specs;
  if(!specs || !specs.length) return;
  const title=pick(specs);
  const bonus={};
  CLASS_DATA[a.class].focus.forEach(k=>{ bonus[k]=(bonus[k]||0)+ri(4,9); });
  a.specialization={title, bonus};
  recomputeStats(a);
  const sentence=`${a.name}在歷練中領悟了屬於自己的流派，被尊稱為「${title}」。`;
  logGlobal('🌟 '+sentence);
  a.history.unshift({day,text:sentence});
}

function logGlobal(text){
  chronicle.unshift({day, text});
  if(chronicle.length>300) chronicle.length=300;
  renderTicker(text);
  if(currentTab==='history') renderHistoryTab();
}
function logPersonalOnly(a, text){
  a.history.unshift({day, text});
  if(a.history.length>50) a.history.length=50;
}
function killAdventurer(a, sentence, causeShort){
  if(a.status==='dead') return;
  if(a.fateShield){
    a.fateShield=false;
    const saveSentence=`千鈞一髮之際，命運似乎眷顧了${a.name}，讓他在死亡邊緣硬是撐了下來，但身負重傷。`;
    logGlobal('✨ '+saveSentence);
    a.history.unshift({day,text:saveSentence});
    disableAdventurer(a, `${a.name}從死亡邊緣掙脫，卻留下了永久的傷殘。`);
    return;
  }
  a.status='dead'; a.deathDay=day; a.causeOfDeath=causeShort||sentence;
  logGlobal('💀 '+sentence);
  a.history.unshift({day,text:sentence});
  if(a.level>=20 || (a.specialization)){
    pushWorldHistory(`${a.name}（${a.specialization?a.specialization.title:a.class}）${causeShort||'離世'}`);
  }
  if(a.spouseId){
    const sp=getAdv(a.spouseId);
    if(sp && sp.status!=='dead'){ logGlobal(`💔 ${sp.name}得知${a.name}的死訊，悲痛不已。`); }
  }
  if(a.mentorId){
    const m=getAdv(a.mentorId);
    if(m && m.status!=='dead'){ logPersonalOnly(m, `${m.name}聽聞徒弟${a.name}的死訊，沉默了許久。`); }
  }
}
function injureAdventurer(a, sentence){
  a.status='injured'; a.recoverDays=ri(3,12);
  logGlobal('🩹 '+sentence);
  a.history.unshift({day,text:sentence});
  trackPersonalityShift(a,'combat');
}
function disableAdventurer(a, sentence){
  a.status='disabled';
  const stat=pick(['atk','def','spd']);
  a.disability={stat, penalty:rf(0.2,0.4)};
  recomputeStats(a);
  logGlobal('🦾 '+sentence);
  a.history.unshift({day,text:sentence});
}
function retireAdventurer(a, sentence){
  a.status='retired';
  logGlobal('👋 '+sentence);
  a.history.unshift({day,text:sentence});
  if(a.level>=20 || a.specialization){
    pushWorldHistory(`${a.name}（${a.specialization?a.specialization.title:a.class}）退休`);
  }
}
function betrayAdventurer(a){
  a.status='betrayed';
  const stolen=Math.min(gold, ri(40,200)+a.level*10);
  gold-=stolen;
  a.equipment={weapon:null,armor:null,accessory:null};
  const sentence=fill(pick(EV_BETRAY),{a:a.name,gold:stolen});
  logGlobal('🗡️ '+sentence);
  a.history.unshift({day,text:sentence});
  const CLOSE_TYPES=['朋友','摯友','戀人','夫妻','師徒','親屬'];
  a.relationships.forEach(r=>{
    const other=getAdv(r.id);
    if(other && other.status!=='dead' && CLOSE_TYPES.includes(r.type)){ trackPersonalityShift(other,'betrayed'); }
  });
}

   任務系統 / 冒險實況引擎
========================================================= */
function resolveQuest(q){
  const party=q.partyIds.map(getAdv).filter(p=>p && p.status==='onQuest');
  const exp=q.expedition || {successDelta:0, riskDelta:0, goldBonus:0, expBonus:0, itemBonusChance:0};
  let power=party.reduce((s,a)=>s+getPower(a,{monsterTag:q.monsterTag}),0);
  if(party.some(a=>hasSpecial(a,'frost'))) power*=1.05;
  const dangerMod=1 + (activeWorldEvents.some(e=>e.type==='war')?0.15:0)
    + (activeWorldEvents.some(e=>e.type==='riot')&&/地下城/.test(q.name)?0.2:0)
    + (exp.riskDelta||0);
  const ratio=power/Math.max(1,q.power);
  let successChance=clamp(0.12+ratio*0.5+(exp.successDelta||0), 0.05, 0.97);
  const success=RNG()<successChance;
  const names=party.map(a=>a.name).join('、')||'公會';
  const dungeon = q.dungeonId ? dungeons.find(d=>d.id===q.dungeonId) : null;
  if(success){
    const goldGain=Math.round(q.goldReward*(0.85+RNG()*0.3)*(1+(exp.goldBonus||0)));
    gold+=goldGain; reputation+=q.repReward||1;
    party.forEach(a=>{
      gainExp(a, Math.round(q.expReward*(1+(exp.expBonus||0))));
      trainRandomSkill(a,q.rank);
      trackPersonalityShift(a,'combat');
      trySpecialize(a);
    });
    let extra='';
    if(RNG()<clamp(q.itemDropChance+(exp.itemBonusChance||0),0,0.95)){
      const lvl=Math.round(party.reduce((s,a)=>s+a.level,0)/Math.max(1,party.length))||1;
      let forced;
      if(q.rank==='S') forced=weightedPick([[4,80],[5,20]]);
      else if(q.rank==='A') forced=weightedPick([[2,40],[3,45],[4,15]]);
      const it=genEquipment(randomSlot(), forced, lvl);
      inventory.push(it);
      extra=`，並帶回了「${it.name}」`;
      if(it.rarity>=5) pushWorldHistory(`${names}帶回了神器級裝備「${it.name}」`);
    }
    logGlobal(`✅ ${names} 完成了任務「${q.name}」，獲得${goldGain}金幣${extra}。`);
    if(dungeon){
      const leaderSlain=dungeonApplyClear(dungeon, power);
      if(leaderSlain){ gold+=ri(50,150); reputation+=3; }
    }
  } else {
    logGlobal(`❌ ${names} 未能完成任務「${q.name}」，鎩羽而歸。`);
    if(dungeon){ dungeonApplyClear(dungeon, power*0.3); }
  }
  party.forEach(a=>{
    if(a.status!=='onQuest') return; // 已在遠征過程中死亡/重傷等，不再二次結算
    const baseDanger=(success? q.dangerLow : q.dangerHigh) * dangerMod * (1+traitMod(a,'injure')) * (hasSpecial(a,'undying')?0.4:1) * (hasSpecial(a,'lifesteal')?0.85:1);
    const r=RNG();
    if(r < baseDanger*0.12){
      killAdventurer(a, fill(pick(EV_QUEST_DEATH),{a:a.name,mon:q.name}), '任務殉職');
    } else if(r < baseDanger*0.4){
      disableAdventurer(a, fill(pick(EV_DISABLE),{a:a.name,mon:q.name}));
    } else if(r < baseDanger){
      injureAdventurer(a, fill(pick(EV_INJURY),{a:a.name,mon:q.name}));
    } else {
      a.status='idle';
    }
  });
}
function updateActiveQuests(){
  for(let i=activeQuests.length-1;i>=0;i--){
    const q=activeQuests[i];
    const expDone = q.expedition ? q.expedition.beatsDone>=q.expedition.beatsTotal : true;
    if(expDone){
      resolveQuest(q); activeQuests.splice(i,1);
    }
  }
}
function updateRecoveries(){
  adventurers.forEach(a=>{
    if(a.status==='injured'){
      a.recoverDays--;
      if(a.recoverDays<=0){
        a.status='idle';
        logPersonalOnly(a, fill(pick(EV_RECOVER),{a:a.name}));
      }
    }
  });
}
function maybeAddNewQuest(){
  availableQuests = availableQuests.filter(q=>{ q.expiresIn--; return q.expiresIn>0 || q.special; });
  if(availableQuests.length<8 && RNG()<0.6){
    const useDungeon = RNG()<0.4;
    availableQuests.push(genQuest(undefined, useDungeon?pickDungeonForQuest():null));
  }
}
function maybeRefreshRecruit(){
  if(RNG()<0.04){ const idx=ri(0,recruitPool.length-1); recruitPool[idx]=genCandidate(); }
}

/* ---- 冒險實況：遠征引擎 ---- */
const EXPEDITION_BEAT_MIN_MS=10000, EXPEDITION_BEAT_MAX_MS=20000;
function startExpedition(q){
  const beatsTotal=clamp(Math.round(q.duration*1.6), 3, 16);
  q.expedition={
    beatsTotal, beatsDone:0, log:[], pendingChoice:null,
    msUntilNextBeat: ri(EXPEDITION_BEAT_MIN_MS,EXPEDITION_BEAT_MAX_MS),
    successDelta:0, riskDelta:0, goldBonus:0, expBonus:0, itemBonusChance:0,
    ended:false
  };
}
function pickExpeditionEventType(){
  return weightedPick(EXPEDITION_EVENT_TYPES.map(t=>[t, t.weight]));
}
function expeditionCtx(q){
  const party=q.partyIds.map(getAdv).filter(p=>p && p.status==='onQuest');
  const a=party.length?pick(party):null;
  const others=party.filter(x=>x!==a);
  const b=others.length?pick(others):null;
  return {
    loc: q.location||pick(LOCATIONS), mon: q.monsterTag||pick(MONSTERS),
    a: a?a.name:'隊伍', b: b?b.name:'同伴', party, primary:a, secondary:b
  };
}
function applyExpeditionEffect(q, eff, party){
  const exp=q.expedition;
  if(eff.successDelta) exp.successDelta+=eff.successDelta;
  if(eff.riskDelta) exp.riskDelta+=eff.riskDelta;
  if(eff.goldDelta){ const g=ri(eff.goldDelta[0],eff.goldDelta[1]); gold+=g; exp.log.push(`（隊伍當場獲得 ${g} 金幣）`); }
  if(eff.expDelta){ const ev=ri(eff.expDelta[0],eff.expDelta[1]); party.forEach(p=>gainExp(p,ev)); }
  if(eff.repDelta){ reputation+=ri(eff.repDelta[0],eff.repDelta[1]); }
  if(eff.itemChance && RNG()<eff.itemChance){
    const lvl=Math.round(party.reduce((s,a)=>s+a.level,0)/Math.max(1,party.length))||1;
    const it=genEquipment(randomSlot(), null, lvl);
    inventory.push(it);
    exp.log.push(`（隊伍當場獲得了「${it.name}」）`);
  }
  if(eff.traitGain && RNG()<(eff.traitChance||0.1) && party.length){
    const target=pick(party);
    trackPersonalityShift(target,'cursed');
  }
  if(eff.relationGain && party.length>=2){
    bumpRelationship(party[0], pick(party.slice(1)), ri(5,15));
  }
}
function decideChoiceForType(type, q){
  const party=q.partyIds.map(getAdv).filter(p=>p && p.status==='onQuest');
  if(!party.length) return type.choices[type.choices.length-1];
  let best=type.choices[0], bestScore=-999;
  type.choices.forEach(c=>{
    let score=RNG()*2;
    party.forEach(a=>{ (c.trait||[]).forEach(t=>{ if(a.traits.includes(t)) score+=1.5; }); });
    if(score>bestScore){ bestScore=score; best=c; }
  });
  return best;
}
function resolveExpeditionChoice(q, choiceIdx){
  if(!q || !q.expedition) return;
  const exp=q.expedition;
  const pending=exp.pendingChoice;
  if(!pending) return;
  const type=EXPEDITION_EVENT_TYPES.find(t=>t.key===pending.typeKey);
  const choice=type.choices[choiceIdx] || type.choices[0];
  const party=q.partyIds.map(getAdv).filter(p=>p && p.status==='onQuest');
  applyExpeditionEffect(q, choice.effect, party);
  exp.log.unshift({day, text:`👉 隊伍選擇了「${choice.label}」。`, beat:exp.beatsDone});
  exp.pendingChoice=null;
  exp.beatsDone++;
  exp.msUntilNextBeat=ri(EXPEDITION_BEAT_MIN_MS,EXPEDITION_BEAT_MAX_MS);
  if(currentTab==='quest') renderQuestTab();
  if(activeExpeditionView===q.id) renderExpeditionModal(q.id);
}
function produceExpeditionBeat(q){
  const exp=q.expedition;
  if(exp.ended || exp.beatsDone>=exp.beatsTotal) return;
  const type=pickExpeditionEventType();
  const ctx=expeditionCtx(q);
  if(!ctx.party.length){
    // 隊伍全員已陣亡/離隊，直接結束遠征
    exp.beatsDone=exp.beatsTotal; exp.ended=true; return;
  }
  const text=fill(pick(type.pool), ctx);
  const entry={day, text, beat:exp.beatsDone, typeKey:type.key, choiceLabels:null};
  if(type.key==='friction' && ctx.party.length>=2){
    if(RNG()<0.15){ triggerDuel(ctx.party[0], ctx.party[1]); }
    else { bumpRelationship(ctx.party[0], ctx.party[1], RNG()<0.5?ri(5,15):-ri(5,15)); }
  }
  if(type.key==='merchant' && ctx.party.length>=2 && RNG()<0.08){
    const greedy=ctx.party.find(a=>a.traits.includes('貪婪'));
    if(greedy){ const victim=pick(ctx.party.filter(x=>x!==greedy)); if(victim) tryEquipmentTheft(greedy,victim); }
  }
  if(type.interactive){
    exp.pendingChoice={typeKey:type.key, text, remainingMs:ri(18000,26000)};
    entry.choiceLabels=type.choices.map(c=>c.label);
    exp.log.unshift(entry);
    if(currentTab==='quest') renderQuestTab();
    if(activeExpeditionView===q.id) renderExpeditionModal(q.id);
    return;
  }
  if(type.kind==='combat'){
    applyExpeditionEffect(q, {successDelta:0.01}, ctx.party);
    if(RNG()<0.05 && ctx.party.length){
      const victim=pick(ctx.party);
      if(victim && victim.status==='onQuest'){
        const r=RNG();
        if(r<0.15){ killAdventurer(victim, fill(pick(EV_QUEST_DEATH),{a:victim.name,mon:ctx.mon}), '任務殉職'); }
        else { injureAdventurer(victim, fill(pick(EV_INJURY),{a:victim.name,mon:ctx.mon})); }
      }
    }
  } else if(type.kind==='reward'){
    applyExpeditionEffect(q, {itemChance:0.3, goldDelta:[5,25]}, ctx.party);
  } else if(type.kind==='danger'){
    applyExpeditionEffect(q, {riskDelta:0.02}, ctx.party);
  }
  exp.log.unshift(entry);
  exp.beatsDone++;
  exp.msUntilNextBeat=ri(EXPEDITION_BEAT_MIN_MS,EXPEDITION_BEAT_MAX_MS);
  if(currentTab==='quest') renderQuestTab();
  if(activeExpeditionView===q.id) renderExpeditionModal(q.id);
}
function expeditionStep(){
  if(speed<=0) return;
  const virtualElapsedMs=1000*speed; // 每次呼叫(約1秒)依當前遊戲速度推進對應的虛擬時間
  activeQuests.forEach(q=>{
    if(!q.expedition) return;
    const exp=q.expedition;
    if(exp.beatsDone>=exp.beatsTotal){ exp.ended=true; return; }
    if(exp.pendingChoice){
      exp.pendingChoice.remainingMs = (exp.pendingChoice.remainingMs!==undefined?exp.pendingChoice.remainingMs:20000) - virtualElapsedMs;
      if(exp.pendingChoice.remainingMs<=0){
        const type=EXPEDITION_EVENT_TYPES.find(t=>t.key===exp.pendingChoice.typeKey);
        const auto=decideChoiceForType(type, q);
        const idx=type.choices.indexOf(auto);
        resolveExpeditionChoice(q, idx>=0?idx:0);
      }
      return;
    }
    exp.msUntilNextBeat = (exp.msUntilNextBeat!==undefined?exp.msUntilNextBeat:ri(EXPEDITION_BEAT_MIN_MS,EXPEDITION_BEAT_MAX_MS)) - virtualElapsedMs;
    if(exp.msUntilNextBeat<=0){ produceExpeditionBeat(q); }
  });
}
function fastForwardExpedition(q, virtualMs){
  const exp=q.expedition; if(!exp) return;
  const avgBeatMs=(EXPEDITION_BEAT_MIN_MS+EXPEDITION_BEAT_MAX_MS)/2;
  let n=Math.min(exp.beatsTotal-exp.beatsDone, Math.max(1,Math.floor(virtualMs/avgBeatMs)));
  for(let i=0;i<n;i++){
    if(exp.beatsDone>=exp.beatsTotal) break;
    if(exp.pendingChoice){
      const type=EXPEDITION_EVENT_TYPES.find(t=>t.key===exp.pendingChoice.typeKey);
      const auto=decideChoiceForType(type, q);
      resolveExpeditionChoice(q, type.choices.indexOf(auto));
    } else {
      produceExpeditionBeat(q);
    }
  }
}

   人生事件 / 世界事件
========================================================= */
function agingAndDeathCheck(){
  adventurers.forEach(a=>{
    if(a.status==='dead'||a.status==='retired'||a.status==='betrayed') return;
    a.age += 1/360;
    if(a.age>=a.lifespan){ killAdventurer(a, fill(pick(EV_OLDAGE),{a:a.name}), '年老去世'); }
  });
}
function personalEventCheck(){
  const idleList=adventurers.filter(a=>a.status==='idle');
  idleList.forEach(a=>{
    let chance=0.012;
    if(a.traits.includes('好奇')) chance+=0.005;
    if(RNG()>chance) return;
    const roll=RNG();
    if(roll<0.18 && idleList.length>1){
      const cands=idleList.filter(x=>x.id!==a.id);
      const b=pick(cands);
      if(b){
        const existingRel=a.relationships.find(r=>r.id===b.id);
        if(existingRel && existingRel.type==='宿敵' && RNG()<0.2){
          triggerDuel(a,b);
        } else {
          const friendly = RNG()<0.78;
          if(friendly){
            bumpRelationship(a,b, ri(10,25));
            logPersonalOnly(a, fill(pick(EV_FRIEND),{a:a.name,b:b.name}));
            const levelGap=Math.abs(a.level-b.level);
            if(levelGap>=5 && !a.mentorId && !b.mentorId && RNG()<0.2){
              const mentor=a.level>b.level?a:b, disciple=a.level>b.level?b:a;
              formMentorship(mentor, disciple);
            }
          } else {
            bumpRelationship(a,b, -ri(10,20));
            logPersonalOnly(a, fill(pick(EV_RIVAL),{a:a.name,b:b.name}));
          }
        }
        const rel=a.relationships.find(r=>r.id===b.id);
        if(rel && rel.type==='戀人' && !a.isMarried && !b.isMarried && RNG()<0.25){
          marryAdventurers(a,b);
        }
        if(a.isMarried && a.spouseId===b.id && RNG()<0.05){
          tryHaveChild(a,b);
        }
      }
    } else if(roll<0.30){
      gold += ri(5,40);
      logPersonalOnly(a, fill(pick(EV_FOUND_ITEM),{a:a.name}));
    } else if(roll<0.38){
      const illChance = activeWorldEvents.some(e=>e.type==='plague') ? 0.8 : 0.25;
      if(RNG()<illChance && guildLockdownDays<=0){
        injureAdventurer(a, fill(pick(EV_ILLNESS),{a:a.name}));
      } else {
        logPersonalOnly(a, fill(pick(EV_MISC),{a:a.name}));
      }
    } else if(roll<0.43 && a.age>42){
      const retChance=clamp(0.25+(a.age-42)*0.012,0,0.9);
      if(RNG()<retChance){ retireAdventurer(a, fill(pick(EV_RETIRE),{a:a.name})); }
      else logPersonalOnly(a, fill(pick(EV_MISC),{a:a.name}));
    } else if(roll<0.46){
      const bMod=(a.traits.includes('貪婪')?0.12:0)-(a.traits.includes('忠誠')?0.05:0);
      if(RNG() < 0.04+bMod){ betrayAdventurer(a); }
      else logPersonalOnly(a, fill(pick(EV_MISC),{a:a.name}));
    } else if(roll<0.48 && a.level>=SPEC_LEVEL && !a.specialization){
      trySpecialize(a);
    } else {
      logPersonalOnly(a, fill(pick(EV_MISC),{a:a.name}));
    }
  });
}

const DECISION_DEFS={

      },

    ]
  },
  plague:{

    effects:[

      function(){ const cost=ri(50,150); gold=Math.max(0,gold-cost); reputation+=6; logGlobal(`公會開放大門協助救治病患，花費${cost}金幣購買藥材，贏得民眾讚譽。`); }
    ]

      function(p){ reputation+=5; const gcost=ri(80,200); gold=Math.max(0,gold-gcost); availableQuests=availableQuests.filter(q=>q.id!==p.questId); logGlobal(`公會選擇優先保護平民撤離，花費${gcost}金幣安置難民，獲得民眾讚揚。`); }
    ]
  }
};
function pushDecision(kind, title, desc, params){
  decisionQueue.push({id:uid(), kind, title, desc, params:params||{}});
}
function resolveDecision(id, idx){
  const di=decisionQueue.findIndex(d=>d.id===id); if(di<0) return;
  const d=decisionQueue[di];
  const def=DECISION_DEFS[d.kind];
  if(def && def.effects[idx]) def.effects[idx](d.params);
  decisionQueue.splice(di,1);
  renderWorldTab(); updateTabBadges();
}

const WORLD_EVENT_APPLY={
  war(){
    const ks=kingdoms.filter(k=>k.status!=='滅亡');
    if(ks.length<2) return;

function triggerWorldEvent(){
  const type=weightedPick([['war',10],['plague',10],['dragon',6],['riot',8],['festival',15],['caravan',15],['anomaly',10],['blackmarket',8]]);
  WORLD_EVENT_APPLY[type]();
}
function pushDraftDecision(){
  const warEv=activeWorldEvents.find(e=>e.type==='war');
  if(!warEv) return;
  pushDecision('draft','⚔️ 前線徵兵令', fill(pick(EV_DRAFT_DESC),{kingdom:warEv.kA}), {});
}
function pushPlagueDecision(){
  pushDecision('plague','🦠 瘟疫蔓延', pick(EV_PLAGUE_DESC), {});
}
function worldEventCheck(){
  for(let i=activeWorldEvents.length-1;i>=0;i--){
    const ev=activeWorldEvents[i];
    ev.daysLeft--;
    if(ev.daysLeft<=0){ logGlobal(ev.endText||'🌤️ 一場動盪終於平息了。'); activeWorldEvents.splice(i,1); }
  }
  for(let i=pendingRise.length-1;i>=0;i--){
    if(day>=pendingRise[i].day){
      kingdoms.push({name:pendingRise[i].name, prosperity:ri(35,55), status:'新興'});
      logGlobal(fill(pick(EV_KINGDOM_RISE),{kingdom:pendingRise[i].name}));
      pushWorldHistory(`新王國「${pendingRise[i].name}」崛起`);
      pendingRise.splice(i,1);
    }
  }
  if(activeWorldEvents.some(e=>e.type==='war') && !decisionQueue.some(d=>d.kind==='draft') && RNG()<0.04){ pushDraftDecision(); }
  if(activeWorldEvents.some(e=>e.type==='plague') && !decisionQueue.some(d=>d.kind==='plague') && RNG()<0.05){ pushPlagueDecision(); }
  if(RNG()<0.012){ triggerWorldEvent(); }
  if(guildLockdownDays>0) guildLockdownDays--;
  religionDailyTick();
  rivalGuildDailyTick();
  rumorDailyTick();
  dungeons.forEach(dungeonDailyTick);
  fateDailyTick();
}
function religionDailyTick(){
  if(RNG()<0.01){
    const rel=pick(RELIGION_NAMES);
    if(RNG()<0.6){ reputation+=ri(1,3); logGlobal(fill(pick(RELIGION_BLESS),{rel})); }
    else { reputation=Math.max(0,reputation-ri(1,3)); logGlobal(fill(pick(RELIGION_CURSE),{rel})); }
  }
}
function rivalGuildDailyTick(){
  if(RNG()<0.012){
    const rg=pick(RIVAL_GUILD_NAMES);
    logGlobal(fill(pick(RIVAL_GUILD_EVENTS),{rg}));
  }
}
function rumorDailyTick(){
  if(rumors.length<6 && RNG()<0.1){
    const loc=pick(LOCATIONS), mon=pick(MONSTERS), kingdom=pick(aliveKingdomNames());
    const text=fill(pick(RUMOR_TEMPLATES),{loc,mon,kingdom});
    const truth=weightedPick([['true',35],['false',35],['partial',30]]);
    rumors.push({id:uid(), text, truth, day, loc, resolved:false});
  }
  rumors=rumors.filter(r=> day-r.day < 60 || r.resolved===false ? day-r.day<60 : true);
}
function verifyRumor(id){
  const r=rumors.find(x=>x.id===id); if(!r || r.resolved) return;
  const cost=30;
  if(gold<cost){ showToast('金幣不足，無法查證'); return; }
  gold-=cost; r.resolved=true;
  if(r.truth==='true'){
    const bonus=ri(40,150); gold+=bonus;
    logGlobal(`🔍 公會查證了傳聞，內容屬實！意外獲得了${bonus}金幣的報酬。`);
    if(RNG()<0.4){ availableQuests.push(genQuest()); logGlobal('📜 因傳聞屬實，公會張貼了一張新的相關任務。'); }
  } else if(r.truth==='false'){
    logGlobal('🔍 公會派人查證後，發現這只是個以訛傳訛的謠言。');
  } else {
    const bonus=ri(5,30); gold+=bonus;
    logGlobal(`🔍 傳聞部分屬實，公會從中得到了一些零碎的線索與${bonus}金幣。`);
  }
  rumors=rumors.filter(x=>x.id!==id);
  render();
}
function updateKingdoms(){
  kingdoms.forEach(k=>{
    if(k.status==='滅亡') return;
    let delta=rf(-1,1);
    if(activeWorldEvents.some(e=>e.type==='war' && (e.kA===k.name||e.kB===k.name))) delta-=rf(0.5,1.5);
    k.prosperity=clamp(k.prosperity+delta,0,100);
    if(k.prosperity<=0){
      k.status='滅亡';
      logGlobal(fill(pick(EV_KINGDOM_FALL),{kingdom:k.name}));
      pushWorldHistory(`${k.name}覆滅`);
      const usedNames=kingdoms.map(kk=>kk.name);
      const candidates=NEW_KINGDOM_NAMES.filter(n=>!usedNames.includes(n));
      const baseName=k.name.replace(/重建邦$/,'');
      pendingRise.push({day: day+ri(20,45), name: candidates.length?pick(candidates):(baseName+'重建邦')});
    } else {
      k.status = k.prosperity>=75?'繁榮': k.prosperity>=45?'穩定': k.prosperity>=20?'動盪':'衰落';
    }
  });
}

/* ---- 離線進度 ---- */
const OFFLINE_MS_PER_DAY=5*60*1000; // 離線時，每5分鐘現實時間 = 1個遊戲日
const OFFLINE_MAX_DAYS=300;
function processOfflineProgress(){
  const now=Date.now();
  const elapsed=now-(lastSeenTs||now);
  lastSeenTs=now;
  if(elapsed < 60000) return null; // 少於1分鐘不處理
  let offlineDays=Math.min(OFFLINE_MAX_DAYS, Math.floor(elapsed/OFFLINE_MS_PER_DAY));
  if(offlineDays<=0) return null;
  const startGold=gold, startDay=day;
  const startChronicleLen=chronicle.length;
  const deathsBefore=adventurers.filter(a=>a.status==='dead').length;
  // 離線期間：先快進所有進行中的遠征到結束，再執行剩餘的每日tick
  activeQuests.forEach(q=>{ if(q.expedition) fastForwardExpedition(q, offlineDays*EXPEDITION_BEAT_MIN_MS*2); });
  for(let i=0;i<offlineDays;i++){ dailyTick(); }
  const deathsAfter=adventurers.filter(a=>a.status==='dead').length;
  const newDeaths=adventurers.filter(a=>a.status==='dead' && a.deathDay>startDay);
  return {
    days: offlineDays,
    goldDelta: Math.round(gold-startGold),
    headlines: chronicle.slice(0, Math.min(8, chronicle.length-startChronicleLen+8)),
    deathCount: deathsAfter-deathsBefore,
    deadNames: newDeaths.map(a=>a.name)
  };
}

/* =========================================================
   玩家操作
========================================================= */
function spendFate(action, advId, questId){
  const cfg=FATE_ACTIONS[action]; if(!cfg) return;
  if(fatePoints<cfg.cost){ showToast('命運點數不足！'); return; }
  if(action==='protect'){
    const a=getAdv(advId); if(!a || a.status==='dead'){ showToast('無效的對象'); return; }
    fatePoints-=cfg.cost; a.fateShield=true;
    showToast(`已為${a.name}賦予命運庇護`);
    logGlobal(`✨ 公會會長動用了命運的力量，悄悄為${a.name}賦予了庇護。`);
  } else if(action==='boost'){
    const q=activeQuests.find(x=>x.id===questId); if(!q || !q.expedition){ showToast('沒有可扭轉的遠征'); return; }
    fatePoints-=cfg.cost; q.expedition.successDelta+=0.3;
    showToast('已大幅提升該遠征的成功率！');
    logGlobal(`✨ 公會會長介入了「${q.name}」的命運，扭轉了戰局的天平。`);
  } else if(action==='genius'){
    fatePoints-=cfg.cost;
    const idx=ri(0,recruitPool.length-1);
    const a=genCandidate(); a.level=Math.max(a.level, Math.round(avgLevel())+3);
    recomputeStats(a); a.hireCost=Math.round(a.hireCost*0.5);
    a.traits=sampleN(CORE_TRAITS,2);
    recruitPool[idx]=a;
    showToast('命運帶來了一位罕見的天才！');
    logGlobal(`✨ 命運的指引下，一位天賦異稟的冒險者「${a.name}」出現在了招募名單中。`);
  } else if(action==='reroll'){
    const q=activeQuests.find(x=>x.id===questId); if(!q || !q.expedition || !q.expedition.log.length){ showToast('沒有可重新擲定的事件'); return; }
    fatePoints-=cfg.cost;
    q.expedition.log.shift();
    q.expedition.beatsDone=Math.max(0,q.expedition.beatsDone-1);
    q.expedition.nextBeatAt=Date.now()+1500;
    showToast('命運重新編織了下一刻的故事...');
  }
  render();
}
function hireAdventurer(idx){
  const cand=recruitPool[idx]; if(!cand) return;
  if(gold<cand.hireCost){ showToast('金幣不足！'); return; }
  gold-=cand.hireCost;
  delete cand.hireCost;
  adventurers.push(cand);
  recruitPool[idx]=genCandidate();
  logGlobal(`🆕 ${cand.name}（${cand.class}）加入了公會！`);
  render();
}
function toggleDispatch(id){
  if(dispatchSelection.has(id)) dispatchSelection.delete(id);
  else if(dispatchSelection.size<4) dispatchSelection.add(id);
  renderDispatchModal();
}
function dispatchQuest(qid, ids){
  const qi=availableQuests.findIndex(q=>q.id===qid); if(qi<0) return;
  const q=availableQuests[qi];
  const party=ids.map(getAdv).filter(a=>a && (a.status==='idle'||a.status==='disabled'));
  if(!party.length){ showToast('請選擇至少一位冒險者'); return; }
  party.forEach(a=>a.status='onQuest');
  q.partyIds=party.map(a=>a.id);
  q.startDay=day; q.endDay=day+q.duration;
  startExpedition(q);
  availableQuests.splice(qi,1);
  activeQuests.push(q);
  showToast('已派遣冒險者出發！冒險實況開始記錄...');
  closeModal();
  render();
}
function confirmDispatch(){ dispatchQuest(currentDispatchQuestId, [...dispatchSelection]); }
function equipItem(advId, itemId){
  const a=getAdv(advId); const idx=inventory.findIndex(i=>i.id===itemId);
  if(!a || idx<0) return;
  const item=inventory[idx];
  const old=a.equipment[item.slot];
  if(old) inventory.push(old);
  inventory.splice(idx,1);
  a.equipment[item.slot]=item;
  recomputeStats(a);
}
function unequipItem(advId, slot){
  const a=getAdv(advId); if(!a) return;
  const item=a.equipment[slot];
  if(item){ inventory.push(item); a.equipment[slot]=null; recomputeStats(a); }
}
function doEquip(advId,itemId){ equipItem(advId,itemId); showToast('裝備完成！'); closeModal(); render(); }
function doUnequip(advId,slot){ unequipItem(advId,slot); showToast('已卸下裝備'); closeModal(); render(); }
function sellItem(itemId){
  const idx=inventory.findIndex(i=>i.id===itemId); if(idx<0) return;
  const item=inventory[idx];
  gold += SELL_VALUE[item.rarity];
  inventory.splice(idx,1);
  showToast(`出售成功 +${SELL_VALUE[item.rarity]}金幣`);
  render();
}
function trainSkillManual(advId, idx){
  const a=getAdv(advId); if(!a) return;
  const sk=a.skills[idx]; if(!sk) return;
  if(sk.level>=10){ showToast('該技能已達最高等級！'); return; }
  const cost=20*sk.level+30;
  if(gold<cost){ showToast('金幣不足！'); return; }
  gold-=cost; sk.prof+=15;
  while(sk.prof>=100 && sk.level<10){
    sk.prof-=100; sk.level++;
    const focus=CLASS_DATA[a.class].focus;
    const st=pick(focus);
    a.bonus[st]=(a.bonus[st]||0)+ri(1,3);
    logPersonalOnly(a, `${a.name}的技能「${sk.name}」提升至 Lv.${sk.level}！`);
  }
  if(sk.prof>100) sk.prof=100;
  recomputeStats(a);
  openAdvModal(advId);
  renderTopBar();
}
function manualRetire(id){
  const a=getAdv(id); if(!a) return;
  retireAdventurer(a, `${a.name}決定主動退休，告別了冒險者的生涯。`);
  closeModal(); render();
}
function manualDismiss(id){
  const a=getAdv(id); if(!a) return;
  retireAdventurer(a, `${a.name}被公會除名，黯然離開了公會。`);
  closeModal(); render();
}

/* =========================================================
   Canvas 場景繪製
========================================================= */
const canvas=document.getElementById('scene');
const ctx=canvas.getContext('2d');
let cw=0, ch=0;
function resizeCanvas(){
  const wrap=canvas.parentElement;
  cw=wrap.clientWidth; ch=wrap.clientHeight;
  const dpr=window.devicePixelRatio||1;
  canvas.width=Math.max(1,Math.round(cw*dpr));
  canvas.height=Math.max(1,Math.round(ch*dpr));
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
let particles=[];
function spawnParticles(){
  const hasWar=activeWorldEvents.some(e=>e.type==='war');
  const hasPlague=activeWorldEvents.some(e=>e.type==='plague');
  const hasDragon=activeWorldEvents.some(e=>e.type==='dragon');
  if(hasPlague && particles.length<40 && RNG()<0.3){
    particles.push({x:RNG()*cw, y:ch+5, vx:rf(-0.1,0.1), vy:-rf(0.15,0.35), life:200, type:'fog', size:rf(10,22)});
  }
  if(hasWar && particles.length<60 && RNG()<0.2){
    particles.push({x:RNG()*cw, y:ch*0.5+RNG()*ch*0.3, vx:rf(-0.05,0.05), vy:-rf(0.1,0.25), life:150, type:'smoke', size:rf(6,14)});
  }
  if(hasDragon && RNG()<0.05){
    particles.push({x:-10, y:ch*0.2+RNG()*ch*0.15, vx:rf(0.8,1.4), vy:rf(-0.05,0.05), life:220, type:'ember', size:rf(3,6)});
  }
}
function drawScene(ts){
  if(!cw){ resizeCanvas(); }
  if(!cw||!ch) return;
  ctx.clearRect(0,0,cw,ch);
  const cyc=(Date.now()/45000)%1;
  const isNight=cyc>0.5;
  const skyTop=isNight?'#1a1f3a':'#5a8fc7';
  const skyBot=isNight?'#3a3050':'#bcd6e8';
  const grad=ctx.createLinearGradient(0,0,0,ch*0.7);
  grad.addColorStop(0,skyTop); grad.addColorStop(1,skyBot);
  ctx.fillStyle=grad; ctx.fillRect(0,0,cw,ch*0.7);
  if(isNight){
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for(let i=0;i<18;i++){
      const sx=(i*53 + (ts||0)*0.001*10)%cw;
      const sy=(i*29)%(ch*0.45);
      ctx.globalAlpha=0.3+0.4*Math.abs(Math.sin(i+(ts||0)*0.0005));
      ctx.fillRect(sx,sy,2,2);
    }
    ctx.globalAlpha=1;
  }
  ctx.fillStyle=isNight?'#1c2417':'#3f5a32';
  ctx.fillRect(0,ch*0.68,cw,ch*0.32);
  const bw=cw*0.5, bh=ch*0.4, bx=cw*0.5-bw/2, by=ch*0.68-bh;
  ctx.fillStyle='#4a3526';
  ctx.fillRect(bx,by,bw,bh);
  ctx.beginPath();
  ctx.moveTo(bx-10,by); ctx.lineTo(bx+bw/2,by-bh*0.4); ctx.lineTo(bx+bw+10,by);
  ctx.closePath();
  ctx.fillStyle='#6b3f2a'; ctx.fill();
  ctx.fillStyle='#2a1d12';
  ctx.fillRect(bx+bw*0.4, by+bh*0.45, bw*0.2, bh*0.55);
  ctx.fillStyle=isNight?'#ffd97a':'#cdeeff';
  ctx.fillRect(bx+bw*0.12, by+bh*0.18, bw*0.16, bh*0.16);
  ctx.fillRect(bx+bw*0.72, by+bh*0.18, bw*0.16, bh*0.16);
  ctx.fillStyle='#b03030';
  ctx.fillRect(bx+bw*0.42, by-bh*0.25, bw*0.16, bh*0.3);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if(p.life<=0 || p.x>cw+20 || p.x<-20){ particles.splice(i,1); continue; }
    ctx.globalAlpha=clamp(p.life/200,0,1)*0.6;
    if(p.type==='fog') ctx.fillStyle='#7a9e6a';
    else if(p.type==='smoke') ctx.fillStyle='#555';
    else ctx.fillStyle='#ff7a30';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  const idleAll=adventurers.filter(a=>a.status==='idle');
  const idle=idleAll.slice(0,8);
  const baseY=ch*0.86;
  idle.forEach((a,i)=>{
    const spacing=cw/(idle.length+1);
    const x=spacing*(i+1);
    const bob=Math.sin((ts||0)/400+i)*3;
    const y=baseY+bob;
    ctx.fillStyle=CLASS_DATA[a.class].color;
    ctx.beginPath(); ctx.arc(x,y-10,6,0,Math.PI*2); ctx.fill();
    ctx.fillRect(x-4,y-4,8,12);
  });
  if(idleAll.length>8){
    ctx.fillStyle='#fff'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('+'+(idleAll.length-8), cw-20, baseY-5);
    ctx.textAlign='left';
  }
}
let frameCount=0;
function frame(ts){
  frameCount++;
  if(frameCount%3===0) spawnParticles();
  drawScene(ts);
  requestAnimationFrame(frame);
}

/* =========================================================
   每日 Tick / 主循環
========================================================= */
function dailyTick(){
  day++;
  updateActiveQuests();
  updateRecoveries();
  agingAndDeathCheck();
  personalEventCheck();
  worldEventCheck();
  updateKingdoms();
  maybeAddNewQuest();
  maybeRefreshRecruit();
  pruneOldRecords();
  tickCounter++;
  if(tickCounter>=4){ saveGame(); tickCounter=0; }
}
function pruneOldRecords(){
  if(chronicle.length>300) chronicle.length=300;
  if(worldHistory.length>200) worldHistory.length=200;
  const archivable=adventurers.filter(a=>['dead','retired','betrayed'].includes(a.status));
  if(archivable.length>260){
    const sorted=archivable.sort((x,y)=>(x.deathDay||x.joinDay)-(y.deathDay||y.joinDay));
    const toRemoveIds=new Set(sorted.slice(0, archivable.length-260).map(a=>a.id));
    adventurers=adventurers.filter(a=>!toRemoveIds.has(a.id));
  }
  const INVENTORY_CAP=120;
  if(inventory.length>INVENTORY_CAP){
    inventory.sort((x,y)=>y.rarity-x.rarity);
    const removed=inventory.splice(INVENTORY_CAP);
    const refund=removed.reduce((s,it)=>s+Math.round(SELL_VALUE[it.rarity]*0.5),0);
    if(refund>0){
      gold+=refund;
      logPersonalOnlyToChronicle(`🗄️ 公會倉庫已滿，自動賤賣了${removed.length}件低價值裝備，換回${refund}金幣。`);
    }
  }
}
function logPersonalOnlyToChronicle(text){
  chronicle.unshift({day, text});
  if(chronicle.length>300) chronicle.length=300;
}
function gameLoopStep(){
  if(speed>0){
    for(let i=0;i<speed;i++){ dailyTick(); }
    render();
  }
}

/* =========================================================
   事件綁定
========================================================= */
document.addEventListener('click', function(e){
  const el=e.target.closest('[data-action]');
  if(!el) return;
  const action=el.dataset.action;
  const id=el.dataset.id;
  switch(action){
    case 'openAdv': openAdvModal(id); break;
    case 'hire': hireAdventurer(parseInt(el.dataset.idx,10)); break;
    case 'openDispatch': openDispatchModal(id); break;
    case 'toggleDispatch': toggleDispatch(id); break;
    case 'confirmDispatch': confirmDispatch(); break;
    case 'closeModal': closeModal(); if(activeExpeditionView){ activeExpeditionView=null; } break;
    case 'resolveDecision': resolveDecision(id, parseInt(el.dataset.choice,10)); break;
    case 'openEquip': openEquipForItem(id); break;
    case 'pickEquipSlot': openEquipForSlot(id, el.dataset.slot); break;
    case 'sellItem': sellItem(id); break;
    case 'trainSkill': trainSkillManual(id, parseInt(el.dataset.idx,10)); break;
    case 'retireSelf': manualRetire(id); break;
    case 'dismissAdv': manualDismiss(id); break;
    case 'doEquip': doEquip(el.dataset.adv, el.dataset.item); break;
    case 'doUnequip': doUnequip(el.dataset.adv, el.dataset.slot); break;
    case 'openExpedition': openExpeditionModal(id); break;
    case 'expeditionChoice': resolveExpeditionChoice(getActiveQuestForExpeditionModal(), parseInt(el.dataset.choice,10)); break;
    case 'verifyRumor': verifyRumor(id); break;
    case 'spendFate': spendFate(el.dataset.fateAction, el.dataset.adv, el.dataset.quest); break;
    case 'openFatePanel': openFatePanelModal(); break;
  }
});
document.getElementById('tabbar').addEventListener('click', function(e){
  const btn=e.target.closest('.tabbtn'); if(!btn) return;
  document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTab=btn.dataset.tab;
  renderTabContent();
});
document.getElementById('speedControls').addEventListener('click', function(e){
  const btn=e.target.closest('button'); if(!btn) return;
  speed=parseInt(btn.dataset.speed,10);
  document.querySelectorAll('#speedControls button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
});

/* =========================================================
   啟動
========================================================= */
function showOfflineReport(report){
  if(!report) return;
  let html=`<div class="modal-header">離途歸來<span class="modal-sub">離開了 ${report.days} 個遊戲日</span></div>
  <div class="modal-body">
    <div class="status-line">公會金幣變化：${report.goldDelta>=0?'+':''}${report.goldDelta} 💰</div>
    ${report.deathCount>0?`<div class="death-line">遺憾的是，${report.deadNames.join('、')} 在你離開的這段時間裡離世了。</div>`:''}
    <div class="section-sub">這段時間的大事記</div>
    <div class="chronicle-list">${report.headlines.map(c=>`<div class="chron-item"><span class="chron-date">${formatDate(c.day)}</span>${c.text}</div>`).join('')||'<div class="empty-hint">一切平靜無事。</div>'}</div>
  </div>
  <div class="modal-actions"><button class="btn" data-action="closeModal">回到公會</button></div>`;
  openModal(html);
}
function boot(){
  const loaded=loadGame();
  if(!loaded){ initNewGame(); }
  resizeCanvas();
  document.querySelectorAll('#speedControls button').forEach(b=>{
    b.classList.toggle('active', parseInt(b.dataset.speed,10)===speed);
  });
  let offlineReport=null;
  if(loaded){ offlineReport=processOfflineProgress(); }
  render();
  requestAnimationFrame(frame);
  setInterval(gameLoopStep, 1000);
  setInterval(expeditionStep, 1000);
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('beforeunload', saveGame);
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){ saveGame(); }
    else { lastSeenTs=Date.now(); }
  });
  if(offlineReport && offlineReport.days>=1){ showOfflineReport(offlineReport); }
}
boot();
})();
</script>
