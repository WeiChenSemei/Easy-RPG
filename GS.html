/* ============================================================
   SECTION 2: UNIT MODEL — shared by party members and enemies.
   Equipment/gems/buffs all resolve through getStat(), so battle
   math never reads raw base stats directly.
   ============================================================ */
class Unit{
  constructor(opts){
    this.uid = Util.uid('unit');
    this.name = opts.name || '???';
    this.isEnemy = !!opts.isEnemy;
    this.base = Object.assign({hp:10,mp:0,atk:1,matk:1,def:1,mdef:1,spd:1,luck:1,hit:0.95,eva:0.03,crit:0.05,critDmg:0.5}, opts.base||{});
    this.level = opts.level || 1;
    this.xp = 0;
    this.xpToNext = this._calcXpToNext(this.level);
    this.element = opts.element || 'physical';
    this.resist = Object.assign({}, opts.resist||{});
    this.statuses = []; // {id, remaining, sourceTurn} — must exist before maxHp()/getStat() are called below
    this.equipment = opts.equipment || null; // null for enemies
    this.gemLoadout = opts.gemLoadout || null; // LEGACY field, unused — skills now come from equipment sockets (see SkillManager)
    this.hp = this.maxHp();
    this.mp = this.maxMp();
    this.limitGauge = 0; this.limitMax = 100;
    this.skills = (opts.skills||[]).slice();
    this.alive = true;
    this.glyph = opts.glyph || '🙂';
    this.onHitStatus = opts.onHitStatus || [];
    this.aiPersonality = opts.aiPersonality || null;
    this.job = opts.job || null;
    this.isPlayerControlled = !!opts.isPlayerControlled;
    this.isMainCharacter = !!opts.isMainCharacter;
  }

  // ---- derived stat pipeline: base -> equipment -> gems -> status mods ----
  statMods(){
    // Aggregate flat/percent modifiers from equipment+gems (party only) and
    // active statuses (everyone). Returns {statKey: {flat, percent}}.
    const mods = {};
    const add = (stat, mode, value)=>{
      if(!mods[stat]) mods[stat] = {flat:0, percent:0};
      if(mode==='percent') mods[stat].percent += value; else mods[stat].flat += value;
    };
    if(this.equipment){
      for(const slot in this.equipment){
        const inst = this.equipment[slot];
        if(!inst) continue;
        const def = Database.equipment[inst.baseId];
        if(def) for(const k in def.baseStats) add(k,'flat', def.baseStats[k] * (1 + (inst.enhanceLevel||0)*0.12));
        (inst.sockets||[]).forEach(g=>{ if(g) this._applyGemStat(g, add); });
      }
    }
    this.statuses.forEach(st=>{
      const def = Database.statusEffects[st.id];
      if(def && def.stat && def.mode!=='flag') add(def.stat, def.mode, def.value);
    });
    return mods;
  }
  _applyGemStat(gemInst, add){
    const ag = Database.abilityGems[gemInst.baseId];
    if(!ag) return;
    const rarity = RARITY_TABLE[gemInst.rarity]||RARITY_TABLE.common;
    add(ag.stat, ag.mode, ag.value * rarity.power);
    (gemInst.affixes||[]).forEach(af=>{ if(af.stat && Database.baseStatKeys.includes(af.stat)) add(af.stat, af.mode, af.value); });
  }
  getStat(key){
    const mods = this.statMods();
    let v = this.base[key] !== undefined ? this.base[key] : 0;
    const m = mods[key];
    if(m){ v = (v + m.flat) * (1 + m.percent); }
    return v;
  }
  maxHp(){ return Math.round(this.getStat('hp') + this.level*2); }
  maxMp(){ return Math.round(this.getStat('mp') + this.level*1); }
  getResist(elem){
    let r = this.resist[elem] || 0;
    const mods = this.statMods();
    const key = 'res_'+elem;
    if(mods[key]) r += mods[key].flat + mods[key].percent;
    if(mods.allRes) r += mods.allRes.flat + mods.allRes.percent;
    return Util.clamp(r, -1, 0.9);
  }
  hasStatus(id){ return this.statuses.some(s=>s.id===id); }
  isParalyzed(){ return this.hasStatus('debuff_paralyze'); }
  isSilenced(){ return this.hasStatus('debuff_silence'); }
  hasBarrier(){ return this.hasStatus('buff_barrier'); }
  addStatus(id, duration){
    const def = Database.statusEffects[id]; if(!def) return;
    const existing = this.statuses.find(s=>s.id===id);
    if(existing) existing.remaining = Math.max(existing.remaining, duration!==undefined?duration:def.duration);
    else this.statuses.push({ id, remaining: duration!==undefined?duration:def.duration });
  }
  tickStatuses(onDot){
    this.statuses.forEach(s=>{
      const def = Database.statusEffects[s.id];
      if(def && def.dot && onDot) onDot(this, def);
      s.remaining--;
    });
    this.statuses = this.statuses.filter(s=>s.remaining>0);
  }
  takeDamage(amount){
    amount = Math.max(0, Math.round(amount));
    this.hp = Util.clamp(this.hp - amount, 0, this.maxHp());
    if(this.hp<=0) this.alive = false;
    return amount;
  }
  heal(amount){
    amount = Math.max(0, Math.round(amount));
    const before = this.hp;
    this.hp = Util.clamp(this.hp + amount, 0, this.maxHp());
    return this.hp - before;
  }
  gainLimit(amount){ this.limitGauge = Util.clamp(this.limitGauge + amount, 0, this.limitMax); }
  limitReady(){ return this.limitGauge >= this.limitMax; }

  _calcXpToNext(level){ return Math.round(20 * Math.pow(1.35, level - 1)); }
  gainXp(amount){
    if(this.isEnemy) return null; // enemies don't level up
    this.xp = (this.xp||0) + amount;
    const results = []; // array of {level, learnedSkillIds:[...]}
    while(this.xp >= this.xpToNext){
      this.xp -= this.xpToNext;
      this.level++;
      this.xpToNext = this._calcXpToNext(this.level);
      // on level-up, grow base stats gently (about +3% per level)
      const growKeys = ['hp','mp','atk','matk','def','mdef'];
      growKeys.forEach(k=>{ if(this.base[k]) this.base[k] = Math.round(this.base[k] * 1.03); });
      const prevMaxHp = this.maxHp(); // before recalculation — refill difference
      this.hp = Math.min(this.hp + Math.round(prevMaxHp * 0.15), this.maxHp());
      this.mp = Math.min(this.mp + Math.round(this.maxMp() * 0.15), this.maxMp());
      // Job-based allies automatically learn any skill gated at this level.
      // The MC has no job, so this is a no-op for the player character —
      // their skill set comes entirely from equipped gear instead.
      const learnedSkillIds = [];
      if(this.job && Database.jobs[this.job] && Database.jobs[this.job].levelSkills){
        const newlyAvailable = Database.jobs[this.job].levelSkills[this.level];
        if(newlyAvailable && !this.skills.includes(newlyAvailable)){
          this.skills.push(newlyAvailable);
          learnedSkillIds.push(newlyAvailable);
        }
      }
      results.push({ level: this.level, learnedSkillIds });
    }
    return results; // array of {level, learnedSkillIds}, empty if no level-up
  }
}

/* ============================================================
   SECTION 3: PARTY MANAGER
   ============================================================ */
class PartyManager{
  constructor(game){
    this.game = game;
    this.gold = 200;
    this.dangerLevel = 0;
    this.members = []; // Unit[] — index 0 is always the main character
    this.recruitable = []; // ally template pool not yet hired
    this.inventory = { gems:[], equipment:[] };
    this.codex = { monsters:{}, equipment:{}, gems:{} };
    this._initMainCharacter();
    this._initRecruitPool();
    // NOTE: _giveStarterGear() is intentionally NOT called here — it reaches
    // through this.game.party, which is only assigned by Game's constructor
    // *after* `new PartyManager(this)` returns. Game.constructor calls it
    // explicitly once `this.party` exists.
  }
  _initMainCharacter(){
    const mc = new Unit({
      name:'旅人', isMainCharacter:true, isPlayerControlled:true,
      base:{hp:60,mp:30,atk:10,matk:10,def:6,mdef:6,spd:8,luck:6,hit:0.95,eva:0.04,crit:0.06,critDmg:0.5},
      level:1, glyph:'🧑',
    });
    mc.equipment = { weapon:null, offhand:null, armor:null, accessory:null };
    mc.limitGemIds = []; // legacy single-slot field removed — MC's limits come purely from equipped limit gems (no job, so no job.limitSkill)
    this.members.push(mc);
  }
  _initRecruitPool(){
    // One template ally per job, so the tavern always has the full roster
    // available to recruit (cost scales with how many are already hired).
    Object.values(Database.jobs).forEach(job=>{
      this.recruitable.push({ jobId: job.id, name: this._randomAllyName(job), hired:false, cost: 80 });
    });
  }
  _randomAllyName(job){
    const pool = { warrior:['加倫','布魯克'], knight:['雷昂','艾莉莎'], monk:['坦','悟'], samurai:['宗次郎','千鶴'],
      ninja:['影丸','小夜'], thief:['里克','妮娜'], hunter:['凱爾','艾米'], white_mage:['希爾達','瑪麗'],
      black_mage:['薇拉','奧斯卡'], paladin:['加文','賽蕾娜'], spellblade:['萊恩','緹娜'], sage:['歐丁','米拉'],
      bard:['芬恩','蘿莎'], dancer:['莉莉','賈思敏'], summoner:['澤夫','可可'] };
    const names = pool[job.id] || ['無名'];
    return RNG_GLOBAL.pick(names);
  }
  _giveStarterGear(){
    const mc = this.members[0];
    const wpn = this.game.equipmentManager.createInstance('eq_short_sword','common');
    // Pre-socket a Fire skill gem into slot 0 of the starter weapon
    const fireGem = this.game.gems.createSkillGemInstance('fire', 'common', 1);
    wpn.sockets[0] = fireGem; // directly socket — not in inventory
    this.game.equipmentManager.equip(mc, wpn);
  }
  addGold(n){
    this.gold = Math.max(0, this.gold + Math.round(n));
    if(this.game.ui) this.game.ui.refreshTopbar();
  }
  spendGold(n){
    if(this.gold < n) return false;
    this.gold -= n;
    if(this.game.ui) this.game.ui.refreshTopbar();
    return true;
  }
  hireAlly(jobId){
    const entry = this.recruitable.find(r=>r.jobId===jobId && !r.hired);
    if(!entry) return {ok:false, msg:'已招募過此職業'};
    if(this.members.length >= 4) return {ok:false, msg:'隊伍已滿（最多4人）'};
    if(!this.spendGold(entry.cost)) return {ok:false, msg:'金幣不足'};
    const job = Database.jobs[jobId];
    const unit = new Unit({
      name: entry.name, isPlayerControlled:false, glyph: job.glyph,
      base:{ hp:40*job.growth.hp, mp:20*job.growth.mp, atk:8*job.growth.atk, matk:8*job.growth.matk,
             def:5*job.growth.def, mdef:5*job.growth.mdef, spd:7*job.growth.spd, luck:5*job.growth.luck,
             hit:0.92, eva:0.03, crit:0.05, critDmg:0.5 },
      level:1, skills: Database.jobSkillsAtLevel(jobId, 1), job: job.id,
      aiPersonality: this._defaultPersonalityFor(job.id),
    });
    unit.equipment = { weapon:null, offhand:null, armor:null, accessory:null };
    unit.limitGemIds = []; // legacy single-slot limitGemId removed — limits now come from equipped limit gems + the job's own limitSkill
    entry.hired = true; entry.cost = Math.round(entry.cost*1.6);
    this.members.push(unit);
    return {ok:true, unit};
  }
  _defaultPersonalityFor(jobId){
    const map = { white_mage:'healer', sage:'healer', bard:'buffer', paladin:'buffer', knight:'conservative',
      ninja:'boss_focus', thief:'backline', black_mage:'backline' };
    return map[jobId] || 'brave';
  }
  setPersonality(unit, personalityId){ unit.aiPersonality = personalityId; }
  // Revive every fallen member AND restore everyone to full HP/MP — this is
  // the church's full service. Used by Church (and internally on roguelite
  // death, since the run's failure already resets enemies/floor/loot).
  reviveAll(){ this.members.forEach(m=>{ m.alive = true; m.hp = m.maxHp(); m.mp = m.maxMp(); m.statuses = []; m.limitGauge = 0; }); }
  // Revive a single fallen member by reference (church per-member revival).
  reviveOne(unit){ unit.alive = true; unit.hp = unit.maxHp(); unit.mp = unit.maxMp(); unit.statuses = []; unit.limitGauge = 0; }
  // Inn's service: restore HP/MP for members who are still standing. This
  // intentionally does NOT revive the fallen — that's the church's job —
  // so a member who died mid-battle stays down until properly revived,
  // instead of silently vanishing from future battles forever.
  fullRestore(){ this.members.forEach(m=>{ if(m.alive){ m.hp = m.maxHp(); m.mp = m.maxMp(); } }); }
  livingMembers(){ return this.members.filter(m=>m.alive); }
  recordMonsterSeen(id){ this.codex.monsters[id] = true; }
  recordEquipmentSeen(id){ this.codex.equipment[id] = true; }
  recordGemSeen(id){ this.codex.gems[id] = true; }
}

/* ============================================================
   SECTION 4: ENEMY MANAGER — spawns scaled monster instances.
   ============================================================ */
class EnemyManager{
  constructor(game){ this.game = game; }
  // Scale factor grows with floor depth and the permanent danger level,
  // with no ceiling — purely additive/multiplicative, never clamped high.
  scaleFactor(floor, danger){ return 1 + floor*0.12 + danger*0.22; }
  spawnFromTemplate(templateId, isBoss, floor, danger){
    const tpl = isBoss ? Database.bosses[templateId] : Database.monsters[templateId];
    if(!tpl) return null;
    const scale = this.scaleFactor(floor, danger) * (isBoss?1.6:1);
    const base = {};
    for(const k of Database.baseStatKeys){
      const raw = tpl.base[k];
      base[k] = (raw===undefined) ? (k==='hit'?0.9:k==='eva'?0.02:k==='crit'?0.04:k==='critDmg'?0.5:0) : (typeof raw==='number' && raw<1.5 && (k==='hit'||k==='eva'||k==='crit'||k==='critDmg') ? raw : raw*scale);
    }
    const unit = new Unit({
      name: tpl.name, isEnemy:true, base, element: tpl.element, resist: tpl.resist||{},
      level: Math.max(1, Math.round(floor + danger*2)), glyph: tpl.glyph, skills: (tpl.skills||[]).slice(),
      onHitStatus: tpl.onHitStatus||[],
    });
    unit.templateId = templateId;
    unit.isBoss = isBoss;
    unit.goldRange = tpl.gold || [1,3];
    unit.bossPhaseSkills = tpl.bossPhaseSkills || [];
    this.game.party.recordMonsterSeen(templateId);
    return unit;
  }
  spawnWave(stageDef, floor, danger, isFinalFloor, isElite){
    const count = isFinalFloor ? 1 : Util.clamp(1 + Math.floor(floor/2) + (isElite?1:0), 1, 8);
    const enemies = [];
    if(isFinalFloor){
      enemies.push(this.spawnFromTemplate(stageDef.boss, true, floor, danger));
    } else {
      for(let i=0;i<count;i++){
        const id = RNG_GLOBAL.pick(stageDef.pool);
        const u = this.spawnFromTemplate(id, false, floor, danger);
        if(isElite){ u.name = '菁英 ' + u.name; for(const k of ['hp','atk','matk','def','mdef']) u.base[k] = Math.round(u.base[k]*1.5); u.hp = u.maxHp(); u.isElite = true; }
        enemies.push(u);
      }
    }
    return enemies;
  }
}

/* ============================================================
   SECTION 5: GEM MANAGER — generic combination engine.
   A "skill gem instance" = { baseId, specials:[specialId,...], rarity, level, instanceId, affixes }
   combineSkill() builds the *actual* runtime skill object by starting
   from the Database.skillGems[baseId] template, then letting each
   equipped special gem's apply() mutate it in sequence, and finally
   composing a display name from each special's namePattern. This is
   the "automatic combination system" — adding a new special gem to
   the Database is the only step needed to make it combine with every
   existing skill gem.
   ============================================================ */
class GemManager{
  constructor(game){ this.game = game; }

  combineSkill(gemInstance){
    const tpl = Database.skillGems[gemInstance.baseId];
    if(!tpl) return null;
    const built = Util.deepClone(tpl);
    built.sourceInstanceId = gemInstance.instanceId;
    let displayName = built.name;
    (gemInstance.specials||[]).forEach(specId=>{
      const sp = Database.specialGems[specId];
      if(!sp) return;
      sp.apply(built);
      displayName = sp.namePattern.replace('{name}', displayName);
    });
    // Rarity of the *skill gem itself* scales raw power, independent of specials.
    const rarity = RARITY_TABLE[gemInstance.rarity] || RARITY_TABLE.common;
    built.power *= rarity.power;
    // Affixes rolled onto this specific gem instance (see rollAffixes) add
    // situational combat modifiers consumed by BattleManager.
    built.affixes = gemInstance.affixes || [];
    built.displayName = displayName;
    built.rarity = gemInstance.rarity;
    built.glyph = tpl.glyph;
    return built;
  }

  // ---- Drop / generation ----
  rollAffixes(rarity){
    const count = (RARITY_TABLE[rarity]||RARITY_TABLE.common).affixCount;
    const pool = Database.gemAffixPool.slice();
    const chosen = [];
    for(let i=0;i<count && pool.length;i++){
      const idx = RNG_GLOBAL.int(0,pool.length-1);
      const def = pool.splice(idx,1)[0];
      const v = RNG_GLOBAL.int(def.range[0], def.range[1]);
      chosen.push({ id:def.id, text:def.text.replace('{v}', v), stat:def.stat, mode:def.mode, value: def.mode==='percent'? v/100 : v });
    }
    return chosen;
  }
  createSkillGemInstance(baseId, rarity, level){
    rarity = rarity || rollRarity(RNG_GLOBAL, this.game.party.dangerLevel);
    return { kind:'skill', baseId, specials:[], rarity, level: level||1, instanceId: Util.uid('gem'), affixes: this.rollAffixes(rarity) };
  }
  createSpecialGemInstance(specialId, rarity){
    rarity = rarity || rollRarity(RNG_GLOBAL, this.game.party.dangerLevel);
    return { kind:'special', baseId: specialId, rarity, instanceId: Util.uid('gem') };
  }
  createAbilityGemInstance(baseId, rarity){
    rarity = rarity || rollRarity(RNG_GLOBAL, this.game.party.dangerLevel);
    return { kind:'ability', baseId, rarity, instanceId: Util.uid('gem'), affixes: this.rollAffixes(rarity) };
  }
  createLimitGemInstance(baseId){
    return { kind:'limit', baseId, rarity:'epic', instanceId: Util.uid('gem') };
  }
  rollRandomGemForFloor(danger){
    const kindRoll = RNG_GLOBAL.next();
    const rarity = rollRarity(RNG_GLOBAL, danger);
    if(kindRoll < 0.5) return this.createSkillGemInstance(RNG_GLOBAL.pick(Object.keys(Database.skillGems)), rarity);
    if(kindRoll < 0.8) return this.createAbilityGemInstance(RNG_GLOBAL.pick(Object.keys(Database.abilityGems)), rarity);
    return this.createSpecialGemInstance(RNG_GLOBAL.pick(Object.keys(Database.specialGems)), rarity);
  }
  // Limit gems are intentionally rare and powerful — they're not part of
  // the normal floor drop roll above. Instead they drop specifically from
  // boss kills (see LootManager.rollEnemyDrop) or can be purchased at the
  // gem shop's 極限 tab, both at a meaningfully higher cost than other gems.
  rollRandomLimitGem(){
    return this.createLimitGemInstance(RNG_GLOBAL.pick(Object.keys(Database.limitGems)));
  }

  describe(gemInst){
    if(gemInst.kind==='skill'){ const built=this.combineSkill(gemInst); return `${built.displayName} ‧ ${RARITY_NAME[gemInst.rarity]}`; }
    if(gemInst.kind==='special'){ return `${Database.specialGems[gemInst.baseId].name}晶石 ‧ ${RARITY_NAME[gemInst.rarity]}`; }
    if(gemInst.kind==='ability'){ return `${Database.abilityGems[gemInst.baseId].name} ‧ ${RARITY_NAME[gemInst.rarity]}`; }
    if(gemInst.kind==='limit'){ return `${Database.limitGems[gemInst.baseId].name}（極限技）`; }
    return '未知晶石';
  }

  // NOTE: specials no longer attach via an explicit "attachSpecial" call.
  // Instead, any special gem socketed on the SAME equipment piece as a
  // skill gem combines with it automatically (see SkillManager._gemsFromEquipment).
  // This keeps the "combination system" purely data-driven through socket
  // co-location rather than a separate bookkeeping step.

  // Synthesis: 3 identical gems (same kind+baseId+rarity) -> 1 gem, one rarity tier higher.
  trySynthesize(threeInstances){
    if(threeInstances.length !== 3) return {ok:false, msg:'需要恰好三顆相同晶石'};
    const [a,b,c] = threeInstances;
    if(a.kind==='limit') return {ok:false, msg:'極限技晶石無法合成'};
    if(![b,c].every(g=> g.kind===a.kind && g.baseId===a.baseId && g.rarity===a.rarity)) return {ok:false, msg:'三顆晶石種類與品質須相同'};
    const idx = RARITY_ORDER.indexOf(a.rarity);
    if(idx >= RARITY_ORDER.length-1) return {ok:false, msg:'已是最高品質'};
    const nextRarity = RARITY_ORDER[idx+1];
    let result;
    if(a.kind==='skill') result = this.createSkillGemInstance(a.baseId, nextRarity);
    else if(a.kind==='ability') result = this.createAbilityGemInstance(a.baseId, nextRarity);
    else result = this.createSpecialGemInstance(a.baseId, nextRarity);
    return {ok:true, result};
  }
}

/* ============================================================
   SECTION 6: EQUIPMENT MANAGER
   ============================================================ */
class EquipmentManager{
  constructor(game){ this.game = game; }
  createInstance(baseId, rarity){
    const def = Database.equipment[baseId]; if(!def) return null;
    rarity = rarity || rollRarity(RNG_GLOBAL, this.game.party.dangerLevel);
    return { instanceId: Util.uid('eq'), baseId, rarity, enhanceLevel:0, sockets: new Array(Math.min(def.sockets,6)).fill(null), unlockedSockets: Math.min(def.sockets,6) };
  }
  equip(unit, eqInstance){
    const def = Database.equipment[eqInstance.baseId]; if(!def) return false;
    const prev = unit.equipment[def.slot];
    unit.equipment[def.slot] = eqInstance;
    this.game.party.recordEquipmentSeen(eqInstance.baseId);
    if(prev) this.game.party.inventory.equipment.push(prev);
    const idx = this.game.party.inventory.equipment.indexOf(eqInstance);
    if(idx>=0) this.game.party.inventory.equipment.splice(idx,1);
    unit.hp = Math.min(unit.hp, unit.maxHp());
    unit.mp = Math.min(unit.mp, unit.maxMp());
    return true;
  }
  unequip(unit, slot){
    const cur = unit.equipment[slot];
    if(!cur) return null;
    unit.equipment[slot] = null;
    this.game.party.inventory.equipment.push(cur);
    return cur;
  }
  socketGem(eqInstance, gemInstance, slotIndex){
    if(slotIndex >= eqInstance.unlockedSockets) return {ok:false, msg:'插槽尚未解鎖'};
    if(eqInstance.sockets[slotIndex]) return {ok:false, msg:'插槽已被佔用'};
    eqInstance.sockets[slotIndex] = gemInstance;
    const idx = this.game.party.inventory.gems.indexOf(gemInstance);
    if(idx>=0) this.game.party.inventory.gems.splice(idx,1);
    return {ok:true};
  }
  unsocketGem(eqInstance, slotIndex){
    const g = eqInstance.sockets[slotIndex];
    if(!g) return null;
    eqInstance.sockets[slotIndex] = null;
    this.game.party.inventory.gems.push(g);
    return g;
  }
  sellValue(eqInstance){
    const def = Database.equipment[eqInstance.baseId];
    const rarity = RARITY_TABLE[eqInstance.rarity]||RARITY_TABLE.common;
    return Math.round((def.baseCost*0.35 + eqInstance.enhanceLevel*15) * rarity.power);
  }
}

/* ============================================================
   SECTION 7: FORGE MANAGER — enhancement & rarity upgrade.
   ============================================================ */
class ForgeManager{
  constructor(game){ this.game = game; }
  enhanceCost(eqInstance){ return Math.round(40 * Math.pow(1.35, eqInstance.enhanceLevel)); }
  enhanceMageGemCost(eqInstance){ return 1 + Math.floor(eqInstance.enhanceLevel/3); }
  enhance(eqInstance){
    const gold = this.enhanceCost(eqInstance);
    const gemsNeeded = this.enhanceMageGemCost(eqInstance);
    const mageGems = this.game.party.inventory.gems.filter(g=>g.kind==='ability');
    if(this.game.party.gold < gold) return {ok:false, msg:'金幣不足'};
    if(mageGems.length < gemsNeeded) return {ok:false, msg:`需要 ${gemsNeeded} 顆魔晶石（能力晶石）`};
    this.game.party.spendGold(gold);
    for(let i=0;i<gemsNeeded;i++){
      const idx = this.game.party.inventory.gems.indexOf(mageGems[i]);
      this.game.party.inventory.gems.splice(idx,1);
    }
    eqInstance.enhanceLevel++;
    if(eqInstance.enhanceLevel % 5 === 0 && eqInstance.unlockedSockets < eqInstance.sockets.length){
      eqInstance.unlockedSockets++;
    }
    return {ok:true};
  }
  upgradeRarityCost(eqInstance){ const idx = RARITY_ORDER.indexOf(eqInstance.rarity); return Math.round(150 * Math.pow(2.1, idx)); }
  upgradeRarity(eqInstance){
    const idx = RARITY_ORDER.indexOf(eqInstance.rarity);
    if(idx >= RARITY_ORDER.length-1) return {ok:false, msg:'已是最高品質'};
    const cost = this.upgradeRarityCost(eqInstance);
    if(!this.game.party.spendGold(cost)) return {ok:false, msg:'金幣不足'};
    eqInstance.rarity = RARITY_ORDER[idx+1];
    return {ok:true};
  }
}

/* ============================================================
   SECTION 8: SKILL MANAGER — resolves a unit's currently usable
   active skills (job-fixed for allies, gem-driven for the MC).
   ============================================================ */
class SkillManager{
  constructor(game){ this.game = game; }

  // Collect all skill gems socketed across a unit's equipped items.
  // Enemies and job-based allies still use their fixed `skills` array.
  // Any special gem(s) socketed on the SAME piece of equipment as a skill
  // gem are automatically merged into that skill gem's `.specials` before
  // building — this is what makes "equip gear with Fire + 全體化 in its
  // sockets" produce "Fire All" with no per-combination code.
  _gemsFromEquipment(unit){
    if(!unit.equipment) return [];
    const skillGemsOut = [];
    for(const slot of ['weapon','offhand','armor','accessory']){
      const eq = unit.equipment[slot]; if(!eq) continue;
      const sockets = eq.sockets || [];
      const specialsOnThisPiece = sockets.filter(g=>g && g.kind==='special').map(g=>g.baseId);
      sockets.forEach(g=>{
        if(!g || g.kind!=='skill') return;
        // Build a shallow copy so we don't mutate the stored instance's
        // specials array with sockets that could change next render.
        const effectiveGem = Object.assign({}, g, { specials: specialsOnThisPiece });
        skillGemsOut.push(effectiveGem);
      });
    }
    return skillGemsOut;
  }

  // Collect all LIMIT gems socketed across a unit's equipped items. Unlike
  // skill gems, limit gems are never combined with specials — they're
  // standalone ultimates (per the original design: "極限技不受特殊晶石影響").
  _limitGemsFromEquipment(unit){
    if(!unit.equipment) return [];
    const out = [];
    for(const slot of ['weapon','offhand','armor','accessory']){
      const eq = unit.equipment[slot]; if(!eq) continue;
      (eq.sockets||[]).forEach(g=>{ if(g && g.kind==='limit') out.push(g); });
    }
    return out;
  }

  // Returns array of {key, built, gemInstance|null, mpCost, source:'gem'|'job'}
  getUsableSkills(unit){
    const out = [];
    if(unit.isEnemy){
      (unit.skills||[]).forEach(skillId=>{
        const tpl = Database.skillGems[skillId]; if(!tpl) return;
        const built = Util.deepClone(tpl); built.displayName = tpl.name; built.glyph = tpl.glyph;
        out.push({ key:'enemy_'+skillId, built, gemInstance:null, mpCost: built.mpCost, source:'enemy' });
      });
      return out;
    }
    // Party members: skills come from equipment-socketed skill gems
    const socketedGems = this._gemsFromEquipment(unit);
    if(socketedGems.length > 0){
      socketedGems.forEach((g,i)=>{
        const built = this.game.gems.combineSkill(g);
        out.push({ key:'gem_eq_'+i, built, gemInstance:g, mpCost: built.mpCost, source:'gem' });
      });
    }
    // Job-fixed skills: for allies, include these regardless of socketed gems.
    // This now includes skills LEARNED via level-up (see Unit.gainXp), not
    // just a single starting skill — unit.skills grows over time.
    if(!unit.isMainCharacter){
      (unit.skills||[]).forEach(skillId=>{
        const tpl = Database.skillGems[skillId]; if(!tpl) return;
        const built = Util.deepClone(tpl); built.displayName = tpl.name; built.glyph = tpl.glyph;
        out.push({ key:'job_'+skillId, built, gemInstance:null, mpCost: built.mpCost, source:'job' });
      });
    }
    return out;
  }

  // Returns ALL limit skills currently available to `unit`, as an array of
  // {key, built, gemInstance|null, source:'gem'|'job'}. A unit can have
  // multiple limits at once: one per limit gem socketed in their equipped
  // gear, PLUS their job's signature limit (always available to job-based
  // allies regardless of equipment). The MC has no job, so their limits
  // come entirely from equipped limit gems — encouraging exactly the kind
  // of "build your own multi-limit loadout" play the equipment-socket
  // system is meant for.
  getLimitSkills(unit){
    if(unit.isEnemy) return [];
    const out = [];
    const seenIds = new Set(); // de-dupe if the same limit gem type is socketed twice
    this._limitGemsFromEquipment(unit).forEach((g,i)=>{
      const tpl = Database.limitGems[g.baseId]; if(!tpl) return;
      const built = Util.deepClone(tpl); built.displayName = tpl.name; built.glyph = tpl.glyph; built.isLimit = true;
      out.push({ key:'limgem_'+i, built, gemInstance:g, source:'gem' });
      seenIds.add(g.baseId);
    });
    if(unit.job){
      const job = Database.jobs[unit.job];
      if(job && job.limitSkill && !seenIds.has(job.limitSkill)){
        const tpl = Database.limitGems[job.limitSkill];
        if(tpl){
          const built = Util.deepClone(tpl); built.displayName = tpl.name; built.glyph = tpl.glyph; built.isLimit = true;
          out.push({ key:'job_limit_'+job.limitSkill, built, gemInstance:null, source:'job' });
        }
      }
    }
    return out;
  }
}

/* ============================================================
   SECTION 9: LOOT MANAGER
   ============================================================ */
class LootManager{
  constructor(game){ this.game = game; }
  rollRandomGem(danger){ return this.game.gems.rollRandomGemForFloor(danger); }
  describeGem(g){ return this.game.gems.describe(g); }
  rollEnemyDrop(enemy, danger){
    const drops = { gold: RNG_GLOBAL.int(enemy.goldRange[0], enemy.goldRange[1]) * (1+danger*0.15), gems:[], equipment:null };
    const gemChance = enemy.isBoss ? 1.0 : (enemy.isElite ? 0.65 : 0.35);
    if(RNG_GLOBAL.chance(gemChance)) drops.gems.push(this.rollRandomGem(danger));
    if(enemy.isBoss && RNG_GLOBAL.chance(0.7)) drops.gems.push(this.rollRandomGem(danger));
    // Limit gems are boss-exclusive drops, and even then not guaranteed —
    // they're meant to feel like a special find, not routine loot.
    if(enemy.isBoss && RNG_GLOBAL.chance(0.35)) drops.gems.push(this.game.gems.rollRandomLimitGem());
    const eqChance = enemy.isBoss ? 0.55 : (enemy.isElite ? 0.12 : 0.03);
    if(RNG_GLOBAL.chance(eqChance)){
      const baseId = RNG_GLOBAL.pick(Object.keys(Database.equipment));
      drops.equipment = this.game.equipmentManager.createInstance(baseId, rollRarity(RNG_GLOBAL, danger));
    }
    return drops;
  }
  applyDropsToRun(runLoot, drops){
    runLoot.gold += drops.gold;
    runLoot.gems.push(...drops.gems);
    if(drops.equipment) runLoot.equipment.push(drops.equipment);
  }
  commitRunLoot(runLoot){
    this.game.party.addGold(runLoot.gold);
    runLoot.gems.forEach(g=>this.game.party.inventory.gems.push(g));
    runLoot.equipment.forEach(e=>{ this.game.party.inventory.equipment.push(e); this.game.party.recordEquipmentSeen(e.baseId); });
    runLoot.gems.forEach(g=>this.game.party.recordGemSeen(g.baseId));
  }
}

/* ============================================================
   SECTION 10: ANIMATION MANAGER — DOM-driven battle performance.
   All effects are short CSS-class toggles + floating popups so the
   engine stays framework-free; BattleManager awaits these via
   Promises to keep the turn sequence readable.
   ============================================================ */
class AnimationManager{
  constructor(game){ this.game = game; }
  wait(ms){ return new Promise(res=>setTimeout(res, ms)); }
  popupLayerEl(){ return document.querySelector('#screen-battle .dmg-popup-layer'); }
  fxLayerEl(){ return document.querySelector('#screen-battle .fx-layer'); }
  unitEl(unit){ return document.querySelector(`[data-unit-id="${unit.uid}"]`); }

  async floatNumber(unit, text, cls){
    const layer = this.popupLayerEl(); const anchor = this.unitEl(unit);
    if(!layer || !anchor) return;
    const r = anchor.getBoundingClientRect(); const lr = layer.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'dmg-popup ' + (cls||'');
    el.textContent = text;
    el.style.left = (r.left - lr.left + r.width/2 + RNG_GLOBAL.int(-10,10)) + 'px';
    el.style.top = (r.top - lr.top + r.height*0.2) + 'px';
    layer.appendChild(el);
    setTimeout(()=>el.remove(), 950);
    await this.wait(60);
  }
  async burst(unit, element){
    const layer = this.fxLayerEl(); const anchor = this.unitEl(unit);
    if(!layer || !anchor) return;
    const r = anchor.getBoundingClientRect(); const lr = layer.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'fx-burst fx-element-'+(element||'physical');
    el.style.left = (r.left - lr.left + r.width/2) + 'px';
    el.style.top = (r.top - lr.top + r.height/2) + 'px';
    layer.appendChild(el);
    setTimeout(()=>el.remove(), 500);
    await this.wait(180);
  }
  async lunge(unit){ const el = this.unitEl(unit); if(!el) return; el.classList.add('attack-lunge'); await this.wait(350); el.classList.remove('attack-lunge'); }
  async hitFlash(unit){ const el = this.unitEl(unit); if(!el) return; el.classList.add('flash-hit','shake'); await this.wait(280); el.classList.remove('flash-hit','shake'); }
  async limitFlash(unit){ const el = this.unitEl(unit); if(!el) return; el.classList.add('limit-flash'); await this.wait(900); el.classList.remove('limit-flash'); }
  async deathFade(unit){ const el = this.unitEl(unit); if(!el) return; el.classList.add('dead'); await this.wait(300); }
}

/* ============================================================
   SECTION 11: AI MANAGER — personality-driven ally/enemy decisions.
   Each personality is a scoring function over candidate actions
   rather than an if/else chain, so new personalities are added by
   appending to Database.aiPersonalities + a scorer entry here.
   ============================================================ */
class AIManager{
  constructor(game){ this.game = game; }

  scorers(){
    return {
      brave:        (ctx)=> ctx.isAttack ? (ctx.targetIsStrongest?3:1) : 0.4,
      conservative: (ctx)=> ctx.selfHpPct < 0.4 ? (ctx.isDefensive?3:0.3) : (ctx.isAttack?1.2:0.6),
      mp_saver:     (ctx)=> ctx.mpCost===0 ? 2.2 : (ctx.selfHpPct<0.3 ? 1.5 : 0.5),
      healer:       (ctx)=> ctx.isHeal ? (ctx.anyAllyLowHp?4:1.5) : (ctx.isAttack?0.5:0.8),
      buffer:       (ctx)=> ctx.isBuff ? (ctx.turnNumber<=3?3:1) : (ctx.isAttack?1:0.7),
      boss_focus:   (ctx)=> ctx.isAttack ? (ctx.targetIsBoss?3.5:0.8) : 0.5,
      backline:     (ctx)=> ctx.isAttack ? (ctx.targetIsBackline?3:0.9) : 0.5,
    };
  }

  // Decide one action for `unit` given the live battle state.
  decideAction(unit, battle){
    const personalityId = unit.aiPersonality || 'brave';
    const scorer = this.scorers()[personalityId] || this.scorers().brave;
    const skills = this.game.skills.getUsableSkills(unit).filter(s=> s.mpCost <= unit.mp);
    const basicAttack = { key:'basic', built:{ kind:'attack', element:'physical', target:'singleEnemy', power:0.85, mpCost:0, displayName:'攻擊' }, mpCost:0 };
    // Limit skills join the candidate pool whenever the gauge is full —
    // tagged isLimitCandidate so takeAllyAiTurn knows to route execution
    // through battle.useLimit() (which handles the gauge reset + flash
    // animation) instead of the plain executeAction() path.
    const limitCandidates = unit.limitReady() ? this.game.skills.getLimitSkills(unit).map(ls=>({
      key: ls.key, built: ls.built, mpCost: 0, isLimitCandidate: true, limitChoice: ls,
    })) : [];
    const candidates = [basicAttack, ...skills, ...limitCandidates];
    const enemies = battle.aliveEnemies();
    const allies = battle.aliveAlliesOf(unit);
    const anyAllyLowHp = allies.some(a=> a.hp/a.maxHp() < 0.45);
    const bossPresent = enemies.some(e=>e.isBoss);
    let best = null, bestScore = -1, bestTarget = null;
    candidates.forEach(cand=>{
      const isAttack = cand.built.kind==='attack';
      const isHeal = cand.built.kind==='heal';
      const isBuff = cand.built.kind==='buff';
      const isDefensive = isHeal || isBuff;
      let targets;
      if(cand.built.target==='singleEnemy' || cand.built.target==='allEnemies') targets = enemies;
      else targets = allies;
      if(targets.length===0) return;
      targets.forEach(t=>{
        const ctx = {
          isAttack, isHeal, isBuff, isDefensive, mpCost:cand.mpCost,
          selfHpPct: unit.hp/unit.maxHp(), anyAllyLowHp,
          targetIsStrongest: isAttack && t===enemies.reduce((a,b)=> (b.getStat('atk')+b.getStat('matk'))>(a.getStat('atk')+a.getStat('matk'))?b:a, enemies[0]),
          targetIsBoss: t.isBoss, targetIsBackline: isAttack && enemies.indexOf(t) >= Math.ceil(enemies.length/2),
          turnNumber: battle.turnNumber,
        };
        let score = scorer(ctx) + RNG_GLOBAL.next()*0.15;
        if(isHeal) score *= (1.4 - (t.hp/t.maxHp())); // prefer lowest-hp ally
        // Limits are a big commitment (consume the whole gauge), so weight
        // them up substantially when ready — a full gauge sitting unused
        // is a wasted resource, and this is what makes recruited allies
        // actually use their ultimates instead of hoarding them forever.
        if(cand.isLimitCandidate) score *= 2.2;
        if(score > bestScore){ bestScore = score; best = cand; bestTarget = t; }
      });
    });
    if(!best){ best = basicAttack; bestTarget = enemies[0]; }
    return { action: best, target: bestTarget };
  }
}

/* ============================================================
   SECTION 12: BATTLE MANAGER — turn-based combat core.
   ============================================================ */
class BattleManager{
  constructor(game){
    this.game = game;
    this.active = false;
    this.allies = []; this.enemies = [];
    this.turnNumber = 0;
    this.log = [];
    this.runLoot = { gold:0, gems:[], equipment:[] };
    this.onEnd = null; // callback(result) result: {won:bool}
    this.pendingPlayerAction = null; // resolved by UI
    this._resolvePlayerInput = null;
  }

  start(enemies, opts){
    this.active = true;
    this.allies = this.game.party.livingMembers();
    this.enemies = enemies;
    this.turnNumber = 0;
    this.log = [];
    this.runLoot = { gold:0, gems:[], equipment:[] };
    this.onEnd = opts && opts.onEnd;
    this.allies.forEach(a=>{ a.statuses = a.statuses.filter(s=>false); }); // clear stale buffs entering battle (limit/HP/MP persist)
    this.addLog(`戰鬥開始！遭遇 ${enemies.map(e=>e.name).join('、')}`, true);
    this.game.ui.renderBattleScreen();
    this.runLoop();
  }

  addLog(text, highlight){ this.log.push({text, highlight:!!highlight}); if(this.log.length>60) this.log.shift(); this.game.ui.appendLog(text, highlight); }

  aliveEnemies(){ return this.enemies.filter(e=>e.alive); }
  aliveAlliesOf(unit){ return this.allies.filter(a=>a.alive); }
  isVictory(){ return this.aliveEnemies().length===0; }
  isDefeat(){ return this.allies.filter(a=>a.alive).length===0; }

  turnOrder(){
    return [...this.allies, ...this.enemies].filter(u=>u.alive).sort((a,b)=> b.getStat('spd') - a.getStat('spd') + (RNG_GLOBAL.next()-0.5));
  }

  async runLoop(){
    while(this.active){
      this.turnNumber++;
      const order = this.turnOrder();
      for(const unit of order){
        if(!this.active) return;
        if(!unit.alive) continue;
        if(this.isVictory() || this.isDefeat()) break;
        await this.processStatusTick(unit);
        if(!unit.alive) continue;
        if(unit.isParalyzed() && RNG_GLOBAL.chance(0.5)){ this.addLog(`${unit.name} 因麻痺而無法行動！`); continue; }
        if(unit.isEnemy) await this.takeEnemyTurn(unit);
        else if(unit.isPlayerControlled) await this.takePlayerTurn(unit);
        else await this.takeAllyAiTurn(unit);
        if(this.isVictory() || this.isDefeat()) break;
      }
      if(this.isVictory()){ await this.endBattle(true); return; }
      if(this.isDefeat()){ await this.endBattle(false); return; }
    }
  }

  async processStatusTick(unit){
    let died = false;
    unit.tickStatuses((u, def)=>{
      const dmg = Math.round(u.maxHp() * def.dotPct);
      u.takeDamage(dmg);
      this.addLog(`${u.name} 因${def.name}受到 ${dmg} 點傷害。`);
      if(!u.alive) died = true;
    });
    this.game.ui.refreshUnitBars();
    if(died) await this.game.anim.deathFade(unit);
  }

  // ---------- Player turn: wait for UI to resolve pendingPlayerAction ----------
  takePlayerTurn(unit){
    return new Promise(resolve=>{
      this._resolvePlayerInput = resolve;
      this.game.ui.promptPlayerAction(unit);
    });
  }
  submitPlayerAction(action, target){
    if(!this._resolvePlayerInput) return;
    const resolve = this._resolvePlayerInput; this._resolvePlayerInput = null;
    this.game.ui.closeActionMenus();
    this.executeAction(this.allies.find(a=>a.isPlayerControlled), action, target).then(resolve);
  }

  async takeAllyAiTurn(unit){
    const { action, target } = this.game.ai.decideAction(unit, this);
    if(action.isLimitCandidate){
      await this.useLimit(unit, action.limitChoice);
    } else {
      await this.executeAction(unit, action, target);
    }
  }
  async takeEnemyTurn(enemy){
    const usable = this.game.skills.getUsableSkills(enemy).filter(s=>s.mpCost<=enemy.mp);
    let pool = [{ key:'basic', built:{kind:'attack',element:enemy.element,target:'singleEnemy',power:0.9,mpCost:0,displayName:'攻擊'}, mpCost:0 }, ...usable];
    if(enemy.isBoss && enemy.bossPhaseSkills && enemy.hp/enemy.maxHp() < 0.5 && RNG_GLOBAL.chance(0.5)){
      enemy.bossPhaseSkills.forEach(sid=>{ const tpl=Database.skillGems[sid]; if(tpl) pool.push({key:'phase_'+sid, built:Object.assign(Util.deepClone(tpl),{displayName:tpl.name}), mpCost:tpl.mpCost}); });
    }
    const choice = RNG_GLOBAL.pick(pool);
    // 'singleAlly'/'allAllies' from this enemy's perspective means its own
    // monster side; 'singleEnemy'/'allEnemies' means the player's party.
    const { hostileSide, friendlySide } = this.sidesFor(enemy);
    const targets = (choice.built.target==='singleAlly'||choice.built.target==='allAllies') ? friendlySide : hostileSide;
    const tauntTarget = targets.find(t=>t.hasStatus && t.hasStatus('buff_taunt'));
    const target = tauntTarget || RNG_GLOBAL.pick(targets.length?targets:[hostileSide[0]]);
    await this.executeAction(enemy, choice, target);
  }

  // ---------- Core action resolution (shared by all actors) ----------
  // Returns {hostileSide, friendlySide} for `actor` — i.e. who counts as
  // "all enemies" and "all allies" FROM THAT ACTOR'S PERSPECTIVE. Database
  // skill targets (allEnemies/allAllies) are written generically and must
  // be resolved relative to whoever is acting, not always the player's side.
  sidesFor(actor){
    if(actor.isEnemy){
      return { hostileSide: this.allies.filter(a=>a.alive), friendlySide: this.aliveEnemies() };
    }
    return { hostileSide: this.aliveEnemies(), friendlySide: this.allies.filter(a=>a.alive) };
  }

  async executeAction(actor, action, primaryTarget){
    const built = action.built;
    actor.mp = Math.max(0, actor.mp - (action.mpCost||0));
    const isAoe = built.target === 'allEnemies' || built.target === 'allAllies';
    const { hostileSide, friendlySide } = this.sidesFor(actor);
    const sideTargets = (built.target==='allEnemies') ? hostileSide
                        : (built.target==='allAllies') ? (built.allies===false? hostileSide : friendlySide)
                        : (built.target==='self') ? [actor]
                        : [primaryTarget];
    const targets = isAoe ? sideTargets : sideTargets.filter(Boolean);
    if(targets.length===0){ this.game.ui.refreshUnitBars(); return; }

    this.addLog(`${actor.name} 使用了 ${built.displayName || built.name}！`, built.isLimit);
    await this.game.anim.lunge(actor);

    const hits = built.hits || 1;
    for(let h=0; h<hits; h++){
      for(const target of targets){
        if(!target.alive) continue;
        if(built.kind==='heal'){
          await this.resolveHeal(actor, target, built);
        } else if(built.kind==='buff'){
          this.resolveBuff(actor, target, built);
        } else if(built.kind==='debuff'){
          await this.resolveDebuffOrAttack(actor, target, built, true);
        } else {
          await this.resolveAttack(actor, target, built, action.gemInstance);
        }
      }
    }
    if(built.isLimit) actor.limitGauge = 0;
    this.game.ui.refreshUnitBars();
    await this.checkDeaths(targets.concat([actor]));
  }

  resolveBuff(actor, target, built){
    if(!built.statusId) return; // e.g. the 'defend' noop action applies its own status before executeAction
    if(target.hasBarrier && target.hasBarrier()){ /* still apply, barrier only blocks damage */ }
    const def = Database.statusEffects[built.statusId];
    if(!def) return; // guard against missing status definitions
    target.addStatus(built.statusId, def.duration);
    this.addLog(`${target.name} 獲得了 ${def.name} 效果！`);
    this.game.anim.burst(target, built.element);
  }

  async resolveHeal(actor, target, built){
    const power = built.power * (actor.getStat('matk') + actor.getStat('atk')*0.3);
    const amount = Math.round(power * (0.9 + RNG_GLOBAL.next()*0.3));
    const healed = target.heal(amount);
    await this.game.anim.burst(target, 'light');
    await this.game.anim.floatNumber(target, '+'+healed, 'heal');
    this.addLog(`${target.name} 恢復了 ${healed} 點HP。`);
    // Apply any status effects tagged on this heal (e.g. lim_sanctuary adds buff_barrier)
    (built.appliesStatus||[]).forEach(s=>{
      if(RNG_GLOBAL.chance(s.chance)){ target.addStatus(s.id); }
    });
  }

  async resolveDebuffOrAttack(actor, target, built, isPureDebuff){
    const hitChance = Util.clamp(actor.getStat('hit') - target.getStat('eva') + 0.15, 0.05, 0.99);
    if(!RNG_GLOBAL.chance(hitChance)){
      await this.game.anim.floatNumber(target, 'MISS', 'miss');
      this.addLog(`${target.name} 閃避了！`); return;
    }
    if(isPureDebuff && built.statusId){
      target.addStatus(built.statusId);
      this.addLog(`${target.name} 陷入了 ${Database.statusEffects[built.statusId].name} 狀態！`);
      await this.game.anim.burst(target, built.element);
    }
  }

  computeDamage(actor, target, built, gemInstance){
    const isMagic = ['fire','ice','thunder','wind','earth','light','dark'].includes(built.element) && built.kind==='attack' && built.element!=='physical';
    const atkStat = isMagic ? actor.getStat('matk') : actor.getStat('atk');
    const defStat = isMagic ? target.getStat('mdef') : target.getStat('def');
    let defPierce = built.defPierce || 0;
    const effectiveDef = defStat * (1-defPierce);
    let raw = Math.max(1, atkStat * built.power * 1.6 - effectiveDef * 0.5);
    // elemental affix bonus from the gem instance itself
    let elemBonus = 0;
    (gemInstance && gemInstance.affixes || []).forEach(af=>{ if(af.stat === 'elemDmg_'+built.element) elemBonus += af.value; });
    raw *= (1+elemBonus);
    // resistance
    const res = target.getResist(built.element);
    raw *= (1-res);
    // crit
    const critChance = Util.clamp(actor.getStat('crit') + (built.critBonus||0), 0, 0.95);
    const isCrit = RNG_GLOBAL.chance(critChance);
    if(isCrit) raw *= (1 + actor.getStat('critDmg'));
    // variance
    raw *= (0.92 + RNG_GLOBAL.next()*0.16);
    return { amount: Math.round(raw), isCrit };
  }

  async resolveAttack(actor, target, built, gemInstance){
    if(target.hasBarrier && target.hasBarrier()){
      await this.game.anim.floatNumber(target, 'BARRIER', 'miss');
      this.addLog(`${target.name} 的結界吸收了攻擊！`);
      return;
    }
    const hitChance = Util.clamp(actor.getStat('hit') - target.getStat('eva'), 0.05, 0.99);
    await this.game.anim.burst(target, built.element);
    if(!RNG_GLOBAL.chance(hitChance)){
      await this.game.anim.floatNumber(target, 'MISS', 'miss');
      this.addLog(`${target.name} 閃避了攻擊！`);
      return;
    }
    // execute-below threshold (e.g. 暗殺)
    let execBelowProc = built.execBelow && (target.hp/target.maxHp() <= built.execBelow);
    const { amount, isCrit } = this.computeDamage(actor, target, built, gemInstance);
    const finalDmg = execBelowProc ? target.hp : amount;
    target.takeDamage(finalDmg);
    actor.gainLimit(8 + finalDmg*0.05);
    target.gainLimit(5 + finalDmg*0.08);
    await this.game.anim.hitFlash(target);
    await this.game.anim.floatNumber(target, (isCrit?'CRIT! ':'')+Util.fmt(finalDmg), (isCrit?'crit ':'')+'element-'+built.element);
    this.addLog(`${target.name} 受到 ${Util.fmt(finalDmg)} 點${ELEMENT_NAME[built.element]}傷害${isCrit?'（爆擊！）':''}。`, isCrit);
    if(built.drainPct){ const heal = actor.heal(Math.round(finalDmg*built.drainPct)); this.addLog(`${actor.name} 吸取了 ${heal} 點HP。`); }
    (built.appliesStatus||[]).forEach(s=>{ if(RNG_GLOBAL.chance(s.chance)){ target.addStatus(s.id); this.addLog(`${target.name} 陷入了 ${Database.statusEffects[s.id].name}！`); } });
    if(actor.onHitStatus && actor.onHitStatus.length){ actor.onHitStatus.forEach(s=>{ if(RNG_GLOBAL.chance(s.chance)) target.addStatus(s.id); }); }
    if(!target.alive) await this.game.anim.deathFade(target);
  }

  async checkDeaths(units){
    for(const u of units){
      if(u && !u.alive){
        if(u.isEnemy){
          const drops = this.game.loot.rollEnemyDrop(u, this.game.party.dangerLevel);
          this.game.loot.applyDropsToRun(this.runLoot, drops);
          this.addLog(`${u.name} 被擊敗了！`);
        }
      }
    }
  }

  // `limitChoice` is one entry from SkillManager.getLimitSkills(unit), i.e.
  // {built, gemInstance|null, source}. Callers (player UI, AI) are
  // responsible for picking WHICH limit to use when a unit has more than
  // one; this method just executes the chosen one.
  async useLimit(unit, limitChoice){
    if(!limitChoice || !limitChoice.built || !unit.limitReady()) return;
    const limitSkill = limitChoice.built;
    this.addLog(`${unit.name} 發動了 ${limitSkill.displayName}！`, true);
    await this.game.anim.limitFlash(unit);
    // Determine target: limit skills hit all enemies or all allies
    const isHeal = limitSkill.kind === 'heal';
    const { hostileSide, friendlySide } = this.sidesFor(unit);
    const primaryTarget = isHeal ? friendlySide[0] : hostileSide[0];
    await this.executeAction(unit, { built: limitSkill, mpCost:0 }, primaryTarget);
    unit.limitGauge = 0;
    await this.checkDeaths(this.enemies.concat(this.allies));
    this.game.ui.refreshUnitBars();
  }

  retreat(){
    // Cancel the battle loop cleanly, keep ALL loot accumulated so far —
    // both from floors already cleared this run AND whatever was earned
    // in the current (interrupted) battle.
    this.active = false;
    if(this._resolvePlayerInput){ this._resolvePlayerInput(); this._resolvePlayerInput = null; }
    this.addLog('撤退了！', true);
    // Fold this battle's partial loot into the run-level total first...
    if(this.game.run){
      const acc = this.game.run.accumulatedLoot;
      acc.gold += this.runLoot.gold;
      acc.gems.push(...this.runLoot.gems);
      acc.equipment.push(...this.runLoot.equipment);
      // ...then commit the FULL run-level total (previous floors + this one)
      // to the party's permanent inventory in one go.
      this.game.loot.commitRunLoot(acc);
    } else {
      // Defensive fallback if somehow there's no active run object.
      this.game.loot.commitRunLoot(this.runLoot);
    }
    this.runLoot = {gold:0, gems:[], equipment:[]};
    // NOTE: intentionally do NOT reviveAll() here — fallen members stay
    // fallen until healed at the Church. This gives Church a distinct
    // purpose from the Inn (which only restores HP/MP for the living).
    const fallenCount = this.game.party.members.filter(m=>!m.alive).length;
    this.game.run = null;
    this.game.saveManager.autosave();
    this.game.ui.hideOverlay();
    this.game.ui.showToast(fallenCount>0 ? `成功撤退！取得的戰利品已保留。有 ${fallenCount} 位隊友倒下，請至教堂治療。` : '成功撤退！取得的戰利品已保留。');
    this.game.ui.showScreen('town');
    this.game.ui.renderTownScreen();
  }

  async endBattle(won){
    this.active = false;
    if(won){
      // XP = base 8 per floor level, scaled by enemy count and danger
      const xpReward = Math.round(
        8 * this.enemies.length *
        (1 + (this.game.run ? this.game.run.floor * 0.15 : 0)) *
        (1 + this.game.party.dangerLevel * 0.1)
      );
      const levelUpMsgs = [];
      this.game.party.livingMembers().forEach(u=>{
        const levelUps = u.gainXp(xpReward);
        if(levelUps && levelUps.length) levelUps.forEach(entry=>{
          levelUpMsgs.push(`⬆ ${u.name} 升到了 Lv${entry.level}！`);
          entry.learnedSkillIds.forEach(skillId=>{
            const tpl = Database.skillGems[skillId];
            if(tpl) levelUpMsgs.push(`📖 ${u.name} 學會了「${tpl.name}」！`);
          });
        });
      });
      this.addLog(`戰鬥勝利！獲得 ${xpReward} EXP。`, true);
      levelUpMsgs.forEach(m=> this.addLog(m, true));
    } else {
      this.addLog('隊伍倒下了……', true);
    }
    await this.game.anim.wait(500);
    if(this.onEnd) this.onEnd({ won, loot: this.runLoot });
  }
}

/* ============================================================
   SECTION 13: STAGE MANAGER — roguelite floor progression.
   ============================================================ */
class StageManager{
  constructor(game){ this.game = game; }
  unlockedStages(){
    return Object.values(Database.stages).filter(s => this.game.party.dangerLevel >= s.minDanger);
  }
  beginRun(stageId){
    const def = Database.stages[stageId]; if(!def) return false;
    if(this.game.party.livingMembers().length === 0){
      this.game.ui.showToast('全隊倒下了！請先到教堂復活隊友。');
      return false;
    }
    this.game.run = {
      stageId, floor:1, maxFloor: def.floors, def,
      cleared:false, inBattle:false,
      seed: Date.now(),
      // Accumulates loot across ALL floors cleared so far in this run.
      // Each individual battle's runLoot (on BattleManager) only tracks
      // that one fight; it gets folded into this run-level total the
      // moment the battle ends (win OR retreat), so progress isn't lost
      // when moving between floors or leaving early.
      accumulatedLoot: { gold:0, gems:[], equipment:[] },
    };
    this.game.ui.showScreen('dungeon');
    this.game.ui.renderDungeonScreen();
    return true;
  }
  // Fold one battle's loot into the run-level accumulator. Safe to call
  // multiple times across floors — each battle's runLoot is fresh.
  _foldBattleLootIntoRun(battleLoot){
    if(!this.game.run) return;
    const acc = this.game.run.accumulatedLoot;
    acc.gold += battleLoot.gold;
    acc.gems.push(...battleLoot.gems);
    acc.equipment.push(...battleLoot.equipment);
  }
  isFinalFloor(){ return this.game.run.floor >= this.game.run.maxFloor; }
  isEliteFloor(){ return this.game.run.floor % 3 === 0 && !this.isFinalFloor(); }
  enterFloorBattle(forceAmbush){
    const run = this.game.run;
    const enemies = this.game.enemyManager.spawnWave(run.def, run.floor, this.game.party.dangerLevel, this.isFinalFloor(), this.isEliteFloor());
    run.inBattle = true;
    this.game.battle.start(enemies, { onEnd: (result)=> this.onBattleEnd(result) });
  }
  onBattleEnd(result){
    const run = this.game.run;
    run.inBattle = false;
    if(result.won){
      // Fold this floor's loot into the run-level total right away — this
      // is what makes loot survive moving to the next floor (previously
      // BattleManager.start() would reset its per-battle runLoot on the
      // very next floor's battle, silently discarding anything not yet
      // committed to the party's permanent inventory).
      this._foldBattleLootIntoRun(result.loot);
      this.game.ui.showRunResultScreen(result, ()=>{
        if(this.isFinalFloor()){
          this.completeRun(true);
        } else {
          run.floor++;
          this.game.ui.showScreen('dungeon');
          this.game.ui.renderDungeonScreen();
        }
      });
    } else {
      // Full party wipe: do NOT fold loot — this is the intended roguelite
      // death penalty (see completeRun(false) below).
      this.game.ui.showRunResultScreen(result, ()=> this.completeRun(false));
    }
  }
  advanceFloorWithEvent(){
    const run = this.game.run;
    const roll = this.game.eventManager.rollEvent();
    if(roll){
      this.game.eventManager.trigger(roll, (msg)=>{
        if(this.game.flags.pendingAmbush){
          this.game.flags.pendingAmbush = false;
          this.enterFloorBattle(true);
        } else {
          this.game.ui.renderDungeonScreen();
        }
      });
    } else {
      this.enterFloorBattle(false);
    }
  }
  completeRun(survived){
    if(survived){
      this.game.loot.commitRunLoot(this.game.run.accumulatedLoot);
      this.game.party.dangerLevel++; // permanent world danger increase on a successful clear
      this.game.party.fullRestore(); // restores HP/MP for living members only — fallen stay down
      const fallenCount = this.game.party.members.filter(m=>!m.alive).length;
      this.game.ui.showToast(`挑戰成功！世界危險度提升至 ${this.game.party.dangerLevel}` + (fallenCount>0?`（${fallenCount}位隊友倒下，請至教堂治療）`:''));
    } else {
      // Roguelite death: lose this run's loot, keep codex + permanent danger level.
      // The whole party wipes when this branch is reached, so a full revive
      // is appropriate here — otherwise the player would be stuck unable to
      // even reach the Church (everyone is down). Church remains relevant
      // for the more common case of a partial wipe during a retreat or win.
      this.game.party.reviveAll();
      this.game.ui.showToast('你失去了本次戰利品，但圖鑑與危險度等永久資源仍然保留。');
    }
    this.game.run = null;
    this.game.saveManager.autosave();
    this.game.ui.showScreen('town');
    this.game.ui.renderTownScreen();
  }
}

/* ============================================================
   SECTION 14: EVENT MANAGER — random events between battles.
   ============================================================ */
class EventManager{
  constructor(game){ this.game = game; }
  rollEvent(){
    if(!RNG_GLOBAL.chance(0.45)) return null; // 45% chance something happens before the next fight
    const entries = Database.allEventList.map(e=>({ item:e, weight:e.weight }));
    return RNG_GLOBAL.weighted(entries);
  }
  trigger(eventDef, callback){
    const msg = eventDef.effect(this.game);
    this.game.ui.showEventModal(eventDef, msg, callback);
  }
}

/* ============================================================
   SECTION 15: TOWN MANAGER — hub navigation + shop transactions.
   ============================================================ */
class TownManager{
  constructor(game){ this.game = game; }
  buyEquipment(baseId){
    const def = Database.equipment[baseId];
    if(!this.game.party.spendGold(def.baseCost)) return {ok:false, msg:'金幣不足'};
    const inst = this.game.equipmentManager.createInstance(baseId, 'common');
    this.game.party.inventory.equipment.push(inst);
    return {ok:true, inst};
  }
  buyGem(kind, baseId){
    const cost = kind==='limit' ? 600 : kind==='special' ? 90 : kind==='ability' ? 70 : 60;
    if(!this.game.party.spendGold(cost)) return {ok:false, msg:'金幣不足'};
    let inst;
    if(kind==='skill') inst = this.game.gems.createSkillGemInstance(baseId, 'common');
    else if(kind==='special') inst = this.game.gems.createSpecialGemInstance(baseId, 'common');
    else if(kind==='limit') inst = this.game.gems.createLimitGemInstance(baseId);
    else inst = this.game.gems.createAbilityGemInstance(baseId, 'common');
    this.game.party.inventory.gems.push(inst);
    return {ok:true, inst};
  }
  sellEquipment(inst){
    const value = this.game.equipmentManager.sellValue(inst);
    this.game.party.addGold(value);
    const idx = this.game.party.inventory.equipment.indexOf(inst);
    if(idx>=0) this.game.party.inventory.equipment.splice(idx,1);
    return value;
  }
  sellGem(inst){
    const rarity = RARITY_TABLE[inst.rarity]||RARITY_TABLE.common;
    const value = rarity.sellValue;
    this.game.party.addGold(value);
    const idx = this.game.party.inventory.gems.indexOf(inst);
    if(idx>=0) this.game.party.inventory.gems.splice(idx,1);
    return value;
  }
  restAtInn(){
    const cost = 15 + this.game.party.dangerLevel*3;
    if(!this.game.party.spendGold(cost)) return {ok:false, msg:'金幣不足'};
    this.game.party.fullRestore();
    return {ok:true};
  }
}

/* ============================================================
   SECTION 16: SAVE MANAGER — localStorage + JSON export/import.
   ============================================================ */
class SaveManager{
  constructor(game){ this.game = game; this.SAVE_KEY = 'gemstone_chronicle_save_v1'; this.VERSION = 1; }
  serialize(){
    const p = this.game.party;
    return {
      version: this.VERSION,
      savedAt: Date.now(),
      gold: p.gold,
      dangerLevel: p.dangerLevel,
      members: p.members.map(m=>this._serializeUnit(m)),
      recruitable: p.recruitable,
      inventory: p.inventory,
      codex: p.codex,
    };
  }
  _serializeUnit(u){
    return {
      name:u.name, isMainCharacter:u.isMainCharacter, isPlayerControlled:u.isPlayerControlled,
      base:u.base, level:u.level, xp:u.xp||0, xpToNext:u.xpToNext||u._calcXpToNext(u.level), element:u.element, resist:u.resist, glyph:u.glyph,
      skills:u.skills, job:u.job, aiPersonality:u.aiPersonality,
      equipment:u.equipment, // limit skills now live inside equipment sockets (kind:'limit' gems) — no separate field needed
    };
  }
  _deserializeUnit(d){
    const u = new Unit(d);
    u.xp = d.xp || 0;
    u.xpToNext = d.xpToNext || u._calcXpToNext(u.level);
    u.equipment = d.equipment;
    u.hp = u.maxHp(); u.mp = u.maxMp();
    return u;
  }
  save(){
    try{ localStorage.setItem(this.SAVE_KEY, JSON.stringify(this.serialize())); return true; }
    catch(e){ console.error('save failed', e); return false; }
  }
  autosave(){ this.save(); }
  hasSave(){ try{ return !!localStorage.getItem(this.SAVE_KEY); }catch(e){ return false; } }
  load(){
    try{
      const raw = localStorage.getItem(this.SAVE_KEY);
      if(!raw) return false;
      this.applyData(JSON.parse(raw));
      return true;
    }catch(e){ console.error('load failed', e); return false; }
  }
  applyData(data){
    // Version migration stub: future versions can transform `data` here
    // based on data.version before applying, without touching callers.
    if(!data.version) data.version = 1;
    const p = this.game.party;
    p.gold = data.gold; p.dangerLevel = data.dangerLevel;
    p.members = data.members.map(d=>this._deserializeUnit(d));
    p.recruitable = data.recruitable;
    p.inventory = data.inventory;
    p.codex = data.codex || {monsters:{},equipment:{},gems:{}};
  }
  exportJson(){
    const data = this.serialize();
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'gemstone_chronicle_save.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }
  importJsonFile(file, onDone){
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{ const data = JSON.parse(e.target.result); this.applyData(data); onDone(true); }
      catch(err){ console.error(err); onDone(false); }
    };
    reader.readAsText(file);
  }
}

/* ============================================================
   SECTION 17: UI MANAGER — screen rendering & DOM event wiring.
   Each screen is built as a template string and swapped into
   #screen-stack. Helper renderers (party strip, item cards, etc.)
   are reused across screens to avoid duplicated markup logic.
   ============================================================ */
class UIManager{
  constructor(game){
    this.game = game;
    this.root = document.getElementById('screen-stack');
    this.toastLayer = document.getElementById('toast-layer');
    this.currentScreen = null;
    this.selectedSkillIndex = null;
    this.shopTab = 'weapon';
    this.gemShopTab = 'skill';
    this.inventoryTab = 'equipment'; // (legacy/unused placeholder, kept for compatibility)
    this.forgeTab = 'enhance';
    this.warehouseTab = 'equipment';
    this.codexTab = 'monsters';
    this.tavernTab = 'recruit';
    this.equipTargetUnitIndex = 0;
    this.equipSlotPickerSlot = null;
    this.socketPickerCtx = null;
    this.synthesizeSelection = [];
  }

  // ---------- Screen scaffolding ----------
  showScreen(name){
    this.currentScreen = name;
    this.render();
  }
  showToast(msg){
    const el = document.createElement('div');
    el.className = 'toast'; el.textContent = msg;
    this.toastLayer.appendChild(el);
    setTimeout(()=>el.remove(), 2500);
  }

  render(){
    const name = this.currentScreen;
    const renderers = {
      title: ()=>this.renderTitleScreen(),
      town: ()=>this.renderTownScreen(),
      stageSelect: ()=>this.renderStageSelectScreen(),
      dungeon: ()=>this.renderDungeonScreen(),
      battle: ()=>this.renderBattleScreen(),
      party: ()=>this.renderPartyScreen(),
      equipShop: ()=>this.renderEquipShopScreen(),
      gemShop: ()=>this.renderGemShopScreen(),
      forge: ()=>this.renderForgeScreen(),
      tavern: ()=>this.renderTavernScreen(),
      warehouse: ()=>this.renderWarehouseScreen(),
      church: ()=>this.renderChurchScreen(),
      guild: ()=>this.renderGuildScreen(),
      codex: ()=>this.renderCodexScreen(),
      saveScreen: ()=>this.renderSaveScreen(),
    };
    (renderers[name]||renderers.title)();
  }

  // Patches only the live topbar DOM nodes that change frequently (gold,
  // danger level) without rebuilding the whole screen. Call this after any
  // operation that alters party.gold or dangerLevel so the value is always
  // current regardless of which shop/screen is currently showing.
  refreshTopbar(){
    const p = this.game.party;
    const goldEl = document.querySelector('.gold-display');
    if(goldEl) goldEl.textContent = `💰 ${Util.fmt(p.gold)}`;
    const dangerEl = document.querySelector('.danger-display');
    if(dangerEl) dangerEl.textContent = `⚠ ${p.dangerLevel}`;
  }

  setHtml(html){ this.root.innerHTML = html; }

  topbarHtml(title){
    const p = this.game.party;
    return `<div class="topbar">
      <div class="topbar-title">${title}</div>
      <div class="row gap8">
        <span class="gold-display">💰 ${Util.fmt(p.gold)}</span>
        <span class="danger-display">⚠ ${p.dangerLevel}</span>
      </div>
    </div>`;
  }

  partyStripHtml(){
    return `<div class="party-strip">${this.game.party.members.map(m=>`
      <div class="party-card ${m.alive?'':'fallen'}">
        <div class="pname">${m.alive?m.glyph:'💀'} ${Util.escapeHtml(m.name)}</div>
        <div class="pjob">${m.alive?(m.job?Database.jobs[m.job].name:(m.isMainCharacter?'自由旅人':'')) + ' Lv'+m.level : '已倒下'}</div>
        <div class="bar-track"><div class="bar-fill hp" style="width:${100*m.hp/m.maxHp()}%"></div></div>
        <div class="bar-track"><div class="bar-fill mp" style="width:${100*m.mp/m.maxMp()}%"></div></div>
      </div>`).join('')}</div>`;
  }

  // ---------- Title screen ----------
  renderTitleScreen(){
    const hasSave = this.game.saveManager.hasSave();
    this.setHtml(`
      <div class="screen active" id="screen-title">
        <div class="title-emblem">💎</div>
        <div class="title-logo">
          <div class="t1">晶石異聞錄</div>
          <div class="t2">GEMSTONE CHRONICLE</div>
        </div>
        <div class="title-menu">
          <button class="btn primary" id="btn-new-game">開始新冒險</button>
          <button class="btn ${hasSave?'':'disabled'}" id="btn-continue">繼續冒險</button>
          <button class="btn ghost" id="btn-import-save">匯入存檔 (Save.json)</button>
          <input type="file" id="file-import" accept=".json" style="display:none;">
        </div>
      </div>`);
    document.getElementById('btn-new-game').onclick = ()=>{
      this.showToast('新的冒險開始了！');
      this.showScreen('town');
    };
    if(hasSave) document.getElementById('btn-continue').onclick = ()=>{
      this.game.saveManager.load();
      this.showScreen('town');
    };
    document.getElementById('btn-import-save').onclick = ()=> document.getElementById('file-import').click();
    document.getElementById('file-import').onchange = (e)=>{
      const file = e.target.files[0]; if(!file) return;
      this.game.saveManager.importJsonFile(file, (ok)=>{
        if(ok){ this.showToast('存檔匯入成功！'); this.showScreen('town'); }
        else this.showToast('存檔格式錯誤。');
      });
    };
  }

  // ---------- Town screen ----------
  renderTownScreen(){
    const buildings = [
      {key:'stage', glyph:'🗺️', label:'冒險者公會', action:()=>this.showScreen('stageSelect')},
      {key:'inn', glyph:'🛏️', label:'旅館（恢復HP/MP）', action:()=>this.openInn()},
      {key:'equipShop', glyph:'🗡️', label:'武器/防具店', action:()=>this.showScreen('equipShop')},
      {key:'gemShop', glyph:'💎', label:'晶石商店', action:()=>this.showScreen('gemShop')},
      {key:'forge', glyph:'🔨', label:'鍛造屋', action:()=>this.showScreen('forge')},
      {key:'tavern', glyph:'🍺', label:'酒館', action:()=>this.showScreen('tavern')},
      {key:'warehouse', glyph:'📦', label:'倉庫', action:()=>this.showScreen('warehouse')},
      {key:'church', glyph:'⛪', label:'教堂（復活）', action:()=>this.showScreen('church')},
      {key:'codex', glyph:'📖', label:'圖鑑', action:()=>this.showScreen('codex')},
      {key:'party', glyph:'🧑‍🤝‍🧑', label:'隊伍/裝備', action:()=>this.showScreen('party')},
      {key:'save', glyph:'💾', label:'存檔管理', action:()=>this.showScreen('saveScreen')},
    ];
    this.setHtml(`
      <div class="screen active" id="screen-town">
        ${this.topbarHtml('城鎮')}
        ${this.partyStripHtml()}
        <div class="scroll-area" style="padding:0;">
          <div class="town-banner">
            <div class="title">起始之鎮</div>
            <div class="subtitle">世界危險度 ${this.game.party.dangerLevel} ‧ 永久循環的試煉持續著</div>
          </div>
          <div class="town-grid">
            ${buildings.map((b,i)=>`<div class="town-tile" data-i="${i}"><div class="glyph">${b.glyph}</div><div class="label">${b.label}</div></div>`).join('')}
          </div>
        </div>
      </div>`);
    document.querySelectorAll('#screen-town .town-tile').forEach(el=>{
      el.onclick = ()=> buildings[+el.dataset.i].action();
    });
  }
  openInn(){
    const cost = 15 + this.game.party.dangerLevel*3;
    this.showConfirmModal('旅館', `花費 ${cost} 金幣，讓全隊HP/MP完全恢復？`, ()=>{
      const r = this.game.town.restAtInn();
      this.showToast(r.ok? '全隊已恢復精神！' : r.msg);
      this.renderTownScreen();
    });
  }

  // ---------- Stage select ----------
  renderStageSelectScreen(){

  // ---------- Dungeon (between-floor) screen ----------
  renderDungeonScreen(){
    const run = this.game.run;
    if(!run){ this.showScreen('town'); return; }
    this.setHtml(`
      <div class="screen active" id="screen-dungeon">
        ${this.topbarHtml(run.def.name)}
        ${this.partyStripHtml()}
        <div class="scroll-area center-text">
          <div style="font-size:48px; margin-top:20px;">${run.def.glyph}</div>
          <div class="mt10" style="font-size:14px;">第 ${run.floor} / ${run.maxFloor} 層</div>
          <div class="txt-dim txt-small mt6">${this.game.stageManager.isFinalFloor()?'前方傳來強大的氣息……Boss 在等著你。':(this.game.stageManager.isEliteFloor()?'此樓層似乎有菁英怪物徘徊。':'未知的危險潛伏於此。')}</div>
        </div>
        <div class="footer-actions">
          <button class="btn ghost" id="btn-retreat">撤退回城鎮</button>
          <button class="btn primary flex1" id="btn-advance">繼續前進</button>
        </div>
      </div>`);
    document.getElementById('btn-advance').onclick = ()=> this.game.stageManager.advanceFloorWithEvent();
    document.getElementById('btn-retreat').onclick = ()=>{
      this.showConfirmModal('撤退', '撤退將保留目前已取得的戰利品並返回城鎮，確定撤退嗎？', ()=>{
        this.game.loot.commitRunLoot(this.game.run.accumulatedLoot);
        this.game.run = null;
        this.game.saveManager.autosave();
        this.showScreen('town');
      });
    };
  }

  showEventModal(eventDef, msg, callback){
    this.showOverlay(`
      <div class="modal-title">${eventDef.glyph} ${eventDef.name}</div>
      <div class="modal-body center-text">
        <div class="txt-small mb6">${eventDef.desc}</div>
        <div class="txt-gold">${msg}</div>
      </div>
      <div class="modal-actions"><button class="btn primary flex1" id="btn-event-ok">繼續</button></div>

    document.getElementById('btn-event-ok').onclick = ()=>{ this.hideOverlay(); callback(msg); };

  // ---------- Battle screen ----------
  renderBattleScreen(){
    const b = this.game.battle;
    this.setHtml(`
      <div class="screen active" id="screen-battle">
        ${this.topbarHtml('戰鬥中')}
        <div class="battle-stage">
          <div class="enemy-field" id="enemy-field"></div>
          <div class="fx-layer"></div>

        </div>

  showBattleLogHistory(){
    const logs = this.game.battle.log;

      <div class="modal-title">📜 戰鬥記錄</div>
      <div class="modal-body log-history-modal">
        ${logs.length===0?'<div class="empty-state">尚無記錄</div>':
          [...logs].reverse().map(l=>`<div class="log-line ${l.highlight?'highlight':''}">${Util.escapeHtml(l.text)}</div>`).join('')}
