  enemyUnitHtml(e){
    return `<div class="enemy-unit ${e.alive?'':'dead'}" data-unit-id="${e.uid}">
      <div class="sprite">${e.glyph}</div>
      <div class="ehp-track"><div class="ehp-fill" style="width:${100*e.hp/e.maxHp()}%"></div></div>
      <div class="enemy-tag">${e.isBoss?'👑 ':(e.isElite?'⭐ ':'')}${Util.escapeHtml(e.name)}</div>
    </div>`;
  }
  allyUnitHtml(a){
    const statusIcons = a.statuses.map(s=>{ const d=Database.statusEffects[s.id]; return d?`<span class="status-icon ${d.kind}">${d.icon}</span>`:''; }).join('');
    return `<div class="ally-unit ${a.alive?'':'dead'}" data-unit-id="${a.uid}">
      <div class="aname">${a.glyph} ${Util.escapeHtml(a.name)}</div>
      <div class="gauge-row">
        <div class="bar-track"><div class="bar-fill hp" style="width:${100*a.hp/a.maxHp()}%"></div></div>
        <div class="bar-track"><div class="bar-fill mp" style="width:${100*a.mp/a.maxMp()}%"></div></div>
        <div class="bar-track"><div class="bar-fill limit" style="width:${a.limitGauge}%"></div></div>
      </div>
      <div class="status-icon-row">${statusIcons}</div>
    </div>`;
  }
  refreshUnitBars(){
    const ef = document.getElementById('enemy-field'); const af = document.getElementById('ally-field');
    if(!ef || !af) return;
    ef.innerHTML = this.game.battle.enemies.map(e=>this.enemyUnitHtml(e)).join('');
    af.innerHTML = this.game.battle.allies.map(a=>this.allyUnitHtml(a)).join('');
  }
  appendLog(text, highlight){
    const log = document.getElementById('battle-log'); if(!log) return;
    const line = document.createElement('div');
    line.className = 'log-line' + (highlight?' highlight':'');
    line.textContent = text;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  promptPlayerAction(unit){
    const cw = document.getElementById('command-window'); if(!cw) return;
    const limitSkills = this.game.skills.getLimitSkills(unit);
    const limitUsable = unit.limitReady() && limitSkills.length > 0;
    cw.innerHTML = `<div class="command-grid">
        <button class="btn primary" id="cmd-attack">⚔️<br>攻擊</button>
        <button class="btn" id="cmd-skill">✨<br>技能</button>
        <button class="btn ${limitUsable?'':'disabled'}" id="cmd-limit">🌟<br>極限技${limitSkills.length>1?` (${limitSkills.length})`:''}</button>
        <button class="btn ghost" id="cmd-defend">🛡️<br>防禦</button>
        <button class="btn danger" id="cmd-retreat" style="grid-column:span 4;">🏃 撤退（保留本輪戰利品，返回城鎮）</button>
      </div>`;
    document.getElementById('cmd-attack').onclick = ()=> this.promptTargetSelect(unit, { key:'basic', built:{kind:'attack',element:'physical',target:'singleEnemy',power:0.95,mpCost:0,displayName:'攻擊'}, mpCost:0 });
    document.getElementById('cmd-skill').onclick = ()=> this.promptSkillSelect(unit);
    document.getElementById('cmd-limit').onclick = ()=>{
      if(!limitUsable) return;
      if(limitSkills.length === 1){
        this._executeChosenLimit(unit, limitSkills[0]);
      } else {
        this.promptLimitSelect(unit, limitSkills);
      }
    };
    document.getElementById('cmd-defend').onclick = ()=>{
      unit.addStatus('buff_def', 1);
      this.appendLog(`${unit.name} 採取防禦姿態。`);
      this.refreshUnitBars();
      this.game.battle.submitPlayerAction({key:'noop',built:{kind:'buff',target:'self',mpCost:0,displayName:'防禦',statusId:null}, mpCost:0}, unit);
      cw.innerHTML = `<div class="empty-state">等待行動……</div>`;
    };
    document.getElementById('cmd-retreat').onclick = ()=>{
      this.showConfirmModal('撤退', '強制撤退將結束本場戰鬥。已在本次關卡中取得的戰利品仍會保留，確定撤退嗎？', ()=>{
        this.game.battle.retreat();
      });
    };
  }
  promptSkillSelect(unit){
    const skills = this.game.skills.getUsableSkills(unit);
    const cw = document.getElementById('command-window');
    cw.innerHTML = `<div class="skill-list">
      ${skills.map((s,i)=>`<div class="skill-row ${s.mpCost>unit.mp?'disabled':''}" data-i="${i}">
          <div><div class="skill-name">${s.built.glyph||''} ${Util.escapeHtml(s.built.displayName||s.built.name)}</div><div class="skill-desc">${s.built.desc||''}</div></div>
          <div class="skill-cost">MP ${s.mpCost}</div>
        </div>`).join('')}
      ${skills.length===0?'<div class="empty-state">尚無可用技能</div>':''}
      <button class="btn ghost mt6" id="btn-skill-back">返回</button>
    </div>`;
    document.querySelectorAll('.skill-row').forEach(el=>{
      el.onclick = ()=> this.promptTargetSelect(unit, skills[+el.dataset.i]);
    });
    document.getElementById('btn-skill-back').onclick = ()=> this.promptPlayerAction(unit);
  }
  // Lists multiple available limit skills for the player to choose between
  // (a unit can have one limit gem per equipped item, plus their job's
  // signature limit, so 2+ simultaneous options is the normal case for a
  // well-built character).
  promptLimitSelect(unit, limitSkills){
    const cw = document.getElementById('command-window');
    cw.innerHTML = `<div class="skill-list">
      ${limitSkills.map((s,i)=>`<div class="skill-row" data-i="${i}">
          <div><div class="skill-name">${s.built.glyph||''} ${Util.escapeHtml(s.built.displayName||s.built.name)} ${s.source==='job'?'<span class="txt-dim txt-small">(職業限定)</span>':''}</div><div class="skill-desc">${s.built.desc||''}</div></div>
        </div>`).join('')}
      <button class="btn ghost mt6" id="btn-limit-back">返回</button>
    </div>`;
    document.querySelectorAll('.skill-row').forEach(el=>{
      el.onclick = ()=> this._executeChosenLimit(unit, limitSkills[+el.dataset.i]);
    });
    document.getElementById('btn-limit-back').onclick = ()=> this.promptPlayerAction(unit);
  }
  // Executes a chosen limit skill and resumes the battle turn loop. This is
  // shared by both the single-limit fast path (cmd-limit click goes
  // straight here when there's only one option) and the multi-limit list.
  _executeChosenLimit(unit, limitChoice){
    document.getElementById('command-window').innerHTML = `<div class="empty-state">發動極限技中……</div>`;
    this.game.battle.useLimit(unit, limitChoice).then(()=>{
      this.refreshUnitBars();
      // The actual action was already handled inside useLimit, so we just
      // resolve the pending player-input promise to let the turn loop continue.
      if(this.game.battle._resolvePlayerInput){
        const resolve = this.game.battle._resolvePlayerInput;
        this.game.battle._resolvePlayerInput = null;
        resolve();
      }
    });
  }
  promptTargetSelect(unit, action){
    const built = action.built;
    const isAllyTarget = built.target==='singleAlly' || built.target==='allAllies';
    const isAoe = built.target==='allEnemies' || built.target==='allAllies' || built.target==='self';
    if(isAoe){
      this.game.battle.submitPlayerAction(action, null);
      document.getElementById('command-window').innerHTML = `<div class="empty-state">等待行動……</div>`;
      return;
    }
    const candidates = isAllyTarget ? this.game.battle.allies.filter(a=>a.alive) : this.game.battle.aliveEnemies();
    candidates.forEach(c=>{ const el=document.querySelector(`[data-unit-id="${c.uid}"]`); if(el) el.classList.add(isAllyTarget?'selected-target':'targetable'); });
    const cleanup = ()=> candidates.forEach(c=>{ const el=document.querySelector(`[data-unit-id="${c.uid}"]`); if(el){ el.classList.remove('targetable'); el.classList.remove('selected-target'); el.onclick=null; } });
    candidates.forEach(c=>{
      const el = document.querySelector(`[data-unit-id="${c.uid}"]`);
      if(el) el.onclick = ()=>{ cleanup(); this.game.battle.submitPlayerAction(action, c); document.getElementById('command-window').innerHTML = `<div class="empty-state">等待行動……</div>`; };
    });
    const cw = document.getElementById('command-window');
    cw.innerHTML = `<div class="empty-state">請選擇目標……</div><button class="btn ghost mt6" id="btn-target-back">取消</button>`;
    document.getElementById('btn-target-back').onclick = ()=>{ cleanup(); this.promptPlayerAction(unit); };
  }
  closeActionMenus(){ const cw = document.getElementById('command-window'); if(cw) cw.innerHTML = `<div class="empty-state">行動中……</div>`; }

      <div class="modal-body">
        ${result.won?`
          <div class="section-label">本層戰利品</div>
          <div class="txt-small">💰 金幣 +${Util.fmt(loot.gold)}</div>
          ${loot.gems.map(g=>`<div class="txt-small">💎 ${this.game.gems.describe(g)}</div>`).join('')}
          ${loot.equipment.map(e=>`<div class="txt-small">🗡️ ${Database.equipment[e.baseId].name} (${RARITY_NAME[e.rarity]})</div>`).join('')}
          ${(loot.gems.length===0 && loot.equipment.length===0)?'<div class="txt-dim txt-small">沒有額外掉落物。</div>':''}
        `:`<div class="txt-small">本次戰鬥中取得的戰利品已遺失，但圖鑑紀錄與世界危險度將永久保留。</div>`}
      </div>
      <div class="modal-actions"><button class="btn primary flex1" id="btn-result-ok">${result.won?'繼續':'返回城鎮'}</button></div>

  // ---------- Overlay / modal helpers ----------
  showOverlay(innerHtml){
    let overlay = document.getElementById('global-overlay');
    if(!overlay){
      overlay = document.createElement('div');
      overlay.id = 'global-overlay'; overlay.className = 'overlay';
      this.root.appendChild(overlay);
    }
    overlay.innerHTML = `<div class="pixel-window modal-box">${innerHtml}</div>`;
    requestAnimationFrame(()=> overlay.classList.add('show'));
  }
  hideOverlay(){ const overlay = document.getElementById('global-overlay'); if(overlay) overlay.classList.remove('show'); }
  showConfirmModal(title, body, onConfirm){
    this.showOverlay(`
      <div class="modal-title">${title}</div>
      <div class="modal-body txt-small">${body}</div>
      <div class="modal-actions">
        <button class="btn ghost flex1" id="btn-confirm-no">取消</button>
        <button class="btn primary flex1" id="btn-confirm-yes">確定</button>
      </div>`);
    document.getElementById('btn-confirm-no').onclick = ()=> this.hideOverlay();
    document.getElementById('btn-confirm-yes').onclick = ()=>{ this.hideOverlay(); onConfirm(); };
  }

  // ---------- Party / Equipment screen ----------
  renderPartyScreen(){
    const members = this.game.party.members;
    if(this.equipTargetUnitIndex >= members.length) this.equipTargetUnitIndex = 0;
    const unit = members[this.equipTargetUnitIndex] || members[0];
    const xpPct = unit.xpToNext > 0 ? Math.round(100*(unit.xp||0)/unit.xpToNext) : 100;
    this.setHtml(`
      <div class="screen active" id="screen-party">
        ${this.topbarHtml('隊伍 ‧ 裝備')}
        <div class="tab-bar">${members.map((m,i)=>`<div class="tab-btn ${i===this.equipTargetUnitIndex?'active':''}" data-i="${i}">${m.glyph} ${Util.escapeHtml(m.name)}</div>`).join('')}</div>
        <div class="scroll-area">
          ${this.unitDetailHtml(unit)}
          <div class="bar-track mt6" style="height:8px;" title="EXP ${unit.xp||0}/${unit.xpToNext}">
            <div class="bar-fill xp" style="width:${xpPct}%"></div>
          </div>
          <div class="txt-small txt-dim mt6 center-text">EXP ${unit.xp||0} / ${unit.xpToNext}</div>

          <div class="section-label mt10">裝備欄 <span class="txt-dim txt-small">（點擊換裝，點擊⬡可鑲嵌晶石）</span></div>
          ${['weapon','offhand','armor','accessory'].map(slot=>this.equipSlotRowHtml(unit, slot)).join('')}

          <div class="section-label mt10">
            ${unit.isMainCharacter?'技能晶石（來自裝備孔洞）':'固定技能 ‧ 職業：'+Database.jobs[unit.job]?.name}
          </div>
          ${this.equippedSkillSummaryHtml(unit)}

          ${unit.isMainCharacter ? '' : this.aiPersonalityPickerHtml(unit)}
          <div class="section-label mt10">極限技 <span class="txt-dim txt-small">（裝備孔洞中的極限晶石 + 職業專屬極限技）</span></div>
          ${this.limitSkillSummaryHtml(unit)}
        </div>
        <div class="footer-actions"><button class="btn flex1" id="btn-back-town">返回城鎮</button></div>
      </div>`);
    document.getElementById('btn-back-town').onclick = ()=>this.showScreen('town');

  // Shows all skill gems that are currently active (socketed in equipped gear)
  equippedSkillSummaryHtml(unit){
    if(unit.isMainCharacter){
      const skills = this.game.skills.getUsableSkills(unit);
      if(skills.length === 0) return `<div class="txt-small txt-dim">目前裝備的孔洞中沒有技能晶石。請在裝備孔洞中鑲嵌晶石。</div>`;
      return `<div style="display:flex; flex-wrap:wrap; gap:6px;">${skills.map(s=>`
        <div class="pixel-window" style="padding:6px 8px; font-size:11px; display:flex; align-items:center; gap:5px;">
          <span>${s.built.glyph}</span>
          <span class="rarity-${s.gemInstance?.rarity||'common'}">${s.built.displayName}</span>
          <span class="txt-dim txt-small">MP${s.mpCost}</span>
        </div>`).join('')}</div>`;
    } else {
      const jobSkills = (unit.skills||[]).map(id=>Database.skillGems[id]).filter(Boolean);
      const socketedSkills = this.game.skills.getUsableSkills(unit).filter(s=>s.source==='gem');
      return `<div class="txt-small mb6">${jobSkills.map(s=>s.name).join('・')||'無固定技能'}</div>`+
        (socketedSkills.length?`<div class="txt-dim txt-small">晶石加成技能：${socketedSkills.map(s=>s.built.displayName).join('・')}</div>`:'');
    }
  }
  unitDetailHtml(u){
    return `<div class="pixel-window" style="padding:10px;">
      <div class="row between"><div style="font-weight:bold;">${u.glyph} ${Util.escapeHtml(u.name)} Lv${u.level}</div><div class="txt-dim txt-small">${u.job?Database.jobs[u.job].name:'自由旅人'}</div></div>
      <div class="stat-grid mt6">
        <div><span class="stat-name">HP</span> ${Math.round(u.hp)}/${u.maxHp()}</div>
        <div><span class="stat-name">MP</span> ${Math.round(u.mp)}/${u.maxMp()}</div>
        <div><span class="stat-name">ATK</span> ${Math.round(u.getStat('atk'))}</div>
        <div><span class="stat-name">MATK</span> ${Math.round(u.getStat('matk'))}</div>
        <div><span class="stat-name">DEF</span> ${Math.round(u.getStat('def'))}</div>
        <div><span class="stat-name">MDEF</span> ${Math.round(u.getStat('mdef'))}</div>
        <div><span class="stat-name">SPD</span> ${Math.round(u.getStat('spd'))}</div>
        <div><span class="stat-name">爆擊率</span> ${Math.round(u.getStat('crit')*100)}%</div>
      </div>
    </div>`;
  }
  equipSlotRowHtml(unit, slot){
    const labelMap = {weapon:'武器',offhand:'副手',armor:'防具',accessory:'飾品'};
    const inst = unit.equipment[slot];
    const def = inst ? Database.equipment[inst.baseId] : null;
    const gemGlyphFor = (g)=>{
      if(g.kind==='skill') return Database.skillGems[g.baseId]?.glyph;
      if(g.kind==='ability') return Database.abilityGems[g.baseId]?.glyph;
      if(g.kind==='special') return Database.specialGems[g.baseId]?.glyph;
      if(g.kind==='limit') return Database.limitGems[g.baseId]?.glyph;
      return '💎';
    };
    const socketsHtml = inst ? (inst.sockets||[]).map((g,si)=>{
      const isLocked = si >= (inst.unlockedSockets||0);
      const cls = isLocked ? 'locked' : (g ? 'filled border-rarity-'+g.rarity+(g.kind==='limit'?' socket-pip-limit':'') : '');
      const glyph = isLocked ? '' : (g ? gemGlyphFor(g) : '+');
      return `<div class="socket-pip ${cls}" data-eqslot="${slot}" data-socketidx="${si}" title="${g?this.game.gems.describe(g):'空孔'}">${glyph}</div>`;
    }).join('') : '';
    return `<div class="equip-slot-row-wrap" data-slot="${slot}">
      <div class="equip-slot-row" data-slot="${slot}">
        <div class="slot-label">${labelMap[slot]}</div>
        ${inst ? `<div class="slot-content rarity-${inst.rarity}">${def.glyph} ${def.name} +${inst.enhanceLevel} <span class="txt-dim">(${RARITY_NAME[inst.rarity]})</span></div>`
               : `<div class="slot-content empty">（空，點擊裝備）</div>`}
      </div>
      ${inst ? `<div class="socket-pip-row">${socketsHtml}</div>` : ''}
    </div>`;
  }
  // Shows every limit skill currently available to this unit: one entry per
  // limit gem socketed across their equipped gear, PLUS their job's
  // signature limit (if any) which is always available regardless of
  // equipment. This replaces the old single-slot limitGemPickerHtml now
  // that limits are equipment-socketed and a unit can have several at once.
  limitSkillSummaryHtml(unit){
    const limits = this.game.skills.getLimitSkills(unit);
    if(limits.length === 0){
      return `<div class="txt-small txt-dim">${unit.isMainCharacter?'尚未裝備任何極限技晶石。請在裝備孔洞中鑲嵌極限技晶石。':'此職業沒有專屬極限技，且尚未裝備極限技晶石。'}</div>`;
    }
    return `<div style="display:flex; flex-wrap:wrap; gap:6px;">${limits.map(l=>`
      <div class="pixel-window" style="padding:6px 8px; font-size:11px; display:flex; align-items:center; gap:5px;">

  _wirePartyScreenActions(unit){
    document.querySelectorAll('#screen-party .equip-slot-row').forEach(el=>{
      el.onclick = ()=> this.openEquipPicker(unit, el.dataset.slot);
    });
    document.querySelectorAll('#screen-party .socket-pip').forEach(el=>{
      el.onclick = (ev)=>{
        ev.stopPropagation(); // don't also trigger the parent equip-row's click
        const slot = el.dataset.eqslot, idx = +el.dataset.socketidx;
        const eqInst = unit.equipment[slot];
        if(!eqInst) return;
        if(idx >= (eqInst.unlockedSockets||0)){ this.showToast('此插槽尚未解鎖，請在鍛造屋強化裝備。'); return; }

      };

    if(sel) sel.onchange = ()=>{ this.game.party.setPersonality(unit, sel.value); this.showToast('AI 性格已更新'); };

  // Picker for socketing any gem (skill/ability/special) into a specific
  // equipment socket. This is the canonical "gem goes on equipment" flow:
  // equipping the gear is what grants the wearer the gem's skill/effect.
  openSocketGemPicker(unit, eqInst, slotIndex){
    const current = eqInst.sockets[slotIndex];
    const inv = this.game.party.inventory.gems; // ALL gem kinds can be socketed, including limit gems
    const gemGlyph = (g)=> g.kind==='skill'?Database.skillGems[g.baseId]?.glyph : g.kind==='ability'?Database.abilityGems[g.baseId]?.glyph : g.kind==='limit'?Database.limitGems[g.baseId]?.glyph : Database.specialGems[g.baseId]?.glyph;
    const kindLabel = (g)=> g.kind==='skill'?'技能晶石':g.kind==='ability'?'能力晶石':g.kind==='limit'?'極限技晶石':'特殊晶石（需與同裝備上的技能晶石組合）';
    this.showOverlay(`
      <div class="modal-title">鑲嵌晶石</div>
      <div class="modal-body">
        <div class="txt-small txt-dim mb6">將晶石鑲嵌至裝備孔洞中。技能晶石會賦予可用技能；能力晶石提升數值；特殊晶石可附加在技能晶石所在的另一孔洞，於戰鬥時自動與該技能組合；極限技晶石會賦予一個額外的極限技（裝備多件即可擁有多招極限技）。</div>
        ${current?`<div class="item-card" id="pick-unsocket"><div class="item-glyph">❌</div><div class="item-info"><div class="item-name">取出目前晶石（${this.game.gems.describe(current)}）</div></div></div>`:''}
        ${inv.length===0?'<div class="empty-state">倉庫中沒有可鑲嵌的晶石</div>':''}
        ${inv.map((g,i)=>`<div class="item-card" data-i="${i}">
          <div class="item-glyph">${gemGlyph(g)||'💎'}</div>
          <div class="item-info"><div class="item-name rarity-${g.rarity}">${this.game.gems.describe(g)}</div>
          <div class="item-sub">${kindLabel(g)}</div></div>
        </div>`).join('')}
      </div>
      <div class="modal-actions"><button class="btn ghost flex1" id="btn-picker-close">關閉</button></div>
    `);
    document.getElementById('btn-picker-close').onclick = ()=> this.hideOverlay();
    const unsocketBtn = document.getElementById('pick-unsocket');
    if(unsocketBtn) unsocketBtn.onclick = ()=>{
      this.game.equipmentManager.unsocketGem(eqInst, slotIndex);
      this.hideOverlay(); this.renderPartyScreen();
    };
    document.querySelectorAll('#global-overlay .item-card[data-i]').forEach(el=>{
      el.onclick = ()=>{
        const chosen = inv[+el.dataset.i];
        if(current) this.game.party.inventory.gems.push(current); // swap old gem back to inventory
        const r = this.game.equipmentManager.socketGem(eqInst, chosen, slotIndex);
        if(!r.ok){ this.showToast(r.msg); return; }
        this.hideOverlay(); this.renderPartyScreen();
      };
    });
  }
  openEquipPicker(unit, slot){
    const inv = this.game.party.inventory.equipment.filter(e=>Database.equipment[e.baseId].slot===slot);
    const current = unit.equipment[slot];
    const eqCardHtml = (e, idAttr='')=>{
      const def = Database.equipment[e.baseId];
      const statsHtml = Object.entries(def.baseStats).map(([k,v])=>{
        const pct = ['hit','eva','crit','critDmg'].includes(k);
        return `<span class="txt-dim txt-small">${k.toUpperCase()} ${v>0?'+':''}${pct?Math.round(v*100)+'%':Math.round(v*(1+(e.enhanceLevel||0)*0.12))}</span>`;
      }).join(' ');
      const socketsHtml = (e.sockets||[]).map((g,si)=>{
        const isLocked = si >= (e.unlockedSockets||0);
        if(isLocked) return `<span style="font-size:13px; opacity:0.3;">🔒</span>`;
        if(!g) return `<span style="font-size:13px; opacity:0.5;">⬡</span>`;
        const glyph = g.kind==='skill'? Database.skillGems[g.baseId]?.glyph : g.kind==='ability'? Database.abilityGems[g.baseId]?.glyph : g.kind==='limit'? Database.limitGems[g.baseId]?.glyph : Database.specialGems[g.baseId]?.glyph;
        return `<span class="rarity-${g.rarity}" style="font-size:13px;" title="${this.game.gems.describe(g)}">${glyph||'💎'}</span>`;
      }).join('');
      return `<div class="item-card ${idAttr}" ${idAttr?`id="${idAttr}"`:''}>
        <div class="item-glyph">${def.glyph}</div>
        <div class="item-info" style="flex:1;">
          <div class="item-name rarity-${e.rarity}">${def.name} +${e.enhanceLevel} <span class="txt-dim">(${RARITY_NAME[e.rarity]})</span></div>
          <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:2px;">${statsHtml}</div>
          <div style="display:flex; gap:4px; margin-top:4px; align-items:center;"><span class="txt-small txt-dim">孔：</span>${socketsHtml}</div>
        </div>
      </div>`;
    };
    this.showOverlay(`
      <div class="modal-title">選擇裝備</div>
      <div class="modal-body">
        ${current ? `<div class="section-label">目前裝備</div>${eqCardHtml(current,'pick-unequip')}<div class="section-label mt6">卸下目前裝備</div><div class="item-card" id="pick-unequip-btn"><div class="item-glyph">❌</div><div class="item-info"><div class="item-name">卸下（放回倉庫）</div></div></div>` : ''}
        <div class="section-label mt6">倉庫（${inv.length} 件）</div>
        ${inv.length===0?'<div class="empty-state">倉庫中沒有此類裝備</div>':''}
        ${inv.map((e,i)=> eqCardHtml(e).replace('<div class="item-card', `<div class="item-card" data-i="${i}"`)).join('')}
      </div>
      <div class="modal-actions"><button class="btn ghost flex1" id="btn-picker-close">關閉</button></div>
    `);
    document.getElementById('btn-picker-close').onclick = ()=> this.hideOverlay();
    const unequipBtn = document.getElementById('pick-unequip-btn');
    if(unequipBtn) unequipBtn.onclick = ()=>{ this.game.equipmentManager.unequip(unit, slot); this.hideOverlay(); this.renderPartyScreen(); };
    document.querySelectorAll('#global-overlay .item-card[data-i]').forEach(el=>{
      el.onclick = ()=>{ this.game.equipmentManager.equip(unit, inv[+el.dataset.i]); this.hideOverlay(); this.renderPartyScreen(); };
    });
  }

  // ---------- Forge ----------
  renderForgeScreen(){
    const eqInv = this.game.party.inventory.equipment.concat(this.game.party.members.flatMap(m=>Object.values(m.equipment||{}).filter(Boolean)));
    this.setHtml(`
      <div class="screen active" id="screen-forge">
        ${this.topbarHtml('鍛造屋')}
        <div class="tab-bar">
          <div class="tab-btn ${this.forgeTab==='enhance'?'active':''}" data-tab="enhance">強化裝備</div>
          <div class="tab-btn ${this.forgeTab==='synth'?'active':''}" data-tab="synth">晶石合成</div>
        </div>
        <div class="scroll-area" id="forge-body"></div>
        <div class="footer-actions"><button class="btn flex1" id="btn-back-town">返回城鎮</button></div>
      </div>`);
    document.getElementById('btn-back-town').onclick = ()=>this.showScreen('town');
    if(this.forgeTab!=='enhance' && this.forgeTab!=='synth') this.forgeTab='enhance';
    document.querySelectorAll('#screen-forge .tab-btn').forEach(el=>{ el.onclick = ()=>{ this.forgeTab = el.dataset.tab; this.renderForgeScreen(); }; });
    const body = document.getElementById('forge-body');
    if(this.forgeTab==='enhance'){
      const enhanceCardsHtml = eqInv.length===0 ? '<div class="empty-state">沒有可強化的裝備</div>' : eqInv.map((e,i)=>{
        const def = Database.equipment[e.baseId];
        return `<div class="item-card" data-i="${i}">
          <div class="item-glyph">${def.glyph}</div>
          <div class="item-info"><div class="item-name rarity-${e.rarity}">${def.name} +${e.enhanceLevel}</div><div class="item-sub">解鎖插槽 ${e.unlockedSockets}/${def.sockets}</div></div>
          <div class="item-price">💰${this.game.forge.enhanceCost(e)}</div>
        </div>`;
      }).join('');
      const rarityRow = eqInv.length? eqInv.map((e,i)=>{
        const def = Database.equipment[e.baseId];
        return `<div class="item-card" data-up="${i}"><div class="item-glyph">${def.glyph}</div><div class="item-info"><div class="item-name">升階 ${def.name}</div><div class="item-sub">${RARITY_NAME[e.rarity]} → ${RARITY_ORDER[Math.min(RARITY_ORDER.indexOf(e.rarity)+1,6)]!==e.rarity?RARITY_NAME[RARITY_ORDER[Math.min(RARITY_ORDER.indexOf(e.rarity)+1,6)]]:'已最高'}</div></div><div class="item-price">💰${this.game.forge.upgradeRarityCost(e)}</div></div>`;
      }).join(''):'';
      // Single assignment — NEVER use `+=` on innerHTML after attaching listeners,
      // since `+=` reparses the whole subtree and silently drops prior onclick handlers.
      body.innerHTML = enhanceCardsHtml + `<div class="section-label mt10">升階品質</div>` + rarityRow;
      document.querySelectorAll('#forge-body .item-card[data-i]').forEach(el=>{
        el.onclick = ()=>{
          const e = eqInv[+el.dataset.i];
          const def = Database.equipment[e.baseId];
          const gemsNeeded = this.game.forge.enhanceMageGemCost(e);
          this.showConfirmModal('強化裝備', `強化 ${def.name}：消耗 💰${this.game.forge.enhanceCost(e)} + ${gemsNeeded}顆能力晶石？`, ()=>{
            const r = this.game.forge.enhance(e);
            this.showToast(r.ok? `${def.name} 強化成功！(+${e.enhanceLevel})` : r.msg);
            this.renderForgeScreen();
          });
        };
      });
      document.querySelectorAll('#forge-body .item-card[data-up]').forEach(el=>{
        el.onclick = ()=>{
          const e = eqInv[+el.dataset.up]; const def = Database.equipment[e.baseId];
          this.showConfirmModal('升階品質', `將 ${def.name} 升階？花費 💰${this.game.forge.upgradeRarityCost(e)}`, ()=>{
            const r = this.game.forge.upgradeRarity(e);
            this.showToast(r.ok?'升階成功！':r.msg);
            this.renderForgeScreen();
          });
        };
      });
    } else {
      const gems = this.game.party.inventory.gems;
      body.innerHTML = `<div class="txt-small txt-dim mb6">選擇三顆「種類、品質皆相同」的晶石進行合成，將得到更高品質的同類晶石一顆。</div>` +
        (gems.length===0?'<div class="empty-state">倉庫中沒有晶石</div>':gems.map((g,i)=>{
          const selected = this.synthesizeSelection.includes(i);
          return `<div class="item-card ${selected?'selected':''}" data-gi="${i}">
            <div class="item-glyph">${g.kind==='skill'?Database.skillGems[g.baseId].glyph:g.kind==='ability'?Database.abilityGems[g.baseId].glyph:g.kind==='special'?Database.specialGems[g.baseId].glyph:g.kind==='limit'?Database.limitGems[g.baseId].glyph:'🌟'}</div>
            <div class="item-info"><div class="item-name rarity-${g.rarity}">${this.game.gems.describe(g)}</div></div>
          </div>`;
        }).join('')) + `<button class="btn primary mt10" id="btn-do-synth" style="width:100%;">合成 (${this.synthesizeSelection.length}/3)</button>`;
      document.querySelectorAll('#forge-body .item-card[data-gi]').forEach(el=>{
        el.onclick = ()=>{
          const i = +el.dataset.gi;
          const pos = this.synthesizeSelection.indexOf(i);
          if(pos>=0) this.synthesizeSelection.splice(pos,1);
          else if(this.synthesizeSelection.length<3) this.synthesizeSelection.push(i);
          this.renderForgeScreen();
        };
      });
      const synthBtn = document.getElementById('btn-do-synth');
      if(synthBtn) synthBtn.onclick = ()=>{
        if(this.synthesizeSelection.length!==3){ this.showToast('請選擇三顆晶石'); return; }
        const instances = this.synthesizeSelection.map(i=>gems[i]);
        const r = this.game.gems.trySynthesize(instances);
        if(r.ok){
          const sortedIdx = this.synthesizeSelection.slice().sort((a,b)=>b-a);
          sortedIdx.forEach(i=>gems.splice(i,1));
          gems.push(r.result);
          this.showToast('合成成功！獲得更高品質晶石。');
        } else this.showToast(r.msg);
        this.synthesizeSelection = [];
        this.renderForgeScreen();
      };
    }
  }

        const sellVal = (RARITY_TABLE[g.rarity]||RARITY_TABLE.common).sellValue;
        return `<div class="item-card" data-i="${i}">
          <div class="item-glyph">${g.kind==='skill'?Database.skillGems[g.baseId].glyph:g.kind==='ability'?Database.abilityGems[g.baseId].glyph:g.kind==='special'?Database.specialGems[g.baseId].glyph:g.kind==='limit'?Database.limitGems[g.baseId].glyph:'🌟'}</div>
          <div class="item-info"><div class="item-name rarity-${g.rarity}">${this.game.gems.describe(g)}</div><div class="item-sub">${(g.affixes||[]).map(a=>a.text).join('、')||'無詞條'}</div></div>
          <div class="item-price">💰${sellVal}</div>
        </div>`;
      }).join('');
      document.querySelectorAll('#warehouse-body .item-card[data-i]').forEach(el=>{
        el.onclick = ()=>{
          this.showConfirmModal('出售晶石', `出售此晶石？`, ()=>{
            this.game.town.sellGem(gems[+el.dataset.i]); this.showToast('已出售！'); this.renderWarehouseScreen();
          });
        };
      });
    }
  }

  // ---------- Church (revival for fallen party members) ----------
  renderChurchScreen(){
    const fallen = this.game.party.members.filter(m=>!m.alive);
    const living = this.game.party.members.filter(m=>m.alive);
    this.setHtml(`
      <div class="screen active" id="screen-church">
        ${this.topbarHtml('教堂')}
        <div class="scroll-area">
          <div class="pixel-window" style="padding:14px; text-align:center;">
            <div style="font-size:30px;">⛪</div>
            <div class="txt-small mt6">教堂能讓倒下的隊友復活。旅館（HP/MP恢復）與教堂（復活）是不同的服務。</div>
          </div>
          <div class="section-label mt10">倒下的隊友（${fallen.length}）</div>
          ${fallen.length===0?'<div class="empty-state">目前沒有隊友倒下。</div>':fallen.map((m,i)=>`
            <div class="item-card" data-fi="${i}" style="opacity:0.7;">
              <div class="item-glyph">${m.glyph}</div>
              <div class="item-info"><div class="item-name">${Util.escapeHtml(m.name)} Lv${m.level}</div><div class="item-sub txt-dim">${m.job?Database.jobs[m.job].name:'自由旅人'} ‧ 已倒下</div></div>
              <div class="item-price">✝️ 復活</div>
            </div>`).join('')}
          ${fallen.length>0?`<button class="btn primary mt6" id="btn-revive-all" style="width:100%;">✝️ 全部復活</button>`:''}
          <div class="section-label mt10">健在的隊友（${living.length}）</div>
          ${living.map(m=>`<div class="party-card" style="margin-bottom:6px;"><div class="pname">${m.glyph} ${Util.escapeHtml(m.name)}</div><div class="pjob">${m.job?Database.jobs[m.job].name:'自由旅人'} Lv${m.level}</div></div>`).join('')}
        </div>
        <div class="footer-actions"><button class="btn flex1" id="btn-back-town">返回城鎮</button></div>
      </div>`);
    document.getElementById('btn-back-town').onclick = ()=>this.showScreen('town');
    document.querySelectorAll('#screen-church .item-card[data-fi]').forEach(el=>{
      el.onclick = ()=>{
        const m = fallen[+el.dataset.fi];
        this.game.party.reviveOne(m);
        this.showToast(`${m.name} 已復活！`);
        this.renderChurchScreen();
      };
    });
    const reviveAllBtn = document.getElementById('btn-revive-all');
    if(reviveAllBtn) reviveAllBtn.onclick = ()=>{
      fallen.forEach(m=> this.game.party.reviveOne(m));
      this.showToast('全部隊友已復活！');
      this.renderChurchScreen();
    };
  }

  // ---------- Adventurer's Guild alias (stage select is the guild) ----------
  renderGuildScreen(){ this.renderStageSelectScreen(); }

  // ---------- Codex ----------
  renderCodexScreen(){
    const codex = this.game.party.codex;
    const tabs = [{k:'monsters',label:'怪物'},{k:'equipment',label:'裝備'},{k:'gems',label:'晶石'}];
    this.setHtml(`
      <div class="screen active" id="screen-codex">
        ${this.topbarHtml('圖鑑')}
        <div class="tab-bar">${tabs.map(t=>`<div class="tab-btn ${t.k===this.codexTab?'active':''}" data-tab="${t.k}">${t.label}</div>`).join('')}</div>
        <div class="scroll-area" id="codex-body"></div>
        <div class="footer-actions"><button class="btn flex1" id="btn-back-town">返回城鎮</button></div>
      </div>`);
    document.getElementById('btn-back-town').onclick = ()=>this.showScreen('town');
    if(!['monsters','equipment','gems'].includes(this.codexTab)) this.codexTab = 'monsters';
    document.querySelectorAll('#screen-codex .tab-btn').forEach(el=>{ el.onclick = ()=>{ this.codexTab = el.dataset.tab; this.renderCodexScreen(); }; });
    const body = document.getElementById('codex-body');
    if(this.codexTab==='monsters'){
      const all = Object.assign({}, Database.monsters, Database.bosses);
      body.innerHTML = Object.values(all).map(m=>{
        const seen = !!codex.monsters[m.id];
        return `<div class="item-card"><div class="item-glyph">${seen?m.glyph:'❓'}</div><div class="item-info"><div class="item-name">${seen?m.name:'未發現'}</div><div class="item-sub">${seen?(ELEMENT_NAME[m.element]+'屬性'):'尚未遭遇過此怪物'}</div></div></div>`;
      }).join('');
    } else if(this.codexTab==='equipment'){
      body.innerHTML = Object.values(Database.equipment).map(e=>{
        const seen = !!codex.equipment[e.id];
        return `<div class="item-card"><div class="item-glyph">${seen?e.glyph:'❓'}</div><div class="item-info"><div class="item-name">${seen?e.name:'未發現'}</div><div class="item-sub">${seen?('插槽 '+e.sockets):'尚未取得過此裝備'}</div></div></div>`;
      }).join('');
    } else {
      const allGems = Object.assign({}, Database.skillGems, Database.abilityGems, Database.specialGems);
      body.innerHTML = Object.values(allGems).map(g=>{
        const seen = !!codex.gems[g.id];
        return `<div class="item-card"><div class="item-glyph">${seen?g.glyph:'❓'}</div><div class="item-info"><div class="item-name">${seen?g.name:'未發現'}</div><div class="item-sub">${seen?(g.desc||''):'尚未取得過此晶石'}</div></div></div>`;
      }).join('');
    }
  }

  // ---------- Save screen ----------
  renderSaveScreen(){
    this.setHtml(`
      <div class="screen active" id="screen-save">
        ${this.topbarHtml('存檔管理')}
        <div class="scroll-area">
          <div class="pixel-window" style="padding:14px;">
            <div class="txt-small mb6">遊戲會在每次完成關卡後自動存檔至本機（LocalStorage）。你也可以手動匯出/匯入存檔檔案。</div>
            <button class="btn primary mt6" id="btn-manual-save" style="width:100%;">手動存檔</button>
            <button class="btn mt6" id="btn-export-save" style="width:100%;">匯出 Save.json</button>
            <button class="btn ghost mt6" id="btn-import-save2" style="width:100%;">匯入 Save.json</button>
            <input type="file" id="file-import2" accept=".json" style="display:none;">
          </div>
        </div>
        <div class="footer-actions"><button class="btn flex1" id="btn-back-town">返回城鎮</button></div>
      </div>`);
    document.getElementById('btn-back-town').onclick = ()=>this.showScreen('town');
    document.getElementById('btn-manual-save').onclick = ()=>{ this.game.saveManager.save(); this.showToast('已存檔！'); };
    document.getElementById('btn-export-save').onclick = ()=> this.game.saveManager.exportJson();
    document.getElementById('btn-import-save2').onclick = ()=> document.getElementById('file-import2').click();
    document.getElementById('file-import2').onchange = (e)=>{
      const file = e.target.files[0]; if(!file) return;
      this.game.saveManager.importJsonFile(file, (ok)=>{
        this.showToast(ok?'存檔匯入成功！':'存檔格式錯誤。');
        if(ok) this.renderTownScreen.call(this);
        this.showScreen('town');
      });
    };
  }
}

/* ============================================================
   SECTION 18: GAME — top-level bootstrap, owns every manager.
   ============================================================ */
class Game{
  constructor(){
    this.events = new EventBus();
    this.flags = { pendingAmbush:false };
    this.run = null;

    // Order matters only in that PartyManager needs equipmentManager/gems
    // available on `this.game` already — so we construct managers first,
    // then PartyManager last among the "data" managers.
    this.equipmentManager = new EquipmentManager(this);
    this.gems = new GemManager(this);
    this.skills = new SkillManager(this);
    this.forge = new ForgeManager(this);
    this.enemyManager = new EnemyManager(this);
    this.loot = new LootManager(this);
    this.anim = new AnimationManager(this);
    this.ai = new AIManager(this);
    this.eventManager = new EventManager(this);
    this.town = new TownManager(this);
    this.saveManager = new SaveManager(this);

    this.party = new PartyManager(this); // needs equipmentManager + gems
    this.party._giveStarterGear();
    this.battle = new BattleManager(this);
    this.stageManager = new StageManager(this);
    this.ui = new UIManager(this);
  }
  init(){
    this.ui.showScreen('title');
  }
}

let GAME = null;
window.addEventListener('DOMContentLoaded', ()=>{
  GAME = new Game();
  GAME.init();
});
</script>
</body>
</html>
