<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>晶石異聞錄 ‧ Gemstone Chronicle</title>
<style>
/* ============================================================
   晶石異聞錄 - GLOBAL STYLE SHEET
   Retro 16-bit JRPG aesthetic, hard pixel borders, portrait-first.
   ============================================================ */
:root{
  /* --- Palette (named tokens) --- */
  --ink-navy:#11142b;        /* base background, deep night-sky indigo */
  --ink-navy-deep:#070818;   /* deepest background / outer frame */
  --panel-blue:#1c2350;      /* window panel fill */
  --panel-blue-light:#2c3470;
  --border-gold:#d8a23a;     /* classic SNES gold-bronze border */
  --border-gold-dim:#8a662a;
  --parchment:#f4e8c9;       /* text on dark panels */
  --parchment-dim:#c9bb96;
  --ember:#e8662b;           /* fire */
  --frost:#5ec9e8;           /* ice */
  --volt:#b07bff;            /* thunder */
  --gale:#6fe3a8;            /* wind */
  --terra:#c79a4b;           /* earth */
  --radiant:#ffe9a8;         /* light */
  --umbral:#9d4fb0;          /* dark */
  --hp-red:#d8453f;
  --mp-blue:#3f7fd8;
  --limit-gold:#ffcb47;
  --danger-red:#ff4d4d;
  --good-green:#6fe3a8;
  --rarity-common:#aab3c5;
  --rarity-fine:#6fe3a8;
  --rarity-rare:#5ec9e8;
  --rarity-epic:#b07bff;
  --rarity-legend:#ffcb47;
  --rarity-myth:#ff6fb0;
  --rarity-genesis:#ffffff;
  --font-display:'Trebuchet MS','Hiragino Sans','Noto Sans TC',sans-serif;
  --font-body:'Verdana','PingFang TC','Noto Sans TC',sans-serif;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{
  margin:0; padding:0; width:100%; height:100%;
  background:var(--ink-navy-deep);
  font-family:var(--font-body);
  color:var(--parchment);
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
}
img{image-rendering:pixelated;}

/* ---------- Root game frame: portrait viewport, scales on desktop ---------- */
#game-root{
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 50% -10%, #1d2354 0%, var(--ink-navy-deep) 70%);
}
#game-frame{
  position:relative;
  width:100%; height:100%;
  max-width:480px;
  max-height:960px;
  background:var(--ink-navy);
  box-shadow:0 0 0 4px var(--border-gold-dim), 0 0 0 8px var(--ink-navy-deep), 0 0 40px rgba(0,0,0,0.8);
  display:flex; flex-direction:column;
  overflow:hidden;
}
@media (min-aspect-ratio: 9/16){
  #game-frame{ height:96vh; max-height:960px; width:calc(96vh * 0.5); }
}

/* ---------- Pixel window: the core recurring chrome element ---------- */
.pixel-window{
  background:var(--panel-blue);
  border:3px solid var(--border-gold);
  box-shadow:
    inset 0 0 0 2px var(--ink-navy-deep),
    inset 0 0 0 4px var(--border-gold-dim),
    0 2px 0 rgba(0,0,0,0.5);
  border-radius:0;
  position:relative;
}
.pixel-window::before{
  /* corner pips for that 16-bit window-chrome feel */
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:
    radial-gradient(circle, var(--border-gold) 1.5px, transparent 1.6px);
  background-size:8px 8px;
  background-position:-2px -2px, calc(100% - 6px) -2px;
  opacity:0.0;
}

/* ---------- Screens ---------- */
.screen{
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s ease;
}
.screen.active{ opacity:1; pointer-events:auto; z-index:5;}
.screen.transitioning-out{ opacity:0; }

#screen-stack{ position:relative; flex:1; width:100%; height:100%; }

/* ---------- Top status bar (shown across most screens) ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px;
  background:var(--ink-navy-deep);
  border-bottom:3px solid var(--border-gold-dim);
  font-size:11px;
  flex-shrink:0;
}
.topbar .gold-display{ color:var(--limit-gold); font-weight:bold; }
.topbar .danger-display{ color:var(--danger-red); font-weight:bold; }
.topbar .topbar-title{
  font-family:var(--font-display);
  letter-spacing:2px;
  color:var(--parchment);
  text-shadow:1px 1px 0 #000;
}

/* ---------- Generic scroll area ---------- */
.scroll-area{ flex:1; overflow-y:auto; padding:10px; }
.scroll-area::-webkit-scrollbar{ width:4px; }
.scroll-area::-webkit-scrollbar-thumb{ background:var(--border-gold-dim); }

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--panel-blue-light);
  border:2px solid var(--border-gold);
  color:var(--parchment);
  font-family:var(--font-body);
  font-size:13px;
  padding:10px 12px;
  cursor:pointer;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06), 0 2px 0 rgba(0,0,0,0.5);
  transition:transform 0.06s, background 0.15s;
  text-align:center;
  position:relative;
}
.btn:active{ transform:translateY(2px); box-shadow:none; }
.btn.disabled{ opacity:0.35; pointer-events:none; }
.btn.primary{ background:linear-gradient(180deg,#3a4590,#222a63); border-color:var(--border-gold); }
.btn.danger{ border-color:var(--hp-red); }
.btn.small{ padding:6px 8px; font-size:11px; }
.btn.ghost{ background:transparent; border-color:var(--border-gold-dim); }

.icon-btn{
  width:64px; height:72px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px;
  background:var(--panel-blue);
  border:2px solid var(--border-gold-dim);
  cursor:pointer;
  font-size:10px;
  color:var(--parchment);
}
.icon-btn .icon-glyph{ font-size:24px; line-height:1; }
.icon-btn:active{ background:var(--panel-blue-light); }

/* ---------- Town hub grid ---------- */
.town-bg{
  flex:1; position:relative; overflow:hidden;
  background:
    linear-gradient(180deg, #1a2050 0%, #11142b 55%, #0c0e22 100%);
}
.town-skyline{
  position:absolute; left:0; right:0; bottom:0; height:55%;
  background:
    linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.15) 100%);
}
.town-grid{
  position:relative; z-index:2;
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:10px; padding:14px;
}
.town-tile{
  background:var(--panel-blue);
  border:2px solid var(--border-gold-dim);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:14px 4px; gap:6px;
  cursor:pointer;
  transition:background 0.15s, border-color 0.15s;
}
.town-tile:active{ background:var(--panel-blue-light); border-color:var(--border-gold); }
.town-tile .glyph{ font-size:26px; }
.town-tile .label{ font-size:11px; letter-spacing:1px; text-align:center; }

.town-banner{
  text-align:center; padding:16px 10px 6px;
  font-family:var(--font-display);
}
.town-banner .title{ font-size:18px; letter-spacing:3px; color:var(--parchment); text-shadow:2px 2px 0 #000; }
.town-banner .subtitle{ font-size:10px; color:var(--parchment-dim); margin-top:4px; }

/* ---------- Party strip ---------- */
.party-strip{ display:flex; gap:6px; padding:8px 10px; flex-shrink:0; overflow-x:auto; }
.party-card{
  flex:1 0 auto; min-width:78px;
  background:var(--panel-blue); border:2px solid var(--border-gold-dim);
  padding:6px; font-size:9px;
}
.party-card .pname{ font-size:10px; font-weight:bold; color:var(--parchment); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.party-card .pjob{ color:var(--parchment-dim); font-size:8px; margin-bottom:3px;}
.party-card.fallen{ border-color:var(--hp-red); opacity:0.6; }
.party-card.fallen .pname{ color:var(--hp-red); }
.bar-track{ width:100%; height:6px; background:#05060f; border:1px solid #000; margin-top:2px; position:relative; }
.bar-fill{ height:100%; transition:width 0.3s ease; }
.bar-fill.hp{ background:linear-gradient(90deg,#a82a2a,var(--hp-red)); }
.bar-fill.mp{ background:linear-gradient(90deg,#28599c,var(--mp-blue)); }
.bar-fill.limit{ background:linear-gradient(90deg,#c79a1c,var(--limit-gold)); }
.bar-fill.xp{ background:linear-gradient(90deg,#3a8a5a,var(--good-green)); }

/* ---------- Stage select ---------- */
.stage-list{ display:flex; flex-direction:column; gap:10px; padding:10px; }
.stage-card{
  background:var(--panel-blue); border:2px solid var(--border-gold-dim);
  padding:10px; display:flex; gap:10px; align-items:center; cursor:pointer;
}
.stage-card:active{ border-color:var(--border-gold); }
.stage-card .stage-glyph{ font-size:30px; width:42px; text-align:center; flex-shrink:0;}
.stage-card .stage-info{ flex:1; }
.stage-card .stage-name{ font-size:13px; font-weight:bold; color:var(--parchment); }
.stage-card .stage-desc{ font-size:10px; color:var(--parchment-dim); margin-top:2px; }
.stage-card .stage-meta{ font-size:9px; color:var(--limit-gold); margin-top:3px; }

/* ---------- Battle screen ---------- */
#screen-battle{ background:linear-gradient(180deg,#1a1f4a 0%, #0c0e22 70%); }
.battle-stage{ flex:1; position:relative; overflow:hidden; min-height:0; }
.enemy-field{
  position:absolute; top:6%; left:0; right:0; height:46%;
  display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(2,1fr);
  gap:4px; padding:6px 10px;
}
.enemy-unit{
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  cursor:pointer; position:relative; transition:transform 0.12s;
}
.enemy-unit .sprite{
  font-size:30px; filter:drop-shadow(0 4px 4px rgba(0,0,0,0.6));
  transition:transform 0.15s, opacity 0.3s;
}
.enemy-unit.targetable .sprite{ animation:targetPulse 0.9s infinite; }
.enemy-unit.dead .sprite{ opacity:0; transform:scale(0.3) translateY(20px); }
.enemy-unit .ehp-track{ width:80%; height:4px; background:#000; border:1px solid #000; margin-top:3px;}
.enemy-unit .ehp-fill{ height:100%; background:var(--hp-red); transition:width 0.3s; }
.enemy-unit .enemy-tag{ font-size:8px; color:var(--parchment-dim); margin-top:2px; }
@keyframes targetPulse{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }

.ally-field{
  position:absolute; bottom:0; left:0; right:0; height:30%;
  display:flex; gap:6px; padding:6px 10px; align-items:flex-end;
}
.ally-unit{
  flex:1; background:rgba(10,12,30,0.7); border:2px solid var(--border-gold-dim);
  padding:5px 4px; font-size:9px; position:relative; cursor:pointer;
  transition:border-color 0.15s, transform 0.12s;
}
.ally-unit.active-turn{ border-color:var(--limit-gold); box-shadow:0 0 6px var(--limit-gold); }
.ally-unit.selected-target{ border-color:var(--good-green); }
.ally-unit.dead{ opacity:0.35; }
.ally-unit .aname{ font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ally-unit .gauge-row{ display:flex; flex-direction:column; gap:1px; margin-top:2px;}

.status-icon-row{ display:flex; gap:2px; flex-wrap:wrap; margin-top:2px; min-height:10px;}
.status-icon{ font-size:9px; background:rgba(0,0,0,0.5); border:1px solid var(--border-gold-dim); padding:0 2px; }
.status-icon.buff{ color:var(--good-green); }
.status-icon.debuff{ color:var(--danger-red); }

.dmg-popup-layer{ position:absolute; inset:0; pointer-events:none; z-index:20; }
.dmg-popup{
  position:absolute; font-family:var(--font-display); font-weight:bold; font-size:16px;
  color:var(--parchment); text-shadow:2px 2px 0 #000, -1px -1px 0 #000;
  animation:popUp 0.9s ease-out forwards;
  white-space:nowrap;
}
.dmg-popup.crit{ font-size:22px; color:var(--limit-gold); }
.dmg-popup.heal{ color:var(--good-green); }
.dmg-popup.miss{ color:var(--parchment-dim); font-size:13px; }
.dmg-popup.element-fire{ color:var(--ember); }
.dmg-popup.element-ice{ color:var(--frost); }
.dmg-popup.element-thunder{ color:var(--volt); }
.dmg-popup.element-wind{ color:var(--gale); }
.dmg-popup.element-earth{ color:var(--terra); }
.dmg-popup.element-light{ color:var(--radiant); }
.dmg-popup.element-dark{ color:var(--umbral); }
@keyframes popUp{
  0%{ transform:translateY(0) scale(0.6); opacity:0; }
  15%{ transform:translateY(-6px) scale(1.15); opacity:1; }
  30%{ transform:translateY(-14px) scale(1); opacity:1; }
  100%{ transform:translateY(-46px) scale(1); opacity:0; }
}

.fx-layer{ position:absolute; inset:0; pointer-events:none; z-index:15; }
.fx-burst{
  position:absolute; width:70px; height:70px; border-radius:50%;
  transform:translate(-50%,-50%) scale(0.2);
  opacity:0.9;
  animation:fxBurst 0.45s ease-out forwards;
}
@keyframes fxBurst{ 0%{transform:translate(-50%,-50%) scale(0.1); opacity:0.9;} 60%{transform:translate(-50%,-50%) scale(1.3); opacity:0.7;} 100%{transform:translate(-50%,-50%) scale(1.8); opacity:0;} }
.fx-element-fire{ background:radial-gradient(circle, var(--ember), transparent 70%); }
.fx-element-ice{ background:radial-gradient(circle, var(--frost), transparent 70%); }
.fx-element-thunder{ background:radial-gradient(circle, var(--volt), transparent 70%); }
.fx-element-wind{ background:radial-gradient(circle, var(--gale), transparent 70%); }
.fx-element-earth{ background:radial-gradient(circle, var(--terra), transparent 70%); }
.fx-element-light{ background:radial-gradient(circle, var(--radiant), transparent 70%); }
.fx-element-dark{ background:radial-gradient(circle, var(--umbral), transparent 70%); }
.fx-element-physical{ background:radial-gradient(circle, #ffffff, transparent 70%); }

.shake{ animation:shakeAnim 0.3s; }
@keyframes shakeAnim{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(5px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(3px);} }
.flash-hit{ animation:flashAnim 0.25s; }
@keyframes flashAnim{ 0%{filter:brightness(2.4) saturate(0.3);} 100%{filter:brightness(1);} }
.attack-lunge{ animation:lungeAnim 0.35s ease-in-out; }
@keyframes lungeAnim{ 0%{transform:translateY(0);} 40%{transform:translateY(-10px) scale(1.08);} 100%{transform:translateY(0);} }

.limit-flash{ animation:limitFlashAnim 1.1s; }
@keyframes limitFlashAnim{ 0%,100%{box-shadow:none;} 50%{box-shadow:0 0 22px 6px var(--limit-gold);} }

/* ---------- Battle log ---------- */
.battle-log{
  flex-shrink:0; height:82px; overflow-y:auto;
  background:var(--ink-navy-deep); border-top:3px solid var(--border-gold-dim);
  padding:5px 10px; font-size:12px; color:var(--parchment-dim);
  cursor:pointer; position:relative;
}
.battle-log::after{
  content:'📜'; position:absolute; right:6px; top:4px;
  font-size:12px; opacity:0.45; pointer-events:none;
}
.battle-log .log-line{ padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.03); }
.battle-log .log-line.highlight{ color:var(--limit-gold); font-weight:bold; }
.log-history-modal{ max-height:70vh; overflow-y:auto; }
.log-history-modal .log-line{ padding:3px 0; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.05); color:var(--parchment-dim); }
.log-history-modal .log-line.highlight{ color:var(--limit-gold); font-weight:bold; }

/* ---------- Command window ---------- */
.command-window{
  flex-shrink:0; border-top:3px solid var(--border-gold);
  background:var(--ink-navy-deep);
  padding:8px;
}
.command-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.command-grid .btn{ font-size:11px; padding:10px 4px; flex-direction:column; gap:2px; }
.skill-list{ display:flex; flex-direction:column; gap:6px; max-height:160px; overflow-y:auto; }
.skill-row{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--panel-blue); border:2px solid var(--border-gold-dim);
  padding:8px; cursor:pointer; font-size:11px;
}
.skill-row:active{ border-color:var(--border-gold); }
.skill-row .skill-name{ font-weight:bold; }
.skill-row .skill-cost{ color:var(--mp-blue); font-size:10px; }
.skill-row .skill-desc{ color:var(--parchment-dim); font-size:9px; flex-basis:100%; margin-top:2px; }
.skill-row.disabled{ opacity:0.4; pointer-events:none; }

/* ---------- Modal / overlay ---------- */
.overlay{
  position:absolute; inset:0; background:rgba(4,5,14,0.78);
  display:flex; align-items:center; justify-content:center;
  z-index:50; opacity:0; pointer-events:none; transition:opacity 0.2s;
  padding:20px;
}
.overlay.show{ opacity:1; pointer-events:auto; }
.modal-box{ width:100%; max-width:380px; padding:14px; max-height:85%; display:flex; flex-direction:column; }
.modal-title{ font-family:var(--font-display); letter-spacing:2px; font-size:14px; text-align:center; margin-bottom:8px; color:var(--limit-gold);}
.modal-body{ flex:1; overflow-y:auto; }
.modal-actions{ display:flex; gap:8px; margin-top:10px; }
.modal-actions .btn{ flex:1; }

/* ---------- Item / gem cards (shared across shops, inventory, forge) ---------- */
.item-card{
  display:flex; gap:8px; align-items:center;
  background:var(--panel-blue); border:2px solid var(--border-gold-dim);
  padding:8px; margin-bottom:6px; cursor:pointer;
}
.item-card.selected{ border-color:var(--limit-gold); box-shadow:inset 0 0 0 1px var(--limit-gold); }
.item-card .item-glyph{ font-size:22px; width:30px; text-align:center; flex-shrink:0; }
.item-card .item-info{ flex:1; min-width:0; }
.item-card .item-name{ font-size:12px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-card .item-sub{ font-size:9px; color:var(--parchment-dim); }
.item-card .item-price{ font-size:11px; color:var(--limit-gold); flex-shrink:0; }

.rarity-common{ color:var(--rarity-common); }
.rarity-fine{ color:var(--rarity-fine); }
.rarity-rare{ color:var(--rarity-rare); }
.rarity-epic{ color:var(--rarity-epic); }
.rarity-legend{ color:var(--rarity-legend); }
.rarity-myth{ color:var(--rarity-myth); }
.rarity-genesis{ color:var(--rarity-genesis); text-shadow:0 0 6px #fff; }

.border-rarity-common{ border-color:var(--rarity-common) !important; }
.border-rarity-fine{ border-color:var(--rarity-fine) !important; }
.border-rarity-rare{ border-color:var(--rarity-rare) !important; }
.border-rarity-epic{ border-color:var(--rarity-epic) !important; }
.border-rarity-legend{ border-color:var(--rarity-legend) !important; }
.border-rarity-myth{ border-color:var(--rarity-myth) !important; }
.border-rarity-genesis{ border-color:var(--rarity-genesis) !important; }

/* ---------- Socket grid (equipment gem sockets, up to 6) ---------- */
.socket-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-top:8px; }
.socket-slot{
  aspect-ratio:1; background:#05060f; border:2px dashed var(--border-gold-dim);
  display:flex; align-items:center; justify-content:center; font-size:18px;
  cursor:pointer; position:relative;
}
.socket-slot.filled{ border-style:solid; }
.socket-slot.locked{ opacity:0.3; pointer-events:none; }
.socket-slot.locked::after{ content:'🔒'; font-size:14px; }

/* ---------- Equip slot rows ---------- */
.equip-slot-row-wrap{ margin-bottom:6px; }
.equip-slot-row{
  display:flex; align-items:center; gap:8px; padding:8px;
  background:var(--panel-blue); border:2px solid var(--border-gold-dim); cursor:pointer;
}
.equip-slot-row-wrap .equip-slot-row{ margin-bottom:0; border-bottom:none; }
.equip-slot-row .slot-label{ font-size:9px; color:var(--parchment-dim); width:38px; flex-shrink:0; }
.equip-slot-row .slot-content{ flex:1; font-size:11px; }
.equip-slot-row .slot-content.empty{ color:var(--parchment-dim); font-style:italic; }
.socket-pip-row{ display:flex; gap:4px; padding:5px 8px; background:var(--ink-navy-deep); border:2px solid var(--border-gold-dim); border-top:none; flex-wrap:wrap; }
.socket-pip{
  width:24px; height:24px; flex-shrink:0;
  background:#05060f; border:2px dashed var(--border-gold-dim);
  display:flex; align-items:center; justify-content:center; font-size:13px;
  cursor:pointer;
}
.socket-pip.filled{ border-style:solid; }
.socket-pip.locked{ opacity:0.3; pointer-events:none; border-style:dotted; }

/* ---------- Tabs ---------- */
.tab-bar{ display:flex; border-bottom:2px solid var(--border-gold-dim); flex-shrink:0; }
.tab-btn{ flex:1; text-align:center; padding:9px 4px; font-size:11px; cursor:pointer; color:var(--parchment-dim); border-bottom:3px solid transparent; }
.tab-btn.active{ color:var(--limit-gold); border-bottom-color:var(--limit-gold); }

/* ---------- Bottom nav (in-screen secondary nav, e.g. battle result actions) ---------- */
.footer-actions{ display:flex; gap:8px; padding:10px; flex-shrink:0; border-top:3px solid var(--border-gold-dim); }
.footer-actions .btn{ flex:1; }

/* ---------- Toast ---------- */
#toast-layer{ position:absolute; top:40px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:6px; z-index:90; pointer-events:none; }
.toast{
  background:var(--ink-navy-deep); border:2px solid var(--border-gold);
  padding:6px 14px; font-size:11px; color:var(--parchment);
  animation:toastAnim 2.4s forwards;

<script>
'use strict';
/* ============================================================
   晶石異聞錄 (GEMSTONE CHRONICLE) — single-file JRPG framework
   ------------------------------------------------------------
   Architecture: Game owns a set of Manager singletons that
   communicate through a shared EventBus and the Game instance
   itself (passed in at construction). All game content (skills,
   gems, equipment, monsters, jobs, stages, events) lives in the
   Database object as data tables — new content is added by
   appending entries, never by writing new branching logic.
   ============================================================ */

/* ============================================================
   SECTION 0: CORE UTILITIES — RNG, EventBus, helpers
   ============================================================ */

// Seedable RNG (mulberry32) so future "seeded run" features are possible.
class RNG{
  constructor(seed){ this.seed = seed >>> 0 || (Date.now() >>> 0); }
  next(){
    let t = this.seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  int(min,max){ return Math.floor(this.next()*(max-min+1))+min; }
  pick(arr){ return arr[this.int(0,arr.length-1)]; }
  chance(p){ return this.next() < p; }
  weighted(entries){ // entries: [{item, weight}]
    const total = entries.reduce((s,e)=>s+e.weight,0);
    let r = this.next()*total;
    for(const e of entries){ if(r < e.weight) return e.item; r -= e.weight; }
    return entries[entries.length-1].item;
  }
}
const RNG_GLOBAL = new RNG(Date.now());

// Minimal pub/sub so managers stay decoupled from each other.
class EventBus{
  constructor(){ this.handlers = {}; }
  on(evt, fn){ (this.handlers[evt] = this.handlers[evt]||[]).push(fn); return ()=>this.off(evt,fn); }
  off(evt, fn){ if(!this.handlers[evt]) return; this.handlers[evt] = this.handlers[evt].filter(h=>h!==fn); }
  emit(evt, payload){ (this.handlers[evt]||[]).slice().forEach(fn=>{ try{ fn(payload); }catch(e){ console.error('[EventBus]', evt, e); } }); }
}

const Util = {
  clamp(v,min,max){ return Math.max(min, Math.min(max, v)); },
  uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); },
  deepClone(o){ return JSON.parse(JSON.stringify(o)); },
  fmt(n){ n = Math.round(n); return n.toLocaleString('en-US'); },
  escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },
  lerp(a,b,t){ return a + (b-a)*t; },
};

const RARITY_NAME  = { common:'普通', fine:'精良', rare:'稀有', epic:'史詩', legend:'傳說', myth:'神話', genesis:'創世' };

// applied to whatever base effect a gem/equipment provides.
const RARITY_TABLE = {
  common:  { affixCount:0, power:1.00, dropWeight:55, sellValue:8   },
  fine:    { affixCount:1, power:1.15, dropWeight:25, sellValue:20  },
  rare:    { affixCount:2, power:1.35, dropWeight:12, sellValue:55  },
  epic:    { affixCount:3, power:1.60, dropWeight:5,  sellValue:140 },
  legend:  { affixCount:4, power:1.95, dropWeight:2,  sellValue:380 },
  myth:    { affixCount:5, power:2.40, dropWeight:0.7,sellValue:900 },
  genesis: { affixCount:6, power:3.00, dropWeight:0.15,sellValue:2400 },
};
function rollRarity(rng, danger){
  // Danger level biases the roll table upward over time, with no cap —
  // we do this by virtually duplicating high-tier weight per danger tier
  // rather than ever removing tiers, so genesis stays rare-but-possible early.
  const bonus = Math.min(danger * 0.6, 40); // soft, unbounded but diminishing via clamp on call site
  const entries = RARITY_ORDER.map((r,i)=>({ item:r, weight: Math.max(0.05, RARITY_TABLE[r].dropWeight + (i>=3? bonus*(i-2) : 0)) }));
  return rng.weighted(entries);
}

  // Returns the array of skillGem ids a given job knows once it has
  // reached `level` (inclusive) — i.e. every levelSkills entry whose key
  // is <= level. Used both when recruiting (to seed starting skills) and
  // on level-up (to detect newly-learned skills).
  jobSkillsAtLevel(jobId, level){
    const job = this.jobs[jobId]; if(!job || !job.levelSkills) return [];
    return Object.entries(job.levelSkills)
      .filter(([lv]) => Number(lv) <= level)
      .sort((a,b)=> Number(a[0]) - Number(b[0]))
      .map(([,skillId]) => skillId);
  },

  // Convenience indices built once at load time.
  init(){
    this.allSkillGemList = Object.values(this.skillGems);
    this.allEventList = Object.values(this.events);
  }
};
