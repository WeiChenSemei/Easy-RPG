<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>深淵漫步 (Abyss Stroll)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    html, body { overflow: hidden; width: 100%; height: 100%; touch-action: none; position: fixed; }
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #000000; color: #ffffff; user-select: none; -webkit-user-select: none; }
    .retro-font { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; }
    .ff-box { background-color: #0000a8; border: 3px solid #ffffff; border-radius: 2px; box-shadow: inset 0 0 0 1px #000, 0 0 0 2px #000; color: #ffffff; }
    .ff-box-dark { background-color: #000000; border: 2px solid #ffffff; border-radius: 2px; color: #ffffff; }
    .ff-btn { background-color: #000000; border: 2px solid #ffffff; color: #ffffff; border-radius: 0; transition: transform 0.1s, border-color 0.1s, background-color 0.1s; cursor: pointer; }
    .ff-btn:hover { border-color: #fde047; background-color: rgba(255,255,255,0.1); }
    .ff-btn:active { transform: scale(0.96); background-color: rgba(255,255,255,0.2); border-color: #fde047; }
    .ff-btn:disabled { border-color: #444; color: #555; pointer-events: none; background-color: #000; }
    .ff-btn-danger:hover { border-color: #ef4444; background-color: rgba(239,68,68,0.2); color: #fca5a5;}
    .screen-crt::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 10; opacity: 0.4; }
    @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 50% { transform: translateY(-12px) scale(1.3); opacity: 1; } 100% { transform: translateY(-25px) scale(1.1); opacity: 0; } }
    .damage-float { animation: floatUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; z-index: 50;}
    @keyframes shakeAndFlash { 0%, 100% { transform: translateX(0); filter: none; } 20%, 40% { transform: translateX(5px); filter: drop-shadow(0 0 8px rgba(255,0,0,0.9)) brightness(1.5); } 60%, 80% { transform: translateX(-3px); filter: drop-shadow(0 0 4px rgba(255,0,0,0.6)) brightness(1.2); } }
    .animate-shake { animation: shakeAndFlash 0.35s ease-in-out; z-index: 20; position: relative; }
    @keyframes dodgeEffect { 0%, 100% { transform: translateX(0); opacity: 1; filter: none; } 50% { transform: translateX(-10px) skewX(-5deg); opacity: 0.5; filter: brightness(1.5); } }
    .animate-dodge { animation: dodgeEffect 0.35s ease-out; }
    @keyframes healPulse { 0%, 100% { filter: none; transform: scale(1); } 50% { filter: drop-shadow(0 0 10px #4ade80) brightness(1.2); transform: scale(1.05); } }
    .animate-heal { animation: healPulse 0.4s ease-out; z-index: 20; position: relative; }
    @keyframes targetGlow { 0%, 100% { border-color: #ffffff; } 50% { border-color: #ff0000; box-shadow: 0 0 12px #ff0000; } }
    .target-glow-enemy { animation: targetGlow 0.8s infinite; cursor: crosshair !important; border-width: 2px; border-style: dashed; }
    @keyframes allyGlow { 0%, 100% { border-color: #ffffff; } 50% { border-color: #0088ff; box-shadow: 0 0 12px #0088ff; } }
    .target-glow-ally { animation: allyGlow 0.8s infinite; cursor: pointer !important; border-width: 2px; border-style: dashed; }
    .info-glow:hover { border-color: #fde047; box-shadow: 0 0 8px #fde047; cursor: pointer; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; touch-action: pan-y; }
    .glow-text { text-shadow: 0 0 8px rgba(253, 224, 71, 0.8); }
  </style>
</head>
<body class="flex justify-center items-start min-h-screen p-0 sm:p-2 overflow-hidden">

  <div id="game-container" style="font-size: 16px;" class="w-full max-w-md h-[85vh] sm:h-[720px] bg-black border-0 sm:border-[4px] border-[#333] sm:rounded-md flex flex-col relative shadow-2xl overflow-hidden screen-crt">
    
    <div class="ff-box border-t-0 border-l-0 border-r-0 px-2 py-2 flex justify-between items-center z-20 shrink-0">
      <div class="flex items-center gap-1"><span id="txt-floor" class="font-bold text-white retro-font text-[0.8em]">B1-1</span></div>
      <div class="flex-1 px-2 sm:px-3"><div class="w-full bg-black h-2.5 border-2 border-gray-500"><div id="floor-progress" class="bg-blue-400 h-full transition-all w-0"></div></div></div>
      <div class="flex gap-1.5 items-center">
        <button onclick="openSaveModal()" class="ff-btn px-2 py-1 text-[0.6em] retro-font uppercase shadow-md">SYSTEM</button>
        <div class="flex border-2 border-white bg-black">
          <button onclick="adjustFontSize(-1)" class="px-2 py-0.5 text-white hover:bg-white hover:text-black retro-font text-[0.7em] transition-colors">-</button>
          <div class="w-[2px] bg-white"></div>
          <button onclick="adjustFontSize(1)" class="px-2 py-0.5 text-white hover:bg-white hover:text-black retro-font text-[0.7em] transition-colors">+</button>
        </div>
      </div>
    </div>

    <div class="flex z-10 shrink-0 text-[0.75em] retro-font p-1 gap-1 border-b-2 border-white/20">
      <button id="tab-adventure" onclick="switchTab('adventure')" class="flex-1 py-2 border-2 border-white text-black bg-white transition-all">BATTLE</button>
      <button id="tab-status" onclick="switchTab('status')" class="flex-1 py-2 border-2 border-transparent text-gray-400 hover:text-white transition-all">STATUS</button>
      <button id="tab-log" onclick="switchTab('log')" class="flex-1 py-2 border-2 border-transparent text-gray-400 hover:text-white transition-all">LOGS</button>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden relative">
      <div id="panel-adventure" class="flex-1 flex flex-col p-1 gap-1 overflow-y-auto no-scrollbar justify-between">
        <div class="grid grid-cols-2 gap-1 shrink-0"><div id="hero-mini-0"></div><div id="hero-mini-1"></div><div id="hero-mini-2"></div><div id="hero-mini-3"></div></div>
        <div class="ff-box p-1 min-h-[40px] flex flex-col justify-center text-center relative shrink-0 shadow-lg mx-1">
          <div id="animation-flash-bg" class="absolute inset-0 bg-white/0 pointer-events-none transition-all duration-100"></div>
          <p id="battle-latest-msg" class="text-[0.75em] text-white font-bold leading-relaxed tracking-wider truncate px-1">冒險者們整裝出發，進入無止盡的深淵。</p>
        </div>
        <div id="enemies-container" class="ff-box-dark p-1 relative flex flex-col justify-center items-center shrink-0 min-h-[145px] border-gray-700">
          <div id="enemies-grid" class="grid grid-cols-4 gap-1 h-full w-full"></div>
          <div id="floating-numbers" class="absolute inset-0 pointer-events-none z-30"></div>
        </div>
        <div class="ff-box p-1.5 flex flex-col gap-1 shrink-0 relative mt-0">
          <div class="flex justify-between items-center text-[0.7em] px-1 min-h-[18px] retro-font text-yellow-300 border-b-2 border-white/30 pb-0.5 mb-0.5">
            <span class="tracking-widest"><span id="acting-hero-name" class="text-white"></span></span><span id="turn-phase-indicator" class="text-white transition-all duration-200">回合準備中</span>
          </div>
          <div id="action-main-buttons" class="grid grid-cols-2 gap-1.5 relative min-h-[85px]"></div>
        </div>
      </div>
      <div id="panel-status" class="flex-1 p-2 overflow-y-auto no-scrollbar hidden"><div id="status-full-list" class="space-y-3"></div></div>
      <div id="panel-log" class="flex-1 p-2 flex flex-col hidden overflow-hidden">
        <div class="flex justify-between items-center text-[0.75em] text-gray-400 mb-2 px-1 retro-font shrink-0"><span>BATTLE LOG</span><button onclick="clearHistoryLogs()" class="ff-btn px-3 py-1.5">CLEAR</button></div>
        <div id="log-history-scroll" class="flex-1 overflow-y-auto ff-box-dark p-3 text-[0.75em] font-mono text-gray-300 space-y-2 no-scrollbar border-gray-600 leading-relaxed min-h-0"></div>
      </div>
    </div>

    <!-- Modals -->
    <div id="action-select-modal" class="absolute inset-0 bg-black/85 z-40 flex flex-col justify-end hidden text-[0.85em]">
      <div class="ff-box border-b-0 rounded-b-none max-h-[65vh] flex flex-col m-1 mb-0 shadow-2xl">
        <div class="p-3 border-b-2 border-white flex justify-between items-center"><div class="flex items-center gap-2 retro-font text-yellow-300"><span id="modal-icon"></span><span id="modal-title"></span></div><button onclick="closeActionMenu()" class="ff-btn px-3 py-1.5 retro-font text-[0.75em]">CLOSE</button></div>
        <div id="modal-equips-bar" class="hidden p-2 bg-black border-b-2 border-white text-[0.7em] text-gray-300 grid grid-cols-4 gap-1 text-center retro-font leading-tight"></div>
        <div id="modal-items-grid" class="flex-1 overflow-y-auto p-2 grid grid-cols-1 gap-2 no-scrollbar pb-6"></div>
      </div>
    </div>
    <div id="replace-modal" class="absolute inset-0 bg-black/90 z-50 flex flex-col justify-center hidden text-[0.85em] p-2">
      <div class="ff-box max-h-[80vh] flex flex-col shadow-2xl">
        <div class="p-3 border-b-2 border-white flex justify-between items-center bg-red-900"><div class="flex items-center gap-2 retro-font text-white">⚠️ 空間已滿：請選擇替換</div></div>
        <div class="p-3 text-center text-yellow-300 font-bold tracking-widest text-[0.9em] leading-relaxed"><span id="replace-new-skill-name" class="text-white"></span><br>請選擇一項覆蓋遺忘：</div>
        <div id="replace-items-grid" class="flex-1 overflow-y-auto p-2 grid grid-cols-1 gap-2 no-scrollbar"></div>
        <div class="p-2 border-t-2 border-white"><button onclick="cancelReplace()" class="ff-btn ff-btn-danger w-full py-3 retro-font text-[0.8em] text-gray-300">返回 (CANCEL)</button></div>
      </div>
    </div>
    <div id="hero-info-modal" class="absolute inset-0 bg-black/90 z-40 flex flex-col justify-center items-center hidden text-[0.9em] p-3 backdrop-blur-sm">
      <div class="ff-box p-4 w-full max-w-sm flex flex-col gap-3 shadow-2xl max-h-[85vh] overflow-y-auto no-scrollbar relative">
        <button onclick="closeHeroInfo()" class="absolute top-2 right-2 ff-btn px-2 py-1 text-[0.7em] retro-font text-white z-50">X</button><div id="hero-info-content" class="flex flex-col gap-2"></div>
      </div>
    </div>
    <div id="enemy-info-modal" class="absolute inset-0 bg-black/90 z-40 flex flex-col justify-center items-center hidden text-[0.9em] p-4 backdrop-blur-sm">
      <div class="ff-box p-5 w-full max-w-xs flex flex-col gap-4 shadow-2xl">
        <div class="border-b-2 border-white pb-2 flex justify-between items-center"><span class="retro-font text-red-400 text-[1em]" id="enemy-info-title">TITLE</span><button onclick="closeEnemyInfo()" class="ff-btn px-2 py-1 text-[0.7em] retro-font text-white">X</button></div>
        <div class="text-[0.85em] text-gray-300 font-sans font-bold tracking-widest leading-relaxed" id="enemy-info-desc"></div>
      </div>
    </div>
    <div id="details-modal" style="z-index: 60;" class="absolute inset-0 bg-black/90 flex flex-col p-4 justify-center items-center hidden text-[0.9em] backdrop-blur-md">
      <div class="ff-box p-5 w-full max-w-xs flex flex-col gap-4 shadow-2xl">
        <div id="details-title">TITLE</div><div class="text-[0.85em] text-gray-300 font-sans font-bold tracking-widest leading-relaxed text-center" id="details-desc">DESCRIPTION</div>
        <button onclick="closeDetailsModal()" class="ff-btn mt-2 py-2 text-[0.8em] retro-font text-center w-full">CLOSE</button>
      </div>
    </div>
    <div id="draft-modal" class="absolute inset-0 bg-black/95 z-40 flex flex-col p-4 justify-between hidden">
      <div class="text-center mt-4 shrink-0"><h3 class="text-yellow-400 font-bold text-xl retro-font animate-pulse">VICTORY</h3><p class="text-[0.85em] text-gray-400 mt-2 font-bold tracking-widest">獲得戰利品</p><div id="draft-hero-queue" class="flex justify-center items-center gap-1.5 mt-4 w-full px-1"></div></div>
      <div id="draft-cards-container" class="flex-1 flex flex-col justify-center gap-3 my-2 overflow-y-auto no-scrollbar"></div>
      <div class="grid grid-cols-2 gap-2 shrink-0 mb-4 px-3"><button onclick="rerollDraft()" class="ff-btn py-3 text-[0.7em] retro-font text-yellow-300 tracking-widest">重抽 (<span id="reroll-count-lbl">0</span>)</button><button onclick="skipDraft()" class="ff-btn ff-btn-danger py-3 text-[0.7em] retro-font text-gray-400 tracking-widest">放棄</button></div>
    </div>
    <div id="transition-overlay" class="absolute inset-0 bg-black z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500"><h2 id="transition-title" class="text-4xl sm:text-5xl text-white retro-font mb-4 tracking-widest text-center leading-normal"></h2><p id="transition-sub" class="text-xl text-gray-400 font-bold tracking-widest text-center"></p></div>
    <div id="save-modal" class="absolute inset-0 bg-black/90 z-50 flex flex-col p-4 justify-center items-center hidden text-[0.9em]">
      <div class="ff-box p-5 w-full max-w-sm flex flex-col gap-4 shadow-2xl">
        <div class="flex justify-between items-center border-b-2 border-white pb-3 retro-font text-yellow-300 text-[1em]"><span>SYSTEM DATA</span><button onclick="closeSaveModal()" class="ff-btn px-3 py-1.5 text-white text-[0.8em]">X</button></div>
        <div class="flex flex-col gap-2"><label class="text-[0.8em] text-white font-bold tracking-widest">回憶咒語：</label><textarea id="save-code-area" placeholder="請在此貼上咒語..." class="bg-black border-2 border-gray-500 p-2 text-[0.75em] text-green-400 h-24 resize-none font-mono focus:outline-none placeholder-gray-600"></textarea></div>
        <div class="grid grid-cols-2 gap-2 mt-1"><button onclick="exportSaveCode()" class="ff-btn py-2.5 text-[0.75em] retro-font text-center">匯出咒語</button><button onclick="importSaveCode()" class="ff-btn py-2.5 text-[0.75em] retro-font text-center text-yellow-200">匯入咒語</button></div>
        <div class="grid grid-cols-2 gap-2 border-t-2 border-white pt-4 mt-1"><button onclick="quickSaveGame()" class="ff-btn py-2.5 text-[0.75em] retro-font text-center text-blue-300">QUICK SAVE</button><button onclick="quickLoadGame()" class="ff-btn py-2.5 text-[0.75em] retro-font text-center text-blue-300">QUICK LOAD</button></div>
      </div>
    </div>
    <div id="rename-modal" class="absolute inset-0 bg-black/90 z-50 flex flex-col p-4 justify-center items-center hidden text-[0.9em]">
      <div class="ff-box p-5 w-full max-w-xs text-center flex flex-col gap-4">
        <h4 class="text-yellow-300 retro-font text-[0.9em]">CHANGE NAME</h4><input type="text" id="rename-input" maxlength="10" class="bg-black border-2 border-white p-2 text-center text-white retro-font focus:outline-none text-[1em]">
        <div class="flex gap-2 justify-center mt-2"><button onclick="confirmRename()" class="ff-btn px-4 py-2 text-[0.75em] retro-font">OK</button><button onclick="closeRenameModal()" class="ff-btn px-4 py-2 text-[0.75em] retro-font">CANCEL</button></div>
      </div>
    </div>
    <div id="system-message-modal" class="absolute inset-0 bg-black/90 z-[60] flex flex-col p-4 justify-center items-center hidden text-[0.9em]">
      <div class="ff-box p-5 w-full max-w-xs text-center flex flex-col gap-4 shadow-2xl"><h4 class="text-red-400 retro-font text-[0.9em]">SYSTEM MESSAGE</h4><p id="system-message-text" class="text-white text-[0.85em] tracking-widest leading-relaxed"></p><button onclick="closeSystemMessage()" class="ff-btn px-4 py-2 mt-2 text-[0.75em] retro-font">OK</button></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "endless_oath_v32_final";
    let baseFontSize = 16;
    function showSystemMessage(msg) { document.getElementById('system-message-text').innerText = msg; document.getElementById('system-message-modal').classList.remove('hidden'); }
    function closeSystemMessage() { document.getElementById('system-message-modal').classList.add('hidden'); }
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    function formatNum(num) { if(num>=1e12)return(num/1e12).toFixed(1)+'T';if(num>=1e9)return(num/1e9).toFixed(1)+'B';if(num>=1e6)return(num/1e6).toFixed(1)+'M';if(num>=1e3)return(num/1e3).toFixed(1)+'K';return num.toString();}
    function formatLvl(lvl, type) { if (type === 'passive' && lvl >= 6) return 'Lv.6 (MAX)'; if (type === 'items' || type === 'condition') return ''; return `Lv.${lvl}`; }
    
    function snapshotHeroState(h) { return JSON.stringify({ i: h.items, m: h.magic, s: h.special, p: h.passives, e: h.equips, c: h.cardMemory, hp: h.hp, sh: h.shield }); }
    function restoreHeroState(h, snap) { let d = JSON.parse(snap); h.items = d.i; h.magic = d.m; h.special = d.s; h.passives = d.p; h.equips = d.e; h.cardMemory = d.c; h.hp = d.hp; h.shield = d.sh; }
    
    // Unified Logging System
    function addLog(msg, colorClass = "text-white") { gameState.historyLogs.push({ msg: `[${new Date().toLocaleTimeString('zh-TW', { hour12: false })}] ${msg}`, color: colorClass }); if (gameState.historyLogs.length > 200) gameState.historyLogs.shift(); if (gameState.activeTab === 'log') renderHistoryLogs(); }
    function updateAnimationMsg(txt) { document.getElementById('battle-latest-msg').innerText = txt; let f = document.getElementById('animation-flash-bg'); f.className = "absolute inset-0 bg-white pointer-events-none opacity-20"; setTimeout(() => f.className = "absolute inset-0 bg-white pointer-events-none transition-opacity duration-300 opacity-0", 80); }
    function logAndMsg(msg, colorClass = "text-white") { addLog(msg, colorClass); updateAnimationMsg(msg); }
    function isControlDisabled(char) { return char.status.paralyze > 0 || char.status.sleep > 0 || char.status.stun > 0; }
    function animateElement(id, cls) { let e = document.getElementById(id); if(e){ e.classList.add(cls); setTimeout(()=>e.classList.remove(cls), 400); } }
    function createFloatNum(txt, col, isH, idx) { let c = document.getElementById('floating-numbers'); let tgt = document.getElementById(isH ? `hero-mini-${idx}` : `enemy-card-${idx}`); if (!tgt || !c) return; let r = tgt.getBoundingClientRect(); let pr = c.getBoundingClientRect(); let s = document.createElement('span'); s.className = `absolute font-black ${col} retro-font text-[14px] damage-float pointer-events-none text-shadow-md z-50`; s.style.left = `${r.left - pr.left + (r.width / 2) - 10}px`; s.style.top = `${r.top - pr.top + (r.height / 3)}px`; s.innerText = txt; c.appendChild(s); setTimeout(() => s.remove(), 900); }
    function updateTopBar() { const floorTxt = document.getElementById('txt-floor'); if (floorTxt) floorTxt.innerText = `B${gameState.floor}-${gameState.room}`; const progressEl = document.getElementById('floor-progress'); if (progressEl) progressEl.style.width = `${(gameState.room / gameState.maxRooms) * 100}%`; }
    function switchTab(tabId) { gameState.activeTab = tabId; ['adventure', 'status', 'log'].forEach(id => { document.getElementById(`tab-${id}`).className = `flex-1 py-2 sm:py-3 transition-all border-2 border-white ${tabId === id ? 'text-black bg-white' : 'text-gray-400 bg-black hover:text-white border-transparent border-b-white/20'}`; document.getElementById(`panel-${id}`).classList.toggle('hidden', tabId !== id); }); if (tabId === 'status') renderPartyManagementTab(); if (tabId === 'log') renderHistoryLogs(); }
    function adjustFontSize(dir) { baseFontSize = Math.max(12, Math.min(24, baseFontSize + dir)); document.getElementById('game-container').style.fontSize = `${baseFontSize}px`; }

    function applyStatusEffects(entities, isHero) {
        for (let i = 0; i < entities.length; i++) {
            let t = entities[i]; if (t.isDead) continue;
            if (t.status.poison > 0) { let pd = 5 + Math.floor(gameState.floor * 1.5); t.hp = Math.max(0, t.hp - pd); animateElement(isHero ? `hero-mini-${i}` : `enemy-card-${i}`, 'animate-shake'); createFloatNum(`-${pd}`, 'text-green-500', isHero, i); t.status.poison--; if (t.hp <= 0) { t.isDead = true; if(isHero) logAndMsg(`💀 毒發！『${t.name}』陣亡`); else logAndMsg(`💀 毒發！【${t.shortName}】陣亡`); } }
            ['blind', 'paralyze', 'sleep', 'confuse', 'silence', 'weak', 'berserk', 'reflect_buff'].forEach(s => { if (t.status[s] > 0) t.status[s]--; });
            if (t.status.stun > 0) t.status.stun--; if (!isHero && t.stunTimer > 0) { t.stunTimer--; t.status.stun = 0; }
            if (t.status.enchant_fire > 0) t.status.enchant_fire--;
            let reg = 0; if (t.status.regen > 0) { reg += Math.floor((isHero?t.getMaxHp():t.maxHp) * 0.05); t.status.regen--; }
            if (isHero) { 
                ['weapon','armor','accessory','offhand'].forEach(eq => { if (t.equips[eq]?.regen) reg += Math.floor(t.equips[eq].regen * t.getMult(t.equips[eq].id)); }); 
                if (t.equips.weapon?.curse) { let d = Math.floor(t.getMaxHp()*0.1); if (t.equips.accessory?.id === 'ac_02') d = Math.floor(d * 0.5); t.hp = Math.max(0, t.hp - d); createFloatNum(`-${d}`, 'text-red-500', true, i); if (t.hp<=0) { t.isDead = true; logAndMsg(`💀 噬魂！『${t.name}』陣亡`); } }
            }
            if (reg > 0 && !t.isDead) { t.hp = Math.min((isHero?t.getMaxHp():t.maxHp), t.hp + reg); animateElement(isHero ? `hero-mini-${i}` : `enemy-card-${i}`, 'animate-heal'); createFloatNum(`+${reg}`, 'text-green-300', isHero, i); }
        }
    }

    function closeActionMenu() { document.getElementById('action-select-modal').classList.add('hidden'); }

    function handleInventoryOverflow(hero, pendingCards, onComplete, onCancel, snap) { 
      if (!snap) snap = snapshotHeroState(hero);
      if (!pendingCards || pendingCards.length === 0) { if (onComplete) onComplete(); return; } 
      let card = pendingCards[0]; let cat = card.type === 'passive' ? 'passive' : card.type; let list = cat === 'passive' ? hero.passives : hero[cat]; 
      let maxCap = cat === 'magic' ? hero.getMaxMagic() : (cat === 'special' ? hero.getMaxSpecial() : (cat === 'items' ? hero.getMaxItems() : hero.getMaxPassives())); 
      if (list.length >= maxCap) { 
          showReplaceModal(hero, list, card, cat, 
              () => { pendingCards.shift(); handleInventoryOverflow(hero, pendingCards, onComplete, onCancel, snap); }, 
              () => { restoreHeroState(hero, snap); if(onCancel) onCancel(); }
          ); 
      } else { list.push(card); pendingCards.shift(); handleInventoryOverflow(hero, pendingCards, onComplete, onCancel, snap); } 
    }

    function startGiveItem(itemIdx) {
      closeActionMenu(); const hero = gameState.party[gameState.currentHeroIndex];
      const equipItem = hero.items[itemIdx];

    function throwInventoryItem(itemIdx) { 
      closeActionMenu(); const hero = gameState.party[gameState.currentHeroIndex]; const equipItem = hero.items[itemIdx]; const opt = DATABASE[equipItem.equipType].find(x => x.id === equipItem.id); 
      let pwr = (opt.val || 10) * 2; let p23Lvl = hero.cardMemory['p_23'] || 1;
      if (hero.passives.some(p=>p.id==='p_23')) pwr = Math.floor(pwr * (p23Lvl + 1) * 0.5);
      let details = { type: 'throw_item', itemIdx: itemIdx, itemInstance: equipItem, name: `投擲 [${opt.name}]`, power: pwr, isAoe: false, actor: hero, effect: 'throw_dmg', targetFriendly: false };

    function selectSkillLogic(sObj, cat, idx) { 
      const h = gameState.party[gameState.currentHeroIndex]; const dbRef = DATABASE[cat].find(x => x.id === sObj.id); if (!dbRef) return; 
      let pwr = dbRef.power || 0; let lvl = h.cardMemory[sObj.id] || 1;
      if (cat === 'attack' && h.equips.weapon?.id === 'w_05') pwr = h.getSpeed() * 3;
      if (cat === 'magic' && pwr > 0) {
          if (!dbRef.isConsumable) {
              pwr = Math.floor(pwr * (1 + 0.1 * (lvl - 1)));
              if (pwr < h.matk) {
                  let baseRatio = dbRef.isAoe ? 0.5 : 0.8;
                  pwr = Math.floor(pwr + h.matk * baseRatio);
              }
          }
          if (h.equips.weapon?.magBoost) pwr = Math.floor(pwr * h.equips.weapon.magBoost); if (h.equips.offhand?.magBoost) pwr = Math.floor(pwr * h.equips.offhand.magBoost); if (h.equips.armor?.magBoost) pwr = Math.floor(pwr * h.equips.armor.magBoost); 
          if (h.equips.offhand?.healBoost && dbRef.effect === 'heal') pwr = Math.floor(pwr * (1 + h.equips.offhand.healBoost)); if (h.passives.find(x => x.id === 'p_09')) pwr = Math.floor(pwr * (1 + (h.cardMemory['p_09'] || 1) * 0.05)); 
          if (gameState.weather && h.passives.some(p=>p.id==='p_21')) pwr = Math.floor(pwr * (1.1 + 0.03 * (h.cardMemory['p_21']||1)));
      } else if (cat === 'items' && pwr > 0) {
          if (h.passives.some(p=>p.id==='p_22')) pwr = Math.floor(pwr * (1.1 + 0.05 * (h.cardMemory['p_22']||1)));
      } else if (cat === 'special' && pwr > 0) {
          let hits = {'double_strike':2, 'triple_strike':3, 'omnislash':5, 'musou_tensei':7}[dbRef.effect] || 1;
          if (!dbRef.isConsumable) pwr = Math.floor(pwr * (1 + 0.01 * (lvl - 1))); let hAtk = h.getAtk(); if (pwr < hAtk) { let baseRatio = dbRef.isAoe ? 0.5 : 0.8; if (hits > 1) baseRatio = 1.0 / hits; pwr = Math.floor(pwr + hAtk * baseRatio); }
      }
      let isAoe = dbRef.isAoe || false; if (cat === 'special' && ['s_27','s_28','s_29'].includes(sObj.id) && h.passives.some(p=>p.id==='p_20')) isAoe = true;
      if (sObj.effect === 'jump' && h.equips.weapon?.id === 'w_13') isAoe = true;
      const details = { type: cat, skillId: sObj.id, itemIdx: idx, level: lvl, name: `${dbRef.name}`, power: pwr, isAoe: isAoe, actor: h, effect: dbRef.effect || 'damage', targetFriendly: dbRef.targetFriendly||false, isConsumable: dbRef.isConsumable, isSelfOnly: dbRef.isSelfOnly||false }; 
      if (details.isAoe || details.effect === 'focus_self' || details.effect === 'charge' || details.effect === 'jump' || details.isSelfOnly || details.effect === 'mimic') {

      } else { if (!details.targetFriendly && details.effect !== 'revive') { let alives = gameState.enemies.filter(e => !e.isDead); if(alives.length === 1) { details.target = alives[0]; queueAction(details); return; } } initiateTargeting(details); }

    function selectDefend() { const h = gameState.party[gameState.currentHeroIndex]; queueAction({ type: 'defend', name: '防禦姿態', power: 0, isAoe: false, actor: h, effect: 'defend', targetFriendly: true, target: h }); gameState.targetingAction = null; }
    function handleTargetClick(obj, isFriendly) {

      if (gameState.targetingAction.type === 'give_item_input') {

              if (!dbRef.isConsumable && (s.type === 'magic' || s.type === 'special')) { let u = dbRef.maxUses; let lvl = h.cardMemory[s.id] || 1; if (!dbRef.power || dbRef.power === 0) u += Math.floor((lvl - 1) / 5); if (s.type === 'magic') { if (h.cardMemory['p_03']) u += h.cardMemory['p_03']; if (h.equips.weapon?.spellUses) u += h.equips.weapon.spellUses; } s.maxUses = u; s.uses = s.maxUses; }

    function advanceTurnQueue() { let next = -1; for (let i = gameState.currentHeroIndex + 1; i < gameState.party.length; i++) { let nH = gameState.party[i]; if (!nH.isDead && !isControlDisabled(nH) && nH.combatState.jumpTimer === 0 && nH.status.berserk <= 0 && nH.status.confuse <= 0) { next = i; break; } } if (next !== -1) { gameState.currentHeroIndex = next; cancelTargeting(); } else { cancelTargeting(); startCombatExecution(); } }

    async function resolveRoundEffects() { 
      applyStatusEffects(gameState.enemies, false); applyStatusEffects(gameState.party, true); gameState.party.forEach(h => { h.buffs.dodge = 0; h.buffs.defending = false; h.buffs.taunt = false; h.buffs.reflectPhys = 0; }); 
      if(gameState.wTimer > 0) { 
        gameState.wTimer--; let cw = gameState.weather;
        if(cw === 'cold') { gameState.party.forEach((h,i)=>{ if(!h.isDead){ h.hp = Math.max(0, h.hp-5); createFloatNum('-5', 'text-blue-300', true, i); }}); logAndMsg('❄️ 極寒天氣侵襲！', 'text-blue-300'); } 
        else {
          let wMap = { 'sand': { ids:[1,2,10], col:'text-yellow-600', m1:'🌪️ 沙塵暴讓黏液與食岩怪乾涸虛弱！', m2:'🌪️ 沙塵暴持續肆虐！' }, 'sun': { ids:[5,7,19], col:'text-red-500', m1:'☀️ 烈陽灼燒著不死族與夜行魔物！', m2:'☀️ 烈陽持續照射！' }, 'miasma': { ids:[4,8,11], col:'text-purple-500', m1:'☠️ 瘴氣毒害了亞人與野獸！', m2:'☠️ 瘴氣持續瀰漫！' } };
          if(wMap[cw]) { let hits=0, mD=wMap[cw]; gameState.enemies.forEach((e,i)=>{ if(!e.isDead && mD.ids.includes(e.baseId)){ let d=Math.floor(e.maxHp*0.15); e.hp=Math.max(0,e.hp-d); createFloatNum(`-${d}`, mD.col, false, i); animateElement(`enemy-card-${i}`, 'animate-shake'); if(e.hp<=0) e.isDead=true; hits++; }}); logAndMsg(hits>0 ? mD.m1 : mD.m2, mD.col); }
        }

    async function startCombatExecution() { gameState.isInputPhase = false; resetActionInput(); renderActionHUD(); logAndMsg(`⚔️ 戰鬥開始！`); await sleep(1000); executeRoundTurn(); }
    
    // Core Execute Loop
    async function executeRoundTurn() { 
      await resolveRoundEffects(); if (checkEnemiesWiped() || checkPartyWiped()) return;
      const pFirst = Math.random() < 0.5; 
      if (pFirst) { await runP(); if (checkEnemiesWiped()) return; await runE(); if (checkPartyWiped()) return; } else { await runE(); if (checkPartyWiped()) return; await runP(); if (checkEnemiesWiped()) return; } 
      if (checkEnemiesWiped()) return; if (gameState.isBattleActive) { gameState.roundCount++; startInputPhase(); } 
    }

    async function runP() {
      let nOrd=[], mOrd=[]; for(let i=0; i<gameState.party.length; i++) { if(gameState.party[i].actionQueued && gameState.party[i].actionQueued.effect === 'mimic') mOrd.push(i); else nOrd.push(i); }
      for (let i of [...nOrd, ...mOrd]) {

    async function runE() {

        let skChance = 0.2 + (1 - hpPct) * 0.5; let useSk = e.s.length > 0 && Math.random() < skChance;
        let skId = useSk ? e.s[Math.floor(Math.random() * e.s.length)] : 'normal';
        if (e.s.includes('kamikaze') && hpPct < 0.5 && Math.random() < 0.5) skId = 'kamikaze';
        if (e.s.includes('tonberry') && Math.random() < 0.2) skId = 'tonberry'; 
        if (e.s.includes('summon') && aliveC < 8 && Math.random() < (1 - hpPct + (8 - aliveC)*0.1)*0.5) skId = 'summon';
        if (e.s.includes('tonberry') && skId !== 'tonberry') { logAndMsg(`🏮 【${e.shortName}】慢慢地逼近...`, 'text-gray-400'); await sleep(1000); continue; }
        await eSPA(e, i, skId);
      } 
    }

      if (alives.length > 0) { let tnt = alives.find(h => h.buffs.taunt); if (tnt) tg = tnt; else if (sk.id === 'assassinate') tg = alives.reduce((p, c) => (p.hp < c.hp) ? p : c); else tg = alives[Math.floor(Math.random() * alives.length)]; }

      let tIdx = gameState.party.indexOf(target);

      let dPre = d;
      d = Math.floor(d); if (target.buffs.defending) d = Math.floor(d * 0.5); 
      if (target.shield > 0) { if (target.shield >= d) { target.shield -= d; d = 0; } else { d -= target.shield; target.shield = 0; } } 
      target.hp = Math.max(0, target.hp - d); if (target.status.sleep > 0) target.status.sleep = 0; 
      animateElement(`hero-mini-${tIdx}`, 'animate-shake'); createFloatNum(`-${d}`, 'text-red-500', true, tIdx); 
      let msg = `💥 【${enemy.shortName}】使出 [${actName}] 擊中『${target.name}』！(-${formatNum(d)})`; if (target.hp <= 0) { target.isDead = true; msg += ' (陣亡!)'; } logAndMsg(msg, 'text-red-400');
      if (target.status.reflect_buff > 0 && dPre > 0) { let refDmg = Math.floor(dPre * 0.8); enemy.hp = Math.max(0, enemy.hp - refDmg); createFloatNum(`反射-${refDmg}`, 'text-blue-300', false, eIdx); if (enemy.hp <= 0 && !enemy.isDead) enemy.isDead = true; } 
      if (target.buffs.defending && target.equips.armor?.id === 'a_09' && dPre > 0) { let refDmg = Math.floor(dPre * 0.8); enemy.hp = Math.max(0, enemy.hp - refDmg); createFloatNum(`反彈-${refDmg}`, 'text-blue-300', false, eIdx); if (enemy.hp <= 0 && !enemy.isDead) enemy.isDead = true; } 
      if (target.buffs.defending && target.equips.offhand?.id === 'o_08' && dPre > 0) { let refDmg = Math.floor(dPre * 0.5); enemy.hp = Math.max(0, enemy.hp - refDmg); createFloatNum(`反擊-${refDmg}`, 'text-blue-300', false, eIdx); if (enemy.hp <= 0 && !enemy.isDead) enemy.isDead = true; } 
    }

    async function triggerVictoryFlow() { 
      logAndMsg(`🏆 戰鬥勝利！魔物皆已伏誅。`, 'text-green-400 font-bold'); await playTransition('<span class="text-yellow-400 drop-shadow-md">VICTORY</span>', '', 1000); 
      if (Math.random() < 0.4) { let hint = LORE_HINTS[Math.floor(Math.random() * LORE_HINTS.length)]; logAndMsg(`📜 深淵耳語：『${hint}』`, 'text-gray-400'); await sleep(2000); }
      if (gameState.room === gameState.maxRooms) { 
        let alives = gameState.party.filter(h => !h.isDead); 
        if (alives.length > 0) { 
          let lucky = alives[Math.floor(Math.random() * alives.length)]; let r = Math.random(); let typeStr = r < 0.33 ? "魔法" : (r < 0.66 ? "特技" : "道具");
          if (r < 0.33) lucky.bMag++; else if (r < 0.66) lucky.bSpc++; else lucky.bItm++;
          logAndMsg(`🌟 『${lucky.name}』的${typeStr}上限 +1`, 'text-yellow-300 font-bold'); renderBattleScreen(); await sleep(2000); 
        } 
      } 
      gameState.pendingDrafts = gameState.party.filter(h => !h.isDead);
      gameState.party.forEach(h => {
          if (h.actionQueued) {
              let act = h.actionQueued;
              if (['magic', 'special', 'items'].includes(act.type)) {
                  let m = h[act.type].find(s => s.id === act.skillId);
                  if (m) m.uses++;
              }
              h.actionQueued = null;
          }
          cleanDepletedItems(h);
          h.currentRerolls = h.getMaxRerolls();
      });
      gameState.draftChoiceIndex = 0; 
      if (gameState.pendingDrafts.length > 0) { document.getElementById('draft-modal').classList.remove('hidden'); presentSingleHeroDraft(); } else { proceedToNextRoom(); } 
    }
    async function triggerDefeatFlow() { 
        logAndMsg(`💀 隊伍全軍覆沒。`, 'text-red-500 font-bold'); await playTransition('<span class="text-red-600">PARTY DEFEATED</span>', '撤退修整中...', 2000); gameState.floor = Math.max(1, gameState.floor - 1); gameState.room = 1; 
        gameState.party.forEach(h => { 
            if (h.actionQueued) {
                let act = h.actionQueued;
                if (['magic', 'special', 'items'].includes(act.type)) { let m = h[act.type].find(s => s.id === act.skillId); if (m) m.uses++; }
                h.actionQueued = null;
            }
            cleanDepletedItems(h);
            h.isDead = false; h.hp = h.getMaxHp(); h.shield = 0; h.combatState = { charging: false, jumpTimer: 0, jumpTarget: null, defending: false }; h.status = { poison: 0, blind: 0, paralyze: 0, sleep: 0, confuse: 0, silence: 0, weak: 0, bleed: 0, regen: 0, berserk: 0, reflect_buff: 0, stun: 0, enchant_fire: 0 }; 
        }); 
        startRoom(); 
    }

    function presentSingleHeroDraft() { 
      const idx = gameState.draftChoiceIndex; const total = gameState.pendingDrafts.length; if (idx >= total) { proceedToNextRoom(); return; } 
      const h = gameState.pendingDrafts[idx]; gameState.activeDraftHero = h; const queueContainer = document.getElementById('draft-hero-queue'); 
      if (queueContainer) { queueContainer.innerHTML = ''; gameState.party.forEach((hero, i) => { let isCurrent = (hero === h); let isDead = hero.isDead; let bgClass = isCurrent ? 'bg-blue-900 border-yellow-300 shadow-[0_0_8px_rgba(253,224,71,0.6)] scale-105 z-10' : 'bg-black border-gray-700 opacity-40'; let titleClass = isCurrent ? 'text-yellow-300 animate-pulse' : 'text-gray-500'; let nameClass = isCurrent ? 'text-white' : (isDead ? 'text-red-800 line-through' : 'text-gray-500'); queueContainer.innerHTML += `<div class="flex-1 flex flex-col items-center justify-center border-2 ${bgClass} py-1.5 px-1 transition-all duration-300"><span class="text-[0.55em] retro-font ${titleClass} mb-0.5">NO.${i + 1}</span><span class="text-[0.65em] font-bold ${nameClass} retro-font truncate w-full text-center">${hero.name}</span></div>`; }); } 
      document.getElementById('reroll-count-lbl').innerText = h.currentRerolls; const container = document.getElementById('draft-cards-container'); container.innerHTML = ''; 
      const catGroups = [ ['weapon', 'offhand'], ['armor', 'accessory'], ['items'], ['magic'], ['special'], ['passive'] ]; const shuffledGroups = catGroups.sort(() => 0.5 - Math.random()).slice(0, 3); let options = []; 
      shuffledGroups.forEach(grp => { let validCards = ALL_CARDS_POOL.filter(c => grp.includes(c.type) && !options.some(o => o.id === c.id)); if (grp.includes('passive')) { validCards = validCards.filter(c => { let has = h.passives.find(x => x.id === c.id); return !(has && h.cardMemory[c.id] >= 6 && c.id !== 'p_10'); }); } if (validCards.length > 0) options.push(validCards[Math.floor(Math.random() * validCards.length)]); }); 
      const typeNames = { weapon: 'WEAPON', offhand: 'OFF HAND', armor: 'ARMOR', accessory: 'RING', magic: 'MAGIC', special: 'SKILL', items: 'ITEM', passive: 'PASSIVE' }; 
      options.forEach(o => { 
        let cardDiv = document.createElement('div'); cardDiv.className = "ff-btn text-left p-3 flex flex-col justify-between items-start w-full relative group"; let targetProp = o.type === 'passive' ? 'passives' : o.type; let hasObj = ['magic','special','items','passive'].includes(o.type) && h[targetProp].some(x => x.id === o.id); let isEquipUpgrade = ['weapon', 'offhand', 'armor', 'accessory'].includes(o.type) && h.equips[o.type] && h.equips[o.type].id === o.id; let dupUpgradeBadge = ''; 
        if (hasObj || isEquipUpgrade) { if (o.type === 'items') { if (!o.isConsumable) dupUpgradeBadge = '<span class="absolute top-2 right-2 text-green-300 text-[0.7em] retro-font">USES +1</span>'; } else { dupUpgradeBadge = '<span class="absolute top-2 right-2 text-yellow-300 text-[0.7em] retro-font">UPGRADE</span>'; } } cardDiv.onclick = () => { selectDraftRewardLogic(h, o); }; 
        let currentEquipText = ""; if (['weapon', 'offhand', 'armor', 'accessory'].includes(o.type)) { let current = h.equips[o.type]; let nameDisplay = current ? current.name : "無"; if (current && current.isTwoHanded) nameDisplay += "(雙手)"; if (o.type === 'offhand' && h.equips.weapon?.isTwoHanded) { nameDisplay = `${h.equips.weapon.name}(雙手)`; } else if (o.type === 'weapon' && o.isTwoHanded) { let wName = h.equips.weapon ? h.equips.weapon.name : "無"; let oName = h.equips.offhand ? h.equips.offhand.name : "無"; if (h.equips.weapon || h.equips.offhand) nameDisplay = `${wName}/${oName}`; else nameDisplay = "無"; } currentEquipText = `<div class="text-[0.7em] text-gray-500 retro-font mt-1.5 border-t border-gray-700 pt-1.5 w-full text-right"><span class="text-gray-600">替換:</span> <span class="text-gray-400">${nameDisplay}</span></div>`; } 
        let itemUsesStr = ''; if (o.type === 'items') { let existingItem = h.items.find(i => i.id === o.id); if (existingItem) { itemUsesStr = ` <span class="text-yellow-300 text-[0.7em]">(${existingItem.uses}/${existingItem.maxUses})</span>`; } else { let pushMax = o.isConsumable ? 1 : o.maxUses; itemUsesStr = ` <span class="text-yellow-300 text-[0.7em]">(1/${pushMax})</span>`; } } 
        let maxStr = ""; if (o.type === 'magic') maxStr = ` (${h.magic.length}/${h.getMaxMagic()})`; else if (o.type === 'special') maxStr = ` (${h.special.length}/${h.getMaxSpecial()})`; else if (o.type === 'items') maxStr = ` (${h.items.length}/${h.getMaxItems()})`; else if (o.type === 'passive') maxStr = ` (${h.passives.length}/${h.getMaxPassives()})`; 
        let prefix = o.isConsumable ? "★" : "►"; let colorClass = o.isConsumable ? "text-red-300" : "text-white"; let effType = o.isEquipItem ? o.equipType : o.type; let dispLvl = (h.cardMemory[o.id] || 0) + 1; if (effType === 'passive') dispLvl = Math.min(6, dispLvl); let lvlBadge = (!o.isConsumable && effType !== 'items') ? ` <span class="text-yellow-200 text-[0.8em]">${formatLvl(dispLvl, effType)}</span>` : ''; 
        cardDiv.innerHTML = `${dupUpgradeBadge}<div class="text-[0.7em] text-gray-400 font-bold mb-1.5 retro-font">${typeNames[o.type]}${maxStr}</div><div class="text-[1em] font-bold ${colorClass} mb-2 retro-font tracking-wider"><span class="opacity-0 group-hover:opacity-100 text-yellow-300 absolute -ml-4">${prefix}</span>${o.name}${lvlBadge}${itemUsesStr}</div><div class="text-[0.8em] text-gray-300 leading-relaxed font-sans font-bold tracking-widest">${o.desc}</div>${currentEquipText}`; container.appendChild(cardDiv); 
      }); 
    }

    function rerollDraft() { const h = gameState.activeDraftHero; if (h && h.currentRerolls > 0) { h.currentRerolls--; presentSingleHeroDraft(); } else { showSystemMessage("該角色的重抽次數不足！"); } }
    function skipDraft() { advanceDraft(); }
    function advanceDraft() { gameState.draftChoiceIndex++; presentSingleHeroDraft(); }

    function selectDraftRewardLogic(hero, opt) { 
      let snap = snapshotHeroState(hero);
      hero.cardMemory[opt.id] = (hero.cardMemory[opt.id] || 0) + 1; let t = opt.type; let pendingCards = []; 
      if (t === 'items' && !opt.isEquipItem) { let existing = hero.items.find(i => i.id === opt.id); if (existing && !opt.isConsumable) { existing.uses = Math.min(existing.uses + 1, existing.maxUses); advanceDraft(); return; } } 
      if (['weapon', 'offhand', 'armor', 'accessory'].includes(t)) { 
        let oldEquip = hero.equips[t]; let isSame = oldEquip && oldEquip.id === opt.id; 
        if (t === 'weapon') { if (opt.isTwoHanded && hero.equips.offhand) { pendingCards.push({ id: hero.equips.offhand.id, type: 'items', isEquipItem: true, equipType: 'offhand', maxUses: 1, uses: 1 }); hero.equips.offhand = null; } } 
        else if (t === 'offhand') { if (hero.equips.weapon?.isTwoHanded) { pendingCards.push({ id: hero.equips.weapon.id, type: 'items', isEquipItem: true, equipType: 'weapon', maxUses: 1, uses: 1 }); hero.equips.weapon = null; } } 
        if (oldEquip && !isSame) { pendingCards.push({ id: oldEquip.id, type: 'items', isEquipItem: true, equipType: t, maxUses: 1, uses: 1 }); } 
        if (!isSame) { hero.equips[t] = { ...opt }; } 
      } else if (t === 'passive') { let m = hero.passives.find(s => s.id === opt.id); if (!m) pendingCards.push({ id: opt.id, type: t }); } 
      else { let list = hero[t]; let m = list.find(s => s.id === opt.id); if (!m) { let pushMax = DATABASE[t].find(x=>x.id===opt.id).isConsumable ? 1 : opt.maxUses; pendingCards.push({ id: opt.id, type: t, uses: 1, maxUses: pushMax }); } } 
      hero.hp = Math.min(hero.getMaxHp(), hero.hp); 
      handleInventoryOverflow(hero, pendingCards, () => advanceDraft(), () => {}, snap);
    }

    let replaceTempData = null;
    function showReplaceModal(hero, list, newOpt, cat, confirmCb, cancelCb) { 
      replaceTempData = { hero, list, newOpt, cat, confirmCb, cancelCb }; let dbCat = newOpt.isEquipItem ? newOpt.equipType : (newOpt.type === 'passive' ? 'passive' : newOpt.type); let realOpt = DATABASE[dbCat].find(x => x.id === newOpt.id); let newOptName = realOpt ? realOpt.name : "未知"; let heroNum = gameState.party.indexOf(hero) + 1; 
      document.getElementById('replace-new-skill-name').innerText = `NO.${heroNum} ${hero.name} 獲得 [${newOptName}] ${formatLvl(hero.cardMemory[newOpt.id] || 1, newOpt.type)}`; 
      const container = document.getElementById('replace-items-grid'); container.innerHTML = ''; 
      list.forEach((s, idx) => { let dbRef = s.isEquipItem ? DATABASE[s.equipType].find(x=>x.id===s.id) : DATABASE[cat].find(x => x.id === s.id); let sName = dbRef ? dbRef.name : "未知"; let btn = document.createElement('button'); btn.className = "ff-btn text-left p-3 flex flex-col justify-between group relative"; btn.onclick = () => { confirmReplace(idx); }; btn.innerHTML = `<div class="flex justify-between items-center w-full"><span class="text-[0.9em] text-white font-bold">遺忘/捨棄 ${sName}</span><span class="text-[0.8em] text-yellow-300">${formatLvl(hero.cardMemory[s.id]||1, s.isEquipItem?s.equipType:cat)}</span></div><p class="text-[0.7em] text-gray-400 mt-1">${dbRef ? dbRef.desc : ""}</p>`; container.appendChild(btn); }); 
      document.getElementById('replace-modal').classList.remove('hidden'); 
    }

    function confirmReplace(index) { 
      let d = replaceTempData; let oldObj = d.list[index]; let nC = d.newOpt.isEquipItem ? d.newOpt.equipType : d.cat; let nD = DATABASE[nC].find(x => x.id === d.newOpt.id); 
      if (d.newOpt.isEquipItem) { d.list[index] = d.newOpt; } else if (d.newOpt.type === 'passive') { d.list[index] = { id: d.newOpt.id, type: d.newOpt.type }; } else { let pushMax = nD?.isConsumable ? 1 : nD.maxUses; d.list[index] = { id: d.newOpt.id, type: d.newOpt.type, uses: 1, maxUses: pushMax }; } 
      addLog(`♻️ 『${d.hero.name}』更換為 [${nD?nD.name:'未知'}]！`, 'text-cyan-300'); 
      document.getElementById('replace-modal').classList.add('hidden'); 
      if (d.confirmCb) d.confirmCb(); replaceTempData = null; 
    }
    function cancelReplace() { 
        let cb = replaceTempData?.cancelCb; document.getElementById('replace-modal').classList.add('hidden'); replaceTempData = null; if (cb) cb(); 
    }

    async function proceedToNextRoom() { 
      document.getElementById('draft-modal').classList.add('hidden'); let isNextFloor = false; 
      if (gameState.room === gameState.maxRooms) { gameState.floor++; gameState.room = 1; isNextFloor = true; } else { gameState.room++; } 
      gameState.party.forEach(h => { if (h.isDead) return; let pR = h.passives.find(p => p.id === 'p_05'); let armE = h.equips.armor?.endHeal || 0; let tot = (pR ? (h.cardMemory['p_05'] || 1) * 0.08 : 0) + armE; if (tot > 0) { let r = Math.floor(h.getMaxHp() * tot); h.hp = Math.min(h.getMaxHp(), h.hp + r); } }); 
      await playTransition(isNextFloor ? '<span class="text-red-400 drop-shadow-md">FLOOR CLEARED</span>' : '<span class="text-white drop-shadow-md">NEXT ROOM</span>', isNextFloor ? `前往 B${gameState.floor}` : `B${gameState.floor}-${gameState.room}`, 1000); startRoom(); 
    }

    function openSaveModal() { document.getElementById('save-code-area').value = ""; document.getElementById('save-modal').classList.remove('hidden'); }
    function closeSaveModal() { document.getElementById('save-modal').classList.add('hidden'); }
    function removeCircularRefs(key, value) { if (key === 'actionQueued' || key === 'jumpTarget' || key === 'target' || key === 'itemInstance') return undefined; return value; }
    function exportSaveCode() { let d = JSON.stringify({ f: gameState.floor, r: gameState.room, p: gameState.party.map(h => ({ id: h.id, name: h.name, cardMemory: h.cardMemory, equips: h.equips, magic: h.magic, special: h.special, items: h.items, passives: h.passives, hp: h.hp, currentRerolls: h.currentRerolls, bMag: h.bMag, bSpc: h.bSpc, bItm: h.bItm, matk: h.matk }))}, removeCircularRefs); document.getElementById('save-code-area').value = btoa(encodeURIComponent(d)); addLog("代碼已產生！", "text-cyan-400"); }
    function importSaveCode() { let str = document.getElementById('save-code-area').value.trim(); if (!str) { showSystemMessage("請先貼上代碼！"); return; } try { let dec = JSON.parse(decodeURIComponent(atob(str))); gameState.floor = dec.f || 1; gameState.room = dec.r || 1; gameState.party = dec.p.map(x => { let h = new Hero(x.id || x.i, x.name || x.n); h.equips = x.equips || x.e; h.magic = x.magic || x.m; h.special = x.special || x.s; h.items = x.items || x.it; h.passives = x.passives || x.pa; h.hp = x.hp; h.currentRerolls = x.currentRerolls || x.rr || 1; h.cardMemory = x.cardMemory || x.cm || {}; h.bMag = x.bMag || 0; h.bSpc = x.bSpc || 0; h.bItm = x.bItm || 0; h.matk = x.matk || 10; return h; }); closeSaveModal(); startRoom(); } catch (e) { showSystemMessage("無法還原，請確認代碼完整度！"); } }
    function quickSaveGame() { let d = JSON.stringify({ f: gameState.floor, r: gameState.room, p: gameState.party.map(h => ({ id: h.id, name: h.name, cardMemory: h.cardMemory, equips: h.equips, magic: h.magic, special: h.special, items: h.items, passives: h.passives, hp: h.hp, currentRerolls: h.currentRerolls, bMag: h.bMag, bSpc: h.bSpc, bItm: h.bItm, matk: h.matk })) }, removeCircularRefs); localStorage.setItem(STORAGE_KEY, d); addLog("進度已保存。", "text-cyan-400"); closeSaveModal(); }
    function quickLoadGame() { let data = localStorage.getItem(STORAGE_KEY); if (!data) return showSystemMessage("無本機進度存檔！"); try { let dec = JSON.parse(data); gameState.floor = dec.f; gameState.room = dec.r; gameState.party = dec.p.map(x => { let h = new Hero(x.id || x.i, x.name || x.n); h.equips = x.equips || x.e; h.magic = x.magic || x.m; h.special = x.special || x.s; h.items = x.items || x.it; h.passives = x.passives || x.pa; h.hp = x.hp; h.currentRerolls = x.currentRerolls || x.rr || 1; h.cardMemory = x.cardMemory || x.cm || {}; h.bMag = x.bMag || 0; h.bSpc = x.bSpc || 0; h.bItm = x.bItm || 0; h.matk = x.matk || 10; return h; }); closeSaveModal(); startRoom(); } catch (e) { showSystemMessage("載入失敗！"); } }

    let rnId = null;
    function openRenameModal(id) { rnId = id; document.getElementById('rename-input').value = gameState.party.find(h=>h.id===id).name; document.getElementById('rename-modal').classList.remove('hidden'); }
    function confirmRename() { let v = document.getElementById('rename-input').value.trim(); if(v) { gameState.party.find(h=>h.id===rnId).name = v; renderPartyManagementTab(); resetActionInput(); } closeRenameModal(); }
    function closeRenameModal() { document.getElementById('rename-modal').classList.add('hidden'); rnId = null; }

    function calculateDmg(basePwr, targetDef, isCrit, isBlind) { if (basePwr <= 0) return 0; if (isBlind && Math.random() < 0.5) return 0; let dmg = Math.max(1, basePwr - Math.floor(targetDef * 0.5)); if (isCrit) dmg = Math.floor(dmg * 1.5); dmg = Math.floor(dmg * (0.9 + Math.random() * 0.2)); return Math.max(1, dmg); }
    function checkEnemiesWiped() { if (gameState.enemies.every(e => e.isDead)) { if (gameState.isBattleActive) { gameState.isBattleActive = false; setTimeout(() => triggerVictoryFlow(), 1000); } return true; } return false; }
    function checkPartyWiped() { if (gameState.party.every(h => h.isDead)) { if (gameState.isBattleActive) { gameState.isBattleActive = false; setTimeout(() => triggerDefeatFlow(), 1000); } return true; } return false; }
    async function playTransition(title, sub, delay) { const overlay = document.getElementById('transition-overlay'); document.getElementById('transition-title').innerHTML = title; document.getElementById('transition-sub').innerHTML = sub; overlay.classList.remove('opacity-0', 'pointer-events-none'); overlay.classList.add('opacity-100'); await sleep(delay); overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0', 'pointer-events-none'); await sleep(500); }

    function renderPartyManagementTab() { const list = document.getElementById('status-full-list'); if (!list) return; list.innerHTML = ''; gameState.party.forEach((h, idx) => { list.innerHTML += generateHeroCardHTML(h, idx, false); }); }
    function renderHistoryLogs() { const container = document.getElementById('log-history-scroll'); if (!container) return; container.innerHTML = gameState.historyLogs.map(l => `<div class="${l.color}">${l.msg}</div>`).join(''); setTimeout(() => { container.scrollTop = container.scrollHeight; }, 10); }
    function clearHistoryLogs() { gameState.historyLogs = []; renderHistoryLogs(); }

    function initGame() { gameState.party = [ new Hero('h_01', '阿爾法'), new Hero('h_02', '貝塔'), new Hero('h_03', '伽瑪'), new Hero('h_04', '德爾塔') ]; startRoom(); }
    window.onload = () => initGame();
  </script>
