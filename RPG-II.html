      retireCancel: () => {
          U.hide('ui-retire-modal');
      },

      retireConfirm: () => {
          U.hide('ui-retire-modal');
          let nextLegacyBossName = state.isDemonEnding ? state.previousDemonName : null;

          state.generation = (state.generation || 1) + 1;
          state.lvl = 1; state.xp = 0; state.xpReq = 150; 
          state.gold = 0; 
          state.potions = 5;
          state.maxDmg = { val: 0, lvl: 1, job: '', skill: '', zone: '', enemy: '' };
          state.playerName = '無名冒險者';
          state.job = 'novice';
          state.unlockedJobs = ['novice'];
          state.jobLvl = { 'novice': 1 }; 
          state.jobExp = { 'novice': 0 };

          state.eq = { 
              w: {l: 1, r: 0, n: '破舊的木棍', enc: [null,null,null,null,null,null]}, 
              a: {l: 1, r: 0, n: '破舊的麻衣', enc: [null,null,null,null,null,null]} 
          };
          
          for (let k in state.train) { state.train[k] = 0; }
          
          state.relicPulls = 0;
          for (let k in state.relics) { state.relics[k] = 0; }
          
          state.map = { baseIdx: 0, lvl: 1, debuff: 'normal' };
          state.kills = 0; state.enemy = null; state.phase = 'EXPLORE'; state.explorePct = 0;
          
          state.inAbyssPrison = false; state.prisonQuest = null; state.goddessUltimate = false;
          state.goddessDefeated = false; state.isDemonEnding = false;
          state.legacyBossName = nextLegacyBossName;

          // 徹底清空所有面板顯示的衍伸數值與加成
          state.stats = { atk: 0, def: 0, mhp: 0, mmp: 0, hit: 0, eva: 0, foc: 0, matkBonus: 0, healBonus: 0, cdmgBonus: 0 };
          state.vampBonus = 0;

          calc.refreshStats(); state.hp = state.stats.mhp; state.mp = state.stats.mmp;
          game.log(`👑 第 ${state.generation} 代傳承者踏上旅途！(獲經驗值 +${(state.generation-1)*5}%, 最終減傷 +${Math.min(90, state.generation-1)}%)`, 'legend');
          game.switchTab('battle'); game.updateUI();
      },

      renderTown: () => {
        let cnt = U.el('ui-town-content'); if(!cnt) return;
        let html = ''; let tLvl = state.town.lvl;

        const renderEnchantSlots = (type) => {
            let slotsHtml = '';
            for(let i=0; i<6; i++) {
                let reqLvl = 4 + i; let isUnlocked = state.town.lvl >= reqLvl; let enc = state.eq[type].enc[i];
                let cost = 500 * Math.pow(2, i); 
                if (!isUnlocked) {
                    slotsHtml += `<div class="bg-slate-950 border border-slate-700/50 rounded p-1 flex items-center justify-center opacity-50"><span class="text-[10px] text-slate-500">🔒城鎮Lv${reqLvl}</span></div>`;
                } else if (enc) {
                    slotsHtml += `<button onclick="game.enchantSlot('${type}', ${i})" class="bg-slate-900 hover:bg-slate-800 border border-slate-600 rounded flex flex-col items-center justify-center transition-colors active:scale-95 py-1">
                        <span class="text-[10px] ${enc.c} leading-tight">[${enc.g}] ${enc.n}</span>
                        <span class="text-[11px] ${enc.c} font-bold leading-tight">+${enc.v}${enc.u}</span>
                        <span class="text-[10px] text-amber-500/80 mt-0.5">${U.fNum(cost)}🪙洗鍊</span>
                    </button>`;
                } else {
                    slotsHtml += `<button onclick="game.enchantSlot('${type}', ${i})" class="bg-slate-900 hover:bg-indigo-900/50 border border-dashed border-slate-500 rounded p-1 flex flex-col items-center justify-center transition-colors active:scale-95">
                        <span class="text-[11px] text-slate-400">點擊附魔</span>
                        <span class="text-[10px] text-amber-500 mt-0.5">${U.fNum(cost)}🪙</span>
                    </button>`;
                }
            }
            return `<div class="grid grid-cols-3 gap-1 mt-1">${slotsHtml}</div>`;
        };

        html += `<div class="bg-slate-800 p-3 rounded-lg border border-slate-600 shadow-md">
           <div class="text-xs text-slate-400 mb-2 font-bold flex justify-between items-center">
              <span>裝備與附魔系統</span><span class="text-[10px] text-amber-500 border border-amber-800 bg-amber-900/30 px-1.5 py-0.5 rounded-full">裝備智能替換，附魔永久綁定槽位</span>
           </div>
           <div class="flex flex-col gap-2">
             <div class="flex flex-col bg-slate-900 p-2 rounded border border-slate-700 shadow-inner">
                <div class="flex justify-between items-center"><span class="text-sm text-slate-500 font-bold shrink-0">武器槽</span><span class="text-slate-300 font-bold text-sm text-right pl-2">${state.eq.w.n} Lv.${state.eq.w.l}</span></div>
                ${renderEnchantSlots('w')}
             </div>
             <div class="flex flex-col bg-slate-900 p-2 rounded border border-slate-700 shadow-inner">
                <div class="flex justify-between items-center"><span class="text-sm text-slate-500 font-bold shrink-0">防具槽</span><span class="text-slate-300 font-bold text-sm text-right pl-2">${state.eq.a.n} Lv.${state.eq.a.l}</span></div>
                ${renderEnchantSlots('a')}
             </div>
           </div>
        </div>`;

        if (tLvl >= 2) {
            let limitTxt = tLvl >= 9 ? '無上限' : (tLvl >= 6 ? '上限Lv.40' : '上限Lv.10');
            html += `<div class="bg-slate-800 p-3 rounded-lg border border-slate-600 shadow-md">
               <div class="text-xs text-slate-400 mb-2 font-bold flex justify-between items-center">
                  <span>💪 冒險者訓練所</span>
                  <div class="flex gap-1">
                     <button id="btn-tm-x1" onclick="game.setTrainMulti(1)" class="px-2 py-1 text-[11px] font-bold rounded ${state.trainMulti===1?'bg-indigo-900 text-indigo-100 border border-indigo-500 shadow':'bg-slate-800 text-slate-400 border border-slate-600'}">x1</button>
                     <button id="btn-tm-x10" onclick="game.setTrainMulti(10)" class="px-2 py-1 text-[11px] font-bold rounded ${state.trainMulti===10?'bg-indigo-900 text-indigo-100 border border-indigo-500 shadow':'bg-slate-800 text-slate-400 border border-slate-600'}">x10</button>
                     <button id="btn-tm-x100" onclick="game.setTrainMulti(100)" class="px-2 py-1 text-[11px] font-bold rounded ${state.trainMulti===100?'bg-indigo-900 text-indigo-100 border border-indigo-500 shadow':'bg-slate-800 text-slate-400 border border-slate-600'}">x100</button>
                  </div>
               </div>
               <div class="grid grid-cols-2 gap-1.5 mt-1">`;
            for (const [k, obj] of Object.entries(DB.TRAIN)) {
              let limit = obj.max;
              if (k !== 'agi' && k !== 'luk') { limit = tLvl >= 9 ? obj.max : (tLvl >= 6 ? Math.min(40, obj.max) : Math.min(10, obj.max)); }
              let isMax = state.train[k] >= limit;
              let cost = calc.trainCost(k); let costTxt = isMax ? '達當前上限' : `${U.fNum(cost)}🪙 (Lv.${state.train[k]})`;
              let curEffTxt = `加成: +${state.train[k] * obj.base}${obj.unit}`;
              html += `<button onclick="game.trainStat('${k}')" class="bg-slate-700 hover:bg-slate-600 text-white py-2 px-1 rounded-lg font-bold text-xs shadow transition-colors flex flex-col items-center ${isMax?'opacity-50 cursor-not-allowed':''}">
                <span class="text-[14px] mb-0.5">${obj.i} ${obj.n}</span><span class="text-amber-400 font-normal text-[11px]">${costTxt}</span><span class="text-[11px] text-green-300 mt-0.5">${curEffTxt}</span>
              </button>`;
            }
            html += `</div></div>`;
        }

        if (tLvl >= 3) {
            html += `<div class="bg-slate-800 p-3 rounded-lg border border-slate-600 shadow-md">
               <div class="text-xs text-slate-400 mb-2 font-bold flex justify-between items-center">
                  <span>🏛️ 轉職神殿</span><span class="text-[10px] text-emerald-400">最高10等專精加成</span>
               </div>
               <div class="grid grid-cols-2 gap-1.5">`;
            for (const [id, j] of Object.entries(DB.JOBS)) {
              if (j.t > 1 && j.t > tLvl) continue; 
              if ((id === 'hero' || id === 'demon') && !state.secretJobsUnlocked) continue;

              let isCur = state.job === id; let isUnlocked = state.unlockedJobs.includes(id);
              let jLv = state.jobLvl[id] || 1; let jName = jLv >= 10 ? `[覺醒] ${j.n}` : j.n;
              let cls = 'p-2 rounded-lg text-xs font-bold border transition-colors flex flex-col items-center justify-center gap-0.5 ';
              cls += isCur ? 'bg-indigo-900/50 border-indigo-500 text-indigo-200' : 'bg-slate-900 border-slate-700 text-slate-400 active:bg-slate-800';
              if (id === 'hero' || id === 'demon') cls += ' shadow-[0_0_8px_rgba(245,158,11,0.2)]';

              let costTxt = isUnlocked ? (isCur ? '' : `(Lv.${jLv})`) : `(${U.fNum(j.cost)}🪙解鎖)`;
              let mpTxt = j.mpc > 0 ? `<span class="text-blue-300 ml-1">耗${j.mpc}MP</span>` : '';
              let mstTxt = j.m ? `<span class="text-amber-500/80 mt-0.5 text-[10px]">專精: ${j.m.n}</span>` : '';
              html += `<button onclick="game.changeJob('${id}')" class="${cls}">
                <span class="text-2xl mb-1">${j.icon}</span><span class="${jLv>=10?'text-amber-300':''} text-sm">${jName} ${isCur ? `Lv.${jLv}` : `<span class="text-[11px] opacity-70">${costTxt}</span>`}</span><span class="text-[10px] font-normal opacity-80 text-center mt-0.5">${j.desc}${mpTxt}</span>${mstTxt}
              </button>`;
            }
            html += `</div></div>`;
        }

        if (state.goddessDefeated) {
            let msg = state.isDemonEnding ? `深淵魔王「${state.previousDemonName}」已君臨天下，世界需要新的光芒。<br/>是時候讓新冒險者誕生了。` : "你已經擊敗了災厄，拯救了世界。<br/>是時候將意志傳承下去了。";
            let btnTxt = state.isDemonEnding ? "👑 新冒險者誕生" : "👑 世代傳承 (退休)";
            html += `<div class="bg-amber-900/40 p-3 rounded-lg border border-amber-700 shadow-md text-center">
                <p class="text-xs text-amber-200 mb-2">${msg}</p>
                <button onclick="game.retirePrompt()" class="bg-gradient-to-r from-amber-600 to-yellow-600 text-white font-bold py-2 px-4 rounded-full shadow-lg active:scale-95 transition-transform text-sm w-full">${btnTxt}</button>
            </div>`;
        }
        
        cnt.innerHTML = html;
      },

      renderRelics: () => {
        let list = U.el('ui-relic-list'); if(!list) return; list.innerHTML = ''; let hasRelic = false;
        DB.RELICS.forEach(r => {
          let count = state.relics[r.id];
          if (count > 0) {
            hasRelic = true; let div = document.createElement('div'); div.className = "flex items-center justify-between bg-slate-800 border border-amber-900/50 p-3 rounded-xl";
            let currentPct = count * r.step; 
            let dynamicDesc = r.base.replace('{X}', currentPct % 1 === 0 ? currentPct : currentPct.toFixed(1));
            div.innerHTML = `<div class="flex items-center gap-3"><span class="text-3xl">${r.i}</span><div><div class="text-amber-400 font-bold text-base mb-0.5">${r.n} <span class="text-white text-xs ml-1">Lv.${count}</span></div><div class="text-[11px] text-slate-300">${dynamicDesc}</div></div></div>`;
            list.appendChild(div);
          }
        });
        if(!hasRelic) list.innerHTML = '<div class="text-center text-slate-500 text-sm mt-8">尚未獲得任何聖物。</div>';
        
        game.updateRelicButtonDisplay();
      },

      toggleAuto: (forceState = null) => {
        if (forceState === null && game.checkCD()) return;
        state.isAuto = forceState !== null ? forceState : !state.isAuto;
        let btn = U.el('btn-auto'); if(!btn) return;
        btn.innerText = state.isAuto ? '⏸️ 停止掛機' : '▶️ 自動掛機';
        
        let actCls = ['bg-amber-600', 'text-white', 'border-amber-500', 'shadow-[0_0_10px_rgba(217,119,6,0.6)]'];
        let inactCls = ['bg-slate-800', 'text-slate-300', 'border-slate-600'];
        
        if (state.isAuto) {
           btn.classList.remove(...inactCls); btn.classList.add(...actCls);
           game.log('🤖 啟動自動掛機系統', 'amber'); 
           clearInterval(state.loop); state.loop = setInterval(game.autoLogic, 800); 
        } else {
           btn.classList.remove(...actCls); btn.classList.add(...inactCls);
           game.log('🤖 停止自動掛機系統', 'slate'); 
           clearInterval(state.loop); state.loop = null; 
        }
      },

      autoLogic: () => {
        if (state.tab !== 'battle') return; 
        let mc = U.el('ui-map-choice');
        if (state.hp <= 0 || state.isWaiting || (mc && mc.style.display === 'flex')) return;
        if (state.phase === 'EXPLORE') game.exploreStep();
        else if (state.hp < state.stats.mhp * 0.4 && (state.potions > 0 || state.gold >= 15) && !(state.map.debuff === 'seal' && !state.inAbyssPrison)) game.usePotion(); 
        else game.executeTurn();
      },

      switchTab: (t) => {
        if (state.phase === 'COMBAT' && t !== 'battle') { game.log('⚠️ 戰鬥白熱化中，無法離開冒險區域！', 'red'); return; }
        state.tab = t;
        U.hide('view-battle'); U.hide('view-town'); U.hide('view-relic');
        if (t === 'battle') { U.show('view-battle', 'flex'); }
        else if (t === 'town') { U.show('view-town', 'block'); game.updateTownHeader(); game.renderTown(); }
        else if (t === 'relic') { if(state.town.lvl < 5) return; U.show('view-relic', 'flex'); game.renderRelics(); }
        game.updateUI(); 
      },

      revive: () => {
        if (game.checkCD()) return;
        state.gold = Math.floor(state.gold * 0.8); state.hp = state.stats.mhp; 
        let drop = Math.max(1, Math.floor(state.map.lvl / 100)); 
        state.map.lvl = Math.max(1, state.map.lvl - drop); 
        state.map.debuff = 'normal'; 
        
        state.inAbyssPrison = false;
        state.prisonQuest = null;
        state.goddessUltimate = false;

        calc.refreshStats();
        
        U.hide('ui-death');
        state.isWaiting = false;
        state.phase = 'EXPLORE'; state.explorePct = 0; state.enemy = null; state.kills = Math.max(0, state.kills - 5);
        game.updateUI(); game.log(`👼 退回了 ${drop} 個樓層並消除了地圖的詛咒，女神降下奇蹟將你復活。`, 'cyan');
        if(state.isAuto) game.toggleAuto(false);
      }
    };

    window.game = game;
    document.addEventListener("DOMContentLoaded", () => {
      game.init();
    });
  </script>
</body>
</html>
