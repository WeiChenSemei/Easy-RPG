<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>元素之塔：煉金覺醒</title>
    <style>
        :root { --bg: #0a0a0f; --panel: #1a1a24; --border: #333; --text: #eee; --hl: #4da8da; --danger: #e23e57; --success: #00d26a; --warn: #ff9800; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: #0d0d12; position: relative; }
        
        header { background: var(--panel); padding: 12px; text-align: center; font-weight: bold; border-bottom: 1px solid var(--border); letter-spacing: 1px; position: relative; }
        .settings-btn { position: absolute; right: 15px; top: 10px; cursor: pointer; font-size: 1.2em; transition: 0.2s; }
        .settings-btn:active { transform: rotate(45deg); }
        .log-btn { position: absolute; left: 15px; top: 10px; cursor: pointer; font-size: 1.2em; transition: 0.2s; }
        .log-btn:active { transform: scale(0.9); }
        
        #relics-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; background: #08080b; padding: 5px; font-size: 1.2em; min-height: 35px; border-bottom: 1px solid #222;}
        #inventory { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 8px 10px; background: #121218; min-height: 45px; }
        .inv-item { display: flex; align-items: center; background: rgba(255,255,255,0.08); padding: 4px 8px; border-radius: 6px; font-size: 0.9em; font-weight: bold; cursor: pointer;}
        .inv-item span { margin-left: 5px; color: var(--hl); }

        #canvas-container { position: relative; width: 100%; aspect-ratio: 16/11; background: #111; border-bottom: 2px solid var(--border); overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        #click-prompt { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 1.2em; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; pointer-events: none; display: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        #battle-log { position: absolute; bottom: 0; left: 0; width: 100%; height: 75px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: #ddd; font-size: 0.85em; padding: 5px 10px; overflow: hidden; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; }
        .log-msg { animation: fadeUp 2.5s forwards; margin-top: 2px; text-shadow: 1px 1px 2px #000; }
        @keyframes fadeUp { 0% {opacity:1; transform:translateY(5px);} 70% {opacity:1;} 100% {opacity:0; transform:translateY(-8px);} }
        
        #main-panel { flex: 1; overflow-y: auto; background: var(--panel); position: relative; padding-bottom: 20px; }
        .view { display: none; padding: 15px; height: 100%; flex-direction: column; }
        .view.active { display: flex; }
        
        .doors-container { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .door-btn { background: #222230; border: 1px solid #444; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .door-btn:active { background: #333; transform: scale(0.98); }
        .door-icon { font-size: 2.2em; margin-right: 15px; }
        .door-text h4 { color: var(--text); margin-bottom: 4px; font-size: 1.1em; }
        .door-text p { color: var(--muted); font-size: 0.85em; }
        
        .turn-box { text-align: center; margin-bottom: 12px; font-size: 1.1em; color: var(--hl); font-weight: bold; background: rgba(77, 168, 218, 0.1); padding: 8px; border-radius: 8px; }
        .sel-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .sel-slot { width: 45px; height: 45px; background: #2a2a35; border: 2px dashed #555; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.6em; }
        .sel-slot.filled { border-style: solid; border-color: var(--hl); background: #334; }
        
        .element-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; margin-bottom: auto; }
        .el-btn { background: #252530; border: 1px solid #444; border-radius: 8px; padding: 8px 0; font-size: 1.5em; text-align: center; cursor: pointer; position: relative; }
        .el-btn:active { background: #334; transform: scale(0.95); }
        .el-btn .count { position: absolute; bottom: 2px; right: 5px; font-size: 0.45em; color: #aaa; font-weight: bold; }
        .el-btn.empty { opacity: 0.2; pointer-events: none; }
        .el-btn.infinite { border-color: var(--success); background: rgba(0, 210, 106, 0.1); }
        .el-btn.infinite .count { color: var(--success); }
        
        .btn { background: var(--hl); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
        .cmd-actions { display: flex; gap: 10px; margin-top: 15px; }
        .cmd-actions button { flex: 1; padding: 12px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 10px; color: white; cursor: pointer; }
        
        .codex-section { margin-bottom: 20px; }
        .codex-title { font-size: 1.1em; color: var(--hl); margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .codex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(48%, 1fr)); gap: 8px; }
        .codex-card { background: #252530; padding: 10px; border-radius: 8px; font-size: 0.85em; border-left: 3px solid #555; }
        .codex-card.unlocked { border-left-color: var(--hl); }
        .codex-card.unlocked .c-name { color: #fff; font-weight: bold; margin-bottom: 3px; font-size: 1.05em;}
        .codex-card .c-req { font-size: 0.8em; color: var(--warn); }
        .codex-card .c-desc { font-size: 0.8em; color: var(--muted); margin-top: 3px; }
        .codex-card.secret .c-name { filter: blur(4px); color: #666; }
        
        nav { display: flex; background: #15151a; border-top: 1px solid var(--border); height: 55px; }
        nav button { flex: 1; background: transparent; color: var(--muted); border: none; font-size: 1.1em; cursor: pointer; transition: 0.2s; }
        nav button.active { color: var(--hl); font-weight: bold; background: rgba(255,255,255,0.05); }
        #save-modal { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; flex-direction:column; justify-content:center; align-items:center; padding:20px; }
    </style>
</head>
<body>

<div id="app">
    <header id="top-header"><div class="log-btn" onclick="toggleLog()">📜</div> 元素之塔 <div class="settings-btn" onclick="openSaveMenu()">⚙️</div></header>
    <div id="relics-bar"></div>
    <div id="inventory"></div>
    <div id="canvas-container">
        <canvas id="game-canvas" width="400" height="300"></canvas>
        <div id="full-log-view" style="display:none; overflow-y:auto; height:100%; padding:15px; background:#111; color:#ccc; font-size:0.95em; line-height:1.5;"></div>
        <div id="click-prompt">▶ 點擊繼續</div>
        <div id="battle-log"></div>
    </div>
    
    <div id="save-modal">
        <h2 style="color:var(--hl); margin-bottom:15px;">冒險紀錄與繼承</h2>
        <div style="display:flex; gap:20px; margin-bottom:10px;">
            <p>輪迴次數: <span id="st-runs" style="color:var(--warn); font-weight:bold;">0</span></p>
            <p>歷史最高層: <span id="st-maxf" style="color:var(--success); font-weight:bold;">1</span></p>
        </div>
        
        <input type="text" id="save-io" placeholder="在此產生或貼上繼承碼..." style="width:90%; padding:12px; margin: 10px 0; border-radius:8px; border:1px solid #444; background:#222; color:#fff; text-align:center; font-size:0.9em; font-family:monospace;">
        <div id="save-msg" style="color:var(--hl); font-size:0.95em; margin-bottom:15px; height:1em; font-weight:bold;"></div>

        <div style="display:flex; flex-direction:column; gap:12px; width:90%;">
            <button class="btn" style="background:#2a2a35; border:1px solid var(--hl); color:var(--hl);" onclick="exportSave()">匯出繼承碼 (產生並複製)</button>
            <button class="btn" style="background:#2a2a35; border:1px solid var(--success); color:var(--success);" onclick="importSave()">匯入繼承碼 (貼上後讀取)</button>
            <button class="btn" id="btn-reset" style="background:var(--danger); margin-top:10px;" onclick="confirmReset()">重置所有進度</button>
            <button class="btn" style="background:#555;" onclick="$('save-modal').style.display='none'">返回遊戲</button>
        </div>
    </div>

    <div id="main-panel">
        <div id="explore-view" class="view active">
            <h3 style="color:var(--muted); text-align:center;">選擇前進的方向</h3>
            <div id="door-container" class="doors-container"></div>
            <div id="event-result" style="display:none; text-align:center; margin-top:30px;">
                <p id="event-msg" style="font-size:1.3em; color:var(--hl); margin-bottom:15px; font-weight:bold;"></p>
                <div id="event-loot" style="display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-bottom:30px; font-size:1.5em;"></div>
                <button id="event-btn" class="btn" onclick="nextRoom()">繼續前進</button>
            </div>
        </div>
        <div id="battle-view" class="view">
            <div class="turn-box"><span id="theme-display" style="color:var(--danger); margin-right:10px;"></span>指令: <span id="current-hero-name" style="color:#fff; font-size:1.2em;"></span></div>
            <div class="sel-container"><div class="sel-slot" id="slot-0"></div><div class="sel-slot" id="slot-1"></div><div class="sel-slot" id="slot-2"></div><div class="sel-slot" id="slot-3"></div></div>
            <div class="element-grid" id="element-buttons"></div>
            <div class="cmd-actions">
                <button id="btn-undo" style="background:#555; max-width:60px; display:none;" onclick="undoAction()">🔙</button>
                <button style="background:var(--danger);" onclick="clearElements()">清除</button>
                <button style="background:var(--success);" onclick="confirmAction()">施放 / 融合</button>
            </div>
        </div>
        <div id="codex-view" class="view">
            <h2 style="text-align:center; color:#fff; margin-bottom:10px;">煉金大圖鑑</h2>
            <div style="text-align:center; color:var(--hl); margin-bottom:20px; font-weight:bold;">探索進度: <span id="completion-rate">0</span>%</div>
            <div id="codex-content" style="overflow-y: auto; flex: 1;"></div>
        </div>
    </div>
    <nav>
        <button id="nav-explore" class="active" onclick="goMainView()">🏔️ 冒險</button>
        <button id="nav-codex" onclick="switchView('codex-view'); renderCodex();">📖 圖鑑</button>
    </nav>
</div>

<script>

    { req:['L','D','E','W'], n:'✨🌑🪨💧 創世之光', action:'HEAL', val:200, action2:'SHIELD', val2:100, buff:'ATK_UP', target:'ALLIES', aoe:true },
    { req:['A','F','I','T'], n:'🌪️🔥❄️⚡ 元素終焉', dmg:250, aoe:true },

    enemies: [], codex: new Set(), battlePhase: 'NONE', execQueue: [], heroActions: [], field: null, currentHero: null, theme: null

function saveGame() { state.maxFloor = Math.max(state.maxFloor, state.floor); const s = { ...state, codex: Array.from(state.codex) }; localStorage.setItem('toe_sv2', JSON.stringify(s)); }
function loadGame() { let s = localStorage.getItem('toe_sv2'); if(s) { let p = JSON.parse(s); Object.assign(state, p); state.codex = new Set(p.codex); if(!state.relics) state.relics=[]; } }

function openSaveMenu() { 
    $('st-runs').innerText = state.deaths; $('st-maxf').innerText = state.maxFloor; 
    $('save-io').value = ''; $('save-msg').innerText = ''; 
    $('btn-reset').innerText = '重置所有進度'; $('btn-reset').style.background = 'var(--danger)';
    $('save-modal').style.display = 'flex'; 
}

function exportSave() { 
    saveGame(); let d = btoa(encodeURIComponent(localStorage.getItem('toe_sv2'))); 
    let io = $('save-io'); io.value = d; io.select();
    try { document.execCommand('copy'); $('save-msg').style.color = "var(--success)"; $('save-msg').innerText = "✅ 繼承碼已複製到剪貼簿！"; } 
    catch (err) { $('save-msg').style.color = "var(--warn)"; $('save-msg').innerText = "⚠️ 請手動複製上方繼承碼"; } 
}

function importSave() { 
    let c = $('save-io').value.trim(); 
    if(!c) { $('save-msg').style.color = "var(--warn)"; $('save-msg').innerText = "⚠️ 請貼上繼承碼！"; return; }
    try { 
        let s = decodeURIComponent(atob(c)); let p = JSON.parse(s); localStorage.setItem('toe_sv2', s); 
        $('save-msg').style.color = "var(--success)"; $('save-msg').innerText = "✅ 讀取成功！"; 
        setTimeout(() => { loadGame(); state.battlePhase = 'NONE'; $('save-modal').style.display='none'; goMainView(); genDoors(); updateTop(); }, 1000); 
    } catch(e) { $('save-msg').style.color = "var(--danger)"; $('save-msg').innerText = "❌ 無效的繼承碼！"; } 
}

function confirmReset() {
    let btn = $('btn-reset');
    if(btn.innerText === '重置所有進度') { btn.innerText = '⚠️ 再次點擊以確認重置'; btn.style.background = '#800'; $('save-msg').style.color = "var(--danger)"; $('save-msg').innerText = "警告：將刪除所有圖鑑與輪迴進度！"; } 
    else { 
        localStorage.removeItem('toe_sv2'); $('save-msg').style.color = "var(--success)"; $('save-msg').innerText = "✅ 已重置！"; 
        setTimeout(() => { 
            state = { floor: 1, room: 1, maxFloor: 1, deaths: 0, inventory: { E:8, W:8, F:8, A:8, I:8, T:8, P:3, L:3, D:3 }, relics: [], heroes: Array.from({length:4}, (_,i) => ({ id:'h'+i, i:['🧙‍♂️','🧝‍♀️','🥷','🧑‍🎤'][i], hp:100, maxHp:100, status:[], shield:0, buffs:[], atkAnim:0, hit:0 })), enemies: [], codex: new Set(), battlePhase: 'NONE', execQueue: [], heroActions: [], field: null, currentHero: null, theme: null }; 
            $('save-modal').style.display='none'; goMainView(); genDoors(); updateTop(); 
        }, 1000); 
    }
}

/** 3. 介面與探索 */
function goMainView() { switchView(state.battlePhase === 'NONE' ? 'explore-view' : 'battle-view'); }
function switchView(vid) {
    $('click-prompt').style.display = 'none'; // 防呆隱藏
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); $(vid).classList.add('active');
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    $('nav-explore').innerText = state.battlePhase === 'NONE' ? "🏔️ 冒險" : "⚔️ 戰鬥";

    if(vid === 'codex-view') $('nav-codex').classList.add('active');
}

function getAvail(k) {
    if (k === state.theme) return 999;
    let used = currSel.filter(x => x===k).length;
    return (state.inventory[k] || 0) - used;
}

function updateTop() {
    $('top-header').innerHTML = `<div class="log-btn" onclick="toggleLog()">📜</div> 元素之塔 - 第 ${state.floor} 層 (${state.room}/10) <div class="settings-btn" onclick="openSaveMenu()">⚙️</div>`;
    let rb = $('relics-bar'); rb.innerHTML = '';
    state.relics.forEach(r => { let e = document.createElement('span'); e.innerText = RELICS[r].i; e.title = RELICS[r].n; rb.appendChild(e); });
    
    let inv = $('inventory'); inv.innerHTML = '';
    for(let k in state.inventory) {
        if(state.inventory[k] > 0 && (!EL[k].req || state.codex.has('E_'+k))) {
            let item = document.createElement('div'); item.className = 'inv-item'; item.innerHTML = `${EL[k].i} <span>${state.inventory[k]}</span>`;
            item.onclick = () => logMsg(`${EL[k].i}${EL[k].n}: ${EL[k].req ? '進階元素' : '基礎元素'}`); inv.appendChild(item);
        }
    }
}

function createDoor(t, arg, icon, title, desc) {
    let btn = document.createElement('div'); btn.className = 'door-btn'; btn.innerHTML = `<div class="door-icon">${icon}</div><div class="door-text"><h4>${title}</h4><p>${desc}</p></div>`;
    btn.onclick = () => { $('door-container').style.display='none'; if(t==='EVENT') resolveEvent(arg); else startBattle(t==='BOSS', arg); };
    $('door-container').appendChild(btn);
}

function genDoors() {
    saveGame(); $('door-container').style.display = 'flex'; $('event-result').style.display = 'none'; $('event-btn').onclick = nextRoom;
    const c = $('door-container'); c.innerHTML = '';
    if(state.room === 10) return createDoor('BOSS', null, '🚪', '【首領門】', '強大的守護者擋住了階梯');
    
    let baseKeys = Object.keys(EL).filter(x=>EL[x].t==='B'); let doors = [ {t:'BATTLE', arg:null, i:'⚔️', n:'幽暗通道', d:'遭遇未知魔物'} ];
    let themeEl = baseKeys[Math.floor(Math.random()*baseKeys.length)];
    
    let totalEls = 0; baseKeys.forEach(k => totalEls += state.inventory[k] || 0); let needEls = totalEls < 40; 
    
    let evPool = []; let addEv = (w, obj) => { for(let i=0; i<w; i++) evPool.push(obj); };
    addEv(4, {t:'THEME', arg:themeEl, i:EL[themeEl].i, n:`${EL[themeEl].n}之領域`, d:`對應元素無限，遇同屬怪物`});
    addEv(needEls ? 15 : 4, {t:'EVENT', arg:'CRYSTAL', i:'🔮', n:'元素祭壇', d:'安全的採集區，獲得大量元素'});
    addEv(3, {t:'EVENT', arg:'CAMP', i:'🏕️', n:'一般營地', d:'回復全體50%生命'});
    addEv(1, {t:'EVENT', arg:'FOUNTAIN', i:'⛲', n:'神聖噴泉', d:'全體全回復與復活'});
    if(totalEls > 60) addEv(2, {t:'EVENT', arg:'STATUE', i:'⚖️', n:'平衡神像', d:'將身上的基礎元素平均分配'});
    
    doors.push(evPool[Math.floor(Math.random()*evPool.length)]);
    doors.sort(()=>Math.random()-0.5).forEach(d => createDoor(d.t, d.arg, d.i, d.n, d.d));
}

function resolveEvent(arg) {
    $('door-container').style.display = 'none'; $('event-result').style.display = 'block'; let msg = "", loot = "";
    if(arg === 'CRYSTAL') {
        for(let i=0; i<8; i++) { let k = Object.keys(EL).filter(x=>!EL[x].req)[Math.floor(Math.random()*9)]; state.inventory[k]+=2; loot+=`<span style="background:rgba(255,255,255,0.1); padding:5px; border-radius:5px;">${EL[k].i}+2</span>`; }
        msg = "吸收了大量純淨的能量！";
    } else if(arg === 'CAMP') {
        state.heroes.forEach(h => { if(h.hp>0) h.hp = Math.min(h.maxHp, h.hp + Math.floor(h.maxHp*0.5)); }); msg = "在營地休息，全體恢復 50% 生命！";
    } else if(arg === 'FOUNTAIN') {
        state.heroes.forEach(h => { h.hp = h.maxHp; h.status=[]; h.shield=0; }); msg = "飲用神聖泉水，全體生命全滿，死者復甦！";
    } else if(arg === 'STATUE') {
        let bKeys = Object.keys(EL).filter(x=>EL[x].t==='B'); let sum = 0; bKeys.forEach(k => sum += state.inventory[k]);
        let avg = Math.floor(sum / bKeys.length); bKeys.forEach(k => state.inventory[k] = avg);
        msg = "天平傾斜，萬物歸於平衡！"; loot = `<span style="color:var(--hl)">基礎元素已平均為 ${avg} 個</span>`;
    } else if(arg === 'GAMEOVER') {
        msg = "💀 隊伍全滅... 塔的輪迴已開啟"; 
        let mf = state.floor; 
        loot = `<div style="font-size:0.8em; color:#aaa; line-height:1.5;">失去所有合成元素與遺物<br>繼承先前的意志<br>最大生命上限 +${mf}<br>初始基礎元素 +1</div>`;
        $('event-btn').onclick = () => { 
            state.deaths++; state.maxFloor = Math.max(state.maxFloor, mf); state.floor = 1; state.room = 1;
            let initC = { E:8, W:8, F:8, A:8, I:8, T:8, P:3, L:3, D:3 }; state.inventory = {}; for(let k in initC) state.inventory[k] = initC[k] + state.deaths;
            state.heroes.forEach(h => { h.maxHp += mf; h.hp = h.maxHp; h.status=[]; h.shield=0; h.buffs=[]; });
            state.relics = []; state.battlePhase = 'NONE'; $('event-btn').onclick = nextRoom;
            saveGame(); genDoors(); updateTop();
        };
    }
    $('event-msg').innerHTML = msg; $('event-loot').innerHTML = loot; updateTop(); saveGame();
}

function nextRoom() {
    state.room++;
    if(state.relics.includes('R_HEAL')) state.heroes.forEach(h => { if(h.hp>0) h.hp = Math.min(h.maxHp, h.hp + Math.floor(h.maxHp*0.1)); });
    if(state.room > 10) { state.floor++; state.room = 1; state.heroes.forEach(h => { if(h.hp>0) h.hp = Math.min(h.maxHp, h.hp+30); }); }
    genDoors(); updateTop();
}

/** 4. 戰鬥系統 */
function startBattle(isBoss, themeArg = null) {
    state.battlePhase = 'EXECUTE'; state.field = null; state.execQueue = []; state.heroActions = []; state.theme = themeArg;
    state.heroes.forEach(h => { h.shield = state.relics.includes('R_E') ? 30 : 0; h.buffs = []; h.status = []; });
    if(state.relics.includes('R_E')) state.heroes.forEach(h=>spTxt(h, "🛡️磐石", '#eee'));
    
    let pool = ENEMY_DATA.filter(e => e[9] === (isBoss?1:0)); if(themeArg) pool = pool.filter(e => e[0] === themeArg); if(pool.length === 0) pool = ENEMY_DATA;
    let affixKeys = Object.keys(AFFIXES);
    
    state.enemies = []; const count = isBoss ? 1 : Math.floor(Math.random()*3)+1;
    for(let i=0; i<count; i++) {
        let t = pool[Math.floor(Math.random()*pool.length)];
        let hp = t[3] + state.floor*15;
        let afx = (isBoss || Math.random() < 0.2) ? affixKeys[Math.floor(Math.random()*affixKeys.length)] : null;
        let s = afx === 'TOUGH' ? 100 : 0; let fn = afx ? `[${AFFIXES[afx].n}] ${t[2]}` : t[2];
        state.enemies.push({ id:'e'+i, el:t[0], i:t[1], n:fn, hp:hp, maxHp:hp, status:[], shield:s, buffs:[], weak:t[4], immu:t[5], abs:t[6], insta:t[7], tr:t[8], isBoss:isBoss, revealed:false, isEnemy:true, atkAnim:0, hit:0, affix:afx });
    }
    $('theme-display').innerText = state.theme ? `[${EL[state.theme].i}領域] ` : '';
    logMsg(`⚠️ 遭遇魔物！`); switchView('battle-view'); if(particles.length === 0) loop(); planRound();
}

function planRound() {
    state.heroActions = []; let aliveHeroes = state.heroes.filter(h=>h.hp>0);
    if(aliveHeroes.length === 0) return triggerGameOver();
    state.currentHeroIdx = 0; promptHeroCmd(aliveHeroes[0]);
}

let currSel = [];
function promptHeroCmd(hero) { 
    $('click-prompt').style.display = 'none'; // 防呆
    state.battlePhase = 'COMMAND'; state.currentHero = hero; currSel = []; renderCmdUI(); 
}

function renderCmdUI() {
    updateTop(); $('current-hero-name').innerText = state.currentHero.i;
    $('btn-undo').style.display = state.currentHeroIdx > 0 ? 'block' : 'none';
    for(let i=0; i<4; i++) { let s=$('slot-'+i); s.innerText = currSel[i]?EL[currSel[i]].i:''; s.className=`sel-slot ${currSel[i]?'filled':''}`; }
    let grid = $('element-buttons'); grid.innerHTML = '';
    for(let k in state.inventory) {
        let avail = getAvail(k); let hasOwn = state.inventory[k] > 0 || k === state.theme;
        if(hasOwn && (!EL[k].req || state.codex.has('E_'+k))) {
            let btn = document.createElement('div'); btn.className = `el-btn ${k===state.theme?'infinite':(avail<=0?'empty':'')}`;
            btn.innerHTML = `${EL[k].i}<div class="count">${k===state.theme?'∞':avail}</div>`;
            btn.onclick = () => { if(state.battlePhase==='COMMAND' && currSel.length<4 && getAvail(k)>0) { currSel.push(k); renderCmdUI(); } };
            grid.appendChild(btn);
        }
    }
}

function clearElements() { if(state.battlePhase!=='COMMAND') return; currSel=[]; renderCmdUI(); }

function undoAction() {
    if(state.battlePhase !== 'COMMAND' || state.currentHeroIdx === 0) return;
    currSel = []; state.heroActions.pop(); state.currentHeroIdx--;
    promptHeroCmd(state.heroes.filter(h=>h.hp>0)[state.currentHeroIdx]);
}

function confirmAction() {
    if(state.battlePhase !== 'COMMAND') return;
    let comboStr = [...currSel].sort().join('_');
    let action = { hero: state.currentHero, elements: [...currSel], baseEl: currSel[0] || 'NONE', origCombo: comboStr };
    state.heroActions.push(action);
    
    let aliveHeroes = state.heroes.filter(h=>h.hp>0); state.currentHeroIdx++;
    if(state.currentHeroIdx < aliveHeroes.length) promptHeroCmd(aliveHeroes[state.currentHeroIdx]);
    else buildExecutionQueue();
}

function buildExecutionQueue() {
    state.execQueue = []; let actions = [...state.heroActions]; let used = new Set();
    
    for(let c of COMBOS) {
        let matched = [], req = [...c.req];
        for(let i=0; i<actions.length; i++) {
            if(used.has(i) || actions[i].elements.length > 1) continue;
            let idx = req.indexOf(actions[i].baseEl); if(idx !== -1) { matched.push(i); req.splice(idx, 1); }
        }
        if(req.length === 0) {
            let comboEls = []; matched.forEach(i => { used.add(i); comboEls.push(...actions[i].elements); });
            const mainAct = actions[matched[0]];
            state.execQueue.push({ isCombo: true, actor: mainAct.hero, skill: c, baseEl: mainAct.baseEl, spd: 999, consumeEls: comboEls });
            if(!state.codex.has('C_'+c.n)) state.codex.add('C_'+c.n);
        }
    }
    
    for(let i=0; i<actions.length; i++) {
        if(!used.has(i)) {
            let act = actions[i]; let hSpd = Math.random()*100 + (state.relics.includes('R_A')?100:0);
            state.execQueue.push({ isCombo: false, actor: act.hero, origCombo: act.origCombo, baseEl: act.baseEl, spd: hSpd, consumeEls: act.elements });
        }
    }
    
    state.enemies.filter(e=>e.hp>0).forEach(e => {
        let spd = Math.random()*100 + (e.status.includes('HASTE')?100:0) - (e.status.includes('SLOW')?50:0) + (e.affix==='QUICK'?150:0);
        state.execQueue.push({ isEnemyAtk: true, actor: e, spd: spd });
    });
    state.execQueue.sort((a,b) => b.spd - a.spd); state.battlePhase = 'EXECUTE'; nextAction();
}

function nextAction() {
    if(state.enemies.filter(e=>e.hp>0).length === 0 || state.heroes.filter(h=>h.hp>0).length === 0) return checkWinLoss();
    if(state.execQueue.length === 0) return planRound();
    let act = state.execQueue.shift(); if(act.actor.hp <= 0) return nextAction();
    if(act.actor.status.includes('STUN')) { logMsg(`💫 ${act.actor.n||act.actor.i} 暈眩中`); act.actor.status.splice(act.actor.status.indexOf('STUN'), 1); setTimeout(nextAction, 1000); return; }

    act.actor.atkAnim = 16;
    if(act.isEnemyAtk) {
        let targets = state.heroes.filter(h=>h.hp>0); let target = targets[Math.floor(Math.random()*targets.length)];
        let dmg = (10 + state.floor*2) * (act.actor.isBoss ? 2 : 1);
        logMsg(`⚔️ ${act.actor.n} 攻擊！`); applyDmg(target, dmg);
        if(act.actor.affix === 'VAMP') { act.actor.hp = Math.min(act.actor.maxHp, act.actor.hp+dmg); spTxt(act.actor, `💚吸血`, '#0f0', -20); }
        if(state.relics.includes('R_THORN')) { applyDmg(act.actor, Math.floor(dmg*0.2), '#ff9800'); spTxt(act.actor, "🌵反彈", '#ff9800', -20); }
    } else {
        if(state.relics.includes('R_ALCH') && act.consumeEls.length > 0 && Math.random() < 0.25) { logMsg("♻️ 煉金之心發動，未消耗元素！"); } 
        else { act.consumeEls.forEach(k => { if(k !== state.theme) state.inventory[k]--; }); }
        
        if(act.isCombo) {
            logMsg(`💫 奧義：${act.skill.n}`); executeSkill(act.skill, act.baseEl, act.actor);
        } else {
            let cStr = act.origCombo; let skill = SKILLS[cStr] || { n: '元素反噬', dmg: 5 }; let eKey = act.baseEl;
            if(EVO[cStr]) {
                let eKeyNew = EVO[cStr]; let isNew = !state.codex.has('E_'+eKeyNew); state.codex.add('E_'+eKeyNew); state.inventory[eKeyNew] = (state.inventory[eKeyNew]||0) + 1;
                if(isNew) logMsg(`🌟 煉金突破！解鎖新元素【${EL[eKeyNew].i}${EL[eKeyNew].n}】！`); else logMsg(`✨ 煉金合成：獲得【${EL[eKeyNew].i}${EL[eKeyNew].n}】`);
                skill = SKILLS[eKeyNew] || skill; eKey = eKeyNew;
            }
            let sKey = EVO[cStr] || cStr; if(sKey !== '' && !state.codex.has('S_'+sKey)) state.codex.add('S_'+sKey);
            logMsg(`${act.actor.i} 施放 ${skill.n}`); executeSkill(skill, eKey, act.actor);
        }
    }
    resolveEndOfTurn(act.actor); state.battlePhase = 'WAIT'; setTimeout(() => { if(state.battlePhase === 'WAIT') $('click-prompt').style.display='block'; }, 1000);
}

function executeSkill(skill, baseEl, actor) {
    let enemies = state.enemies.filter(e=>e.hp>0); let heroes = state.heroes.filter(h=>h.hp>0); let targets = [];
    let p = skill.p || baseEl;
    if(skill.target === 'ALLIES') targets = skill.aoe ? heroes : [heroes.sort((a,b)=>a.hp-b.hp)[0]];
    else if(skill.aoe || skill.target === 'ENEMIES') targets = enemies;
    else if(p === 'F') targets = [enemies.sort((a,b)=>a.hp-b.hp)[0]];
    else if(p === 'P' || p === 'W') targets = [enemies.sort((a,b)=>b.hp-a.hp)[0]];
    else if(p === 'E') targets = [enemies[0]];
    else targets = [enemies.sort(()=>Math.random()-0.5)[0]]; 
    
    let fReacted = false; let rKey = state.field + '_' + baseEl;
    if(state.field && F_REACT[rKey]) {
        let rx = F_REACT[rKey]; logMsg(rx.txt); state.field = rx.new;
        if(rx.dmg) enemies.forEach(e => applyDmg(e, rx.dmg));
        if(rx.aoe) enemies.forEach(e => applyStatus(e, rx.aoe));
        if(!state.codex.has('FR_'+rKey)) state.codex.add('FR_'+rKey);
        fReacted = true;
    }
    
    targets.forEach(t => hitTarget(t, skill, baseEl, actor));
    if(skill.chain && enemies.length > 1) { let next = enemies.find(e => !targets.includes(e)); if(next) hitTarget(next, { dmg: Math.floor(skill.dmg/2), apply: skill.apply }, baseEl, actor); }
    if(!fReacted && skill.leave) { state.field = skill.leave; logMsg(`場地化為【${FIELD[state.field].i}${FIELD[state.field].n}】`); }
}

function hitTarget(t, skill, elKey, actor) {
    if(skill.action === 'REVEAL') { t.revealed = true; return spTxt(t, "👁️看破", '#fff9c4', -20); }
    if(skill.action === 'SHIELD' || skill.action2 === 'SHIELD') { let v = skill.val2 || skill.val; t.shield += v; spTxt(t, `🛡️+${v}`, '#eee'); if(!skill.action2) return; }
    if(skill.action === 'BUFF') { if(!t.buffs.includes(skill.buff)) t.buffs.push(skill.buff); return spTxt(t, `⚔️強化`, '#ff9800'); }
    if(skill.action === 'DEBUFF') { if(!t.status.includes(skill.buff)) t.status.push(skill.buff); spTxt(t, STATUS[skill.buff].i, STATUS[skill.buff].c, -20); }
    if(skill.action === 'HEAL' || skill.heal) { let amt = skill.val || skill.heal; t.hp = Math.min(t.maxHp, t.hp + amt); spTxt(t, `💚+${amt}`, '#00d26a'); if(!skill.dmg) return; }

    if(skill.dmg) {
        let dmg = skill.dmg; let c = '#fff';
        if(actor && actor.buffs && actor.buffs.includes('ATK_UP')) { dmg = Math.floor(dmg*1.5); actor.buffs = []; spTxt(actor, "爆發!", '#ff9800', -20); }
        if(state.relics.includes('R_F') && elKey==='F') dmg = Math.floor(dmg*1.5);
        if(state.relics.includes('R_I') && elKey==='I') dmg = Math.floor(dmg*1.5);
        if(state.relics.includes('R_T') && elKey==='T') dmg = Math.floor(dmg*1.5);
        
        if(t.isEnemy) {
            if(elKey && t.insta && t.insta.includes(elKey)) { dmg = 999; c = '#f00'; logMsg(`🎯 致命弱點觸發！`); }
            else if(elKey && t.abs && t.abs.includes(elKey)) { t.hp = Math.min(t.maxHp, t.hp + dmg); return spTxt(t, `吸收+${dmg}`, '#0f0'); }
            else if(elKey && t.immu && t.immu.includes(elKey)) { return spTxt(t, `免疫`, '#888'); }
            else if(elKey && t.weak && t.weak.includes(elKey)) { dmg = Math.floor(dmg*1.5); c = '#f00'; }
            if(t.affix === 'THORN') { applyDmg(actor, Math.floor(dmg*0.2), '#ff9800'); spTxt(actor, "🌵荊棘反彈", '#ff9800', -20); }
        }
        applyDmg(t, dmg, c);
        
        if(state.relics.includes('R_W') && elKey==='W' && actor) { actor.hp = Math.min(actor.maxHp, actor.hp+15); spTxt(actor, "💧護符", '#00d26a', -20); }
    }
    
    if(skill.apply) applyStatus(t, skill.apply);
    mkPtc(t, skill.apply || elKey || 'E');
}

function applyStatus(t, s) { 
    if(t.status.includes(s)) return; let reacted = false;
    for(let i=0; i<t.status.length; i++) {
        let rKey = t.status[i] + '_' + s;
        if(REACTIONS[rKey]) {
            const rx = REACTIONS[rKey]; reacted = true; spTxt(t, rx.txt, '#ffeb3b', -25);
            if(!state.codex.has('R_'+rKey)) state.codex.add('R_'+rKey);
            if(rx.dmg) applyDmg(t, rx.dmg, '#ff9800');
            if(rx.clear) { t.status.splice(i, 1); i--; }
            if(rx.apply) applyStatus(t, rx.apply); 
            if(rx.isAoe) state.enemies.filter(e=>e!==t && e.hp>0).forEach(e => applyDmg(e, Math.floor(rx.dmg/2), '#ff9800'));
            break;
        }
    }
    if(!reacted) { t.status.push(s); spTxt(t, STATUS[s].i, STATUS[s].c, 20); }
}

function applyDmg(t, v, c='#fff') {
    if(t.shield > 0) { if(t.shield >= v) { t.shield -= v; return spTxt(t, "🛡️抵消", '#aaa'); } else { v -= t.shield; t.shield = 0; } }
    t.hp -= v; spTxt(t, `-${v}`, c); t.hit = 25; 
}

function resolveEndOfTurn(ent) {
    if(ent.hp<=0) return;
    if(ent.status.includes('BURN')) { applyDmg(ent, 5, '#f52'); spTxt(ent, '🔥', '#f52', 15); }
    if(ent.status.includes('POISON')) { applyDmg(ent, 8, '#92b'); spTxt(ent, '☠️', '#92b', 15); }
    if(state.field === 'F') applyDmg(ent, 3, '#f52');
    if(state.field === 'P') applyStatus(ent, 'POISON');
    if(ent.isEnemy && ent.affix === 'REGEN') { ent.hp = Math.min(ent.maxHp, ent.hp+15); spTxt(ent, "💚再生", '#0f0'); }
}

// 全域綁定推進
$('app').addEventListener('click', (e) => { 
    if(state.battlePhase === 'WAIT') { 
        state.battlePhase = 'PROCESSING'; 
        $('click-prompt').style.display='none'; 
        nextAction(); 
    } 
});

function checkWinLoss() {
    $('click-prompt').style.display='none';
    if(state.heroes.filter(h=>h.hp>0).length === 0) { triggerGameOver(); } 
    else if (state.enemies.filter(e=>e.hp>0).length === 0) {
        let dc = {}; let lm = [];
        state.enemies.forEach(e => { dc[e.el] = (dc[e.el]||0) + (e.isBoss?12:5); });
        if(state.theme) dc[state.theme] = (dc[state.theme]||0) + 6;
        if(state.relics.includes('R_LUCK')) { for(let i=0; i<4; i++) { let k = Object.keys(EL).filter(x=>EL[x].t==='B')[Math.floor(Math.random()*9)]; dc[k] = (dc[k]||0)+2; } }
        
        for(let k in dc) { state.inventory[k] += dc[k]; lm.push(`${EL[k].i}+${dc[k]}`); }
        
        if(state.enemies.some(e=>e.isBoss) && state.relics.length < 5) {
            let dropChance = 1 - (state.relics.length * 0.15); 
            if(Math.random() < dropChance) {
                let avail = Object.keys(RELICS).filter(k => !state.relics.includes(k));
                if(avail.length > 0) { let r = avail[Math.floor(Math.random()*avail.length)]; state.relics.push(r); state.codex.add('RELIC_'+r); lm.push(`🎁遺物【${RELICS[r].n}】`); }
            }
        }
        
        logMsg(`🏆 勝利！獲得戰利品: ${lm.join(' ')}`);
        state.battlePhase = 'VICTORY'; setTimeout(() => { state.battlePhase = 'NONE'; goMainView(); nextRoom(); }, 2000);
    }
}

function triggerGameOver() {
    $('click-prompt').style.display='none'; state.battlePhase = 'GAMEOVER';
    setTimeout(() => { state.battlePhase = 'NONE'; goMainView(); resolveEvent('GAMEOVER'); }, 1500);
}

/** 5. 視覺渲染 */
function drawEnt(e, x, y) {
    if(e.hp<=0) return;
    ctx.font = e.isBoss ? "40px Arial" : "26px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
    let dx = 0; if(e.atkAnim > 0) { dx = (e.isEnemy ? -1 : 1) * Math.sin(e.atkAnim * Math.PI / 16) * 12; e.atkAnim--; } if(e.hit > 0) { dx += (Math.random()-0.5)*8; e.hit--; } 
    if(e.hit > 0 && e.hit % 8 < 4) { ctx.fillStyle = 'rgba(255,0,0,0.6)'; ctx.fillText(e.i, x+dx, y); } else { ctx.fillText(e.i, x+dx, y); }
    
    let p = Math.max(0, e.hp/e.maxHp);
    ctx.fillStyle="#222"; ctx.fillRect(x-15+dx, y+22, 30, 4); ctx.fillStyle = p>0.5 ? "#4caf50" : p>0.2 ? "#ff9800" : "#f44336"; ctx.fillRect(x-15+dx, y+22, 30*p, 4);
    if(e.shield > 0) { ctx.fillStyle="#eee"; ctx.fillRect(x-15+dx, y+27, 30*Math.min(1,e.shield/e.maxHp), 2); }
    
    if(e.status.length) { ctx.font="12px Arial"; let sx = x-(e.status.length*7)+7; e.status.forEach((s,i) => { if(STATUS[s]) ctx.fillText(STATUS[s].i, sx+(i*14)+dx, y-26); }); }
    if(e.buffs && e.buffs.includes('ATK_UP')) { ctx.font="14px Arial"; ctx.fillText('⚔️', x-20+dx, y+10); }
    
    if(e.isEnemy && e.revealed) {
        ctx.font="10px Arial"; let info = [];
        if(e.weak) info.push(`🎯${e.weak.split(',').map(k=>EL[k]?EL[k].i:'').join('')}`);
        if(e.immu) info.push(`🛡️${e.immu.split(',').map(k=>EL[k]?EL[k].i:'').join('')}`);
        if(e.abs) info.push(`💚${e.abs.split(',').map(k=>EL[k]?EL[k].i:'').join('')}`);
        ctx.fillText(info.join(' '), x+dx, y-40);
    }
    
    if(!e.isEnemy && state.battlePhase === 'COMMAND') {
        let els = state.currentHero === e ? currSel : (state.heroActions.find(a=>a.hero===e)?.elements || []);
        if(els.length > 0) { ctx.font = "14px Segoe UI"; ctx.textAlign="left"; ctx.fillText(els.map(k=>EL[k].i).join(''), x+dx + 25, y); ctx.textAlign="center"; }
    }
    e.x=x+dx; e.y=y;
}

function spTxt(e, t, c, oy=0) { floatTexts.push({x:e.x+(Math.random()*20-10), y:e.y-10+oy, t:t, c:c, l:70}); }
function mkPtc(e, type) { let c = (EL[type] && STATUS[EL[type].n]) ? STATUS[EL[type].n].c : '#fff'; for(let i=0; i<12; i++) particles.push({x:e.x, y:e.y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, l:20+Math.random()*15, c:c}); }

function render() {
    ctx.clearRect(0,0,canvas.width,canvas.height); if(state.battlePhase==='NONE') return;
    if(state.field) { ctx.globalAlpha=0.1; ctx.font="200px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(FIELD[state.field].i, 200, 150); ctx.globalAlpha=1.0; ctx.font="14px Arial"; ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.fillText(`[環境] ${FIELD[state.field].n} : ${FIELD[state.field].fx}`, 200, 20); }
    state.heroes.forEach((h,i) => { drawEnt(h, 60, 45+i*60); if(state.battlePhase==='COMMAND' && h===state.currentHero) { ctx.fillStyle="rgba(77,168,218,0.2)"; ctx.beginPath(); ctx.arc(60,45+i*60,25,0,Math.PI*2); ctx.fill(); }});
    state.enemies.forEach((e,i) => drawEnt(e, e.isBoss ? 300 : 260+(i%2)*65, e.isBoss ? 130 : 50+Math.floor(i/2)*70));
    for(let i=particles.length-1; i>=0; i--) { let p=particles[i]; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2); ctx.fill(); p.x+=p.vx; p.y+=p.vy; p.l--; if(p.l<=0) particles.splice(i,1); }
    
    for(let i=floatTexts.length-1; i>=0; i--) { 
        let t=floatTexts[i]; 
        ctx.globalAlpha = Math.min(1, t.l/20);
        ctx.fillStyle=t.c; ctx.font="bold 16px Arial"; ctx.strokeStyle="#000"; ctx.lineWidth=3; 
        ctx.strokeText(t.t,t.x,t.y); ctx.fillText(t.t,t.x,t.y); 
        ctx.globalAlpha = 1.0;
        t.y-=0.3; t.l--; 
        if(t.l<=0) floatTexts.splice(i,1); 
    }
}
function loop() { render(); requestAnimationFrame(loop); }

/** 6. 圖鑑與日誌 */
let showLogView = false;
function toggleLog() {
    showLogView = !showLogView;
    $('full-log-view').style.display = showLogView ? 'block' : 'none'; $('game-canvas').style.display = showLogView ? 'none' : 'block'; $('battle-log').style.display = showLogView ? 'none' : 'flex';
    if(showLogView) $('full-log-view').scrollTop = $('full-log-view').scrollHeight;
}
function logMsg(m) { 
    let div = $('battle-log'); let el = document.createElement('div'); el.className='log-msg'; el.innerText=m; div.appendChild(el); if(div.children.length>4) div.firstChild.remove(); 
    let flv = $('full-log-view'); let fel = document.createElement('div'); fel.innerText = m; fel.style.marginBottom = '6px'; fel.style.borderBottom = '1px solid rgba(255,255,255,0.05)'; fel.style.paddingBottom = '4px'; flv.appendChild(fel);
    if(flv.children.length > 100) flv.firstChild.remove(); flv.scrollTop = flv.scrollHeight;
}
function renderCodex() {
    let tot = Object.keys(EL).length + Object.keys(SKILLS).length + Object.keys(REACTIONS).length + Object.keys(F_REACT).length + COMBOS.length + Object.keys(RELICS).length; 
    let uCount = 0; let h = '';
    h += '<div class="codex-section"><div class="codex-title">💎 煉金元素</div><div class="codex-grid">'; for(let k in EL) { let u = !EL[k].req || state.codex.has('E_'+k); if(u) uCount++; h += `<div class="codex-card ${u?'unlocked':'secret'}"><div class="c-name">${u?EL[k].i+EL[k].n:'？？？'}</div><div class="c-req">${u?(EL[k].req?EL[k].req.split('_').map(x=>EL[x].i).join('+'):'基礎'):'未知'}</div></div>`; }
    h += '</div></div><div class="codex-section"><div class="codex-title">📜 魔法與多人奧義</div><div class="codex-grid">'; for(let k in SKILLS) { let u = state.codex.has('S_'+k); if(u) uCount++; h += `<div class="codex-card ${u?'unlocked':'secret'}"><div class="c-name">${u?SKILLS[k].n:'？？？'}</div><div class="c-req">${k.split('_').map(x=>EL[x]?EL[x].i:'').join('+')}</div></div>`; }
    COMBOS.forEach(c => { let u = state.codex.has('C_'+c.n); if(u) uCount++; h += `<div class="codex-card ${u?'unlocked':'secret'}"><div class="c-name">${u?c.n:'？？？'}</div><div class="c-req">${c.req.map(x=>EL[x].i).join('+')} (多人)</div></div>`; });
    h += '</div></div><div class="codex-section"><div class="codex-title">🧪 狀態與環境反應</div><div class="codex-grid">'; for(let k in REACTIONS) { let u = state.codex.has('R_'+k); if(u) uCount++; h += `<div class="codex-card ${u?'unlocked':'secret'}"><div class="c-name">${u?REACTIONS[k].n:'？？？'}</div><div class="c-desc">${u?REACTIONS[k].txt:'未知'}</div></div>`; }
    for(let k in F_REACT) { let u = state.codex.has('FR_'+k); if(u) uCount++; h += `<div class="codex-card ${u?'unlocked':'secret'}"><div class="c-name">${u?'環境變異':'？？？'}</div><div class="c-desc">${u?F_REACT[k].txt:'未知'}</div></div>`; }
    h += '</div></div><div class="codex-section"><div class="codex-title">🎁 神秘遺物</div><div class="codex-grid">'; for(let k in RELICS) { let u = state.codex.has('RELIC_'+k); if(u) uCount++; h += `<div class="codex-card ${u?'unlocked':'secret'}"><div class="c-name">${u?RELICS[k].i+' '+RELICS[k].n:'？？？'}</div><div class="c-desc">${u?RELICS[k].d:'未知'}</div></div>`; }
    $('codex-content').innerHTML = h + '</div></div>'; $('completion-rate').innerText = Math.floor((uCount/tot)*100);
}

loadGame(); if(state.battlePhase !== 'NONE') { state.battlePhase = 'NONE'; genDoors(); } else { genDoors(); } updateTop();
</script>
