<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>元素之塔</title>
    <style>
        :root { --bg: #0a0a0f; --panel: #1a1a24; --border: #333; --text: #eee; --hl: #4da8da; --danger: #e23e57; --success: #00d26a; --warn: #ff9800; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: #0d0d12; position: relative; }
        
        header { background: var(--panel); padding: 12px; text-align: center; font-weight: bold; border-bottom: 1px solid var(--border); letter-spacing: 1px; position: relative; }
        .settings-btn, .log-btn { position: absolute; top: 10px; cursor: pointer; font-size: 1.2em; transition: 0.2s; }
        .settings-btn { right: 15px; } .settings-btn:active { transform: rotate(45deg); }
        .log-btn { left: 15px; } .log-btn:active { transform: scale(0.9); }
        
        #relics-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; background: #08080b; padding: 5px; font-size: 1.2em; min-height: 35px; border-bottom: 1px solid #222;}
        
        #inventory { display: flex; flex-wrap: nowrap; justify-content: center; gap: 4px; padding: 6px; background: #121218; min-height: 40px; overflow-x: auto; scrollbar-width: none; }
        #inventory::-webkit-scrollbar { display: none; }
        .inv-item { display: flex; align-items: center; background: rgba(255,255,255,0.08); padding: 4px 6px; border-radius: 6px; font-size: 0.85em; font-weight: bold; cursor: pointer; white-space: nowrap; flex-shrink: 0;}
        .inv-item span { margin-left: 3px; color: var(--hl); font-size: 0.95em; }

        #canvas-container { position: relative; width: 100%; aspect-ratio: 16/11; background: #111; border-bottom: 2px solid var(--border); overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
        #click-prompt { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 1.2em; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; pointer-events: none; display: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        #battle-log { position: absolute; bottom: 0; left: 0; width: 100%; height: 110px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: #ddd; font-size: 0.85em; padding: 5px 10px; overflow: hidden; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; }
        .log-msg { animation: fadeUp 3.5s forwards; margin-top: 2px; text-shadow: 1px 1px 2px #000; }
        @keyframes fadeUp { 0% {opacity:1; transform:translateY(5px);} 75% {opacity:1;} 100% {opacity:0; transform:translateY(-10px);} }
        
        #main-panel { flex: 1; overflow-y: auto; background: var(--panel); position: relative; padding-bottom: 20px; }
        .view { display: none; padding: 15px; height: 100%; flex-direction: column; }
        .view.active { display: flex; }
        
        .doors-container { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .door-btn { background: #222230; border: 1px solid #444; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .door-btn:active { background: #333; transform: scale(0.98); }
        .door-icon { font-size: 2.2em; margin-right: 15px; }
        .door-text h4 { color: var(--text); margin-bottom: 4px; font-size: 1.1em; }
        .door-text p { color: var(--muted); font-size: 0.85em; }
        
        #res-ovl-display { text-align: center; font-weight: bold; height: 20px; font-size: 0.95em; margin-bottom: 5px; }

        .turn-box { text-align: center; margin-bottom: 12px; font-size: 1.1em; color: var(--hl); font-weight: bold; background: rgba(77, 168, 218, 0.1); padding: 8px; border-radius: 8px; }
        .sel-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .sel-slot { width: 45px; height: 45px; background: #2a2a35; border: 2px dashed #555; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.6em; transition: 0.2s; }
        .sel-slot:active { transform: scale(0.9); }
        .sel-slot.filled { border-style: solid; border-color: var(--hl); background: #334; }
        
        .element-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; margin-bottom: auto; }
        .el-btn { background: #252530; border: 1px solid #444; border-radius: 8px; padding: 8px 0; font-size: 1.5em; text-align: center; cursor: pointer; position: relative; }
        .el-btn:active { background: #334; transform: scale(0.95); }
        .el-btn .count { position: absolute; bottom: 2px; right: 5px; font-size: 0.45em; color: #aaa; font-weight: bold; }
        .el-btn.empty { opacity: 0.2; pointer-events: none; }
        .el-btn.infinite { border-color: var(--success); background: rgba(0, 210, 106, 0.1); }
        .el-btn.infinite .count { color: var(--success); }
        
        .btn { background: var(--hl); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
        .cmd-actions { display: flex; gap: 10px; margin-top: 15px; }
        .cmd-actions button { flex: 1; padding: 12px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 10px; color: white; cursor: pointer; }
        
        .codex-section { margin-bottom: 20px; }
        .codex-title { font-size: 1.1em; color: var(--hl); margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .codex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(48%, 1fr)); gap: 8px; }
        .codex-card { background: #252530; padding: 10px; border-radius: 8px; font-size: 0.85em; border-left: 3px solid #555; }
        .codex-card.unlocked { border-left-color: var(--hl); }
        .codex-card.unlocked .c-name { color: #fff; font-weight: bold; margin-bottom: 3px; font-size: 1.05em;}
        .codex-card .c-req { font-size: 0.8em; color: var(--warn); }
        .codex-card .c-desc { font-size: 0.8em; color: var(--muted); margin-top: 3px; }
        .codex-card.secret .c-name { filter: blur(4px); color: #666; }
        
        nav { display: flex; background: #15151a; border-top: 1px solid var(--border); height: 55px; }
        nav button { flex: 1; background: transparent; color: var(--muted); border: none; font-size: 1.1em; cursor: pointer; transition: 0.2s; }
        nav button.active { color: var(--hl); font-weight: bold; background: rgba(255,255,255,0.05); }
        .modal { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; flex-direction:column; justify-content:center; align-items:center; padding:20px; }
    </style>
</head>
<body>

<div id="app">
    <header id="top-header"><div class="log-btn" onclick="toggleLog()">📜</div> 元素之塔 <div class="settings-btn" onclick="openSaveMenu()">⚙️</div></header>
    <div id="relics-bar"></div>
    <div id="inventory"></div>
    <div id="canvas-container">
        <canvas id="game-canvas" width="400" height="300"></canvas>
        <div id="full-log-view" style="display:none; overflow-y:auto; height:100%; padding:15px; background:#111; color:#ccc; font-size:0.95em; line-height:1.5;"></div>
        <div id="click-prompt">▶ 點擊繼續</div>
        <div id="battle-log"></div>
    </div>
    
    <div id="save-modal" class="modal">
        <h2 style="color:var(--hl); margin-bottom:15px;">冒險紀錄與設定</h2>
        <div style="display:flex; gap:20px; margin-bottom:10px;">
            <p>輪迴次數: <span id="st-runs" style="color:var(--warn); font-weight:bold;">0</span></p>
            <p>最高層: <span id="st-maxf" style="color:var(--success); font-weight:bold;">1</span></p>
            <p>輪迴(通關): <span id="st-ngp" style="color:var(--hl); font-weight:bold;">0</span></p>
        </div>
        <input type="text" id="save-io" placeholder="在此產生或貼上繼承碼..." style="width:90%; padding:12px; margin: 10px 0; border-radius:8px; border:1px solid #444; background:#222; color:#fff; text-align:center; font-size:0.9em; font-family:monospace;">
        <div id="save-msg" style="color:var(--hl); font-size:0.95em; margin-bottom:15px; height:1em; font-weight:bold;"></div>
        <div style="display:flex; flex-direction:column; gap:12px; width:90%;">
            <button class="btn" style="background:#2a2a35; border:1px solid var(--hl); color:var(--hl);" onclick="exportSave()">匯出繼承碼</button>
            <button class="btn" style="background:#2a2a35; border:1px solid var(--success); color:var(--success);" onclick="importSave()">匯入繼承碼</button>
            <button class="btn" id="btn-reset" style="background:var(--danger); margin-top:10px;" onclick="confirmReset()">重置所有進度</button>
            <button class="btn" style="background:#555;" onclick="$('save-modal').style.display='none'">返回遊戲</button>
        </div>
    </div>

    <!-- 記憶碎片彈出視窗 -->
    <div id="lore-modal" class="modal" style="z-index:200;">
        <h2 style="color:var(--hl); margin-bottom:30px; font-weight:bold; letter-spacing:2px;">📜 記憶碎片</h2>
        <div id="lore-text" style="font-size:1.1em; color:#ddd; line-height:1.8; text-align:center; padding:20px; background:rgba(0,0,0,0.6); border-radius:10px; border-left:3px solid var(--hl); width:90%; margin-bottom:30px;"></div>
        <div id="lore-prompt" style="color:#aaa; font-size:1.1em; animation:pulse 1.5s infinite; display:none; margin-bottom:20px; cursor:pointer;">▶ 點擊畫面喚醒記憶</div>
        <button id="lore-btn" class="btn" style="width:80%; background:#444; display:none;" onclick="closeLore(event)">收下記憶並繼續</button>
    </div>

    <div id="info-modal" class="modal" style="z-index:150;">
        <div style="background:#1a1a24; border:2px solid var(--hl); border-radius:10px; padding:20px; width:90%; color:#eee;">
            <h2 id="info-name" style="color:var(--hl); margin-bottom:10px; text-align:center;"></h2>
            <div id="info-details" style="font-size:0.95em; line-height:1.6; margin-bottom:15px;"></div>
            <button class="btn" style="width:100%; background:#555;" onclick="$('info-modal').style.display='none'">關閉情報</button>
        </div>
    </div>

    <div id="main-panel">
        <div id="explore-view" class="view active">
            <h3 style="color:var(--muted); text-align:center;">選擇前進的方向</h3>
            <div id="door-container" class="doors-container"></div>
            <div id="event-result" style="display:none; text-align:center; margin-top:30px;">
                <p id="event-msg" style="font-size:1.3em; color:var(--hl); margin-bottom:15px; font-weight:bold;"></p>
                <div id="event-loot" style="display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-bottom:30px; font-size:1.5em;"></div>
                <button id="event-btn" class="btn" onclick="nextRoom()">繼續前進</button>
            </div>
        </div>
        <div id="battle-view" class="view">
            <div id="res-ovl-display"></div>
            <div class="turn-box"><span id="theme-display" style="color:var(--danger); margin-right:10px;"></span>指令: <span id="current-hero-name" style="color:#fff; font-size:1.2em;"></span></div>
            <div class="sel-container" id="sel-container"></div>
            <div class="element-grid" id="element-buttons"></div>
            <div class="cmd-actions">
                <button id="btn-undo" style="background:#555; max-width:60px; display:none;" onclick="undoAction()">🔙</button>
                <button style="background:#555;" onclick="defendAction()">防禦</button>
                <button style="background:var(--success);" onclick="confirmAction()">施放 / 融合</button>
            </div>
        </div>
        <div id="codex-view" class="view">
            <h2 style="text-align:center; color:#fff; margin-bottom:10px;">煉金法典</h2>
            <div style="text-align:center; color:var(--hl); margin-bottom:20px; font-weight:bold;">探索進度: <span id="completion-rate">0</span>%</div>
            <div id="codex-content" style="overflow-y: auto; flex: 1; margin-bottom:20px;"></div>
        </div>
        <div id="lore-view" class="view"></div>
    </div>
    <nav>
        <button id="nav-explore" class="active" onclick="goMainView()">🏔️ 冒險</button>
        <button id="nav-codex" onclick="switchView('codex-view'); renderCodex();">📖 法典</button>
        <button id="nav-lore" onclick="switchView('lore-view'); renderLore();">💭 回憶</button>
    </nav>
</div>

<script>
/** 1. 核心資料映射 & 記憶碎片文本 */
const LORE_TXT = [
"當你醒來時，發現身處在不知名的古塔裡。",
"🧙‍♂️ 牆上的焦痕是新的，看來那個精靈遊俠剛經過這裡。","🧝‍♀️ 箭矢結著冰霜，前面的盜賊刻意避開了魔物的要害，為什麼？","🥷 腳印在這裡中斷。那個帶著樂器的傢伙走得比我還快。","🧑‍🎤 塔裡的風帶著奇怪的旋律，像是某種古老的煉金配方。",
"🧙‍♂️ 地上的魔法陣畫錯了，這絕對不是我教給她的基礎公式。","🧝‍♀️ 石像鬼的殘骸有雷擊的焦痕，但我明明只聽見了風聲。","🥷 每次戰鬥後，塔似乎都在貪婪地吸收我們溢出的元素能量。","🧑‍🎤 發現一頁撕裂的日記：「我們四個必須有人抵達頂層。」",
"🧙‍♂️ 遺落的護符殘留著強大魔力，這絕不是普通探險者能擁有的。","🧝‍♀️ 這座塔的構造不像是為了防禦，更像是在把什麼東西關在裡面。","🥷 黑暗中，我總感覺有另一雙眼睛在注視著我們。","🧑‍🎤 繼續往上走吧，答案一定在塔頂。我們約好了在那碰面。",
"🧙‍♂️ 為什麼我腦海中會浮現遊俠拉弓時的畫面？","🧝‍♀️ 元素共鳴時，我似乎聽見了同伴的聲音，但周圍空無一人。","🥷 元素失控的破壞力太驚人了，看著災難降臨，我竟覺得痛快。","🧑‍🎤 撿到了法師的筆記，奇怪的是，筆跡跟我一模一樣。",
"🧙‍♂️ 元素生命體誕生了。牠看著我的眼神，像是在看一位老朋友。","🧝‍♀️ 我明明從未學過光闇法則，身體卻自然施展了出來。","🥷 這些怪物的弱點，就好像是我親自替牠們設計的一樣。","🧑‍🎤 我在牆上留下暗號，卻發現牆上早有一個完全相同的刻痕。",
"🧙‍♂️ 圖書館的書都是空白的，只有一頁寫著：「你們終將匯聚。」","🧝‍♀️ 水窪裡倒映出的臉，有時候看起來不像是我的。","🥷 我找不到其他人的屍體，也找不到他們活著的痕跡。","🧑‍🎤 音符變得狂躁。這座塔是一個巨大的煉金陣，而我們全在陣中。",
"🧙‍♂️ 每次合成出高階魔法，我的靈魂就彷彿變得更完整一些。","🧝‍♀️ 塔頂傳來的心跳聲，頻率跟我現在的心跳完全吻合。","🥷 我們真的是為了尋寶而來嗎？還是為了…贖罪？","🧑‍🎤 歌謠的最後一句是：「當四位一體時，門才會開啟。」",
"🧙‍♂️ 為什麼施展火球時，我聽見的是樂師的旋律？","🧝‍♀️ 我記得法師討厭雷元素，但我現在卻覺得它無比親切。","🥷 剛剛我用匕首割開了怪物，但我手裡拿著的明明是法杖。","🧑‍🎤 四個聲音在腦海中吵架，但我不敢告訴其他人。","🧙‍♂️ 我看見遊俠站在前方，但她一轉頭，臉孔卻融化成了黑影。","🧝‍♀️ 已經沒有別人了，對吧？",
"🔮 四重元素的聚合，「元素終焉」。這是曾經毀滅過一個時代的禁忌。","🔮 我終於想起來了。沒有其他人，那四個影子都是我。","🔮 那是我為了承受龐大元素之力，而主動撕裂的自我意識。","🔮 這座名為「元素之塔」的建築，是我親手建立的避難所與監獄。","🔮 當初為了追求煉金術的極致，我引發了吞噬世界的元素災難。",
"🔮 為了拯救殘存的世界，我將自己連同災厄封印在這座塔裡。","🔮 但我低估了元素侵蝕靈魂的速度。我深知自己即將徹底瘋狂。","🔮 那些怪物，是我用來削弱頂層「瘋狂本體」的防禦機制。","🔮 但現在，四塊靈魂碎片已經集齊，這個無期徒刑的迴圈出現了裂痕。","🔮 走到塔頂，面對的將不再是重置，而是被元素徹底吞噬的瘋狂。",
"⚔️ [戰前] 鏡子對面是四個被遺忘的「我」，眼神空洞卻充滿狂暴魔力。","💀 [輪迴] 意識逐漸模糊…塔的意志將我重組，下一次，必須準備得更充分。","🌟 [結局] 對手倒下了，化作最純粹的元素消散。塔的封印解除了。","🌟 [結局] 塔內的巨量元素快速從共鳴走向失控，一場毀滅世界的大災變再度降臨","🌟 [結局] 為了不讓災難重演。我使盡全力引導能量，重新倒轉時間，迎接更殘酷的輪迴。"
];

const EL = {
    E: { i:'🪨', n:'地', t:'B', c:'#8b5a2b' }, W: { i:'💧', n:'水', t:'B', c:'#03a9f4' }, F: { i:'🔥', n:'火', t:'B', c:'#ff5722' }, A: { i:'🌪️', n:'風', t:'B', c:'#ccc' }, I: { i:'❄️', n:'冰', t:'B', c:'#81d4fa' }, T: { i:'⚡', n:'雷', t:'B', c:'#ffeb3b' }, P: { i:'☠️', n:'毒', t:'B', c:'#9c27b0' }, L: { i:'✨', n:'光', t:'B', c:'#fff9c4' }, D: { i:'🌑', n:'闇', t:'B', c:'#444' },
    M: { i:'🌋', n:'熔岩', t:'A', req:'F_F' }, C: { i:'🌩️', n:'雷暴', t:'A', req:'T_T' }, G: { i:'🧊', n:'堅冰', t:'A', req:'I_W' }, S: { i:'☁️', n:'蒸氣', t:'A', req:'F_W' }, O: { i:'🟤', n:'泥沼', t:'A', req:'E_W' }, X: { i:'💥', n:'爆裂', t:'A', req:'F_P' }, H: { i:'🕊️', n:'聖物', t:'A', req:'L_L' }, V: { i:'🌌', n:'虛空', t:'A', req:'D_D' }, Z: { i:'☯️', n:'混沌', t:'A', req:'D_L' }
};
const EVO = {}; for(let k in EL) if(EL[k].req) EVO[EL[k].req] = k;

}

function getAvail(k) {
    if (k === state.theme) return 999;
    let used = currSel.filter(x => x===k).length;
    state.heroActions.forEach(a => used += a.elements.filter(x => x===k).length);
    return (state.inventory[k] || 0) - used;

function createDoor(t, arg, icon, title, desc) {
    let btn = document.createElement('div'); btn.className = 'door-btn'; btn.innerHTML = `<div class="door-icon">${icon}</div><div class="door-text"><h4>${title}</h4><p>${desc}</p></div>`;
    btn.onclick = async () => { $('door-container').style.display='none'; if(t==='EVENT') await resolveEvent(arg); else startBattle(t==='BOSS' || t==='FINAL_BOSS', arg, t==='FINAL_BOSS'); };
    $('door-container').appendChild(btn);
}

function genDoors() {
    saveGame(); $('door-container').style.display = 'flex'; $('event-result').style.display = 'none'; $('event-btn').onclick = nextRoom;
    const c = $('door-container'); c.innerHTML = '';
    if(state.room === 10) {
        if(state.floor >= 5 && state.lore >= 45) return createDoor('FINAL_BOSS', null, '👁️', '【真理之門】', '輪迴的盡頭');
        return createDoor('BOSS', null, '🚪', '【首領門】', '強大的守護者擋住了階梯');
    }
    
    let baseKeys = Object.keys(EL).filter(x=>EL[x].t==='B'); let doors = [ {t:'BATTLE', arg:null, i:'⚔️', n:'幽暗通道', d:'遭遇未知魔物'} ];
    let themeEl = baseKeys[Math.floor(Math.random()*baseKeys.length)];
    let totalEls = 0; baseKeys.forEach(k => totalEls += state.inventory[k] || 0); let needEls = totalEls < 40; 
    
    let evPool = []; let addEv = (w, obj) => { for(let i=0; i<w; i++) evPool.push(obj); };
    addEv(4, {t:'THEME', arg:themeEl, i:EL[themeEl].i, n:`${EL[themeEl].n}之領域`, d:`對應元素無限，遇同屬怪物`});
    addEv(needEls ? 15 : 4, {t:'EVENT', arg:'CRYSTAL', i:'🔮', n:'元素祭壇', d:'安全的採集區，獲得大量元素'});
    addEv(3, {t:'EVENT', arg:'CAMP', i:'🏕️', n:'一般營地', d:'回復全體50%生命'});
    addEv(1, {t:'EVENT', arg:'FOUNTAIN', i:'⛲', n:'神聖噴泉', d:'全體全回復與復活'});
    if(totalEls > 60) addEv(2, {t:'EVENT', arg:'STATUE', i:'⚖️', n:'平衡神像', d:'將身上的基礎元素平均分配'});
    
    doors.push(evPool[Math.floor(Math.random()*evPool.length)]);
    doors.sort(()=>Math.random()-0.5).forEach(d => createDoor(d.t, d.arg, d.i, d.n, d.d));
}

async function resolveEvent(arg) {
    $('door-container').style.display = 'none'; $('event-result').style.display = 'block'; let msg = "", loot = "";
    if(arg === 'CRYSTAL') {
        for(let i=0; i<8; i++) { let k = Object.keys(EL).filter(x=>!EL[x].req)[Math.floor(Math.random()*9)]; state.inventory[k] = Math.min(99, (state.inventory[k]||0)+2); loot+=`<span style="background:rgba(255,255,255,0.1); padding:5px; border-radius:5px;">${EL[k].i}+2</span>`; }
        msg = "吸收了大量純淨的能量！";
    } else if(arg === 'CAMP') {
        state.heroes.forEach(h => { if(h.hp>0) h.hp = Math.min(h.maxHp, h.hp + Math.floor(h.maxHp*0.5)); }); msg = "在營地休息，全體恢復 50% 生命！";
    } else if(arg === 'FOUNTAIN') {
        state.heroes.forEach(h => { h.hp = h.maxHp; h.status=[]; h.shield=0; }); msg = "飲用神聖泉水，全體生命全滿，死者復甦！";
    } else if(arg === 'STATUE') {
        let bKeys = Object.keys(EL).filter(x=>EL[x].t==='B'); let sum = 0; bKeys.forEach(k => sum += state.inventory[k]);
        let avg = Math.min(99, Math.floor(sum / bKeys.length)); bKeys.forEach(k => state.inventory[k] = avg);
        msg = "天平傾斜，萬物歸於平衡！"; loot = `<span style="color:var(--hl)">基礎元素已平均為 ${avg} 個</span>`;
    } else if(arg === 'GAMEOVER') {
        msg = "💀 隊伍全滅... 輪迴已開啟"; let mf = state.floor; 
        loot = `<div style="font-size:0.8em; color:#aaa; line-height:1.5;">失去所有合成元素與遺物<br>記憶回歸虛無，最大生命上限 +${mf}<br>初始基礎元素 +1<br>怪物維持原強度</div>`;
        $('event-btn').onclick = () => doRebirth(false, mf);
    } else if(arg === 'TRUE_REBORN') {
        msg = "🌟 時間倒轉... 輪迴已開啟"; let mf = state.floor; 
        loot = `<div style="font-size:0.8em; color:#aaa; line-height:1.5;">吸收了本源力量，重啟煉金陣<br>記憶回歸虛無，最大生命上限 +${mf}<br>初始基礎元素 +1<br><span style="color:var(--danger)">警告：新週目怪物已全面強化</span></div>`;
        $('event-btn').onclick = () => doRebirth(true, mf);
    }
    $('event-msg').innerHTML = msg; $('event-loot').innerHTML = loot; updateTop(); saveGame();
    if(arg !== 'GAMEOVER' && arg !== 'TRUE_REBORN' && state.lore < 45 && state.loreFloorCount < 5 && Math.random() < 0.2) { state.lore++; state.loreFloorCount++; await showLoreModal(state.lore); }
}

function doRebirth(isTrue, mf) {
    state.deaths++; state.maxFloor = Math.max(state.maxFloor, state.floor); if(isTrue) state.ngPlus++;
    state.floor = 1; state.room = 1; state.loreFloorCount = 0;
    
    // 清空戰鬥紀錄 logs
    $('battle-log').innerHTML = ''; $('full-log-view').innerHTML = '';
    
    // 無論一般或通關輪迴，都會清空記憶碎片
    state.lore = 0;
    let newCodex = new Set();
    state.codex.forEach(k => { if(!k.startsWith('LORE_')) newCodex.add(k); });
    state.codex = newCodex;
    
    let initC = { E:8, W:8, F:8, A:8, I:8, T:8, P:3, L:3, D:3 }; state.inventory = {}; 
    for(let k in initC) state.inventory[k] = Math.min(99, initC[k] + state.deaths);
    state.heroes.forEach(h => { h.maxHp += mf; h.hp = h.maxHp; h.status=[]; h.shield=0; h.buffs=[]; h.isDefending=false; });
    state.relics = []; state.battlePhase = 'NONE'; $('event-btn').onclick = nextRoom; saveGame(); genDoors(); updateTop();
    if (state.lore === 0) { setTimeout(() => { state.lore = 1; state.loreFloorCount = 1; showLoreModal(1); }, 800); }
}

function nextRoom() {
    state.room++; if(state.room === 1) state.loreFloorCount = 0;
    if(state.relics.includes('R_HEAL')) state.heroes.forEach(h => { if(h.hp>0) h.hp = Math.min(h.maxHp, h.hp + Math.floor(h.maxHp*0.1)); });
    if(state.room > 10) { state.floor++; state.room = 1; state.loreFloorCount = 0; state.heroes.forEach(h => { if(h.hp>0) h.hp = Math.min(h.maxHp, h.hp+30); }); }
    genDoors(); updateTop();
}

/** 4. 戰鬥系統 */
function doHeal(t, v) { t.hp = Math.min(t.maxHp, t.hp+v); spTxt(t, `💚+${v}`, '#00d26a'); logMsg(`💚 ${t.i}${t.n||''} 恢復了 ${v} 點生命`); }
function doShield(t, v) { t.shield += v; spTxt(t, `🛡️+${v}`, '#eee'); logMsg(`🛡️ ${t.i}${t.n||''} 獲得了 ${v} 點護盾`); }
function applyDmg(t, v, c='#fff') {
    if(!t) return; let n = t.i + (t.n||'');
    if(state.reso.e === 'E' && !t.isEnemy) v = Math.max(1, Math.floor(v*0.7));
    
    if(t.isDefending && v > 0) { 
        v = Math.floor(v / 2); 
        logMsg(`🛡️ ${n} 的防禦姿態減少了一半傷害`); 
    }

    if(t.shield > 0) { 
        if(t.shield >= v) { 
            t.shield -= v; logMsg(`🛡️ ${n} 的護盾完全抵消了 ${v} 點傷害`); 
            return spTxt(t, "🛡️抵消", '#aaa'); 
        } else { 
            logMsg(`🛡️ ${n} 的護盾破裂，吸收了 ${t.shield} 點傷害`); 
            v -= t.shield; t.shield = 0; 
        } 
    }
    if(v <= 0) { logMsg(`🛡️ ${n} 毫髮無傷 (受到 0 點傷害)`); return spTxt(t, "-0", '#aaa'); }
    t.hp -= v; spTxt(t, `-${v}`, c); t.hit = 25; logMsg(`💥 ${n} 受到 ${v} 點傷害`);
}

async function startBattle(isBoss, themeArg = null, isFinal = false) {
    state.battlePhase = 'EXECUTE'; state.field = null; state.execQueue = []; state.heroActions = []; state.theme = themeArg;
    state.energy = {}; state.reso = {e:null, t:0}; state.ovl = {e:null, t:0}; state.summons = [];
    state.heroes.forEach(h => { h.shield = state.relics.includes('R_E') ? 30 : 0; h.buffs = []; h.status = []; h.isDefending = false; });
    if(state.relics.includes('R_E')) state.heroes.forEach(h=>spTxt(h, "🛡️磐石", '#eee'));
    
    state.enemies = [];
    if(isFinal) {
        await showLoreModal(46);
        let clones = ['🧙‍♂️','🧝‍♀️','🥷','🧑‍🎤']; let els = ['F','W','A','E']; let hp = Math.floor(800 * (1 + state.ngPlus * 0.5));
        clones.forEach((c, i) => {
            state.enemies.push({ id:'e_f_'+i, el:els[i], i:c, n:'闇影倒影', hp:hp, maxHp:hp, status:[], shield:150, buffs:[], weak:'', immu:'STUN,SLOW', abs:'D', insta:'', tr:'複製體', isBoss:true, isClone:true, sz:1, sumC:0, enraged:false, revealed:true, isEnemy:true, atkAnim:0, hit:0, affix:'QUICK', isDefending:false });
        });
    } else {
        let isBInt = isBoss ? 1 : 0; let pool = ENEMY_DATA.filter(e => (e[9] ? 1 : 0) === isBInt); 
        if(themeArg) { let tPool = pool.filter(e => e[0] === themeArg); if(tPool.length > 0) pool = tPool; }
        if(pool.length === 0) pool = ENEMY_DATA; 
        
        let affixKeys = Object.keys(AFFIXES); const count = isBoss ? 1 : Math.floor(Math.random()*3)+1;
        let spawnE = (t, isB) => {
            if(!t) return; 
            let hp = Math.floor((t[3] + state.floor * (isB ? 40 : 15)) * (1 + state.ngPlus * 0.5));
            let afx = (isB || Math.random() < 0.2) ? affixKeys[Math.floor(Math.random()*affixKeys.length)] : null;
            let sz = isB ? 3 : (t[3]<=50 ? 0 : t[3]>=95 ? 2 : 1);
            state.enemies.push({ id:'e'+Math.random(), el:t[0], i:t[1], n:afx?`[${AFFIXES[afx].n}] ${t[2]}`:t[2], hp:hp, maxHp:hp, status:[], shield:afx==='TOUGH'?100:0, buffs:[], weak:t[4], immu:t[5], abs:t[6], insta:t[7], tr:t[8], isBoss:isB, sz:sz, sumC:isB?3:1, enraged:false, revealed:false, isEnemy:true, atkAnim:0, hit:0, affix:afx, isDefending:false });
        };
        for(let i=0; i<count; i++) spawnE(pool[Math.floor(Math.random()*pool.length)], isBoss);
        if(isBoss) { let mPool = ENEMY_DATA.filter(e => !e[9] && (!themeArg || e[0]===themeArg)); if(!mPool.length) mPool = ENEMY_DATA.filter(e => !e[9]); if(mPool.length) for(let j=0; j<2; j++) spawnE(mPool[Math.floor(Math.random()*mPool.length)], false); }
    }
    
    $('theme-display').innerText = state.theme ? `[${EL[state.theme].i}領域] ` : '';
    logMsg(`⚠️ 遭遇魔物！`); switchView('battle-view'); if(particles.length === 0) loop(); planRound();
}

function renderBattleUI() {
    updateTop();
    let ro = $('res-ovl-display');
    if(state.ovl.e) ro.innerHTML = `<span style="color:var(--danger)">⚠️ 元素失控：${OVL_FX[state.ovl.e].n} (${state.ovl.t}回合)</span>`;
    else if(state.reso.e) ro.innerHTML = `<span style="color:var(--hl)">🌟 共鳴：${EL[state.reso.e].i} (${state.reso.t}回合) - ${RES_FX[state.reso.e]}</span>`;
    else ro.innerHTML = '';
}

function checkEnergy() {
    for(let k in state.energy) {
        let v = state.energy[k];
        if(v >= 11 && state.ovl.e !== k) {
            if(Math.random() < 0.1 + (v-11)*0.1 || v >= 20) {
                state.ovl = {e:k, t:3}; state.reso = {e:null, t:0}; state.energy[k]=0;
                logMsg(`⚠️ 能量過載！引發大災難【${OVL_FX[k].n}】！`); renderBattleUI(); return;
            }
        } else if(v >= 6 && v <= 10 && state.reso.e !== k && !state.ovl.e) {
            if(Math.random() < 0.2 + (v-6)*0.2 || v >= 10) { state.reso = {e:k, t:3}; logMsg(`🌟 元素共鳴！【${EL[k].i}${EL[k].n}系】能力強化！`); renderBattleUI(); return; }
        }
    }
    renderBattleUI();
}

async function planRound() {
    state.heroes.forEach(h => h.isDefending = false);
    state.enemies.forEach(e => e.isDefending = false);

    if(state.ovl.t > 0) { state.ovl.t--; if(state.ovl.t<=0) { logMsg(`💨 ${OVL_FX[state.ovl.e].n} 結束了。`); state.ovl.e=null; renderBattleUI(); await delay(400); } }
    if(state.reso.t > 0) { state.reso.t--; if(state.reso.t<=0) { logMsg(`💨 共鳴狀態結束。`); state.reso.e=null; renderBattleUI(); await delay(400); } }
    
    if(state.summons.length > 1) {
        for(let i=0; i<state.summons.length; i++) {
            for(let j=i+1; j<state.summons.length; j++) {
                let s1=state.summons[i], s2=state.summons[j]; if(s1.energy<=0 || s2.energy<=0) continue;
                let rx = REACTIONS[s1.el+'_'+s2.el] || REACTIONS[s2.el+'_'+s1.el];
                if(rx) {
                    logMsg(`💥 生命體共鳴！${EL[s1.el].i}與${EL[s2.el].i}大爆炸！`);
                    state.enemies.filter(e=>e.hp>0).forEach(e => { applyDmg(e, 40+state.floor*5, '#ff9800'); if(rx.apply) applyStatus(e, rx.apply); });
                    s1.energy=0; s2.energy=0; await delay(500);
                } else if (s1.el === s2.el) {
                    logMsg(`✨ ${EL[s1.el].i}${EL[s1.el].n}之靈 融合，能量充滿！`);
                    s1.energy = Math.min(5, s1.energy + s2.energy); s2.energy = 0; await delay(500);
                }
            }
        }
        state.summons = state.summons.filter(x=>x.energy>0);
    }
    
    state.heroActions = []; let aliveHeroes = state.heroes.filter(h=>h.hp>0);
    if(aliveHeroes.length === 0) return checkWinLoss();
    state.currentHeroIdx = 0; promptHeroCmd(aliveHeroes[0]);
}

let currSel = [];
function promptHeroCmd(hero) { 
    $('click-prompt').style.display = 'none'; state.maxSlots = Math.min(4, state.floor);
    state.battlePhase = 'COMMAND'; state.currentHero = hero; currSel = []; renderCmdUI(); renderBattleUI(); 
}

function renderCmdUI() {
    updateTop(); $('current-hero-name').innerText = state.currentHero.i + ' ' + state.currentHero.n;
    $('btn-undo').style.display = state.currentHeroIdx > 0 ? 'block' : 'none';
    let sc = $('sel-container'); sc.innerHTML = '';
    for(let i=0; i<state.maxSlots; i++) {
        let slot = document.createElement('div');
        slot.className = `sel-slot ${currSel[i]?'filled':''}`;
        slot.innerText = currSel[i] ? EL[currSel[i]].i : '';
        if(currSel[i]) {
            slot.style.cursor = 'pointer';
            slot.onclick = () => { currSel.splice(i, 1); renderCmdUI(); };
        }
        sc.appendChild(slot);
    }
    
    let grid = $('element-buttons'); grid.innerHTML = '';
    for(let k in state.inventory) {
        let avail = getAvail(k); let hasOwn = state.inventory[k] > 0 || k === state.theme;
        if(hasOwn && (!EL[k].req || state.codex.has('E_'+k))) {
            let btn = document.createElement('div'); btn.className = `el-btn ${k===state.theme?'infinite':(avail<=0?'empty':'')}`;
            btn.innerHTML = `${EL[k].i}<div class="count">${k===state.theme?'∞':avail}</div>`;
            btn.onclick = () => { if(state.battlePhase==='COMMAND' && currSel.length<state.maxSlots && getAvail(k)>0) { currSel.push(k); renderCmdUI(); } };
            grid.appendChild(btn);
        }
    }
}

function clearElements() { if(state.battlePhase!=='COMMAND') return; currSel=[]; renderCmdUI(); }
function undoAction() { if(state.battlePhase !== 'COMMAND' || state.currentHeroIdx === 0) return; currSel = []; state.heroActions.pop(); state.currentHeroIdx--; promptHeroCmd(state.heroes.filter(h=>h.hp>0)[state.currentHeroIdx]); }

function defendAction() {
    if(state.battlePhase !== 'COMMAND') return;
    let action = { hero: state.currentHero, type: 'DEFEND', elements: [], baseEl: 'DEF', origCombo: '' };
    state.heroActions.push(action);
    currSel = [];
    let aliveHeroes = state.heroes.filter(h=>h.hp>0); state.currentHeroIdx++;
    if(state.currentHeroIdx < aliveHeroes.length) promptHeroCmd(aliveHeroes[state.currentHeroIdx]);
    else buildExecutionQueue();
}

function confirmAction() {
    if(state.battlePhase !== 'COMMAND') return;
    let comboStr = [...currSel].sort().join('_');
    let action = { hero: state.currentHero, type: 'SKILL', elements: [...currSel], baseEl: currSel[0] || 'NONE', origCombo: comboStr };
    state.heroActions.push(action);
    let aliveHeroes = state.heroes.filter(h=>h.hp>0); state.currentHeroIdx++;
    if(state.currentHeroIdx < aliveHeroes.length) promptHeroCmd(aliveHeroes[state.currentHeroIdx]);
    else buildExecutionQueue();
}

function buildExecutionQueue() {
    state.execQueue = []; let actions = [...state.heroActions]; let used = new Set();
    
    for(let c of COMBOS) {
        let matched = [], req = [...c.req];
        for(let i=0; i<actions.length; i++) {
            if(used.has(i) || actions[i].type === 'DEFEND' || actions[i].elements.length > 1) continue;
            let idx = req.indexOf(actions[i].baseEl); if(idx !== -1) { matched.push(i); req.splice(idx, 1); }
        }
        if(req.length === 0) {
            let comboEls = []; matched.forEach(i => { used.add(i); comboEls.push(...actions[i].elements); });
            const mainAct = actions[matched[0]];
            state.execQueue.push({ isCombo: true, actor: mainAct.hero, skill: c, baseEl: mainAct.baseEl, spd: 999, consumeEls: comboEls });
            if(!state.codex.has('C_'+c.n)) { state.codex.add('C_'+c.n); }
        }
    }
    for(let i=0; i<actions.length; i++) {
        if(!used.has(i)) {
            let act = actions[i]; let hSpd = Math.random()*100 + (state.relics.includes('R_A')?100:0) + (state.reso.e==='A'?100:0);
            if(act.type === 'DEFEND') hSpd += 200;
            state.execQueue.push({ isCombo: false, isDefend: act.type === 'DEFEND', actor: act.hero, origCombo: act.origCombo, baseEl: act.baseEl, spd: hSpd, consumeEls: act.elements });
        }
    }
    state.enemies.filter(e=>e.hp>0).forEach(e => {
        let isDefend = Math.random() < 0.15;
        let spd = Math.random()*100 + (e.status.includes('HASTE')?100:0) - (e.status.includes('SLOW')?50:0) + (e.affix==='QUICK'?150:0);
        if (isDefend) spd += 200;
        state.execQueue.push({ isEnemyAtk: true, isDefend: isDefend, actor: e, spd: spd });
    });
    state.summons.filter(s=>s.energy>0).forEach(s => state.execQueue.push({ isSummon: true, actor: s, spd: 80 + Math.random()*40 }));
    
    state.execQueue.sort((a,b) => b.spd - a.spd); state.battlePhase = 'EXECUTE'; nextAction();
}

async function nextAction() {
    try {
        if(state.enemies.filter(e=>e.hp>0).length === 0 || state.heroes.filter(h=>h.hp>0).length === 0) return checkWinLoss();
        if(state.execQueue.length === 0) return planRound();
        let act = state.execQueue.shift(); if((act.actor.hp !== undefined && act.actor.hp <= 0) || (act.actor.energy !== undefined && act.actor.energy <= 0)) return nextAction();
        
        if(act.isSummon) {
            let s = act.actor; s.atkAnim = 12; let sai = SUMMON_AI[s.el]; let tgts = []; 
            let alvE = state.enemies.filter(e=>e.hp>0), alvH = state.heroes.filter(h=>h.hp>0);
            if(sai.tg === 'E_RAND') tgts = [alvE.sort(()=>Math.random()-0.5)[0]];
            if(sai.tg === 'E_HIGH') tgts = [alvE.sort((a,b)=>b.hp - a.hp)[0]];
            if(sai.tg === 'E_ALL') tgts = alvE; if(sai.tg === 'H_ALL') tgts = alvH;
            if(sai.tg === 'H_LOW') tgts = [alvH.sort((a,b)=>a.hp - b.hp)[0]];
            
            if(tgts[0] && tgts[0] !== undefined) {
                logMsg(`🧚 ${EL[s.el].i}${EL[s.el].n}之靈 ${sai.txt}！`);
                for(let t of tgts) {
                    if(sai.dmg) applyDmg(t, sai.dmg + state.floor*2, EL[s.el].c); if(sai.app) applyStatus(t, sai.app);
                    if(sai.heal) doHeal(t, sai.heal); if(sai.shd) doShield(t, sai.shd);
                    if(sai.buff && !t.buffs.includes(sai.buff)) { t.buffs.push(sai.buff); spTxt(t, "💨加速", '#fff'); }
                    await delay(200);
                }
                if(sai.chain && alvE.length > 1) { 
                    let next = alvE.find(e => !tgts.includes(e)); 
                    if(next) { applyDmg(next, Math.floor(sai.dmg/2), EL[s.el].c); applyStatus(next, sai.app); await delay(200); } 
                }
            }
            s.energy--; if(s.energy <= 0) { logMsg(`💨 ${EL[s.el].i}${EL[s.el].n}之靈 耗盡能量消散了。`); state.summons = state.summons.filter(x=>x!==s); }
            state.battlePhase = 'WAIT'; $('click-prompt').style.display='block'; return;
        }

        if(act.actor.status && act.actor.status.includes('STUN')) {
            if(act.actor.enraged) { spTxt(act.actor, "免疫", '#888'); act.actor.status.splice(act.actor.status.indexOf('STUN'), 1); } 
            else { logMsg(`💫 ${act.actor.n||act.actor.i} 暈眩中`); act.actor.status.splice(act.actor.status.indexOf('STUN'), 1); await delay(400); return nextAction(); }
        }

        act.actor.atkAnim = 16;
        if(act.isEnemyAtk) {
            let alvE = state.enemies.filter(e=>e.hp>0);
            if(alvE.length < 6 && act.actor.sumC > 0 && Math.random() < (act.actor.isBoss?0.4:0.2) && !act.actor.isClone) {
                act.actor.sumC--; let mPool = ENEMY_DATA.filter(x=>!x[9] && x[0]===act.actor.el);
                if(mPool.length) {
                    let mt = mPool[Math.floor(Math.random()*mPool.length)]; let hp = Math.floor((mt[3] + state.floor*15)*(1+state.ngPlus*0.5));
                    state.enemies.push({ id:'e'+Math.random(), el:mt[0], i:mt[1], n:mt[2], hp:hp, maxHp:hp, status:[], shield:0, buffs:[], weak:mt[4], immu:mt[5], abs:mt[6], insta:mt[7], tr:mt[8], isBoss:false, sz:mt[3]<=50?0:mt[3]>=95?2:1, sumC:0, enraged:false, revealed:false, isEnemy:true, atkAnim:0, hit:0, affix:null, isDefending:false });
                    logMsg(`📣 ${act.actor.n} 呼喚了同伴 ${mt[2]}！`); await delay(400);
                }
            }
            if(EL[act.actor.el] && EL[act.actor.el].t === 'B') { state.energy[act.actor.el] = Math.min(99, (state.energy[act.actor.el]||0) + (act.actor.isBoss?2:1)); checkEnergy(); }

            if(act.actor.isClone) {
                let skills = ['A_F','T_W','A_A','E_E','E_P','I_I','M','C','G','X','Z'];
                let sk = SKILLS[skills[Math.floor(Math.random()*skills.length)]];
                logMsg(`🌑 ${act.actor.n} 施放了 ${sk.n}！`); await executeSkill(sk, act.actor.el, act.actor);
            } else if (act.isDefend && !act.actor.enraged) {
                act.actor.isDefending = true;
                logMsg(`🛡️ ${act.actor.n} 採取了防禦姿態！`);
                spTxt(act.actor, "🛡️防禦", '#aaa');
                await delay(400);
            } else {
                let targets = state.heroes.filter(h=>h.hp>0); let target = targets[Math.floor(Math.random()*targets.length)];
                let dmg = Math.floor((10 + state.floor*2) * (act.actor.isBoss ? 2 : 1) * (1 + state.ngPlus * 0.3));
                logMsg(`⚔️ ${act.actor.n} 攻擊！`); applyDmg(target, dmg);
                if(act.actor.affix === 'VAMP') { doHeal(act.actor, dmg); }
                if(state.relics.includes('R_THORN')) { applyDmg(act.actor, Math.floor(dmg*0.2), '#ff9800'); spTxt(act.actor, "🌵反彈", '#ff9800', -20); }
                await delay(400);
            }
            if(act.actor.enraged && !act.isExtra && Math.random()<0.5) { state.execQueue.unshift({...act, isExtra:true, spd:999}); logMsg(`💢 發狂連擊！`); await delay(300); }
        } else {
            if(act.isDefend) {
                act.actor.isDefending = true;
                logMsg(`🛡️ ${act.actor.i}${act.actor.n} 採取了防禦姿態！`);
                spTxt(act.actor, "🛡️防禦", '#aaa');
            } else {
                if(state.relics.includes('R_ALCH') && act.consumeEls.length > 0 && Math.random() < 0.25) { logMsg("♻️ 煉金之心發動，未消耗元素！"); } 
                else { act.consumeEls.forEach(k => { if(k !== state.theme) state.inventory[k] = Math.max(0, state.inventory[k]-1); }); }
                
                if(act.consumeEls.length > 0) { act.consumeEls.forEach(k => { if(EL[k].t === 'B') state.energy[k] = Math.min(99, (state.energy[k]||0)+1); }); checkEnergy(); }
                
                let bctx = { totalDmg: 0, oneshot: false }; 
                if(act.isCombo) {
                    logMsg(`💫 奧義：${act.skill.n}`); await executeSkill(act.skill, act.baseEl, act.actor, bctx);
                } else {
                    let cStr = act.origCombo; let skill = SKILLS[cStr] || { n: '元素反噬', dmg: 5 }; let eKey = act.baseEl;
                    if(EVO[cStr]) {
                        let eKeyNew = EVO[cStr]; let isNew = !state.codex.has('E_'+eKeyNew); state.codex.add('E_'+eKeyNew); state.inventory[eKeyNew] = Math.min(99, (state.inventory[eKeyNew]||0) + 1);
                        if(isNew) { logMsg(`🌟 煉金突破！解鎖新元素【${EL[eKeyNew].i}${EL[eKeyNew].n}】！`); } else logMsg(`✨ 煉金合成：獲得【${EL[eKeyNew].i}${EL[eKeyNew].n}】`);
                        skill = SKILLS[eKeyNew] || skill; eKey = eKeyNew;
                    }
                    let sKey = EVO[cStr] || cStr; if(sKey !== '' && !state.codex.has('S_'+sKey)) { state.codex.add('S_'+sKey); }
                    logMsg(`${act.actor.i}${act.actor.n} 施放 ${skill.n}`); await executeSkill(skill, eKey, act.actor, bctx);
                }
                
                if(bctx.oneshot && act.actor && act.actor.hp > 0) {
                    let bl = Math.floor(bctx.totalDmg / 10);
                    if(bl > 0) { logMsg(`⚠️ 魔力過載！${act.actor.i}${act.actor.n} 遭受反噬！`); applyDmg(act.actor, bl, '#e23e57'); await delay(400); }
                }
                
                if(act.consumeEls && act.consumeEls.length >= 3) {
                    let counts = {}; act.consumeEls.forEach(x => counts[x] = (counts[x]||0)+1);
                    let dom = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
                    if(EL[dom] && EL[dom].t === 'B') {
                        logMsg(`🌟 元素匯聚！降臨了【${EL[dom].i}${EL[dom].n}之靈】！`); 
                        for(let e of state.enemies.filter(e=>e.hp>0)) { applyDmg(e, 8 + state.floor*2, EL[dom].c); await delay(150); }
                        state.summons.push({ id:'s'+Math.random(), el: dom, energy: 3, maxEnergy: 3, atkAnim:0 });
                        state.codex.add('SM_'+dom); 
                    }
                }
            }
        }
        resolveEndOfTurn(act.actor); await delay(300);
        if(state.enemies.filter(e=>e.hp>0).length === 0 || state.heroes.filter(h=>h.hp>0).length === 0) return checkWinLoss();
        state.battlePhase = 'WAIT'; $('click-prompt').style.display='block';
    } catch(err) { console.error("Combat Error:", err); state.battlePhase = 'WAIT'; $('click-prompt').style.display='block'; }
}

async function executeSkill(skill, baseEl, actor, bctx = null) {
    let enemies = state.enemies.filter(e=>e.hp>0); let heroes = state.heroes.filter(h=>h.hp>0); let deadHeroes = state.heroes.filter(h=>h.hp<=0); let targets = []; let p = skill.p || baseEl;
    if(skill.target === 'DEAD_ALLIES') targets = skill.aoe ? deadHeroes : (deadHeroes.length ? [deadHeroes.sort(()=>Math.random()-0.5)[0]] : []);
    else if(skill.target === 'ALLIES') targets = skill.aoe ? heroes : [heroes.sort((a,b)=>a.hp-b.hp)[0]];
    else if(skill.aoe || skill.target === 'ENEMIES') targets = enemies; else if(p === 'F') targets = [enemies.sort((a,b)=>a.hp-b.hp)[0]];
    else if(p === 'P' || p === 'W') targets = [enemies.sort((a,b)=>b.hp-a.hp)[0]]; else if(p === 'E') targets = [enemies[0]];
    else targets = [enemies.sort(()=>Math.random()-0.5)[0]]; 
    
    if(targets.length === 0 && skill.target === 'DEAD_ALLIES') { logMsg("✨ 復甦法術無效 (目前無陣亡者)"); return; }
    if(state.ovl.e === 'A' && Math.random() < 0.5 && !skill.aoe) { targets = [[...enemies, ...heroes].sort(()=>Math.random()-0.5)[0]]; logMsg("🌪️ 狂風干擾了施法目標！"); }
    
    let fReacted = false; let rKey = state.field + '_' + baseEl;
    if(state.field && F_REACT[rKey]) {
        let rx = F_REACT[rKey]; logMsg(rx.txt); state.field = rx.new;
        if(rx.dmg) { for(let e of enemies) { applyDmg(e, rx.dmg); await delay(150); } }
        if(rx.aoe) enemies.forEach(e => applyStatus(e, rx.aoe));
        if(!state.codex.has('FR_'+rKey)) state.codex.add('FR_'+rKey); fReacted = true; await delay(300);
    }
    
    if(skill.healAllies) { heroes.forEach(h => doHeal(h, skill.healAllies)); }

    let chains = (state.reso.e === 'T' && baseEl === 'T') ? 2 : 1;
    for(let t of targets) { hitTarget(t, skill, baseEl, actor, bctx); await delay(200); }
    for(let i=0; i<chains; i++) {
        if(skill.chain && enemies.length > 1) { 
            let next = enemies.find(e => !targets.includes(e)); 
            if(next) { hitTarget(next, { dmg: Math.floor(skill.dmg/2), apply: skill.apply }, baseEl, actor, bctx); targets.push(next); await delay(200); } 
        }
    }
    if(!fReacted && skill.leave && state.field !== skill.leave) { state.field = skill.leave; logMsg(`場地化為【${FIELD[state.field].i}${FIELD[state.field].n}】`); await delay(300); }
}

function hitTarget(t, skill, elKey, actor, bctx = null) {
    if(!t) return;
    
    if(skill.action === 'REVIVE') {
        if(t.hp <= 0) {
            t.hp = Math.floor(t.maxHp * skill.val); t.status = []; t.shield = 0; t.isDefending = false;
            spTxt(t, `✨復活`, '#ffeb3b'); logMsg(`✨ ${t.i}${t.n||''} 奇蹟般地復活了！`);
        }
        return;
    }
    
    if(state.ovl.e === 'D' && Math.random() < 0.3) { logMsg(`💨 視蔽！${t.i}${t.n||''} 閃避了攻擊`); return spTxt(t, "MISS", '#888'); } 
    let isLReso = state.reso.e === 'L';
    if(t.isEnemy && t.sz === 0 && Math.random() < (skill.aoe ? 0.4 : 0.2)) { logMsg(`💨 靈巧！${t.i}${t.n||''} 閃避了攻擊`); return spTxt(t, "MISS", '#888'); } 
    
    if(skill.action === 'REVEAL') { t.revealed = true; return spTxt(t, "👁️看破", '#fff9c4', -20); }
    if(skill.action === 'SHIELD' || skill.action2 === 'SHIELD') { let v = Math.floor((skill.val2 || skill.val) * (isLReso?1.5:1)); doShield(t, v); if(!skill.action2) return; }
    if(skill.action === 'BUFF') { if(!t.buffs.includes(skill.buff)) t.buffs.push(skill.buff); return spTxt(t, `⚔️強化`, '#ff9800'); }
    if(skill.action === 'DEBUFF') { if(!t.status.includes(skill.buff)) t.status.push(skill.buff); spTxt(t, STATUS[skill.buff].i, STATUS[skill.buff].c, -20); }
    if(skill.action === 'HEAL' || skill.heal) { let amt = Math.floor((skill.val || skill.heal) * (isLReso?1.5:1)); doHeal(t, amt); if(!skill.dmg) return; }

    if(skill.dmg) {
        let dmg = skill.dmg; let c = '#fff';
        if(actor && actor.buffs && actor.buffs.includes('ATK_UP')) { dmg = Math.floor(dmg*1.5); actor.buffs = []; spTxt(actor, "爆發!", '#ff9800', -20); }
        if(state.relics.includes('R_F') && elKey==='F') dmg = Math.floor(dmg*1.5); if(state.relics.includes('R_I') && elKey==='I') dmg = Math.floor(dmg*1.5); if(state.relics.includes('R_T') && elKey==='T') dmg = Math.floor(dmg*1.5);
        if(state.reso.e === 'F' && elKey === 'F') dmg = Math.floor(dmg*1.5); if(state.reso.e === 'I' && elKey === 'I' && t.status.includes('FROZEN')) dmg = Math.floor(dmg*1.5);

        if(t.isEnemy) {
            if(t.sz === 2) dmg = Math.floor(dmg * 0.85);
            if(t.isBoss && t.hp <= t.maxHp/2 && !t.enraged) { t.enraged = true; t.status = t.status.filter(s => !STATUS[s].skip); spTxt(t, "💢 發狂!", '#f00', -30); logMsg(`💢 ${t.n} 進入發狂狀態！免疫控制與連續行動！`); }
            
            if(elKey && t.insta && t.insta.includes(elKey)) { dmg = 999; c = '#f00'; logMsg(`🎯 致命弱點觸發！`); }
            else if(elKey && t.abs && t.abs.includes(elKey)) { t.hp = Math.min(t.maxHp, t.hp + dmg); logMsg(`💚 ${t.i}${t.n||''} 吸收了屬性，恢復 ${dmg} 點生命`); return spTxt(t, `吸收+${dmg}`, '#0f0'); }
            else if(elKey && t.immu && t.immu.includes(elKey)) { logMsg(`🛡️ ${t.i}${t.n||''} 免疫了此屬性攻擊！`); return spTxt(t, `免疫`, '#888'); }
            else if(elKey && t.weak && t.weak.includes(elKey)) { dmg = Math.floor(dmg*1.5); c = '#f00'; }
            
            if(bctx && t.hp === t.maxHp && dmg >= t.maxHp && !bctx.oneshot) { bctx.oneshot = true; } 
            
            if(t.affix === 'THORN') { applyDmg(actor, Math.floor(dmg*0.2), '#ff9800'); spTxt(actor, "🌵荊棘反彈", '#ff9800', -20); }
        }
        
        if(bctx) bctx.totalDmg += dmg;
        applyDmg(t, dmg, c);
        
        if(state.relics.includes('R_W') && elKey==='W' && actor) { doHeal(actor, 15); }
        if(state.reso.e === 'D' && elKey === 'D' && actor) { doHeal(actor, Math.floor(dmg*0.5)); }
        if(state.reso.e === 'W' && elKey === 'W' && actor) { doShield(actor, 20); }
    }
    if(skill.apply) applyStatus(t, skill.apply); mkPtc(t, skill.apply || elKey || 'E');
}

function applyStatus(t, s) { 
    if(!t || t.status.includes(s)) return; let reacted = false;
    for(let i=0; i<t.status.length; i++) {
        let rKey = t.status[i] + '_' + s;
        if(REACTIONS[rKey]) {
            const rx = REACTIONS[rKey]; reacted = true; spTxt(t, rx.txt, '#ffeb3b', -25);
            if(!state.codex.has('R_'+rKey)) state.codex.add('R_'+rKey);
            if(rx.dmg) applyDmg(t, rx.dmg, '#ff9800'); if(rx.clear) { t.status.splice(i, 1); i--; }
            if(rx.apply) applyStatus(t, rx.apply); if(rx.isAoe) state.enemies.filter(e=>e!==t && e.hp>0).forEach(e => applyDmg(e, Math.floor(rx.dmg/2), '#ff9800')); break;
        }
    }
    if(!reacted) { t.status.push(s); spTxt(t, STATUS[s].i, STATUS[s].c, 20); }
}

function resolveEndOfTurn(ent) {
    if(!ent || (ent.hp!==undefined && ent.hp<=0)) return;
    if(ent.status && ent.status.includes('BURN')) { applyDmg(ent, 5, '#f52'); spTxt(ent, '🔥', '#f52', 15); }
    if(ent.status && ent.status.includes('POISON')) { applyDmg(ent, state.reso.e==='P'?16:8, '#92b'); spTxt(ent, '☠️', '#92b', 15); }
    if(state.field === 'F') applyDmg(ent, 3, '#f52'); if(state.field === 'P') applyStatus(ent, 'POISON');
    if(ent.isEnemy && ent.affix === 'REGEN') { doHeal(ent, 15); }
    if(state.ovl.e && state.ovl.t > 0) {
        let oe = state.ovl.e;
        if(oe==='F') { applyDmg(ent, 15, '#f52'); spTxt(ent, '🌋', '#f52', 15); }
        if(oe==='W') applyStatus(ent, 'WET'); if(oe==='P') applyStatus(ent, 'POISON'); if(oe==='I') applyStatus(ent, 'SLOW');
        if(oe==='T' && Math.random()<0.3) { applyDmg(ent, 25, '#ffeb3b'); applyStatus(ent, 'SHOCK'); }
        if(oe==='E') applyDmg(ent, 20, '#8b5a2b'); if(oe==='L' && ent.hp !== undefined) { doHeal(ent, 15); }
    }
}

$('app').addEventListener('click', (e) => { 
    if(e.target === canvas && state.battlePhase !== 'NONE') {
        const rect = canvas.getBoundingClientRect(); const cx = (e.clientX - rect.left) * (canvas.width / rect.width); const cy = (e.clientY - rect.top) * (canvas.height / rect.height);
        let ce = state.enemies.find(en => en.hp>0 && en.revealed && Math.hypot(cx - en.x, cy - en.y) <= (en.sz===3?45:en.sz===2?30:20));

    }

    } else if(state.battlePhase === 'GAMEOVER_WAIT' && !e.target.closest('.modal')) {

        state.battlePhase = 'NONE'; goMainView(); resolveEvent('TRUE_REBORN'); $('click-prompt').innerText = '▶ 點擊繼續';
    }
});

async function checkWinLoss() {
    $('click-prompt').style.display='none';
    let isFinal = state.floor >= 5 && state.room === 10 && state.enemies.some(e=>e.isClone);
    
    if(state.heroes.filter(h=>h.hp>0).length === 0) { 
        if(isFinal) { await delay(1000); logMsg(`...似乎想起了什麼...`); await delay(1000); await showLoreModal(47); }
        state.battlePhase = 'GAMEOVER_WAIT'; $('click-prompt').innerText = '▶ 點擊結算'; $('click-prompt').style.display='block';
    } else if (state.enemies.filter(e=>e.hp>0).length === 0) {
        let dc = {}; let lm = []; state.enemies.forEach(e => { dc[e.el] = (dc[e.el]||0) + (e.isBoss?12:5); });
        if(state.theme) dc[state.theme] = (dc[state.theme]||0) + 6;
        if(state.relics.includes('R_LUCK')) { for(let i=0; i<4; i++) { let k = Object.keys(EL).filter(x=>EL[x].t==='B')[Math.floor(Math.random()*9)]; dc[k] = (dc[k]||0)+2; } }
        for(let k in dc) { state.inventory[k] = Math.min(99, (state.inventory[k]||0) + dc[k]); lm.push(`${EL[k].i}+${dc[k]}`); }
        
        if(state.enemies.some(e=>e.isBoss) && state.relics.length < 5) {
            let dropChance = 1 - (state.relics.length * 0.15); 
            if(Math.random() < dropChance) { let avail = Object.keys(RELICS).filter(k => !state.relics.includes(k)); if(avail.length > 0) { let r = avail[Math.floor(Math.random()*avail.length)]; state.relics.push(r); state.codex.add('RELIC_'+r); lm.push(`🎁遺物【${RELICS[r].n}】`); } }
        }
        logMsg(`🏆 勝利！獲得戰利品: ${lm.join(' ')}`); 
        updateTop();
        
        if(isFinal) {
            await delay(1000); logMsg(`...似乎想起了什麼...`); await delay(1000);
            await showLoreModal(48); await showLoreModal(49); await showLoreModal(50);
            state.battlePhase = 'TRUE_REBORN_WAIT'; $('click-prompt').innerText = '▶ 點擊迎接真相'; $('click-prompt').style.display='block'; return;
        }
        
        if(state.lore < 45 && state.loreFloorCount < 5 && Math.random() < 0.2) {
            await delay(1000); logMsg(`...似乎想起了什麼...`); await delay(1000);
            state.lore++; state.loreFloorCount++; await showLoreModal(state.lore);
        }
        
        state.battlePhase = 'VICTORY_WAIT'; $('click-prompt').innerText = '▶ 點擊前進'; $('click-prompt').style.display='block';
    }
}

/** 5. 視覺渲染 */
function drawEnt(e, x, y) {
    let dx = 0; if(e.atkAnim > 0) { dx = (e.isEnemy ? -1 : 1) * Math.sin(e.atkAnim * Math.PI / 16) * 12; e.atkAnim--; } if(e.hit > 0) { dx += (Math.random()-0.5)*8; e.hit--; } 
    e.x=x+dx; e.y=y;
    
    if(e.hp!==undefined && e.hp<=0) {
        ctx.globalAlpha = 0.4;
        ctx.font = "30px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText('💀', e.x, e.y);
        ctx.globalAlpha = 1.0;
        return;
    }
    
    let fontSz = e.sz===3 ? 65 : e.sz===2 ? 45 : e.sz===0 ? 18 : 30; ctx.font = `${fontSz}px Arial`; ctx.textAlign="center"; ctx.textBaseline="middle";
    if(e.isClone) { ctx.shadowColor = '#9c27b0'; ctx.shadowBlur = 20; }
    if(e.hit > 0 && e.hit % 8 < 4) { ctx.fillStyle = 'rgba(255,0,0,0.6)'; ctx.fillText(e.i, e.x, e.y); } else { ctx.fillText(e.i, e.x, e.y); }
    ctx.shadowBlur = 0;
    
    if(e.hp !== undefined) {
        let p = Math.max(0, e.hp/e.maxHp); 
        let barW = e.sz===3 ? 60 : e.sz===2 ? 45 : e.sz===0 ? 20 : 35;
        let offsetY = e.sz===3 ? 35 : e.sz===2 ? 25 : e.sz===0 ? 12 : 18;
        
        ctx.fillStyle="#222"; ctx.fillRect(e.x-barW/2, e.y+offsetY, barW, 4); ctx.fillStyle = p>0.5 ? "#4caf50" : p>0.2 ? "#ff9800" : "#f44336"; ctx.fillRect(e.x-barW/2, e.y+offsetY, barW*p, 4);
        if(e.shield > 0) { ctx.fillStyle="#eee"; ctx.fillRect(e.x-barW/2, e.y+offsetY+5, barW*Math.min(1,e.shield/e.maxHp), 2); }
        if(e.status.length) { ctx.font="12px Arial"; let sx = e.x-(e.status.length*7)+7; e.status.forEach((s,i) => { if(STATUS[s]) ctx.fillText(STATUS[s].i, sx+(i*14), e.y-offsetY-10); }); }
        if(e.buffs && e.buffs.includes('ATK_UP')) { ctx.font="14px Arial"; ctx.fillText('⚔️', e.x-20, e.y+10); }
        if(e.isDefending) { ctx.font="14px Arial"; ctx.fillText('🛡️', e.x+20, e.y+10); }
        
        if(e.isEnemy && e.revealed) { ctx.font="20px Arial"; ctx.fillText('🔍', e.x, e.y-offsetY-25); }
        if(!e.isEnemy && state.battlePhase === 'COMMAND') { let els = state.currentHero === e ? currSel : (state.heroActions.find(a=>a.hero===e)?.elements || []); if(els.length > 0) { ctx.font = "14px Segoe UI"; ctx.textAlign="left"; ctx.fillText(els.map(k=>EL[k].i).join(''), e.x + 25, e.y); ctx.textAlign="center"; } }
    }
}

function spTxt(e, t, c, oy=0) { floatTexts.push({x:e.x+(Math.random()*30-15), y:e.y-20+oy, t:t, c:c, l:100}); }
function mkPtc(e, type) { let c = (EL[type] && STATUS[EL[type].n]) ? STATUS[EL[type].n].c : '#fff'; for(let i=0; i<12; i++) particles.push({x:e.x, y:e.y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, l:20+Math.random()*15, c:c}); }

function render() {
    ctx.clearRect(0,0,canvas.width,canvas.height); if(state.battlePhase==='NONE') return;
    if(state.field) { ctx.globalAlpha=0.1; ctx.font="200px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(FIELD[state.field].i, 200, 150); ctx.globalAlpha=1.0; ctx.font="14px Arial"; ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.fillText(`[環境] ${FIELD[state.field].n} : ${FIELD[state.field].fx}`, 200, 20); }
    
    state.heroes.forEach((h,i) => { 
        if(state.battlePhase === 'COMMAND' && h === state.currentHero) { 
            ctx.shadowColor = '#4da8da'; ctx.shadowBlur = 15; 
            ctx.fillStyle = "rgba(77,168,218,0.4)"; ctx.beginPath(); ctx.arc(60, 45+i*60, 32, 0, Math.PI*2); ctx.fill(); 
            ctx.strokeStyle = "#4da8da"; ctx.lineWidth = 2; ctx.stroke(); ctx.shadowBlur = 0; 
        } 
        drawEnt(h, 60, 45+i*60); 
    });
    
    state.enemies.forEach((e,i) => { let ex, ey; if(e.isBoss) { ex = e.isClone ? 220+(i%2)*80 : 320; ey = e.isClone ? 90+Math.floor(i/2)*90 : 140; } else { let mIdx = state.enemies.filter(x=>!x.isBoss).indexOf(e); ex = 240 + (mIdx%2)*55; ey = 60 + Math.floor(mIdx/2)*65; } drawEnt(e, ex, ey); });

    state.summons.forEach((s,i) => {
        let sx = 150 + (i % 2)*35, sy = 80 + Math.floor(i/2)*40, dx = 0;
        if(s.atkAnim > 0) { dx = Math.sin(s.atkAnim * Math.PI / 8) * 8; s.atkAnim--; }
        ctx.font = "24px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(EL[s.el].i, sx+dx, sy);
        ctx.font = "12px Arial"; ctx.fillStyle = "#fff"; ctx.fillText(s.energy, sx+dx+12, sy+8);
        s.x = sx+dx; s.y = sy;
    });

    for(let i=particles.length-1; i>=0; i--) { let p=particles[i]; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2); ctx.fill(); p.x+=p.vx; p.y+=p.vy; p.l--; if(p.l<=0) particles.splice(i,1); }
    for(let i=floatTexts.length-1; i>=0; i--) { let t=floatTexts[i]; ctx.globalAlpha = Math.min(1, t.l/20); ctx.fillStyle=t.c; ctx.font="bold 16px Arial"; ctx.strokeStyle="#000"; ctx.lineWidth=3; ctx.strokeText(t.t,t.x,t.y); ctx.fillText(t.t,t.x,t.y); ctx.globalAlpha = 1.0; t.y-=0.2; t.l--; if(t.l<=0) floatTexts.splice(i,1); }
}
function loop() { render(); requestAnimationFrame(loop); }

function renderLore() {
    let unlockedLores = [];
    for(let i=1; i<=LORE_TXT.length; i++) { if(state.codex.has('LORE_'+i)) unlockedLores.push(i-1); }
    
    let lh = ''; 
    for(let i = unlockedLores.length - 1; i >= 0; i--) { 
        lh += `<p style="margin-bottom:12px; border-bottom:1px solid #444; padding-bottom:8px;">${LORE_TXT[unlockedLores[i]]}</p>`; 
    }
    $('lore-view').innerHTML = `<h2 style="text-align:center; color:#fff; margin-bottom:10px;">📜 靈魂記憶</h2>
        <div style="font-size:0.95em; color:#ddd; line-height:1.6; padding:15px; background:#252530; border-radius:8px; border-left:3px solid var(--hl); overflow-y:auto; flex:1; margin-bottom:20px;">${lh || '尚無記憶碎片...'}</div>`;
}

loadGame(); if(state.battlePhase !== 'NONE') { state.battlePhase = 'NONE'; genDoors(); } else { genDoors(); } updateTop();
if (state.lore === 0 && state.floor === 1 && state.room === 1) { setTimeout(() => { state.lore = 1; state.loreFloorCount = 1; showLoreModal(1); }, 500); }
</script>
</body>
</html>
