<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>冒險者公會物語：無盡迷宮</title>
<style>
/* ============================================================
   設計系統：羊皮紙公會帳冊
   色彩：
   --parchment: #ECE0C5 (羊皮紙底)
   --parchment-dark: #D8C79E
   --ink: #2B1D14 (墨色文字)
   --leather: #5C3A26 (皮革深棕，邊框/面板)
   --leather-dark: #3B2417
   --seal-red: #8C2F2F (印章紅，強調/危險)
   --gold: #B8893B (金色，貨幣/稀有)
   --emerald: #3E6B4F (綠色，治療/成功)
   字體：標題用襯線粗體模擬刻印感，正文用易讀襯線
   ============================================================ */

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  background: #1b120c;
  font-family: "PingFang TC", "Microsoft JhengHei", "Noto Serif TC", serif;
  color: #2B1D14;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

:root {
  --parchment: #ECE0C5;
  --parchment-dark: #D8C79E;
  --parchment-darker: #c4b186;
  --ink: #2B1D14;
  --ink-soft: #5a4632;
  --leather: #5C3A26;
  --leather-dark: #3B2417;
  --leather-darker: #2a1810;
  --seal-red: #8C2F2F;
  --seal-red-bright: #b13e3e;
  --gold: #B8893B;
  --gold-bright: #e0ab4f;
  --emerald: #3E6B4F;
  --emerald-bright: #569470;
  --steel: #5b6b78;
  --shadow: rgba(20, 12, 6, 0.45);
}

#app {
  position: relative;
  width: 100%; height: 100%;
  max-width: 560px;
  margin: 0 auto;
  background: var(--parchment);
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.screen.active { display: flex; }

/* ---------------- 紋理背景 ---------------- */
.screen, #view-container {
  background-image:
    radial-gradient(ellipse at top, rgba(255,255,255,0.08), transparent 60%),
    repeating-linear-gradient(0deg, rgba(120,95,55,0.025) 0px, rgba(120,95,55,0.025) 2px, transparent 2px, transparent 4px);
}

/* ---------------- 啟動畫面 ---------------- */
#screen-boot {
  background: linear-gradient(160deg, var(--leather-darker), var(--leather-dark) 55%, var(--leather));
  justify-content: center;
  align-items: center;
}
.boot-wrap {
  text-align: center;
  padding: 32px;
  color: var(--parchment);
}
.boot-emblem {
  font-size: 54px;
  color: var(--gold-bright);
  text-shadow: 0 0 18px rgba(224,171,79,0.5);
  margin-bottom: 6px;
  animation: emblemFloat 3.2s ease-in-out infinite;
}
@keyframes emblemFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
.boot-title {
  font-size: 30px;
  letter-spacing: 4px;
  margin: 4px 0 2px;
  font-weight: 900;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
}
.boot-sub {
  font-size: 15px;
  letter-spacing: 10px;
  color: var(--gold-bright);
  margin-bottom: 40px;
}
.boot-actions { display: flex; flex-direction: column; gap: 14px; align-items: center; }
.boot-footnote { margin-top: 30px; font-size: 12px; color: rgba(236,224,197,0.5); letter-spacing: 2px; }

/* ---------------- 通用按鈕 ---------------- */
.btn-main, .btn-secondary, .btn-list, .action-btn, .nav-btn, .topbar-btn, .icon-btn {
  font-family: inherit;
  cursor: pointer;
  border: none;
  outline: none;
}
.btn-main {
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  color: var(--leather-darker);
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 2px;
  padding: 14px 38px;
  border-radius: 6px;
  border: 2px solid rgba(0,0,0,0.25);
  box-shadow: 0 4px 0 rgba(0,0,0,0.35), 0 6px 14px rgba(0,0,0,0.3);
  min-width: 220px;
  transition: transform 0.08s;
}
.btn-main:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.35); }
.btn-main:disabled { opacity: 0.4; }
.btn-secondary {
  background: rgba(236,224,197,0.08);
  color: var(--parchment);
  font-size: 14px;
  padding: 10px 30px;
  border-radius: 6px;
  border: 1.5px solid rgba(236,224,197,0.35);
  min-width: 220px;
}
.btn-secondary:active { background: rgba(236,224,197,0.18); }

/* ---------------- 公會命名畫面 ---------------- */
#screen-namesetup { background: var(--parchment); justify-content: center; align-items: center; }
.setup-wrap { width: 86%; text-align: center; }
.setup-title { font-size: 24px; color: var(--leather-dark); margin-bottom: 6px; letter-spacing: 2px; }
.setup-desc { font-size: 13px; color: var(--ink-soft); margin-bottom: 22px; line-height: 1.6; }
.text-input {
  width: 100%; padding: 13px 14px; font-size: 16px;
  border: 2px solid var(--leather); border-radius: 6px;
  background: rgba(255,255,255,0.5); color: var(--ink);
  margin-bottom: 22px; text-align: center; font-weight: 700;
}
.text-input:focus { border-color: var(--gold); }

/* ---------------- 頂部狀態列 ---------------- */
#topbar {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 12px;
  background: linear-gradient(180deg, var(--leather), var(--leather-dark));
  border-bottom: 3px solid var(--leather-darker);
  flex-shrink: 0;
  position: relative; z-index: 5;
}
.topbar-item {
  color: var(--parchment);
  font-size: 13px;
  font-weight: 700;
  background: rgba(0,0,0,0.22);
  padding: 6px 10px;
  border-radius: 5px;
  flex-shrink: 0;
}
#topbar-day { flex: 0 0 auto; }
.topbar-btn {
  margin-left: auto;
  background: rgba(0,0,0,0.25);
  color: var(--gold-bright);
  font-size: 18px;
  width: 36px; height: 36px;
  border-radius: 5px;
}
.topbar-btn:active { background: rgba(0,0,0,0.4); }

/* ---------------- 視圖容器 ---------------- */
#view-container {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px 90px;
  position: relative;
}
#screen-game { display: none; flex-direction: column; }
#screen-game.active { display: flex; }
#screen-game #view-container { padding-bottom: 90px; }
#screen-game.no-nav #bottom-nav { display: none; }
#screen-game.no-nav #view-container { padding-bottom: 14px; }

/* ---------------- 底部導航 ---------------- */
.bottom-nav {
  position: absolute; left: 0; right: 0; bottom: 0;
  display: flex;
  background: linear-gradient(0deg, var(--leather-darker), var(--leather-dark));
  border-top: 3px solid var(--leather-darker);
  padding: 6px 4px calc(6px + env(safe-area-inset-bottom, 0px));
  z-index: 10;
}
.nav-btn {
  flex: 1;
  background: transparent;
  color: rgba(236,224,197,0.55);
  font-size: 12px;
  font-weight: 700;
  padding: 9px 2px;
  border-radius: 6px;
  margin: 0 2px;
  letter-spacing: 1px;
}
.nav-btn.active {
  background: rgba(184,137,59,0.25);
  color: var(--gold-bright);
  box-shadow: inset 0 0 0 1px rgba(224,171,79,0.4);
}

/* ---------------- 卡片 / 面板 通用樣式 ---------------- */
.panel {
  background: var(--parchment-dark);
  border: 2px solid var(--leather);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(255,255,255,0.15);
}
.panel-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--leather-dark);
  margin: 0 0 8px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--leather);
  display: flex; align-items: center; justify-content: space-between;
}
.section-label {
  font-size: 11px; color: var(--ink-soft); letter-spacing: 1px; margin-bottom: 6px; font-weight: 700;
}

.card {
  background: var(--parchment);
  border: 1.5px solid var(--leather);
  border-radius: 7px;
  padding: 10px;
  margin-bottom: 9px;
  position: relative;
}
.card.clickable:active { background: var(--parchment-darker); }
.card-row { display: flex; align-items: center; gap: 10px; }
.card-row + .card-row { margin-top: 6px; }

.adv-card {
  display: flex; gap: 10px; align-items: center;
  background: var(--parchment);
  border: 1.5px solid var(--leather);
  border-radius: 7px;
  padding: 9px 10px;
  margin-bottom: 8px;
}
.adv-portrait {
  width: 46px; height: 46px; border-radius: 6px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  border: 2px solid var(--leather);
  background: linear-gradient(160deg, #fff, var(--parchment-darker));
}
.adv-info { flex: 1; min-width: 0; }
.adv-name-row { display: flex; align-items: baseline; gap: 6px; }
.adv-name { font-size: 14.5px; font-weight: 800; color: var(--ink); }
.adv-tag { font-size: 10.5px; color: var(--ink-soft); background: rgba(92,58,38,0.12); padding: 1px 6px; border-radius: 4px; }
.adv-sub { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; }
.hpbar-wrap { margin-top: 4px; }
.bar-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.18); border-radius: 4px; overflow: hidden; margin-top: 2px; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.25s ease; }
.bar-hp { background: linear-gradient(90deg, #9e3a3a, #c95757); }
.bar-mp { background: linear-gradient(90deg, #2f6fa8, #5b9bd5); }
.bar-exp { background: linear-gradient(90deg, #b8893b, #e0ab4f); }
.bar-label { font-size: 9.5px; color: var(--ink-soft); display: flex; justify-content: space-between; }

.status-badges { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
.status-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--seal-red); color: #fff; }

/* ---------------- 按鈕：列表型 / 動作型 ---------------- */
.btn-list {
  width: 100%;
  background: var(--parchment);
  border: 1.5px solid var(--leather);
  border-radius: 7px;
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 9px;
  text-align: left;
}
.btn-list:active { background: var(--parchment-darker); }
.btn-list.close-btn { text-align: center; background: var(--leather); color: var(--parchment); }

.action-btn {
  background: linear-gradient(180deg, #fff, var(--parchment-darker));
  border: 1.5px solid var(--leather);
  border-radius: 6px;
  padding: 9px 6px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink);
}
.action-btn:active { background: var(--parchment-darker); }
.action-btn.primary { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: var(--leather-darker); border-color: rgba(0,0,0,0.3); }
.action-btn.danger { background: linear-gradient(180deg, var(--seal-red-bright), var(--seal-red)); color: #fff; border-color: rgba(0,0,0,0.3); }
.action-btn.success { background: linear-gradient(180deg, var(--emerald-bright), var(--emerald)); color: #fff; border-color: rgba(0,0,0,0.3); }
.action-btn:disabled { opacity: 0.35; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }

/* ---------------- 標題列（含返回按鈕） ---------------- */
.view-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.view-back {
  width: 34px; height: 34px; border-radius: 6px;
  background: var(--leather); color: var(--parchment);
  font-size: 16px; flex-shrink: 0;
}
.view-heading { font-size: 18px; font-weight: 800; color: var(--leather-dark); letter-spacing: 1px; }
.view-sub { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }

/* ---------------- Tabs ---------------- */
.tab-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
.tab-btn {
  flex-shrink: 0;
  background: var(--parchment);
  border: 1.5px solid var(--leather);
  border-radius: 16px;
  padding: 7px 14px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink-soft);
}
.tab-btn.active { background: var(--leather); color: var(--parchment); }

/* ---------------- 浮層 ---------------- */
.overlay {
  position: absolute; inset: 0;
  background: rgba(20,12,6,0.55);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 50;
}
.overlay.active { display: flex; }
.overlay-panel {
  width: 100%;
  max-height: 86%;
  background: var(--parchment);
  border-radius: 16px 16px 0 0;
  border-top: 3px solid var(--leather);
  padding: 18px 16px calc(18px + env(safe-area-inset-bottom, 0px));
  overflow-y: auto;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.4);
  animation: slideUp 0.22s ease-out;
}
@keyframes slideUp { from { transform: translateY(40px); opacity:0.5; } to { transform: translateY(0); opacity:1; } }
.overlay-panel h3 { margin: 0 0 14px; font-size: 17px; color: var(--leather-dark); }

/* 置中型彈窗（用於戰鬥結果等） */
.overlay.center-modal { align-items: center; }
.overlay.center-modal .overlay-panel { border-radius: 14px; max-width: 92%; }

/* ---------------- Toast ---------------- */
#toast-container { position: absolute; top: 56px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 100; pointer-events: none; }
.toast {
  background: rgba(43,29,20,0.92); color: var(--parchment);
  padding: 9px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  animation: toastIn 0.25s ease-out, toastOut 0.3s ease-in 1.8s forwards;
  max-width: 84%; text-align: center;
}
@keyframes toastIn { from { opacity:0; transform: translateY(-8px);} to {opacity:1; transform: translateY(0);} }
@keyframes toastOut { to { opacity:0; transform: translateY(-6px);} }

/* ---------------- 地下城探索 ---------------- */
#dungeon-view { display: flex; flex-direction: column; height: 100%; }
.dungeon-status-bar { display: flex; gap: 6px; padding: 0 0 8px; flex-wrap: wrap; }
.dungeon-pill { background: var(--leather); color: var(--parchment); font-size: 11.5px; padding: 5px 10px; border-radius: 12px; font-weight: 700; }
#dungeon-canvas-wrap { position: relative; width: 100%; aspect-ratio: 1/1; max-height: 46vh; margin: 0 auto 10px; background: var(--leather-darker); border-radius: 10px; border: 3px solid var(--leather); overflow: hidden; }
#dungeon-canvas { width: 100%; height: 100%; display: block; }
.dpad-wrap { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 6px 0 14px; }
.dpad-grid { display: grid; grid-template-columns: 52px 52px 52px; grid-template-rows: 52px 52px 52px; gap: 4px; }
.dpad-btn { background: var(--leather); color: var(--parchment); font-size: 20px; border-radius: 8px; }
.dpad-btn:active { background: var(--leather-darker); }
.dpad-btn.empty { background: transparent; }
.dpad-center { background: var(--gold); color: var(--leather-darker); font-size: 11px; font-weight: 800; border-radius: 8px; }

.party-strip { display: flex; gap: 6px; margin-bottom: 8px; }
.party-mini { flex: 1; background: var(--parchment); border: 1.5px solid var(--leather); border-radius: 7px; padding: 6px; text-align: center; }
.party-mini-name { font-size: 11px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.party-mini .bar-bg { height: 6px; }

/* ---------------- 戰鬥畫面 ---------------- */
#battle-view { display: flex; flex-direction: column; height: 100%; }
#battle-canvas-wrap { position: relative; width: 100%; height: 38vh; min-height: 230px; background: linear-gradient(180deg, #2c1f17, #1b120c); border-radius: 10px; border: 3px solid var(--leather); overflow: hidden; margin-bottom: 8px; flex-shrink: 0; }
#battle-canvas { width: 100%; height: 100%; display: block; }
#battle-log { background: rgba(43,29,20,0.85); color: var(--parchment); font-size: 11.5px; padding: 7px 10px; border-radius: 7px; height: 54px; overflow-y: auto; margin-bottom: 8px; line-height: 1.5; flex-shrink: 0; }
#battle-party-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
.battle-unit-card { display: flex; align-items: center; gap: 8px; background: var(--parchment); border: 1.5px solid var(--leather); border-radius: 6px; padding: 6px 8px; }
.battle-unit-card.dead { opacity: 0.4; }
.battle-unit-card.acting { box-shadow: 0 0 0 2px var(--gold); }
.battle-unit-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
.battle-unit-bars { flex: 1; min-width: 0; }
.battle-unit-name { font-size: 11.5px; font-weight: 700; display: flex; justify-content: space-between; }
#battle-actions { margin-top: auto; }
.battle-action-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; margin-bottom: 6px; }
.battle-action-btn { background: var(--leather); color: var(--parchment); font-size: 11.5px; font-weight: 700; padding: 11px 2px; border-radius: 6px; }
.battle-action-btn:active { background: var(--leather-darker); }
.battle-action-btn.disabled { opacity: 0.35; }
.battle-sub-panel { background: var(--parchment-dark); border: 1.5px solid var(--leather); border-radius: 7px; padding: 8px; margin-bottom: 6px; max-height: 30vh; overflow-y: auto; }
.skill-option, .item-option, .target-option {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--parchment); border: 1.5px solid var(--leather);
  border-radius: 6px; padding: 9px 10px; margin-bottom: 6px; font-size: 12.5px;
}
.skill-option .name, .item-option .name, .target-option .name { font-weight: 700; }
.skill-option .desc, .item-option .desc { font-size: 10.5px; color: var(--ink-soft); }
.target-option { justify-content: flex-start; gap: 8px; }
.target-hp-mini { font-size: 10px; color: var(--ink-soft); }

/* 戰鬥特效畫面用 canvas overlay */
.dmg-float {
  position: absolute; font-weight: 900; font-size: 18px; color: #fff;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.6); pointer-events: none;
  animation: dmgFloat 0.9s ease-out forwards;
}
@keyframes dmgFloat { 0%{ transform: translateY(0) scale(0.8); opacity:1;} 30%{transform: translateY(-14px) scale(1.15);} 100%{ transform: translateY(-42px) scale(1); opacity:0;} }
.dmg-float.crit { color: var(--gold-bright); font-size: 23px; }
.dmg-float.heal { color: #79e0a0; }

/* ---------------- 裝備/物品列表 ---------------- */
.item-card { display:flex; align-items:center; gap:10px; background: var(--parchment); border:1.5px solid var(--leather); border-radius:7px; padding:9px 10px; margin-bottom:8px; }
.item-icon { width:36px; height:36px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; border:2px solid; }
.item-info { flex:1; min-width:0; }
.item-name { font-size:13px; font-weight:800; }
.item-sub { font-size:10.5px; color: var(--ink-soft); margin-top:1px; }
.item-affixes { font-size:10px; color: var(--emerald); margin-top:2px; }

/* ---------------- 空狀態 ---------------- */
.empty-state { text-align: center; padding: 30px 10px; color: var(--ink-soft); font-size: 13px; }
.empty-state .emoji { font-size: 32px; display:block; margin-bottom: 8px; }

/* ---------------- 確認彈窗按鈕列 ---------------- */
.modal-btn-row { display: flex; gap: 8px; margin-top: 14px; }
.modal-btn-row .action-btn { flex: 1; padding: 12px; font-size: 13.5px; }

/* fx canvas 全螢幕覆蓋層（用於螢幕震動/閃爍特效，平常透明不擋互動） */
#fx-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: 0; }

/* 滾動條美化（webkit） */
#view-container::-webkit-scrollbar, .overlay-panel::-webkit-scrollbar, .battle-sub-panel::-webkit-scrollbar { width: 4px; }
#view-container::-webkit-scrollbar-thumb, .overlay-panel::-webkit-scrollbar-thumb { background: var(--leather); border-radius: 2px; }

/* 小工具：徽章 */
.badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:4px; font-weight:700; }
.badge-rank { background: var(--gold); color: var(--leather-darker); }
.badge-elite { background: var(--seal-red); color: #fff; }
.badge-boss { background: linear-gradient(90deg,#5e2424,#8c2f2f); color:#fff; }

.divider { height: 1px; background: var(--leather); opacity: 0.3; margin: 10px 0; }

.flex-between { display: flex; justify-content: space-between; align-items: center; }
.mt-8 { margin-top: 8px; }
.text-center { text-align: center; }

<body>

<div id="app">
  <!-- 啟動畫面 -->
  <div id="screen-boot" class="screen active">
    <div class="boot-wrap">
      <div class="boot-emblem">⚔</div>
      <h1 class="boot-title">冒險者公會物語</h1>
      <div class="boot-sub">無 盡 迷 宮</div>
      <div class="boot-actions">
        <button class="btn-main" id="btn-new-game">建立新公會</button>
        <button class="btn-secondary" id="btn-continue">繼續紀錄</button>
      </div>
      <div class="boot-footnote">輕觸畫面開始你的傳奇</div>
    </div>
  </div>

  <!-- 新遊戲：公會命名 -->
  <div id="screen-namesetup" class="screen">
    <div class="setup-wrap">
      <h2 class="setup-title">創建公會</h2>
      <p class="setup-desc">為你的公會取一個名字，這將被記入世界史冊。</p>
      <input type="text" id="input-guild-name" class="text-input" placeholder="例如：晨曦之劍公會" maxlength="14">
      <button class="btn-main" id="btn-confirm-guild">啟程</button>
    </div>
  </div>

  <!-- 主要遊戲畫面容器 -->
  <div id="screen-game" class="screen">
    <!-- 頂部狀態列 -->
    <div id="topbar">
      <div class="topbar-item" id="topbar-gold">💰 0</div>
      <div class="topbar-item" id="topbar-day">第1日</div>
      <div class="topbar-item" id="topbar-rep">📜 0</div>
      <button id="btn-menu" class="topbar-btn">☰</button>
    </div>

    <!-- 視圖容器：各子畫面切換 -->
    <div id="view-container"></div>

    <!-- 底部導航（城鎮場景用） -->
    <div id="bottom-nav" class="bottom-nav">
      <button class="nav-btn active" data-view="hall">公會</button>
      <button class="nav-btn" data-view="dorm">宿舍</button>
      <button class="nav-btn" data-view="tavern">酒館</button>
      <button class="nav-btn" data-view="shop">商店</button>
      <button class="nav-btn" data-view="smith">鐵匠</button>
      <button class="nav-btn" data-view="training">訓練場</button>
      <button class="nav-btn" data-view="library">圖書館</button>
    </div>
  </div>

  <!-- 浮層：選單 -->
  <div id="overlay-menu" class="overlay">
    <div class="overlay-panel">
      <h3>選單</h3>
      <button class="btn-list" id="menu-save">手動存檔</button>
      <button class="btn-list" id="menu-history">世界歷史紀錄</button>
      <button class="btn-list" id="menu-hof">名人堂</button>
      <button class="btn-list" id="menu-restart">重新開始（清除存檔）</button>
      <button class="btn-list close-btn" id="menu-close">關閉</button>
    </div>
  </div>

  <!-- 浮層：通用彈窗 -->
  <div id="overlay-modal" class="overlay">
    <div class="overlay-panel" id="modal-panel"></div>
  </div>

  <!-- 浮層：Toast 提示 -->
  <div id="toast-container"></div>
</div>

<script>
// ============================================================
// 核心邏輯：角色生成 / 數值計算 / 工具函式
// ============================================================

let _uidCounter = 1;
function genUID(prefix) { return prefix + '_' + (_uidCounter++) + '_' + Math.floor(Math.random()*100000); }

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randf(min, max) { return Math.random() * (max - min) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickWeighted(items, weightKey) {
  const total = items.reduce((s, i) => s + i[weightKey], 0);
  let r = Math.random() * total;
  for (const it of items) { r -= it[weightKey]; if (r <= 0) return it; }
  return items[items.length - 1];
}
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function chance(p) { return Math.random() < p; }

function genName() {
  const isFemale = Math.random() < 0.5;
  const given = isFemale ? pick(GIVEN_F) : pick(GIVEN_M);
  const surname = pick(SURNAMES);
  return { full: given + '·' + surname, gender: isFemale ? 'f' : 'm' };
}

function rollRarity() {
  return pickWeighted(RARITIES, 'weight');
}

// 產生隨機冒險者
function generateAdventurer(minTier) {
  minTier = minTier || 1;
  const raceKey = pick(Object.keys(RACES));
  const race = RACES[raceKey];
  const baseClasses = Object.keys(CLASSES).filter(k => CLASSES[k].tier === 1);
  const classKey = pick(baseClasses);
  const cls = CLASSES[classKey];
  const nameInfo = genName();

  const talent = pick(TALENTS);
  const flaw = pick(FLAWS);

  const level = clamp(minTier + rand(0, 2), 1, 99);

  const stat = {};
  ['str','vit','agi','int','mag','luk'].forEach(k => {
    const base = cls.baseStat[k] || 1;
    const raceMod = race.mod[k] || 0;
    const variance = rand(-1, 1);
    stat[k] = Math.max(1, base + raceMod + variance);
  });

  const adv = {
    uid: genUID('adv'),
    name: nameInfo.full,
    gender: nameInfo.gender,
    race: raceKey,
    classKey: classKey,
    level: level,
    exp: 0,
    talent: talent.id,
    flaw: flaw.id,
    baseStat: stat,
    skillExp: {},
    learnedSkills: cls.skills.slice(0, 2), // 初始學會前兩個技能
    equip: { weapon: null, armor: null, accessory: null },
    hp: 0, maxHp: 0, mp: 0, maxMp: 0,
    status: [],
    inParty: false,
    isResting: false,
    restUntilDay: 0,
    affinity: rand(40, 60), // 對公會的忠誠/好感
    wage: 0,
    bornDay: 0,
    retired: false,
    deceased: false,
    battlesWon: 0,
    promoted: false,
  };
  recalcStats(adv);
  adv.hp = adv.maxHp; adv.mp = adv.maxMp;
  adv.wage = computeWage(adv);
  return adv;
}

function getTalent(adv) { return TALENTS.find(t => t.id === adv.talent) || {effect:{}}; }
function getFlaw(adv) { return FLAWS.find(f => f.id === adv.flaw) || {effect:{}}; }

function getEquipStatBonus(adv) {
  const bonus = { str:0, vit:0, agi:0, int:0, mag:0, luk:0, atk:0, def:0, magAtk:0 };
  EQUIP_SLOTS.forEach(slot => {
    const eq = adv.equip[slot];
    if (!eq) return;
    bonus.atk += eq.atk || 0;
    bonus.def += eq.def || 0;
    bonus.magAtk += eq.mag || 0;
    ['str','vit','agi','int','mag','luk'].forEach(s => { bonus[s] += eq[s] || 0; });
    if (eq.agiPenalty) bonus.agi -= eq.agiPenalty;
    if (eq.affixes) {
      eq.affixes.forEach(ax => {
        if (ax.stat) bonus[ax.stat] = (bonus[ax.stat]||0) + ax.val;
      });
    }
  });
  return bonus;
}

// 重新計算角色最終數值（基礎+等級成長+裝備+天賦）
function recalcStats(adv) {
  const cls = CLASSES[adv.classKey];
  const talent = getTalent(adv);
  const flaw = getFlaw(adv);
  const lv = adv.level;
  const growth = 1 + (lv - 1) * 0.12 * (talent.effect.statGainMul || 1);

  const final = {};
  ['str','vit','agi','int','mag','luk'].forEach(k => {
    final[k] = Math.round(adv.baseStat[k] * growth);
  });

  const eqBonus = getEquipStatBonus(adv);
  ['str','vit','agi','int','mag','luk'].forEach(k => { final[k] += eqBonus[k]; });

  let maxHp = Math.round((20 + final.vit * 6 + lv * 4) * (talent.effect.hpMul || 1) * (flaw.effect.hpMul || 1));
  let maxMp = Math.round(10 + final.int * 3 + final.mag * 2 + lv * 2);

  let atk = Math.round(final.str * 1.5 + eqBonus.atk);
  let magAtk = Math.round(final.mag * 1.6 + eqBonus.magAtk);
  let def = Math.round(final.vit * 0.8 + eqBonus.def);
  let spd = Math.round(final.agi * 1.2);

  if (flaw.effect.atkMul) atk = Math.round(atk * flaw.effect.atkMul);
  if (flaw.effect.defMul) def = Math.round(def * flaw.effect.defMul);
  if (flaw.effect.spdMul) spd = Math.round(spd * flaw.effect.spdMul);

  adv.finalStat = final;
  adv.maxHp = Math.max(10, maxHp);
  adv.maxMp = Math.max(5, maxMp);
  adv.atk = atk; adv.magAtk = magAtk; adv.def = def; adv.spd = spd;
  adv.acc = clamp(0.85 + (talent.effect.accBonus||0) - (flaw.effect.accPenalty||0), 0.5, 0.99);
  adv.crit = clamp(0.05 + final.luk * 0.01 + (talent.effect.critBonus||0) - (flaw.effect.critPenalty||0), 0.02, 0.6);
  adv.evade = clamp(0.03 + final.agi * 0.005, 0.0, 0.35);

  if (adv.hp > adv.maxHp) adv.hp = adv.maxHp;
  if (adv.mp > adv.maxMp) adv.mp = adv.maxMp;
}

function computeWage(adv) {
  const flaw = getFlaw(adv);
  const talent = getTalent(adv);
  let w = 10 + adv.level * 4;
  if (flaw.effect.wageMul) w *= flaw.effect.wageMul;
  if (talent.effect.costDiscount) w *= (1 - talent.effect.costDiscount * 0.5);
  return Math.round(w);
}

function gainExp(adv, amount) {
  adv.exp += amount;
  let leveled = false;
  let needed = expNeeded(adv.level);
  while (adv.exp >= needed && adv.level < 99) {
    adv.exp -= needed;
    adv.level++;
    leveled = true;
    needed = expNeeded(adv.level);
  }
  if (leveled) recalcStats(adv);
  return leveled;
}
function expNeeded(level) { return Math.round(20 * Math.pow(level, 1.5)); }

function canPromote(adv) {
  const opts = PROMOTIONS[adv.classKey];
  return opts && adv.level >= 10 && !adv.promoted;
}

function promoteClass(adv, newClassKey) {
  adv.classKey = newClassKey;
  adv.promoted = true;
  const cls = CLASSES[newClassKey];
  cls.skills.forEach(s => { if (!adv.learnedSkills.includes(s) && adv.learnedSkills.length < 4) adv.learnedSkills.push(s); });
  recalcStats(adv);
}

// 裝備生成
function generateEquipment(slot, tier) {
  tier = tier || 1;
  const base = pick(EQUIP_BASE[slot]);
  const rarity = rollRarity();
  const tierMul = 1 + (tier - 1) * 0.35;
  const item = {
    uid: genUID('eq'),
    slot: slot,
    baseName: base.name,
    name: base.name,
    rarity: rarity.id,
    rarityName: rarity.name,
    color: rarity.color,
    atk: base.atk ? Math.round(base.atk * rarity.mul * tierMul) : 0,
    def: base.def ? Math.round(base.def * rarity.mul * tierMul) : 0,
    mag: base.mag ? Math.round(base.mag * rarity.mul * tierMul) : 0,
    agiPenalty: base.agiPenalty || 0,
    classAffinity: base.classAffinity || null,
    affixes: [],
    str:0, vit:0, agi:0, int:0, luk:0,
    sellPrice: 0,
  };
  for (let i = 0; i < rarity.affixCount; i++) {
    const ax = pick(AFFIXES);
    if (item.affixes.find(a => a.id === ax.id)) continue;
    item.affixes.push(ax);
    if (ax.stat) item[ax.stat] += ax.val;
  }
  if (item.affixes.length) {
    item.name = item.affixes.map(a => a.name).join('・') + ' ' + base.name;
  }
  let sell = (item.atk + item.def + item.mag) * 4 * rarity.mul + item.affixes.length * 25;
  item.sellPrice = Math.max(10, Math.round(sell));
  return item;
}

function elementMultiplier(attackElem, defenderTags) {
  if (!attackElem || attackElem === 'none') return 1.0;
  if (!defenderTags) return 1.0;
  const advList = ELEM_ADVANTAGE[attackElem] || [];
  for (const t of defenderTags) { if (advList.includes(t)) return 1.5; }
  // 被剋
  for (const key in ELEM_ADVANTAGE) {
    if (ELEM_ADVANTAGE[key].includes(attackElem) && defenderTags.includes(key)) return 0.7;
  }
  return 1.0;
}

function formatNum(n) { return Math.round(n).toLocaleString('zh-TW'); }

<script>
// ============================================================
// 怪物生成 / 地下城程序生成
// ============================================================

const MONSTER_NAME_PREFIX = ['野生的','凶暴的','飢餓的','潛伏的','古老的','腐敗的','瘋狂的','警戒的'];

function generateMonster(tier, opts) {
  opts = opts || {};
  const pool = Object.keys(MONSTER_FAMILIES).filter(k => {
    const m = MONSTER_FAMILIES[k];
    if (opts.bossOnly) return m.boss && m.tier <= tier + 1;
    if (m.boss) return false;
    return m.tier <= tier;
  });
  const key = pick(pool.length ? pool : Object.keys(MONSTER_FAMILIES));
  const fam = MONSTER_FAMILIES[key];
  const isElite = !!opts.elite;
  const level = clamp(tier + rand(-1, 1), 1, 99);

  const baseHp = 18 + fam.tier * 14 + level * 6;
  const baseAtk = 4 + fam.tier * 2.6 + level * 1.6;
  const baseDef = 2 + fam.tier * 1.8 + level * 0.9;
  const baseSpd = 4 + fam.tier * 1.2 + level * 0.6;

  const eliteMul = isElite ? 1.7 : 1.0;
  const bossMul = fam.boss ? 3.2 : 1.0;

  const tags = [fam.elem].filter(e => e !== 'none');
  if (fam.boss) tags.push('boss');
  if (isElite) tags.push('elite');

  const mon = {
    uid: genUID('mon'),
    key, name: (isElite ? '【精英】' : '') + (fam.boss ? '【首領】' : '') + (Math.random()<0.3 && !fam.boss ? pick(MONSTER_NAME_PREFIX) : '') + fam.name,
    elem: fam.elem,
    tags,
    isElite, isBoss: !!fam.boss,
    level,
    maxHp: Math.round(baseHp * eliteMul * bossMul),
    hp: 0,
    atk: Math.round(baseAtk * eliteMul * bossMul),
    def: Math.round(baseDef * eliteMul),
    spd: Math.round(baseSpd * (isElite?1.15:1)),
    acc: 0.82,
    crit: 0.05 + fam.tier * 0.01,
    evade: 0.03 + (fam.tier>=3?0.05:0),
    expReward: Math.round((10 + fam.tier * 8 + level * 4) * eliteMul * bossMul),
    goldReward: Math.round((8 + fam.tier * 6 + level * 3) * eliteMul * bossMul),
    skills: [],
    status: [],
  };
  mon.hp = mon.maxHp;

  // 怪物技能傾向
  if (fam.tier >= 2) mon.skills.push('mon_heavy_strike');
  if (fam.elem !== 'none') mon.skills.push('mon_elem_blast');
  if (fam.boss) mon.skills.push('mon_aoe_roar');

  return mon;
}

function generateMonsterGroup(floorTier, roomType) {
  let count;
  if (roomType === 'boss') count = 1;
  else if (roomType === 'elite') count = rand(1, 2);
  else count = rand(1, 3);

  const group = [];
  for (let i = 0; i < count; i++) {
    group.push(generateMonster(floorTier, { elite: roomType === 'elite', bossOnly: roomType === 'boss' }));
  }
  return group;
}

// ---------------- 地下城程序生成 ----------------
// 地圖以簡單格狀網格表示，每格為一個「房間節點」

const ROOM_TYPES = ['empty','monster','elite','treasure','trap','event','npc','exit','boss','hidden'];

function generateDungeonFloor(floorNum, dungeonRank) {
  // floorNum: 第幾層；dungeonRank: 地下城難度等級（影響怪物tier）
  const size = clamp(5 + Math.floor(floorNum / 3), 5, 9); // grid size
  const isBossFloor = floorNum % 5 === 0;
  const isEliteFloor = !isBossFloor && floorNum % 3 === 0;

  const grid = [];
  for (let y = 0; y < size; y++) {
    const row = [];
    for (let x = 0; x < size; x++) row.push(null);
    grid.push(row);
  }

  // 隨機遊走生成可走通路，確保連通（保證終止：frontier 為空才停止，且每格只入隊一次）
  const startX = Math.floor(size/2), startY = size - 1;
  const visited = new Set([startX+','+startY]);
  const cells = [[startX, startY]];
  grid[startY][startX] = { type:'start', x:startX, y:startY };

  const targetCellCount = Math.min(size*size, Math.floor(size * size * 0.55) + 4);
  // frontier: 所有「已訪問格的未訪問鄰居」，每次隨機抽一個來開通
  let frontier = [];
  function pushNeighborsToFrontier(x, y) {
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dx,dy] of dirs) {
      const nx = x+dx, ny = y+dy;
      if (nx<0||ny<0||nx>=size||ny>=size) continue;
      const key = nx+','+ny;
      if (visited.has(key)) continue;
      frontier.push([nx, ny]);
    }
  }
  pushNeighborsToFrontier(startX, startY);

  while (visited.size < targetCellCount && frontier.length > 0) {
    const idx = Math.floor(Math.random() * frontier.length);
    const [nx, ny] = frontier[idx];
    frontier.splice(idx, 1);
    const key = nx+','+ny;
    if (visited.has(key)) continue; // 可能在加入frontier後已被其他路徑訪問
    visited.add(key);
    grid[ny][nx] = { type:'pending', x:nx, y:ny };
    cells.push([nx, ny]);
    pushNeighborsToFrontier(nx, ny);
  }

  // 找離起點最遠的格作為出口/Boss房
  let farthest = [startX, startY], farthestDist = -1;
  cells.forEach(([x,y]) => {
    const d = Math.abs(x-startX) + Math.abs(y-startY);
    if (d > farthestDist) { farthestDist = d; farthest = [x,y]; }
  });

  cells.forEach(([x,y]) => {
    if (x === startX && y === startY) return;
    grid[y][x].type = 'pending';
  });

  const [exitX, exitY] = farthest;
  grid[exitY][exitX].type = isBossFloor ? 'boss' : 'exit';

  // 為其餘 pending 房間分配類型
  cells.forEach(([x, y]) => {
    const cell = grid[y][x];
    if (cell.type !== 'pending') return;
    let roll = Math.random();
    let type;
    if (isEliteFloor && roll < 0.12) type = 'elite';
    else if (roll < 0.40) type = 'monster';
    else if (roll < 0.55) type = 'treasure';
    else if (roll < 0.65) type = 'trap';
    else if (roll < 0.78) type = 'event';
    else if (roll < 0.85) type = 'npc';
    else if (roll < 0.90) type = 'hidden';
    else type = 'empty';
    cell.type = type;
  });

  // 標記隱藏房間為需發現
  cells.forEach(([x,y]) => {
    const cell = grid[y][x];
    if (cell.type === 'hidden') cell.discovered = false;
    cell.visited = false;
    cell.cleared = false;
  });

  return {
    floorNum, size, grid,
    startX, startY,
    playerX: startX, playerY: startY,
    dungeonRank,
    isBossFloor, isEliteFloor,
  };
}

const RANDOM_EVENTS = [
  { id:'wandering_merchant', name:'流浪商人', desc:'一位神秘商人出現，提供稀有商品交易的機會。', type:'merchant' },
  { id:'ancient_shrine', name:'古老神壇', desc:'神壇散發微光，獻上祈禱或許能獲得祝福……或詛咒。', type:'gamble_blessing' },
  { id:'wounded_traveler', name:'受傷的旅人', desc:'一位旅人倒在地上，看起來需要幫助。', type:'rescue' },

  { id:'monster_nest', name:'怪物巢穴', desc:'眼前是一處怪物巢穴，可以選擇繞過或主動攻擊獲得豐厚獎勵。', type:'high_risk_fight' },
  { id:'mysterious_door', name:'神秘之門', desc:'一扇散發奇異氣息的門，內部似乎封印著什麼。', type:'vault' },
  { id:'old_bones', name:'冒險者遺骸', desc:'似乎是前人遺留下的裝備，能否帶走全憑你的判斷。', type:'loot_or_curse' },
  { id:'singing_statue', name:'歌唱的石像', desc:'石像吟唱古老旋律，似乎能為隊伍帶來啟發。', type:'exp_bonus' },
];

function rollRandomEvent() { return pick(RANDOM_EVENTS); }

const NPC_ENCOUNTERS = [
  { id:'retired_hero', name:'隱居的英雄', desc:'一位曾經的傳奇冒險者隱居於此，願意傳授心得。', type:'mentor' },
  { id:'lost_child', name:'迷路的孩子', desc:'一個迷路的孩子蜷縮在角落，似乎在等待救援。', type:'rescue_child' },
  { id:'rival_guild', name:'敵對公會冒險者', desc:'另一個公會的冒險者似乎想試探你們的實力。', type:'rival_duel' },
  { id:'hermit_sage', name:'隱士賢者', desc:'一位隱士願意以物易物，交換罕見的知識。', type:'trade_knowledge' },
];
function rollNPCEncounter() { return pick(NPC_ENCOUNTERS); }

<script>
// ============================================================
// 回合制戰鬥系統
// ============================================================

const MONSTER_SKILLS = {
  mon_heavy_strike: { name:'重擊', power:1.5, type:'phys' },
  mon_elem_blast: { name:'元素爆發', power:1.4, type:'magic' },
  mon_aoe_roar: { name:'怒吼', power:1.0, type:'phys', target:'all' },
};

function createBattleState(party, monsters, context) {
  return {
    party: party.map(p => ({...p, battleHp: p.hp, battleMp: p.mp, statusFx: [], shield:0, buffs:{}, summons:[]})),
    monsters: monsters.map(m => ({...m, battleHp: m.hp, statusFx:[], buffs:{}})),
    turn: 1,
    log: [],
    events: [], // 結構化事件佇列，供UI逐步播放動畫: {kind, sourceUid, sourceSide, targetUid, targetSide, amount, isCrit, isMiss, isHeal, text, ...}
    over: false,
    victory: false,
    context: context || {},
    fled: false,
  };
}

// 推送一個可供UI播放動畫的戰鬥事件，並同步寫入文字log
function pushEvent(state, evt) {
  state.events.push(evt);
  if (evt.text) state.log.push(evt.text);
}

function findUnitSide(state, uid) {
  if (state.party.find(p => p.uid === uid)) return 'party';
  if (state.monsters.find(m => m.uid === uid)) return 'monster';
  return null;
}

function getUnitTags(unit) {
  if (unit.tags) return unit.tags;
  return [];
}

function rollHit(attackerAcc, defenderEvade) {
  const finalChance = clamp(attackerAcc - defenderEvade, 0.15, 0.98);
  return Math.random() < finalChance;
}

function rollCrit(critChance) { return Math.random() < critChance; }

function applyStatus(unit, statusId, chance) {
  if (!chance || Math.random() > chance) return false;
  if (unit.statusFx.find(s => s.id === statusId)) return false;
  const durations = { poison: 3, frozen: 2, paralyze: 2, stun: 1, burn: 3 };
  unit.statusFx.push({ id: statusId, turns: durations[statusId] || 2 });
  return true;
}

const STATUS_NAME = { poison:'中毒', frozen:'凍結', paralyze:'麻痺', stun:'眩暈', burn:'燒傷' };

function processStatusTick(unit, hpField, maxHpField, state, name, side, uid) {
  let skip = false;
  unit.statusFx = unit.statusFx.filter(s => {
    if (s.id === 'poison' || s.id === 'burn') {
      const dmg = Math.round((unit[maxHpField] || unit.maxHp) * 0.06);
      unit[hpField] = Math.max(0, unit[hpField] - dmg);
      pushEvent(state, { kind:'status_damage', targetUid:uid, targetSide:side, amount:dmg, statusId:s.id, text:`${name} 因${STATUS_NAME[s.id]}受到 ${dmg} 點傷害` });
      if (unit[hpField] <= 0) pushEvent(state, { kind:'death', targetUid:uid, targetSide:side, text:`${name} 倒下了！` });
    }
    if (s.id === 'frozen' || s.id === 'paralyze' || s.id === 'stun') {
      if (Math.random() < 0.7) skip = true;
    }
    s.turns--;
    return s.turns > 0;
  });
  return skip;
}

// 計算單次傷害
function computeDamage(attacker, defender, opts) {
  opts = opts || {};
  const isMagic = opts.isMagic;
  let baseAtk = isMagic ? (attacker.magAtk || attacker.atk) : attacker.atk;
  let power = opts.power || 1.0;
  let baseDef = defender.def || 0;
  if (opts.ignoreDef) baseDef *= (1 - opts.ignoreDef);

  let dmg = Math.max(1, baseAtk * power - baseDef * 0.6);

  const elemMul = elementMultiplier(opts.elem, getUnitTags(defender));
  dmg *= elemMul;

  let isCrit = rollCrit((attacker.crit || 0.05) + (opts.critBonus || 0));
  if (isCrit) dmg *= 1.8;

  dmg *= randf(0.9, 1.1);
  dmg = Math.round(dmg);

  return { dmg: Math.max(1, dmg), isCrit, elemMul };
}

function aliveMonsters(state) { return state.monsters.filter(m => m.battleHp > 0); }
function aliveParty(state) { return state.party.filter(p => p.battleHp > 0); }

function checkBattleEnd(state) {
  if (aliveMonsters(state).length === 0) { state.over = true; state.victory = true; }
  else if (aliveParty(state).length === 0) { state.over = true; state.victory = false; }
}

// 執行玩家動作：action = {type:'attack'|'skill'|'item'|'defend'|'flee', actorUid, skillId, targetUid, itemId}
function executePlayerAction(state, action) {
  const actor = state.party.find(p => p.uid === action.actorUid);
  if (!actor || actor.battleHp <= 0) return;

  if (action.type === 'defend') {
    actor.buffs.guard = 1;
    pushEvent(state, { kind:'defend', sourceUid:actor.uid, sourceSide:'party', text:`${actor.name} 採取防禦姿態` });
    return;
  }
  if (action.type === 'flee') {
    const fleeChance = 0.5 + (actor.spd || 0) * 0.005;
    if (Math.random() < fleeChance) {
      state.over = true; state.fled = true; state.victory = false;
      pushEvent(state, { kind:'flee_success', sourceUid:actor.uid, sourceSide:'party', text:`隊伍成功逃離了戰鬥！` });
    } else {
      pushEvent(state, { kind:'flee_fail', sourceUid:actor.uid, sourceSide:'party', text:`${actor.name} 試圖逃跑，但失敗了！` });
    }
    return;
  }
  if (action.type === 'attack') {
    const target = state.monsters.find(m => m.uid === action.targetUid);
    if (!target || target.battleHp <= 0) return;
    if (!rollHit(actor.acc, target.evade)) {
      pushEvent(state, { kind:'miss', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'monster', text:`${actor.name} 的攻擊被 ${target.name} 閃避了！` });
      return;
    }
    const r = computeDamage(actor, target, { power: 1.0 });
    target.battleHp = Math.max(0, target.battleHp - r.dmg);
    pushEvent(state, { kind:'attack', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'monster',
      amount:r.dmg, isCrit:r.isCrit, killed: target.battleHp<=0,
      text:`${actor.name} 攻擊 ${target.name}，造成 ${r.dmg} 點傷害${r.isCrit ? '（暴擊！）' : ''}` });
    if (target.battleHp <= 0) pushEvent(state, { kind:'death', targetUid:target.uid, targetSide:'monster', text:`${target.name} 倒下了！` });
    checkBattleEnd(state);
    return;
  }
  if (action.type === 'item') {
    applyItemInBattle(state, actor, action.itemId, action.targetUid);
    return;
  }
  if (action.type === 'skill') {
    executeSkill(state, actor, action.skillId, action.targetUid);
    checkBattleEnd(state);
    return;
  }
}

function executeSkill(state, actor, skillId, targetUid) {
  const skill = SKILLS[skillId];
  if (!skill) return;
  if (actor.battleMp < (skill.cost || 0)) {
    pushEvent(state, { kind:'skill_fail', sourceUid:actor.uid, sourceSide:'party', text:`${actor.name} 法力不足，無法使用 ${skill.name}！` });
    return;
  }
  actor.battleMp -= (skill.cost || 0);
  if (skill.selfDmg) {
    const sd = Math.round(actor.maxHp * skill.selfDmg);
    actor.battleHp = Math.max(1, actor.battleHp - sd);
    pushEvent(state, { kind:'self_damage', sourceUid:actor.uid, sourceSide:'party', targetUid:actor.uid, targetSide:'party', amount:sd, text:`${actor.name} 消耗了 ${sd} 點HP` });
  }

  if (skill.type === 'phys' || skill.type === 'magic') {
    const isMagic = skill.type === 'magic';
    const targets = skill.target === 'all' ? aliveMonsters(state) : [state.monsters.find(m => m.uid === targetUid)].filter(Boolean);
    targets.forEach(target => {
      if (!target || target.battleHp <= 0) return;
      if (skill.execThresh && target.battleHp / target.maxHp <= skill.execThresh) {
        target.battleHp = 0;
        pushEvent(state, { kind:'skill_hit', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'monster', skillId, amount:9999, killed:true,
          text:`${actor.name} 使用「${skill.name}」直接處決了 ${target.name}！` });
        pushEvent(state, { kind:'death', targetUid:target.uid, targetSide:'monster', text:`${target.name} 倒下了！` });
        return;
      }
      if (!rollHit(actor.acc, target.evade) && skill.target !== 'all') {
        pushEvent(state, { kind:'miss', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'monster', skillId, text:`${actor.name} 的「${skill.name}」被 ${target.name} 閃避了！` });
        return;
      }
      const r = computeDamage(actor, target, { power: skill.power, isMagic, elem: skill.elem, ignoreDef: skill.ignoreDef, critBonus: skill.critBonus });
      target.battleHp = Math.max(0, target.battleHp - r.dmg);
      pushEvent(state, { kind:'skill_hit', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'monster', skillId,
        amount:r.dmg, isCrit:r.isCrit, killed: target.battleHp<=0, elem: skill.elem,
        text:`${actor.name} 使用「${skill.name}」攻擊 ${target.name}，造成 ${r.dmg} 點傷害${r.isCrit?'（暴擊！）':''}` });
      if (skill.lifesteal) {
        const heal = Math.round(r.dmg * skill.lifesteal);
        actor.battleHp = Math.min(actor.maxHp, actor.battleHp + heal);
        pushEvent(state, { kind:'heal', sourceUid:actor.uid, sourceSide:'party', targetUid:actor.uid, targetSide:'party', amount:heal, text:`${actor.name} 吸取了 ${heal} 點HP` });
      }
      if (skill.statusChance && applyStatus(target, skill.status, skill.statusChance)) {
        pushEvent(state, { kind:'status_apply', targetUid:target.uid, targetSide:'monster', statusId:skill.status, text:`${target.name} 陷入了${STATUS_NAME[skill.status]}狀態！` });
      }
      if (target.battleHp <= 0) pushEvent(state, { kind:'death', targetUid:target.uid, targetSide:'monster', text:`${target.name} 倒下了！` });
    });
  } else if (skill.type === 'heal') {
    if (skill.target === 'party') {
      aliveParty(state).forEach(p => {
        const heal = Math.round(p.maxHp * skill.power * 0.5);
        p.battleHp = Math.min(p.maxHp, p.battleHp + heal);
        pushEvent(state, { kind:'heal', sourceUid:actor.uid, sourceSide:'party', targetUid:p.uid, targetSide:'party', amount:heal, silent:true });
      });
      pushEvent(state, { kind:'skill_cast', sourceUid:actor.uid, sourceSide:'party', text:`${actor.name} 使用「${skill.name}」治癒了全隊！` });
    } else {
      const target = state.party.find(p => p.uid === targetUid) || actor;
      const heal = Math.round(target.maxHp * skill.power * 0.5 + 10);
      target.battleHp = Math.min(target.maxHp, target.battleHp + heal);
      if (skill.cleanse) target.statusFx = [];
      pushEvent(state, { kind:'heal', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'party', amount:heal,
        text:`${actor.name} 治癒了 ${target.name}，回復 ${heal} 點HP` });
    }
  } else if (skill.type === 'buff') {
    if (skill.target === 'self') { actor.buffs[skillId] = 3; pushEvent(state, { kind:'buff', sourceUid:actor.uid, sourceSide:'party', targetUid:actor.uid, targetSide:'party', text:`${actor.name} 使用「${skill.name}」` }); }
    else if (skill.target === 'party') { aliveParty(state).forEach(p => p.buffs[skillId] = 3); pushEvent(state, { kind:'buff', sourceUid:actor.uid, sourceSide:'party', text:`${actor.name} 為全隊使用了「${skill.name}」` }); }
    else { const t = state.party.find(p=>p.uid===targetUid)||actor; t.buffs[skillId]=3; pushEvent(state, { kind:'buff', sourceUid:actor.uid, sourceSide:'party', targetUid:t.uid, targetSide:'party', text:`${actor.name} 為 ${t.name} 使用了「${skill.name}」` }); }
    if (skillId === 'mana_shield' || skillId === 'aegis' || skillId === 'divine_shield') {
      const targets = skill.target === 'party' ? aliveParty(state) : skill.target === 'ally' ? [state.party.find(p=>p.uid===targetUid)||actor] : [actor];
      targets.forEach(t => { t.shield = (t.shield||0) + Math.round(t.maxHp * 0.25); });
    }
  } else if (skill.type === 'summon') {
    pushEvent(state, { kind:'summon', sourceUid:actor.uid, sourceSide:'party', text:`${actor.name} 召喚了助戰夥伴！` });
    actor.buffs.summonBoost = 5;
  } else if (skill.type === 'debuff') {
    const target = state.monsters.find(m => m.uid === targetUid);
    if (target) {
      const r = computeDamage(actor, target, { power: skill.power });
      target.battleHp = Math.max(0, target.battleHp - r.dmg);
      if (skill.markDeath) target.buffs.marked = 2;
      pushEvent(state, { kind:'skill_hit', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'monster', skillId,
        amount:r.dmg, killed: target.battleHp<=0,
        text:`${actor.name} 使用「${skill.name}」，${target.name} 受到 ${r.dmg} 點傷害` });
      if (target.battleHp <= 0) pushEvent(state, { kind:'death', targetUid:target.uid, targetSide:'monster', text:`${target.name} 倒下了！` });
    }
  } else if (skill.type === 'special' && skillId === 'steal') {
    pushEvent(state, { kind:'skill_cast', sourceUid:actor.uid, sourceSide:'party', text:`${actor.name} 嘗試從敵人身上盜取物品……` });
  }
}

function applyItemInBattle(state, actor, itemId, targetUid) {
  const ITEM_DEFS = {
    potion_small: { heal: 0.35, name:'小型藥水' },
    potion_mid: { heal: 0.65, name:'中型藥水' },
    antidote: { cleanse: true, name:'解毒草藥' },
    revive_feather: { revive: true, name:'復活羽毛' },
  };
  const def = ITEM_DEFS[itemId];
  if (!def) return;
  const target = state.party.find(p => p.uid === targetUid) || actor;
  if (def.revive) {
    if (target.battleHp <= 0) {
      target.battleHp = Math.round(target.maxHp * 0.4);
      pushEvent(state, { kind:'revive', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'party', text:`${actor.name} 使用復活羽毛復活了 ${target.name}！` });
    }
  } else if (def.heal) {
    const heal = Math.round(target.maxHp * def.heal);
    target.battleHp = Math.min(target.maxHp, target.battleHp + heal);
    pushEvent(state, { kind:'heal', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'party', amount:heal,
      text:`${actor.name} 使用了「${def.name}」，${target.name} 回復 ${heal} 點HP` });
  } else if (def.cleanse) {
    target.statusFx = [];
    pushEvent(state, { kind:'cleanse', sourceUid:actor.uid, sourceSide:'party', targetUid:target.uid, targetSide:'party', text:`${actor.name} 使用了「${def.name}」，解除了 ${target.name} 的異常狀態` });
  }
}

// 怪物 AI 行動
function executeMonsterTurn(state, monster) {
  if (monster.battleHp <= 0) return;
  const targets = aliveParty(state);
  if (targets.length === 0) return;

  const skip = processStatusTick(monster, 'battleHp', 'maxHp', state, monster.name, 'monster', monster.uid);
  if (skip) { pushEvent(state, { kind:'status_skip', sourceUid:monster.uid, sourceSide:'monster', text:`${monster.name} 無法行動！` }); return; }
  if (monster.battleHp <= 0) return; // 狀態傷害可能已致命

  const useSkill = monster.skills.length > 0 && Math.random() < 0.4;
  if (useSkill) {
    const skillKey = pick(monster.skills);
    const sk = MONSTER_SKILLS[skillKey];
    if (sk.target === 'all') {
      targets.forEach(t => {
        if (!rollHit(monster.acc, t.evade)) { pushEvent(state, { kind:'miss', sourceUid:monster.uid, sourceSide:'monster', targetUid:t.uid, targetSide:'party', text:`${monster.name} 的「${sk.name}」被 ${t.name} 閃避了！` }); return; }
        const r = computeDamage(monster, t, { power: sk.power, isMagic: sk.type==='magic', elem: monster.elem });
        const dealt = applyDamageToPartyUnit(t, r.dmg);
        pushEvent(state, { kind:'skill_hit', sourceUid:monster.uid, sourceSide:'monster', targetUid:t.uid, targetSide:'party',
          amount:dealt, isCrit:r.isCrit, killed: t.battleHp<=0,
          text:`${monster.name} 使用「${sk.name}」攻擊 ${t.name}，造成 ${dealt} 點傷害${r.isCrit?'（暴擊！）':''}` });
        if (t.battleHp <= 0) pushEvent(state, { kind:'death', targetUid:t.uid, targetSide:'party', text:`${t.name} 倒下了！` });
      });
    } else {
      const target = pick(targets);
      if (!rollHit(monster.acc, target.evade)) { pushEvent(state, { kind:'miss', sourceUid:monster.uid, sourceSide:'monster', targetUid:target.uid, targetSide:'party', text:`${monster.name} 的「${sk.name}」被 ${target.name} 閃避了！` }); return; }
      const r = computeDamage(monster, target, { power: sk.power, isMagic: sk.type==='magic', elem: monster.elem });
      const dealt = applyDamageToPartyUnit(target, r.dmg);
      pushEvent(state, { kind:'skill_hit', sourceUid:monster.uid, sourceSide:'monster', targetUid:target.uid, targetSide:'party',
        amount:dealt, isCrit:r.isCrit, killed: target.battleHp<=0,
        text:`${monster.name} 使用「${sk.name}」攻擊 ${target.name}，造成 ${dealt} 點傷害${r.isCrit?'（暴擊！）':''}` });
      if (target.battleHp <= 0) pushEvent(state, { kind:'death', targetUid:target.uid, targetSide:'party', text:`${target.name} 倒下了！` });
    }
  } else {
    const target = pick(targets);
    if (!rollHit(monster.acc, target.evade)) { pushEvent(state, { kind:'miss', sourceUid:monster.uid, sourceSide:'monster', targetUid:target.uid, targetSide:'party', text:`${monster.name} 攻擊 ${target.name}，但被閃避了！` }); return; }
    const guardMul = target.buffs.guard_stance || target.buffs.guard ? 0.5 : 1.0;
    const r = computeDamage(monster, target, { power: 1.0 * guardMul });
    const dealt = applyDamageToPartyUnit(target, r.dmg);
    pushEvent(state, { kind:'attack', sourceUid:monster.uid, sourceSide:'monster', targetUid:target.uid, targetSide:'party',
      amount:dealt, isCrit:r.isCrit, killed: target.battleHp<=0,
      text:`${monster.name} 攻擊 ${target.name}，造成 ${dealt} 點傷害${r.isCrit?'（暴擊！）':''}` });
    if (target.battleHp <= 0) pushEvent(state, { kind:'death', targetUid:target.uid, targetSide:'party', text:`${target.name} 倒下了！` });
  }
}

function applyDamageToPartyUnit(unit, dmg) {
  if (unit.shield > 0) {
    const absorbed = Math.min(unit.shield, dmg);
    unit.shield -= absorbed;
    dmg -= absorbed;
  }
  unit.battleHp = Math.max(0, unit.battleHp - dmg);
  return dmg;
}

// 處理整個怪物回合（含狀態結算）
function runMonsterPhase(state) {
  state.monsters.forEach(m => { if (m.battleHp > 0) executeMonsterTurn(state, m); });
  checkBattleEnd(state);
}

function runEndOfTurnStatus(state) {
  state.party.forEach(p => {
    if (p.battleHp <= 0) return;
    processStatusTick(p, 'battleHp', 'maxHp', state, p.name, 'party', p.uid);
  });
  checkBattleEnd(state);
  state.turn++;
}

function getSpeedOrder(units) {
  return [...units].sort((a, b) => (b.spd || 0) - (a.spd || 0));
}

</script>
<script>
// ============================================================
// 主遊戲邏輯 - Part 1: 狀態管理 / 存檔 / 初始化
// ============================================================

const SAVE_KEY = 'guild_saga_save_v1';
const AUTosave_DEBOUNCE = 800;

let GAME = null; // 全域遊戲狀態
let UI = { currentTownView: 'hall', battleState: null, dungeonState: null, pendingAction: null, libraryTab: 'skills', shopTab: 'weapon', recruitFilter: 'all' };
let autosaveTimer = null;

function defaultGameState() {
  return {
    guildName: '',
    gold: 300,
    reputation: 0,
    day: 1,
    rosterSeed: 0,
    roster: [],       // 所有冒險者（含在隊與閒置）
    partyUids: [],    // 目前出戰隊伍 (最多4)
    inventory: { weapon: [], armor: [], accessory: [], items: { potion_small: 3, potion_mid: 0, antidote: 1, revive_feather: 0 } },
    facilities: { dorm:1, training:1, tavern:1, smith:1, library:1 },
    quests: { main: [], side: [], bounty: [], event: [] },
    questProgress: { mainStage: 0 },
    currentEvent: null, // 世界事件
    eventDaysLeft: 0,
    history: [], // 世界歷史紀錄
    hallOfFame: [], // 退休/陣亡名人堂
    dungeon: {
      currentRank: 1,
      activeRun: null, // 當前探索中的地下城run
      deepestFloor: 0,
      infiniteBest: 0,
    },
    flags: { tutorialDone: false },
    statsTotal: { battlesWon: 0, monstersSlain: 0, dungeonsCleared: 0, goldEarned: 0 },
  };
}

function saveGame() {
  try {
    const data = JSON.stringify(GAME);
    localStorage.setItem(SAVE_KEY, data);
    return true;
  } catch (e) {
    console.error('存檔失敗', e);
    return false;
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    console.error('讀檔失敗', e);
    return null;
  }
}

function hasSaveGame() {
  return !!localStorage.getItem(SAVE_KEY);
}

function queueAutosave() {
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => { saveGame(); }, AUTosave_DEBOUNCE);
}

function showToast(msg, duration) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.remove(); }, duration || 2100);
}

function addHistory(text) {
  GAME.history.unshift({ day: GAME.day, text });
  if (GAME.history.length > 300) GAME.history.length = 300;
}

// ---------------- 初始化新遊戲 ----------------
function startNewGame(guildName) {
  GAME = defaultGameState();
  GAME.guildName = guildName || '無名公會';

  // 初始招募4名隨從供玩家組隊
  for (let i = 0; i < 6; i++) {
    const adv = generateAdventurer(1);
    GAME.roster.push(adv);
  }
  // 預設前4位入隊
  GAME.partyUids = GAME.roster.slice(0, 4).map(a => a.uid);
  GAME.roster.forEach(a => { a.inParty = GAME.partyUids.includes(a.uid); });

  // 給點初始裝備
  GAME.inventory.weapon.push(generateEquipment('weapon', 1));
  GAME.inventory.armor.push(generateEquipment('armor', 1));

  addHistory(`「${GAME.guildName}」正式成立，開始了無盡迷宮的冒險之路。`);
  generateMainQuestLine();
  generateSideQuests();
  generateBountyQuests();
  saveGame();
}

function generateMainQuestLine() {
  GAME.quests.main = [

function generateSideQuests() {
  const pool = [
    { id:'side_gather_'+Date.now(), title:'採集任務：藥草', desc:'在地下城中擊敗5隻怪物以收集藥草樣本。', target:{type:'kill_count', value:5}, reward:{gold:80, rep:8} },

    { id:'side_explore_'+Date.now(), title:'地圖測繪', desc:'完整探索一層地下城的所有房間。', target:{type:'full_explore', value:1}, reward:{gold:90, rep:10} },
  ];

function generateBountyQuests() {
  const families = Object.keys(MONSTER_FAMILIES).filter(k => !MONSTER_FAMILIES[k].boss);
  GAME.quests.bounty = [];
  for (let i=0;i<3;i++) {
    const fam = pick(families);
    const count = rand(3,6);
    GAME.quests.bounty.push({
      id:'bounty_'+i+'_'+Date.now(), title:`懸賞：${MONSTER_FAMILIES[fam].name}`,
      desc:`討伐 ${count} 隻${MONSTER_FAMILIES[fam].name}`,
      target:{type:'kill_family', family:fam, value:count}, progress:0,
      reward:{gold: 40+count*15, rep:5+count*2}, done:false,
    });
  }
}

// ---------------- 任務進度檢查 ----------------
function updateQuestProgress(type, payload) {
  payload = payload || {};
  const allLists = [GAME.quests.main, GAME.quests.side, GAME.quests.bounty];
  allLists.forEach(list => {
    list.forEach(q => {
      if (q.done) return;
      if (q.target.type !== type) return;
      if (type === 'kill_family') {
        if (payload.family === q.target.family) {
          q.progress = (q.progress||0) + 1;
          if (q.progress >= q.target.value) completeQuestSilently(q);
        }
        return;
      }
      if (type === 'kill_count' || type === 'chest_open') {
        q.progress = (q.progress||0) + (payload.amount||1);
        if (q.progress >= q.target.value) completeQuestSilently(q);
        return;
      }
      if (type === 'floor') {
        if (payload.value >= q.target.value) completeQuestSilently(q);
        return;
      }
      if (type === 'elite_clear' || type === 'boss_clear' || type === 'full_explore') {
        q.progress = (q.progress||0) + 1;
        if (q.progress >= q.target.value) completeQuestSilently(q);
        return;
      }
      if (type === 'roster_size') {
        if (payload.value >= q.target.value) completeQuestSilently(q);
      }
    });
  });
}

function completeQuestSilently(q) {
  q.done = true;
  q.completedReady = true; // 標記可領取
}

function claimQuestReward(q) {
  if (!q.done || q.claimed) return;
  q.claimed = true;
  GAME.gold += q.reward.gold || 0;
  GAME.reputation += q.reward.rep || 0;
  GAME.statsTotal.goldEarned += q.reward.gold || 0;
  addHistory(`公會完成了任務「${q.title}」，獲得 ${q.reward.gold} 金幣與 ${q.reward.rep} 聲望。`);
  showToast(`✅ 完成任務獎勵：💰${q.reward.gold} 📜${q.reward.rep}`);
  queueAutosave();
}

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return Array.from(document.querySelectorAll(sel)); }
function el(tag, cls, html) { const e = document.createElement(tag); if (cls) e.className = cls; if (html !== undefined) e.innerHTML = html; return e; }

function getAdv(uid) { return GAME.roster.find(a => a.uid === uid); }
function getParty() { return GAME.partyUids.map(uid => getAdv(uid)).filter(Boolean); }
function activeRoster() { return GAME.roster.filter(a => !a.retired && !a.deceased); }

function classIcon(classKey) {
  const icons = { warrior:'⚔️', mage:'🔮', priest:'✨', rogue:'🗡️', ranger:'🏹',
    knight:'🛡️', berserker:'🪓', spellblade:'🗡️', summoner:'👻', sage:'📖',
    assassin:'🔪', paladin:'⚜️', druid:'🌿' };
  return icons[classKey] || '❔';
}
function raceLabel(raceKey) { return RACES[raceKey] ? RACES[raceKey].name : raceKey; }
function classLabel(classKey) { return CLASSES[classKey] ? CLASSES[classKey].name : classKey; }

function setTownNav(visible) {
  $('#screen-game').classList.toggle('no-nav', !visible);
}

function switchTownView(view) {
  UI.currentTownView = view;
  $$('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  renderCurrentView();
}

const NO_NAV_VIEWS = new Set(['dungeon_select','dungeon_explore','battle','adv_detail']);

function renderCurrentView() {
  const c = $('#view-container');
  c.scrollTop = 0;
  setTownNav(!NO_NAV_VIEWS.has(UI.currentTownView));
  $$('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === UI.currentTownView));
  switch (UI.currentTownView) {
    case 'hall': renderHall(c); break;
    case 'dorm': renderDorm(c); break;
    case 'tavern': renderTavern(c); break;
    case 'shop': renderShop(c); break;
    case 'smith': renderSmith(c); break;
    case 'training': renderTraining(c); break;
    case 'library': renderLibrary(c); break;
    case 'dungeon_select': renderDungeonSelect(c); break;
    case 'dungeon_explore': renderDungeonExplore(c); break;
    case 'battle': renderBattle(c); break;
    case 'quests': renderQuests(c); break;
    case 'roster': renderRosterManage(c); break;
    case 'adv_detail': renderAdvDetail(c); break;
    default: renderHall(c);
  }
  updateTopbar();
}

function updateTopbar() {
  $('#topbar-gold').textContent = '💰 ' + formatNum(GAME.gold);
  $('#topbar-day').textContent = '第' + GAME.day + '日';
  $('#topbar-rep').textContent = '📜 ' + formatNum(GAME.reputation);
}

function guildRankLabel() {
  const rep = GAME.reputation;
  if (rep < 50) return 'F級';
  if (rep < 150) return 'E級';
  if (rep < 350) return 'D級';
  if (rep < 700) return 'C級';
  if (rep < 1300) return 'B級';
  if (rep < 2200) return 'A級';
  return 'S級';
}

function advCardMini(a) {
  const card = el('div', 'adv-card clickable');
  const hpPct = Math.max(0, Math.round(a.hp / a.maxHp * 100));
  card.innerHTML = `
    <div class="adv-portrait">${classIcon(a.classKey)}</div>
    <div class="adv-info">
      <div class="adv-name-row"><span class="adv-name">${escapeHtml(a.name)}</span><span class="adv-tag">Lv.${a.level}</span></div>
      <div class="adv-sub">${raceLabel(a.race)}・${classLabel(a.classKey)}</div>
      <div class="bar-bg"><div class="bar-fill bar-hp" style="width:${hpPct}%"></div></div>
      ${a.hp<=0 ? '<div class="status-badges"><span class="status-badge">倒下</span></div>' : ''}
    </div>
  `;
  card.onclick = () => { UI.detailAdvUid = a.uid; UI.currentTownView='adv_detail'; UI._returnView='hall'; renderCurrentView(); };
  return card;
}

function escapeHtml(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderDorm(c) {
  c.innerHTML = '';
  const capacity = 4 + GAME.facilities.dorm * 2;
  const header = el('div', 'panel');
  header.innerHTML = `<div class="panel-title">🛏️ 宿舍 <span class="muted" style="font-weight:400;">等級 ${GAME.facilities.dorm}</span></div><div class="muted">目前容納：${activeRoster().length} / ${capacity} 人 ・ 讓冒險者在此休養恢復HP與MP</div>`;
  c.appendChild(header);

  const upgradeCost = facilityUpgradeCost('dorm');
  const upPanel = el('div', 'panel');
  upPanel.innerHTML = `<div class="panel-title">升級宿舍</div><div class="muted">提升後：可招募/容納上限+2人、隊伍每日自然恢復效率提升、住宿恢復效果更好</div>`;
  const upBtn = el('button', 'action-btn success', `升級至 Lv.${GAME.facilities.dorm+1}（💰${upgradeCost}）`);
  upBtn.style.width='100%'; upBtn.style.marginTop='8px'; upBtn.style.padding='11px';
  upBtn.onclick = () => upgradeFacility('dorm', upgradeCost);
  upPanel.appendChild(upBtn);
  c.appendChild(upPanel);

  const restPanel = el('div', 'panel');
  const injured = activeRoster().filter(a => a.hp < a.maxHp || a.mp < a.maxMp);
  restPanel.innerHTML = `<div class="panel-title">🌙 讓全隊住宿休養</div><div class="muted">隊伍將在宿舍住一晚（消耗1天），大幅回復HP與MP。宿舍等級越高，回復效果越好。</div>`;
  const restBtn = el('button', 'action-btn primary', '讓全隊休息一晚');
  restBtn.style.width='100%'; restBtn.style.marginTop='8px'; restBtn.style.padding='13px'; restBtn.style.fontSize='14px';
  if (GAME.dungeon.activeRun) {
    restBtn.disabled = true;
    restBtn.textContent = '請先完成或撤退目前的地下城探索';
  } else if (injured.length === 0) {
    restBtn.textContent = '全隊狀態已是最佳（仍可休息以進入下一天）';
  }
  restBtn.onclick = () => restPartyOvernight();
  restPanel.appendChild(restBtn);
  c.appendChild(restPanel);

  c.appendChild(el('div', 'section-label', '冒險者休養狀況'));
  if (activeRoster().length === 0) c.appendChild(el('div', 'empty-state', '<span class="emoji">🛏️</span>目前沒有冒險者'));
  activeRoster().forEach(a => {
    const card = el('div', 'adv-card');
    const hpPct = Math.max(0, Math.round(a.hp/a.maxHp*100));
    const mpPct = Math.max(0, Math.round(a.mp/a.maxMp*100));
    const restLabel = a.isResting ? `<span class="status-badge">休養中(${a.restUntilDay-GAME.day}日)</span>` : '';
    card.innerHTML = `
      <div class="adv-portrait">${classIcon(a.classKey)}</div>
      <div class="adv-info">
        <div class="adv-name-row"><span class="adv-name">${escapeHtml(a.name)}</span><span class="adv-tag">Lv.${a.level}</span></div>
        <div class="adv-sub">${classLabel(a.classKey)} ${restLabel}</div>
        <div class="bar-label"><span>HP</span><span>${a.hp}/${a.maxHp}</span></div>
        <div class="bar-bg"><div class="bar-fill bar-hp" style="width:${hpPct}%"></div></div>
        <div class="bar-label mt-8"><span>MP</span><span>${a.mp}/${a.maxMp}</span></div>
        <div class="bar-bg"><div class="bar-fill bar-mp" style="width:${mpPct}%"></div></div>
      </div>
    `;
    c.appendChild(card);
  });
}

function restPartyOvernight() {
  if (GAME.dungeon.activeRun) { showToast('請先完成或撤退目前的地下城探索！'); return; }
  // 住宿回復比例隨宿舍等級提升，等級越高恢復越接近全滿
  const recoverPct = clamp(0.55 + GAME.facilities.dorm * 0.12, 0.55, 1.0);
  activeRoster().forEach(a => {
    if (a.isResting) return; // 重傷休養中的角色由advanceDay的休養邏輯處理
    a.hp = Math.min(a.maxHp, a.hp + Math.round(a.maxHp * recoverPct));
    a.mp = Math.min(a.maxMp, a.mp + Math.round(a.maxMp * recoverPct));
  });
  advanceDay();
  showToast(`🌙 全隊在宿舍中休養了一晚`);
}

function renderTavern(c) {

  c.appendChild(header);

  tavernUpPanel.innerHTML = `<div class="panel-title">升級酒館</div><div class="muted">提升後：每日候補冒險者人數增加、出現更高等級的候補人選</div>`;
  const tavernUpBtn = el('button', 'action-btn success', `升級至 Lv.${GAME.facilities.tavern+1}（💰${tavernUpgradeCost}）`);
  tavernUpBtn.style.width='100%'; tavernUpBtn.style.marginTop='8px'; tavernUpBtn.style.padding='11px';
  tavernUpBtn.onclick = () => upgradeFacility('tavern', tavernUpgradeCost);
  tavernUpPanel.appendChild(tavernUpBtn);
  c.appendChild(tavernUpPanel);

  if (!UI.tavernCandidates || UI._tavernDay !== GAME.day) {
    rerollTavernCandidates();
  }

  const rerollPanel = el('div', 'panel');
  const rerollCost = 30;
  rerollPanel.innerHTML = `<div class="flex-between"><span class="muted">候補名單（每日更新）</span></div>`;
  const rerollBtn = el('button', 'action-btn', `🔄 花費 ${rerollCost} 金幣重新整理`);
  rerollBtn.style.width='100%'; rerollBtn.style.marginTop='6px'; rerollBtn.style.padding='10px';
  rerollBtn.onclick = () => {
    if (GAME.gold < rerollCost) { showToast('金幣不足！'); return; }
    GAME.gold -= rerollCost;
    rerollTavernCandidates();
    renderCurrentView();
    queueAutosave();
  };
  rerollPanel.appendChild(rerollBtn);
  c.appendChild(rerollPanel);

  UI.tavernCandidates.forEach((a, idx) => {
    const card = el('div', 'panel');
    const talent = TALENTS.find(t=>t.id===a.talent), flaw = FLAWS.find(f=>f.id===a.flaw);
    const eventMul = GAME.currentEvent === 'war' ? 1.4 : (GAME.currentEvent === 'festival' ? 0.7 : 1);
    const cost = Math.round((80 + a.level * 25) * eventMul);
    card.innerHTML = `
      <div class="card-row">
        <div class="adv-portrait">${classIcon(a.classKey)}</div>
        <div class="adv-info">
          <div class="adv-name-row"><span class="adv-name">${escapeHtml(a.name)}</span><span class="adv-tag">Lv.${a.level}</span></div>
          <div class="adv-sub">${raceLabel(a.race)}・${classLabel(a.classKey)}</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="muted">✨ 天賦：${talent.name} — ${talent.desc}</div>
      <div class="muted">⚠ 缺點：${flaw.name} — ${flaw.desc}</div>
      <div class="muted">STR ${a.finalStat.str} VIT ${a.finalStat.vit} AGI ${a.finalStat.agi} INT ${a.finalStat.int} MAG ${a.finalStat.mag} LUK ${a.finalStat.luk}</div>
    `;
    const recruitBtn = el('button', 'action-btn primary', `招募（💰${cost}）`);
    recruitBtn.style.width='100%'; recruitBtn.style.marginTop='8px'; recruitBtn.style.padding='11px';
    if (activeRoster().length >= 4 + GAME.facilities.dorm * 2) {
      recruitBtn.textContent = '宿舍已滿（升級宿舍以擴增）';
      recruitBtn.disabled = true;
    }
    recruitBtn.onclick = () => {
      if (GAME.gold < cost) { showToast('金幣不足！'); return; }
      GAME.gold -= cost;
      GAME.roster.push(a);
      UI.tavernCandidates.splice(idx, 1);
      addHistory(`冒險者「${a.name}」（${classLabel(a.classKey)}）加入了公會。`);
      showToast(`🎉 ${a.name} 加入了公會！`);
      renderCurrentView();
      queueAutosave();
    };
    card.appendChild(recruitBtn);
    c.appendChild(card);
  });
}

function rerollTavernCandidates() {
  const tier = Math.max(1, Math.ceil(GAME.dungeon.currentRank / 2));
  const count = 2 + Math.floor(GAME.facilities.tavern / 2);
  UI.tavernCandidates = [];
  for (let i=0;i<count;i++) UI.tavernCandidates.push(generateAdventurer(tier));
  UI._tavernDay = GAME.day;
}

  c.innerHTML = '';
  const header = el('div', 'panel');
  header.innerHTML = `<div class="panel-title">🛒 商店</div><div class="muted">購買裝備與冒險道具</div>`;
  c.appendChild(header);

  const tabs = el('div', 'tab-row');
  [['weapon','武器'],['armor','防具'],['accessory','飾品'],['items','道具']].forEach(([key,label]) => {
    const t = el('button', 'tab-btn' + (UI.shopTab===key?' active':''), label);
    t.onclick = () => { UI.shopTab = key; renderCurrentView(); };
    tabs.appendChild(t);
  });
  c.appendChild(tabs);

  if (!UI.shopStock || UI._shopDay !== GAME.day) rerollShopStock();
  const priceMul = (GAME.currentEvent === 'festival') ? 0.8 : 1;

  if (UI.shopTab === 'items') {
    const items = [
      { id:'potion_small', name:'小型藥水', desc:'回復約35%HP', icon:'🧪', price: TOWN_DEFAULT_PRICES.potion_small },
      { id:'potion_mid', name:'中型藥水', desc:'回復約65%HP', icon:'⚗️', price: TOWN_DEFAULT_PRICES.potion_mid },
      { id:'antidote', name:'解毒草藥', desc:'解除異常狀態', icon:'🌿', price: TOWN_DEFAULT_PRICES.antidote },
      { id:'revive_feather', name:'復活羽毛', desc:'戰鬥中復活倒下夥伴', icon:'🪶', price: TOWN_DEFAULT_PRICES.revive_feather },
    ];
    items.forEach(it => {
      const price = Math.round(it.price * priceMul * (GAME.currentEvent==='plague'&&(it.id==='potion_small'||it.id==='potion_mid'||it.id==='antidote')?1.5:1));
      const card = el('div', 'item-card');
      card.innerHTML = `
        <div class="item-icon" style="border-color:var(--leather);background:#fff;">${it.icon}</div>
        <div class="item-info"><div class="item-name">${it.name}</div><div class="item-sub">${it.desc}</div><div class="item-sub">持有：${GAME.inventory.items[it.id]||0}</div></div>
      `;
      const buyBtn = el('button', 'action-btn primary', `💰${price}`);
      buyBtn.style.flexShrink='0'; buyBtn.style.padding='10px 12px';
      buyBtn.onclick = () => {
        if (GAME.gold < price) { showToast('金幣不足！'); return; }
        GAME.gold -= price;
        GAME.inventory.items[it.id] = (GAME.inventory.items[it.id]||0) + 1;
        showToast(`購買了 ${it.name}`);
        renderCurrentView();
        queueAutosave();
      };
      card.appendChild(buyBtn);
      c.appendChild(card);
    });
    return;
  }

  const stock = UI.shopStock[UI.shopTab] || [];
  if (stock.length === 0) c.appendChild(el('div', 'empty-state', '今日無進貨'));
  stock.forEach((eq, idx) => {
    c.appendChild(equipCard(eq, () => {
      const price = Math.round(eq.sellPrice * 1.8 * priceMul);
      return price;
    }, (price) => {
      if (GAME.gold < price) { showToast('金幣不足！'); return; }
      GAME.gold -= price;
      GAME.inventory[eq.slot].push(eq);
      UI.shopStock[UI.shopTab].splice(idx,1);
      showToast(`購入了 ${eq.name}`);
      renderCurrentView();
      queueAutosave();
    }, '購入'));
  });
}

function rerollShopStock() {
  const tier = Math.max(1, GAME.dungeon.currentRank);
  UI.shopStock = { weapon:[], armor:[], accessory:[] };
  EQUIP_SLOTS.forEach(slot => {
    for (let i=0;i<4;i++) UI.shopStock[slot].push(generateEquipment(slot, tier));
  });
  UI._shopDay = GAME.day;
}

function facilityUpgradeCost(key) {
  return Math.round(150 * Math.pow(1.6, GAME.facilities[key]));
}

function upgradeFacility(key, cost) {
  if (GAME.gold < cost) { showToast('金幣不足！'); return; }
  GAME.gold -= cost;
  GAME.facilities[key]++;
  showToast(`設施升級！目前等級 ${GAME.facilities[key]}`);
  addHistory(`公會將「${({dorm:'宿舍',training:'訓練場',tavern:'酒館',smith:'鐵匠鋪',library:'圖書館'})[key]}」升級至 Lv.${GAME.facilities[key]}。`);
  renderCurrentView();
  queueAutosave();
}

function openEquipTargetPicker(eq, idx) {
  const panel = $('#modal-panel');
  panel.innerHTML = `<h3>裝備「${escapeHtml(eq.name)}」給誰？</h3>`;
  activeRoster().forEach(a => {
    const row = el('button', 'btn-list');
    const cur = a.equip[eq.slot];
    row.innerHTML = `${classIcon(a.classKey)} ${escapeHtml(a.name)} <span class="muted">（${classLabel(a.classKey)}，目前裝備：${cur?escapeHtml(cur.name):'無'}）</span>`;
    row.onclick = () => {
      const old = a.equip[eq.slot];
      a.equip[eq.slot] = eq;
      recalcStats(a);
      const list = GAME.inventory[eq.slot];
      const i2 = list.indexOf(eq);
      if (i2 >= 0) list.splice(i2, 1);
      if (old) list.push(old);
      closeOverlay('overlay-modal');
      showToast(`${a.name} 裝備了 ${eq.name}`);
      renderCurrentView();
      queueAutosave();
    };
    panel.appendChild(row);
  });
  const closeBtn = el('button', 'btn-list close-btn', '取消');
  closeBtn.onclick = () => closeOverlay('overlay-modal');
  panel.appendChild(closeBtn);
  openOverlay('overlay-modal');
}

function doTraining(a) {
  const cost = 50 + a.level * 8;
  if (GAME.gold < cost) { showToast('金幣不足！'); return; }
  GAME.gold -= cost;
  const statKeys = ['str','vit','agi','int','mag','luk'];
  const gainCount = 1 + Math.floor(GAME.facilities.training / 3);
  for (let i=0;i<gainCount;i++) {
    const k = pick(statKeys);
    a.baseStat[k] += 1;
  }
  recalcStats(a);
  showToast(`${a.name} 完成特訓，能力提升了！`);
  renderCurrentView();
  queueAutosave();
}

  const cls = CLASSES[a.classKey];

  panel.innerHTML = `<h3>${escapeHtml(a.name)} — 學習技能</h3>`;
  const maxSkills = 4 + Math.floor(GAME.facilities.training/2);
  cls.skills.forEach(skillId => {
    const sk = SKILLS[skillId];

    row.innerHTML = `<div><div class="name">${sk.name}${learned?' ✅':''}</div><div class="desc">${sk.desc}</div></div>`;
    if (!learned) {
      const btn = el('button', 'action-btn primary', '學習');
      btn.style.padding='7px 12px'; btn.style.fontSize='11px';
      btn.onclick = () => {
        if (a.learnedSkills.length >= maxSkills) { showToast('已學會技能數已達上限！'); return; }
        a.learnedSkills.push(skillId);
        showToast(`${a.name} 學會了「${sk.name}」`);

        queueAutosave();

}

function advRowWithAction(a, btnLabel, onClick, disabled) {
  const row = el('div', 'adv-card');

  const restLabel = a.isResting ? `<span class="status-badge">休養中(${a.restUntilDay-GAME.day}日)</span>` : '';

    <div class="bar-bg"><div class="bar-fill bar-hp" style="width:${hpPct}%"></div></div>
  `);
  const openDetail = () => { UI.detailAdvUid = a.uid; UI._returnView = UI.currentTownView; UI.currentTownView='adv_detail'; renderCurrentView(); };

  info.onclick = openDetail;
  row.appendChild(portrait);
  row.appendChild(info);

  const btnWrap = el('div');
  const btn = el('button', 'action-btn' + (disabled?'':' primary'), btnLabel);
  btn.style.padding='8px 10px'; btn.style.fontSize='11px'; btn.style.whiteSpace='nowrap';

  btnWrap.appendChild(btn);
  row.appendChild(btnWrap);
  return row;
}
