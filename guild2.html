function drawDungeonCanvas(canvas, fd) {
  const dpr = window.devicePixelRatio || 1;
  const wrapRect = canvas.parentElement.getBoundingClientRect();
  const sizePx = Math.min(wrapRect.width, wrapRect.height);
  canvas.width = sizePx * dpr;
  canvas.height = sizePx * dpr;
  canvas.style.width = sizePx + 'px';
  canvas.style.height = sizePx + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cell = sizePx / fd.size;

  ctx.fillStyle = '#1b120c';
  ctx.fillRect(0, 0, sizePx, sizePx);

  for (let y = 0; y < fd.size; y++) {
    for (let x = 0; x < fd.size; x++) {
      const room = fd.grid[y][x];
      const px = x * cell, py = y * cell;
      if (!room) continue; // 不存在的房間：保持黑暗

      const isHiddenUndiscovered = room.type === 'hidden' && !room.discovered;
      const known = room.visited || isAdjacentVisited(fd, x, y);

      if (!known) {
        ctx.fillStyle = '#241910';
        ctx.fillRect(px+1, py+1, cell-2, cell-2);
        continue;
      }

      ctx.fillStyle = room.visited ? '#a98f63' : '#cdb585';
      ctx.fillRect(px+1, py+1, cell-2, cell-2);
      ctx.strokeStyle = '#5C3A26';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(px+1, py+1, cell-2, cell-2);

      if (room.visited && room.type !== 'empty') {
        let icon = '';
        if (room.type === 'exit') icon = '🚪'; // 出口永遠顯示，提示可重複進入下樓
        else if (room.cleared) icon = '·';
        else if (isHiddenUndiscovered) icon = '';
        else {
          icon = {
            monster:'🟥', elite:'🟥', treasure:'📦', trap:'⚠️', event:'❓',
            npc:'👤', exit:'🚪', boss:'💀', start:'', hidden:'🔍',
          }[room.type] || '';
        }
        if (icon) {
          ctx.font = (cell*0.5)+'px sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(icon, px+cell/2, py+cell/2+1);
        }
      } else if (!room.visited && known) {
        ctx.font = (cell*0.4)+'px sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle='rgba(43,29,20,0.4)';
        ctx.fillText('?', px+cell/2, py+cell/2+1);
      }
    }
  }

  // 玩家位置
  const px = fd.playerX * cell, py = fd.playerY * cell;
  ctx.font = (cell*0.55)+'px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⭐', px+cell/2, py+cell/2+1);
}

function isAdjacentVisited(fd, x, y) {
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx,dy] of dirs) {
    const nx=x+dx, ny=y+dy;
    if (nx<0||ny<0||nx>=fd.size||ny>=fd.size) continue;
    const r = fd.grid[ny][nx];
    if (r && r.visited) return true;
  }
  return false;
}

function moveInDungeon(dx, dy) {
  const run = GAME.dungeon.activeRun;
  if (!run) return;
  const fd = run.floorData;
  const nx = fd.playerX + dx, ny = fd.playerY + dy;
  if (nx < 0 || ny < 0 || nx >= fd.size || ny >= fd.size) return;
  const target = fd.grid[ny][nx];
  if (!target) { showToast('那裡是堵牆，無法通行'); return; }

  fd.playerX = nx; fd.playerY = ny;
  const firstVisit = !target.visited;
  target.visited = true;

  if (firstVisit) {
    enterRoom(target, fd, run);
  } else if (target.type === 'exit' && !target.bossDefeatPending) {
    // 出口房間允許重複進入，讓玩家可以先探索完本層其他房間再決定何時下樓
    showFloorClearModal(fd, run);
  } else {
    renderCurrentView();
  }
}

function enterRoom(room, fd, run) {
  switch (room.type) {
    case 'start': case 'empty':
      renderCurrentView();
      break;
    case 'hidden':
      const perceptRoll = Math.random() < 0.7 + (GAME.facilities.library*0.03);
      room.discovered = true;
      if (perceptRoll) {
        showToast('🔍 你發現了一間隱藏房間！');
        room.type = pick(['treasure','event','npc']);
        room.type = room.type === 'treasure' ? 'treasure' : room.type;
        // 隱藏房間給予較好獎勵機率
        enterRoomReveal(room, fd, run, true);
      } else {
        showToast('這裡似乎隱藏著什麼，但你沒有發現任何東西……');
        room.cleared = true;
        renderCurrentView();
      }
      break;
    case 'monster': case 'elite':
      triggerMonsterRoom(room, fd, run);
      break;
    case 'boss':
      triggerBossRoom(room, fd, run);
      break;
    case 'treasure':
      triggerTreasureRoom(room, fd, run);
      break;
    case 'trap':
      triggerTrapRoom(room, fd, run);
      break;
    case 'event':
      triggerEventRoom(room, fd, run);
      break;
    case 'npc':
      triggerNPCRoom(room, fd, run);
      break;
    case 'exit':
      triggerExitRoom(room, fd, run);
      break;
    default:
      renderCurrentView();
  }
}

function enterRoomReveal(room, fd, run, isHiddenBonus) {
  if (room.type === 'treasure') triggerTreasureRoom(room, fd, run, isHiddenBonus);
  else if (room.type === 'event') triggerEventRoom(room, fd, run, isHiddenBonus);
  else if (room.type === 'npc') triggerNPCRoom(room, fd, run, isHiddenBonus);
  else renderCurrentView();
}

function triggerMonsterRoom(room, fd, run) {
  const monsters = generateMonsterGroup(fd.dungeonRank || GAME.dungeon.currentRank, room.type);
  enterBattle(monsters, { room, fd, run, source: room.type });
}

function triggerBossRoom(room, fd, run) {
  const boss = generateMonster((fd.dungeonRank||GAME.dungeon.currentRank) + 1, { bossOnly:true });
  const adds = chance(0.4) ? generateMonsterGroup(fd.dungeonRank||GAME.dungeon.currentRank, 'monster').slice(0,1) : [];
  enterBattle([boss, ...adds], { room, fd, run, source:'boss' });
}

function triggerTreasureRoom(room, fd, run, bonus) {
  room.cleared = true;
  const tier = fd.dungeonRank || GAME.dungeon.currentRank;
  const roll = Math.random();
  const lines = [];
  let goldGain = rand(20, 50) * tier * (bonus?1.6:1);
  GAME.gold += Math.round(goldGain);
  run.runLoot.gold += Math.round(goldGain);
  lines.push(`💰 獲得 ${Math.round(goldGain)} 金幣`);

  const dropChance = bonus ? 0.9 : 0.55;
  if (chance(dropChance)) {
    const slot = pick(EQUIP_SLOTS);
    const eq = generateEquipment(slot, tier + (bonus?1:0));
    GAME.inventory[slot].push(eq);
    run.runLoot.items.push(eq.name);
    lines.push(`✨ 獲得裝備：${eq.name}（${eq.rarityName}）`);
  }
  run.runStats.chests++;
  updateQuestProgress('chest_open', { amount: 1 });
  showRoomResultModal(bonus ? '🎁 隱藏寶藏' : '📦 寶箱', lines, () => renderCurrentView());
}

function triggerTrapRoom(room, fd, run) {
  room.cleared = true;
  const party = getParty().filter(a => a.hp > 0);
  const lines = [];
  if (party.length === 0) { renderCurrentView(); return; }
  const trapType = pick(['damage','poison','gold_loss','nothing']);
  if (trapType === 'damage') {
    const victim = pick(party);
    const dmg = Math.round(victim.maxHp * randf(0.1, 0.22));
    victim.hp = Math.max(1, victim.hp - dmg);
    lines.push(`⚠️ 陷阱發動！${victim.name} 受到 ${dmg} 點傷害`);
  } else if (trapType === 'poison') {
    const victim = pick(party);
    lines.push(`☠️ 毒氣陷阱！${victim.name} 中毒了（返回城鎮前持續扣血）`);
    victim.hp = Math.max(1, victim.hp - Math.round(victim.maxHp*0.08));
  } else if (trapType === 'gold_loss') {
    const loss = Math.min(GAME.gold, rand(10,40));
    GAME.gold -= loss;
    lines.push(`💸 陷阱觸發了警報，loss了 ${loss} 金幣的隨身財物`);
  } else {
    lines.push('🍃 看起來像陷阱，但什麼也沒發生……');
  }
  showRoomResultModal('⚠️ 陷阱', lines, () => renderCurrentView());
}

function triggerEventRoom(room, fd, run, bonus) {
  room.cleared = true;
  const ev = rollRandomEvent();
  run.runStats.eventsTriggered++;
  resolveRandomEvent(ev, fd, run, bonus);
}

function triggerNPCRoom(room, fd, run, bonus) {
  room.cleared = true;
  const npc = rollNPCEncounter();
  resolveNPCEncounter(npc, fd, run, bonus);
}

function triggerExitRoom(room, fd, run) {
  room.cleared = true;
  showFloorClearModal(fd, run);
}

function showRoomResultModal(title, lines, onClose) {
  const panel = $('#modal-panel');
  panel.innerHTML = `<h3>${title}</h3>` + lines.map(l => `<div class="card">${l}</div>`).join('');
  const btn = el('button', 'action-btn primary', '繼續探索');
  btn.style.width='100%'; btn.style.marginTop='8px'; btn.style.padding='12px';
  btn.onclick = () => { closeOverlay('overlay-modal'); onClose && onClose(); queueAutosave(); };
  panel.appendChild(btn);
  $('#overlay-modal').classList.add('center-modal');
  openOverlay('overlay-modal');
}

function showFloorClearModal(fd, run) {
  const panel = $('#modal-panel');
  updateQuestProgress('floor', { value: run.floor });
  panel.innerHTML = `<h3>🚪 下行階梯</h3><p class="muted">通往第${run.floor+1}層的階梯就在眼前。要繼續深入，或先把本層探索完？</p>`;
  const row = el('div', 'modal-btn-row'); row.style.flexDirection = 'column';
  const goBtn = el('button', 'action-btn primary', '⬇️ 繼續深入下一層');
  goBtn.onclick = () => {
    closeOverlay('overlay-modal'); $('#overlay-modal').classList.remove('center-modal');
    run.floor++;
    run.floorData = generateDungeonFloor(run.floor, GAME.dungeon.currentRank);
    if (run.floor > GAME.dungeon.deepestFloor) GAME.dungeon.deepestFloor = run.floor;
    if (run.floor > GAME.dungeon.infiniteBest) GAME.dungeon.infiniteBest = run.floor;
    renderCurrentView();
    queueAutosave();
  };
  const stayBtn = el('button', 'action-btn', '🔍 先探索本層其他房間');
  stayBtn.onclick = () => {
    closeOverlay('overlay-modal'); $('#overlay-modal').classList.remove('center-modal');
    showToast('階梯已標記，隨時可以回來下樓');
    renderCurrentView();
  };
  const leaveBtn = el('button', 'action-btn danger', '🏠 返回城鎮');
  leaveBtn.onclick = () => { closeOverlay('overlay-modal'); finishDungeonRun(true); };
  row.appendChild(goBtn); row.appendChild(stayBtn); row.appendChild(leaveBtn);
  panel.appendChild(row);
  $('#overlay-modal').classList.add('center-modal');
  openOverlay('overlay-modal');
}

function confirmRetreatDungeon() {
  const panel = $('#modal-panel');
  panel.innerHTML = `<h3>撤退回城鎮？</h3><p class="muted">已獲得的戰利品將會保留，但會失去本次探索的進度。</p>`;
  const row = el('div', 'modal-btn-row');
  const yes = el('button', 'action-btn danger', '確定撤退');
  yes.onclick = () => { closeOverlay('overlay-modal'); finishDungeonRun(true); };
  const no = el('button', 'action-btn', '繼續探索');
  no.onclick = () => closeOverlay('overlay-modal');
  row.appendChild(yes); row.appendChild(no);
  panel.appendChild(row);
  $('#overlay-modal').classList.add('center-modal');
  openOverlay('overlay-modal');
}

function finishDungeonRun(success) {
  const run = GAME.dungeon.activeRun;
  if (run) {
    GAME.statsTotal.dungeonsCleared++;
    addHistory(`公會隊伍探索無盡迷宮抵達第${run.floor}層，帶回 ${run.runLoot.gold} 金幣的戰利品。`);
    if (run.floor > GAME.dungeon.deepestFloor) GAME.dungeon.deepestFloor = run.floor;
  }
  GAME.dungeon.activeRun = null;
  // 公會難度提升判定：依累計最深抵達樓層計算，避免單次探索失敗導致進度停滯
  while (GAME.dungeon.deepestFloor >= GAME.dungeon.currentRank * 4) {
    GAME.dungeon.currentRank++;
    showToast(`🔺 公會難度提升！目前 Rank ${GAME.dungeon.currentRank}`);
    addHistory(`公會的迷宮探索難度提升至 Rank ${GAME.dungeon.currentRank}。`);
  }
  $('#overlay-modal').classList.remove('center-modal');
  UI.currentTownView = 'hall';
  renderCurrentView();
  queueAutosave();
}

function resolveRandomEvent(ev, fd, run, bonus) {
  const panel = $('#modal-panel');
  panel.innerHTML = `<h3>❓ ${ev.name}</h3><p class="muted">${ev.desc}</p>`;
  const row = el('div', 'modal-btn-row'); row.style.flexDirection='column';

  const closeAndContinue = () => { closeOverlay('overlay-modal'); $('#overlay-modal').classList.remove('center-modal'); renderCurrentView(); queueAutosave(); };

  if (ev.type === 'merchant') {
    panel.appendChild(el('div', 'card', '一位神秘商人願意以較低價格賣給你稀有裝備。'));
    const tier = (fd.dungeonRank||GAME.dungeon.currentRank) + 1;
    const eq = generateEquipment(pick(EQUIP_SLOTS), tier);
    const price = Math.round(eq.sellPrice * 1.1);
    const buyBtn = el('button', 'action-btn primary', `購買「${eq.name}」（💰${price}）`);
    buyBtn.onclick = () => {
      if (GAME.gold < price) { showToast('金幣不足！'); return; }
      GAME.gold -= price; GAME.inventory[eq.slot].push(eq);
      showToast('交易成功！'); closeAndContinue();
    };
    const skipBtn = el('button', 'action-btn', '不需要，離開');
    skipBtn.onclick = closeAndContinue;
    panel.appendChild(buyBtn); panel.appendChild(skipBtn);

  } else if (ev.type === 'gamble_blessing') {
    panel.appendChild(el('div', 'card', '高風險高報酬：獻上祈禱可能獲得強力祝福，但也可能招致詛咒。'));
    const prayBtn = el('button', 'action-btn danger', '🙏 獻上祈禱（風險）');
    prayBtn.onclick = () => {
      const party = getParty().filter(a=>a.hp>0);
      if (chance(0.55)) {
        const target = pick(party.length?party:getParty());
        if (target) { gainExp(target, Math.round(target.maxHp*2)); recalcStats(target); target.hp=target.maxHp; }
        showToast('✨ 神壇賜予了祝福！');
        addHistory('一座古老神壇賜予冒險者祝福之力。');
      } else {
        const target = pick(party.length?party:getParty());
        if (target) target.hp = Math.max(1, Math.round(target.hp*0.5));
        showToast('💀 詛咒降臨！隊伍受到了傷害……');
      }
      closeAndContinue();
    };
    const skipBtn = el('button', 'action-btn', '保持距離，離開');
    skipBtn.onclick = closeAndContinue;
    panel.appendChild(prayBtn); panel.appendChild(skipBtn);

  } else if (ev.type === 'rescue') {
    panel.appendChild(el('div', 'card', '救助旅人可能獲得感謝的報酬，也可能只是浪費時間……或是陷阱。'));
    const helpBtn = el('button', 'action-btn success', '救助旅人');
    helpBtn.onclick = () => {
      if (chance(0.7)) {
        const gold = rand(40,100);
        GAME.gold += gold; run.runLoot.gold += gold;
        showToast(`旅人感激地給了你 ${gold} 金幣！`);
        if (chance(0.25)) {
          const adv = generateAdventurer(Math.max(1,GAME.dungeon.currentRank-1));
          GAME.roster.push(adv);
          showToast(`🎉 旅人決定加入你的公會：${adv.name}！`);
          addHistory(`獲救的旅人「${adv.name}」加入了公會。`);
        }
      } else {
        const party = getParty().filter(a=>a.hp>0);
        const target = pick(party.length?party:getParty());
        if (target) { generateMonsterGroup; triggerMonsterRoom({type:'monster'}, fd, run); closeOverlay('overlay-modal'); $('#overlay-modal').classList.remove('center-modal'); return; }
      }
      closeAndContinue();
    };
    const ignoreBtn = el('button', 'action-btn', '不予理會');
    ignoreBtn.onclick = closeAndContinue;
    panel.appendChild(helpBtn); panel.appendChild(ignoreBtn);

  } else if (ev.type === 'map_fragment') {
    GAME.gold += 0;
    panel.appendChild(el('div', 'card', '拾起藏寶圖殘片，下一個寶箱房間的獎勵將會提升！'));
    fd.treasureBoost = true;
    const okBtn = el('button', 'action-btn primary', '收下');
    okBtn.onclick = closeAndContinue;
    panel.appendChild(okBtn);

  } else if (ev.type === 'high_risk_fight') {
    panel.appendChild(el('div', 'card', '繞過巢穴安全離開，或主動攻擊換取豐厚戰利品？'));
    const fightBtn = el('button', 'action-btn danger', '⚔️ 主動攻擊（高風險）');
    fightBtn.onclick = () => {
      closeOverlay('overlay-modal'); $('#overlay-modal').classList.remove('center-modal');
      const tier = (fd.dungeonRank||GAME.dungeon.currentRank) + 1;
      const monsters = generateMonsterGroup(tier, 'elite');
      enterBattle(monsters, { room:{type:'event_fight'}, fd, run, source:'high_risk', bonusReward:true });
    };
    const avoidBtn = el('button', 'action-btn', '謹慎繞過');
    avoidBtn.onclick = closeAndContinue;
    panel.appendChild(fightBtn); panel.appendChild(avoidBtn);

  } else if (ev.type === 'vault') {
    panel.appendChild(el('div', 'card', '開門可能釋出強大的守護者，也可能藏有傳奇寶物。'));
    const openBtn = el('button', 'action-btn danger', '開啟之門（高風險高報酬）');
    openBtn.onclick = () => {
      if (chance(0.5)) {
        closeOverlay('overlay-modal'); $('#overlay-modal').classList.remove('center-modal');
        const tier = (fd.dungeonRank||GAME.dungeon.currentRank) + 2;
        const guardian = generateMonster(tier, { elite:true });
        guardian.name = '【門之守護者】' + guardian.name;
        enterBattle([guardian], { room:{type:'vault_guard'}, fd, run, source:'vault', bonusReward:true, legendaryDrop:true });
      } else {
        const tier = (fd.dungeonRank||GAME.dungeon.currentRank) + 2;
        const eq = generateEquipment(pick(EQUIP_SLOTS), tier);
        eq.rarity='legend'; eq.rarityName='傳奇'; eq.color=RARITIES[4].color;
        GAME.inventory[eq.slot].push(eq);
        showToast(`🏆 門內藏有寶物：${eq.name}！`);
        closeAndContinue();
      }
    };
    const leaveBtn = el('button', 'action-btn', '不敢冒險，離開');
    leaveBtn.onclick = closeAndContinue;
    panel.appendChild(openBtn); panel.appendChild(leaveBtn);

  } else if (ev.type === 'loot_or_curse') {
    panel.appendChild(el('div', 'card', '前人遺留的裝備散發著微妙的氣息……要帶走嗎？'));
    const tier = fd.dungeonRank||GAME.dungeon.currentRank;
    const takeBtn = el('button', 'action-btn', '帶走裝備');
    takeBtn.onclick = () => {
      if (chance(0.65)) {
        const eq = generateEquipment(pick(EQUIP_SLOTS), tier);
        GAME.inventory[eq.slot].push(eq);
        showToast(`獲得了 ${eq.name}`);
      } else {
        const party = getParty().filter(a=>a.hp>0);
        const target = pick(party.length?party:getParty());
        if (target) { target.hp = Math.max(1, target.hp - Math.round(target.maxHp*0.15)); }
        showToast('💀 裝備帶有詛咒！隊伍受到傷害');
      }
      closeAndContinue();
    };
    const leaveBtn = el('button', 'action-btn', '不予理會');
    leaveBtn.onclick = closeAndContinue;
    panel.appendChild(takeBtn); panel.appendChild(leaveBtn);

  } else if (ev.type === 'exp_bonus') {
    panel.appendChild(el('div', 'card', '聆聽石像的吟唱，全隊獲得額外經驗值！'));
    const okBtn = el('button', 'action-btn success', '聆聽旋律');
    okBtn.onclick = () => {
      getParty().filter(a=>a.hp>0).forEach(a => { const lv=gainExp(a, 30 + (fd.dungeonRank||1)*10); if(lv) showToast(`${a.name} 升級了！`); });
      closeAndContinue();
    };
    panel.appendChild(okBtn);
  } else {
    const okBtn = el('button', 'action-btn primary', '繼續');
    okBtn.onclick = closeAndContinue;
    panel.appendChild(okBtn);
  }

  $('#overlay-modal').classList.add('center-modal');
  openOverlay('overlay-modal');
}

function resolveNPCEncounter(npc, fd, run, bonus) {
  const panel = $('#modal-panel');
  panel.innerHTML = `<h3>👤 ${npc.name}</h3><p class="muted">${npc.desc}</p>`;
  const closeAndContinue = () => { closeOverlay('overlay-modal'); $('#overlay-modal').classList.remove('center-modal'); renderCurrentView(); queueAutosave(); };

  if (npc.type === 'mentor') {
    panel.appendChild(el('div','card','隱居的英雄願意指導一名隊員，使其獲得大量經驗值。'));
    const party = getParty().filter(a=>a.hp>0);
    party.forEach(a => {
      const btn = el('button', 'action-btn primary', `指導 ${a.name}`);
      btn.onclick = () => { const lv = gainExp(a, 80 + (fd.dungeonRank||1)*20); recalcStats(a); showToast(`${a.name} 獲得了大量經驗！${lv?'並升級了！':''}`); closeAndContinue(); };
      panel.appendChild(btn);
    });
    const skip = el('button','action-btn','離開'); skip.onclick = closeAndContinue;
    panel.appendChild(skip);
  } else if (npc.type === 'rescue_child') {
    panel.appendChild(el('div','card','帶這個孩子回城鎮安全的地方，公會聲望將會提升。'));
    const btn = el('button', 'action-btn success', '帶孩子回城鎮');
    btn.onclick = () => { GAME.reputation += 15; showToast('📜 公會聲望 +15'); addHistory('冒險者隊伍救助了一名迷路的孩子，公會聲望提升。'); closeAndContinue(); };
    const skip = el('button','action-btn','留下孩子'); skip.onclick = closeAndContinue;
    panel.appendChild(btn); panel.appendChild(skip);
  } else if (npc.type === 'rival_duel') {
    panel.appendChild(el('div','card','敵對冒險者下達了挑戰，戰勝可獲得獎金與聲望。'));

    btn.onclick = () => {
      closeOverlay('overlay-modal'); $('#overlay-modal').classList.remove('center-modal');
      const tier = fd.dungeonRank||GAME.dungeon.currentRank;
      const rival = generateMonster(tier, { elite:true });
      rival.name = '敵對冒險者・' + pick(['雷克斯','薇拉','卡爾頓']);
      rival.tags = rival.tags.filter(t=>t!=='elite');
      enterBattle([rival], { room:{type:'rival'}, fd, run, source:'rival', bonusReward:true });
    };
    const skip = el('button','action-btn','拒絕挑戰'); skip.onclick = closeAndContinue;
    panel.appendChild(btn); panel.appendChild(skip);
  } else if (npc.type === 'trade_knowledge') {
    panel.appendChild(el('div','card','隱士願意用稀有知識交換金幣，提供一次免費的特訓機會。'));
    const cost = 60;
    const btn = el('button', 'action-btn primary', `交換知識（💰${cost}）`);
    btn.onclick = () => {
      if (GAME.gold < cost) { showToast('金幣不足！'); return; }
      GAME.gold -= cost;
      const a = pick(getParty());
      if (a) { a.baseStat[pick(['str','vit','agi','int','mag','luk'])] += 2; recalcStats(a); }
      showToast(`${a?a.name:'隊員'} 領悟了隱士的知識，能力提升！`);
      closeAndContinue();
    };
    const skip = el('button','action-btn','離開'); skip.onclick = closeAndContinue;
    panel.appendChild(btn); panel.appendChild(skip);
  } else {
    const okBtn = el('button', 'action-btn primary', '繼續'); okBtn.onclick = closeAndContinue;
    panel.appendChild(okBtn);
  }

  $('#overlay-modal').classList.add('center-modal');
  openOverlay('overlay-modal');
}

let _battleTokenCounter = 0;

function enterBattle(monsters, context) {
  const party = getParty().filter(a => a.hp > 0);
  UI.battleState = createBattleState(party, monsters, context);
  UI.battleState._token = ++_battleTokenCounter;
  UI.battleActorUid = null;
  UI.battlePlaying = false;
  resetBattleAnim();
  UI.currentTownView = 'battle';
  renderCurrentView();
}

function renderBattle(c) {
  c.innerHTML = '';
  const bs = UI.battleState;
  if (!bs) { UI.currentTownView = 'hall'; renderCurrentView(); return; }

  const wrap = el('div', ''); wrap.id = 'battle-view';

  const canvasWrap = el('div', ''); canvasWrap.id = 'battle-canvas-wrap';
  const canvas = el('canvas'); canvas.id = 'battle-canvas';
  canvasWrap.appendChild(canvas);
  wrap.appendChild(canvasWrap);

  const log = el('div', ''); log.id = 'battle-log';
  wrap.appendChild(log);

  const unitList = el('div', ''); unitList.id = 'battle-party-list';
  bs.party.forEach(p => {
    const card = el('div', 'battle-unit-card' + (p.battleHp<=0?' dead':'') + (UI.battleActorUid===p.uid?' acting':''));
    const hpPct = Math.max(0, Math.round(p.battleHp/p.maxHp*100));
    const mpPct = Math.max(0, Math.round(p.battleMp/p.maxMp*100));
    const statusStr = p.statusFx.map(s=>STATUS_NAME[s.id]).join(' ');
    card.innerHTML = `
      <div class="battle-unit-icon">${classIcon(p.classKey)}</div>
      <div class="battle-unit-bars">
        <div class="battle-unit-name"><span>${escapeHtml(p.name)}${p.battleHp<=0?'（倒下）':''}</span><span class="muted">${statusStr}</span></div>
        <div class="bar-bg"><div class="bar-fill bar-hp" style="width:${hpPct}%"></div></div>
        <div class="bar-bg" style="margin-top:2px;"><div class="bar-fill bar-mp" style="width:${mpPct}%"></div></div>
      </div>`;
    unitList.appendChild(card);
  });
  wrap.appendChild(unitList);

  const actionsWrap = el('div', ''); actionsWrap.id = 'battle-actions';

  if (!bs.over) {
    if (UI.battlePlaying) {
      const playingTag = el('div', 'muted text-center', '── 戰鬥進行中… ──');
      playingTag.style.marginBottom='6px'; playingTag.style.padding='10px 0';
      actionsWrap.appendChild(playingTag);
    } else {
      const actor = getCurrentActor(bs);
      if (actor) {
        const nameTag = el('div', 'muted text-center', `── ${escapeHtml(actor.name)} 的行動 ──`);
        nameTag.style.marginBottom='6px';
        actionsWrap.appendChild(nameTag);

        const row = el('div', 'battle-action-row');
        const mkAction = (label, fn) => { const b = el('button','battle-action-btn',label); b.onclick = fn; return b; };
        row.appendChild(mkAction('攻擊', () => openTargetMonsterModal(bs, actor, { type:'attack' })));
        row.appendChild(mkAction('技能', () => openSkillModal(bs, actor)));
        row.appendChild(mkAction('道具', () => openItemModal(bs, actor)));
        row.appendChild(mkAction('防禦', () => performPlayerAction(bs, {type:'defend', actorUid:actor.uid})));
        row.appendChild(mkAction('逃跑', () => performPlayerAction(bs, {type:'flee', actorUid:actor.uid})));
        actionsWrap.appendChild(row);
      }
    }
  } else {
    actionsWrap.appendChild(renderBattleResultPanel(bs));
  }

  wrap.appendChild(actionsWrap);
  c.appendChild(wrap);
  // log元素必須等到整個battle-view已插入文件DOM之後才填入內容並捲動，
  // 否則元素仍處於detached狀態，瀏覽器無法正確計算scrollHeight，會導致捲動停在頂部而非底部
  renderBattleLogLines(log, bs.log.slice(-20));
  drawBattleCanvas(canvas, bs);
}

// 將戰鬥訊息渲染進log區塊，並自動捲動到底部讓玩家看到最新訊息
function renderBattleLogLines(logEl, lines) {
  logEl.innerHTML = lines.map(l => `<div>${escapeHtml(l)}</div>`).join('');
  logEl.scrollTop = logEl.scrollHeight;
}

function appendBattleLogLine(text) {
  const logEl = document.getElementById('battle-log');
  if (!logEl) return;
  const lineEl = document.createElement('div');
  lineEl.textContent = text;
  logEl.appendChild(lineEl);
  // 避免無限增長，僅保留最後60行的DOM節點
  while (logEl.children.length > 60) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop = logEl.scrollHeight;
}

function getCurrentActor(bs) {
  // 找出本回合尚未行動的存活隊員（簡化：依序由前往後，speed排序在開始時決定）
  if (!bs.actionOrder || bs.actionOrder.length === 0) {
    bs.actionOrder = getSpeedOrder(bs.party.filter(p=>p.battleHp>0)).map(p=>p.uid);
    bs.actedThisTurn = new Set();
  }
  for (const uid of bs.actionOrder) {
    if (bs.acted && bs.acted.has(uid)) continue;
    const p = bs.party.find(x=>x.uid===uid);
    if (p && p.battleHp > 0) return p;
  }
  return null;
}

// ---------------- 事件佇列播放系統 ----------------
// 每個事件依kind決定動畫節奏與時長，逐一播放後才繼續下一個，播放完畢呼叫doneCallback
const EVENT_STEP_MS_BASE = {
  attack: 520, skill_hit: 520, miss: 380, heal: 420, status_damage: 380,
  death: 520, defend: 300, flee_success: 200, flee_fail: 380, skill_fail: 300,
  buff: 380, skill_cast: 380, summon: 380, revive: 480, cleanse: 380,
  status_apply: 320, self_damage: 420, status_skip: 380, default: 380,
};
// 測試環境可設定 window.__BATTLE_ANIM_SPEED__ 為較大值(例如20)以加速動畫播放，縮短自動化測試時間
function getAnimSpeedMul() {
  if (typeof window !== 'undefined' && window.__BATTLE_ANIM_SPEED__) return window.__BATTLE_ANIM_SPEED__;
  return 1;
}
function getEventStepMs(kind) {
  const base = EVENT_STEP_MS_BASE[kind] || EVENT_STEP_MS_BASE.default;
  return Math.max(4, Math.round(base / getAnimSpeedMul()));
}

function playBattleEvents(events, onDone) {
  if (!events || events.length === 0) { onDone && onDone(); return; }
  let idx = 0;
  function step() {
    if (idx >= events.length) { onDone && onDone(); return; }
    const evt = events[idx];
    idx++;
    playSingleEvent(evt, () => step());
  }
  step();
}

function playSingleEvent(evt, next) {
  const duration = getEventStepMs(evt.kind);

  // 觸發攻擊位移動畫
  if ((evt.kind === 'attack' || evt.kind === 'skill_hit') && evt.sourceUid) {
    animLunge(evt.sourceUid, evt.sourceSide, Math.min(380, duration*0.7));
  }

  // 命中瞬間（位移到一半時）才觸發受擊閃爍與飄字，讓動畫有先後順序
  const hitDelay = (evt.kind === 'attack' || evt.kind === 'skill_hit') ? Math.min(190, duration*0.35) : 0;

  setTimeout(() => {
    if (evt.kind === 'miss') {
      if (evt.targetUid) animFloatText(evt.targetUid, 'MISS', '#cfcfcf');
    } else if (evt.kind === 'attack' || evt.kind === 'skill_hit' || evt.kind === 'status_damage' || evt.kind === 'self_damage') {
      if (evt.targetUid) {
        animHit(evt.targetUid, 240);
        const color = evt.isCrit ? '#ffd24a' : '#ff6b6b';
        animFloatText(evt.targetUid, (evt.isCrit ? '暴擊! ' : '') + '-'+formatNum(evt.amount||0), color);
      }
    } else if (evt.kind === 'heal' || evt.kind === 'revive') {
      if (evt.targetUid) animFloatText(evt.targetUid, '+'+formatNum(evt.amount||0), '#79e0a0');
    } else if (evt.kind === 'status_apply') {
      if (evt.targetUid) animFloatText(evt.targetUid, STATUS_NAME[evt.statusId]||'', '#c9a6f5');
    } else if (evt.kind === 'death') {
      if (evt.targetUid) animDeath(evt.targetUid);
    }

    // 文字訊息在動畫觸發的同時加入log並捲動
    if (evt.text && !evt.silent) appendBattleLogLine(evt.text);
  }, hitDelay);

  setTimeout(next, duration);
}

function performPlayerAction(bs, action) {
  if (UI.battlePlaying) return; // 防護：動畫播放期間忽略任何新的行動請求，避免事件佇列競態
  const token = bs._token;
  const isStale = () => UI.battleState !== bs || UI.battleState._token !== token;

  if (!bs.acted) bs.acted = new Set();
  bs.events = [];
  executePlayerAction(bs, action);
  bs.acted.add(action.actorUid);

  UI.battlePlaying = true;
  renderCurrentView(); // 立即鎖定按鈕，顯示「戰鬥進行中」

  const playerEvents = bs.events;
  playBattleEvents(playerEvents, () => {
    if (isStale()) return; // 此戰鬥已結束/被取代，忽略過期的callback
    if (bs.over) { UI.battlePlaying = false; renderCurrentView(); return; }

    const next = getCurrentActor(bs);
    if (next) {
      UI.battlePlaying = false;
      renderCurrentView();
      return;
    }

    // 所有隊員已行動 -> 怪物回合
    bs.events = [];
    runMonsterPhase(bs);
    const monsterEvents = bs.events;
    playBattleEvents(monsterEvents, () => {
      if (isStale()) return;
      if (bs.over) { UI.battlePlaying = false; renderCurrentView(); return; }
      bs.events = [];
      runEndOfTurnStatus(bs);
      const statusEvents = bs.events;
      playBattleEvents(statusEvents, () => {
        if (isStale()) return;
        bs.acted = new Set();
        bs.actionOrder = null;
        UI.battlePlaying = false;
        renderCurrentView();
      });
    });
  });
}

      if (ctx.legendaryDrop) { eq.rarity='legend'; eq.rarityName='傳奇'; eq.color=RARITIES[4].color; }

      GAME.gold += totalGold;
      if (bs.context && bs.context.run) bs.context.run.runLoot.gold += totalGold;
      GAME.statsTotal.goldEarned += totalGold;

      if (bs.monsters.some(m=>m.isBoss)) { updateQuestProgress('boss_clear', {}); addHistory(`公會隊伍擊敗了首領「${bs.monsters.find(m=>m.isBoss).name}」！`); }
      syncBattleResultsToParty(bs, true);

      if (bs.context && bs.context.room && bs.context.room.type === 'boss') {

// ---------------- Canvas 戰鬥畫面繪製與動畫 ----------------
// UI.battleAnim: 暫存各單位的動畫狀態，以uid為key
// { offsetX, offsetY, flashUntil, floatTexts:[{text,color,startTime,isCrit}], deathFade }
function ensureAnimState(uid) {
  if (!UI.battleAnim) UI.battleAnim = {};
  if (!UI.battleAnim[uid]) UI.battleAnim[uid] = { offsetX:0, offsetY:0, flashUntil:0, floatTexts:[], deathFade:1, shakeUntil:0 };
  return UI.battleAnim[uid];
}
function resetBattleAnim() { UI.battleAnim = {}; }

function nowMs() { return (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now(); }

// 觸發「攻擊衝刺」動畫：sourceUid衝向targetUid方向再退回
function animLunge(sourceUid, sourceSide, durationMs) {
  const st = ensureAnimState(sourceUid);
  const dir = sourceSide === 'party' ? -1 : 1; // 玩家往上衝(朝怪物)，怪物往下衝(朝玩家)
  st.lungeStart = nowMs();
  st.lungeDuration = durationMs || 380;
  st.lungeDir = dir;
}
// 觸發「受擊閃爍+震動」動畫
function animHit(targetUid, durationMs) {
  const st = ensureAnimState(targetUid);
  st.flashUntil = nowMs() + (durationMs || 260);
  st.shakeUntil = nowMs() + (durationMs || 260);
}
// 飄出傷害/治療數字
function animFloatText(targetUid, text, color) {
  const st = ensureAnimState(targetUid);
  st.floatTexts.push({ text, color: color || '#fff', startTime: nowMs() });
}
// 觸發死亡淡出
function animDeath(targetUid) {
  const st = ensureAnimState(targetUid);
  st.dying = true;
  st.deathStart = nowMs();
}

let battleAnimFrame = 0;
let battleRafHandle = null;

function drawBattleCanvas(canvas, bs) {
  if (!canvas || !bs) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width+'px';
  canvas.style.height = rect.height+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const t = nowMs();

  // 背景
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#2c1f17'); grad.addColorStop(1,'#15100a');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, H*0.78, W, H*0.22);

  // 怪物繪製（上半部）
  const monsters = bs.monsters;
  const mCount = monsters.length;
  monsters.forEach((m, i) => {
    const slotW = W / (mCount+0.6);
    const baseX = slotW*(i+0.8);
    const baseY = H*0.36 + (m.isBoss?-10:0);
    const st = ensureAnimState(m.uid);
    const dead = m.battleHp <= 0;

    const { dx, dy, shakeX } = computeAnimOffset(st, t, baseX, baseY, 'monster');
    let alpha = 1;
    if (dead) {
      if (st.dying) {
        const elapsed = t - (st.deathStart||t);
        alpha = clamp(1 - elapsed/500, 0, 1);
      } else {
        alpha = 0.22;
      }
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    if (st.flashUntil > t) {
      // 受擊閃爍：交替顯示亮紅色色塊疊加
      const flashOn = Math.floor((st.flashUntil - t) / 60) % 2 === 0;
      if (flashOn) ctx.filter = 'brightness(1.8) saturate(2)';
    }
    const size = m.isBoss ? 46 : (m.isElite ? 38 : 30);
    ctx.font = size+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const idleBounce = Math.sin((battleAnimFrame+i*20)/18) * 2;
    ctx.fillText(monsterEmoji(m), baseX+dx+shakeX, baseY+dy+idleBounce);
    ctx.restore();

    if (!dead) {
      const barW = size*1.4;
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.fillRect(baseX-barW/2, baseY+size*0.55, barW, 6);
      ctx.fillStyle = m.isBoss ? '#b13e3e' : '#c95757';
      ctx.fillRect(baseX-barW/2, baseY+size*0.55, barW*Math.max(0,m.battleHp/m.maxHp), 6);
      ctx.font = '10px sans-serif'; ctx.fillStyle='#ECE0C5';
      ctx.fillText(m.name, baseX, baseY+size*0.55+16);
    } else if (alpha > 0.05) {
      ctx.font='10px sans-serif'; ctx.fillStyle='rgba(236,224,197,0.4)';
      ctx.fillText('倒下', baseX, baseY+size*0.55+10);
    }

    drawFloatTexts(ctx, st, t, baseX, baseY);
  });

  // 玩家方（下半部，簡化為圖示列）
  const aliveP = bs.party;
  aliveP.forEach((p, i) => {
    const slotW = W / (aliveP.length+0.6);
    const baseX = slotW*(i+0.8);
    const baseY = H*0.78;
    const st = ensureAnimState(p.uid);
    const dead = p.battleHp <= 0;

    const { dx, dy, shakeX } = computeAnimOffset(st, t, baseX, baseY, 'party');
    let alpha = 1;
    if (dead) {
      if (st.dying) {
        const elapsed = t - (st.deathStart||t);
        alpha = clamp(1 - elapsed/500, 0, 1);
      } else {
        alpha = 0.3;
      }
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    if (st.flashUntil > t) {
      const flashOn = Math.floor((st.flashUntil - t) / 60) % 2 === 0;
      if (flashOn) ctx.filter = 'brightness(1.8) saturate(2)';
    }
    ctx.font = '26px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(classIcon(p.classKey), baseX+dx+shakeX, baseY+dy);
    ctx.restore();

    drawFloatTexts(ctx, st, t, baseX, baseY);
  });

  battleAnimFrame++;
}

// 計算單位目前的動畫位移（衝刺lunge + 受擊震動shake）
function computeAnimOffset(st, t, baseX, baseY, side) {
  let dx = 0, dy = 0, shakeX = 0;
  if (st.lungeStart !== undefined) {
    const elapsed = t - st.lungeStart;
    const dur = st.lungeDuration || 380;
    if (elapsed >= 0 && elapsed < dur) {
      const half = dur/2;
      let progress;
      if (elapsed < half) progress = elapsed/half; // 衝出
      else progress = 2 - elapsed/half; // 退回
      const dist = side === 'party' ? -16 : 16; // 縱向位移：玩家往上衝、怪物往下衝
      dy = dist * progress;
    } else if (elapsed >= dur) {
      st.lungeStart = undefined;
    }
  }
  if (st.shakeUntil > t) {
    shakeX = Math.sin(t/22) * 3;
  }
  return { dx, dy, shakeX };
}

function drawFloatTexts(ctx, st, t, baseX, baseY) {
  st.floatTexts = st.floatTexts.filter(ft => (t - ft.startTime) < 850);
  st.floatTexts.forEach(ft => {
    const elapsed = t - ft.startTime;
    const progress = elapsed / 850;
    const riseY = -30 * progress;
    const alpha = clamp(1 - progress*1.05, 0, 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = ft.isCrit ? '800 19px sans-serif' : '700 15px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline='middle';
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillText(ft.text, baseX+1, baseY-26+riseY+1);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, baseX, baseY-26+riseY);
    ctx.restore();
  });
}

function monsterEmoji(m) {
  const map = { slime:'🟢', goblin:'👺', wolf:'🐺', bat:'🦇', skeleton:'💀', zombie:'🧟',
    fire_imp:'👹', ice_wraith:'👻', thunder_bird:'🐦', orc_brute:'👹', dark_mage:'🧙', troll:'🧌',
    wyvern:'🐉', lich:'💀', dragon:'🐲', demon_lord:'👿' };
  return map[m.key] || '👾';
}

// 戰鬥畫面持續重繪迴圈（idle動畫 + 事件動畫），用requestAnimationFrame取得流暢度
// 僅在真實瀏覽器環境（具備requestAnimationFrame）啟動常駐重繪；
// 在無頭測試環境中，畫面僅於playBattleEvents/renderCurrentView主動呼叫drawBattleCanvas時更新，不需常駐計時器。
function battleRenderLoop() {
  if (UI.currentTownView === 'battle' && UI.battleState) {
    const canvas = document.getElementById('battle-canvas');
    if (canvas) drawBattleCanvas(canvas, UI.battleState);
  }
  battleRafHandle = requestAnimationFrame(battleRenderLoop);
}
if (typeof requestAnimationFrame !== 'undefined' && typeof window !== 'undefined' && window.requestAnimationFrame) {
  battleRenderLoop();
}
// ============================================================
// 主遊戲邏輯 - Part 7: 日期推進 / 世界事件 / 選單 / 初始化
// ============================================================

function advanceDay() {
  if (GAME.dungeon.activeRun) { showToast('請先完成或撤退目前的地下城探索！'); return; }
  GAME.day++;

  // 支薪
  let totalWage = 0;
  activeRoster().forEach(a => { totalWage += a.wage; });
  GAME.gold -= totalWage;
  if (GAME.gold < 0) {
    GAME.reputation = Math.max(0, GAME.reputation - 10);
    showToast(`⚠ 公會資金不足支付薪水！聲望下降`);
    GAME.gold = 0;
  }

  // 自然恢復
  activeRoster().forEach(a => {
    if (a.isResting) {
      if (GAME.day >= a.restUntilDay) { a.isResting = false; a.hp = a.maxHp; a.mp = a.maxMp; showToast(`${a.name} 已完成休養`); }
    } else {
      a.hp = Math.min(a.maxHp, a.hp + Math.round(a.maxHp*0.25));
      a.mp = Math.min(a.maxMp, a.mp + Math.round(a.maxMp*0.4));
      if (a.hp <= 0 && chance(0.5)) { a.isResting = true; a.restUntilDay = GAME.day + rand(2,4); }
    }
  });

  // 世界事件邏輯
  if (GAME.currentEvent) {
    GAME.eventDaysLeft--;
    if (GAME.eventDaysLeft <= 0) {
      const ev = WORLD_EVENTS.find(e=>e.id===GAME.currentEvent);
      addHistory(`「${ev?ev.name:''}」事件結束，世界恢復了平靜。`);
      GAME.currentEvent = null;
    }
  } else if (chance(0.12)) {
    const ev = pick(WORLD_EVENTS);
    GAME.currentEvent = ev.id;
    GAME.eventDaysLeft = ev.duration;
    addHistory(`世界發生了「${ev.name}」事件：${ev.desc}`);
    showToast(`🌍 世界事件：${ev.name}`);
  }

  // 委託任務每隔幾天補充
  if (GAME.day % 5 === 0) generateBountyQuests();

  showToast(`📅 第 ${GAME.day} 日開始了`);
  renderCurrentView();
  queueAutosave();
}

// ============================================================
// 選單 / 名人堂 / 歷史紀錄
// ============================================================
function renderHallOfFameModal() {
  const panel = $('#modal-panel');
  panel.innerHTML = `<h3>🏆 名人堂</h3>`;
  if (GAME.hallOfFame.length === 0) {
    panel.appendChild(el('div', 'empty-state', '<span class="emoji">🏆</span>尚無退休或殞落的傳奇'));
  } else {
    GAME.hallOfFame.slice().reverse().forEach(h => {
      const card = el('div', 'card');
      card.innerHTML = `<div class="flex-between"><b>${escapeHtml(h.name)}</b><span class="badge ${h.type==='retired'?'badge-rank':'badge-elite'}">${h.type==='retired'?'光榮退休':'壯烈犧牲'}</span></div>
        <div class="muted">${raceLabel(h.race)}・${classLabel(h.classKey)}・Lv.${h.level} ・ 第${h.day}日 ・ 勝場${h.battlesWon||0}</div>`;
      panel.appendChild(card);
    });
  }
  const closeBtn = el('button', 'btn-list close-btn', '關閉');
  closeBtn.onclick = () => closeOverlay('overlay-modal');
  panel.appendChild(closeBtn);
  $('#overlay-modal').classList.add('center-modal');
  openOverlay('overlay-modal');
}

function renderHistoryModal() {
  const panel = $('#modal-panel');
  panel.innerHTML = `<h3>📜 世界歷史紀錄</h3>`;
  const listWrap = el('div', '');
  listWrap.style.maxHeight = '50vh'; listWrap.style.overflowY='auto';
  if (GAME.history.length === 0) listWrap.appendChild(el('div', 'empty-state', '尚無紀錄'));
  GAME.history.forEach(h => {
    const card = el('div', 'card');
    card.innerHTML = `<div class="muted" style="font-size:10.5px;">第${h.day}日</div><div style="font-size:12.5px;">${escapeHtml(h.text)}</div>`;
    listWrap.appendChild(card);
  });
  panel.appendChild(listWrap);
  const closeBtn = el('button', 'btn-list close-btn', '關閉');
  closeBtn.onclick = () => closeOverlay('overlay-modal');
  panel.appendChild(closeBtn);
  $('#overlay-modal').classList.add('center-modal');
  openOverlay('overlay-modal');
}

// ============================================================
// 主程式初始化與事件綁定
// ============================================================
function showScreen(id) {
  $$('.screen').forEach(s => s.classList.remove('active'));
  $('#'+id).classList.add('active');
}

function initApp() {
  $('#btn-new-game').onclick = () => { showScreen('screen-namesetup'); };
  $('#btn-continue').onclick = () => {
    const data = loadGame();
    if (!data) { showToast('找不到存檔紀錄'); return; }
    GAME = data;
    migrateLoadedGame();
    showScreen('screen-game');
    $('#screen-game').classList.add('active');
    UI.currentTownView = 'hall';
    switchTownView('hall');
  };
  if (!hasSaveGame()) { $('#btn-continue').disabled = true; $('#btn-continue').style.opacity='0.4'; }

  $('#btn-confirm-guild').onclick = () => {
    const name = $('#input-guild-name').value.trim() || '無名公會';
    startNewGame(name);
    showScreen('screen-game');
    switchTownView('hall');
  };

  $$('.nav-btn').forEach(btn => {
    btn.onclick = () => switchTownView(btn.dataset.view);
  });

  $('#btn-menu').onclick = () => openOverlay('overlay-menu');
  $('#menu-close').onclick = () => closeOverlay('overlay-menu');
  $('#menu-save').onclick = () => { saveGame(); showToast('✅ 已存檔'); closeOverlay('overlay-menu'); };
  $('#menu-history').onclick = () => { closeOverlay('overlay-menu'); renderHistoryModal(); };
  $('#menu-hof').onclick = () => { closeOverlay('overlay-menu'); renderHallOfFameModal(); };
  $('#menu-restart').onclick = () => {
    closeOverlay('overlay-menu');
    const panel = $('#modal-panel');
    panel.innerHTML = `<h3>清除存檔並重新開始？</h3><p class="muted">此操作將永久刪除目前的公會紀錄，無法復原。</p>`;
    const row = el('div', 'modal-btn-row');
    const yes = el('button', 'action-btn danger', '確定清除');
    yes.onclick = () => { localStorage.removeItem(SAVE_KEY); closeOverlay('overlay-modal'); $('#overlay-modal').classList.remove('center-modal'); location.reload(); };
    const no = el('button', 'action-btn', '取消');
    no.onclick = () => closeOverlay('overlay-modal');
    row.appendChild(yes); row.appendChild(no);
    panel.appendChild(row);
    $('#overlay-modal').classList.add('center-modal');
    openOverlay('overlay-modal');
  };

  // 點擊浮層背景關閉（選單類）
  $('#overlay-menu').addEventListener('click', (e) => { if (e.target.id==='overlay-menu') closeOverlay('overlay-menu'); });

  // 防止iOS雙指縮放/橡皮筋效果干擾
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  window.addEventListener('resize', () => {
    if (UI.currentTownView === 'dungeon_explore') renderCurrentView();
  });
}

function migrateLoadedGame() {
  // 確保舊存檔載入後欄位完整，避免缺漏造成錯誤
  const def = defaultGameState();
  Object.keys(def).forEach(k => { if (GAME[k] === undefined) GAME[k] = def[k]; });
  if (!GAME.quests) GAME.quests = def.quests;
  if (!GAME.facilities) GAME.facilities = def.facilities;
  if (!GAME.statsTotal) GAME.statsTotal = def.statsTotal;
  // 重新計算所有角色數值（避免公式更新後不同步，並修正NaN）
  GAME.roster.forEach(a => { try { recalcStats(a); } catch(e){} });
  // 若有進行中的地下城探索，因戰鬥狀態不持久化，視為已撤退
  if (GAME.dungeon && GAME.dungeon.activeRun) {
    GAME.dungeon.activeRun = null;
  }
}

window.addEventListener('DOMContentLoaded', initApp);

</script>
