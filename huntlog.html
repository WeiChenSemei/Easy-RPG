<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hunt Log - 終極狩獵記錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-1deg); }
            75% { transform: translateX(8px) rotate(1deg); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 2; }
    </style>
</head>
<body class="bg-[#050505] text-gray-100 min-h-[100dvh] flex justify-center items-center overflow-hidden">

    <!-- 手機豎屏容器限制 -->
    <div id="app-container" class="w-full max-w-[480px] h-[100dvh] bg-[#0b0c10] flex flex-col relative shadow-[0_0_50px_rgba(0,0,0,0.8)] border-x border-gray-800/60 overflow-hidden">

        <!-- 主容器 -->
        <main class="flex-1 relative overflow-hidden flex flex-col">
            
            <!-- [1] 集會所畫面 (Gathering Hub) -->
            <div id="hub-screen" class="absolute inset-0 z-20 bg-gradient-to-b from-[#0f1115] to-[#07080a] overflow-hidden flex flex-col">
                
                <!-- 分頁按鈕 -->
                <div class="flex border-b border-gray-800 bg-[#12161f] shrink-0 pt-safe">
                    <button id="tab-btn-setup" onclick="window.switchHubTab('setup')" class="flex-1 py-3 text-base font-bold text-cyan-400 border-b-2 border-cyan-400 transition bg-cyan-950/20">🛠️ 小隊整備</button>
                    <button id="tab-btn-quest" onclick="window.switchHubTab('quest')" class="flex-1 py-3 text-base font-bold text-gray-500 border-b-2 border-transparent hover:text-amber-400 transition hover:bg-amber-950/20">🔥 討伐佈告欄</button>
                </div>

                <!-- 整備分頁 -->
                <div id="tab-content-setup" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3 pb-12">
                    <div class="bg-[#12161f]/90 border border-gray-800/80 rounded-xl p-3 shadow-lg">
                        <!-- 標題列與素材展示 -->
                        <h2 class="text-cyan-400 font-bold text-base mb-3 border-b border-cyan-950 pb-2 flex justify-between items-center">
                            <span>🛡️ 小隊整備</span>
                            <div class="flex items-center gap-2">
                                <div id="material-badge" class="bg-amber-950/60 border border-amber-600/40 text-amber-300 px-2.5 py-1 rounded text-xs font-bold shadow">
                                    <i class="fa-solid fa-cubes"></i> 素材: <span id="global-materials">5</span>
                                </div>
                                <button onclick="window.recruitSquad()" class="text-xs bg-cyan-950 hover:bg-cyan-900 border border-cyan-600/50 text-cyan-300 px-2.5 py-1 rounded transition">
                                    🔄 招募
                                </button>
                            </div>
                        </h2>
                        
                        <div class="space-y-3">
                            <!-- 玩家自己裝備與武器選擇 -->
                            <div class="bg-black/40 p-3 rounded-lg border border-gray-800">
                                <div class="flex justify-between items-center mb-2">
                                    <span id="player-name-display" onclick="window.openRenameModal(-1)" class="text-yellow-400 font-bold text-sm cursor-pointer hover:text-yellow-300 transition">✦ 傳奇獵人 (您) <i class="fa-solid fa-pen text-[10px] ml-1 opacity-50"></i></span>
                                    <button onclick="window.openSaveLoadModal()" class="text-[11px] bg-indigo-950 hover:bg-indigo-900 border border-indigo-600/50 text-indigo-300 px-2 py-1 rounded transition shadow">
                                        <i class="fa-solid fa-floppy-disk"></i> 檔案管理
                                    </button>
                                </div>
                                <div class="mb-3">
                                    <label class="text-xs text-gray-400 block mb-1">武器：</label>
                                    <select id="player-weapon-select" onchange="window.changePlayerWeapon(this.value)" class="w-full bg-[#1b2230] border border-gray-700 rounded px-2.5 py-1.5 text-sm text-white focus:outline-none focus:border-cyan-400">
                                        <option value="swordShield">劍盾 (輕擊、防禦、盾擊控制)</option>
                                        <option value="greatsword">大刀 (重砍、防禦)</option>
                                        <option value="longsword">長劍 (斬擊流血、極限閃避)</option>
                                        <option value="bow">弓箭 (射擊高浮動、機動閃避)</option>
                                        <option value="heavyBowgun">重砲 (狂暴砲擊、防禦裝甲)</option>
                                        <option value="lance">長矛 (高精準刺擊、堅毅閃避)</option>
                                        <option value="dualBlades">雙刀 (瘋狂多段連擊、迅捷閃避)</option>
                                        <option value="hammer">巨槌 (碎顱重擊、暈眩控制)</option>
                                    </select>
                                </div>
                                <button onclick="window.openEnchantModal()" class="w-full py-2 bg-gradient-to-r from-cyan-900 to-blue-900 hover:from-cyan-800 hover:to-blue-800 text-white rounded font-bold text-sm transition shadow-md">
                                    🔮 洗煉全身裝備 (18插槽)
                                </button>
                            </div>

                            <!-- 夥伴隊伍 -->
                            <div class="bg-black/40 p-3 rounded-lg border border-gray-800">
                                <span class="text-gray-400 text-xs block mb-2">當前召集獵人 (點擊可改名)：</span>
                                <div id="squad-list" class="space-y-1.5 text-sm">
                                    <!-- 動態生成夥伴 -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 戰力屬性預覽 -->
                    <div class="bg-[#12161f]/90 border border-gray-800/80 rounded-xl p-3 shadow-lg">
                        <h3 class="text-cyan-400 font-bold text-sm mb-2">🔮 裝備附魔累計加成</h3>
                        <div id="enchant-summary" class="grid grid-cols-2 gap-2 text-xs text-gray-300">
                            <!-- 動態生成累計附魔屬性 -->
                        </div>
                    </div>
                </div>

                <!-- 任務分頁 -->
                <div id="tab-content-quest" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3 pb-12 hidden">
                    <div class="bg-[#1a1412]/90 border border-amber-900/30 rounded-xl p-3 shadow-lg flex-1 flex flex-col">
                        <h2 class="text-amber-400 font-bold text-base mb-3 border-b border-amber-950 pb-2 flex justify-between items-center">
                            <span>🔥 討伐佈告欄</span>
                            <button onclick="window.generateQuests()" class="text-xs bg-amber-950 hover:bg-amber-900 border border-amber-600/50 text-amber-300 px-2.5 py-1 rounded transition">
                                刷新任務
                            </button>
                        </h2>
                        
                        <div id="quest-board" class="space-y-3 flex-1 overflow-y-auto pr-1 text-sm">
                            <!-- 動態生成任務卡片 -->
                        </div>

                        <div class="mt-3 pt-3 border-t border-amber-950">
                            <button id="start-hunt-btn" disabled onclick="window.startHunt()" class="w-full py-3 bg-gradient-to-r from-amber-600 to-red-600 hover:from-amber-500 hover:to-red-500 disabled:from-gray-800 disabled:to-gray-900 disabled:text-gray-500 disabled:cursor-not-allowed text-white font-extrabold text-center rounded-lg shadow-lg transition tracking-widest uppercase text-sm">
                                確認並出征
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- [2] 進入原野：戰鬥畫面 -->
            <div id="battle-screen" class="absolute inset-0 z-10 bg-gradient-to-b from-[#0e0707] to-[#070505] overflow-hidden flex flex-col hidden">
                
                <!-- 戰鬥頂部分頁 -->
                <div class="bg-black/90 border-b border-gray-800 flex shrink-0 text-sm z-20">
                    <button id="battle-tab-summary" onclick="window.switchBattleTab('summary')" class="flex-1 py-3 font-bold text-cyan-400 border-b-2 border-cyan-400 transition bg-cyan-950/20">
                        🎬 戰況速報
                    </button>
                    <button id="battle-tab-detail" onclick="window.switchBattleTab('detail')" class="flex-1 py-3 font-bold text-gray-500 border-b-2 border-transparent hover:text-cyan-400 transition">
                        📜 詳細戰報
                    </button>
                </div>

                <!-- 戰鬥上：魔物狀態 -->
                <div id="battle-top-status" class="bg-black/80 border-b border-red-900/40 p-3 shrink-0 flex flex-col gap-1.5 transition-all">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-2">
                            <i id="monster-icon" class="fa-solid fa-dragon text-red-500 text-base animate-pulse"></i>
                            <span id="monster-name" class="font-bold text-base text-red-400 tracking-wide">魔物</span>
                        </div>
                    </div>

                    <!-- 魔物總血條 -->
                    <div class="w-full bg-gray-950 h-3.5 rounded border border-gray-800 overflow-hidden relative">
                        <div id="monster-hp-bar" class="bg-gradient-to-r from-red-700 to-red-500 h-full transition-all duration-300 w-full"></div>
                        <span id="monster-hp-txt" class="absolute inset-0 flex justify-center items-center text-xs font-black drop-shadow-[0_1px_1px_rgba(0,0,0,1)] text-white">0 / 0</span>
                    </div>

                    <!-- 魔物部位狀態 -->
                    <div id="monster-parts-grid" class="grid grid-cols-6 gap-1 mt-1 text-xs">
                        <!-- 動態部位血條 -->
                    </div>
                </div>

                <!-- 戰鬥中間：內容面板 -->
                <div class="flex-1 relative overflow-hidden flex flex-col bg-black/20">
                    
                    <!-- 1. 戰況速報面板 -->
                    <div id="battle-panel-summary" class="absolute inset-0 p-3 flex flex-col justify-center items-center">
                        <div class="w-full flex flex-col items-center justify-center gap-5 text-center">
                            <!-- 獵人與魔物的微動畫對峙區 -->
                            <div class="flex items-center justify-around w-full px-2 relative">
                                <div id="visual-hunter" class="flex flex-col items-center gap-1.5 transition-all duration-300">
                                    <div class="w-14 h-14 rounded-full bg-cyan-950/70 border-2 border-cyan-500/50 flex items-center justify-center text-2xl text-cyan-400 shadow-lg shadow-cyan-500/15">
                                        <i class="fa-solid fa-shield-halved"></i>
                                    </div>
                                    <span class="text-sm text-cyan-300 font-bold">獵人小隊</span>
                                </div>
                                
                                <div class="text-amber-500 text-xl font-black flex flex-col items-center relative min-w-[50px]">
                                    <span id="visual-clash-icon" class="text-3xl transition-transform duration-200">⚔️</span>
                                    <span id="visual-damage-popup" class="absolute -top-6 text-base font-black drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] opacity-0 scale-0 transition-all duration-300 pointer-events-none whitespace-nowrap"></span>
                                </div>
                                
                                <div id="visual-monster" class="flex flex-col items-center gap-1.5 transition-all duration-300">
                                    <div class="w-14 h-14 rounded-full bg-red-950/70 border-2 border-red-500/50 flex items-center justify-center text-2xl text-red-500 shadow-lg shadow-red-500/15">
                                        <i class="fa-solid fa-dragon animate-pulse"></i>
                                    </div>
                                    <span id="visual-monster-name" class="text-sm text-red-400 font-bold truncate max-w-[70px]">魔物</span>
                                </div>
                            </div>
                            
                            <!-- 簡易當前訊息框 -->
                            <div class="w-full bg-black/55 border border-gray-800/80 rounded-xl p-3 min-h-[76px] flex items-center justify-center shadow-inner">
                                <p id="visual-latest-msg" class="text-sm text-gray-200 font-medium leading-relaxed text-center">
                                    準備開戰！點擊動作按鈕或開起自動，開始討伐！
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- 2. 詳細戰報面板 -->
                    <div id="battle-panel-detail" class="absolute inset-0 overflow-y-auto p-3 flex flex-col gap-2 scrollbar-hide hidden bg-[#0a0a0a]">
                        <div id="battle-log-container" class="flex flex-col gap-1.5">
                            <!-- 動態文字日誌 -->
                        </div>
                    </div>

                </div>

                <!-- 戰鬥中下：獵人小隊狀態 -->
                <div id="battle-squad-grid" class="bg-black/60 border-y border-gray-800/80 p-2 shrink-0 grid grid-cols-2 gap-2 transition-all">
                    <!-- 動態獵人血量與SP卡片 -->
                </div>

                <!-- 戰鬥底部：指令區 -->
                <div class="bg-[#0b0c10] p-2 border-t border-gray-800/80 shrink-0 flex flex-col gap-2 z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.5)] pb-safe">
                    <div class="flex justify-between items-center text-xs text-gray-400 px-1">
                        <div class="flex items-center gap-1.5">
                            <span>🎯 目標:</span>
                            <select id="aim-part-select" class="bg-gray-900 border border-gray-700 text-white rounded px-2 py-1 focus:outline-none text-xs">
                                <option value="head">頭部</option>
                                <option value="body" selected>身體</option>
                                <option value="wings">翅膀</option>
                                <option value="tail">尾巴</option>
                                <option value="leftLeg">左腳</option>
                                <option value="rightLeg">右腳</option>
                            </select>
                        </div>
                        <button id="auto-battle-btn" onclick="window.toggleAutoBattle()" class="px-3 py-1 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-200 text-xs font-bold rounded shadow transition flex items-center gap-1">
                            🤖 自動: <span id="auto-battle-status" class="text-red-400">關</span>
                        </button>
                    </div>

                    <!-- 指令按鈕集 (1行4列極致壓縮) -->
                    <div id="action-commands-container" class="grid grid-cols-4 gap-1.5">
                        <!-- 動態動作按鈕 -->
                    </div>
                </div>
            </div>
        </main>

        <!-- [3] 附魔洗鍊彈窗 -->
        <div id="enchant-modal" class="absolute inset-0 bg-black/85 backdrop-blur-sm hidden flex justify-center items-center p-3 z-50">
            <div class="bg-[#12161f] border border-cyan-800/40 rounded-xl w-full max-h-[90dvh] flex flex-col overflow-hidden shadow-2xl">
                <div class="p-3 bg-black/40 border-b border-gray-800 flex justify-between items-center">
                    <span class="text-cyan-400 font-black text-sm"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i> 遠古裝備附魔 (18插槽)</span>
                    <button onclick="window.closeEnchantModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div id="enchant-list" class="flex-1 overflow-y-auto p-3 space-y-3.5 scrollbar-hide text-sm">
                </div>
                <div class="p-3 bg-black/40 border-t border-gray-800 flex justify-between items-center text-sm shrink-0">
                    <span class="text-amber-300 font-bold"><i class="fa-solid fa-cubes"></i> 素材: <span id="modal-materials">0</span></span>
                    <button onclick="window.closeEnchantModal()" class="bg-cyan-800 hover:bg-cyan-700 text-white font-bold px-4 py-2 rounded transition">
                        完成
                    </button>
                </div>
            </div>
        </div>

        <!-- [4] 修改名稱彈窗 -->
        <div id="rename-modal" class="absolute inset-0 bg-black/85 backdrop-blur-sm hidden flex justify-center items-center p-4 z-[60]">
            <div class="bg-[#12161f] border border-cyan-800/40 rounded-xl w-full max-w-sm flex flex-col overflow-hidden shadow-2xl">
                <div class="p-4 bg-black/40 border-b border-gray-800 flex justify-between items-center">
                    <span class="text-cyan-400 font-black text-sm">✏️ 修改名稱</span>
                    <button onclick="window.closeRenameModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div class="p-5 flex flex-col gap-3">
                    <label class="text-sm text-gray-400">請輸入新的獵人名稱：</label>
                    <input type="text" id="rename-input" class="w-full bg-[#1b2230] border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-400" maxlength="12">
                </div>
                <div class="p-3 bg-black/40 border-t border-gray-800 flex justify-end">
                    <button onclick="window.saveNewName()" class="bg-cyan-800 hover:bg-cyan-700 text-white font-bold px-6 py-2 rounded text-sm transition">
                        確認修改
                    </button>
                </div>
            </div>
        </div>

        <!-- [5] 檔案管理彈窗 -->
        <div id="saveload-modal" class="absolute inset-0 bg-black/85 backdrop-blur-sm hidden flex justify-center items-center p-4 z-[60]">
            <div class="bg-[#12161f] border border-indigo-800/40 rounded-xl w-full max-w-sm flex flex-col overflow-hidden shadow-2xl">
                <div class="p-4 bg-black/40 border-b border-gray-800 flex justify-between items-center">
                    <span class="text-indigo-400 font-black text-sm"><i class="fa-solid fa-floppy-disk mr-1"></i> 檔案管理</span>
                    <button onclick="window.closeSaveLoadModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div class="p-5 flex flex-col gap-4">
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="window.localSave()" class="bg-indigo-900/60 hover:bg-indigo-800 border border-indigo-600/50 text-indigo-200 py-2.5 rounded text-sm font-bold transition">💾 本地儲存</button>
                        <button onclick="window.localLoad()" class="bg-teal-900/60 hover:bg-teal-800 border border-teal-600/50 text-teal-200 py-2.5 rounded text-sm font-bold transition">📂 本地讀檔</button>
                    </div>
                    <div class="border-t border-gray-800 pt-4 flex flex-col gap-2">
                        <label class="text-xs text-gray-400">繼承碼 (附魔與素材)：</label>
                        <textarea id="save-code-input" class="w-full h-24 bg-[#1b2230] border border-gray-700 rounded p-2 text-xs text-gray-300 focus:outline-none focus:border-indigo-400 font-mono break-all"></textarea>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <button onclick="window.exportSaveCode()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 py-2 rounded text-xs transition">📤 產生繼承碼</button>
                            <button onclick="window.importSaveCode()" class="bg-amber-900/60 hover:bg-amber-800 border border-amber-600/50 text-amber-200 py-2 rounded text-xs font-bold transition">📥 匯入繼承碼</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const BATTLE_SPEED = 1400; 

        const WEAPONS = {
            swordShield: {
                name: "劍盾",
                skills: [
                    { name: "輕擊", type: "attack", dmg: 16, hit: 98, status: null, desc: "威力較弱但命中極高" },
                    { name: "盾擊", type: "attack", dmg: 22, hit: 80, status: { type: "stun", duration: 1 }, desc: "重擊敵方，有機率造成暈眩" },
                    { name: "防禦", type: "defend", desc: "架起盾牌，大幅減免下回合受到的傷害" }
                ],
                ult: { name: "守護猛衝", dmg: 65, desc: "爆發猛烈盾擊，使魔物必定暈眩" }
            },
            greatsword: {
                name: "大刀",
                skills: [
                    { name: "重砍", type: "attack", dmg: 48, hit: 65, status: null, desc: "威力強大但動作笨重，命中較低" },
                    { name: "防禦", type: "defend", desc: "以寬大刀身進行格擋抵擋衝擊" }
                ],
                ult: { name: "真蓄力斬", dmg: 150, desc: "引導全身力量的驚天一擊，威力無與倫比" }
            },
            longsword: {
                name: "長劍",
                skills: [
                    { name: "斬擊", type: "attack", dmg: 28, hit: 88, status: { type: "bleed", duration: 5 }, desc: "銳利無比，極高機率使敵方流血" },
                    { name: "氣刃閃避", type: "evade", desc: "精準側移，下回合有機率完全閃過攻擊" }
                ],
                ult: { name: "氣刃兜割", dmg: 85, desc: "凌空而下的多段高速斬擊，引發大出血" }
            },
            bow: {
                name: "弓箭",
                skills: [
                    { name: "射擊", type: "attack_var", dmgMin: 10, dmgMax: 38, hit: 92, desc: "威力高度浮動的精準射擊" },
                    { name: "滑步閃避", type: "evade", desc: "拉開身位，極大提升下回合閃避率" }
                ],
                ult: { name: "龍之箭", dmg: 90, desc: "貫穿魔物全身的極限一箭" }
            },
            heavyBowgun: {
                name: "重砲",
                skills: [
                    { name: "狂暴砲擊", type: "attack_var", dmgMin: 5, dmgMax: 65, hit: 60, desc: "破壞力極其不穩定但天花板極高的轟炸" },
                    { name: "重裝甲格擋", type: "defend", desc: "啟動自動格擋盾牌，抵禦魔物怒火" }
                ],
                ult: { name: "機關龍彈", dmg: 120, desc: "瘋狂傾瀉彈藥的連續掃射" }
            },
            lance: {
                name: "長矛",
                skills: [
                    { name: "精準刺擊", type: "attack", dmg: 26, hit: 99, status: null, desc: "絕不失手的超高精準長程刺擊" },
                    { name: "防禦閃避", type: "evade", desc: "在盾牌保護下進行小跳步調整" }
                ],
                ult: { name: "人馬衝鋒", dmg: 75, desc: "高速突刺，無視魔物部分護甲" }
            },
            dualBlades: {

                document.getElementById("app-container").appendChild(toast);

            toast.textContent = message;
            toast.classList.remove("opacity-0", "pointer-events-none");

            e: gameState.enchants
        });

            try {
                const data = JSON.parse(jsonStr);
                if (data && typeof data.m !== 'undefined' && data.e) {
                    gameState.materials = data.m;
                    if (data.n) gameState.playerName = data.n;
                    if (data.w) gameState.playerWeapon = data.w;
                    gameState.enchants = data.e;
                    renderHub();
                    document.getElementById('player-name-display').innerHTML = `✦ ${gameState.playerName} (您) <i class="fa-solid fa-pen text-[10px] ml-1 opacity-50"></i>`;

                    showNotification("✅ 讀檔成功！資料已覆蓋。");
                    window.closeSaveLoadModal();

                showNotification("❌ 存檔損壞或繼承碼無效！");

            showNotification("📤 繼承碼已產生！(已嘗試複製)");

            try {
                const jsonStr = decodeURIComponent(atob(code));
                loadSaveData(jsonStr);

            return { type: attr.id, name: attr.name, val: val, prefix: attr.prefix, suffix: attr.suffix };
        }

                fireRes: 0, iceRes: 0, waterRes: 0, poisonRes: 0, paraRes: 0, sleepRes: 0, explosionRes: 0

            for (let part in gameState.enchants) {
                gameState.enchants[part].forEach(e => {
                    if (sum[e.type] !== undefined) sum[e.type] += e.val;
                });
            }
            return sum;

            if (gameState.battle.active) return;
            const availableWeapons = Object.keys(WEAPONS);
            let chosenAllies = [];
            let namesPool = [...ALLY_NAMES];
            for (let i = 0; i < 3; i++) {
                const nameIdx = Math.floor(Math.random() * namesPool.length);
                const name = namesPool.splice(nameIdx, 1)[0];
                const weapon = availableWeapons[Math.floor(Math.random() * availableWeapons.length)];
                chosenAllies.push({ name: name, weapon: weapon });
            }
            gameState.squad = chosenAllies;
            renderHub();
        };

            gameState.playerWeapon = weaponKey;
            renderHub();
        };

        window.generateQuests = function() {
            if (gameState.battle.active) return;
            let quests = [];
            const keys = Object.keys(MONSTERS);
            for (let i = 0; i < 3; i++) {
                const mKey = keys[Math.floor(Math.random() * keys.length)];
                const base = MONSTERS[mKey];
                const modifier = 0.9 + (Math.random() * 0.3);
                const randomName = base.names[Math.floor(Math.random() * base.names.length)];
                quests.push({
                    monsterKey: mKey, name: randomName, hp: Math.floor(base.hp * modifier),
                    type: base.type, desc: base.desc, textStyle: base.textStyle,
                    materialsReward: Math.floor(4 + Math.random() * 4)
                });
            }
            gameState.quests = quests;
            gameState.selectedQuestIndex = null;
            document.getElementById("start-hunt-btn").disabled = true;
            renderHub();
        };

        function animateClash(isMonsterAttacking, damageText = "") {
            const hunterVisual = document.getElementById("visual-hunter");
            const monsterVisual = document.getElementById("visual-monster");
            const damagePopup = document.getElementById("visual-damage-popup");
            const clashIcon = document.getElementById("visual-clash-icon");
            if (!hunterVisual || !monsterVisual || !damagePopup || !clashIcon) return;

            hunterVisual.classList.remove("animate-shake", "translate-x-6");
            monsterVisual.classList.remove("animate-shake", "-translate-x-6");
            damagePopup.className = "absolute -top-6 text-sm font-black drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] opacity-0 scale-0 transition-all duration-300 pointer-events-none";
            void hunterVisual.offsetWidth; 

            setTimeout(() => {
                if (isMonsterAttacking) {
                    monsterVisual.classList.add("-translate-x-6");
                    clashIcon.textContent = "🔥";
                    setTimeout(() => {
                        monsterVisual.classList.remove("-translate-x-6");
                        hunterVisual.classList.add("animate-shake");
                        if (damageText) {
                            damagePopup.innerHTML = damageText;
                            const isHeal = damageText.includes("+");
                            damagePopup.className = `absolute -top-6 text-base font-black ${isHeal ? 'text-green-400' : 'text-red-500'} drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] opacity-100 scale-125 -translate-y-2 transition-all duration-300 pointer-events-none whitespace-nowrap z-30`;
                        }
                    }, 150);
                } else {
                    hunterVisual.classList.add("translate-x-6");
                    clashIcon.textContent = "💥";
                    setTimeout(() => {
                        hunterVisual.classList.remove("translate-x-6");
                        monsterVisual.classList.add("animate-shake");
                        if (damageText) {
                            damagePopup.innerHTML = damageText;
                            const isHeal = damageText.includes("+");
                            damagePopup.className = `absolute -top-6 text-base font-black ${isHeal ? 'text-green-400' : 'text-yellow-400'} drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] opacity-100 scale-125 -translate-y-2 transition-all duration-300 pointer-events-none whitespace-nowrap z-30`;
                        }
                    }, 150);
                }
            }, 50);
        }

        function addBattleLog(text, textClass = "text-gray-300 text-sm") {
            const container = document.getElementById("battle-log-container");
            const entry = document.createElement("div");
            entry.className = `p-1.5 border-l-2 border-transparent pl-2 ${textClass}`;
            entry.innerHTML = text;
            container.appendChild(entry);
            
            const detailPanel = document.getElementById("battle-panel-detail");
            if (detailPanel) detailPanel.scrollTop = detailPanel.scrollHeight;

            const visualMsg = document.getElementById("visual-latest-msg");
            if (visualMsg) visualMsg.innerHTML = text;

            let isMonsterAttacking = false;
            let dmgMatch = text.match(/(-?\d+)\s*點|(\d+)\s*HP|(-\d+)/);
            let dmgText = "";

            if (dmgMatch) {
                if (text.includes("回復藥") || text.includes("恢復")) {
                    dmgText = `+${dmgMatch[1] || dmgMatch[2] || "50"}`;
                } else if (text.includes("爆擊")) {
                    dmgText = `-${dmgMatch[1] || dmgMatch[2] || dmgMatch[3].replace('-','')} <span class="text-[10px] block mt-[-5px]">CRIT!</span>`;
                } else {
                    dmgText = `-${dmgMatch[1] || dmgMatch[2] || dmgMatch[3].replace('-','')}`;
                }
            }

            if (text.includes("必殺技") || text.includes("朝獵人") || text.includes("撞擊") || text.includes("無力地") || text.includes("跺下") || text.includes("前掌蓄力")) {
                isMonsterAttacking = true;
            }

            if (text.includes("造成") || text.includes("傷害") || text.includes("使用【") || text.includes("發射") || text.includes("大絕") || text.includes("回復藥") || text.includes("必殺技")) {
                animateClash(isMonsterAttacking, dmgText);
            }
        }

        function triggerAutoTurn() {
            if (!gameState.battle.active || !gameState.battle.auto) return;
            const player = gameState.battle.squad[0];
            if (player.hp <= 0) { setTimeout(() => handlePlayerAction("heal"), 1000); return; }
            if (player.hp < 35 && Math.random() < 0.9) { setTimeout(() => handlePlayerAction("heal"), 1000); return; }

            const wInfo = WEAPONS[player.weaponKey];
            const randomSkillIdx = Math.floor(Math.random() * wInfo.skills.length);
            setTimeout(() => handlePlayerAction(randomSkillIdx), 1000);
        }

        window.handlePlayerAction = function(actionCode) {
            const b = gameState.battle;
            if (!b.active) return;

            const buttons = document.querySelectorAll("#action-commands-container button");
            buttons.forEach(btn => btn.disabled = true);

            executePlayerTurn(actionCode);
            renderBattleUI(); 

            if (checkBattleEnd()) return;

            setTimeout(() => {
                if (!b.active) return;
                executeAlliesTurn();
                renderBattleUI(); 

                if (checkBattleEnd()) return;

                setTimeout(() => {
                    if (!b.active) return;
                    executeMonsterTurn();
                    renderBattleUI(); 

                    if (checkBattleEnd()) return;

                    setTimeout(() => {
                        if (!b.active) return;
                        executeStatusTicks();
                        renderBattleUI(); 

                        if (checkBattleEnd()) return;

                        b.turn += 1;
                        b.squad.forEach(h => { h.defending = false; h.evading = false; });

                        addBattleLog(`⚔️ <strong>-- 回合 ${b.turn} 開始 --</strong>`, "text-gray-500 text-sm text-center my-2");
                        renderBattleUI();

                        if (b.auto) setTimeout(triggerAutoTurn, BATTLE_SPEED * 0.8);
                    }, BATTLE_SPEED * 0.8);
                }, BATTLE_SPEED);
            }, BATTLE_SPEED);
        };

        function checkTriggerBleed(hunter, isAttack) {
            if (isAttack && hunter.status.bleed > 0) {
                const bleedDmg = 15;
                hunter.hp = Math.max(1, hunter.hp - bleedDmg);
                addBattleLog(`🩸 <strong>${hunter.name}</strong> 劇烈的攻擊扯裂了傷口，流失 <span class="text-red-500 font-bold">${bleedDmg}</span> HP！`, "text-red-500 text-sm");
            }
        }

        function calcPlayerDamage(baseDmg, enchants, monsterStatusEffect) {
            let dmg = baseDmg + enchants.atk;
            const elementMap = {
                "fire": enchants.fireDmg, "ice": enchants.iceDmg, "water": enchants.waterDmg, "electric": enchants.electricDmg,
                "paralysis": enchants.paraDmg, "poison": enchants.poisonDmg, "sleep": enchants.sleepDmg, "bleed": enchants.bleedDmg,
                "stun": enchants.earthDmg, "explosion": enchants.explosionDmg
            };
            const bonus = elementMap[monsterStatusEffect] || 0;
            dmg += Math.floor(dmg * bonus / 100);

            let isCrit = false;
            if (Math.random() * 100 < enchants.critRate) {
                isCrit = true;
                dmg = Math.floor(dmg * (1.5 + enchants.critDmg / 100));
            }
            return { dmg, isCrit };
        }

        function executePlayerTurn(actionCode) {
            const b = gameState.battle;
            const player = b.squad[0];
            const wInfo = WEAPONS[player.weaponKey];
            const aimPart = document.getElementById("aim-part-select").value;

            if (actionCode === "heal") {
                const wasDead = player.hp <= 0;
                player.hp = Math.min(player.maxHp, player.hp + 50);
                player.status.defEvadeCount = 0; 
                if (wasDead) {
                    player.status = {};
                    addBattleLog(`🧪 <strong>${player.name}</strong> 喝下回復藥，恢復 <span class="text-green-400 font-bold">50</span> HP 重新站起！`, "text-green-400 text-sm");
                } else {
                    addBattleLog(`🧪 <strong>${player.name}</strong> 喝下回復藥，恢復 <span class="text-green-400 font-bold">50</span> HP。`, "text-green-400 text-sm");
                }
                return;
            }

            if (player.status.para > 0 || player.status.sleep > 0 || player.status.stun > 0) {
                player.status.defEvadeCount = 0;
                if (player.status.para > 0) addBattleLog(`⚡ <strong>${player.name}</strong> 身體麻痺中，動彈不得！`, "text-yellow-400 text-sm");
                else if (player.status.sleep > 0) addBattleLog(`💤 <strong>${player.name}</strong> 陷入熟睡，無法動彈...`, "text-indigo-400 text-sm");
                else if (player.status.stun > 0) addBattleLog(`💫 <strong>${player.name}</strong> 腦袋暈乎乎的，無法行動！`, "text-amber-500 text-sm");
                return;
            }
            if (actionCode === "skip") {
                player.status.defEvadeCount = 0;
                addBattleLog(`⏳ <strong>${player.name}</strong> 正在努力掙脫狀態異常。`, "text-gray-400 text-sm");
                return;
            }

            const skill = wInfo.skills[actionCode];
            let isAttackAction = false;
            const enchants = getEnchantSum();

            if (player.sp >= 100 && skill.type && skill.type.startsWith("attack")) {
                isAttackAction = true;
                const ult = wInfo.ult;
                player.sp = 0; 
                const calcResult = calcPlayerDamage(ult.dmg, enchants, b.monster.statusEffect);
                applyDamageToMonster(calcResult.dmg, aimPart);
                
                let logMsg = `💥 <strong>${player.name}</strong> 釋放大絕【<strong>${ult.name}</strong>】！對 <span class="text-amber-400">${SHORT_PART_NAMES[aimPart]}</span> 造成 <span class="text-yellow-400 font-black">${calcResult.dmg}</span> 點巨額傷害！`;
                if (calcResult.isCrit) logMsg += ` <span class="text-orange-400 font-black tracking-widest text-base">(爆擊！)</span>`;
                addBattleLog(logMsg, "text-yellow-400 text-lg font-bold");
                
                if (player.weaponKey === "swordShield") {
                    b.monster.stunnedNextTurn = true;
                    addBattleLog(`💫 盾牌猛擊極為沉重！魔物下回合必定暈眩！`, "text-amber-400 text-sm");
                }
            } else if (skill.type === "attack") {
                isAttackAction = true;
                const finalHit = (skill.hit || 100) + enchants.hitRate;
                if (Math.random() * 100 <= finalHit) {
                    const calcResult = calcPlayerDamage(skill.dmg, enchants, b.monster.statusEffect);
                    applyDamageToMonster(calcResult.dmg, aimPart);
                    let logStr = `⚔️ <strong>${player.name}</strong> 的【${skill.name}】砸中 <span class="text-amber-400">${SHORT_PART_NAMES[aimPart]}</span>，造成 <span class="text-red-400 font-bold">${calcResult.dmg}</span> 傷害。`;
                    if (calcResult.isCrit) logStr += ` <span class="text-orange-400 font-black tracking-widest text-base">(爆擊！)</span>`;
                    if (skill.status && Math.random() < 0.35 && skill.status.type === "stun") {
                        b.monster.stunnedNextTurn = true;
                        logStr += ` 💫 魔物被打得眼花繚亂！`;
                    }
                    addBattleLog(logStr, "text-gray-200 text-sm");
                    player.sp = Math.min(100, player.sp + 25);
                } else addBattleLog(`💨 <strong>${player.name}</strong> 的攻擊被靈敏避開！`, "text-gray-500 text-sm");
            } else if (skill.type === "attack_var") {
                isAttackAction = true;
                const finalHit = (skill.hit || 100) + enchants.hitRate;
                if (Math.random() * 100 <= finalHit) {
                    const baseDmg = skill.dmgMin + Math.floor(Math.random() * (skill.dmgMax - skill.dmgMin + 1));
                    const calcResult = calcPlayerDamage(baseDmg, enchants, b.monster.statusEffect);
                    applyDamageToMonster(calcResult.dmg, aimPart);
                    let logStr = `🏹 <strong>${player.name}</strong> 的強弩對 <span class="text-amber-400">${SHORT_PART_NAMES[aimPart]}</span> 造成 <span class="text-yellow-400 font-bold">${calcResult.dmg}</span> 傷害！`;
                    if (calcResult.isCrit) logStr += ` <span class="text-orange-400 font-black tracking-widest text-base">(爆擊！)</span>`;
                    addBattleLog(logStr, "text-gray-200 text-sm");
                    player.sp = Math.min(100, player.sp + 30);
                } else addBattleLog(`💨 <strong>${player.name}</strong> 砲擊落空！`, "text-gray-500 text-sm");
            } else if (skill.type === "attack_multi") {
                isAttackAction = true;
                const hitCount = 1 + Math.floor(Math.random() * skill.hits);
                let totalDmg = 0; let critCount = 0;
                const finalHit = (skill.hit || 100) + enchants.hitRate;
                for (let i = 0; i < hitCount; i++) {
                    if (Math.random() * 100 <= finalHit) {
                        const calcResult = calcPlayerDamage(skill.dmg, enchants, b.monster.statusEffect);
                        totalDmg += calcResult.dmg;
                        if (calcResult.isCrit) critCount++;
                    }
                }
                if (totalDmg > 0) {
                    applyDamageToMonster(totalDmg, aimPart);
                    let logStr = `⚔️ <strong>${player.name}</strong> 發動【${skill.name}】<span class="text-yellow-400 font-bold">${hitCount}</span> 連擊，共造成 <span class="text-red-400 font-bold">${totalDmg}</span> 傷害！`;
                    if (critCount > 0) logStr += ` <span class="text-orange-400 font-black tracking-widest text-base">(${critCount}次爆擊！)</span>`;
                    addBattleLog(logStr, "text-gray-200 text-sm");
                    player.sp = Math.min(100, player.sp + 35);
                } else addBattleLog(`💨 <strong>${player.name}</strong> 亂舞連斬完全落空！`, "text-gray-500 text-sm");
            } else if (skill.type === "defend") {
                player.defending = true;
                addBattleLog(`🛡️ <strong>${player.name}</strong> 進入防禦姿態。`, "text-blue-400 text-sm");
                player.sp = Math.min(100, player.sp + 15);
            } else if (skill.type === "evade") {
                player.evading = true;
                addBattleLog(`💨 <strong>${player.name}</strong> 進入閃避狀態。`, "text-purple-400 text-sm");
                player.sp = Math.min(100, player.sp + 15);
            }

            if (isAttackAction) player.status.defEvadeCount = 0;
            else if (skill.type === "defend" || skill.type === "evade") {
                if (player.status.explosion > 0) {
                    player.status.defEvadeCount = (player.status.defEvadeCount || 0) + 1;
                    if (player.status.defEvadeCount >= 2) {
                        player.status.explosion = 0; player.status.defEvadeCount = 0;
                        addBattleLog(`💨✨ <strong>${player.name}</strong> 透過連續的迴避/防守，成功抖落了身上的爆炸粉塵！`, "text-green-400 text-sm font-bold");
                    }
                }
            }
            checkTriggerBleed(player, isAttackAction);
        }

        function executeAlliesTurn() {
            const b = gameState.battle;
            for (let i = 1; i < b.squad.length; i++) {
                const ally = b.squad[i];
                if (ally.hp <= 0) {
                    if (Math.random() < 0.8) {
                        ally.hp = 50; ally.status.defEvadeCount = 0;
                        addBattleLog(`🧪 <strong>${ally.name}</strong> 咬牙喝下回復藥重返戰線！`, "text-green-400 text-sm");
                    }
                    continue;
                }
                if (ally.status.para > 0 || ally.status.sleep > 0 || ally.status.stun > 0) { ally.status.defEvadeCount = 0; continue; }

                const wInfo = WEAPONS[ally.weaponKey];
                let targetPart = "body";
                const intactParts = PARTS.filter(p => !b.monsterParts[p].broken);
                if (intactParts.length > 0) targetPart = intactParts[Math.floor(Math.random() * intactParts.length)];

                let isAttackAction = false;
                let usedSkillType = "attack";

                if (ally.sp >= 100) {
                    isAttackAction = true;
                    usedSkillType = wInfo.ult.type || "attack";
                    ally.sp = 0;
                    applyDamageToMonster(wInfo.ult.dmg, targetPart);
                    addBattleLog(`💥 <strong>${ally.name}</strong> 施放大絕【<strong>${wInfo.ult.name}</strong>】！造成 <span class="text-yellow-400">${wInfo.ult.dmg}</span> 巨量傷害！`, "text-yellow-300 text-lg font-bold");
                } else {
                    let playSkills = wInfo.skills;
                    if (ally.status.noDefend > 0) playSkills = playSkills.filter(s => s.type !== "defend");
                    let finalSkill = playSkills[0];
                    if (playSkills.length > 1 && Math.random() < 0.15) finalSkill = playSkills[Math.floor(Math.random() * playSkills.length)];

                    usedSkillType = finalSkill.type;

                    if (finalSkill.type && finalSkill.type.startsWith("attack")) {
                        isAttackAction = true;
                        if (Math.random() * 100 <= (finalSkill.hit || 85)) {
                            const dmg = finalSkill.dmg || 22;
                            applyDamageToMonster(dmg, targetPart);
                            addBattleLog(`👥 <strong>${ally.name}</strong> 攻擊 ${SHORT_PART_NAMES[targetPart]}，造成 <span class="text-red-300">${dmg}</span> 傷害。`, "text-gray-200 text-sm");
                            ally.sp = Math.min(100, ally.sp + 25);
                        } else addBattleLog(`💨 <strong>${ally.name}</strong> 攻擊被閃躲。`, "text-gray-500 text-sm");
                    } else if (finalSkill.type === "defend") {
                        ally.defending = true;
                        addBattleLog(`🛡️ <strong>${ally.name}</strong> 撐起防禦。`, "text-blue-400 text-sm");
                    } else if (finalSkill.type === "evade") {
                        ally.evading = true;
                        addBattleLog(`💨 <strong>${ally.name}</strong> 開始閃避游走。`, "text-purple-400 text-sm");
                    }
                }
                
                if (isAttackAction) ally.status.defEvadeCount = 0;
                else if (usedSkillType === "defend" || usedSkillType === "evade") {
                    if (ally.status.explosion > 0) {
                        ally.status.defEvadeCount = (ally.status.defEvadeCount || 0) + 1;
                        if (ally.status.defEvadeCount >= 2) {
                            ally.status.explosion = 0; ally.status.defEvadeCount = 0;
                            addBattleLog(`💨✨ <strong>${ally.name}</strong> 動作輕巧地抖落了爆炸粉塵！`, "text-green-400 text-sm");
                        }
                    }
                }
                checkTriggerBleed(ally, isAttackAction);
            }
        }

        function executeMonsterTurn() {
            const b = gameState.battle;
            if (b.monster.hp <= 0) return;

            if (b.monster.stunnedNextTurn) {
                b.monster.stunnedNextTurn = false;
                addBattleLog(`🌀 <strong>${b.monster.name}</strong> 陷入暈眩，癱坐無法反擊！`, "text-green-400 font-bold text-sm");
                b.squad.forEach(h => {
                    if (h.status.sleep > 0) {
                        h.status.sleep = 0;
                        addBattleLog(`💡 <strong>${h.name}</strong> 被打擊震動驚醒了！`, "text-indigo-400 text-sm");
                    }
                });
                return;
            }

            let monsterMoves = {
                head: { name: "毀滅咬碎爆炎", dmg: 40, desc: "張開巨口，帶著極大火星向前噬咬！" },
                body: { name: "巨體泰山壓頂", dmg: 35, desc: "用無比沈重的巨軀狠狠砸下！" },
                wings: { name: "雙翼旋風風刃", dmg: 25, desc: "掀起致命的狂風風刀！" },
                tail: { name: "鐵尾旋風鋼鐵掃擊", dmg: 30, desc: "將堅固尾鞭狂暴甩出！" },
                leftLeg: { name: "左裂地巨踏", dmg: 22, desc: "對著大地猛烈跺下！" },
                rightLeg: { name: "右神速撕裂爪擊", dmg: 22, desc: "用尖銳鉤爪極速撕扯！" }
            };

            if (b.monster.statusEffect === "explosion") {
                monsterMoves = {
                    head: { name: "高爆粉塵咬碎", dmg: 40, desc: "在口中引燃爆炸性粉塵，帶著毀滅性爆風狠狠咬下！" },
                    body: { name: "核爆泰山壓頂", dmg: 35, desc: "全身散佈危險的引信黏液，以核爆般的威力重壓而來！" },
                    wings: { name: "爆風烈刃旋風", dmg: 25, desc: "狂猛揮動雙翅，掀起夾帶高熱爆炸粉塵的致命狂風！" },
                    tail: { name: "引信爆裂尾鞭", dmg: 30, desc: "將塗滿爆裂黏液的堅固尾鞭狂暴甩出，引發連環爆！" },
                    leftLeg: { name: "左爆震踏擊", dmg: 22, desc: "左爪凝聚爆破之力對著大地猛烈跺下，炸開地面！" },
                    rightLeg: { name: "右烈焰撕裂爪", dmg: 22, desc: "右側鉤爪伴隨著劇烈火花極速撕扯，撕裂一切！" }
                };
            }

            const selectPartPool = PARTS.filter(p => !b.monsterParts[p].broken);
            let finalAimPart = "body"; let isExtremelyWeakened = false;
            if (selectPartPool.length > 0) finalAimPart = selectPartPool[Math.floor(Math.random() * selectPartPool.length)];
            else isExtremelyWeakened = true;

            const move = monsterMoves[finalAimPart];
            const aliveHunters = b.squad.filter(h => h.hp > 0);
            if (aliveHunters.length === 0) return;

            const targetHunter = aliveHunters[Math.floor(Math.random() * aliveHunters.length)];

            if (isExtremelyWeakened) {
                addBattleLog(`😭 <strong>${b.monster.name}</strong> 部位全毀！無力地向前撞擊...`, "text-red-300 text-sm");
                let dmg = 5;
                if (targetHunter.defending) dmg = Math.floor(dmg * 0.2);
                if (targetHunter.isPlayer) dmg = Math.max(1, dmg - getEnchantSum().def);
                targetHunter.hp = Math.max(0, targetHunter.hp - dmg);
                addBattleLog(`💥 <strong>${targetHunter.name}</strong> 受到微弱的 <span class="text-red-400">${dmg}</span> 傷害。`, "text-gray-300 text-sm");
                return;
            }

            addBattleLog(`🔥 <strong>${b.monster.name}</strong> 使出必殺技：【<strong>${move.name}</strong>】！`, "text-red-400 text-lg font-bold");
            addBattleLog(`💬 ${move.desc}`, "text-gray-400 italic text-sm font-bold");

            let finalDmg = move.dmg;
            let evadeChance = (targetHunter.evading ? 65 : 0);
            if (targetHunter.isPlayer) evadeChance += getEnchantSum().evadeRate;

            if (Math.random() * 100 < evadeChance) {
                addBattleLog(`💨 <strong>${targetHunter.name}</strong> 施展極限迴避，完全躲開了威脅！`, "text-purple-400 text-sm font-bold");
                return;
            }

            if (targetHunter.status.sleep > 0) {
                targetHunter.status.sleep = 0;
                addBattleLog(`💥 <strong>${targetHunter.name}</strong> 遭到重擊，從睡夢中痛醒過來！`, "text-indigo-300 text-sm");
            }

            if (targetHunter.defending) finalDmg = Math.floor(finalDmg * 0.3);
            
            if (targetHunter.isPlayer) {
                const sum = getEnchantSum();
                if (b.monster.statusEffect === "fire") finalDmg = Math.floor(finalDmg * (1 - sum.fireRes / 100));
                if (b.monster.statusEffect === "ice") finalDmg = Math.floor(finalDmg * (1 - sum.iceRes / 100));
                if (b.monster.statusEffect === "water") finalDmg = Math.floor(finalDmg * (1 - sum.waterRes / 100));
                finalDmg = Math.max(1, finalDmg - sum.def);
            } else finalDmg = Math.max(1, finalDmg);
            
            if (targetHunter.defending) addBattleLog(`🛡️ <strong>${targetHunter.name}</strong> 舉盾招架，僅受到 <span class="text-blue-400">${finalDmg}</span> 傷害！`, "text-blue-400 text-sm");
            else addBattleLog(`💥 <strong>${targetHunter.name}</strong> 避無可避，受到 <span class="text-red-500 font-black">${finalDmg}</span> 點致命傷害！`, "text-red-400 text-sm");

            targetHunter.hp = Math.max(0, targetHunter.hp - finalDmg);
            if (targetHunter.hp > 0 && !targetHunter.defending) applyStatusEffectToHunter(targetHunter, b.monster.statusEffect);
            if (targetHunter.hp <= 0) addBattleLog(`💀 <strong>${targetHunter.name}</strong> 體力歸零，不支倒地！`, "text-red-600 font-bold text-sm");
        }

        function applyStatusEffectToHunter(hunter, effect) {
            if (hunter.isPlayer) {
                const sum = getEnchantSum();
                if (effect === "poison" && Math.random() * 100 < sum.poisonRes) { addBattleLog(`✨ 裝備防毒附魔發光！完美免除了劇毒威脅！`, "text-cyan-400 text-sm"); return; }
                if (effect === "paralysis" && Math.random() * 100 < sum.paraRes) { addBattleLog(`✨ 裝備避雷附魔震動！完美抵抗了麻痺效果！`, "text-cyan-400 text-sm"); return; }
                if (effect === "sleep" && Math.random() * 100 < sum.sleepRes) { addBattleLog(`✨ 裝備安神附魔溫熱！完美免疫昏睡！`, "text-cyan-400 text-sm"); return; }
                if (effect === "explosion" && Math.random() * 100 < sum.explosionRes) { addBattleLog(`✨ 裝備防爆附魔護體！完美彈開了爆炸粉塵！`, "text-cyan-400 text-sm"); return; }
            }

            if (effect === "fire") {
                hunter.status.poison = 3; addBattleLog(`🔥 陷入灼燒，連續 3 回合扣血。`, "text-orange-400 text-sm");
            } else if (effect === "ice" || effect === "water") {
                hunter.status.para = 1; addBattleLog(`❄️ 渾身僵硬，下回合無法行動。`, "text-blue-300 text-sm");
            } else if (effect === "electric" || effect === "paralysis") {
                hunter.status.para = 2; addBattleLog(`⚡ <strong>${hunter.name}</strong> 被強烈神經麻痺！連續 2 回合動彈不得！`, "text-yellow-400 text-sm");
            } else if (effect === "poison") {
                hunter.status.poison = 3; addBattleLog(`🧪 <strong>${hunter.name}</strong> 陷入中毒！連續 3 回合流失體力！`, "text-purple-400 text-sm");
            } else if (effect === "sleep") {
                hunter.status.sleep = 3; addBattleLog(`💤 <strong>${hunter.name}</strong> 陷入深層睡眠！至多昏睡 3 回合或直到被打醒！`, "text-indigo-400 text-sm");
            } else if (effect === "bleed") {
                hunter.status.bleed = 5; addBattleLog(`🩸 <strong>${hunter.name}</strong> 受到嚴重裂傷！接下來 5 回合只要攻擊就會大出血！`, "text-red-500 text-sm");
            } else if (effect === "stun") {
                hunter.status.stun = 1; hunter.status.noDefend = 3;
                addBattleLog(`💫 <strong>${hunter.name}</strong> 受到強烈腦震盪暈眩 1 回合！並且 3 回合內無法舉起防禦！`, "text-amber-500 text-sm");
            } else if (effect === "explosion") {
                hunter.status.explosion = 3; hunter.status.defEvadeCount = 0;
                addBattleLog(`💣 <strong>${hunter.name}</strong> 被危險的爆炸粉塵附著！3回合後將引爆！<span class="text-[10px] block">(連續防禦或閃避 2 次可解除)</span>`, "text-orange-500 text-sm font-bold");
            }
        }

        function executeStatusTicks() {
            const b = gameState.battle;
            b.squad.forEach(h => {
                if (h.hp <= 0) return;

                if (h.status.poison && h.status.poison > 0) {
                    h.hp = Math.max(1, h.hp - 10); h.status.poison -= 1;
                    addBattleLog(`🧪 <strong>${h.name}</strong> 體內毒素蔓延，流失 <span class="text-purple-400 font-bold">10</span> HP！`, "text-purple-400/80 text-sm");
                }
                
                if (h.status.bleed && h.status.bleed > 0) h.status.bleed -= 1;
                if (h.status.para && h.status.para > 0) h.status.para -= 1;
                if (h.status.stun && h.status.stun > 0) h.status.stun -= 1;
                if (h.status.noDefend && h.status.noDefend > 0) h.status.noDefend -= 1;
                
                if (h.status.sleep && h.status.sleep > 0) {
                    h.status.sleep -= 1;
                    if (h.status.sleep === 0) addBattleLog(`🥱 <strong>${h.name}</strong> 經過了三回合，終於從沉睡中自然甦醒了！`, "text-cyan-300 text-sm");
                }

                if (h.status.explosion && h.status.explosion > 0) {
                    h.status.explosion -= 1;
                    if (h.status.explosion === 0) {
                        const explosionDmg = 60;
                        h.hp = Math.max(1, h.hp - explosionDmg);
                        addBattleLog(`💥 轟隆！！<strong>${h.name}</strong> 身上的粉塵劇烈引爆，受到 <span class="text-orange-500 font-black">${explosionDmg}</span> 點毀滅性傷害！`, "text-orange-500 text-base font-bold");
                    } else {
                        addBattleLog(`💣 <strong>${h.name}</strong> 身上的粉塵閃爍著危險的紅光... (引爆倒數 ${h.status.explosion} 回合)`, "text-orange-400 text-xs");
                    }
                }
            });
        }

        function applyDamageToMonster(dmg, part) {
            const b = gameState.battle;
            if (b.monster.hp <= 0) return;

            b.monster.hp = Math.max(0, b.monster.hp - dmg);
            const partInfo = b.monsterParts[part];
            if (partInfo && !partInfo.broken) {
                partInfo.hp = Math.max(0, partInfo.hp - dmg);
                if (partInfo.hp <= 0) {
                    partInfo.broken = true;
                    addBattleLog(`💥 <strong>【部位破壞】！</strong> ${b.monster.name} 的 <span class="text-yellow-400">${partInfo.name}</span> 被徹底破壞！對應必殺技遭封印！`, "text-yellow-400 text-sm");
                    b.squad.forEach(h => {
                        if (h.status.sleep > 0) {
                            h.status.sleep = 0;
                            addBattleLog(`💡 巨大的斷裂聲將 <strong>${h.name}</strong> 從睡夢中驚醒！`, "text-indigo-400 text-sm");
                        }
                    });
                }
            }
        }

        function checkBattleEnd() {
            const b = gameState.battle;
            if (b.monster.hp <= 0) {
                b.active = false;
                let brokenCount = 0;
                PARTS.forEach(p => { if (b.monsterParts[p].broken) brokenCount++; });
                const bonusReward = brokenCount * 2;
                const totalGained = b.monster.materialsReward + bonusReward;
                gameState.materials += totalGained;

                addBattleLog(`🎉🏆 <strong>========== 討伐成功 ==========</strong>`, "text-green-400 font-black text-center text-base mt-4");
                addBattleLog(`👑 恭喜狩獵成功！`, "text-green-300 text-center text-sm mb-2");
                addBattleLog(`- 剝取素材: <span class="text-white">+${b.monster.materialsReward}</span>`, "text-gray-300 text-xs");
                addBattleLog(`- 完美擊破 ${brokenCount} 個部位: <span class="text-white">+${bonusReward}</span>`, "text-gray-300 text-xs");
                addBattleLog(`🎉 共帶回 <span class="text-amber-400 font-bold">+${totalGained}</span> 素材！`, "text-amber-300 font-bold text-sm mt-2");
                showExitBattleButton(true);
                return true;
            }
            const allDead = b.squad.every(h => h.hp <= 0);
            if (allDead) {
                b.active = false;
                addBattleLog(`💀❌ <strong>========== 任務失敗 ==========</strong>`, "text-red-500 font-black text-center text-base mt-4");
                addBattleLog(`全軍覆沒，魔物揚長而去...`, "text-red-400 text-center text-sm");
                showExitBattleButton(false);
                return true;
            }
            return false;
        }

        function showExitBattleButton(isSuccess) {
            const container = document.getElementById("action-commands-container");
            container.innerHTML = "";
            const backBtn = document.createElement("button");
            backBtn.className = "col-span-4 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold rounded shadow-lg text-sm animate-bounce";
            backBtn.textContent = "返回集會所 (結算並強化防具)";
            backBtn.onclick = () => {
                document.getElementById("player-weapon-select").disabled = false;
                document.getElementById("battle-screen").classList.add("hidden");
                document.getElementById("hub-screen").classList.remove("hidden");
                renderHub();
            };
            container.appendChild(backBtn);
        }

        window.onload = function() {
            initDefaultEnchants();
            window.generateQuests();
            window.recruitSquad();
            renderHub();
        };
    </script>
</body>
</html>
