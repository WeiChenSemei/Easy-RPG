<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hunt Log - 終極狩獵記錄</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* 隱藏滾動條 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 精緻晃動打擊感動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-1deg); }
            75% { transform: translateX(8px) rotate(1deg); }
        }
        .animate-shake {
            animation: shake 0.2s ease-in-out 2;
        }
    </style>
</head>
<body class="bg-[#050505] text-gray-100 min-h-[100dvh] flex justify-center items-center overflow-hidden">

    <!-- 手機豎屏容器限制 -->
    <div id="app-container" class="w-full max-w-[480px] h-[100dvh] bg-[#0b0c10] flex flex-col relative shadow-[0_0_50px_rgba(0,0,0,0.8)] border-x border-gray-800/60 overflow-hidden">

        <!-- 頂部導航欄 -->
        <header class="bg-black/80 backdrop-blur-md border-b border-cyan-900/40 px-3 py-2 flex justify-between items-center z-10 shrink-0">
            <div class="flex items-center space-x-2">
                <span class="text-amber-500 text-lg font-black tracking-wider flex items-center gap-1">
                    <i class="fa-solid fa-dragon"></i> HUNT LOG
                </span>
            </div>
            <div id="material-badge" class="bg-amber-950/60 border border-amber-600/40 text-amber-300 px-2.5 py-0.5 rounded-full text-xs font-bold flex items-center gap-1.5 shadow">
                <i class="fa-solid fa-cubes text-[10px]"></i> 龍之素材: <span id="global-materials">5</span>
            </div>
        </header>

        <!-- 主容器 -->
        <main class="flex-1 relative overflow-hidden flex flex-col">
            
            <!-- [1] 集會所畫面 (Gathering Hub) -->
            <div id="hub-screen" class="absolute inset-0 z-20 bg-gradient-to-b from-[#0f1115] to-[#07080a] overflow-hidden flex flex-col">
                
                <!-- 分頁按鈕 -->
                <div class="flex border-b border-gray-800 bg-[#12161f] shrink-0">
                    <button id="tab-btn-setup" onclick="window.switchHubTab('setup')" class="flex-1 py-3 text-sm font-bold text-cyan-400 border-b-2 border-cyan-400 transition bg-cyan-950/20">🛠️ 小隊整備</button>
                    <button id="tab-btn-quest" onclick="window.switchHubTab('quest')" class="flex-1 py-3 text-sm font-bold text-gray-500 border-b-2 border-transparent hover:text-amber-400 transition hover:bg-amber-950/20">🔥 討伐佈告欄</button>
                </div>

                <!-- 整備分頁 -->
                <div id="tab-content-setup" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3 pb-12">
                    <!-- 獵人自我裝備 & 夥伴資訊 -->
                    <div class="bg-[#12161f]/90 border border-gray-800/80 rounded-xl p-4 shadow-lg">
                        <h2 class="text-cyan-400 font-bold text-base mb-3 border-b border-cyan-950 pb-2 flex justify-between items-center">
                            <span>🛡️ 小隊整備</span>
                            <button onclick="window.recruitSquad()" class="text-[10px] bg-cyan-950 hover:bg-cyan-900 border border-cyan-600/50 text-cyan-300 px-2 py-1 rounded transition">
                                🔄 重新招募
                            </button>
                        </h2>
                        
                        <div class="space-y-4">
                            <!-- 玩家自己裝備與武器選擇 -->
                            <div class="bg-black/40 p-3 rounded-lg border border-gray-800">
                                <span class="text-yellow-400 font-bold text-sm block mb-2">✦ 傳奇獵人 (您)</span>
                                <div class="mb-3">
                                    <label class="text-xs text-gray-400 block mb-1">選擇武器種類：</label>
                                    <select id="player-weapon-select" onchange="window.changePlayerWeapon(this.value)" class="w-full bg-[#1b2230] border border-gray-700 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-cyan-400">
                                        <option value="swordShield">劍盾 (輕擊、防禦、盾擊控制)</option>
                                        <option value="greatsword">大刀 (重砍、防禦)</option>
                                        <option value="longsword">長劍 (斬擊流血、極限閃避)</option>
                                        <option value="bow">弓箭 (射擊高浮動、機動閃避)</option>
                                        <option value="heavyBowgun">重砲 (狂暴砲擊、防禦裝甲)</option>
                                        <option value="lance">長矛 (高精準刺擊、堅毅閃避)</option>
                                        <option value="dualBlades">雙刀 (瘋狂多段連擊、迅捷閃避)</option>
                                        <option value="hammer">大槌 (碎顱重擊、暈眩控制)</option>
                                    </select>
                                </div>
                                <!-- 裝備附魔詳情按鈕 -->
                                <button onclick="window.openEnchantModal()" class="w-full py-2 bg-gradient-to-r from-cyan-900 to-blue-900 hover:from-cyan-800 hover:to-blue-800 text-white rounded font-bold text-xs transition shadow-md">
                                    🔮 洗煉全身防禦與抗性 (18插槽)
                                </button>
                            </div>

                            <!-- 夥伴隊伍 -->
                            <div class="bg-black/40 p-3 rounded-lg border border-gray-800">
                                <span class="text-gray-400 text-xs block mb-2">當前召集獵人：</span>
                                <div id="squad-list" class="space-y-1.5 text-xs">
                                    <!-- 動態生成夥伴 -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 戰力屬性預覽 -->
                    <div class="bg-[#12161f]/90 border border-gray-800/80 rounded-xl p-4 shadow-lg">
                        <h3 class="text-cyan-400 font-bold text-xs mb-2">🔮 附魔累計加成</h3>
                        <div id="enchant-summary" class="grid grid-cols-2 gap-2 text-[10px] text-gray-400">
                            <!-- 動態生成累計附魔屬性 -->
                        </div>
                    </div>
                </div>

                <!-- 任務分頁 -->
                <div id="tab-content-quest" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3 pb-12 hidden">
                    <div class="bg-[#1a1412]/90 border border-amber-900/30 rounded-xl p-4 shadow-lg flex-1 flex flex-col">
                        <h2 class="text-amber-400 font-bold text-base mb-3 border-b border-amber-950 pb-2 flex justify-between items-center">
                            <span>🔥 討伐佈告欄</span>
                            <button onclick="window.generateQuests()" class="text-[10px] bg-amber-950 hover:bg-amber-900 border border-amber-600/50 text-amber-300 px-2 py-1 rounded transition">
                                刷新任務
                            </button>
                        </h2>
                        
                        <div id="quest-board" class="space-y-2.5 flex-1 overflow-y-auto pr-1 text-xs">
                            <!-- 動態生成任務卡片 -->
                        </div>

                        <div class="mt-3 pt-3 border-t border-amber-950">
                            <button id="start-hunt-btn" disabled onclick="window.startHunt()" class="w-full py-2.5 bg-gradient-to-r from-amber-600 to-red-600 hover:from-amber-500 hover:to-red-500 disabled:from-gray-800 disabled:to-gray-900 disabled:text-gray-500 disabled:cursor-not-allowed text-white font-extrabold text-center rounded-lg shadow-lg transition tracking-widest uppercase text-xs">
                                確認並出征
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- [2] 進入原野：戰鬥畫面 (手機豎屏優化) -->
            <div id="battle-screen" class="absolute inset-0 z-10 bg-gradient-to-b from-[#0e0707] to-[#070505] overflow-hidden flex flex-col hidden">
                
                <!-- 戰鬥頂部：魔物狀態與自動戰鬥開關 -->
                <div class="bg-black/80 border-b border-red-900/40 p-2 shrink-0 flex flex-col gap-1.5">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-1.5">
                            <i id="monster-icon" class="fa-solid fa-dragon text-red-500 text-sm animate-pulse"></i>
                            <span id="monster-name" class="font-bold text-sm text-red-400">魔物</span>
                        </div>
                        <button id="auto-battle-btn" onclick="window.toggleAutoBattle()" class="px-2.5 py-0.5 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-200 text-[10px] font-bold rounded-full transition flex items-center gap-1">
                            🤖 自動: <span id="auto-battle-status" class="text-red-400">關</span>
                        </button>
                    </div>

                    <!-- 魔物總血條 -->
                    <div class="w-full bg-gray-950 h-3.5 rounded border border-gray-800 overflow-hidden relative">
                        <div id="monster-hp-bar" class="bg-gradient-to-r from-red-700 to-red-500 h-full transition-all duration-300 w-full"></div>
                        <span id="monster-hp-txt" class="absolute inset-0 flex justify-center items-center text-[10px] font-black drop-shadow text-white">0 / 0</span>
                    </div>

                    <!-- 魔物部位狀態(破壞檢視) - 3x2緊湊排版 -->
                    <div id="monster-parts-grid" class="grid grid-cols-3 gap-1 mt-1 text-[9px]">
                        <!-- 動態部位血條 -->
                    </div>
                </div>

                <!-- 戰鬥中上：日誌/動畫分頁切換系統 -->
                <div class="bg-black/50 border-b border-gray-800 flex shrink-0 text-xs">
                    <button id="battle-tab-summary" onclick="window.switchBattleTab('summary')" class="flex-1 py-2 font-bold text-cyan-400 border-b-2 border-cyan-400 transition bg-cyan-950/20">
                        🎬 戰況速報
                    </button>
                    <button id="battle-tab-detail" onclick="window.switchBattleTab('detail')" class="flex-1 py-2 font-bold text-gray-500 border-b-2 border-transparent hover:text-cyan-400 transition">
                        📜 詳細戰報
                    </button>
                </div>

                <!-- 戰鬥中間：分頁內容面板 -->
                <div class="flex-1 relative overflow-hidden flex flex-col bg-black/20">
                    
                    <!-- 1. 戰況速報面板 (動畫與極簡最新動態) -->
                    <div id="battle-panel-summary" class="absolute inset-0 p-4 flex flex-col justify-center items-center">
                        <div class="w-full flex flex-col items-center justify-center gap-5 text-center">
                            <!-- 獵人與魔物的微動畫對峙區 -->
                            <div class="flex items-center justify-around w-full px-2 relative">
                                <div id="visual-hunter" class="flex flex-col items-center gap-1 transition-all duration-300">
                                    <div class="w-14 h-14 rounded-full bg-cyan-950/70 border-2 border-cyan-500/50 flex items-center justify-center text-2xl text-cyan-400 shadow-lg shadow-cyan-500/15">
                                        <i class="fa-solid fa-shield-halved"></i>
                                    </div>
                                    <span class="text-[10px] text-cyan-300 font-bold">獵人小隊</span>
                                </div>
                                
                                <div class="text-amber-500 text-lg font-black flex flex-col items-center relative min-w-[50px]">
                                    <span id="visual-clash-icon" class="text-3xl transition-transform duration-200">⚔️</span>
                                    <span id="visual-damage-popup" class="absolute -top-7 text-sm font-black drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] opacity-0 scale-0 transition-all duration-300 pointer-events-none"></span>
                                </div>
                                
                                <div id="visual-monster" class="flex flex-col items-center gap-1 transition-all duration-300">
                                    <div class="w-14 h-14 rounded-full bg-red-950/70 border-2 border-red-500/50 flex items-center justify-center text-2xl text-red-500 shadow-lg shadow-red-500/15">
                                        <i class="fa-solid fa-dragon animate-pulse"></i>
                                    </div>
                                    <span id="visual-monster-name" class="text-[10px] text-red-400 font-bold">魔物</span>
                                </div>
                            </div>
                            
                            <!-- 簡易當前訊息框 -->
                            <div class="w-full bg-black/55 border border-gray-800/80 rounded-xl p-3 min-h-[76px] flex items-center justify-center shadow-inner">
                                <p id="visual-latest-msg" class="text-xs text-gray-300 font-medium leading-relaxed text-center">
                                    準備開戰！點擊動作按鈕或開起自動，開始討伐！
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- 2. 詳細戰報面板 (歷史對話日誌，在背景中保持追加且自由滑動) -->
                    <div id="battle-panel-detail" class="absolute inset-0 overflow-y-auto p-3 flex flex-col gap-1.5 scrollbar-hide hidden">
                        <div id="battle-log-container" class="flex flex-col gap-1.5">
                            <!-- 動態文字日誌 -->
                        </div>
                    </div>

                </div>

                <!-- 戰鬥中下：獵人小隊狀態 (緊湊2x2網格) -->
                <div id="battle-squad-grid" class="bg-black/60 border-y border-gray-800/80 p-2 shrink-0 grid grid-cols-2 gap-1.5">
                    <!-- 動態獵人血量與SP卡片 -->
                </div>

                <!-- 戰鬥底部：指令區 -->
                <div class="bg-black/90 p-2 border-t border-gray-800/80 shrink-0 flex flex-col gap-2">
                    <div class="flex justify-between items-center text-[10px] text-gray-400 px-1">
                        <span>🎯 瞄準目標部位:</span>
                        <select id="aim-part-select" class="bg-gray-900 border border-gray-700 text-white rounded px-1.5 py-0.5 focus:outline-none">
                            <option value="head">頭部 (攻最強)</option>
                            <option value="body" selected>身體 (極均衡)</option>
                            <option value="wings">翅膀</option>
                            <option value="tail">尾巴</option>
                            <option value="leftLeg">左腳</option>
                            <option value="rightLeg">右腳</option>
                        </select>
                    </div>

                    <!-- 指令按鈕集 (橫向滑動/自動彈性換行) -->
                    <div id="action-commands-container" class="grid grid-cols-3 gap-1.5">
                        <!-- 動態動作按鈕 -->
                    </div>
                </div>
            </div>
        </main>

        <!-- [3] 附魔洗鍊彈窗 (Modal) -->
        <div id="enchant-modal" class="absolute inset-0 bg-black/85 backdrop-blur-sm hidden flex justify-center items-center p-3 z-50">
            <div class="bg-[#12161f] border border-cyan-800/40 rounded-xl w-full max-h-[90dvh] flex flex-col overflow-hidden shadow-2xl">
                <!-- 彈窗頭部 -->
                <div class="p-3 bg-black/40 border-b border-gray-800 flex justify-between items-center">
                    <span class="text-cyan-400 font-black text-sm"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i> 遠古裝備附魔 (18插槽)</span>
                    <button onclick="window.closeEnchantModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <!-- 裝備與洗鍊清單 -->
                <div id="enchant-list" class="flex-1 overflow-y-auto p-3 space-y-3.5 scrollbar-hide text-xs">
                    <!-- 動態產生 6 個部位，每個部位 3 個插槽 -->
                </div>
                <!-- 彈窗底部 -->
                <div class="p-3 bg-black/40 border-t border-gray-800 flex justify-between items-center text-xs shrink-0">
                    <span class="text-amber-300 font-bold"><i class="fa-solid fa-cubes"></i> 素材存量: <span id="modal-materials">0</span></span>
                    <button onclick="window.closeEnchantModal()" class="bg-cyan-800 hover:bg-cyan-700 text-white font-bold px-4 py-1.5 rounded transition">
                        設定完成
                    </button>
                </div>
            </div>
        </div>

    </div> <!-- 結束 app-container -->

    <!-- 遊戲核心邏輯 -->
    <script>
        const WEAPONS = {
            swordShield: {
                name: "劍盾",
                skills: [
                    { name: "輕擊", type: "attack", dmg: 16, hit: 98, status: null, desc: "威力較弱但命中極高" },
                    { name: "盾擊", type: "attack", dmg: 22, hit: 80, status: { type: "stun", duration: 1 }, desc: "重擊敵方，有機率造成暈眩" },
                    { name: "防禦", type: "defend", desc: "架起盾牌，大幅減免下回合受到的傷害" }
                ],

            },

                name: "大刀",

                    { name: "重砍", type: "attack", dmg: 48, hit: 65, status: null, desc: "威力強大但動作笨重，命中較低" },

            },

                skills: [

            },
            bow: {
                name: "弓箭",
                skills: [
                    { name: "射擊", type: "attack_var", dmgMin: 10, dmgMax: 38, hit: 92, desc: "威力高度浮動的精準射擊" },
                    { name: "滑步閃避", type: "evade", desc: "拉開身位，極大提升下回合閃避率" }
                ],

            },

                    { name: "狂暴砲擊", type: "attack_var", dmgMin: 5, dmgMax: 65, hit: 60, desc: "破壞力極其不穩定但天花板極高的轟炸" },

                    { name: "防禦閃避", type: "evade", desc: "在盾牌保護下進行小跳步調整" }
                ],
                ult: { name: "人車人馬合一衝鋒", dmg: 75, desc: "高速突刺，無視魔物部分護甲" }
            },
            dualBlades: {
                name: "雙刀",
                skills: [
                    { name: "鬼人連擊", type: "attack_multi", dmg: 11, hit: 90, hits: 3, desc: "連續造成 1~3 次連打傷害" },
                    { name: "迅捷迴避", type: "evade", desc: "殘影閃躲，提供最高機率的迴避效果" }
                ],
                ult: { name: "亂舞（兵長斬）", dmg: 105, desc: "瘋狂的高頻率雙刃旋風斬" }
            },
            hammer: {
                name: "大槌",
                skills: [
                    { name: "碎顱重擊", type: "attack", dmg: 38, hit: 78, status: { type: "stun", duration: 1 }, desc: "打擊頭部能造成極佳的暈眩蓄積" },
                    { name: "滑空防禦", type: "defend", desc: "借力滑行，並用握柄招架防守" }
                ],
                ult: { name: "大地一擊", dmg: 115, desc: "碎裂大地的大蓄力重擊，對頭部特攻" }
            }
        };

        const MONSTERS = {
            fireDragon: { name: "火龍", hp: 1300, type: "火", textStyle: "text-red-500", desc: "飛龍之王，能吐出燒盡一切的爆炎", statusEffect: "fire" },
            iceDragon: { name: "冰龍", hp: 1250, type: "冰", textStyle: "text-blue-400", desc: "掌控極寒的古龍，吐息化為冰霜護甲", statusEffect: "ice" },

            electricDragon: { name: "電龍", hp: 1200, type: "電", textStyle: "text-yellow-400", desc: "體表充滿高壓電流，能使獵人瞬間癱瘓", statusEffect: "electric" },
            fangDragon: { name: "牙龍", hp: 1500, type: "麻痺", textStyle: "text-green-500", desc: "動作極為迅捷的獵食者，爪擊附帶神經毒素", statusEffect: "paralysis" },

        function getRandomEnchant() {
            const attr = ATTRIBUTE_TYPES[Math.floor(Math.random() * ATTRIBUTE_TYPES.length)];
            const val = attr.values[Math.floor(Math.random() * attr.values.length)];
            return { type: attr.id, name: attr.name, val: val, prefix: attr.prefix, suffix: attr.suffix };
        }

        function initDefaultEnchants() {
            ENCHANT_PARTS.forEach(part => {
                gameState.enchants[part] = [

        window.rerollEnchant = function(part, slotIndex) {
            if (gameState.materials < 1) {
                showNotification("❌ 龍之素材不足！請前往討伐魔物獲取素材。");
                return;
            }
            gameState.materials -= 1;
            gameState.enchants[part][slotIndex] = getRandomEnchant();
            renderEnchantModal();
            updateMaterialsDisplay();

        function updateMaterialsDisplay() {
            document.getElementById("global-materials").textContent = gameState.materials;
            document.getElementById("modal-materials").textContent = gameState.materials;
        }

        function getEnchantSum() {
            let sum = {
                maxHp: 0, atk: 0,
                fireDmg: 0, iceDmg: 0, waterDmg: 0, electricDmg: 0,
                fireRes: 0, iceRes: 0, waterRes: 0,
                poisonRes: 0, paraRes: 0, sleepRes: 0
            };
            for (let part in gameState.enchants) {
                gameState.enchants[part].forEach(e => {
                    if (sum[e.type] !== undefined) {
                        sum[e.type] += e.val;
                    }
                });
            }
            return sum;
        }

        const ALLY_NAMES = ["艾利克斯", "莉雅", "凱文", "蘇菲亞", "尤里", "娜塔莎", "雷恩", "賽蓮娜"];
        window.recruitSquad = function() {
            if (gameState.battle.active) return;
            const availableWeapons = Object.keys(WEAPONS);
            let chosenAllies = [];
            let namesPool = [...ALLY_NAMES];
            
            for (let i = 0; i < 3; i++) {
                const nameIdx = Math.floor(Math.random() * namesPool.length);
                const name = namesPool.splice(nameIdx, 1)[0];
                const weapon = availableWeapons[Math.floor(Math.random() * availableWeapons.length)];
                chosenAllies.push({ name: name, weapon: weapon });
            }
            gameState.squad = chosenAllies;
            renderHub();
        };

        window.changePlayerWeapon = function(weaponKey) {
            if (gameState.battle.active) return;
            gameState.playerWeapon = weaponKey;
            renderHub();
        };

        window.generateQuests = function() {
            if (gameState.battle.active) return;
            let quests = [];
            const keys = Object.keys(MONSTERS);
            for (let i = 0; i < 3; i++) {
                const mKey = keys[Math.floor(Math.random() * keys.length)];
                const base = MONSTERS[mKey];
                const modifier = 0.9 + (Math.random() * 0.3); // 浮動戰力
                quests.push({
                    monsterKey: mKey,
                    name: base.name,
                    hp: Math.floor(base.hp * modifier),
                    type: base.type,
                    desc: base.desc,
                    textStyle: base.textStyle,
                    materialsReward: Math.floor(4 + Math.random() * 4)
                });
            }
            gameState.quests = quests;
            gameState.selectedQuestIndex = null;
            document.getElementById("start-hunt-btn").disabled = true;
            renderHub();
        };

        window.selectQuest = function(index) {

            gameState.selectedQuestIndex = index;
            document.getElementById("start-hunt-btn").disabled = false;

            for (let i = 0; i < 3; i++) {

                        card.className = "p-3 rounded-lg border-2 border-amber-500 bg-amber-950/20 text-left transition cursor-pointer";
                    } else {
                        card.className = "p-3 rounded-lg border border-gray-800 bg-black/40 text-left hover:border-gray-700 transition cursor-pointer";
                    }
                }
            }
        };

        function animateClash(isMonsterAttacking, damageText = "") {
            const hunterVisual = document.getElementById("visual-hunter");
            const monsterVisual = document.getElementById("visual-monster");
            const damagePopup = document.getElementById("visual-damage-popup");
            const clashIcon = document.getElementById("visual-clash-icon");

            if (!hunterVisual || !monsterVisual || !damagePopup || !clashIcon) return;

            // 移除舊的動畫 class 並重置
            hunterVisual.classList.remove("animate-shake", "translate-x-6");
            monsterVisual.classList.remove("animate-shake", "-translate-x-6");
            damagePopup.className = "absolute -top-7 text-sm font-black drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] opacity-0 scale-0 transition-all duration-300 pointer-events-none";

            // 強制重繪
            void hunterVisual.offsetWidth;

            setTimeout(() => {
                if (isMonsterAttacking) {
                    // 魔物前衝攻擊
                    monsterVisual.classList.add("-translate-x-6");
                    clashIcon.textContent = "🔥";
                    setTimeout(() => {
                        monsterVisual.classList.remove("-translate-x-6");
                        hunterVisual.classList.add("animate-shake");
                        if (damageText) {
                            damagePopup.textContent = damageText;
                            const isHeal = damageText.startsWith("+");
                            damagePopup.className = `absolute -top-7 text-sm font-black ${isHeal ? 'text-green-400' : 'text-red-500'} drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] opacity-100 scale-125 -translate-y-2 transition-all duration-300 pointer-events-none`;
                        }
                    }, 150);
                } else {
                    // 獵人前衝攻擊
                    hunterVisual.classList.add("translate-x-6");
                    clashIcon.textContent = "💥";
                    setTimeout(() => {
                        hunterVisual.classList.remove("translate-x-6");
                        monsterVisual.classList.add("animate-shake");
                        if (damageText) {
                            damagePopup.textContent = damageText;
                            const isHeal = damageText.startsWith("+");
                            damagePopup.className = `absolute -top-7 text-sm font-black ${isHeal ? 'text-green-400' : 'text-yellow-400'} drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] opacity-100 scale-125 -translate-y-2 transition-all duration-300 pointer-events-none`;
                        }
                    }, 150);
                }
            }, 50);
        }

        window.startHunt = function() {
            if (gameState.selectedQuestIndex === null) return;
            lockControls(true); // 鎖定裝備修改
            
            const quest = gameState.quests[gameState.selectedQuestIndex];
            
            // 1. 初始化戰鬥資料
            gameState.battle.active = true;
            gameState.battle.turn = 1;
            gameState.battle.auto = false;
            document.getElementById("auto-battle-status").textContent = "關";
            document.getElementById("auto-battle-status").className = "text-red-400";
            
            // 預設戰鬥一開始回到「🎬 戰況速報」分頁
            window.switchBattleTab('summary');

            // 2. 魔物部位血量設定
            gameState.battle.monster = {
                key: quest.monsterKey,
                name: quest.name,
                maxHp: quest.hp,
                hp: quest.hp,
                type: quest.type,
                textStyle: quest.textStyle,
                materialsReward: quest.materialsReward,
                statusEffect: MONSTERS[quest.monsterKey].statusEffect
            };
            
            // 每個部位給予單獨血量
            gameState.battle.monsterParts = {};
            PARTS.forEach(part => {
                const modifier = part === "body" ? 0.35 : 0.22;
                gameState.battle.monsterParts[part] = {
                    name: PART_NAMES[part],
                    maxHp: Math.floor(quest.hp * modifier),
                    hp: Math.floor(quest.hp * modifier),
                    broken: false
                };
            });

            // 3. 獵人小隊初始化 (玩家 + 3 位隊友)
            gameState.battle.squad = [];
            
            // 計算附魔加成
            const enchants = getEnchantSum();

            // 玩家本人
            gameState.battle.squad.push({
                isPlayer: true,
                name: "傳奇獵人 (您)",
                weaponKey: gameState.playerWeapon,
                maxHp: 100 + enchants.maxHp,
                hp: 100 + enchants.maxHp,
                sp: 0,
                status: {}, // 中毒、流血等
                defending: false,
                evading: false
            });

            // 隊友
            gameState.squad.forEach(m => {
                gameState.battle.squad.push({
                    isPlayer: false,
                    name: m.name,
                    weaponKey: m.weapon,
                    maxHp: 100, // 隊友為基礎數值
                    hp: 100,
                    sp: 0,
                    status: {},
                    defending: false,
                    evading: false
                });
            });

            // 4. UI 畫面與速報配置切換
            document.getElementById("hub-screen").classList.add("hidden");
            document.getElementById("battle-screen").classList.remove("hidden");
            document.getElementById("visual-monster-name").textContent = quest.name;
            
            // 清除戰鬥日誌
            const logContainer = document.getElementById("battle-log-container");
            logContainer.innerHTML = "";
            
            addBattleLog(`🚨 <strong>進入原野！</strong> 開始討伐恐怖的 <span class="${quest.textStyle} font-black">${quest.name}</span>！`, "text-amber-400 font-extrabold text-sm mb-3");
            addBattleLog(`💡 部位破壞機制：點擊瞄準目標部位！破壞該部位將封印魔物對應的必殺技！`, "text-gray-400 text-xs mb-3");

            renderBattleUI();
        };

        function addBattleLog(text, textClass = "text-gray-300 text-xs") {
            const container = document.getElementById("battle-log-container");
            const entry = document.createElement("div");
            entry.className = `p-1 border-l-2 border-transparent pl-2 ${textClass}`;
            entry.innerHTML = text;
            container.appendChild(entry);
            
            // 在背景持續滾動詳細戰報面板 (不影響分頁)
            const detailPanel = document.getElementById("battle-panel-detail");
            if (detailPanel) {
                detailPanel.scrollTop = detailPanel.scrollHeight;
            }

            // 同步將最新訊息更新到「戰況速報面板」
            const visualMsg = document.getElementById("visual-latest-msg");
            if (visualMsg) {
                visualMsg.innerHTML = text;
            }

            // 動態分析文字，觸發精準撞擊動作與傷害/生命值漂浮字
            let isMonsterAttacking = false;
            let dmgMatch = text.match(/(-?\d+)\s*點|(\d+)\s*HP/);
            let dmgText = "";

            if (dmgMatch) {
                if (text.includes("回復藥") || text.includes("恢復")) {
                    dmgText = `+${dmgMatch[1] || dmgMatch[2]}`;
                } else {
                    dmgText = `-${dmgMatch[1] || dmgMatch[2]}`;
                }
            }

            const mName = gameState.battle?.monster?.name || "魔物";
            if (text.includes("使出必殺技") || text.includes("朝獵人") || text.includes("撞擊") || text.includes("無力地") || text.includes("跺下") || text.includes("前掌蓄力")) {
                isMonsterAttacking = true;
            }

            // 如果是有動作、傷害、施放或喝藥的有效戰況
            if (text.includes("造成") || text.includes("傷害") || text.includes("使用【") || text.includes("發射") || text.includes("大絕招") || text.includes("回復藥") || text.includes("必殺技")) {
                animateClash(isMonsterAttacking, dmgText);
            }
        }

        window.toggleAutoBattle = function() {
            if (!gameState.battle.active) return;
            gameState.battle.auto = !gameState.battle.auto;
            const btnText = document.getElementById("auto-battle-status");
            if (gameState.battle.auto) {
                btnText.textContent = "開";
                btnText.className = "text-green-400";
                addBattleLog(`🤖 <strong>自動戰鬥已開啟！</strong>`, "text-green-400 font-bold");
                // 立即觸發自動回合
                triggerAutoTurn();
            } else {
                btnText.textContent = "關";
                btnText.className = "text-red-400";
                addBattleLog(`🤖 <strong>自動戰鬥已關閉。</strong>`, "text-red-400 font-bold");
                renderBattleUI();
            }
        };

        function triggerAutoTurn() {
            if (!gameState.battle.active || !gameState.battle.auto) return;
            
            const player = gameState.battle.squad[0];
            // 1. 如果倒下了，必須且唯一只能喝藥
            if (player.hp <= 0) {
                setTimeout(() => {
                    handlePlayerAction("heal");
                }, 800);
                return;
            }

            // 2. 如果沒血了 (HP < 35)，有 90% 機率喝藥
            if (player.hp < 35 && Math.random() < 0.9) {
                setTimeout(() => {
                    handlePlayerAction("heal");
                }, 800);
                return;
            }

            // 3. 武器對應隨機招式
            const wInfo = WEAPONS[player.weaponKey];
            const playableSkills = wInfo.skills;
            const randomSkillIdx = Math.floor(Math.random() * playableSkills.length);
            
            setTimeout(() => {
                handlePlayerAction(randomSkillIdx);
            }, 800);
        }

        function renderBattleUI() {
            const b = gameState.battle;
            if (!b.active) return;

            // 1. 魔物血量
            const hpPercent = (b.monster.hp / b.monster.maxHp) * 100;
            document.getElementById("monster-hp-bar").style.width = `${Math.max(0, hpPercent)}%`;
            document.getElementById("monster-hp-txt").textContent = `${Math.max(0, b.monster.hp)} / ${b.monster.maxHp}`;
            document.getElementById("monster-name").textContent = b.monster.name + ` (${b.monster.type}屬性)`;

            // 2. 魔物部位
            const partsGrid = document.getElementById("monster-parts-grid");
            partsGrid.innerHTML = "";
            PARTS.forEach(p => {
                const partInfo = b.monsterParts[p];
                const pct = partInfo.broken ? 0 : (partInfo.hp / partInfo.maxHp) * 100;
                
                const card = document.createElement("div");
                card.className = `p-1 border rounded flex flex-col gap-0.5 ${partInfo.broken ? 'bg-red-950/20 border-red-900/40 opacity-40' : 'bg-black/50 border-gray-800'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center text-[8px] font-bold">
                        <span class="${partInfo.broken ? 'text-red-500' : 'text-gray-300'}">${partInfo.name}</span>
                        <span class="text-[7px] text-gray-400">${partInfo.broken ? '💥 已破壞' : Math.max(0, partInfo.hp) + 'HP'}</span>
                    </div>
                    <div class="w-full bg-gray-900 h-1 rounded overflow-hidden">
                        <div class="h-full ${partInfo.broken ? 'bg-transparent' : 'bg-amber-500'}" style="width: ${pct}%"></div>
                    </div>
                `;
                partsGrid.appendChild(card);
            });

            // 3. 獵人小隊 (2x2)
            const squadGrid = document.getElementById("battle-squad-grid");
            squadGrid.innerHTML = "";
            b.squad.forEach((h, idx) => {
                const hpPct = (h.hp / h.maxHp) * 100;
                const spPct = (h.sp / 100) * 100;
                
                // 狀態顯示
                let stateTags = "";
                if (h.hp <= 0) {
                    stateTags = `<span class="bg-red-900 text-red-200 px-1 rounded font-bold animate-pulse">💀 倒下</span>`;
                } else {
                    let tags = [];
                    if (h.defending) tags.push("🛡️ 防禦中");
                    if (h.evading) tags.push("💨 閃避中");
                    for (let st in h.status) {
                        if (h.status[st] > 0) {
                            if (st === "poison") tags.push(`🧪 毒(${h.status[st]}T)`);
                            if (st === "bleed") tags.push(`🩸 流血(${h.status[st]}T)`);
                            if (st === "para") tags.push(`⚡ 麻痺(${h.status[st]}T)`);
                            if (st === "sleep") tags.push(`💤 睡眠`);
                            if (st === "stun") tags.push(`💫 暈眩(${h.status[st]}T)`);
                        }
                    }
                    stateTags = tags.length > 0 ? `<span class="text-[8px] text-yellow-400 font-bold">${tags.join(' ')}</span>` : `<span class="text-green-400">⚔️ 戰鬥中</span>`;
                }

                const wName = WEAPONS[h.weaponKey].name;

                const card = document.createElement("div");
                card.className = `p-1.5 rounded-lg border flex flex-col gap-1 text-[10px] ${h.hp <= 0 ? 'bg-red-950/20 border-red-900/30 opacity-60' : (h.isPlayer ? 'bg-cyan-950/20 border-cyan-800' : 'bg-black/40 border-gray-800')}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-extrabold ${h.isPlayer ? 'text-cyan-400' : 'text-gray-200'}">${h.name}</span>
                        <span class="text-[8px] bg-gray-950 text-gray-400 border border-gray-800 px-1 py-0.2 rounded">${wName}</span>
                    </div>
                    <div class="flex justify-between items-center text-[9px]">
                        <span>HP: <strong class="text-white">${Math.max(0, h.hp)}/${h.maxHp}</strong></span>
                        ${stateTags}
                    </div>
                    <!-- 血條 -->
                    <div class="w-full bg-gray-900 h-1 rounded overflow-hidden">
                        <div class="bg-green-500 h-full transition-all" style="width: ${Math.max(0, hpPct)}%"></div>
                    </div>
                    <!-- SP大招條 -->
                    <div class="flex justify-between items-center text-[8px] text-gray-400">
                        <span>SP 累積:</span>
                        <span class="${h.sp >= 100 ? 'text-amber-400 font-bold animate-pulse' : ''}">${h.sp}%</span>
                    </div>
                    <div class="w-full bg-gray-900 h-1 rounded overflow-hidden">
                        <div class="bg-gradient-to-r from-yellow-600 to-amber-400 h-full transition-all" style="width: ${Math.min(100, spPct)}%"></div>
                    </div>
                `;
                squadGrid.appendChild(card);
            });

            // 4. 指令按鈕
            const cmdContainer = document.getElementById("action-commands-container");
            cmdContainer.innerHTML = "";
            const player = b.squad[0];
            const wInfo = WEAPONS[player.weaponKey];

            // 關鍵修改：如果玩家倒下了，只能使用回復藥復活，且按鈕能正常驅動並觸發
            if (player.hp <= 0) {
                const bHeal = document.createElement("button");
                bHeal.className = "col-span-3 py-2 bg-gradient-to-r from-red-600 to-amber-600 hover:from-red-500 text-white text-xs font-black rounded-lg shadow animate-bounce";
                bHeal.innerHTML = `💊 飲用回復藥 (+50HP 復活重返戰場)`;
                bHeal.onclick = () => window.handlePlayerAction("heal");
                cmdContainer.appendChild(bHeal);
                return;
            }

            // 被麻痺、睡眠或暈眩
            if (player.status.para > 0 || player.status.sleep > 0 || player.status.stun > 0) {
                const disabledBtn = document.createElement("button");
                disabledBtn.className = "col-span-3 py-2 bg-gray-800 text-gray-500 text-xs font-bold rounded-lg cursor-not-allowed";
                disabledBtn.textContent = "💤 當前處於無法行動狀態 (點擊跳過回合)";
                disabledBtn.onclick = () => window.handlePlayerAction("skip");
                cmdContainer.appendChild(disabledBtn);
                return;
            }

            // 如果 SP 滿了，下一次必定施放大絕
            const hasUlt = player.sp >= 100;

            // 正常技能按鈕渲染
            wInfo.skills.forEach((sk, idx) => {
                const btn = document.createElement("button");
                btn.className = "py-2 px-1 rounded-lg font-bold text-xs transition duration-200 text-center truncate flex flex-col items-center justify-center ";
                
                if (hasUlt && sk.type && sk.type.startsWith("attack")) {
                    btn.className += "bg-gradient-to-b from-amber-500 to-yellow-600 text-black border border-yellow-300 animate-pulse";
                    btn.innerHTML = `💥 釋放絕招<span class="text-[8px] font-black">${wInfo.ult.name}</span>`;
                    btn.onclick = () => window.handlePlayerAction(idx);
                } else {
                    if (sk.type === "attack" || sk.type === "attack_var" || sk.type === "attack_multi") {
                        btn.className += "bg-red-950/80 hover:bg-red-900/80 text-red-200 border border-red-800/50";
                    } else if (sk.type === "defend") {
                        btn.className += "bg-blue-950/80 hover:bg-blue-900/80 text-blue-200 border border-blue-800/50";
                    } else {
                        btn.className += "bg-purple-950/80 hover:bg-purple-900/80 text-purple-200 border border-purple-800/50";
                    }
                    btn.innerHTML = `⚔️ ${sk.name}`;
                    btn.onclick = () => window.handlePlayerAction(idx);
                }

                cmdContainer.appendChild(btn);
            });

            // 始終可以點擊的回復藥按鈕
            const pHealBtn = document.createElement("button");
            pHealBtn.className = "py-2 px-1 bg-emerald-950/80 hover:bg-emerald-900 text-emerald-200 border border-emerald-800/50 rounded-lg font-bold text-xs flex items-center justify-center gap-1";
            pHealBtn.innerHTML = `🧪 回復藥`;
            pHealBtn.onclick = () => window.handlePlayerAction("heal");
            cmdContainer.appendChild(pHealBtn);
        }

        window.handlePlayerAction = function(actionCode) {
            const b = gameState.battle;
            if (!b.active) return;

            // 鎖定 UI 避免雙點擊
            const buttons = document.querySelectorAll("#action-commands-container button");
            buttons.forEach(btn => btn.disabled = true);

            // 1. 執行玩家行動
            executePlayerTurn(actionCode);
            renderBattleUI(); // <-- 點完瞬間立刻重繪，確保復活/喝藥血量立刻反饋

            // 檢測是否在玩家出手後便已討伐成功
            if (checkBattleEnd()) return;

            // 2. 隨後輪到隊友行動 (增加延遲，讓戰報讀起來更有感)
            setTimeout(() => {
                if (!b.active) return;
                executeAlliesTurn();
                renderBattleUI(); // <-- 隊友出招後重繪

                if (checkBattleEnd()) return;

                // 3. 魔物反擊回合
                setTimeout(() => {
                    if (!b.active) return;
                    executeMonsterTurn();
                    renderBattleUI(); // <-- 魔物傷害結算後重繪

                    if (checkBattleEnd()) return;

                    // 4. 回合結束狀態 Tick 結算 (中毒/流血等)
                    setTimeout(() => {
                        if (!b.active) return;
                        executeStatusTicks();
                        renderBattleUI(); // <-- Tick 結算後重繪

                        // 5. 檢測戰鬥勝負
                        if (checkBattleEnd()) return;

                        // 進入下回合
                        b.turn += 1;
                        
                        // 重置防守與閃避狀態
                        b.squad.forEach(h => {
                            h.defending = false;
                            h.evading = false;
                        });

                        addBattleLog(`⚔️ <strong>---- 回合 ${b.turn} 結束 ----</strong>`, "text-gray-600 text-center my-1.5");
                        renderBattleUI();

                        // 如果自動戰鬥開啟，繼續遞迴
                        if (b.auto) {
                            triggerAutoTurn();
                        }
                    }, 500);
                }, 800);
            }, 800);
        };

        function executePlayerTurn(actionCode) {
            const b = gameState.battle;
            const player = b.squad[0];
            const wInfo = WEAPONS[player.weaponKey];
            const aimPart = document.getElementById("aim-part-select").value;

            // 核心修改：將回復藥 (復活) 的判定移到最優先級，免受異常狀態(麻痺/睡眠/暈眩)攔截
            if (actionCode === "heal") {
                const wasDead = player.hp <= 0;
                player.hp = Math.min(player.maxHp, player.hp + 50);
                
                // 如果是復活，清除當前身上所有負面異常控制狀態
                if (wasDead) {
                    player.status = {};
                    addBattleLog(`🧪 <strong>${player.name}</strong> 喝下回復藥，戰意重燃，恢復 <span class="text-green-400 font-bold">50</span> HP 並重新站了起來！`, "text-green-400 font-bold");
                } else {
                    addBattleLog(`🧪 <strong>${player.name}</strong> 喝下回復藥，恢復 <span class="text-green-400 font-bold">50</span> HP。`, "text-green-400");
                }
                return;
            }

            // 正常戰鬥中，如果被狀態控制限制
            if (player.status.para > 0) {
                addBattleLog(`⚡ <strong>${player.name}</strong> 身體麻痺中，動彈不得！`, "text-yellow-400");
                return;
            }
            if (player.status.sleep > 0) {
                addBattleLog(`💤 <strong>${player.name}</strong> 陷入熟睡中，無法動彈...`, "text-indigo-400");
                return;
            }
            if (player.status.stun > 0) {
                addBattleLog(`💫 <strong>${player.name}</strong> 腦袋暈乎乎的，無法行動！`, "text-amber-500");
                return;
            }

            // B. 跳過/無動作 (如控制狀態下)
            if (actionCode === "skip") {
                addBattleLog(`⏳ <strong>${player.name}</strong> 正在努力掙脫狀態異常。`, "text-gray-400");
                return;
            }

            const skill = wInfo.skills[actionCode];

            // C. 蓄力大招釋放
            if (player.sp >= 100 && skill.type && skill.type.startsWith("attack")) {
                const ult = wInfo.ult;
                player.sp = 0; // 消耗 SP
                const enchants = getEnchantSum();
                let dmg = ult.dmg + enchants.atk;
                
                // 屬性額外傷害 (洗煉加成)
                if (b.monster.type === "火") dmg += enchants.fireDmg;
                if (b.monster.type === "冰") dmg += enchants.iceDmg;
                if (b.monster.type === "水") dmg += enchants.waterDmg;
                if (b.monster.type === "電") dmg += enchants.electricDmg;

                // 傷害對部位與魔物本體同時結算
                applyDamageToMonster(dmg, aimPart);
                addBattleLog(`💥 <strong>${player.name}</strong> 蓄力爆發釋放大絕招！【<strong>${ult.name}</strong>】，對 <span class="text-amber-400">${PART_NAMES[aimPart]}</span> 造成了 <span class="text-yellow-400 font-black">${dmg}</span> 點碎裂傷害！`, "text-yellow-400 font-extrabold");
                
                // 必定暈眩特殊大絕
                if (player.weaponKey === "swordShield") {
                    b.monster.stunnedNextTurn = true;
                    addBattleLog(`💫 盾牌猛擊極為沉重！${b.monster.name} 下一回合將必定陷入暈眩！`, "text-amber-400");
                }
                return;
            }

            // D. 正常技能執行
            if (skill.type === "attack") {
                const hitRoll = Math.random() * 100;
                if (hitRoll <= skill.hit) {
                    const enchants = getEnchantSum();
                    let dmg = skill.dmg + enchants.atk;
                    if (b.monster.type === "火") dmg += enchants.fireDmg;
                    if (b.monster.type === "冰") dmg += enchants.iceDmg;
                    if (b.monster.type === "水") dmg += enchants.waterDmg;
                    if (b.monster.type === "電") dmg += enchants.electricDmg;

                    applyDamageToMonster(dmg, aimPart);
                    let logStr = `⚔️ <strong>${player.name}</strong> 使用【${skill.name}】精準砸中 <span class="text-amber-400">${PART_NAMES[aimPart]}</span>，造成了 <span class="text-red-400 font-bold">${dmg}</span> 點傷害。`;
                    
                    if (skill.status) {
                        const rollEffect = Math.random() < 0.35;
                        if (rollEffect) {
                            if (skill.status.type === "stun") {
                                b.monster.stunnedNextTurn = true;
                                logStr += ` 💫 魔物被打得有些眼花繚亂！`;
                            }
                        }
                    }
                    addBattleLog(logStr);
                    player.sp = Math.min(100, player.sp + 25);
                } else {
                    addBattleLog(`💨 <strong>${player.name}</strong> 的一擊【${skill.name}】被魔物靈敏避開！`, "text-gray-500");
                }
            } else if (skill.type === "attack_var") {
                const hitRoll = Math.random() * 100;
                if (hitRoll <= skill.hit) {
                    const baseDmg = skill.dmgMin + Math.floor(Math.random() * (skill.dmgMax - skill.dmgMin + 1));
                    const enchants = getEnchantSum();
                    let dmg = baseDmg + enchants.atk;
                    applyDamageToMonster(dmg, aimPart);
                    addBattleLog(`🏹 <strong>${player.name}</strong> 發射強弩砲擊！對 <span class="text-amber-400">${PART_NAMES[aimPart]}</span> 造成 <span class="text-yellow-400 font-extrabold">${dmg}</span> 點高度波動傷害！`);
                    player.sp = Math.min(100, player.sp + 30);
                } else {
                    addBattleLog(`💨 <strong>${player.name}</strong> 的強力彈丸呼嘯飛過，未能命中！`, "text-gray-500");
                }
            } else if (skill.type === "attack_multi") {
                const hitCount = 1 + Math.floor(Math.random() * skill.hits);
                let totalDmg = 0;
                for (let i = 0; i < hitCount; i++) {
                    const hitRoll = Math.random() * 100;
                    if (hitRoll <= skill.hit) {
                        const enchants = getEnchantSum();
                        totalDmg += (skill.dmg + enchants.atk);
                    }
                }
                if (totalDmg > 0) {
                    applyDamageToMonster(totalDmg, aimPart);
                    addBattleLog(`⚔️ <strong>${player.name}</strong> 發動【${skill.name}】狂風般斬出 <span class="text-yellow-400 font-bold">${hitCount}</span> 段連擊，共計造成 <span class="text-red-400 font-bold">${totalDmg}</span> 點傷害！`);
                    player.sp = Math.min(100, player.sp + 35);
                } else {
                    addBattleLog(`💨 <strong>${player.name}</strong> 發起高速亂舞連斬，卻被魔物完全閃躲！`, "text-gray-500");
                }
            } else if (skill.type === "defend") {
                player.defending = true;
                addBattleLog(`🛡️ <strong>${player.name}</strong> 進入「絕對防禦」姿態，將極大削弱下一次魔物的正面衝擊。`, "text-blue-400");
                player.sp = Math.min(100, player.sp + 15);
            } else if (skill.type === "evade") {
                player.evading = true;
                addBattleLog(`💨 <strong>${player.name}</strong> 全神貫注，進入「極限閃避」狀態，大幅提升下回合迴避機率。`, "text-purple-400");
                player.sp = Math.min(100, player.sp + 15);
            }
        }

        function executeAlliesTurn() {
            const b = gameState.battle;
            for (let i = 1; i < b.squad.length; i++) {
                const ally = b.squad[i];
                if (ally.hp <= 0) {
                    if (Math.random() < 0.8) {
                        ally.hp = 50;
                        addBattleLog(`🧪 <strong>${ally.name}</strong> 在生死關頭咬牙，喝下珍貴的回復藥，恢復 <span class="text-green-400 font-bold">50</span> HP 重拾武器，再次站了起來！`, "text-green-400 font-bold");
                    } else {
                        addBattleLog(`💀 <strong>${ally.name}</strong> 依舊處於倒地昏迷狀態，無法提供援助。`, "text-red-900/60");
                    }
                    continue;
                }

                if (ally.status.para > 0 || ally.status.sleep > 0 || ally.status.stun > 0) {
                    addBattleLog(`⏳ <strong>${ally.name}</strong> 目前正受到麻痺/沉睡/暈眩狀態牽制，無法自主戰鬥！`, "text-gray-500");
                    continue;
                }

                const wInfo = WEAPONS[ally.weaponKey];
                let targetPart = "body";
                const intactParts = PARTS.filter(p => !b.monsterParts[p].broken);
                if (intactParts.length > 0) {
                    targetPart = intactParts[Math.floor(Math.random() * intactParts.length)];
                }

                if (ally.sp >= 100) {
                    ally.sp = 0;
                    const dmg = wInfo.ult.dmg;
                    applyDamageToMonster(dmg, targetPart);
                    addBattleLog(`💥 <strong>${ally.name}</strong> 體內的 SP 極致燃燒！瘋狂施放大絕【<strong>${wInfo.ult.name}</strong>】，砸向魔物 ${PART_NAMES[targetPart]} 造成 <span class="text-yellow-400 font-black">${dmg}</span> 點巨量傷害！`, "text-yellow-400");
                    continue;
                }

                const playSkills = wInfo.skills;
                let finalSkill = playSkills[0];
                if (playSkills.length > 1 && Math.random() < 0.15) {
                    finalSkill = playSkills[Math.floor(Math.random() * playSkills.length)];
                }

                if (finalSkill.type && finalSkill.type.startsWith("attack")) {
                    const hitRoll = Math.random() * 100;
                    if (hitRoll <= (finalSkill.hit || 85)) {
                        const dmg = finalSkill.dmg || 22;
                        applyDamageToMonster(dmg, targetPart);
                        addBattleLog(`👥 <strong>${ally.name}</strong> 使用【${finalSkill.name}】策應，攻擊 ${PART_NAMES[targetPart]} 造成 <span class="text-red-300">${dmg}</span> 點傷害。`);
                        ally.sp = Math.min(100, ally.sp + 25);
                    } else {
                        addBattleLog(`💨 <strong>${ally.name}</strong> 嘗試進行斬擊配合，可惜被魔物靈巧滑過。`, "text-gray-500");
                    }
                } else if (finalSkill.type === "defend") {
                    ally.defending = true;
                    addBattleLog(`🛡️ <strong>${ally.name}</strong> 撐起武器盾防。`, "text-blue-500/80");
                } else if (finalSkill.type === "evade") {
                    ally.evading = true;
                    addBattleLog(`💨 <strong>${ally.name}</strong> 身輕如燕，開始游走。`, "text-purple-500/80");
                }
            }
        }

        function executeMonsterTurn() {
            const b = gameState.battle;
            if (b.monster.hp <= 0) return;

            if (b.monster.stunnedNextTurn) {
                b.monster.stunnedNextTurn = false;
                addBattleLog(`🌀 <strong>${b.monster.name}</strong> 陷入深度腦震盪，癱坐在地上完全無法發動反擊！`, "text-green-400 font-black");
                
                b.squad.forEach(h => {
                    if (h.status.sleep > 0) {
                        h.status.sleep = 0;
                        addBattleLog(`💡 <strong>${h.name}</strong> 因為四周巨大的打擊震動而被驚醒了！`, "text-indigo-400");
                    }
                });
                return;
            }

            const monsterMoves = {
                head: { name: "毀滅咬碎爆炎", dmg: 40, effect: "stun_or_burn", desc: "張開巨口，帶著極大火星向前瘋狂噬咬！" },
                body: { name: "巨體泰山壓頂", dmg: 35, effect: "heavy_slam", desc: "騰空而起，用無比沈重的巨軀朝獵人狠狠砸下！" },
                wings: { name: "雙翼旋風風刃", dmg: 25, effect: "evade_debuff", desc: "狂猛揮動雙翅，掀起致命的狂風風刀！" },
                tail: { name: "鐵尾旋風鋼鐵掃擊", dmg: 30, effect: "bleed", desc: "在半空極速旋轉，將布滿倒鉤的堅固尾鞭狂暴甩出！" },
                leftLeg: { name: "左裂地巨踏", dmg: 22, effect: "stun", desc: "發出怒吼，提起滿是鱗甲的左爪對著大地猛烈跺下！" },
                rightLeg: { name: "右神速撕裂爪擊", dmg: 22, effect: "bleed", desc: "前掌蓄力爆衝，用尖銳如鐮刀的右側鉤爪極速撕扯！" }
            };

            const selectPartPool = PARTS.filter(p => !b.monsterParts[p].broken);

            let finalAimPart = "body";
            let isExtremelyWeakened = false;

            if (selectPartPool.length > 0) {
                finalAimPart = selectPartPool[Math.floor(Math.random() * selectPartPool.length)];
            } else {
                isExtremelyWeakened = true;
            }

            const move = monsterMoves[finalAimPart];
            const aliveHunters = b.squad.filter(h => h.hp > 0);
            if (aliveHunters.length === 0) return;

            const targetHunter = aliveHunters[Math.floor(Math.random() * aliveHunters.length)];

            if (isExtremelyWeakened) {
                addBattleLog(`😭 <strong>${b.monster.name}</strong> 所有的部位都遭到了毀滅性破壞！它發出微弱悲鳴，無力地向前撞擊...`, "text-red-300");
                let dmg = 5;
                if (targetHunter.defending) dmg = Math.floor(dmg * 0.2);
                targetHunter.hp = Math.max(0, targetHunter.hp - dmg);
                addBattleLog(`💥 <strong>${targetHunter.name}</strong> 被無力撞了一下，受到 <span class="text-red-400 font-bold">${dmg}</span> 點微弱傷害。`);
                return;
            }

            addBattleLog(`🔥 <strong>${b.monster.name}</strong> 揮舞著 <span class="text-amber-400 font-bold">${PART_NAMES[finalAimPart]}</span>，使出必殺技：【<strong>${move.name}</strong>】！`, "text-red-400");
            addBattleLog(`💬 ${move.desc}`, "text-gray-500 italic text-[10px]");

            let finalDmg = move.dmg;

            if (targetHunter.evading) {
                const evadeSuccess = Math.random() < 0.65;
                if (evadeSuccess) {
                    addBattleLog(`💨 <strong>${targetHunter.name}</strong> 看穿了魔物攻勢，施展極限滑步，在千鈞一髮之際完全迴避了這次威脅！`, "text-purple-400 font-bold");
                    return;
                }
            }

            if (targetHunter.defending) {
                finalDmg = Math.floor(finalDmg * 0.3);
                addBattleLog(`🛡️ <strong>${targetHunter.name}</strong> 架起堅固防線，僅受到 <span class="text-blue-400 font-black">${finalDmg}</span> 點招架衝擊傷害！`, "text-blue-400");
            } else {
                if (targetHunter.isPlayer) {
                    const sum = getEnchantSum();
                    if (b.monster.statusEffect === "fire") finalDmg = Math.floor(finalDmg * (1 - sum.fireRes / 100));
                    if (b.monster.statusEffect === "ice") finalDmg = Math.floor(finalDmg * (1 - sum.iceRes / 100));
                    if (b.monster.statusEffect === "water") finalDmg = Math.floor(finalDmg * (1 - sum.waterRes / 100));
                }
                finalDmg = Math.max(1, finalDmg);
                targetHunter.hp = Math.max(0, targetHunter.hp - finalDmg);
                addBattleLog(`💥 <strong>${targetHunter.name}</strong> 避無可避，正面硬扛了重擊，身體劇烈搖晃並受到 <span class="text-red-500 font-black">${finalDmg}</span> 點致命傷害！`, "text-red-400");
            }

            if (targetHunter.hp > 0 && !targetHunter.defending) {
                applyStatusEffectToHunter(targetHunter, b.monster.statusEffect);
            }

            if (targetHunter.hp <= 0) {
                addBattleLog(`💀 <strong>${targetHunter.name}</strong> 體力徹底歸零，雙腿一軟，不支倒地了！`, "text-red-600 font-extrabold");
            }
        }

        function applyStatusEffectToHunter(hunter, effect) {
            if (hunter.isPlayer) {
                const sum = getEnchantSum();
                if (effect === "poison" && Math.random() * 100 < sum.poisonRes) { addBattleLog(`✨ 裝備防毒附魔發光！完美免除了劇毒威脅！`, "text-cyan-400"); return; }
                if (effect === "paralysis" && Math.random() * 100 < sum.paraRes) { addBattleLog(`✨ 裝備避雷附魔震動！完美抵抗了麻痺效果！`, "text-cyan-400"); return; }
                if (effect === "sleep" && Math.random() * 100 < sum.sleepRes) { addBattleLog(`✨ 裝備安神附魔溫熱！獵人打了個哈欠，完美免疫昏睡！`, "text-cyan-400"); return; }
            }

            if (effect === "fire") {
                hunter.status.poison = 3;
                addBattleLog(`🔥 <strong>${hunter.name}</strong> 衣服著火了！陷入持續灼燒狀態，連續 3 回合灼燒扣血。`, "text-orange-400");
            } else if (effect === "ice") {
                hunter.status.para = 1;
                addBattleLog(`❄️ <strong>${hunter.name}</strong> 被凍得發抖！渾身僵硬，下一回合無法行動。`, "text-blue-300");
            } else if (effect === "water") {
                hunter.status.para = 1;
                addBattleLog(`💧 <strong>${hunter.name}</strong> 被巨浪掀翻，眼睛進水，下一回合無法順利站立！`, "text-cyan-300");
            } else if (effect === "electric" || effect === "paralysis") {
                hunter.status.para = 2;
                addBattleLog(`⚡ <strong>${hunter.name}</strong> 被瘋狂的電流麻痺！全身陷入癱瘓，連續 2 回合動彈不得！`, "text-yellow-400 font-bold");
            } else if (effect === "poison") {
                hunter.status.poison = 3;
                addBattleLog(`🧪 <strong>${hunter.name}</strong> 傷口呈黑色！陷入中毒狀態，連續 3 回合扣血！`, "text-purple-400");
            } else if (effect === "sleep") {
                hunter.status.sleep = 1;
                addBattleLog(`💤 <strong>${hunter.name}</strong> 吸入了大量催眠孢子，陷入熟睡狀態，直到被下次攻擊打醒！`, "text-indigo-400");
            } else if (effect === "bleed") {
                hunter.status.bleed = 5;
                addBattleLog(`🩸 <strong>${hunter.name}</strong> 被利刃刮傷！陷入嚴重失血狀態，動作時將會持續大出血扣血！`, "text-red-500 font-bold");
            } else if (effect === "stun") {
                hunter.status.stun = 1;
                addBattleLog(`💫 <strong>${hunter.name}</strong> 陷入深度暈眩 1 回合！`, "text-amber-500");
            }
        }

        function executeStatusTicks() {
            const b = gameState.battle;
            b.squad.forEach(h => {
                if (h.hp <= 0) return;

                if (h.status.poison && h.status.poison > 0) {
                    h.hp = Math.max(1, h.hp - 10);
                    h.status.poison -= 1;
                    addBattleLog(`🧪 <strong>${h.name}</strong> 體內毒素蔓延，扣除了 <span class="text-purple-400 font-bold">10</span> 點體力！`, "text-purple-400/80");
                }

                if (h.status.bleed && h.status.bleed > 0) {
                    h.hp = Math.max(1, h.hp - 12);
                    h.status.bleed -= 1;
                    addBattleLog(`🩸 <strong>${h.name}</strong> 隨著動作傷口溢出血花，流失了 <span class="text-red-500 font-bold">12</span> 點體力！`, "text-red-500/80");
                }

                if (h.status.para && h.status.para > 0) h.status.para -= 1;
                if (h.status.stun && h.status.stun > 0) h.status.stun -= 1;
            });
        }

        function applyDamageToMonster(dmg, part) {
            const b = gameState.battle;
            if (b.monster.hp <= 0) return;

            b.monster.hp = Math.max(0, b.monster.hp - dmg);

            const partInfo = b.monsterParts[part];
            if (partInfo && !partInfo.broken) {
                partInfo.hp = Math.max(0, partInfo.hp - dmg);
                if (partInfo.hp <= 0) {
                    partInfo.broken = true;
                    addBattleLog(`💥 <strong>【部位破壞成功】！</strong> ${b.monster.name} 的 <span class="text-yellow-400 font-black">${partInfo.name}</span> 已經被徹底打爆碎裂！魔物將永遠無法施展對應必殺！`, "text-yellow-500 font-extrabold");
                    
                    b.squad.forEach(h => {
                        if (h.status.sleep > 0) {
                            h.status.sleep = 0;
                            addBattleLog(`💡 巨大的斷裂轟鳴聲，將 <strong>${h.name}</strong> 從睡夢中瞬間驚醒！`, "text-indigo-400");
                        }
                    });
                }
            }
        }

        function checkBattleEnd() {
            const b = gameState.battle;
            
            if (b.monster.hp <= 0) {
                b.active = false;
                
                let brokenCount = 0;
                PARTS.forEach(p => {
                    if (b.monsterParts[p].broken) brokenCount++;
                });

                const bonusReward = brokenCount * 2;
                const totalGained = b.monster.materialsReward + bonusReward;
                gameState.materials += totalGained;

                addBattleLog(`🎉🏆 <strong>========== 討伐成功 ==========</strong>`, "text-green-400 font-black text-center text-base mt-4");
                addBattleLog(`👑 恭喜你，在經過一番驚心動魄的對決後，成功的狩獵了恐怖巨獸 【<strong>${b.monster.name}</strong>】！`, "text-green-300 text-xs mb-2");
                addBattleLog(`🎁 <strong>素材結算：</strong>`, "text-amber-400 font-bold text-xs");
                addBattleLog(`- 魔物本體剝取素材: <span class="text-white">+${b.monster.materialsReward}</span>`, "text-gray-300 text-[11px]");
                addBattleLog(`- 完美擊破魔物 ${brokenCount} 個多餘部位，部位獎勵追加: <span class="text-white">+${bonusReward}</span>`, "text-gray-300 text-[11px]");
                addBattleLog(`🎉 共帶回了 <span class="text-amber-400 font-bold">+${totalGained}</span> 龍之素材！`, "text-amber-300 font-bold text-xs mt-2");

                showExitBattleButton(true);
                return true;
            }

            const allDead = b.squad.every(h => h.hp <= 0);
            if (allDead) {
                b.active = false;
                addBattleLog(`💀❌ <strong>========== 任務失敗 ==========</strong>`, "text-red-500 font-black text-center text-base mt-4");
                addBattleLog(`獵人小隊所有人皆已倒地。魔物拍動翅膀，昂首咆哮著揚長而去...`, "text-red-400 text-xs");
                showExitBattleButton(false);
                return true;
            }

            return false;
        }

        function showExitBattleButton(isSuccess) {
            const container = document.getElementById("action-commands-container");
            container.innerHTML = "";

            const backBtn = document.createElement("button");
            backBtn.className = "col-span-3 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-extrabold rounded-lg shadow-lg text-xs transition tracking-wider animate-bounce";
            backBtn.textContent = "返回集會所 (結算並強化防具)";
            backBtn.onclick = () => {
                lockControls(false);
                document.getElementById("battle-screen").classList.add("hidden");
                document.getElementById("hub-screen").classList.remove("hidden");
                renderHub();
            };
            container.appendChild(backBtn);
        }

        window.onload = function() {
            initDefaultEnchants();
            window.generateQuests();
            window.recruitSquad();
            renderHub();
        };
    </script>
</body>
</html>
