<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>元素之塔：創世紀</title>
    <style>
        :root {
            --bg: #0b0c10; --panel: #1f2833; --border: #45a29e; --text: #c5c6c7;
            --hp: #e74c3c; --mana: #3498db; --highlight: #66fcf1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; touch-action: none; }
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; position: relative; background: #111; }
        
        /* Top HUD */
        #hud { padding: 10px; background: rgba(0,0,0,0.85); z-index: 10; border-bottom: 2px solid var(--border); }
        .bar-container { width: 100%; height: 15px; background: #333; border-radius: 8px; overflow: hidden; margin-bottom: 5px; position: relative; border: 1px solid #555; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        .bar-text { position: absolute; top: 0; left: 0; width: 100%; text-align: center; font-size: 0.75rem; line-height: 15px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000; }
        #top-info { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; margin-top: 5px; color: var(--highlight); font-weight: bold; }
        #status-bar { display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 3px 5px; border-radius: 4px; flex-wrap: wrap; gap: 5px;}

        .btn-pause { background: #f39c12; color: #fff; border: none; border-radius: 4px; padding: 4px 12px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        .btn-pause:active { transform: scale(0.9); }
        .btn-pause.paused { background: #e74c3c; animation: pulse 1s infinite; }

        /* Canvas Area */
        #canvas-wrapper { flex: 1; position: relative; width: 100%; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; background: radial-gradient(circle at bottom, #222 0%, #050505 100%); cursor: pointer; }
        #tap-hint { position: absolute; top: 8%; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-size: 0.9rem; pointer-events: none; }
        #pause-overlay { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 2rem; color: #f39c12; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 10px #000; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 6; }

        /* Bottom UI */
        #ui-bottom { height: 40%; background: var(--panel); display: flex; flex-direction: column; border-top: 2px solid var(--border); z-index: 10; }
        #tabs { display: flex; border-bottom: 1px solid #444; }
        .tab-btn { flex: 1; padding: 12px 0; text-align: center; background: #111; border: none; color: var(--text); font-weight: bold; cursor: pointer; transition: 0.2s; border-right: 1px solid #333; font-size: 0.9rem; }
        .tab-btn.active { background: var(--panel); color: var(--highlight); border-bottom: 2px solid var(--highlight); }
        
        #panel-content { flex: 1; overflow-y: auto; padding: 10px; position: relative; }
        
        /* Lists & Items */
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #333; }
        .item-info { display: flex; flex-direction: column; }
        .item-title { font-weight: bold; font-size: 1rem; margin-bottom: 3px; }
        .item-desc { font-size: 0.75rem; color: #aaa; }
        
        .btn-action { background: var(--border); color: #000; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: transform 0.1s, opacity 0.2s; font-size: 0.9rem; }
        .btn-action:active { transform: scale(0.95); opacity: 0.8; }
        .btn-action:disabled { background: #444; color: #777; transform: scale(1); opacity: 1; cursor: not-allowed; }
        
        .elem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .elem-box { background: #000; border: 1px solid #333; border-radius: 5px; padding: 8px 5px; text-align: center; position: relative; }
        .elem-icon { font-size: 1.5rem; }
        .elem-amt { font-size: 0.9rem; font-weight: bold; margin-top: 5px; color: #fff; }
        .elem-rate { font-size: 0.7rem; color: #aaa; }

        /* Modals & Overlays */
        #modal, #game-over, #relic-modal, #epoch-modal { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: var(--panel); border: 2px solid var(--border); border-radius: 8px; width: 100%; max-width: 380px; padding: 15px; max-height: 80vh; overflow-y: auto; }
        .modal-header { font-size: 1.2rem; font-weight: bold; color: var(--highlight); margin-bottom: 15px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px;}
        .close-btn { background: #e74c3c; width: 100%; margin-top: 15px; color: #fff; padding: 12px; font-size: 1rem; }

        .relic-card { background: #111; border: 1px solid #f1c40f; border-radius: 6px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; text-align: left; }
        .relic-card:active { transform: scale(0.98); background: #222; }
        .relic-card-title { font-size: 1.1rem; color: #f1c40f; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 8px;}
        .relic-card-desc { font-size: 0.85rem; color: #ccc; line-height: 1.4; }

        .game-over-box { background: #111; border: 2px solid #e74c3c; border-radius: 10px; padding: 30px; text-align: center; width: 90%; max-width: 350px; }
        .game-over-box h1 { color: #e74c3c; margin-bottom: 10px; font-size: 2rem; }
        .game-over-box p { color: #aaa; font-size: 1rem; line-height: 1.6; margin-bottom: 20px; }

        .floating-text { position: absolute; font-weight: bold; font-size: 1.2rem; pointer-events: none; animation: floatUp 1s forwards; z-index: 50; text-shadow: 0 0 4px #000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
        .warning-text { color: #e74c3c; font-size: 0.8rem; font-weight: bold; margin-top: 5px; text-align: center; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

<div id="app">
    <div id="hud">
        <div class="bar-container">
            <div id="hp-bar" class="bar-fill" style="background: var(--hp); width: 100%;"></div>
            <div id="hp-text" class="bar-text">主塔核心: 1000 / 1000</div>
        </div>
        <div class="bar-container">
            <div id="stab-bar" class="bar-fill" style="background: #00b894; width: 100%;"></div>
            <div id="stab-text" class="bar-text">元素穩定度: 100% (平衡)</div>
        </div>
        <div class="bar-container" style="height: 10px; margin-top: -2px; margin-bottom: 5px; border-color: #6c5ce7;">
            <div id="imbalance-bar" class="bar-fill" style="background: #9b59b6; width: 0%;"></div>
            <div id="imbalance-text" class="bar-text" style="line-height:10px; font-size:0.65rem;">紀元演化度: 0%</div>
        </div>
        <div id="top-info">
            <span id="floor-text">塔: 1層 | 波次: 1</span>
            <button id="btn-pause" class="btn-pause" onclick="togglePause()">暫停 (佈陣)</button>
        </div>
        <div id="status-bar" style="display: none;">
            <span id="epoch-text" style="color:#a29bfe; font-weight:bold;"></span>
            <span id="will-text" style="color:#ff9f43; font-weight:bold;"></span>
            <span id="event-text" style="color:#e74c3c; font-weight:bold;"></span>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="tap-hint">👆 點擊此區域手動匯聚缺乏的元素</div>
        <div id="pause-overlay">時空凍結</div>
    </div>

    <div id="ui-bottom">
        <div id="tabs">
            <button class="tab-btn active" onclick="switchTab('extract')">萃取器</button>
            <button class="tab-btn" onclick="switchTab('genesis')">創世研究</button>
            <button class="tab-btn" id="tab-tower" onclick="switchTab('tower')">防禦塔</button>
            <button class="tab-btn" id="tab-file" onclick="switchTab('file')">檔案</button>
        </div>
        <div id="panel-content"></div>
    </div>

    <!-- Modals -->
    <div id="modal">
        <div class="modal-box">
            <div id="modal-title" class="modal-header">選單</div>
            <div id="modal-list"></div>
            <button class="btn-action close-btn" onclick="closeModal()">關閉視窗</button>
        </div>
    </div>

    <div id="relic-modal">
        <div class="modal-box">
            <div class="modal-header" style="color:#f1c40f;">✨ 遠古遺物現世 ✨</div>
            <p style="text-align:center; color:#aaa; font-size:0.85rem; margin-bottom:15px;">波次突破，選擇一項遺物以增強力量，但需承擔其代價。</p>
            <div id="relic-options"></div>
        </div>
    </div>

    <div id="epoch-modal">
        <div class="modal-box" style="border-color:#9b59b6;">
            <div class="modal-header" style="color:#9b59b6; font-size:1.5rem;" id="epoch-modal-title">新紀元降臨</div>
            <p id="epoch-modal-desc" style="text-align:center; color:#ccc; font-size:1rem; line-height: 1.6; margin-bottom:15px;"></p>
            <button class="btn-action close-btn" style="background:#9b59b6; color:#fff;" onclick="closeEpochModal()">適應新世界</button>
        </div>
    </div>

    <div id="game-over">
        <div class="game-over-box">
            <h1>守護失敗</h1>
            <h2 style="color:#fff; margin-bottom:15px;">主塔核心毀損</h2>
            <p id="final-stats"></p>
            <button class="btn-action" style="background:#f1c40f; color:#000; width:100%; font-size:1.1rem; padding:12px; margin-bottom:10px;" onclick="reviveGame()">✨ 時空回溯 (滿血復活)</button>
        </div>
    </div>
</div>

<script>
    // --- 數據驅動物件映射 ---
    const ELEMS = {
        'E': { name: '地', icon: '🪨', color: '#cd853f' }, 'W': { name: '水', icon: '💧', color: '#3498db' },
        'F': { name: '火', icon: '🔥', color: '#e74c3c' }, 'A': { name: '風', icon: '🌪', color: '#1abc9c' },
        'L': { name: '雷', icon: '⚡', color: '#f1c40f' }, 'I': { name: '冰', icon: '❄', color: '#9b59b6' },
        'P': { name: '毒', icon: '☠', color: '#2ecc71' }, 'S': { name: '光', icon: '✨', color: '#f5f6fa' },
        'D': { name: '闇', icon: '🌑', color: '#34495e' }
    };
    const ELEM_KEYS = Object.keys(ELEMS);

    const TOWER_DICT = {
        'E': { name: '岩石塔', type: 'basic', elem: 'E', dmg: 10, range: 100, cd: 60, cost: { E: 50 }, desc: '基礎單體' },
        'W': { name: '水炮塔', type: 'basic', elem: 'W', dmg: 8, range: 120, cd: 45, cost: { W: 50 }, desc: '較快射速' },
        'F': { name: '烈焰塔', type: 'basic', elem: 'F', dmg: 15, range: 90, cd: 70, cost: { F: 50 }, desc: '較高傷害' },
        'A': { name: '疾風塔', type: 'basic', elem: 'A', dmg: 5, range: 150, cd: 30, cost: { A: 50 }, desc: '極快射速' },
        'L': { name: '電擊塔', type: 'basic', elem: 'L', dmg: 20, range: 110, cd: 80, cost: { L: 50 }, desc: '高爆發' },
        'I': { name: '寒冰塔', type: 'basic', elem: 'I', dmg: 8, range: 100, cd: 60, effect: 'slow', cost: { I: 50 }, desc: '機率減速' },
        'P': { name: '劇毒塔', type: 'basic', elem: 'P', dmg: 5, range: 100, cd: 50, effect: 'poison', cost: { P: 50 }, desc: '持續傷害' },
        'S': { name: '聖光塔', type: 'basic', elem: 'S', dmg: 25, range: 130, cd: 60, cost: { S: 50 }, desc: '強大單體' },
        'D': { name: '暗影塔', type: 'basic', elem: 'D', dmg: 35, range: 100, cd: 90, cost: { D: 50 }, desc: '緩慢致命' },
        'FA': { name: '火龍捲塔', type: 'aoe', elem: 'FA', dmg: 12, range: 110, cd: 80, cost: { F: 200, A: 200 }, desc: '範圍爆破' },
        'WL': { name: '風暴電塔', type: 'chain', elem: 'WL', dmg: 18, range: 140, cd: 70, cost: { W: 200, L: 200 }, desc: '閃電鏈' },
        'EP': { name: '瘟疫方尖碑', type: 'aura', elem: 'EP', dmg: 5, range: 90, cd: 30, cost: { E: 200, P: 200 }, desc: '範圍光環扣血' },
        'IW': { name: '極寒冰柱', type: 'basic', elem: 'IW', dmg: 15, range: 120, cd: 60, effect: 'freeze', cost: { I: 200, W: 200 }, desc: '高機率凍結' },
        'SD': { name: '混沌核心', type: 'massive', elem: 'SD', dmg: 100, range: 160, cd: 150, cost: { S: 500, D: 500 }, desc: '毀滅單體' }
    };

    const RELIC_POOL = [
        { id: 'dmg_up', icon: '🗡️', name: '破壞核心', desc: '防禦塔傷害 +30%，但穩定度容忍降低' },
        { id: 'speed_up', icon: '⏱️', name: '時光齒輪', desc: '防禦塔攻速 +30%，但敵人跑速 +10%' },
        { id: 'tap_up', icon: '✋', name: '貪婪之手', desc: '手動收集量 x3，但敵人血量 +20%' },
        { id: 'stab_up', icon: '⚖️', name: '平衡天秤', desc: '元素容忍度 +50% (不易失衡)，但塔傷害 -10%' },
        { id: 'hp_up', icon: '💖', name: '生命結晶', desc: '主塔血量上限 +500，且立刻回滿' },
        { id: 'range_up', icon: '🔭', name: '鷹眼透鏡', desc: '所有防禦塔射程 +20%' }
    ];

    const EVENTS = [
        { id: 'volcano', name: '🌋 火山爆發', buff: ['F', 'FA'], debuff: ['W', 'I', 'IW'] },
        { id: 'winter', name: '❄️ 凜冬將至', buff: ['I', 'IW'], debuff: ['F', 'FA'] },
        { id: 'storm', name: '🌪️ 狂雷暴風', buff: ['A', 'L', 'WL'], debuff: ['E'] },
        { id: 'quake', name: '🪨 大地震顫', buff: ['E', 'EP'], debuff: ['A', 'L'] },
        { id: 'eclipse', name: '🌑 日蝕之暗', buff: ['D', 'SD'], debuff: ['S'] },
        { id: 'aurora', name: '✨ 極光閃耀', buff: ['S', 'SD'], debuff: ['D'] }
    ];

    const COUNTER_MAP = { 'F':'I', 'I':'A', 'A':'E', 'E':'L', 'L':'W', 'W':'F', 'S':'D', 'D':'S' };

    // --- 遊戲狀態與存檔系統 ---
    let state = {};
    let towerSlots = []; 

    function initGameData() {
        state = {
            floor: 1, hp: 1000, maxHp: 1000, reviveCount: 0,
            wave: 1, waveTimer: 0, spawnCount: 0, spawnTarget: 10, stability: 100,
            imbalance: 0, epoch: { count: 1, type: 'genesis', name: '創世初紀', desc: '萬物平靜，無特殊規則。' },
            resources: {}, extractors: {}, 
            unlockedElems: ['E'], blueprints: [], towers: [], 
            enemies: [], projectiles: [], particles: [], relics: [],
            activeWill: null, activeEvent: null,
            lastTick: 0, tab: 'extract', selectedSlotIndex: -1,
            isGameOver: false, isPaused: false
        };
        ELEM_KEYS.forEach(k => { state.resources[k] = 0; state.extractors[k] = 0; });
        state.resources['E'] = 50; state.extractors['E'] = 1; 
    }
    initGameData();

    function encodeSave() { return btoa(unescape(encodeURIComponent(JSON.stringify(state)))); }
    function decodeSave(str) { return JSON.parse(decodeURIComponent(escape(atob(str)))); }

    window.doLocalSave = function() {
        try { localStorage.setItem('elemental_tower_save', encodeSave()); alert('存檔成功！'); } 
        catch(e) { alert('存檔失敗。'); }
    };
    window.doLocalLoad = function() {
        let data = localStorage.getItem('elemental_tower_save');
        if(data) importSaveData(data); else alert('找不到本地存檔！');
    };
    
    // UI 匯出 / 匯入 / 確認 視窗
    window.exportSave = function() { 
        let html = `<div class="list-item" style="flex-direction:column; align-items:stretch;"><span style="margin-bottom:10px;">請複製以下繼承碼：</span><textarea id="export-code" style="width:100%; height:100px; background:#000; color:#fff; border:1px solid #444; border-radius:4px; padding:5px; resize:none;">${encodeSave()}</textarea><button class="btn-action" style="margin-top:10px; background:#f1c40f; color:#000;" onclick="copyCode()">📋 複製代碼</button></div>`;
        document.getElementById('modal-title').innerText = '匯出繼承碼'; document.getElementById('modal-list').innerHTML = html; document.getElementById('modal').style.display = 'flex';
    };
    window.copyCode = function() {
        let t = document.getElementById('export-code'); t.select(); document.execCommand('copy'); alert('已複製繼承碼！');
    };
    window.importSave = function() {
        let html = `<div class="list-item" style="flex-direction:column; align-items:stretch;"><span style="margin-bottom:10px;">請貼上繼承碼：</span><textarea id="import-code" style="width:100%; height:100px; background:#000; color:#fff; border:1px solid #444; border-radius:4px; padding:5px; resize:none;"></textarea><button class="btn-action" style="margin-top:10px; background:#e67e22; color:#fff;" onclick="doImportCode()">📥 確定匯入</button></div>`;
        document.getElementById('modal-title').innerText = '匯入繼承碼'; document.getElementById('modal-list').innerHTML = html; document.getElementById('modal').style.display = 'flex';
    };
    window.doImportCode = function() {
        let code = document.getElementById('import-code').value.trim();
        if(code) { importSaveData(code); closeModal(); }
    };
    window.confirmHardReset = function() {
        let html = `<div class="list-item" style="flex-direction:column; align-items:stretch; border-color:#e74c3c;"><span style="margin-bottom:10px; color:#e74c3c; font-weight:bold; text-align:center;">警告：這將徹底消除所有進度且無法復原！</span><button class="btn-action" style="margin-top:10px; background:#e74c3c; color:#fff; padding:15px;" onclick="doHardReset()">⚠️ 我確定要重置世界</button></div>`;
        document.getElementById('modal-title').innerText = '世界重置確認'; document.getElementById('modal-list').innerHTML = html; document.getElementById('modal').style.display = 'flex';
    };

    function importSaveData(code) {
        try {
            let parsed = decodeSave(code);
            if(!parsed || !parsed.floor) throw new Error('Invalid');
            state = parsed; state.enemies = []; state.projectiles = []; state.particles = []; state.isPaused = true;
            state.reviveCount = state.reviveCount || 0; // 舊檔防呆
            resize(); switchTab('extract'); updateHUD(); alert('讀取成功！世界已載入並自動暫停。');
        } catch(e) { alert('繼承碼無效或損毀！'); }
    }
    window.doHardReset = function() { resetGame(); };

    window.togglePause = function(forcePause) {
        if(state.isGameOver) return;
        state.isPaused = forcePause !== undefined ? forcePause : !state.isPaused;
        const btn = document.getElementById('btn-pause'); const overlay = document.getElementById('pause-overlay');
        if(state.isPaused) { btn.innerText = '▶ 恢復運作'; btn.classList.add('paused'); overlay.style.opacity = '1'; } 
        else { btn.innerText = '暫停 (佈陣)'; btn.classList.remove('paused'); overlay.style.opacity = '0'; }
    };

    window.reviveGame = function() {
        state.hp = state.maxHp; state.isGameOver = false; state.enemies = []; state.reviveCount++;
        document.getElementById('game-over').style.display = 'none';
        if(state.isPaused) togglePause(false); updateHUD(); renderTabContent();
    };

    window.resetGame = function() {
        document.getElementById('game-over').style.display = 'none'; closeModal(); initGameData(); resize(); switchTab('extract'); togglePause(false);
    };

    window.closeEpochModal = function() { document.getElementById('epoch-modal').style.display = 'none'; togglePause(false); };
    window.closeModal = function() { document.getElementById('modal').style.display = 'none'; };

    // --- Canvas 與佈局設定 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let cw, ch;

    function resize() {
        const rect = document.getElementById('canvas-wrapper').getBoundingClientRect();
        canvas.width = rect.width || window.innerWidth; canvas.height = rect.height || (window.innerHeight * 0.45);
        cw = canvas.width; ch = canvas.height;

        const centerX = cw / 2, centerY = ch - 70;
        const radius = Math.min(cw * 0.4, 150), slotRadius = Math.max(15, Math.min(cw * 0.065, 24)); 
        
        towerSlots = [];
        const startAngle = Math.PI + (Math.PI * 0.1), angleStep = (Math.PI * 0.8) / 5;        
        for(let i=0; i<6; i++) {
            towerSlots.push({ x: centerX + Math.cos(startAngle + angleStep * i) * radius, y: centerY + Math.sin(startAngle + angleStep * i) * radius * 0.6, r: slotRadius, tower: null });
        }
        state.towers.forEach(t => {
            if(t.slotIndex !== undefined && towerSlots[t.slotIndex]) { towerSlots[t.slotIndex].tower = t; t.x = towerSlots[t.slotIndex].x; t.y = towerSlots[t.slotIndex].y; }
        });
    }
    window.addEventListener('resize', resize);

    // --- 畫布點擊邏輯集中處理 ---
    document.getElementById('canvas-wrapper').addEventListener('pointerdown', (e) => {
        if(state.isGameOver) return;
        const rect = canvas.getBoundingClientRect(); const x = e.clientX - rect.left, y = e.clientY - rect.top;

        let clickedTower = false;
        for(let i=0; i<towerSlots.length; i++) {
            if(Math.hypot(x - towerSlots[i].x, y - towerSlots[i].y) < towerSlots[i].r * 1.5) { 
                clickedTower = true;
                if(!towerSlots[i].tower) openBuildModal(i); else { state.selectedSlotIndex = i; switchTab('tower'); }
                return;
            }
        }

        if(!clickedTower && y < ch * 0.6 && !state.isPaused) {
            if(state.unlockedElems.length > 0) {
                let lowestElem = state.unlockedElems.reduce((a, b) => state.resources[a] < state.resources[b] ? a : b);
                let gain = Math.max(1, state.extractors[lowestElem] * 2);
                if(state.relics.includes('tap_up')) gain *= 3;
                state.resources[lowestElem] += gain;
                
                createFloatingText(x, y, `+${gain} ${ELEMS[lowestElem].icon}`, ELEMS[lowestElem].color);
                createParticles(x, y, ELEMS[lowestElem].color, 3);
                updateStability(); updateDynamicUI(); 
            }
        }
    });

    // --- 邏輯更新 ---
    function updateStability() {
        if(state.unlockedElems.length <= 1) { state.stability = 100; state.activeWill = null; return; }
        let amts = state.unlockedElems.map(k => state.resources[k]);
        let max = Math.max(...amts), min = Math.min(...amts), maxElem = state.unlockedElems.find(k => state.resources[k] === max);
        
        let tolerance = 100 + state.floor * 100; 
        if(state.relics.includes('stab_up')) tolerance *= 1.5; if(state.relics.includes('dmg_up')) tolerance *= 0.8;

        let diff = max - min;
        if (diff <= tolerance) { state.stability = 100; state.activeWill = null; } 
        else {
            let drop = ((diff - tolerance) / tolerance) * 50; state.stability = Math.max(0, 100 - drop);
            state.activeWill = state.stability < 20 ? maxElem : null;
        }
    }

    function advanceEpoch() {
        state.epoch.count++; state.imbalance = 0;
        if (state.epoch.count % 10 === 0) {
            state.epoch.type = 'CHAOS'; state.epoch.name = '混沌紀元'; state.epoch.desc = '規則崩壞：所有防禦塔傷害與敵人強度劇烈隨機波動！';
        } else {
            let maxElem = state.unlockedElems.reduce((a, b) => state.resources[a] > state.resources[b] ? a : b);
            state.epoch.type = maxElem; state.epoch.name = `${ELEMS[maxElem].name}之紀元`;
            let debuffElem = COUNTER_MAP[maxElem];
            state.epoch.desc = `世界演化：${ELEMS[maxElem].icon}${ELEMS[maxElem].name}系防禦塔傷害+100%且攻速提升。${debuffElem ? ELEMS[debuffElem].icon+ELEMS[debuffElem].name+'系傷害減半。' : ''}`;
        }
        document.getElementById('epoch-modal-title').innerText = `第 ${state.epoch.count} 紀元：${state.epoch.name}`;
        document.getElementById('epoch-modal-desc').innerText = state.epoch.desc;
        document.getElementById('epoch-modal').style.display = 'flex'; togglePause(true);
    }

    function spawnEnemy() {
        let isRampage = state.stability < 50, hpMulti = state.stability < 20 ? 4 : (isRampage ? 2.5 : 1);
        if(state.relics.includes('tap_up')) hpMulti *= 1.2;
        let spd = (0.3 + state.wave * 0.02) * (isRampage ? 1.5 : 1); if(state.relics.includes('speed_up')) spd *= 1.1;

        if(state.epoch.type === 'CHAOS') { hpMulti *= (Math.random() * 2 + 0.5); spd *= (Math.random() * 0.5 + 0.8); }

        let hp = (20 + state.wave * 15) * hpMulti, eType = state.unlockedElems[Math.floor(Math.random() * state.unlockedElems.length)];
        let x = Math.random() < 0.5 ? Math.random() * cw : (Math.random() > 0.5 ? 0 : cw), y = x === 0 || x === cw ? Math.random() * (ch/2) : 0; 
        
        // 隨機大小
        let size = Math.random() * 0.6 + 0.7; // 0.7 ~ 1.3 倍
        state.enemies.push({ x: x, y: y, hp: hp, maxHp: hp, elem: eType, speed: spd, poisoned: 0, frozen: 0, sizeScale: size });
        
        state.spawnCount++;
        if(state.spawnCount >= state.spawnTarget) { state.wave++; state.spawnCount = 0; state.spawnTarget = 10 + state.wave * 2; checkWaveEvents(); }
    }

    function checkWaveEvents() {
        if (state.activeEvent) { state.activeEvent.duration--; if (state.activeEvent.duration <= 0) state.activeEvent = null; }
        if (state.wave % 3 === 0) {
            let evt = EVENTS[Math.floor(Math.random() * EVENTS.length)]; state.activeEvent = { id: evt.id, duration: 2 };
            createFloatingText(cw/2, ch/2, evt.name, '#e74c3c');
        }
        if (state.wave % 5 === 0) { togglePause(true); showRelicModal(); }
    }

    function showRelicModal() {
        let pool = [...RELIC_POOL].sort(() => 0.5 - Math.random()).slice(0, 3), html = '';
        pool.forEach(r => { html += `<div class="relic-card" onclick="chooseRelic('${r.id}')"><div class="relic-card-title">${r.icon} ${r.name}</div><div class="relic-card-desc">${r.desc}</div></div>`; });
        document.getElementById('relic-options').innerHTML = html; document.getElementById('relic-modal').style.display = 'flex';
    }

    window.chooseRelic = function(id) {
        state.relics.push(id); if(id === 'hp_up') { state.maxHp += 500; state.hp = state.maxHp; }
        document.getElementById('relic-modal').style.display = 'none'; togglePause(false); renderTabContent(); updateHUD();
    };

    function updateLogic(dt) {
        let spawnInterval = Math.max(500, (state.stability < 50 ? 1000 : 2500) - state.wave * 50);
        state.waveTimer += dt; if(state.waveTimer > spawnInterval) { state.waveTimer = 0; spawnEnemy(); }

        ELEM_KEYS.forEach(k => { if(state.extractors[k] > 0) state.resources[k] += (state.extractors[k] * dt / 1000); });
        updateStability();
        
        if(state.stability < 80) { state.imbalance += ((80 - state.stability) / 80) * (dt / 1000) * 8; if(state.imbalance >= 100) advanceEpoch(); } 
        else state.imbalance = Math.max(0, state.imbalance - (dt / 1000) * 2);

        const basePos = { x: cw/2, y: ch-30 };

        if (state.activeWill) {
            if (['F', 'L', 'D'].includes(state.activeWill)) state.enemies.forEach(e => e.hp -= 3 * (dt/1000));
            else if (['W', 'S', 'E'].includes(state.activeWill)) state.hp = Math.min(state.maxHp, state.hp + 5 * (dt/1000));
        }
        if (state.epoch.type !== 'genesis' && state.epoch.type !== 'CHAOS') {
            if (['F', 'L', 'D'].includes(state.epoch.type)) state.enemies.forEach(e => e.hp -= (2 + state.epoch.count) * (dt/1000));
            else if (['W', 'S', 'E'].includes(state.epoch.type)) state.hp = Math.min(state.maxHp, state.hp + (3 + state.epoch.count) * (dt/1000));
        }

        for(let i = state.enemies.length - 1; i >= 0; i--) {
            let e = state.enemies[i];
            if(e.poisoned > 0) { e.hp -= 2 * (dt/1000); e.poisoned -= dt; }
            let spdMult = 1; if(e.frozen > 0) { spdMult = 0.4; e.frozen -= dt; }
            if(state.activeWill && ['A', 'I', 'P'].includes(state.activeWill)) spdMult *= 0.5;

            let dx = basePos.x - e.x, dy = basePos.y - e.y, dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 30) {
                state.hp -= (5 + state.wave); createFloatingText(basePos.x, basePos.y - 50, `-${5+state.wave}`, '#e74c3c'); state.enemies.splice(i, 1);
                if(state.hp <= 0) {
                    state.hp = 0; state.isGameOver = true;
                    document.getElementById('final-stats').innerHTML = `最高抵達：${state.floor} 層<br>生存波次：${state.wave} 波`;
                    document.getElementById('game-over').style.display = 'flex'; updateHUD(); return; 
                }
                continue;
            } else { e.x += (dx/dist) * e.speed * spdMult * (dt/(1000/60)); e.y += (dy/dist) * e.speed * spdMult * (dt/(1000/60)); }
            if(e.hp <= 0) { createParticles(e.x, e.y, ELEMS[e.elem].color); state.enemies.splice(i, 1); }
        }

        state.towers.forEach(t => {
            t.cooldown -= dt;
            if(t.cooldown <= 0) {
                let tData = TOWER_DICT[t.type], mDmg = 1, mCd = 1, mRange = 1;
                if (state.relics.includes('dmg_up')) mDmg *= 1.3; if (state.relics.includes('stab_up')) mDmg *= 0.9;
                if (state.relics.includes('speed_up')) mCd *= 0.7; if (state.relics.includes('range_up')) mRange *= 1.2;
                if (state.activeEvent) {
                    let evt = EVENTS.find(e => e.id === state.activeEvent.id);
                    if (evt.buff.includes(t.type)) mDmg *= 1.5; if (evt.debuff.includes(t.type)) mDmg *= 0.5;
                }
                if (state.activeWill && tData.elem.includes(state.activeWill)) { mDmg *= 1.5; mCd *= 0.8; }
                if (state.epoch.type === 'CHAOS') { mDmg *= (Math.random() * 1.5 + 0.5); mCd *= (Math.random() * 1.5 + 0.5); } 
                else if (state.epoch.type !== 'genesis') {
                    if (tData.elem.includes(state.epoch.type)) { mDmg *= 2.0; mCd *= 0.7; } else if (tData.elem.includes(COUNTER_MAP[state.epoch.type])) mDmg *= 0.5;
                }
                let finalRange = tData.range * mRange, finalDmg = tData.dmg * mDmg;

                if(tData.type === 'aura') {
                    let hit = false; state.enemies.forEach(e => { if(Math.hypot(e.x - t.x, e.y - t.y) < finalRange) { e.hp -= finalDmg; e.poisoned = 2000; hit = true; } });
                    if(hit) { t.cooldown = tData.cd * mCd * (1000/60); createParticles(t.x, t.y, '#2ecc71', 5); }
                } else {
                    let target = null, minDist = finalRange; state.enemies.forEach(e => { let d = Math.hypot(e.x - t.x, e.y - t.y); if(d < minDist) { minDist = d; target = e; } });
                    if(target) { t.cooldown = tData.cd * mCd * (1000/60); state.projectiles.push({ x: t.x, y: t.y - 10, tx: target.x, ty: target.y, target: target, speed: 5, towerType: t.type, dmgMod: mDmg }); }
                }
            }
        });

        for(let i = state.projectiles.length - 1; i >= 0; i--) {
            let p = state.projectiles[i]; let dx = p.tx - p.x, dy = p.ty - p.y, dist = Math.hypot(dx, dy);
            if(dist < p.speed) {
                let tData = TOWER_DICT[p.towerType], finalDmg = tData.dmg * p.dmgMod;
                if(p.target && state.enemies.includes(p.target)) {
                    p.target.hp -= finalDmg;
                    if(tData.effect === 'slow') p.target.frozen = 2000;
                    if(tData.effect === 'freeze' && Math.random()<0.5) p.target.frozen = 3000;
                    if(tData.effect === 'poison') p.target.poisoned = 3000;
                    if(tData.type === 'aoe') { state.enemies.forEach(e => { if(e !== p.target && Math.hypot(e.x - p.target.x, e.y - p.target.y) < 60) e.hp -= finalDmg * 0.5; }); createParticles(p.tx, p.ty, '#e67e22', 10); }
                    if(tData.type === 'chain') {
                        let next = state.enemies.find(e => e !== p.target && Math.hypot(e.x - p.target.x, e.y - p.target.y) < 80);
                        if(next) { next.hp -= finalDmg * 0.7; ctx.beginPath(); ctx.moveTo(p.tx, p.ty); ctx.lineTo(next.x, next.y); ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2; ctx.stroke(); }
                    }
                }
                createParticles(p.x, p.y, ELEMS[tData.elem[0]].color, 3); state.projectiles.splice(i, 1);
            } else { p.x += (dx/dist) * p.speed; p.y += (dy/dist) * p.speed; if(p.target && state.enemies.includes(p.target)) { p.tx = p.target.x; p.ty = p.target.y; } }
        }

        for(let i = state.particles.length - 1; i >= 0; i--) { let p = state.particles[i]; p.x += p.vx; p.y += p.vy; p.life -= dt; if(p.life <= 0) state.particles.splice(i, 1); }
    }

    // --- 繪製 ---
    function draw() {
        ctx.clearRect(0, 0, cw, ch);
        const towerW = 50, basePos = { x: cw/2, y: ch-20 };
        
        let visualFloor = Math.min(state.floor, 10);
        ctx.fillStyle = '#111'; ctx.fillRect(basePos.x - towerW/2, basePos.y - visualFloor * 20, towerW, visualFloor * 20);
        for(let i=0; i<visualFloor; i++) {
            let eKey = state.unlockedElems[i % 9]; 
            ctx.fillStyle = ELEMS[eKey].color; ctx.globalAlpha = 0.8; ctx.fillRect(basePos.x - towerW/2 + 2, basePos.y - (i+1)*20 + 2, towerW-4, 16);
            ctx.globalAlpha = 1.0; ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.fillText(ELEMS[eKey].icon, basePos.x, basePos.y - i*20 - 5);
        }

        towerSlots.forEach((slot, idx) => {
            ctx.beginPath(); ctx.arc(slot.x, slot.y, slot.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.strokeStyle = state.selectedSlotIndex === idx ? varColor('--highlight') : '#555'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            if(slot.tower) {
                let tData = TOWER_DICT[slot.tower.type];
                ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(slot.x, slot.y, slot.r * 0.8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = ELEMS[tData.elem[0]].color; ctx.beginPath(); ctx.arc(slot.x, slot.y, slot.r * 0.6, 0, Math.PI*2); ctx.fill();
                ctx.font = `${Math.floor(slot.r * 0.9)}px Arial`; ctx.fillStyle = '#fff'; ctx.fillText(ELEMS[tData.elem[0]].icon, slot.x, slot.y + (slot.r * 0.35));
                if(state.selectedSlotIndex === idx) {
                    let mRange = state.relics.includes('range_up') ? 1.2 : 1;
                    ctx.beginPath(); ctx.arc(slot.x, slot.y, tData.range * mRange, 0, Math.PI*2); ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.stroke();
                }
            } else { ctx.font = `${Math.floor(slot.r * 0.8)}px Arial`; ctx.fillStyle = '#888'; ctx.fillText('+', slot.x, slot.y + (slot.r * 0.3)); }
        });

        state.enemies.forEach(e => {
            let r = 8 * e.sizeScale;
            ctx.fillStyle = ELEMS[e.elem].color; ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI*2); ctx.fill();
            ctx.font = `${12 * e.sizeScale}px Arial`; ctx.fillText(ELEMS[e.elem].icon, e.x, e.y + r/2);
            ctx.fillStyle = '#333'; ctx.fillRect(e.x-10, e.y-r-6, 20, 3);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(e.x-10, e.y-r-6, 20 * (e.hp/e.maxHp), 3);
            if(e.frozen > 0) { ctx.strokeStyle = '#3498db'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, r+2, 0, Math.PI*2); ctx.stroke(); }
        });

        state.projectiles.forEach(p => { let c = ELEMS[TOWER_DICT[p.towerType].elem[0]].color; ctx.fillStyle = c; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 10; ctx.shadowColor = c; ctx.fill(); ctx.shadowBlur = 0; });
        state.particles.forEach(p => { ctx.fillStyle = p.c; ctx.globalAlpha = p.life / 500; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill(); }); ctx.globalAlpha = 1.0;
        if(state.stability < 30) { ctx.fillStyle = 'rgba(231, 76, 60, 0.1)'; ctx.fillRect(0,0,cw,ch); }
    }

    let uiTimer = 0;
    function gameLoop(time) {
        if (!time) time = performance.now(); if (!state.lastTick) state.lastTick = time;
        let dt = time - state.lastTick; state.lastTick = time; if(dt > 100) dt = 100; if(dt < 0 || isNaN(dt)) dt = 0;

        if(!state.isGameOver && !state.isPaused) updateLogic(dt); draw();
        uiTimer += dt; if(uiTimer > 100) { uiTimer = 0; updateHUD(); updateDynamicUI(); }
        requestAnimationFrame(gameLoop);
    }

    // --- UI 互動處理 ---
    function updateHUD() {
        document.getElementById('hp-bar').style.width = `${Math.max(0, (state.hp/state.maxHp)*100)}%`; document.getElementById('hp-text').innerText = `主塔核心: ${Math.floor(state.hp)} / ${state.maxHp}`;
        let sColor = state.stability > 70 ? '#00b894' : (state.stability > 30 ? '#f39c12' : '#e74c3c');
        document.getElementById('stab-bar').style.width = `${state.stability}%`; document.getElementById('stab-bar').style.background = sColor;
        document.getElementById('stab-text').innerText = `元素穩定度: ${Math.floor(state.stability)}% (${state.stability > 70 ? '平穩' : (state.stability > 30 ? '波動' : '危險！暴走')})`;
        document.getElementById('imbalance-bar').style.width = `${Math.min(100, state.imbalance)}%`; document.getElementById('imbalance-text').innerText = `紀元演化進度: ${Math.floor(state.imbalance)}%`;
        document.getElementById('floor-text').innerText = `塔: ${state.floor}層 | 波次: ${state.wave}`;
        
        let epochStr = state.epoch.count > 1 ? `🌍 第${state.epoch.count}紀元: ${state.epoch.name} ` : '';
        let willStr = state.activeWill ? `⚠️ ${ELEMS[state.activeWill].icon}${ELEMS[state.activeWill].name}之意志覺醒` : '';
        let evtStr = '';
        if (state.activeEvent) {
            let evt = EVENTS.find(e => e.id === state.activeEvent.id);
            evtStr = `${evt.name} (▲${evt.buff.map(k => ELEMS[k[0]].icon).join('')} ▼${evt.debuff.map(k => ELEMS[k[0]].icon).join('')})`;
        }
        document.getElementById('epoch-text').innerText = epochStr; document.getElementById('will-text').innerText = willStr; document.getElementById('event-text').innerText = evtStr;
        document.getElementById('status-bar').style.display = (epochStr || willStr || evtStr) ? 'flex' : 'none';
    }

    function updateDynamicUI() {
        if (state.tab === 'extract') { state.unlockedElems.forEach(k => { let el = document.getElementById(`res-amt-${k}`); if (el) el.innerText = Math.floor(state.resources[k]); }); }
        document.querySelectorAll('.cost-btn').forEach(btn => { let costStr = btn.getAttribute('data-cost'); if (costStr) btn.disabled = !canAfford(JSON.parse(costStr)); });
    }

    function switchTab(tabId) {
        state.tab = tabId; document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        let activeBtn = document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`); if(activeBtn) activeBtn.classList.add('active');
        if(tabId !== 'tower') state.selectedSlotIndex = -1; renderTabContent(); updateDynamicUI();
    }

    function getCostText(cObj) { return Object.keys(cObj).map(k => `${ELEMS[k].icon}${cObj[k]}`).join(' '); }
    function canAfford(cObj) { for(let k in cObj) { if(state.resources[k] < cObj[k]) return false; } return true; }
    function payCost(cObj) { for(let k in cObj) state.resources[k] -= cObj[k]; }

    function renderTabContent() {
        if(state.isGameOver) return;
        const panel = document.getElementById('panel-content'); let html = '';

        if(state.tab === 'extract') {
            html += `<div class="elem-grid">`; state.unlockedElems.forEach(k => { html += `<div class="elem-box"><div class="elem-icon">${ELEMS[k].icon}</div><div class="elem-amt" id="res-amt-${k}">${Math.floor(state.resources[k])}</div><div class="elem-rate">+${state.extractors[k]}/s</div></div>`; }); html += `</div>`;
            if(state.stability < 50) html += `<div class="warning-text">警告：元素差距過大，請盡速消耗溢出元素！</div>`;
            html += `<hr style="border-color:#333; margin:10px 0;">`;
            state.unlockedElems.forEach(k => { let cost = Math.floor(10 * Math.pow(1.5, state.extractors[k])); let cObj = {}; cObj[k] = cost; html += `<div class="list-item"><div class="item-info"><span class="item-title">升級 ${ELEMS[k].name} 萃取器 (Lv.${state.extractors[k]})</span><span class="item-desc">產量 +1/s</span></div><button class="btn-action cost-btn" data-cost='${JSON.stringify(cObj)}' onclick="buyExtractor('${k}', ${cost})">${ELEMS[k].icon}${cost}</button></div>`; });
        } else if (state.tab === 'genesis') {
            let nElem = ELEMS[ELEM_KEYS[state.floor % 9]], cAmt = 100 * Math.pow(1.5, state.floor - 1), cObj = {}; 
            let reqElems = state.floor < 9 ? state.unlockedElems : ELEM_KEYS; reqElems.forEach(k => cObj[k] = Math.floor(cAmt));
            html += `<div class="list-item" style="border-color:var(--highlight);"><div class="item-info"><span class="item-title">建造第 ${state.floor+1} 層 (${nElem.icon}${nElem.name})</span></div><button class="btn-action cost-btn" data-cost='${JSON.stringify(cObj)}' onclick="buildNextFloor()">建造 (${getCostText(cObj)})</button></div>`;
            
            // 統計遺物並顯示
            if(state.relics.length > 0) {
                let counts = {}; state.relics.forEach(r => counts[r] = (counts[r]||0)+1);
                let rHtml = Object.keys(counts).map(rId => `${RELIC_POOL.find(rp => rp.id === rId).icon}x${counts[rId]}`).join('  ');
                html += `<div style="text-align:center; font-size:0.85rem; color:#aaa; margin:10px 0;">已獲遺物: ${rHtml}</div>`;
            }
            html += `<div style="text-align:center; font-size:0.85rem; color:#e74c3c; margin:5px 0;">時空回溯次數: ${state.reviveCount}</div>`;

            html += `<h3 style="margin:10px 0 5px 0; font-size:0.9rem;">合成藍圖研究</h3>`;
            ['FA', 'WL', 'EP', 'IW', 'SD'].forEach(key => {
                let tData = TOWER_DICT[key], reqFloor = Math.max(ELEM_KEYS.indexOf(key[0])+1, ELEM_KEYS.indexOf(key[1])+1);
                if(state.floor >= reqFloor && !state.blueprints.includes(key)) { let cObj = {}; cObj[key[0]] = 200; cObj[key[1]] = 200; html += `<div class="list-item"><div class="item-info"><span class="item-title">${tData.name}</span><span class="item-desc">${tData.desc}</span></div><button class="btn-action cost-btn" data-cost='${JSON.stringify(cObj)}' onclick="researchBlueprint('${key}')">研究 (${getCostText(cObj)})</button></div>`; } 
                else if (state.blueprints.includes(key)) html += `<div class="list-item"><span style="color:#aaa;">已解鎖: ${tData.name}</span></div>`;
            });
        } else if (state.tab === 'tower') {
            if(state.selectedSlotIndex === -1) html += `<div style="text-align:center; margin-top:20px; color:#aaa;">點擊畫面上方的「圓形槽位」來建造或管理。</div>`; 
            else {
                let slot = towerSlots[state.selectedSlotIndex];
                if(slot.tower) {
                    let tData = TOWER_DICT[slot.tower.type], upCost = {}; for(let k in tData.cost) upCost[k] = tData.cost[k] * Math.pow(2, slot.tower.level || 1);
                    html += `<div style="text-align:center; margin-bottom:15px;"><h3>${ELEMS[tData.elem[0]].icon} ${tData.name} Lv.${slot.tower.level||1}</h3><p style="font-size:0.8rem; color:#aaa;">基礎傷害: ${Math.floor(tData.dmg)} | 射程: ${tData.range}</p></div><div class="list-item"><span class="item-title">升級塔 (傷害+50%)</span><button class="btn-action cost-btn" data-cost='${JSON.stringify(upCost)}' onclick="upgradeTower()">${getCostText(upCost)}</button></div><button class="btn-action" style="width:100%; background:#e74c3c; margin-top:10px; padding: 12px; color:#fff;" onclick="sellTower()">拆除回收 (更換新塔)</button>`;
                } else html += `<div style="text-align:center; color:#aaa; margin-top:20px;">此槽位為空，請點擊畫面槽位打開建造選單。</div>`;
            }
        } else if (state.tab === 'file') {
            html += `<h3 style="margin:10px 0 15px 0; font-size:1rem; text-align:center; color:#f1c40f;">檔案與時空管理</h3>`;
            html += `<div class="elem-grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button class="btn-action" style="background:#3498db; color:#fff; padding:15px;" onclick="doLocalSave()">💾 本地存檔</button>
                        <button class="btn-action" style="background:#2ecc71; color:#fff; padding:15px;" onclick="doLocalLoad()">📂 本地讀檔</button>
                        <button class="btn-action" style="background:#f1c40f; color:#000; padding:15px;" onclick="exportSave()">📤 匯出繼承碼</button>
                        <button class="btn-action" style="background:#e67e22; color:#fff; padding:15px;" onclick="importSave()">📥 匯入繼承碼</button>
                     </div>`;
            html += `<hr style="border-color:#333; margin:20px 0;">`;
            html += `<button class="btn-action" style="width:100%; background:#e74c3c; color:#fff; padding:15px;" onclick="confirmHardReset()">⚠️ 世界徹底重置 (清除所有進度)</button>`;
        }
        panel.innerHTML = html; updateDynamicUI(); 
    }

    // 事件
    window.buyExtractor = function(k, c) { if(state.resources[k] >= c) { state.resources[k] -= c; state.extractors[k]++; renderTabContent(); } };
    window.buildNextFloor = function() {
        let reqElems = state.floor <= 9 ? state.unlockedElems : ELEM_KEYS;
        let cObj = {}; reqElems.forEach(k => cObj[k] = Math.floor(100 * Math.pow(1.5, state.floor - 1)));
        if(canAfford(cObj)) { 
            payCost(cObj); state.floor++; state.maxHp += 500; state.hp = state.maxHp; 
            let nextElemKey = ELEM_KEYS[(state.floor - 1) % 9];
            if (!state.unlockedElems.includes(nextElemKey)) state.unlockedElems.push(nextElemKey); 
            state.extractors[nextElemKey] = (state.extractors[nextElemKey] || 0) + 1; 
            createFloatingText(cw/2, ch/2, `解鎖第 ${state.floor} 層 (${ELEMS[nextElemKey].name})`, '#f1c40f'); renderTabContent(); 
        }
    };
    window.researchBlueprint = function(key) { let cObj = {}; cObj[key[0]] = 200; cObj[key[1]] = 200; if(canAfford(cObj)) { payCost(cObj); state.blueprints.push(key); renderTabContent(); } };
    window.upgradeTower = function() {
        let slot = towerSlots[state.selectedSlotIndex], tData = TOWER_DICT[slot.tower.type], upCost = {};
        for(let k in tData.cost) upCost[k] = tData.cost[k] * Math.pow(2, slot.tower.level || 1);
        if(canAfford(upCost)) { payCost(upCost); slot.tower.level = (slot.tower.level || 1) + 1; slot.tower.dmg *= 1.5; createParticles(slot.x, slot.y, '#f1c40f', 15); renderTabContent(); }
    };
    window.sellTower = function() {
        let idx = state.selectedSlotIndex, slot = towerSlots[idx], tData = TOWER_DICT[slot.tower.type];
        for(let k in tData.cost) state.resources[k] += tData.cost[k] * 0.5;
        state.towers = state.towers.filter(t => t !== slot.tower); slot.tower = null; openBuildModal(idx);
    };

    function openBuildModal(idx) {
        state.selectedSlotIndex = idx; switchTab('tower'); let slot = towerSlots[idx]; if(slot.tower) return; let html = '';
        state.unlockedElems.forEach(k => { let t = TOWER_DICT[k]; html += `<div class="list-item"><div class="item-info"><span class="item-title">${ELEMS[k].icon} ${t.name}</span></div><button class="btn-action cost-btn" data-cost='${JSON.stringify(t.cost)}' onclick="buildTower('${k}', ${idx})">建 (${getCostText(t.cost)})</button></div>`; });
        state.blueprints.forEach(k => { let t = TOWER_DICT[k]; html += `<div class="list-item" style="border-color:var(--highlight);"><div class="item-info"><span class="item-title">${t.name}</span></div><button class="btn-action cost-btn" data-cost='${JSON.stringify(t.cost)}' onclick="buildTower('${k}', ${idx})">建 (${getCostText(t.cost)})</button></div>`; });
        document.getElementById('modal-list').innerHTML = html; document.getElementById('modal').style.display = 'flex'; updateDynamicUI(); 
    }
    window.buildTower = function(type, idx) {
        let tData = TOWER_DICT[type];
        if(canAfford(tData.cost)) { payCost(tData.cost); let tObj = { type: type, x: towerSlots[idx].x, y: towerSlots[idx].y, dmg: tData.dmg, range: tData.range, cooldown: 0, level: 1, slotIndex: idx }; state.towers.push(tObj); towerSlots[idx].tower = tObj; closeModal(); createParticles(tObj.x, tObj.y, '#fff', 20); renderTabContent(); }
    };

    // 特效
    function createFloatingText(x, y, text, color) {
        const div = document.createElement('div'); div.className = 'floating-text'; div.innerText = text; div.style.color = color; div.style.left = (x - 10) + 'px'; div.style.top = (y - 20) + 'px';
        document.getElementById('canvas-wrapper').appendChild(div); setTimeout(() => div.remove(), 1000);
    }
    function createParticles(x, y, color, count=5) { for(let i=0; i<count; i++) state.particles.push({ x: x, y: y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 500, c: color }); }
    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    window.onload = () => { resize(); renderTabContent(); requestAnimationFrame(gameLoop); };
</script>
</body>
</html>
