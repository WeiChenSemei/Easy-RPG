<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無限領域：天賦覺醒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0f172a; color: white; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; user-select: none; }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .glass-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; }
        #skillTreeModal, #mainMenu, #classSelectionScreen { z-index: 50; }
        #treeScrollWrapper { cursor: grab; }
        #treeScrollWrapper:active { cursor: grabbing; }
        #treeContainer { position: relative; width: 1500px; height: 1500px; }
        .skill-node { position: absolute; width: 56px; height: 56px; transform: translate(-50%, -50%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); transition: all 0.2s ease; text-align: center; line-height: 1.1; }
        .node-locked { background: #334155; color: #ffffff; border: 2px solid #1e293b; }
        .node-available { background: #eab308; color: #1c1917; border: 2px solid #fef08a; animation: pulse 2s infinite; }
        .node-unlocked { background: #3b82f6; color: white; border: 2px solid #93c5fd; box-shadow: 0 0 15px #3b82f6; }
        .node-class-c { background: #eab308; color: #000; border-color: #fef08a; } 
        .node-class-m { background: #8b5cf6; border-color: #c4b5fd; }
        .node-class-r { background: #10b981; border-color: #6ee7b7; }
        .node-class-b { background: #ef4444; border-color: #fca5a5; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 15px #eab308; } 100% { transform: translate(-50%, -50%) scale(1); } }
        #joystickArea { position: absolute; width: 100%; height: 100%; pointer-events: auto; z-index: 5; }
        #hpBarContainer { width: 100%; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin-top: 5px;}
        #hpBar { width: 100%; height: 100%; background: linear-gradient(90deg, #ef4444, #f87171); transition: width 0.2s; }
        #xpBarContainer { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin-top: 5px;}
        #xpBar { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.2s; }
        #bossHpBarContainer { display: none; width: 80%; height: 16px; background: #334155; border-radius: 8px; overflow: hidden; margin: 10px auto; border: 2px solid #ef4444;}
        #bossHpBar { width: 100%; height: 100%; background: linear-gradient(90deg, #b91c1c, #ef4444); transition: width 0.2s; }
        #joystickBase { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3); transform: translate(-50%, -50%); display: none; pointer-events: none; }
        #joystickStick { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.6); top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="joystickArea"></div>
    <div id="joystickBase"><div id="joystickStick"></div></div>

    <div id="uiLayer" class="p-4 flex flex-col justify-between hidden z-10">
        <div class="flex justify-between items-start gap-4 interactive">
            <div class="w-2/3">
                <div class="text-lg font-bold text-yellow-400 drop-shadow-md">Lv <span id="uiLevel">1</span> (<span id="uiSp">0</span> 點)</div>
                <div id="hpBarContainer"><div id="hpBar"></div></div>
                <div id="xpBarContainer"><div id="xpBar"></div></div>
                <div id="buffStatus" class="mt-2 text-sm font-bold text-white drop-shadow-md flex gap-2"></div>
            </div>
            <div class="flex flex-col items-end">
                <div id="uiStageContainer" class="text-xl font-bold text-white drop-shadow-md">關卡 <span id="uiStage">1</span></div>
                <div id="uiKillsContainer" class="text-sm text-gray-300 drop-shadow-md">擊殺: <span id="uiKills">0</span> / <span id="uiBossReq">50</span></div>
                <button id="btnOpenTree" class="mt-2 px-3 py-1 bg-yellow-600 hover:bg-yellow-500 rounded text-sm font-bold shadow-lg transition-transform transform active:scale-95">天賦樹</button>
                <button id="btnBackToMenu" class="mt-2 px-3 py-1 bg-slate-600 hover:bg-slate-500 rounded text-sm font-bold shadow-lg transition-transform transform active:scale-95">回主選單</button>
            </div>
        </div>
        <div id="bossHpBarContainer"><div id="bossHpBar"></div></div>
    </div>

    <div id="mainMenu" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 interactive">
        <h1 class="text-5xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 drop-shadow-lg text-center">無限領域<br><span class="text-3xl text-yellow-400">天賦覺醒</span></h1>
        <p class="text-gray-400 mb-10 text-center text-sm">支援WASD、方向鍵與觸控操控</p>
        <div class="w-full max-w-sm flex flex-col gap-4">
            <button id="btnContinue" class="w-full py-4 bg-green-600 hover:bg-green-500 rounded-xl text-xl font-bold text-white shadow-lg transform active:scale-95 hidden">繼續旅程</button>
            <button id="btnNewGame" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl text-xl font-bold text-white shadow-lg transform active:scale-95">全新開局</button>
            <button id="btnArena" class="w-full py-4 bg-purple-600 hover:bg-purple-500 rounded-xl text-xl font-bold text-white shadow-lg transform active:scale-95">競技場決鬥</button>
            <div class="flex gap-4 mt-4">
                <button id="btnExport" class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-md font-bold text-white shadow-lg transform active:scale-95">匯出存檔</button>
                <button id="btnImport" class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-md font-bold text-white shadow-lg transform active:scale-95">匯入存檔</button>
            </div>
        </div>
    </div>

    <div id="classSelectionScreen" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-4 interactive hidden">
        <h2 class="text-3xl font-bold text-white mb-4">選擇職業起點</h2>
        <div class="flex flex-col h-[80vh] w-full max-w-md gap-4">
            <div class="glass-panel flex-1 flex flex-row items-center p-4 cursor-pointer hover:bg-slate-800 transition transform hover:scale-[1.02] active:scale-95" onclick="Engine.startGame('warrior')">
                <div class="text-6xl mr-4">🛡️</div>
                <div>
                    <h2 class="text-2xl font-bold text-red-400">戰士</h2>
                    <p class="text-xs text-gray-300 mt-1">中等跑速、<span class="text-red-400">射程極短</span>、<span class="text-green-400">血量最多</span>。<br>主：力量 (生命/爆傷)</p>
                </div>
            </div>
            <div class="glass-panel flex-1 flex flex-row items-center p-4 cursor-pointer hover:bg-slate-800 transition transform hover:scale-[1.02] active:scale-95" onclick="Engine.startGame('rogue')">
                <div class="text-6xl mr-4">🥷</div>
                <div>
                    <h2 class="text-2xl font-bold text-emerald-400">盜賊</h2>
                    <p class="text-xs text-gray-300 mt-1"><span class="text-green-400">最快跑速</span>、射程中等、血量中等。<br>主：敏捷 (爆擊/閃避)</p>
                </div>
            </div>
            <div class="glass-panel flex-1 flex flex-row items-center p-4 cursor-pointer hover:bg-slate-800 transition transform hover:scale-[1.02] active:scale-95" onclick="Engine.startGame('mage')">
                <div class="text-6xl mr-4">🧙‍♂️</div>
                <div>
                    <h2 class="text-2xl font-bold text-purple-400">法師</h2>
                    <p class="text-xs text-gray-300 mt-1"><span class="text-red-400">最慢跑速</span>、<span class="text-green-400">最遠射程</span>、<span class="text-red-400">血量最少</span>。<br>主：智力 (法傷/範圍)</p>
                </div>
            </div>
        </div>
        <button id="btnCancelClass" class="mt-4 px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-lg shadow-lg active:scale-95">返回主選單</button>
    </div>

    <div id="skillTreeModal" class="absolute inset-0 bg-slate-900/95 interactive flex flex-col hidden z-50">
        <div class="p-4 flex justify-between items-center border-b border-slate-700 bg-slate-800 z-30">
            <div>
                <h2 class="text-xl font-bold text-yellow-400">天賦樹 (可拖曳與方向鍵移動)</h2>
                <p class="text-sm text-gray-300">剩餘點數：<span id="treeSp" class="font-bold text-white">0</span></p>
            </div>
            <div class="flex gap-2">
                <button id="btnResetTalents" class="px-3 py-2 bg-red-700 hover:bg-red-600 rounded text-sm font-bold text-white active:scale-95 transition-transform">重置</button>
                <button id="btnCloseTree" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded font-bold text-white active:scale-95 transition-transform">關閉</button>
            </div>
        </div>
        <div class="flex-1 overflow-hidden relative bg-slate-900 select-none z-10" id="treeScrollWrapper" style="overflow: hidden;">
            <div id="treeContainer">
                <svg width="100%" height="100%" class="absolute inset-0 pointer-events-none opacity-20">
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/></pattern>
                    <rect width="100%" height="100%" fill="url(#grid)" />
                </svg>
                <svg id="treeLines" class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 0;"></svg>
            </div>
        </div>
        <div id="nodeInfoPanel" class="absolute bottom-0 left-0 w-full p-4 glass-panel transform translate-y-full transition-transform duration-300 flex justify-between items-center shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-40">
            <div><h3 id="niTitle" class="font-bold text-xl text-white">節點名稱</h3><p id="niDesc" class="text-md text-gray-300 mt-1 whitespace-pre-line">節點描述...</p></div>
            <button id="btnLearnNode" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold hidden shadow-lg flex-shrink-0 ml-2">學習</button>
        </div>
    </div>

    <div id="gameOverScreen" class="absolute inset-0 bg-red-900/95 z-50 flex flex-col items-center justify-center p-4 interactive hidden">
        <h1 id="goTitle" class="text-5xl font-bold mb-4 text-white drop-shadow-lg">你陣亡了</h1>
        <p id="goDesc1" class="text-xl text-gray-200 mb-2">保留等級與天賦點數</p>
        <p id="goDesc2" class="text-md text-gray-300 mb-8">將退回較弱的關卡重生...</p>
        <div class="flex gap-4">
            <button id="btnRespawn" onclick="Engine.respawn()" class="px-8 py-3 bg-white text-red-900 text-xl font-bold rounded-full shadow-lg hover:bg-gray-200 transition transform hover:scale-105">重新甦醒</button>
            <button id="btnBackToMenu2" class="px-8 py-3 bg-slate-700 text-white text-xl font-bold rounded-full shadow-lg hover:bg-slate-600 transition transform hover:scale-105">回主畫面</button>
        </div>
    </div>

    <div id="customModal" class="absolute inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 hidden interactive">
        <div class="glass-panel p-6 w-full max-w-md flex flex-col gap-4">
            <h3 id="modalTitle" class="text-2xl font-bold text-white">標題</h3>
            <p id="modalMsg" class="text-gray-300 text-sm break-words"></p>
            <textarea id="modalInput" class="hidden w-full h-32 bg-slate-800 text-white p-3 rounded-lg border border-slate-600 focus:outline-none focus:border-blue-500 font-mono" style="font-size: 16px !important; touch-action: auto; user-select: text;" placeholder="貼上代碼..."></textarea>
            <div class="flex justify-end gap-3 mt-2">
                <button id="modalBtnCancel" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded text-white font-bold hidden active:scale-95 transition-transform">取消</button>
                <button id="modalBtnConfirm" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-white font-bold active:scale-95 transition-transform">確認</button>
            </div>
        </div>
    </div>

const Behaviors = {
    'chase': (e, target, dist, dt, px, py) => {
        let s = e.speed * e.speedMod * dt; if(dist > 0) { px += e.dirX*s; py += e.dirY*s; }
        return {x: px, y: py};
    },
    'ranged': (e, target, dist, dt, px, py) => {
        let s = e.speed * e.speedMod * dt; e.stateTimer -= dt;
        if(dist < 200) s = 0; 
        if(e.stateTimer <= 0 && dist < 250) { Engine.addProjectile(new Projectile(e.x, e.y, e.dirX, e.dirY, 200, e.dmg, 1, 'enemy_magic', '#d1d5db', 'enemy')); e.stateTimer = 2.0; }
        if(dist > 0 && s > 0) { px += e.dirX*s; py += e.dirY*s; }
        return {x: px, y: py};
    },
    'dash': (e, target, dist, dt, px, py) => {
        let s = e.speed * e.speedMod * dt; e.stateTimer -= dt;
        if(e.stateTimer <= 0) e.stateTimer = 3.0;
        if(e.stateTimer > 2.5) s = e.speed * 4 * dt;
        if(dist > 0) { px += e.dirX*s; py += e.dirY*s; }
        return {x: px, y: py};
    },
    'boss': (e, target, dist, dt, px, py) => {
        let s = e.speed * e.speedMod * dt; e.stateTimer -= dt;
        if (e.stateTimer <= 0) {
            let r = Math.random();
            if (r < 0.33) { Engine.spawnEnemyDirect('fast', e.x, e.y); e.stateTimer = 3.0; }
            else if (r < 0.66) { let p=new Projectile(e.x, e.y, e.dirX, e.dirY, 250, e.dmg, 2, 'enemy_magic', '#f97316', 'enemy'); p.radius=12; Engine.addProjectile(p); e.stateTimer = 2.5; }
            else { s = e.speed * 3 * dt; e.stateTimer = 2.0; }
        }
        if(dist > 0) { px += e.dirX*s; py += e.dirY*s; }
        return {x: px, y: py};
    }
};

class Entity { constructor(x=0, y=0) { this.x = x; this.y = y; this.isDead = false; } die() { this.isDead = true; } update(dt) {} draw(ctx) {} }

class BaseCharacter extends Entity {
    constructor(x, y) {
        super(x, y); this.radius = 18; this.dirX = 1; this.dirY = 0;
        this.mods = { str:0, agi:0, int:0, moveSpeed:0, maxHp:0, atkSpeed:0, aoe:0, critRate:0, critDmg:0, dodge:0, hpRegen:0, passive_lifesteal:false, passive_multishot:false, passive_poison:false, passive_multicast:false, passive_pierce:false, passive_mana_shield:false, passive_resonance:false, passive_counter:false, passive_ranged_def:false, passive_toxic_bloom:false, passive_shadow_step:false, passive_ricochet:false, passive_tremor:false, passive_mana_cascade:false };
        this.buffs = { frenzy: 0, slow: 0, shadow: 0 }; this.skills = []; this.skillLevels = {};
        this.faction = 'player'; this.regenTimer = 1.0; this.shieldCooldown = 0; this.hasShield = false;
    }
    getStr() { return this.baseStr + this.mods.str; } getAgi() { return this.baseAgi + this.mods.agi; } getInt() { return this.baseInt + this.mods.int; }
    getMaxHp() { return this.baseMaxHp + this.mods.maxHp + (this.getStr()*5); }
    getMoveSpeed() { let s = this.baseMoveSpeed*(1+this.mods.moveSpeed); if(this.buffs.slow>0) s*=0.5; if(this.buffs.shadow>0) s*=1.5; return s; }
    getCritRate() { return Math.min(0.7, this.baseCritRate+this.mods.critRate+(this.getAgi()*0.005)+(this.buffs.shadow>0?0.3:0)); }
    getCritDmg() { return this.baseCritDmg + this.mods.critDmg + (this.getStr()*0.01); }
    getDodgeRate() { return Math.min(0.7, this.mods.dodge + (this.getAgi()*0.005)); }
    getMeleeDmg() { return 10 + this.getStr()*2; } getAssassinationDmg() { return 8 + this.getAgi()*2.5; } getMagicDmg() { return 12 + this.getInt()*2.2; }
    getSpeedMult() { let m = 1 + this.mods.atkSpeed; if(this.buffs.frenzy>0) m+=1.0; return m; } 
    getAoeMult() { return this.baseRange + this.mods.aoe + (this.getInt()*0.01); }
    heal(amt) { if(this.hp<this.getMaxHp()){ this.hp=Math.min(this.getMaxHp(), this.hp+amt); } }
    takeDamage(amt) {
        if(Math.random() < this.getDodgeRate()) { Engine.addFloatingText('閃避!', this.x, this.y-20, '#10b981'); if(this.mods.passive_shadow_step) this.buffs.shadow=2.0; return; }
        if(this.hasShield) { this.hasShield=false; this.shieldCooldown=10.0; Engine.addFloatingText('護盾吸收!', this.x, this.y-20, '#60a5fa'); Engine.createRingExplosion(this.x, this.y, '#60a5fa', 40); return; }
        this.hp-=amt; Engine.addParticle(this.x, this.y, '#ef4444', 5); if(this.hp<=0 && !this.isDead){ this.hp=0; this.die(); }
    }
    updateSkills(dt) {
        if(this.mods.hpRegen>0) { this.regenTimer-=dt; if(this.regenTimer<=0){ this.heal(this.mods.hpRegen); this.regenTimer=1.0; } }
        if(this.mods.passive_mana_shield && !this.hasShield) { this.shieldCooldown-=dt; if(this.shieldCooldown<=0) this.hasShield=true; }
        for(let k in this.buffs) { if(this.buffs[k]>0) this.buffs[k]-=dt; }
        this.skills.forEach(s => { s.timer -= dt*this.getSpeedMult(); if(s.timer<=0) { s.execute(this); s.timer=s.cooldown; } if(s.updateQueue) s.updateQueue(dt, this); });
    }
    handleObstacles(px, py) {
        for(let obs of Engine.obstacles) {
            let dx=px-obs.x, dy=py-obs.y, dist=Math.hypot(dx,dy);
            if(dist < this.radius+obs.radius) {
                if(dist===0) { dx=1; dist=1; }
                let overlap=this.radius+obs.radius-dist; px+=(dx/dist)*overlap; py+=(dy/dist)*overlap;
            }
        }
        if(Engine.isArena) { let d=Math.hypot(px,py); if(d>800-this.radius) { px=(px/d)*(800-this.radius); py=(py/d)*(800-this.radius); } }
        this.x=px; this.y=py;
    }
}

        this.baseRange=1.0; this.baseCritRate=0.05; this.baseCritDmg=1.5;
        this.playerClass=playerClass; this.applyClassStart();

    applyClassStart() {
        let stNode='';
        if(this.playerClass==='mage') { stNode='m_start'; this.emoji='🧙‍♂️'; this.baseMoveSpeed=2.0; this.baseMaxHp=50; this.baseRange=1.5; this.baseInt=15; this.baseStr=3; this.baseAgi=3; }
        else if(this.playerClass==='rogue') { stNode='r_start'; this.emoji='🥷'; this.baseMoveSpeed=4.5; this.baseMaxHp=90; this.baseRange=1.0; this.baseAgi=15; this.baseStr=5; this.baseInt=3; }
        else if(this.playerClass==='warrior') { stNode='b_start'; this.emoji='🛡️'; this.baseMoveSpeed=3.0; this.baseMaxHp=150; this.baseRange=1.0; this.baseStr=15; this.baseAgi=4; this.baseInt=2; }
        if(!PlayerState.unlockedNodes[stNode]) PlayerState.unlockedNodes[stNode]=1;
        this.recalculateStats(); this.hp=this.getMaxHp();
    }
    recalculateStats() {
        for(let k in this.mods){ if(typeof this.mods[k]==='boolean') this.mods[k]=false; else this.mods[k]=0; }
        this.skillLevels={}; this.skills=[];
        for(let id in PlayerState.unlockedNodes) {
            let lvl = PlayerState.unlockedNodes[id], eff = DB.SKILL_TREE[id].effects;
            for(let k in eff) {
                if(k==='skills') eff[k].forEach(s => { 
                    this.skillLevels[s]=(this.skillLevels[s]||0)+lvl;
                    if(!this.skills.find(x=>x.id===s)){ let def = SkillRegistry[s]; if (def) this.skills.push({ ...def, id: s }); }
                });
                else if(typeof eff[k]==='boolean') this.mods[k]=true; else this.mods[k]+=eff[k];
            }
        }
        if(this.hp>this.getMaxHp()) this.hp=this.getMaxHp(); UI.update();
    }
    update(dt) {
        let px = this.x, py = this.y, mDx = 0, mDy = 0;
        let kDx = (Engine.keys['d'] || Engine.keys['arrowright'] ? 1 : 0) - (Engine.keys['a'] || Engine.keys['arrowleft'] ? 1 : 0);
        let kDy = (Engine.keys['s'] || Engine.keys['arrowdown'] ? 1 : 0) - (Engine.keys['w'] || Engine.keys['arrowup'] ? 1 : 0);
        if(Engine.joystick.active) { mDx = Engine.joystick.dx; mDy = Engine.joystick.dy; }
        else if(kDx!==0 || kDy!==0) { let d=Math.hypot(kDx,kDy); mDx=kDx/d; mDy=kDy/d; }
        
        if(mDx!==0 || mDy!==0) { let s = this.getMoveSpeed()*dt*60; px+=mDx*s; py+=mDy*s; this.dirX=mDx; this.dirY=mDy; }
        this.handleObstacles(px, py); this.updateSkills(dt);
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y);
        if(this.buffs.frenzy>0){ ctx.beginPath(); ctx.arc(0,0,this.radius+10,0,Math.PI*2); ctx.strokeStyle='rgba(239,68,68,0.5)'; ctx.lineWidth=4; ctx.stroke(); }
        if(this.buffs.slow>0){ ctx.beginPath(); ctx.arc(0,0,this.radius+10,0,Math.PI*2); ctx.strokeStyle='rgba(139,92,246,0.5)'; ctx.lineWidth=4; ctx.stroke(); }
        if(this.hasShield){ ctx.beginPath(); ctx.arc(0,0,this.radius+8,0,Math.PI*2); ctx.strokeStyle='rgba(96,165,250,0.8)'; ctx.lineWidth=3; ctx.stroke(); }
        ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0,15,this.radius,this.radius*0.4,0,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha = (this.buffs.shadow > 0) ? 0.5 : 1.0; ctx.fillStyle = '#fff'; ctx.font='32px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
        if(this.dirX<0) ctx.scale(-1,1); ctx.fillText(this.emoji,0,0); ctx.restore();
    }
    gainXp(amt) { if(Engine.isArena)return; this.xp+=amt; while(this.xp>=this.reqXp){ this.level++; this.sp++; this.reqXp=Math.floor(20+this.level*10+Math.pow(this.level,1.6)*5); this.hp=this.getMaxHp(); Engine.addFloatingText('Lv Up!',this.x,this.y-40,'#eab308'); Engine.createRingExplosion(this.x,this.y,'#eab308'); } UI.update(); UI.buildTree(); }
    die() { 
        super.die(); 
        document.getElementById('uiLayer').classList.add('hidden'); 
        let go = document.getElementById('gameOverScreen');
        if (Engine.isArena) {
            document.getElementById('goTitle').innerText = '競技場敗北...';
            document.getElementById('goDesc1').innerText = '技不如人，再接再厲';
            document.getElementById('goDesc2').innerText = ''; 
            document.getElementById('btnRespawn').classList.add('hidden');
        } else {
            document.getElementById('goTitle').innerText = '你陣亡了';
            document.getElementById('goDesc1').innerText = '保留等級與天賦點數';
            document.getElementById('goDesc2').innerText = '將退回較弱的關卡重生...'; 
            document.getElementById('btnRespawn').classList.remove('hidden');
        }
        go.classList.remove('hidden'); 
        Engine.isGameRunning = false; 
    }
}

class Mercenary extends BaseCharacter {
    constructor(emoji) {
        super(Engine.player.x, Engine.player.y); this.faction = 'player'; this.emoji = emoji; this.radius = 15;
        this.baseMaxHp = 100 + Engine.gameState.stage * 50; this.hp = this.baseMaxHp;
        this.baseMoveSpeed = 3.5; this.baseRange = 1.0;
        this.baseInt = 15 + Engine.gameState.stage*5; this.baseStr = 15 + Engine.gameState.stage*5; this.baseAgi = 15 + Engine.gameState.stage*5;
        this.state = 'following'; this.leaveTimer = 0;
        let possibleSkills = ['magic_missile', 'fireball', 'throwing_knife', 'heavy_strike', 'chain_lightning', 'boomerang_blade'];
        let sid = possibleSkills[Math.floor(Math.random() * possibleSkills.length)];
        this.skills.push({ ...SkillRegistry[sid], id: sid, timer: 0 });
        this.skillLevels[sid] = 1 + Math.floor(Engine.gameState.stage / 2);
        this.orbitAngle = Math.random() * Math.PI * 2;
    }
    update(dt) {
        if(this.state === 'leaving') {
            this.leaveTimer -= dt;
            if(this.leaveTimer <= 0) this.isDead = true;
            return;
        }
        let target = Engine.getClosestTarget(this.x, this.y, 'player', 500);
        let destX, destY;
        if(target) {
            let dx = target.x - this.x, dy = target.y - this.y, dist = Math.hypot(dx, dy);
            if(dist > 200) { destX = target.x; destY = target.y; }
            else if(dist < 150) { destX = this.x - dx; destY = this.y - dy; }
            else { this.orbitAngle += dt; destX = target.x + Math.cos(this.orbitAngle)*160; destY = target.y + Math.sin(this.orbitAngle)*160; }
            if(Math.hypot(Engine.player.x - this.x, Engine.player.y - this.y) > 350) { destX = Engine.player.x; destY = Engine.player.y; }
        } else {
            this.orbitAngle += dt; destX = Engine.player.x + Math.cos(this.orbitAngle)*80; destY = Engine.player.y + Math.sin(this.orbitAngle)*80;
        }
        let px = this.x, py = this.y, dx = destX - this.x, dy = destY - this.y, dist = Math.hypot(dx, dy);
        if(dist > 5) {
            let speed = this.getMoveSpeed() * dt * 60; let md = Math.min(dist, speed);
            px += (dx/dist)*md; py += (dy/dist)*md; this.dirX = dx/dist; this.dirY = dy/dist;
        }
        this.handleObstacles(px, py); this.updateSkills(dt);
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y);
        if(this.state === 'leaving') ctx.globalAlpha = Math.max(0, this.leaveTimer / 10);
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 15, this.radius, this.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; if(this.dirX < 0) ctx.scale(-1, 1);
        ctx.fillText(this.emoji, 0, 0); ctx.restore();
        if(this.state !== 'leaving') {
            ctx.fillStyle = '#333'; ctx.fillRect(this.x - 15, this.y - 25, 30, 4);
            ctx.fillStyle = '#22c55e'; ctx.fillRect(this.x - 15, this.y - 25, 30 * (this.hp/this.getMaxHp()), 4);
        }
    }
}

class Projectile extends Entity {
    constructor(x,y,dx,dy,speed,dmg,aoe,type,color,faction) { super(x,y); this.dx=dx; this.dy=dy; this.speed=speed; this.dmg=dmg; this.aoeMult=aoe; this.type=type; this.color=color; this.faction=faction; this.radius=5*aoe; this.life=2.0; this.hitSet=new Set(); this.pierce=0; this.bounces=0; }
    
    tryRicochet() {
        if (this.faction === 'player' && Engine.player.mods.passive_ricochet && this.bounces < 1 && !this.boomerang && this.type.includes('assassination')) {
            this.bounces++;
            let nextT = Engine.getClosestTarget(this.x, this.y, this.faction, 400, this.hitSet);
            if (nextT) {
                let ndx = nextT.x - this.x, ndy = nextT.y - this.y, ndist = Math.hypot(ndx, ndy) || 1;
                this.dx = ndx/ndist; this.dy = ndy/ndist;
                this.life += 1.0; 
                return true;
            }
        }
        return false;
    }

    update(dt) {
        if (this.boomerang && this.life < this.returnTime && this.owner && !this.owner.isDead) {
            let bx = this.owner.x - this.x, by = this.owner.y - this.y, bdist = Math.hypot(bx, by);
            if(bdist < 20) { this.isDead = true; return; }
            this.dx = bx/bdist; this.dy = by/bdist; this.hitSet.clear();
        }
        this.x+=this.dx*this.speed*dt; this.y+=this.dy*this.speed*dt; this.life-=dt; if(this.life<=0) { this.isDead=true; return; }
        
        if (this.pierce < 999 && !this.isDead) {
            for (let obs of Engine.obstacles) {
                if (Math.hypot(obs.x - this.x, obs.y - this.y) < this.radius + obs.radius) {
                    if (this.type === 'magic_explosive') {
                        Engine.createRingExplosion(this.x, this.y, '#ef4444', 50 * this.aoeMult);
                        Engine.getEnemiesInRadius({x:this.x, y:this.y, faction:this.faction}, 50 * this.aoeMult).forEach(e2 => Engine.applyDamage(e2, this.dmg*0.5, 'magic', Engine.player));
                        this.isDead = true; break;
                    } else { 
                        Engine.addParticle(this.x, this.y, '#9ca3af', 3); 
                        if (this.tryRicochet()) { break; } else { this.isDead = true; break; }
                    }
                }
            }
        }
        if (this.isDead) return;

        Engine.getEnemiesInRadius({x:this.x, y:this.y, faction:this.faction}, this.radius + 15).forEach(e => {
            if(!this.hitSet.has(e) && Math.hypot(e.x-this.x, e.y-this.y) < this.radius + e.radius) {
                let actualType = this.type.includes('magic') ? 'magic' : (this.type.includes('assassination') ? 'assassination' : 'melee');
                Engine.applyDamage(e, this.dmg, actualType, this.faction); this.hitSet.add(e);
                
                if(this.type === 'magic_explosive') {
                    let expRange = 50*this.aoeMult; Engine.createRingExplosion(this.x, this.y, '#ef4444', expRange);
                    Engine.getEnemiesInRadius({x:this.x, y:this.y, faction:this.faction}, expRange).forEach(e2 => { if(e2!==e) Engine.applyDamage(e2, this.dmg*0.5, 'magic', this.faction); });
                    this.isDead = true;
                } else if (this.tryRicochet()) {
                    // Success ricochet
                } else if (this.pierce > 0) { 
                    this.pierce--; 
                } else { 
                    this.isDead = true; 
                }
            }
        });
    }
    draw(ctx) {
        ctx.fillStyle = this.color; ctx.beginPath();
        if(this.isKnife) {
            let angle = this.boomerang ? Engine.frameCount * 0.5 : Math.atan2(this.dy, this.dx);
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(angle); ctx.moveTo(10, 0); ctx.lineTo(-5, 5); ctx.lineTo(-5, -5); ctx.restore();
        } else { ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); }
        ctx.fill();
    }
}

class PersistentAoe extends Entity {
    constructor(owner, radius, duration, dmgPerTick, type, color, faction, pull=false) { super(owner.x, owner.y); this.owner = owner; this.radius = radius; this.life = duration; this.dmg = dmgPerTick; this.type = type; this.color = color; this.faction = faction; this.pull = pull; this.tickRate = 0.25; this.tickTimer = 0; }

        this.tickTimer -= dt;
        if(this.tickTimer <= 0) {
            this.tickTimer = this.tickRate;
            Engine.getEnemiesInRadius(this.owner, this.radius).forEach(e => {
                Engine.applyDamage(e, this.dmg, this.type, this.faction);
                if(this.pull && e.speedMod !== undefined) { let pdx=this.owner.x-e.x, pdy=this.owner.y-e.y, pdist=Math.hypot(pdx,pdy); if(pdist>10){ e.x+=(pdx/pdist)*10; e.y+=(pdy/pdist)*10; } }
            });
        }
    }
    draw(ctx) {
        ctx.strokeStyle = this.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = this.color.replace(')', ', 0.2)').replace('rgb', 'rgba'); ctx.fill();
    }
}

class Enemy extends Entity {
    constructor(type, sx=null, sy=null) {
        super(); this.type = type;
        if(sx !== null) { this.x = sx + (Math.random()-0.5)*100; this.y = sy + (Math.random()-0.5)*100; } 
        else { let ang = Math.random()*Math.PI*2, dist = Math.max(Engine.width, Engine.height)/2 + 100; this.x = Engine.player.x + Math.cos(ang)*dist; this.y = Engine.player.y + Math.sin(ang)*dist; }
        this.speedMod = 1.0; this.speedTimer = 0; this.poisonTimer = 0; this.poisonTick = 0; this.hitTimer = 0; this.stateTimer = 0;
        
        let mData = DB.MONSTERS.find(m => m.id === type) || DB.MONSTERS.find(m => m.type === type);
        let st = 1 + (Engine.gameState.stage - 1) * 0.5, stDmg = 1 + (Engine.gameState.stage - 1) * 0.2;
        this.emoji = mData.emoji; this.radius = mData.radius; this.speed = mData.speed; this.maxHp = mData.hp * st; this.hp = this.maxHp; this.dmg = mData.dmg * stDmg; this.xpVal = mData.xp; this.ai = mData.ai;
    }
    update(dt) {
        if(this.hitTimer > 0) this.hitTimer -= dt;
        if(this.speedTimer > 0) { this.speedTimer -= dt; if(this.speedTimer <= 0) this.speedMod = 1.0; }
        if(this.poisonTimer > 0) {
            this.poisonTimer -= dt; this.poisonTick -= dt;
            if(this.poisonTick <= 0) {
                this.hp -= Engine.player.getAssassinationDmg() * 0.2; this.hitTimer = 0.1; this.poisonTick = 0.5;
                if(this.hp <= 0 && !this.isDead) { this.isDead = true; Engine.player.gainXp(this.xpVal); Engine.gameState.kills++; Engine.checkStageProgress(); }
            }
        }
        let target = Engine.getClosestTarget(this.x, this.y, 'enemy') || Engine.player;
        let dx = target.x - this.x, dy = target.y - this.y, dist = Math.hypot(dx, dy);
        if (dist > 0) { this.dirX = dx/dist; this.dirY = dy/dist; }
        
        let res = Behaviors[this.ai](this, target, dist, dt, this.x, this.y);
        let px = res.x, py = res.y;

        if (dist < target.radius + this.radius) {
            if(target.takeDamage) target.takeDamage(this.dmg);
            if(target === Engine.player && Engine.player.mods.passive_counter) { Engine.applyDamage(this, Engine.player.getMeleeDmg()*0.8, 'melee', 'player'); Engine.addParticle(this.x, this.y, '#fca5a5', 3); }
            px -= this.dirX * 20; py -= this.dirY * 20;
        }

        for(let obs of Engine.obstacles) {
            let odx = px - obs.x, ody = py - obs.y, odist = Math.hypot(odx, ody);
            if(odist < this.radius + obs.radius) {
                if (odist === 0) { odx = 1; odist = 1; }
                let overlap = this.radius + obs.radius - odist; px += (odx/odist) * overlap; py += (ody/odist) * overlap;
            }
        }
        this.x = px; this.y = py;
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y);
        if(this.poisonTimer > 0) { ctx.beginPath(); ctx.arc(0, 0, this.radius + 5, 0, Math.PI*2); ctx.fillStyle = 'rgba(74, 222, 128, 0.4)'; ctx.fill(); }
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, 15, this.radius, this.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = (this.hitTimer > 0) ? 0.5 : 1.0; ctx.fillStyle = '#fff'; ctx.font = (this.radius * 2) + 'px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if(Engine.player.x < this.x) ctx.scale(-1, 1);
        ctx.fillText(this.emoji, 0, 0); ctx.restore();
        if(this.type === 'boss') { ctx.fillStyle = '#333'; ctx.fillRect(this.x - 30, this.y - this.radius - 15, 60, 6); ctx.fillStyle = '#ef4444'; ctx.fillRect(this.x - 30, this.y - this.radius - 15, 60 * (this.hp/this.maxHp), 6); }
    }
}

class ArenaBoss extends BaseCharacter {

        if (dist > 150) {

const MapSystem = {
    CHUNK_SIZE: 500,
    hash: function(x, y) { return (Math.abs(Math.sin(x * 12.9898 + y * 78.233) * 43758.5453)) % 1; },
    generate: function(cx, cy) {
        if(Engine.isArena) return []; let obs = [], count = Math.floor(this.hash(cx, cy) * 4) + 2; 
        for(let i=0; i<count; i++) {
            let rx = this.hash(cx+i, cy) * this.CHUNK_SIZE, ry = this.hash(cx, cy+i) * this.CHUNK_SIZE, isTree = this.hash(cx*i, cy*i) > 0.5;
            obs.push({ x: cx*this.CHUNK_SIZE+rx, y: cy*this.CHUNK_SIZE+ry, type: isTree?'🌲':'🪨', radius: isTree?25:20 });
        } return obs;
    },
    update: function(px, py) {
        if(Engine.isArena) { Engine.obstacles = []; return; }
        let cx = Math.floor(px / this.CHUNK_SIZE), cy = Math.floor(py / this.CHUNK_SIZE), activeKeys = new Set();
        Engine.obstacles = [];
        for(let i=-1; i<=1; i++) {
            for(let j=-1; j<=1; j++) {
                let key = `${cx+i},${cy+j}`; activeKeys.add(key);
                if(!Engine.loadedChunks[key]) Engine.loadedChunks[key] = this.generate(cx+i, cy+j);
                Engine.obstacles.push(...Engine.loadedChunks[key]);
            }
        }
        for(let key in Engine.loadedChunks) { if(!activeKeys.has(key)) delete Engine.loadedChunks[key]; }
    }
};

const SaveSystem = {
    key: 'awaken_survivor_save',
    save: function() {
        if(!Engine.isGameRunning || Engine.isArena) return;
        const data = { playerClass: Engine.player.playerClass, level: Engine.player.level, xp: Engine.player.xp, reqXp: Engine.player.reqXp, sp: Engine.player.sp, hp: Engine.player.hp, unlockedNodes: PlayerState.unlockedNodes, gameState: { stage: Engine.gameState.stage, kills: Engine.gameState.kills, bossReq: Engine.gameState.bossReq, stageColor: Engine.gameState.stageColor } };
        localStorage.setItem(this.key, JSON.stringify(data)); this.check();
    },
    check: function() {
        let save = localStorage.getItem(this.key);
        if (save) document.getElementById('btnContinue').classList.remove('hidden'); else document.getElementById('btnContinue').classList.add('hidden');
    }
};

        document.getElementById('uiBossReq').innerText = Engine.gameState.bossReq;
        let bText = '';
        if(Engine.player.buffs.frenzy>0) bText+=`<span class="text-red-400">狂熱 ${Math.ceil(Engine.player.buffs.frenzy)}s</span> `;
        if(Engine.player.buffs.slow>0) bText+=`<span class="text-purple-400">遲緩 ${Math.ceil(Engine.player.buffs.slow)}s</span> `;
        if(Engine.player.hasShield) bText+=`<span class="text-blue-400">護盾就緒</span>`;
        document.getElementById('buffStatus').innerHTML = bText;
    },
    initTreeDrag: function() {
        const wrapper = document.getElementById('treeScrollWrapper');
        let isDragging = false, startX, startY, scrollLeft, scrollTop;
        wrapper.addEventListener('mousedown', e => {
            isDragging = true; startX = e.pageX - wrapper.offsetLeft; startY = e.pageY - wrapper.offsetTop;
            scrollLeft = wrapper.scrollLeft; scrollTop = wrapper.scrollTop;
        });
        wrapper.addEventListener('mouseleave', () => isDragging = false);
        wrapper.addEventListener('mouseup', () => isDragging = false);
        wrapper.addEventListener('mousemove', e => {
            if (!isDragging) return; e.preventDefault();
            wrapper.scrollLeft = scrollLeft - (e.pageX - wrapper.offsetLeft - startX);
            wrapper.scrollTop = scrollTop - (e.pageY - wrapper.offsetTop - startY);
        });
    },
    buildTree: function() {
        const tc = document.getElementById('treeContainer'), svg = document.getElementById('treeLines');
        tc.querySelectorAll('.skill-node').forEach(n => n.remove()); svg.innerHTML = '';
        let sp = Engine.player.sp, available = new Set(), drawn = new Set();
        
        if (sp > 0) {
            for(let id in DB.SKILL_TREE) {
                if (PlayerState.unlockedNodes[id] > 0) continue;
                let n = DB.SKILL_TREE[id], can = false;
                for(let lid of (n.links||[])){ if(PlayerState.unlockedNodes[lid]>0) can=true; }
                for(let uid in PlayerState.unlockedNodes){ if(DB.SKILL_TREE[uid].links && DB.SKILL_TREE[uid].links.includes(id)) can=true; }
                if(can) available.add(id);
            }
        }
        
        for(let id in DB.SKILL_TREE) {
            let n = DB.SKILL_TREE[id];
            if(n.links) {
                n.links.forEach(tid => {
                    let t = DB.SKILL_TREE[tid]; if(!t) return;
                    let lKey = [id, tid].sort().join('-');
                    if(!drawn.has(lKey)) {
                        let l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        l.setAttribute('x1', n.x); l.setAttribute('y1', n.y); l.setAttribute('x2', t.x); l.setAttribute('y2', t.y);
                        if(PlayerState.unlockedNodes[id]>0 && PlayerState.unlockedNodes[tid]>0) { l.setAttribute('stroke', '#eab308'); l.setAttribute('stroke-width', '6'); }
                        else { l.setAttribute('stroke', '#334155'); l.setAttribute('stroke-width', '4'); }
                        svg.appendChild(l); drawn.add(lKey);
                    }
                });
            }
            
            let el = document.createElement('div');
            el.className = `skill-node node-class-${id[0]==='m'?'m':id[0]==='r'?'r':id[0]==='b'?'b':'c'}`;
            let lvl = PlayerState.unlockedNodes[id] || 0;
            el.classList.add(lvl > 0 ? 'node-unlocked' : (available.has(id) ? 'node-available' : 'node-locked'));
            el.style.left = `${n.x}px`; el.style.top = `${n.y}px`; 
            let words = n.name.split(''); el.innerHTML = words.length >= 2 ? `${words[0]}${words[1]}<br>${words[2]||''}${words[3]||''}` : words[0];
            
            let isSkill = n.effects.skills !== undefined;
            if (lvl > 0 && isSkill) {
                let badge = document.createElement('div');
                badge.className = 'absolute -top-2 -right-2 bg-blue-600 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center border-2 border-white shadow-md z-10';
                badge.innerText = lvl; el.appendChild(badge);
            }
            
            el.onmousedown = (e) => e.stopPropagation();
            el.onclick = () => this.selectNode(id, available.has(id)); tc.appendChild(el);
        }
        document.getElementById('treeSp').innerText = sp;
    },
    selectNode: function(id, isAvail) {
        let n = DB.SKILL_TREE[id], lvl = PlayerState.unlockedNodes[id] || 0, isSkill = n.effects.skills !== undefined;
        document.getElementById('niTitle').innerText = n.name; document.getElementById('niDesc').innerText = n.desc;
        document.getElementById('nodeInfoPanel').classList.remove('translate-y-full');
        let btn = document.getElementById('btnLearnNode'); btn.style.display = 'block';
        if (lvl > 0 && !isSkill) { btn.innerText = '已學習'; btn.disabled = true; btn.className = 'px-6 py-3 bg-gray-600 text-white rounded-lg font-bold cursor-not-allowed ml-2'; } 
        else if ((isAvail || (lvl > 0 && isSkill)) && Engine.player.sp > 0) {
            btn.innerText = lvl > 0 ? `升級至 Lv.${lvl + 1} (消耗 1 點)` : '學習 (消耗 1 點)'; btn.disabled = false;
            btn.className = 'px-6 py-3 bg-blue-600 hover:bg-blue-400 text-white rounded-lg font-bold active:scale-95 transition-transform shadow-[0_0_15px_#3b82f6] ml-2';
            btn.onclick = () => { Engine.player.sp--; PlayerState.unlockedNodes[id] = (PlayerState.unlockedNodes[id] || 0) + 1; Engine.player.recalculateStats(); this.buildTree(); SaveSystem.save(); };
        } 
        else if (lvl > 0 && isSkill && Engine.player.sp === 0) { btn.innerText = `目前 Lv.${lvl}`; btn.disabled = true; btn.className = 'px-6 py-3 bg-gray-600 text-white rounded-lg font-bold cursor-not-allowed ml-2'; } 
        else { btn.style.display = 'none'; }
    }
};

document.getElementById('btnNewGame').onclick = () => document.getElementById('classSelectionScreen').classList.remove('hidden');
document.getElementById('btnCancelClass').onclick = () => document.getElementById('classSelectionScreen').classList.add('hidden');
document.getElementById('btnContinue').onclick = () => { let save = localStorage.getItem(SaveSystem.key); if(save) Engine.startFromData(JSON.parse(save)); };
document.getElementById('btnBackToMenu').onclick = () => { SaveSystem.save(); Engine.backToMainMenu(); };
document.getElementById('btnBackToMenu2').onclick = () => { SaveSystem.save(); Engine.backToMainMenu(); };

document.getElementById('btnOpenTree').onclick = () => {
    Engine.isPaused = true; document.getElementById('skillTreeModal').classList.remove('hidden'); UI.buildTree();
    let coreNode = DB.SKILL_TREE['core'], wrapper = document.getElementById('treeScrollWrapper');
    wrapper.scrollLeft = coreNode.x - window.innerWidth / 2; wrapper.scrollTop = coreNode.y - window.innerHeight / 2;
};
document.getElementById('btnCloseTree').onclick = () => { Engine.isPaused = false; document.getElementById('skillTreeModal').classList.add('hidden'); document.getElementById('nodeInfoPanel').classList.add('translate-y-full'); };
document.getElementById('btnResetTalents').onclick = () => {
    Modals.show({ title: '重置天賦', msg: '退回所有點數嗎？', type: 'prompt', confirmText: '確認', onConfirm: () => {
        let stNode = Engine.player.playerClass==='mage'?'m_start':(Engine.player.playerClass==='rogue'?'r_start':'b_start'), ref = 0;
        for(let id in PlayerState.unlockedNodes) { if(id !== stNode) ref += PlayerState.unlockedNodes[id]; }
        PlayerState.unlockedNodes = { [stNode]: 1 }; Engine.player.sp += ref; Engine.player.recalculateStats(); UI.buildTree(); SaveSystem.save();
    }});
};

document.getElementById('btnExport').onclick = () => {
    let save = localStorage.getItem(SaveSystem.key); if (!save) return Modals.show({ title: '錯誤', msg: '沒有找到本地存檔！' });
    Modals.copy(btoa(unescape(encodeURIComponent(save)))); Modals.show({ title: '匯出成功', msg: '存檔代碼已複製到剪貼簿！' });
};
document.getElementById('btnImport').onclick = () => {
    Modals.show({ title: '匯入存檔', msg: '請貼上存檔代碼：', type: 'prompt', onConfirm: (val) => {
        if(!val) return;
        try { let data = JSON.parse(decodeURIComponent(escape(atob(val))));
            if(data && data.playerClass) { localStorage.setItem(SaveSystem.key, JSON.stringify(data)); SaveSystem.check(); Modals.show({ title: '成功', msg: '存檔匯入成功！' }); } else throw 'Invalid';
        } catch(e) { Modals.show({ title: '失敗', msg: '無效的存檔代碼！' }); }
    }});
};
document.getElementById('btnArena').onclick = () => {
    Modals.show({ title: '競技場模式', msg: '請貼上對手的存檔代碼：', type: 'prompt', onConfirm: (val) => {
        if(!val) return;
        try { let friendData = JSON.parse(decodeURIComponent(escape(atob(val))));
            let localSave = localStorage.getItem(SaveSystem.key);
            if(!localSave) return Modals.show({title:'錯誤', msg:'你必須有自己的存檔！'});
            if(friendData && friendData.playerClass) { 
                Engine.isArena = true; Engine.startFromData(JSON.parse(localSave)); Engine.arenaBoss = new ArenaBoss(friendData);
                document.getElementById('uiStageContainer').classList.add('hidden'); document.getElementById('uiKillsContainer').classList.add('hidden');
                Engine.gameState.stageColor = { h: 0, s: 80, l: 20 };
            } else throw 'Invalid';
        } catch(e) { Modals.show({ title: '失敗', msg: '無效的存檔代碼！' }); }
    }});
};

UI.initTreeDrag(); Engine.init(); SaveSystem.check();
</script>
</body>
</html>
