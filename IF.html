<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無限領域：天賦覺醒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f172a; color: white; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
        }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }
        
        #skillTreeModal, #mainMenu, #classSelectionScreen { z-index: 50; }
        #treeScrollWrapper { cursor: grab; }
        #treeScrollWrapper:active { cursor: grabbing; }

        #treeContainer { position: relative; width: 1500px; height: 1500px; }
        .skill-node {
            position: absolute; width: 56px; height: 56px;
            transform: translate(-50%, -50%); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            text-align: center; line-height: 1.1;
        }
        .node-locked { background: #334155; color: #ffffff; border: 2px solid #1e293b; }
        .node-available { background: #eab308; color: #1c1917; border: 2px solid #fef08a; animation: pulse 2s infinite; }
        .node-unlocked { background: #3b82f6; color: white; border: 2px solid #93c5fd; box-shadow: 0 0 15px #3b82f6; }
        
        .node-class-c { background: #eab308; color: #000; border-color: #fef08a; } 
        .node-class-m { background: #8b5cf6; border-color: #c4b5fd; }
        .node-class-r { background: #10b981; border-color: #6ee7b7; }
        .node-class-b { background: #ef4444; border-color: #fca5a5; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 15px #eab308; }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #joystickArea { position: absolute; width: 100%; height: 100%; pointer-events: auto; z-index: 5; }
        #hpBarContainer { width: 100%; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin-top: 5px;}
        #hpBar { width: 100%; height: 100%; background: linear-gradient(90deg, #ef4444, #f87171); transition: width 0.2s; }
        #xpBarContainer { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin-top: 5px;}
        #xpBar { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.2s; }

        #joystickBase {
            position: absolute; width: 100px; height: 100px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%); display: none; pointer-events: none;
        }
        #joystickStick {
            position: absolute; width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.6); top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="joystickArea"></div>
    <div id="joystickBase"><div id="joystickStick"></div></div>

    <!-- UI 介面 -->
    <div id="uiLayer" class="p-4 flex flex-col justify-between hidden">
        <div class="flex justify-between items-start gap-4 interactive">
            <div class="w-2/3">
                <div class="text-lg font-bold text-yellow-400 drop-shadow-md">Lv <span id="uiLevel">1</span> (<span id="uiSp">0</span> 點)</div>
                <div id="hpBarContainer"><div id="hpBar"></div></div>
                <div id="xpBarContainer"><div id="xpBar"></div></div>
                <div id="buffStatus" class="mt-2 text-sm font-bold text-white drop-shadow-md flex gap-2"></div>
            </div>
            <div class="flex flex-col items-end">
                <div id="uiStageContainer" class="text-xl font-bold text-white drop-shadow-md">關卡 <span id="uiStage">1</span></div>
                <div id="uiKillsContainer" class="text-sm text-gray-300 drop-shadow-md">擊殺: <span id="uiKills">0</span> / <span id="uiBossReq">50</span></div>
                <button onclick="UI.openTree()" class="mt-2 px-3 py-1 bg-yellow-600 hover:bg-yellow-500 rounded text-sm font-bold shadow-lg transition-transform transform active:scale-95">天賦樹</button>
                <button onclick="Engine.backToMainMenu()" class="mt-2 px-3 py-1 bg-slate-600 hover:bg-slate-500 rounded text-sm font-bold shadow-lg transition-transform transform active:scale-95">回主選單</button>
            </div>
        </div>
    </div>

    <!-- 主選單 -->
    <div id="mainMenu" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 interactive">
        <h1 class="text-5xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 drop-shadow-lg text-center">無限領域<br><span class="text-3xl text-yellow-400">天賦覺醒</span></h1>
        <p class="text-gray-400 mb-10 text-center text-sm">支援觸控 / 鍵盤 (WASD 或 方向鍵) / 滑鼠</p>
        <div class="w-full max-w-sm flex flex-col gap-4">
            <button id="btnContinue" class="w-full py-4 bg-green-600 hover:bg-green-500 rounded-xl text-xl font-bold text-white shadow-lg transform active:scale-95 hidden" onclick="SaveSystem.load()">繼續旅程</button>
            <button class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl text-xl font-bold text-white shadow-lg transform active:scale-95" onclick="document.getElementById('classSelectionScreen').classList.remove('hidden')">全新開局</button>
            <div class="flex gap-4 mt-4">
                <button class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-md font-bold text-white shadow-lg transform active:scale-95" onclick="SaveSystem.export()">匯出存檔</button>
                <button class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-md font-bold text-white shadow-lg transform active:scale-95" onclick="SaveSystem.import()">匯入存檔</button>
            </div>
        </div>
    </div>

    <!-- 選角畫面 -->
    <div id="classSelectionScreen" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-4 interactive hidden">
        <h2 class="text-3xl font-bold text-white mb-4">選擇職業起點</h2>
        <div class="flex flex-col h-[80vh] w-full max-w-md gap-4">
            <div class="glass-panel flex-1 flex flex-row items-center p-4 cursor-pointer hover:bg-slate-800 transition transform hover:scale-[1.02] active:scale-95" onclick="Engine.startGame('warrior')">
                <div class="text-6xl mr-4">🛡️</div>
                <div>
                    <h2 class="text-2xl font-bold text-red-400">戰士</h2>
                    <p class="text-xs text-gray-300 mt-1">中等跑速、<span class="text-red-400">射程極短</span>、<span class="text-green-400">血量最多</span>。<br>主：力量 (生命/爆傷)</p>
                </div>
            </div>
            <div class="glass-panel flex-1 flex flex-row items-center p-4 cursor-pointer hover:bg-slate-800 transition transform hover:scale-[1.02] active:scale-95" onclick="Engine.startGame('rogue')">
                <div class="text-6xl mr-4">🥷</div>
                <div>
                    <h2 class="text-2xl font-bold text-emerald-400">盜賊</h2>
                    <p class="text-xs text-gray-300 mt-1"><span class="text-green-400">最快跑速</span>、射程中等、血量中等。<br>主：敏捷 (爆擊/閃避)</p>
                </div>
            </div>
            <div class="glass-panel flex-1 flex flex-row items-center p-4 cursor-pointer hover:bg-slate-800 transition transform hover:scale-[1.02] active:scale-95" onclick="Engine.startGame('mage')">
                <div class="text-6xl mr-4">🧙‍♂️</div>
                <div>
                    <h2 class="text-2xl font-bold text-purple-400">法師</h2>
                    <p class="text-xs text-gray-300 mt-1"><span class="text-red-400">最慢跑速</span>、<span class="text-green-400">最遠射程</span>、<span class="text-red-400">血量最少</span>。<br>主：智力 (法傷/範圍)</p>
                </div>
            </div>
        </div>
        <button class="mt-4 px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-lg shadow-lg active:scale-95" onclick="document.getElementById('classSelectionScreen').classList.add('hidden')">返回主選單</button>
    </div>

    <!-- 天賦樹 Modal -->
    <div id="skillTreeModal" class="absolute inset-0 bg-slate-900/95 interactive flex flex-col hidden z-50">
        <div class="p-4 flex justify-between items-center border-b border-slate-700 bg-slate-800 z-30">
            <div>
                <h2 class="text-xl font-bold text-yellow-400">天賦樹 (支援觸控拖曳/WASD)</h2>
                <p class="text-sm text-gray-300">剩餘點數：<span id="treeSp" class="font-bold text-white">0</span></p>
            </div>
            <div class="flex gap-2">
                <button onclick="UI.resetTalents()" class="px-3 py-2 bg-red-700 hover:bg-red-600 rounded text-sm font-bold text-white active:scale-95 transition-transform">重置</button>
                <button onclick="UI.closeTree()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded font-bold text-white active:scale-95 transition-transform">關閉</button>
            </div>
        </div>
        <div class="flex-1 overflow-auto relative bg-slate-900 select-none z-10" id="treeScrollWrapper">
            <div id="treeContainer">
                <svg width="100%" height="100%" class="absolute inset-0 pointer-events-none opacity-20">
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/></pattern>
                    <rect width="100%" height="100%" fill="url(#grid)" />
                </svg>
                <svg id="treeLines" class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 0;"></svg>
            </div>
        </div>
        <div id="nodeInfoPanel" class="absolute bottom-0 left-0 w-full p-4 glass-panel transform translate-y-full transition-transform duration-300 flex justify-between items-center shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-40">
            <div>
                <h3 id="niTitle" class="font-bold text-xl text-white">節點名稱</h3>
                <p id="niDesc" class="text-md text-gray-300 mt-1 whitespace-pre-line">節點描述效果...</p>
            </div>
            <button id="btnLearnNode" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold hidden shadow-lg flex-shrink-0 ml-2">學習</button>
        </div>
    </div>

    <!-- 遊戲結束畫面 -->
    <div id="gameOverScreen" class="absolute inset-0 bg-red-900/95 z-50 flex flex-col items-center justify-center p-4 interactive hidden">
        <h1 id="goTitle" class="text-5xl font-bold mb-4 text-white drop-shadow-lg">你陣亡了</h1>
        <p id="goDesc1" class="text-xl text-gray-200 mb-2">保留等級與天賦點數</p>
        <p id="goDesc2" class="text-md text-gray-300 mb-8">將退回較弱的關卡重生...</p>
        <div class="flex gap-4">
            <button id="btnRespawn" onclick="Engine.respawn()" class="px-8 py-3 bg-white text-red-900 text-xl font-bold rounded-full shadow-lg hover:bg-gray-200 transition transform hover:scale-105">重新甦醒</button>
            <button onclick="Engine.backToMainMenu()" class="px-8 py-3 bg-slate-700 text-white text-xl font-bold rounded-full shadow-lg hover:bg-slate-600 transition transform hover:scale-105">回主畫面</button>
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="customModal" class="absolute inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 hidden interactive">
        <div class="glass-panel p-6 w-full max-w-md flex flex-col gap-4">
            <h3 id="modalTitle" class="text-2xl font-bold text-white">標題</h3>
            <p id="modalMsg" class="text-gray-300 text-sm break-words"></p>
            <textarea id="modalInput" class="hidden w-full h-32 bg-slate-800 text-white p-3 rounded-lg border border-slate-600 focus:outline-none focus:border-blue-500 font-mono" placeholder="貼上代碼..."></textarea>
            <div class="flex justify-end gap-3 mt-2">
                <button id="modalBtnCancel" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded text-white font-bold hidden active:scale-95 transition-transform">取消</button>
                <button id="modalBtnConfirm" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-white font-bold active:scale-95 transition-transform">確認</button>
            </div>
        </div>
    </div>

let GAME_WIDTH = 800;
let GAME_HEIGHT = 600;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    let w = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth || 800;
    let h = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight || 600;
    if(w <= 0) w = 800;
    if(h <= 0) h = 600;
    GAME_WIDTH = w;
    GAME_HEIGHT = h;
    if(canvas) { canvas.width = GAME_WIDTH; canvas.height = GAME_HEIGHT; }
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const Behaviors = {
    'chase': (e, t, d, dt, px, py) => ({ x: px + e.dirX * e.speed * e.speedMod * dt, y: py + e.dirY * e.speed * e.speedMod * dt }),
    'wander': (e, t, d, dt, px, py) => {
        e.stateTimer -= dt; if(e.stateTimer <= 0) { e.wanderDir = Math.random()*Math.PI*2; e.stateTimer = 2.0; }
        return { x: px + Math.cos(e.wanderDir) * e.speed * 0.5 * e.speedMod * dt, y: py + Math.sin(e.wanderDir) * e.speed * 0.5 * e.speedMod * dt };
    },
    'ranged': (e, t, d, dt, px, py) => {
        e.stateTimer -= dt; 
        // 核心 AI 修改：保持移動以防卡死
        let s = e.speed;
        if (d < 150) s = -e.speed * 0.5; // 太近：往後退拉開距離
        else if (d < 250) s = e.speed * 0.2; // 射程內：極緩慢移動(繞行逼近)

        if(e.stateTimer <= 0 && d < 300) { 
            Engine.projectiles.push(new Projectile(e.x, e.y, e.dirX, e.dirY, 200, e.dmg, 1, 'enemy_magic', '#d1d5db', 'enemy')); 
            e.stateTimer = 2.0; 
        }
        return { x: px + e.dirX * s * e.speedMod * dt, y: py + e.dirY * s * e.speedMod * dt };
    },
    'dash': (e, t, d, dt, px, py) => {
        e.stateTimer -= dt; if(e.stateTimer <= 0) e.stateTimer = 3.0;
        // 核心 AI 修改：蓄力期間依然保持 40% 的緩慢移動，爆發時 4 倍速
        let s = e.stateTimer > 2.5 ? e.speed * 4 : e.speed * 0.4;
        return { x: px + e.dirX * s * e.speedMod * dt, y: py + e.dirY * s * e.speedMod * dt };
    }
};

const Engine = {
    isGameRunning: false, isPaused: false, frameCount: 0, lastTime: performance.now(), autoSaveTimer: 0,
    camera: { x: 0, y: 0 },
    gameState: { stage: 1, kills: 0, bossReq: 50, bossSpawned: false, stageColor: {h:220, s:50, l:15} },
    player: null,
    enemies: [], projectiles: [], particles: [], floatingTexts: [], shrines: [], obstacles: [], mapMercenaries: [], partyMercenaries: [],
    loadedChunks: {}, unlockedNodes: {},
    joystick: { active: false, dx: 0, dy: 0 },
    keys: {},

    init: function() {
        window.addEventListener('keydown', e => Engine.keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => Engine.keys[e.key.toLowerCase()] = false);
        SaveSystem.checkLocal();
        requestAnimationFrame((t) => Engine.loop(t));
    },
    startGame: function(pClass) {
        this.unlockedNodes = {}; this.player = new Player(pClass);
        this.gameState = { stage: 1, kills: 0, bossReq: 50, bossSpawned: false, stageColor: {h:220, s:50, l:15} };
        this.startEngine();
    },
    startEngine: function() {
        resizeCanvas();
        document.getElementById('classSelectionScreen').classList.add('hidden'); 
        document.getElementById('mainMenu').classList.add('hidden'); 
        document.getElementById('uiLayer').classList.remove('hidden');
        
        this.enemies=[]; this.projectiles=[]; this.particles=[]; this.floatingTexts=[]; 
        this.shrines=[]; this.loadedChunks=[]; this.mapMercenaries=[]; this.partyMercenaries=[];
        
        document.getElementById('uiStageContainer').classList.remove('hidden'); 
        document.getElementById('uiKillsContainer').classList.remove('hidden'); 
        
        this.isGameRunning = true; 
        this.lastTime = performance.now(); 
        
        UI.update(); 
        UI.buildTree(); 
        SaveSystem.save();
    },
    loop: function(timestamp) {
        requestAnimationFrame((t) => Engine.loop(t));
        if (!this.isGameRunning) return;
        
        let dt = (timestamp - this.lastTime) / 1000; 
        if (isNaN(dt) || dt <= 0) dt = 0.016; 
        if (dt > 0.1) dt = 0.1; 
        
        this.lastTime = timestamp;
        if (this.isPaused) { UI.treeLoop(); return; } 
        this.frameCount++;
        
        this.camera.x = this.player.x - GAME_WIDTH / 2; 
        this.camera.y = this.player.y - GAME_HEIGHT / 2;
        MapSystem.updateChunks(this.player.x, this.player.y);

        if(this.frameCount % 60 === 0) MapSystem.spawnEnemy();
        if(this.gameState.stage >= 2 && this.frameCount % 45 === 0) MapSystem.spawnEnemy();
        if(this.gameState.stage >= 4 && this.frameCount % 30 === 0) MapSystem.spawnEnemy();
        if(this.frameCount % 600 === 0 && this.shrines.filter(s=>!s.used).length < 3) this.shrines.push(new Shrine());
        if(this.frameCount % 900 === 0 && this.mapMercenaries.length < 2) this.mapMercenaries.push(new MapMercenary());
        this.autoSaveTimer += dt; if(this.autoSaveTimer > 10) { SaveSystem.save(); this.autoSaveTimer = 0; }

        this.player.update(dt); 
        this.partyMercenaries.forEach(m => m.update(dt)); this.partyMercenaries = this.partyMercenaries.filter(m => !m.isDead);
        this.mapMercenaries.forEach(m => m.update(dt)); this.mapMercenaries = this.mapMercenaries.filter(m => !m.isDead);
        this.shrines.forEach(s => s.update(dt));
        this.enemies.forEach(e => e.update(dt)); this.enemies = this.enemies.filter(e => !e.isDead); 
        this.projectiles.forEach(p => p.update(dt)); this.projectiles = this.projectiles.filter(p => !p.isDead);

        this.draw();
    },
    draw: function() {
        let sc = this.gameState.stageColor || {h:220, s:50, l:15}; 
        ctx.fillStyle = `hsl(${sc.h}, ${sc.s}%, ${sc.l}%)`; 
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1; 
        let ox = (this.camera.x%50+50)%50, oy = (this.camera.y%50+50)%50;
        
        ctx.beginPath(); 
        for(let x=-ox; x<GAME_WIDTH; x+=50){ ctx.moveTo(x,0); ctx.lineTo(x,GAME_HEIGHT); } 
        for(let y=-oy; y<GAME_HEIGHT; y+=50){ ctx.moveTo(0,y); ctx.lineTo(GAME_WIDTH,y); } 
        ctx.stroke();

        ctx.save(); 
        ctx.translate(-this.camera.x, -this.camera.y);
        
        this.obstacles.forEach(o => { ctx.font = (o.radius*2.5)+'px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(o.type, o.x, o.y); }); 

        this.shrines.forEach(s => s.draw()); this.mapMercenaries.forEach(m => m.draw());
        this.projectiles.forEach(p => p.draw()); this.enemies.forEach(e => e.draw()); this.partyMercenaries.forEach(m => m.draw());
        this.player.draw();

        for(let i=this.particles.length-1; i>=0; i--) {
            let p = this.particles[i]; p.life -= 0.016; if(p.life <= 0) { this.particles.splice(i, 1); continue; }
            if(p.type === 'ring') { p.radius += (p.maxRadius / p.maxLife) * 0.016; ctx.strokeStyle = p.color; ctx.globalAlpha = p.life/p.maxLife; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.stroke(); ctx.globalAlpha = 1; } 
            else if (p.type === 'line') { ctx.strokeStyle = p.color; ctx.globalAlpha = p.life/p.maxLife; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke(); ctx.globalAlpha = 1; } 
            else { p.x += p.dx * 0.016; p.y += p.dy * 0.016; ctx.fillStyle = p.color; ctx.globalAlpha = p.life/p.maxLife; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; }
        }
        for(let i=this.floatingTexts.length-1; i>=0; i--) {
            let ft = this.floatingTexts[i]; ft.life -= 0.016; if(ft.life <= 0) { this.floatingTexts.splice(i, 1); continue; }
            ft.y += ft.dy * 0.016; ctx.fillStyle = ft.color; ctx.font = `bold ${ft.size}px Arial`; ctx.globalAlpha = ft.life; 
            ctx.fillText(ft.text, ft.x, ft.y); ctx.globalAlpha = 1;
        }
        ctx.restore(); 

        this.shrines.forEach(s => { if(!s.used) UI.drawEdgeIndicator(s.x, s.y, s.color, '⛩️'); });
        this.mapMercenaries.forEach(m => { if(!m.isDead) UI.drawEdgeIndicator(m.x, m.y, '#3b82f6', m.emoji); });
    },

    getAllTargets: function(casterFaction) { 
        let targets = casterFaction === 'player' ? [...this.enemies] : [this.player, ...this.partyMercenaries];
        return targets.filter(e => e && !e.isDead);
    },

    getClosestTarget: function(x, y, faction, maxRange, exclude = new Set()) {
        let nearest = null, minDist = Infinity, candidates = this.getAllTargets(faction);
        for(let e of candidates) {
            if(!exclude.has(e)) {
                let d = Math.hypot(e.x - x, e.y - y); if(d < minDist && d <= maxRange) { minDist = d; nearest = e; }
            }
        }
        return nearest;
    },
    applyDamage: function(target, baseDmg, type, attackerFaction) {
        let isCrit = false, finalDmg = baseDmg;
        if (attackerFaction === 'player') { isCrit = Math.random() < this.player.getCritRate(); finalDmg = isCrit ? baseDmg * this.player.getCritDmg() : baseDmg; }
        finalDmg = Math.max(1, Math.floor(finalDmg * (0.9 + Math.random() * 0.2)));

        let wasDead = target.isDead;

        if (target.takeDamage) target.takeDamage(finalDmg); else { target.hp -= finalDmg; target.hitTimer = 0.1; if (target.hp <= 0) target.isDead = true; }
        
        if(isCrit) addParticle(target.x, target.y, '#fef08a', 4); else addParticle(target.x, target.y, '#fff', 2);

        if (attackerFaction === 'player') {
            if (type === 'melee' && this.player.mods.passive_lifesteal) this.player.heal(finalDmg * 0.05);
            
            if (type === 'melee' && this.player.mods.passive_tremor && Math.random() < 0.2) {
                createRingExplosion(target.x, target.y, '#92400e', 40);
                this.getAllTargets('player').forEach(e => { if (e !== target && Math.hypot(e.x - target.x, e.y - target.y) <= 40) this.applyDamage(e, baseDmg * 0.5, 'melee_tremor', 'player'); });
            }
            if (type === 'assassination' && this.player.mods.passive_poison) target.poisonTimer = 3.0;
            if (type === 'magic' && this.player.mods.passive_resonance && Math.random() < 0.2) {
                createRingExplosion(target.x, target.y, '#c084fc', 50);
                this.getAllTargets('player').forEach(e => { if (e !== target && Math.hypot(e.x - target.x, e.y - target.y) <= 50) this.applyDamage(e, baseDmg * 0.5, 'magic_resonance', 'player'); });
            }
        }

        if (!wasDead && target.isDead && target.xpVal) { 
            if(attackerFaction === 'player') {
                this.player.gainXp(target.xpVal); this.gameState.kills++;
                if (this.player.mods.passive_mana_cascade && type.includes('magic') && Math.random() < 0.3) {

                    this.projectiles.push(new PersistentAoe({x: target.x, y: target.y}, 60 * this.player.getAoeMult(), 2.0, this.player.getAssassinationDmg() * 0.5, 'assassination', 'rgba(16, 185, 129, 0.4)', 'player'));

            this.gameState.stage++; this.gameState.kills = 0; this.gameState.bossReq = 50 + this.gameState.stage * 20; this.gameState.bossSpawned = false;
            this.gameState.stageColor = { h: Math.floor(Math.random()*360), s: 30 + Math.random()*40, l: 10 + Math.random()*15 };
            addFloatingText('關卡突破!', this.player.x, this.player.y - 100, '#3b82f6', 40);
            this.player.heal(this.player.getMaxHp() * 0.5); this.partyMercenaries.forEach(m => m.heal(m.getMaxHp()*0.5)); SaveSystem.save();
        }

    triggerGameOver: function() {

        document.getElementById('goTitle').innerText = '你陣亡了'; document.getElementById('goDesc1').innerText = '保留等級與天賦點數'; document.getElementById('goDesc2').innerText = '將退回較弱的關卡重生...'; document.getElementById('btnRespawn').classList.remove('hidden');
    },
    respawn: function() {
        this.gameState.stage = Math.max(1, this.gameState.stage - 2); this.gameState.kills = 0; this.gameState.bossReq = 50 + this.gameState.stage * 20; this.gameState.bossSpawned = false;
        this.player.hp = this.player.getMaxHp(); this.player.x = 0; this.player.y = 0; this.partyMercenaries = []; this.mapMercenaries = [];
        this.enemies = []; this.projectiles = []; this.particles = []; this.floatingTexts = []; this.shrines = []; this.loadedChunks = {};
        document.getElementById('gameOverScreen').classList.add('hidden'); document.getElementById('uiLayer').classList.remove('hidden');
        this.isGameRunning = true; this.lastTime = performance.now(); UI.update();
    },

};

// --- 防卡死核心：強制將剛生成的實體擠出障礙物 ---
function resolveSpawnCollision(entity) {
    for (let tries = 0; tries < 10; tries++) {
        let safe = true;
        for (let obs of Engine.obstacles) {
            let d = Math.hypot(entity.x - obs.x, entity.y - obs.y);
            if (d < entity.radius + obs.radius) {
                safe = false;
                let angle = Math.atan2(entity.y - obs.y, entity.x - obs.x);
                if (d === 0) angle = Math.random() * Math.PI * 2; // 完全重疊時給予隨機方向
                let pushDist = (entity.radius + obs.radius - d) + 5;
                entity.x += Math.cos(angle) * pushDist;
                entity.y += Math.sin(angle) * pushDist;
            }
        }
        if (safe) break;
    }
}

// 實體類別 (Classes)
// ----------------------------------------------------
class BaseCharacter {
    constructor() {
        this.x = 0; this.y = 0; this.radius = 18; this.dirX = 1; this.dirY = 0;
        this.mods = { str:0, agi:0, int:0, moveSpeed:0, maxHp:0, atkSpeed:0, aoe:0, critRate:0, critDmg:0, dodge:0, hpRegen:0, passive_lifesteal:false, passive_multishot:false, passive_poison:false, passive_multicast:false, passive_pierce:false, passive_mana_shield:false, passive_resonance:false, passive_counter:false, passive_ranged_def:false, passive_toxic_bloom:false, passive_shadow_step:false, passive_ricochet:false, passive_tremor:false, passive_mana_cascade:false };
        this.buffs = { frenzy: 0, slow: 0, shadow: 0 }; this.skills = []; this.skillLevels = {}; this.faction = 'player'; this.isDead = false; this.regenTimer = 1.0; this.shieldCooldown = 0; this.hasShield = false;
    }
    getStr() { return this.baseStr + this.mods.str; } getAgi() { return this.baseAgi + this.mods.agi; } getInt() { return this.baseInt + this.mods.int; }
    getMaxHp() { return this.baseMaxHp + this.mods.maxHp + (this.getStr() * 5); }
    getMoveSpeed() { let s = this.baseMoveSpeed * (1 + this.mods.moveSpeed); if (this.buffs.slow > 0) s *= 0.5; if (this.buffs.shadow > 0) s *= 1.5; return s; }
    getCritRate() { return Math.min(0.7, this.baseCritRate + this.mods.critRate + (this.getAgi() * 0.005) + (this.buffs.shadow > 0 ? 0.3 : 0)); }
    getCritDmg() { return this.baseCritDmg + this.mods.critDmg + (this.getStr() * 0.01); } getDodgeRate() { return Math.min(0.7, this.mods.dodge + (this.getAgi() * 0.005)); }
    getMeleeDmg() { return 10 + this.getStr() * 2; } getAssassinationDmg() { return 8 + this.getAgi() * 2.5; } getMagicDmg() { return 12 + this.getInt() * 2.2; }
    getSpeedMult() { let m = 1 + this.mods.atkSpeed; if (this.buffs.frenzy > 0) m += 1.0; return m; } getAoeMult() { return this.baseRange + this.mods.aoe + (this.getInt() * 0.01); }
    heal(amt) { if(this.hp < this.getMaxHp()) this.hp = Math.min(this.getMaxHp(), this.hp + amt); }
    takeDamage(amt) {
        if (Math.random() < this.getDodgeRate()) { addFloatingText('閃避!', this.x, this.y - 20, '#10b981'); if (this.mods.passive_shadow_step) this.buffs.shadow = 2.0; return; }
        if (this.hasShield) { this.hasShield = false; this.shieldCooldown = 10.0; addFloatingText('護盾吸收!', this.x, this.y - 20, '#60a5fa'); createRingExplosion(this.x, this.y, '#60a5fa', 40); return; }
        this.hp -= amt; addParticle(this.x, this.y, '#ef4444', 5); if (this.hp <= 0 && !this.isDead) { this.hp = 0; this.die(); }
    }
    die() { this.isDead = true; }
    updateSkills(dt) {
        if(this.mods.hpRegen > 0) { this.regenTimer -= dt; if(this.regenTimer <= 0) { this.heal(this.mods.hpRegen); this.regenTimer = 1.0; } }
        if(this.mods.passive_mana_shield && !this.hasShield) { this.shieldCooldown -= dt; if (this.shieldCooldown <= 0) this.hasShield = true; }
        for(let k in this.buffs) { if(this.buffs[k] > 0) this.buffs[k] -= dt; }
        this.skills.forEach(s => { 
            s.timer -= dt * this.getSpeedMult(); 
            if (s.timer <= 0) { s.queue = (this.mods.passive_multicast && SkillRegistry[s.id].cast.toString().includes('magic')) ? 2 : 1; s.timer = s.cooldown; }
            if (s.queue > 0) { s.qTimer = (s.qTimer || 0) - dt; if(s.qTimer <= 0) { SkillRegistry[s.id].cast(this, this.skillLevels[s.id]||1); s.queue--; s.qTimer = 0.2; } }
        });
    }
    
    handleObstacles(px, py) {
        for(let obs of Engine.obstacles) {
            let nextDx = px - obs.x, nextDy = py - obs.y, nextDist = Math.hypot(nextDx, nextDy);
            let minDist = this.radius + obs.radius;
            
            if(nextDist < minDist) {
                let currDx = this.x - obs.x, currDy = this.y - obs.y, currDist = Math.hypot(currDx, currDy);
                
                if(currDist >= minDist) {
                    if(nextDist === 0) { nextDx = 1; nextDist = 1; }
                    let overlap = minDist - nextDist;
                    px += (nextDx / nextDist) * overlap; 
                    py += (nextDy / nextDist) * overlap;
                } else if(nextDist < currDist) {
                    if(nextDist === 0) { nextDx = 1; nextDist = 1; }
                    let overlap = currDist - nextDist;
                    px += (nextDx / nextDist) * overlap; 
                    py += (nextDy / nextDist) * overlap;
                }
            }
        }
        this.x = px; this.y = py;
    }
}

class Player extends BaseCharacter {
    constructor(pClass) {
        super(); this.faction = 'player'; this.level = 1; this.xp = 0; this.reqXp = 35; this.sp = 0; 
        this.baseStr = 5; this.baseAgi = 5; this.baseInt = 5; this.baseMoveSpeed = 3.0; this.baseMaxHp = 100; this.baseRange = 1.0; this.baseCritRate = 0.05; this.baseCritDmg = 1.5;
        this.unlockedSkillIds = []; this.playerClass = pClass; this.applyClassStart();
    }
    applyClassStart() {
        let sn = '';
        if (this.playerClass === 'mage') { sn = 'm_start'; this.emoji = '🧙‍♂️'; this.baseMoveSpeed=2.0; this.baseMaxHp=50; this.baseRange=1.5; this.baseInt=15; this.baseStr=3; this.baseAgi=3; }
        else if (this.playerClass === 'rogue') { sn = 'r_start'; this.emoji = '🥷'; this.baseMoveSpeed=4.5; this.baseMaxHp=90; this.baseRange=1.0; this.baseAgi=15; this.baseStr=5; this.baseInt=3; }
        else if (this.playerClass === 'warrior') { sn = 'b_start'; this.emoji = '🛡️'; this.baseMoveSpeed=3.0; this.baseMaxHp=150; this.baseRange=1.0; this.baseStr=15; this.baseAgi=4; this.baseInt=2; }
        if(!Engine.unlockedNodes[sn]) Engine.unlockedNodes[sn] = 1;
        this.recalculateStats(); this.hp = this.getMaxHp();
    }
    recalculateStats() {
        for (let k in this.mods) this.mods[k] = typeof this.mods[k] === 'boolean' ? false : 0;
        this.skillLevels = {}; let newSkills = new Set();
        for(let id in Engine.unlockedNodes) {
            let level = Engine.unlockedNodes[id], effects = DB.SKILL_TREE[id].effects;
            for(let k in effects) {
                if (k === 'skills') { effects[k].forEach(s => { this.skillLevels[s] = (this.skillLevels[s] || 0) + level; newSkills.add(s); }); } 
                else if (typeof effects[k] === 'boolean') this.mods[k] = true; else this.mods[k] += effects[k];
            }
        }
        newSkills.forEach(id => { if (!this.unlockedSkillIds.includes(id)) { this.unlockedSkillIds.push(id); this.skills.push({id: id, cooldown: SkillRegistry[id].cooldown, timer: 0, queue: 0}); } });
        if (this.hp > this.getMaxHp()) this.hp = this.getMaxHp(); UI.update();
    }
    update(dt) {
        let px = this.x, py = this.y, mDx = 0, mDy = 0, kbDx = 0, kbDy = 0;
        if(Engine.keys['w'] || Engine.keys['arrowup']) kbDy -= 1; if(Engine.keys['s'] || Engine.keys['arrowdown']) kbDy += 1;
        if(Engine.keys['a'] || Engine.keys['arrowleft']) kbDx -= 1; if(Engine.keys['d'] || Engine.keys['arrowright']) kbDx += 1;
        let kbDist = Math.hypot(kbDx, kbDy);
        
        if (Engine.joystick.active) { mDx = Engine.joystick.dx; mDy = Engine.joystick.dy; } 
        else if (kbDist > 0) { mDx = kbDx / kbDist; mDy = kbDy / kbDist; }

        if (mDx !== 0 || mDy !== 0) { let s = this.getMoveSpeed() * dt * 60; px += mDx * s; py += mDy * s; this.dirX = mDx; this.dirY = mDy; }
        this.handleObstacles(px, py); this.updateSkills(dt);
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        if(this.buffs.frenzy > 0) { ctx.beginPath(); ctx.arc(0, 0, this.radius + 10, 0, Math.PI*2); ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)'; ctx.lineWidth = 4; ctx.stroke(); }
        if(this.buffs.slow > 0) { ctx.beginPath(); ctx.arc(0, 0, this.radius + 10, 0, Math.PI*2); ctx.strokeStyle = 'rgba(139, 92, 246, 0.5)'; ctx.lineWidth = 4; ctx.stroke(); }
        if(this.hasShield) { ctx.beginPath(); ctx.arc(0, 0, this.radius + 8, 0, Math.PI*2); ctx.strokeStyle = 'rgba(96, 165, 250, 0.8)'; ctx.lineWidth = 3; ctx.stroke(); }
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 15, this.radius, this.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.globalAlpha = (this.buffs.shadow > 0) ? 0.5 : 1.0; ctx.font = '32px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if(this.dirX < 0) ctx.scale(-1, 1); ctx.fillText(this.emoji, 0, 0); ctx.restore();
    }
    die() { super.die(); Engine.triggerGameOver(); }
    gainXp(amt) {
        this.xp += amt;
        while (this.xp >= this.reqXp) { 
            this.level++; this.sp++; this.xp -= this.reqXp; this.reqXp = Math.floor(20 + (this.level * 10) + Math.pow(this.level, 1.6) * 5); this.hp = this.getMaxHp(); 
            addFloatingText('Level Up!', this.x, this.y - 40, '#eab308', 24); createRingExplosion(this.x, this.y, '#eab308'); UI.buildTree(); SaveSystem.save();
        }
        UI.update();
    }
}

class Enemy {
    constructor(type, sx=null, sy=null, archetype=null, customEmoji=null) {
        if(sx !== null && sy !== null) { 
            // 現在傳入的 sx, sy 已經是經過 getSafeSpawnPosition 保證安全的座標
            this.x = sx; 
            this.y = sy; 
        } 
        else { 
            // 防呆預設
            let a = Math.random() * Math.PI * 2, d = Math.max(GAME_WIDTH, GAME_HEIGHT)/2 + 100; 
            this.x = Engine.player.x + Math.cos(a)*d; 
            this.y = Engine.player.y + Math.sin(a)*d; 
        }
        this.isDead = false; this.speedMod = 1.0; this.speedTimer = 0; this.poisonTimer = 0; this.poisonTick = 0; this.hitTimer = 0; this.stateTimer = 0; 
        
        let st = 1 + (Engine.gameState.stage - 1) * 0.5, stDmg = 1 + (Engine.gameState.stage - 1) * 0.2;
        let md;
        
        if (type === 'boss') {
            md = archetype;
            this.type = archetype.id;
            this.emoji = customEmoji;
        } else {
            this.type = type;
            md = DB.MONSTERS.find(m => m.type === type);
            this.emoji = md.emoji;
        }

        this.radius = md.radius; this.speed = md.speed; 
        this.hp = md.hp * st; this.dmg = md.dmg * stDmg; this.xpVal = md.xp; this.ai = md.ai || 'chase'; this.maxHp = this.hp; this.dirX = 0; this.dirY = 0;
        
        this.skillCD = md.skillCD || 2.0; this.stateTimer = this.skillCD;
        // 移除有缺陷的 resolveSpawnCollision，依賴 MapSystem 的預判安全座標
    }
    update(dt) {
        if(this.hitTimer > 0) this.hitTimer -= dt; if(this.speedTimer > 0) { this.speedTimer -= dt; if(this.speedTimer <= 0) this.speedMod = 1.0; }
        if(this.poisonTimer > 0) {
            this.poisonTimer -= dt; this.poisonTick -= dt;
            if(this.poisonTick <= 0) { this.hp -= Engine.player.getAssassinationDmg() * 0.2; this.hitTimer = 0.1; this.poisonTick = 0.5; if(this.hp <= 0 && !this.isDead) { this.isDead = true; Engine.applyDamage(this, 0, 'poison', 'player'); } }
        }
        let t = Engine.getClosestTarget(this.x, this.y, 'enemy') || Engine.player;
        let dx = t.x - this.x, dy = t.y - this.y, dist = Math.hypot(dx, dy);
        if (dist > 0) { this.dirX = dx/dist; this.dirY = dy/dist; }
        
        let proposedX = this.x, proposedY = this.y;
        
        if (this.type.startsWith('boss')) {
            this.stateTimer -= dt;
            let cs = this.speed;

            if (this.type === 'boss_summoner' && this.stateTimer <= 0) {
                let pool = DB.MONSTERS;
                Engine.enemies.push(new Enemy(pool[Math.floor(Math.random() * pool.length)].type, this.x, this.y));
                this.stateTimer = this.skillCD;
            }
            else if (this.type === 'boss_shooter' && this.stateTimer <= 0) {
                let p = new Projectile(this.x, this.y, this.dirX, this.dirY, 250, this.dmg, 2, 'enemy_magic', '#f97316', 'enemy');
                p.radius = 12; Engine.projectiles.push(p);
                this.stateTimer = this.skillCD;
            }
            else if (this.type === 'boss_dasher') {
                if (this.stateTimer <= 0) cs = this.speed * 4;
                if (this.stateTimer < -0.5) this.stateTimer = this.skillCD;
            }
            else if (this.type === 'boss_tank' && this.stateTimer <= 0) {
                createRingExplosion(this.x, this.y, '#a16207', 120);
                Engine.getAllTargets('enemy').forEach(e => {
                    if(Math.hypot(e.x - this.x, e.y - this.y) <= 120) Engine.applyDamage(e, this.dmg * 1.5, 'melee', 'enemy');
                });
                this.stateTimer = this.skillCD;
            }
            else if (this.type === 'boss_spreader' && this.stateTimer <= 0) {
                for(let i=0; i<8; i++) {
                    let a = (Math.PI*2/8)*i;
                    let p = new Projectile(this.x, this.y, Math.cos(a), Math.sin(a), 180, this.dmg*0.8, 1.5, 'enemy_magic', '#8b5cf6', 'enemy');
                    p.radius = 8; Engine.projectiles.push(p);
                }
                this.stateTimer = this.skillCD;
            }

            if (dist > 0) { proposedX += this.dirX * cs * this.speedMod * dt; proposedY += this.dirY * cs * this.speedMod * dt; }
        } else {
            let res = Behaviors[this.ai](this, t, dist, dt, proposedX, proposedY); proposedX = res.x; proposedY = res.y;
        }

        if (dist < t.radius + this.radius) {
            if(t.takeDamage) t.takeDamage(this.dmg);
            if (t === Engine.player && Engine.player.mods.passive_counter) { Engine.applyDamage(this, Engine.player.getMeleeDmg() * 0.8, 'melee', 'player'); addParticle(this.x, this.y, '#fca5a5', 3); }
            proposedX -= this.dirX * 20; proposedY -= this.dirY * 20;
        }

        for(let obs of Engine.obstacles) {
            let nextDx = proposedX - obs.x, nextDy = proposedY - obs.y, nextDist = Math.hypot(nextDx, nextDy);
            let minDist = this.radius + obs.radius;
            if(nextDist < minDist) {
                let currDx = this.x - obs.x, currDy = this.y - obs.y, currDist = Math.hypot(currDx, currDy);
                if(currDist >= minDist) {
                    if(nextDist === 0) { nextDx = 1; nextDist = 1; }
                    let overlap = minDist - nextDist;
                    proposedX += (nextDx / nextDist) * overlap; proposedY += (nextDy / nextDist) * overlap;
                } else if(nextDist < currDist) {
                    if(nextDist === 0) { nextDx = 1; nextDist = 1; }
                    let overlap = currDist - nextDist;
                    proposedX += (nextDx / nextDist) * overlap; proposedY += (nextDy / nextDist) * overlap;
                }
            }
        }
        this.x = proposedX; this.y = proposedY;
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        if (this.poisonTimer > 0) { ctx.beginPath(); ctx.arc(0, 0, this.radius + 5, 0, Math.PI*2); ctx.fillStyle = 'rgba(74, 222, 128, 0.4)'; ctx.fill(); }
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, this.radius, this.radius, this.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.globalAlpha = (this.hitTimer > 0) ? 0.5 : 1.0; ctx.font = (this.radius * 2) + 'px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if(Engine.player.x < this.x) ctx.scale(-1, 1); ctx.fillText(this.emoji, 0, 0); ctx.restore();
        if(this.type.startsWith('boss')) { ctx.fillStyle = '#333'; ctx.fillRect(this.x - 30, this.y - this.radius - 15, 60, 6); ctx.fillStyle = '#ef4444'; ctx.fillRect(this.x - 30, this.y - this.radius - 15, 60 * (this.hp/this.maxHp), 6); }
    }
}

class Mercenary extends BaseCharacter {
    constructor(emoji) {
        super(); this.faction = 'player'; this.emoji = emoji; this.state = 'active'; this.leaveTimer = 10;
        this.x = Engine.player.x + (Math.random() - 0.5) * 50; this.y = Engine.player.y + (Math.random() - 0.5) * 50;
        this.baseMaxHp = 100 + Engine.gameState.stage * 50; this.hp = this.baseMaxHp; this.baseMoveSpeed = 3.8; this.baseRange = 1.0;
        let ps = ['magic_missile', 'fireball', 'throwing_knife', 'heavy_strike'], sid = ps[Math.floor(Math.random() * ps.length)];
        this.skills.push({id: sid, cooldown: SkillRegistry[sid].cooldown, timer:0, queue:0}); this.skillLevels[sid] = 1 + Math.floor(Engine.gameState.stage / 2);
        this.baseInt = 5 + Engine.gameState.stage*2; this.baseStr = 5 + Engine.gameState.stage*2; this.baseAgi = 5 + Engine.gameState.stage*2; this.orbitAngle = Math.random() * Math.PI * 2;
        resolveSpawnCollision(this); // 生成時防卡死
    }
    update(dt) {
        if (this.state === 'leaving') { this.leaveTimer -= dt; if (this.leaveTimer <= 0) this.isDead = true; return; }
        
        let t = Engine.getClosestTarget(this.x, this.y, 'player');
        let distToP = Math.hypot(Engine.player.x - this.x, Engine.player.y - this.y);
        
        // 算出期望的目標座標 (Target Point)
        let tx = this.x, ty = this.y;
        
        if (distToP > 300) { 
            // 距離玩家過遠，強制跟隨
            tx = Engine.player.x; ty = Engine.player.y;
        } else if (t) {
            let distToE = Math.hypot(t.x - this.x, t.y - this.y);
            if (distToE < 150) { 
                // 敵人太近：反向風箏 (目標點設在背對敵人的方向)
                tx = this.x - (t.x - this.x); 
                ty = this.y - (t.y - this.y);
                // 確保退路不會脫離玩家太遠
                if(distToP > 200) { tx = (tx + Engine.player.x)/2; ty = (ty + Engine.player.y)/2; }
            } else if (distToE > 220) { 
                // 敵人在雷達邊緣：靠近攻擊
                tx = t.x; ty = t.y; 
            } else { 
                // 處於最佳射程 (150~220)：繞著敵人走位
                this.orbitAngle += dt * 2.0; 
                tx = t.x + Math.cos(this.orbitAngle) * 160; 
                ty = t.y + Math.sin(this.orbitAngle) * 160; 
            }
        } else { 
            // 沒有敵人時，繞著玩家散步
            this.orbitAngle += dt * 1.0; 
            tx = Engine.player.x + Math.cos(this.orbitAngle) * 80; 
            ty = Engine.player.y + Math.sin(this.orbitAngle) * 80; 
        }
        
        let dx = tx - this.x, dy = ty - this.y, distToT = Math.hypot(dx, dy), px = this.x, py = this.y;
        
        // 防抖動：10px 容差死區 (Deadzone)
        if (distToT > 10) { 
            let s = this.getMoveSpeed() * dt * 60;
            // 沒敵人的時候當作在散步，放慢腳步
            if (!t && distToP < 150) s *= 0.4;
            
            // 防暴衝：單次步數不超過目標距離
            let md = Math.min(distToT, s);
            px += (dx/distToT) * md; py += (dy/distToT) * md; 
            
            // 平滑轉向 (Lerp)，讓視線不會一秒來回翻轉十次
            this.dirX += ((dx/distToT) - this.dirX) * 8 * dt;
            this.dirY += ((dy/distToT) - this.dirY) * 8 * dt;
            let curLen = Math.hypot(this.dirX, this.dirY) || 1;
            this.dirX /= curLen; this.dirY /= curLen;
        }
        
        this.handleObstacles(px, py); this.updateSkills(dt);
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y); 
        if (this.state === 'leaving') ctx.globalAlpha = Math.max(0, this.leaveTimer / 10);
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 15, this.radius, this.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; if(this.dirX < 0) ctx.scale(-1, 1); ctx.fillText(this.emoji, 0, 0); ctx.restore();
        if (this.state === 'active') { ctx.fillStyle = '#333'; ctx.fillRect(this.x - 15, this.y - 25, 30, 4); ctx.fillStyle = '#22c55e'; ctx.fillRect(this.x - 15, this.y - 25, 30 * (this.hp/this.getMaxHp()), 4); }
    }
}

class Projectile {
    constructor(x, y, dx, dy, s, dmg, aoe, type, color, faction) {
        this.x = x; this.y = y; this.dx = dx; this.dy = dy; this.speed = s; this.dmg = dmg; this.aoeMult = aoe; this.type = type; this.color = color; this.faction = faction;
        this.radius = 5 * aoe; this.life = 2.0; this.isDead = false; this.pierce = 0; this.hitTargets = new Set(); this.bounces = 0;
    }
    update(dt) {
        if (this.boomerang && this.life < this.returnTime && this.owner && !this.owner.isDead) {
            let bx = this.owner.x - this.x, by = this.owner.y - this.y, bd = Math.hypot(bx, by); if(bd < 20) { this.isDead = true; return; }
            this.dx = bx/bd; this.dy = by/bd; this.hitTargets.clear();
        }
        this.x += this.dx * this.speed * dt; this.y += this.dy * this.speed * dt; this.life -= dt; if(this.life <= 0) this.isDead = true;

        for(let obs of Engine.obstacles) {
            let d = Math.hypot(this.x - obs.x, this.y - obs.y);
            if(d < this.radius + obs.radius) {
                let nextD = Math.hypot((this.x + this.dx) - obs.x, (this.y + this.dy) - obs.y);
                if (nextD >= d) continue; 
                
                if(this.type === 'magic_explosive') { this.explode(); return; }
                if(this.pierce > 0 || this.tryRicochet()) continue;
                this.isDead = true; return;
            }
        }
        for(let e of Engine.getAllTargets(this.faction)) {
            if(this.hitTargets.has(e)) continue;
            if(Math.hypot(e.x - this.x, e.y - this.y) < this.radius + e.radius) {
                let actualType = this.type.includes('magic') ? 'magic' : (this.type.includes('assassination') ? 'assassination' : 'melee');
                let finalDmg = this.dmg; if (this.faction === 'enemy' && e.mods && e.mods.passive_ranged_def && Math.random() < 0.25) { finalDmg *= 0.5; addFloatingText('防禦!', e.x, e.y - 30, '#94a3b8'); }
                Engine.applyDamage(e, finalDmg, actualType, this.faction); this.hitTargets.add(e);
                
                if (this.type === 'magic_explosive') { this.explode(); break; }
                if (this.tryRicochet()) continue;
                if(this.pierce > 0) this.pierce--; else { this.isDead = true; break; }
            }
        }
    }
    explode() {
        let expRange = 50 * this.aoeMult; createRingExplosion(this.x, this.y, '#ef4444', expRange);
        Engine.getAllTargets(this.faction).forEach(e => { if(Math.hypot(e.x - this.x, e.y - this.y) <= expRange) Engine.applyDamage(e, this.dmg*0.5, 'magic', this.faction); });
        this.isDead = true;
    }
    tryRicochet() {
        if(this.faction === 'player' && Engine.player.mods.passive_ricochet && this.bounces < 1 && !this.boomerang) {
            this.bounces++; let nextT = Engine.getClosestTarget(this.x, this.y, this.faction, 400, this.hitTargets);
            if(nextT) { let ndx = nextT.x - this.x, ndy = nextT.y - this.y, ndist = Math.hypot(ndx, ndy); this.dx = ndx/ndist; this.dy = ndy/ndist; return true; }
        }
        return false;
    }
    draw() {
        ctx.fillStyle = this.color; ctx.beginPath();
        if(this.isKnife) { let a = this.boomerang ? Engine.frameCount * 0.5 : Math.atan2(this.dy, this.dx); ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(a); ctx.moveTo(10, 0); ctx.lineTo(-5, 5); ctx.lineTo(-5, -5); ctx.restore(); } 
        else { ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); } ctx.fill();
    }
}

class PersistentAoe {
    constructor(owner, radius, duration, dmgPerTick, type, color, faction, pull = false) {
        this.owner = owner; this.radius = radius; this.life = duration; this.dmg = dmgPerTick; this.type = type; this.color = color; this.faction = faction; this.pull = pull; this.tickRate = 0.25; this.tickTimer = 0; this.isDead = false;
    }
    update(dt) {
        this.life -= dt; if(this.life <= 0) { this.isDead = true; return; } this.tickTimer -= dt;
        if(this.tickTimer <= 0) {
            this.tickTimer = this.tickRate;
            Engine.getAllTargets(this.faction).forEach(e => {
                if(Math.hypot(e.x - this.owner.x, e.y - this.owner.y) <= this.radius + e.radius) {
                    Engine.applyDamage(e, this.dmg, this.type, this.faction);
                    if(this.pull && e.speedMod !== undefined) { let pdx = this.owner.x - e.x, pdy = this.owner.y - e.y, pdist = Math.hypot(pdx, pdy); if(pdist > 10) { e.x += (pdx/pdist)*10; e.y += (pdy/pdist)*10; } }
                }
            });
        }
    }
    draw() { ctx.strokeStyle = this.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(this.owner.x, this.owner.y, this.radius, 0, Math.PI*2); ctx.stroke(); ctx.fillStyle = this.color.replace(')', ', 0.2)').replace('rgb', 'rgba'); ctx.fill(); }
}
class MeleeArcVisual {
    constructor(x, y, angle, range, arcAngle, color) { this.x = x; this.y = y; this.angle = angle; this.range = range; this.arcAngle = arcAngle; this.color = color; this.life = 0.2; this.maxLife = 0.2; this.isDead = false; }
    update(dt) { this.life -= dt; if(this.life <= 0) this.isDead = true; }

}

function hashCoord(x, y) { return (Math.abs(Math.sin(x * 12.9898 + y * 78.233) * 43758.5453)) % 1; }
function addFloatingText(t, x, y, c, s=16) { Engine.floatingTexts.push({ text: t, x: x, y: y, color: c, size: s, life: 1.0, dy: -30 }); }
function addParticle(x, y, c, cnt=1) { for (let i = 0; i < cnt; i++) { let a = Math.random()*Math.PI*2, s = Math.random()*50+20; Engine.particles.push({ type: 'dot', x: x, y: y, dx: Math.cos(a)*s, dy: Math.sin(a)*s, color: c, size: Math.random()*3+1, life: Math.random()*0.5+0.2, maxLife: 0.7 }); } }
function createRingExplosion(x, y, c, mr=50) { Engine.particles.push({ type: 'ring', x: x, y: y, color: c, radius: 5, maxRadius: mr, life: 0.3, maxLife: 0.3 }); }

const MapSystem = {
    updateChunks: function(px, py) {
        let cx = Math.floor(px / 500), cy = Math.floor(py / 500); Engine.obstacles = []; let needed = new Set();
        for(let i=-1; i<=1; i++) {
            for(let j=-1; j<=1; j++) {
                let key = `${cx+i},${cy+j}`; needed.add(key);
                if(!Engine.loadedChunks[key]) {
                    let obs = [], sc = Math.floor(hashCoord(cx+i, cy+j) * 4) + 2; 
                    for(let k=0; k<sc; k++) { let rx = hashCoord(cx+i+k, cy+j)*500, ry = hashCoord(cx+i, cy+j+k)*500, isTree = hashCoord(cx*k, cy*k) > 0.5; obs.push({ x: (cx+i)*500+rx, y: (cy+j)*500+ry, type: isTree ? '🌲' : '🪨', radius: isTree ? 25 : 20 }); }
                    Engine.loadedChunks[key] = obs;
                }
                Engine.obstacles.push(...Engine.loadedChunks[key]);
            }
        }
        for (let key in Engine.loadedChunks) { if (!needed.has(key)) delete Engine.loadedChunks[key]; }
    },
    spawnEnemy: function() {
        if(Engine.gameState.bossSpawned) return;
        
        // 隨機 BOSS 生成系統
        if(Engine.gameState.kills >= Engine.gameState.bossReq) {
            let arch = DB.BOSS_ARCHETYPES[Math.floor(Math.random() * DB.BOSS_ARCHETYPES.length)];
            let emj = DB.BOSS_EMOJIS[Math.floor(Math.random() * DB.BOSS_EMOJIS.length)];
            
            Engine.enemies.push(new Enemy('boss', null, null, arch, emj));
            Engine.gameState.bossSpawned = true;
            addFloatingText(`⚠️ BOSS [${arch.name}] 出現!`, Engine.player.x, Engine.player.y - 150, '#ef4444', 32);
            return;
        }
        
        let pool = DB.MONSTERS; 
        Engine.enemies.push(new Enemy(pool[Math.floor(Math.random() * pool.length)].type));
    },
    recruitMercenary: function(emoji) {
        let active = Engine.partyMercenaries.filter(m => m.state === 'active');
        if (active.length >= 1) { active[0].state = 'leaving'; addFloatingText('離隊休息', active[0].x, active[0].y - 30, '#94a3b8'); }
        Engine.partyMercenaries.push(new Mercenary(emoji));
    }
};

const SaveSystem = {
    memorySave: null,
    checkLocal: function() {
        try {
            if (localStorage.getItem(SAVE_KEY) || this.memorySave) document.getElementById('btnContinue').classList.remove('hidden');
            else document.getElementById('btnContinue').classList.add('hidden');
        } catch(e) {
            if (this.memorySave) document.getElementById('btnContinue').classList.remove('hidden');
            else document.getElementById('btnContinue').classList.add('hidden');
        }
    },
    save: function() {
        if (!Engine.isGameRunning) return; 
        const data = { pC: Engine.player.playerClass, l: Engine.player.level, x: Engine.player.xp, rx: Engine.player.reqXp, s: Engine.player.sp, hp: Engine.player.hp, uN: Engine.unlockedNodes, gS: Engine.gameState };
        let saveString = JSON.stringify(data);
        this.memorySave = saveString; 
        try { localStorage.setItem(SAVE_KEY, saveString); } catch(e) {}
        this.checkLocal();
    },
    load: function() { 
        let s = this.memorySave;
        try { s = localStorage.getItem(SAVE_KEY) || s; } catch(e) {}
        if(s) { this.startFromData(JSON.parse(s)); } 
    },
    export: function() { 
        let s = this.memorySave;
        try { s = localStorage.getItem(SAVE_KEY) || s; } catch(e) {}
        if (!s) return UI.showModal({title:'錯誤', msg:'沒有找到存檔！'});
        try { UI.copyToClipboard(btoa(unescape(encodeURIComponent(s)))); UI.showModal({title:'匯出成功', msg:'存檔代碼已複製到剪貼簿！'}); } 
        catch (e) { UI.showModal({title:'匯出失敗', msg:'剪貼簿權限遭拒絕！'}); }
    },
    import: function() { 
        UI.showModal({ title: '匯入存檔', msg: '請貼上存檔代碼：', type: 'prompt', onConfirm: (val) => { 
            if(!val) return; 
            try { 
                let d = JSON.parse(decodeURIComponent(escape(atob(val)))); 
                if(d && d.pC) { this.memorySave = JSON.stringify(d); try { localStorage.setItem(SAVE_KEY, this.memorySave); } catch(e) {} SaveSystem.checkLocal(); UI.showModal({ title: '成功', msg: '存檔匯入成功！' }); } 
                else throw 'Invalid'; 
            } catch(e) { UI.showModal({ title: '失敗', msg: '無效的存檔代碼！' }); } 
        }}); 
    },
    startFromData: function(d) {
        Engine.unlockedNodes = d.uN || {}; Engine.player = new Player(d.pC); Engine.player.level = d.l; Engine.player.xp = d.x; Engine.player.reqXp = d.rx; Engine.player.sp = d.s;
        Engine.player.recalculateStats(); Engine.player.hp = Math.min(d.hp, Engine.player.getMaxHp());
        Engine.gameState = { stage: d.gS.stage || 1, kills: d.gS.kills || 0, bossReq: d.gS.bossReq || 50, bossSpawned: d.gS.bossSpawned || false, stageColor: d.gS.stageColor || {h:220, s:50, l:15} };
        Engine.startEngine();
    }
};

    },

        if (dist < Math.min(GAME_WIDTH, GAME_HEIGHT)/2 - 30) return;
        let hw = GAME_WIDTH/2 - 30, hh = GAME_HEIGHT/2 - 30, slope = dy / dx, ix, iy;
        if (Math.abs(slope) > hh / hw) { iy = dy > 0 ? GAME_HEIGHT/2 + hh : GAME_HEIGHT/2 - hh; ix = GAME_WIDTH/2 + (iy - GAME_HEIGHT/2) / slope; } 
        else { ix = dx > 0 ? GAME_WIDTH/2 + hw : GAME_WIDTH/2 - hw; iy = GAME_HEIGHT/2 + (ix - GAME_WIDTH/2) * slope; }
        ctx.fillStyle = c; ctx.beginPath(); ctx.arc(ix, iy, 18, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(emoji, ix, iy);

    copyToClipboard: function(text) { const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); },
    openTree: function() { if(!Engine.isGameRunning) return; Engine.isPaused = true; document.getElementById('skillTreeModal').classList.remove('hidden'); this.buildTree(); document.getElementById('treeScrollWrapper').scrollLeft = DB.SKILL_TREE['core'].x - window.innerWidth / 2; document.getElementById('treeScrollWrapper').scrollTop = DB.SKILL_TREE['core'].y - window.innerHeight / 2; },
    closeTree: function() { Engine.isPaused = false; document.getElementById('skillTreeModal').classList.add('hidden'); document.getElementById('nodeInfoPanel').classList.add('translate-y-full'); },
    resetTalents: function() { this.showModal({ title: '重置天賦', msg: '確定要退回所有天賦點數嗎？', type: 'prompt', confirmText: '確認', onConfirm: () => { let sn = Engine.player.playerClass === 'mage' ? 'm_start' : (Engine.player.playerClass === 'rogue' ? 'r_start' : 'b_start'), ref = 0; for(let id in Engine.unlockedNodes) { if(id !== sn) ref += Engine.unlockedNodes[id]; } Engine.unlockedNodes = { [sn]: 1 }; Engine.player.sp += ref; Engine.player.recalculateStats(); this.buildTree(); SaveSystem.save(); } }); },
    treeLoop: function() {
        if(!Engine.isPaused || document.getElementById('skillTreeModal').classList.contains('hidden')) return;

    },
    buildTree: function() {
        let tw = document.getElementById('treeContainer'), tl = document.getElementById('treeLines');
        tw.querySelectorAll('.skill-node').forEach(n => n.remove()); tl.innerHTML = ''; let drawn = new Set(), avail = new Set();
        document.getElementById('treeSp').innerText = Engine.player.sp;
        if (Engine.player.sp > 0) {
            for(let id in DB.SKILL_TREE) {
                if (Engine.unlockedNodes[id] > 0) continue; let canUnlock = false;
                for (let l of (DB.SKILL_TREE[id].links || [])) if (Engine.unlockedNodes[l] > 0) canUnlock = true;
                for (let uid in Engine.unlockedNodes) if (DB.SKILL_TREE[uid].links && DB.SKILL_TREE[uid].links.includes(id)) canUnlock = true;
                if (canUnlock) avail.add(id);
            }
        }
        for(let id in DB.SKILL_TREE) {
            let node = DB.SKILL_TREE[id];
            if(node.links) {
                node.links.forEach(tid => {
                    let t = DB.SKILL_TREE[tid];
                    if(t) {
                        let lk = [id, tid].sort().join('-');
                        if(!drawn.has(lk)) {
                            let line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', node.x); line.setAttribute('y1', node.y); line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
                            line.setAttribute('stroke', (Engine.unlockedNodes[id]>0 && Engine.unlockedNodes[tid]>0) ? '#eab308' : '#334155'); line.setAttribute('stroke-width', '4');
                            tl.appendChild(line); drawn.add(lk);
                        }
                    }
                });
            }
            let el = document.createElement('div'), lvl = Engine.unlockedNodes[id] || 0, isS = node.effects.skills !== undefined;
            el.className = 'skill-node';
            if (id === 'core') el.classList.add('node-class-c'); else if (id.startsWith('m')) el.classList.add('node-class-m'); else if (id.startsWith('r')) el.classList.add('node-class-r'); else if (id.startsWith('b')) el.classList.add('node-class-b');
            if(lvl > 0) el.classList.add('node-unlocked'); else if (avail.has(id)) el.classList.add('node-available'); else el.classList.add('node-locked');
            el.style.left = `${node.x}px`; el.style.top = `${node.y}px`; el.id = `node-${id}`;
            let words = node.name.split(''); el.innerHTML = words.length >= 2 ? `${words[0]}${words[1]}<br>${words[2]||''}${words[3]||''}` : words[0];
            
            el.addEventListener('click', (e) => { if(!window.treeHasMoved) UI.selectNode(id); });
            el.addEventListener('touchend', (e) => { if(!window.treeHasMoved) UI.selectNode(id); e.preventDefault(); });
            
            if (lvl > 0 && isS) { let b = document.createElement('div'); b.className = 'absolute -top-2 -right-2 bg-blue-600 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center border-2 border-white shadow-md'; b.innerText = lvl; el.appendChild(b); }
            tw.appendChild(el);
        }
        if(this.selectedNodeId) this.selectNode(this.selectedNodeId);
    },
    selectNode: function(id) {
        this.selectedNodeId = id; let node = DB.SKILL_TREE[id]; document.getElementById('niTitle').innerText = node.name; document.getElementById('niDesc').innerText = node.desc;
        document.getElementById('nodeInfoPanel').classList.remove('translate-y-full');
        let lvl = Engine.unlockedNodes[id] || 0, isS = node.effects.skills !== undefined, isAvail = false, btn = document.getElementById('btnLearnNode');
        for (let l of (node.links || [])) if (Engine.unlockedNodes[l] > 0) isAvail = true;
        for (let uid in Engine.unlockedNodes) if (DB.SKILL_TREE[uid].links && DB.SKILL_TREE[uid].links.includes(id)) isAvail = true;

        btn.style.display = 'block';
        if (lvl > 0 && !isS) { btn.innerText = '已學習'; btn.disabled = true; btn.className = 'px-6 py-3 bg-gray-600 text-white rounded-lg font-bold cursor-not-allowed'; } 
        else if ((isAvail || (lvl > 0 && isS)) && Engine.player.sp > 0) { btn.innerText = lvl > 0 ? `升級至 Lv.${lvl + 1} (1 點)` : '學習 (1 點)'; btn.disabled = false; btn.className = 'px-6 py-3 bg-blue-600 hover:bg-blue-400 text-white rounded-lg font-bold active:scale-95 transition-transform shadow-[0_0_15px_#3b82f6]'; btn.onclick = () => { Engine.player.sp--; Engine.unlockedNodes[id] = (Engine.unlockedNodes[id] || 0) + 1; Engine.player.recalculateStats(); UI.buildTree(); SaveSystem.save(); }; } 
        else if (lvl > 0 && isS && Engine.player.sp === 0) { btn.innerText = `目前 Lv.${lvl}`; btn.disabled = true; btn.className = 'px-6 py-3 bg-gray-600 text-white rounded-lg font-bold cursor-not-allowed'; } 
        else { btn.style.display = 'none'; }
    }
};

// --- Joystick & Input ---
const joyArea = document.getElementById('joystickArea'), joyBase = document.getElementById('joystickBase'), joyStick = document.getElementById('joystickStick');
function joyStart(x, y) { if(Engine.isPaused || !Engine.isGameRunning) return; Engine.joystick.active = true; Engine.joystick.sx = x; Engine.joystick.sy = y; joyBase.style.display = 'block'; joyBase.style.left = `${x}px`; joyBase.style.top = `${y}px`; joyStick.style.transform = `translate(-50%, -50%)`; }
function joyMove(x, y) { if(!Engine.joystick.active) return; let dx = x - Engine.joystick.sx, dy = y - Engine.joystick.sy, d = Math.hypot(dx, dy), md = 40; if(d > md) { dx = (dx/d)*md; dy = (dy/d)*md; } joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; if(d > 0) { Engine.joystick.dx = dx/md; Engine.joystick.dy = dy/md; } }
function joyEnd() { Engine.joystick.active = false; Engine.joystick.dx = 0; Engine.joystick.dy = 0; joyBase.style.display = 'none'; }
joyArea.addEventListener('touchstart', e => joyStart(e.touches[0].clientX, e.touches[0].clientY)); joyArea.addEventListener('touchmove', e => joyMove(e.touches[0].clientX, e.touches[0].clientY)); joyArea.addEventListener('touchend', joyEnd); joyArea.addEventListener('touchcancel', joyEnd);
joyArea.addEventListener('mousedown', e => joyStart(e.clientX, e.clientY)); joyArea.addEventListener('mousemove', e => joyMove(e.clientX, e.clientY)); joyArea.addEventListener('mouseup', joyEnd); joyArea.addEventListener('mouseleave', joyEnd);

// --- Tree UI Dragging (Mouse & Touch) ---
const treeW = document.getElementById('treeScrollWrapper');
let isDraggingTree = false, startX, startY, sL, sT;
window.treeHasMoved = false;

treeW.addEventListener('mousedown', e => { isDraggingTree = true; window.treeHasMoved = false; startX = e.pageX - treeW.offsetLeft; startY = e.pageY - treeW.offsetTop; sL = treeW.scrollLeft; sT = treeW.scrollTop; });
treeW.addEventListener('mouseleave', () => isDraggingTree = false);
treeW.addEventListener('mouseup', () => { setTimeout(()=> isDraggingTree = false, 50); });
treeW.addEventListener('mousemove', e => { if(!isDraggingTree) return; window.treeHasMoved = true; e.preventDefault(); treeW.scrollLeft = sL - (e.pageX - treeW.offsetLeft - startX); treeW.scrollTop = sT - (e.pageY - treeW.offsetTop - startY); });

treeW.addEventListener('touchstart', e => { isDraggingTree = true; window.treeHasMoved = false; startX = e.touches[0].pageX - treeW.offsetLeft; startY = e.touches[0].pageY - treeW.offsetTop; sL = treeW.scrollLeft; sT = treeW.scrollTop; }, {passive: false});
treeW.addEventListener('touchend', () => { setTimeout(()=> isDraggingTree = false, 50); });
treeW.addEventListener('touchcancel', () => isDraggingTree = false);
treeW.addEventListener('touchmove', e => { if(!isDraggingTree) return; window.treeHasMoved = true; e.preventDefault(); treeW.scrollLeft = sL - (e.touches[0].pageX - treeW.offsetLeft - startX); treeW.scrollTop = sT - (e.touches[0].pageY - treeW.offsetTop - startY); }, {passive: false});

Engine.init();
</script>
