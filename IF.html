<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無限領域：天賦覺醒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f172a; color: white; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* 禁用預設滑動手勢 */
            user-select: none;
        }
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        #uiLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none;
        }
        .interactive { pointer-events: auto; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }
        
        #skillTreeModal, #mainMenu, #classSelectionScreen { z-index: 50; }
        
        #treeScrollWrapper {
            cursor: grab;
        }
        #treeScrollWrapper:active {
            cursor: grabbing;
        }

        #treeContainer {
            position: relative; width: 1500px; height: 1500px;
        }
        .skill-node {
            position: absolute; width: 56px; height: 56px;
            transform: translate(-50%, -50%); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            text-align: center; line-height: 1.1;
        }
        .node-locked { background: #334155; color: #ffffff; border: 2px solid #1e293b; }
        .node-available { background: #eab308; color: #1c1917; border: 2px solid #fef08a; animation: pulse 2s infinite; }
        .node-unlocked { background: #3b82f6; color: white; border: 2px solid #93c5fd; box-shadow: 0 0 15px #3b82f6; }
        
        .node-class-c { background: #eab308; color: #000; border-color: #fef08a; } 
        .node-class-m { background: #8b5cf6; border-color: #c4b5fd; }
        .node-class-r { background: #10b981; border-color: #6ee7b7; }
        .node-class-b { background: #ef4444; border-color: #fca5a5; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 15px #eab308; }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #joystickArea { position: absolute; width: 100%; height: 100%; pointer-events: auto; z-index: 5; }
        
        #hpBarContainer { width: 100%; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin-top: 5px;}
        #hpBar { width: 100%; height: 100%; background: linear-gradient(90deg, #ef4444, #f87171); transition: width 0.2s; }
        #xpBarContainer { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin-top: 5px;}
        #xpBar { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.2s; }

        #bossHpBarContainer { display: none; width: 80%; height: 16px; background: #334155; border-radius: 8px; overflow: hidden; margin: 10px auto; border: 2px solid #ef4444;}
        #bossHpBar { width: 100%; height: 100%; background: linear-gradient(90deg, #b91c1c, #ef4444); transition: width 0.2s; }

        #joystickBase {
            position: absolute; width: 100px; height: 100px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%); display: none; pointer-events: none;
        }
        #joystickStick {
            position: absolute; width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.6); top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="joystickArea"></div>
    <div id="joystickBase"><div id="joystickStick"></div></div>

    <!-- 遊戲中 UI -->

                <div class="text-lg font-bold text-yellow-400 drop-shadow-md">Lv <span id="uiLevel">1</span> (<span id="uiSp">0</span> 點)</div>
                <div id="hpBarContainer"><div id="hpBar"></div></div>
                <div id="xpBarContainer"><div id="xpBar"></div></div>
                <div id="buffStatus" class="mt-2 text-sm font-bold text-white drop-shadow-md flex gap-2"></div>
            </div>
            <div class="flex flex-col items-end">
                <div id="uiStageContainer" class="text-xl font-bold text-white drop-shadow-md">關卡 <span id="uiStage">1</span></div>
                <div id="uiKillsContainer" class="text-sm text-gray-300 drop-shadow-md">擊殺: <span id="uiKills">0</span> / <span id="uiBossReq">50</span></div>

            </div>
        </div>
        <div id="bossHpBarContainer"><div id="bossHpBar"></div></div>
    </div>

    <!-- 主選單 -->
    <div id="mainMenu" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 interactive">
        <h1 class="text-5xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 drop-shadow-lg text-center">無限領域<br><span class="text-3xl text-yellow-400">天賦覺醒</span></h1>
        <p class="text-gray-400 mb-10 text-center text-sm">手機直屏最佳體驗 / 支援鍵鼠操控</p>
        
        <div class="w-full max-w-sm flex flex-col gap-4">
            <button id="btnContinue" class="w-full py-4 bg-green-600 hover:bg-green-500 rounded-xl text-xl font-bold text-white shadow-lg transform active:scale-95 hidden">繼續旅程</button>
            <button id="btnNewGame" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl text-xl font-bold text-white shadow-lg transform active:scale-95">全新開局</button>
            <button id="btnArena" class="w-full py-4 bg-purple-600 hover:bg-purple-500 rounded-xl text-xl font-bold text-white shadow-lg transform active:scale-95">競技場決鬥</button>

                <div>
                    <h2 class="text-2xl font-bold text-red-400">戰士</h2>

            </div>
            <div class="glass-panel flex-1 flex flex-row items-center p-4 cursor-pointer hover:bg-slate-800 transition transform hover:scale-[1.02] active:scale-95" onclick="startGame('rogue')">

    <!-- Custom Modal System -->

<script>
const SAVE_KEY = 'awaken_survivor_save';
const CHUNK_SIZE = 500;

function hashCoordinate(x, y) {
    return (Math.abs(Math.sin(x * 12.9898 + y * 78.233) * 43758.5453)) % 1;
}

const customModal = document.getElementById('customModal');
const modalTitle = document.getElementById('modalTitle');
const modalMsg = document.getElementById('modalMsg');
const modalInput = document.getElementById('modalInput');
const modalBtnCancel = document.getElementById('modalBtnCancel');
const modalBtnConfirm = document.getElementById('modalBtnConfirm');

function showModal({ title, msg, type = 'alert', confirmText = '確認', onConfirm = null }) {
    modalTitle.innerText = title;
    modalMsg.innerText = msg;
    modalBtnConfirm.innerText = confirmText;
    
    if (type === 'prompt') {
        modalInput.classList.remove('hidden');
        modalInput.value = '';
        modalBtnCancel.classList.remove('hidden');
    } else {
        modalInput.classList.add('hidden');
        modalBtnCancel.classList.add('hidden');
    }

    customModal.classList.remove('hidden');

    modalBtnCancel.onclick = () => { customModal.classList.add('hidden'); };
    modalBtnConfirm.onclick = () => {
        customModal.classList.add('hidden');
        if (onConfirm) onConfirm(type === 'prompt' ? modalInput.value : null);
    };
}

function copyToClipboard(text) {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
}

function addFloatingText(text, x, y, color, size = 16) {
    floatingTexts.push({ text: text, x: x, y: y, color: color, size: size, life: 1.0, dy: -30 });
}

function addParticle(x, y, color, count = 1) {
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 50 + 20;
        particles.push({
            type: 'dot', x: x, y: y, dx: Math.cos(angle) * speed, dy: Math.sin(angle) * speed,
            color: color, size: Math.random() * 3 + 1, life: Math.random() * 0.5 + 0.2, maxLife: 0.7
        });
    }
}

function createRingExplosion(x, y, color, maxRadius = 50) {
    particles.push({ type: 'ring', x: x, y: y, color: color, radius: 5, maxRadius: maxRadius, life: 0.3, maxLife: 0.3 });
}

class MeleeArcVisual {
    constructor(x, y, angle, range, arcAngle, color) {
        this.x = x; this.y = y; this.angle = angle; this.range = range; this.arcAngle = arcAngle;
        this.color = color; this.life = 0.2; this.maxLife = 0.2; this.isDead = false;
    }
    update(dt) { this.life -= dt; if(this.life <= 0) this.isDead = true; }
    draw() {
        ctx.fillStyle = this.color; ctx.globalAlpha = this.life / this.maxLife; ctx.beginPath();
        ctx.moveTo(this.x, this.y); ctx.arc(this.x, this.y, this.range, this.angle - this.arcAngle/2, this.angle + this.arcAngle/2);
        ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1.0;
    }
}

class Shrine {
    constructor(x, y) {
        this.x = x; this.y = y; this.radius = 20; this.used = false;
        this.type = Math.random() > 0.5 ? 'heal' : 'buff';
        this.color = this.type === 'heal' ? '#22c55e' : '#eab308';
    }
    update(dt) {
        if(this.used) return;
        let dist = Math.hypot(player.x - this.x, player.y - this.y);
        if(dist < player.radius + this.radius) {
            this.used = true;
            if(this.type === 'heal') {
                player.heal(player.getMaxHp() * 0.5); addFloatingText('HP 恢復!', this.x, this.y - 20, this.color);
            } else {
                player.buffs.frenzy = 10.0; addFloatingText('狂熱!', this.x, this.y - 20, this.color);
            }
            createRingExplosion(this.x, this.y, this.color, 60);
        }
    }
    draw() {
        if(this.used) return;
        ctx.save(); ctx.translate(this.x, this.y); ctx.fillStyle = this.color;
        ctx.shadowColor = this.color; ctx.shadowBlur = 10; ctx.beginPath();
        ctx.moveTo(0, -this.radius); ctx.lineTo(this.radius, 0); ctx.lineTo(0, this.radius); ctx.lineTo(-this.radius, 0);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowBlur = 0; ctx.fillText('⛩️', 0, 0); ctx.restore();
    }
}

});

let unlockedNodes = {}; let selectedNodeId = null;

function checkLocalSave() {
    let save = localStorage.getItem(SAVE_KEY);
    if (save) document.getElementById('btnContinue').classList.remove('hidden');
    else document.getElementById('btnContinue').classList.add('hidden');
}

function saveGame() {
    if (!isGameRunning || isArena) return; 
    const data = {
        playerClass: player.playerClass, level: player.level, xp: player.xp, reqXp: player.reqXp, sp: player.sp, hp: player.hp,
        unlockedNodes: unlockedNodes, gameState: { stage: gameState.stage, kills: gameState.kills, bossReq: gameState.bossReq }
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data)); checkLocalSave();
}

function startFromData(data) {
    unlockedNodes = data.unlockedNodes || {}; player = new Player(data.playerClass);
    player.level = data.level; player.xp = data.xp; player.reqXp = data.reqXp; player.sp = data.sp;
    player.recalculateStats(); player.hp = Math.min(data.hp, player.getMaxHp());
    gameState.stage = data.gameState.stage || 1; gameState.kills = data.gameState.kills || 0; gameState.bossReq = data.gameState.bossReq || 50;
    startGameEngine();
}

function generateChunk(cx, cy) {
    if(isArena) return []; let obs = []; let seedCount = Math.floor(hashCoordinate(cx, cy) * 4) + 2; 
    for(let i=0; i<seedCount; i++) {
        let rx = hashCoordinate(cx + i, cy) * CHUNK_SIZE; let ry = hashCoordinate(cx, cy + i) * CHUNK_SIZE;
        let isTree = hashCoordinate(cx*i, cy*i) > 0.5;
        obs.push({ x: cx*CHUNK_SIZE + rx, y: cy*CHUNK_SIZE + ry, type: isTree ? '🌲' : '🪨', radius: isTree ? 25 : 20 });
    }
    return obs;
}

function updateMapChunks(px, py) {
    if(isArena) { obstacles = []; return; }
    let cx = Math.floor(px / CHUNK_SIZE); let cy = Math.floor(py / CHUNK_SIZE); obstacles = [];
    for(let i=-1; i<=1; i++) {
        for(let j=-1; j<=1; j++) {
            let key = `${cx+i},${cy+j}`;
            if(!loadedChunks[key]) loadedChunks[key] = generateChunk(cx+i, cy+j);
            obstacles.push(...loadedChunks[key]);
        }
    }
}

class BaseCharacter {
    constructor() {
        this.x = 0; this.y = 0; this.radius = 18; this.dirX = 1; this.dirY = 0;
        this.mods = {
            str: 0, agi: 0, int: 0, moveSpeed: 0, maxHp: 0, atkSpeed: 0, aoe: 0, critRate: 0, critDmg: 0, dodge: 0, hpRegen: 0,
            passive_lifesteal: false, passive_multishot: false, passive_poison: false, passive_multicast: false, passive_pierce: false,
            passive_mana_shield: false, passive_resonance: false, passive_counter: false, passive_ranged_def: false,
            passive_toxic_bloom: false, passive_shadow_step: false, passive_ricochet: false, passive_tremor: false, passive_mana_cascade: false
        };
        this.buffs = { frenzy: 0, slow: 0, shadow: 0 }; this.skills = []; this.skillLevels = {};
        this.faction = 'player'; this.isDead = false; this.regenTimer = 1.0; this.shieldCooldown = 0; this.hasShield = false;
    }
    getStr() { return this.baseStr + this.mods.str; }
    getAgi() { return this.baseAgi + this.mods.agi; }
    getInt() { return this.baseInt + this.mods.int; }
    getMaxHp() { return this.baseMaxHp + this.mods.maxHp + (this.getStr() * 5); }
    getMoveSpeed() { let speed = this.baseMoveSpeed * (1 + this.mods.moveSpeed); if (this.buffs.slow > 0) speed *= 0.5; if (this.buffs.shadow > 0) speed *= 1.5; return speed; }
    getCritRate() { return Math.min(0.7, this.baseCritRate + this.mods.critRate + (this.getAgi() * 0.005) + (this.buffs.shadow > 0 ? 0.3 : 0)); }
    getCritDmg() { return this.baseCritDmg + this.mods.critDmg + (this.getStr() * 0.01); }
    getDodgeRate() { return Math.min(0.7, this.mods.dodge + (this.getAgi() * 0.005)); }
    getMeleeDmg() { return 10 + this.getStr() * 2; }
    getAssassinationDmg() { return 8 + this.getAgi() * 2.5; }
    getMagicDmg() { return 12 + this.getInt() * 2.2; }
    getSpeedMult() { let mult = 1 + this.mods.atkSpeed; if (this.buffs.frenzy > 0) mult += 1.0; return mult; } 
    getAoeMult() { return this.baseRange + this.mods.aoe + (this.getInt() * 0.01); }
    heal(amount) { if(this.hp < this.getMaxHp()){ this.hp = Math.min(this.getMaxHp(), this.hp + amount); } }
    takeDamage(amount) {
        if (Math.random() < this.getDodgeRate()) {
            addFloatingText('閃避!', this.x, this.y - 20, '#10b981');
            if (this.mods.passive_shadow_step) this.buffs.shadow = 2.0; return;
        }
        if (this.hasShield) {
            this.hasShield = false; this.shieldCooldown = 10.0;
            addFloatingText('護盾吸收!', this.x, this.y - 20, '#60a5fa'); createRingExplosion(this.x, this.y, '#60a5fa', 40); return;
        }
        this.hp -= amount; addParticle(this.x, this.y, '#ef4444', 5);
        if (this.hp <= 0 && !this.isDead) { this.hp = 0; this.die(); }
    }
    die() { this.isDead = true; }
    updateSkills(dt) {
        if(this.mods.hpRegen > 0) { this.regenTimer -= dt; if(this.regenTimer <= 0) { this.heal(this.mods.hpRegen); this.regenTimer = 1.0; } }
        if (this.mods.passive_mana_shield && !this.hasShield) { this.shieldCooldown -= dt; if (this.shieldCooldown <= 0) this.hasShield = true; }
        for(let key in this.buffs) { if(this.buffs[key] > 0) this.buffs[key] -= dt; }
        this.skills.forEach(skill => { skill.timer -= dt * this.getSpeedMult(); if (skill.timer <= 0) { skill.execute(this); skill.timer = skill.cooldown; } if (skill.updateQueue) skill.updateQueue(dt, this); });
    }
    handleObstacles(proposedX, proposedY) {
        for(let obs of obstacles) {
            let dx = proposedX - obs.x; let dy = proposedY - obs.y; let dist = Math.hypot(dx, dy);
            if(dist < this.radius + obs.radius) {
                if(dist === 0) { dx = 1; dist = 1; }
                let overlap = this.radius + obs.radius - dist;
                proposedX += (dx/dist) * overlap; proposedY += (dy/dist) * overlap;
            }
        }
        if (isArena) {
            let d = Math.hypot(proposedX, proposedY);
            if(d > 800 - this.radius) { proposedX = (proposedX/d) * (800 - this.radius); proposedY = (proposedY/d) * (800 - this.radius); }
        }
        this.x = proposedX; this.y = proposedY;
    }
}

class Player extends BaseCharacter {
    constructor(playerClass) {
        super(); this.faction = 'player'; this.level = 1; this.xp = 0; this.reqXp = 35; this.sp = 0; 
        this.baseStr = 5; this.baseAgi = 5; this.baseInt = 5; this.baseMoveSpeed = 3.0; this.baseMaxHp = 100;
        this.baseRange = 1.0; this.baseCritRate = 0.05; this.baseCritDmg = 1.5;
        this.unlockedSkillIds = []; this.playerClass = playerClass; this.applyClassStart();
    }
    applyClassStart() {
        let startNode = '';
        if (this.playerClass === 'mage') { startNode = 'm_start'; this.emoji = '🧙‍♂️'; this.baseMoveSpeed = 2.0; this.baseMaxHp = 50; this.baseRange = 1.5; this.baseInt = 15; this.baseStr = 3; this.baseAgi = 3; }
        else if (this.playerClass === 'rogue') { startNode = 'r_start'; this.emoji = '🥷'; this.baseMoveSpeed = 4.5; this.baseMaxHp = 90; this.baseRange = 1.0; this.baseAgi = 15; this.baseStr = 5; this.baseInt = 3; }
        else if (this.playerClass === 'warrior') { startNode = 'b_start'; this.emoji = '🛡️'; this.baseMoveSpeed = 3.0; this.baseMaxHp = 150; this.baseRange = 1.0; this.baseStr = 15; this.baseAgi = 4; this.baseInt = 2; }
        if(!unlockedNodes[startNode]) unlockedNodes[startNode] = 1;
        this.recalculateStats(); this.hp = this.getMaxHp();
    }
    recalculateStats() {
        for (let key in this.mods) { if(typeof this.mods[key] === 'boolean') this.mods[key] = false; else this.mods[key] = 0; }
        this.skillLevels = {}; let newSkills = new Set();
        for(let nodeId in unlockedNodes) {
            let level = unlockedNodes[nodeId]; let effects = SKILL_TREE[nodeId].effects;
            for(let k in effects) {
                if (k === 'skills') { effects[k].forEach(s => { this.skillLevels[s] = (this.skillLevels[s] || 0) + level; newSkills.add(s); }); } 
                else if (typeof effects[k] === 'boolean') { this.mods[k] = true; } 
                else { this.mods[k] += effects[k]; }
            }
        }
        newSkills.forEach(skillId => { if (!this.unlockedSkillIds.includes(skillId)) { this.unlockedSkillIds.push(skillId); this.skills.push(initSkill(skillId)); } });
        if (this.hp > this.getMaxHp()) this.hp = this.getMaxHp(); updateUI();
    }
    update(dt) {
        let proposedX = this.x; let proposedY = this.y;
        let moveDx = 0; let moveDy = 0;

        // Keyboard support natively calculated here to prevent jitter/locking
        let kbDx = 0; let kbDy = 0;
        if(keys['w'] || keys['arrowup']) kbDy -= 1;
        if(keys['s'] || keys['arrowdown']) kbDy += 1;
        if(keys['a'] || keys['arrowleft']) kbDx -= 1;
        if(keys['d'] || keys['arrowright']) kbDx += 1;
        let kbDist = Math.hypot(kbDx, kbDy);

        if (joystick.active) {
            moveDx = joystick.dx; moveDy = joystick.dy;
        } else if (kbDist > 0) {
            moveDx = kbDx / kbDist; moveDy = kbDy / kbDist;
        }

        if (moveDx !== 0 || moveDy !== 0) {
            let speed = this.getMoveSpeed() * dt * 60; 
            proposedX += moveDx * speed; proposedY += moveDy * speed;
            this.dirX = moveDx; this.dirY = moveDy;
        }
        
        this.handleObstacles(proposedX, proposedY); this.updateSkills(dt);
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        if(this.buffs.frenzy > 0) { ctx.beginPath(); ctx.arc(0, 0, this.radius + 10, 0, Math.PI*2); ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)'; ctx.lineWidth = 4; ctx.stroke(); }
        if(this.buffs.slow > 0) { ctx.beginPath(); ctx.arc(0, 0, this.radius + 10, 0, Math.PI*2); ctx.strokeStyle = 'rgba(139, 92, 246, 0.5)'; ctx.lineWidth = 4; ctx.stroke(); }
        if(this.hasShield) { ctx.beginPath(); ctx.arc(0, 0, this.radius + 8, 0, Math.PI*2); ctx.strokeStyle = 'rgba(96, 165, 250, 0.8)'; ctx.lineWidth = 3; ctx.stroke(); }
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 15, this.radius, this.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
        
        ctx.globalAlpha = (this.buffs.shadow > 0) ? 0.5 : 1.0;
        ctx.font = '32px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if(this.dirX < 0) ctx.scale(-1, 1);
        ctx.fillText(this.emoji, 0, 0); ctx.restore();
    }
    die() { super.die(); triggerGameOver(false); }
    gainXp(amount) {
        if(isArena) return; this.xp += amount;
        while (this.xp >= this.reqXp) { this.xp -= this.reqXp; this.levelUp(); }
        updateUI();
    }
    levelUp() {
        this.level++; this.sp++; 
        this.reqXp = Math.floor(20 + (this.level * 10) + Math.pow(this.level, 1.6) * 5); // 平滑曲線
        this.hp = this.getMaxHp(); 
        addFloatingText('Level Up!', this.x, this.y - 40, '#eab308', 24);
        createRingExplosion(this.x, this.y, '#eab308'); updateTreeUI(); saveGame();
    }
}

class ArenaBoss extends BaseCharacter {
    constructor(data) {
        super(); this.faction = 'enemy'; this.emoji = '👿';
        this.baseStr = 5; this.baseAgi = 5; this.baseInt = 5; this.baseMoveSpeed = 3.0; this.baseMaxHp = 100;
        this.baseRange = 1.0; this.baseCritRate = 0.05; this.baseCritDmg = 1.5;
        let pClass = data.playerClass;
        if (pClass === 'mage') { this.emoji = '🧙‍♀️'; this.baseMoveSpeed=2.0; this.baseMaxHp=50; this.baseRange=1.5; this.baseInt=15; this.baseStr=3; this.baseAgi=3; }
        else if (pClass === 'rogue') { this.emoji = '🦹'; this.baseMoveSpeed=4.5; this.baseMaxHp=90; this.baseRange=1.0; this.baseAgi=15; this.baseStr=5; this.baseInt=3; }
        else if (pClass === 'warrior') { this.emoji = '🦾'; this.baseMoveSpeed=3.0; this.baseMaxHp=150; this.baseRange=1.0; this.baseStr=15; this.baseAgi=4; this.baseInt=2; }
        let nodes = data.unlockedNodes || {};
        for(let nodeId in nodes) {
            let level = nodes[nodeId]; let effects = SKILL_TREE[nodeId].effects;
            for(let k in effects) {
                if (k === 'skills') { effects[k].forEach(s => { this.skillLevels[s] = (this.skillLevels[s] || 0) + level; if (!this.skills.find(x => x.id === s)) this.skills.push(initSkill(s)); }); } 
                else if (typeof effects[k] === 'boolean') this.mods[k] = true; else this.mods[k] += effects[k];
            }
        }
        this.mods.maxHp += (this.getMaxHp() * 10); this.hp = this.getMaxHp(); this.x = 200; this.y = -200;
        document.getElementById('bossHpBarContainer').style.display = 'block';
    }
    update(dt) {
        let dx = player.x - this.x; let dy = player.y - this.y; let dist = Math.hypot(dx, dy);
        let proposedX = this.x; let proposedY = this.y;
        if (dist > 150) { 
            let moveDx = dx/dist; let moveDy = dy/dist;
            let speed = this.getMoveSpeed() * dt * 60; 
            proposedX += moveDx * speed; proposedY += moveDy * speed; this.dirX = moveDx; this.dirY = moveDy;
        }
        this.handleObstacles(proposedX, proposedY); this.updateSkills(dt);
        document.getElementById('bossHpBar').style.width = `${(this.hp / this.getMaxHp()) * 100}%`;
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 15, this.radius, this.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0; ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if(this.dirX < 0) ctx.scale(-1, 1);
        ctx.fillText(this.emoji, 0, 0); ctx.restore();
        ctx.fillStyle = 'rgba(239, 68, 68, 0.2)'; ctx.beginPath(); ctx.arc(this.x, this.y, 45, 0, Math.PI*2); ctx.fill();
    }
    die() { super.die(); triggerGameOver(true); }
}

        this.baseMaxHp = 100 + gameState.stage * 50; this.hp = this.baseMaxHp;
        this.baseMoveSpeed = 3.5; this.baseRange = 1.0;
        let possibleSkills = ['magic_missile', 'fireball', 'throwing_knife', 'heavy_strike'];
        let sid = possibleSkills[Math.floor(Math.random() * possibleSkills.length)];
        this.skills.push(initSkill(sid)); this.skillLevels[sid] = 1 + Math.floor(gameState.stage / 2);
        this.baseInt = 5 + gameState.stage*2; this.baseStr = 5 + gameState.stage*2; this.baseAgi = 5 + gameState.stage*2;
        this.orbitAngle = Math.random() * Math.PI * 2;
    }
    update(dt) {
        let target = getTarget(this.x, this.y, 'player'); let destX, destY;
        if (target) {
            let dxT = target.x - this.x; let dyT = target.y - this.y; let distT = Math.hypot(dxT, dyT);
            if (distT > 200) { destX = target.x; destY = target.y; } // 追敵
            else if (distT < 150) { destX = this.x - dxT; destY = this.y - dyT; } // 太近則風箏退後
            else { this.orbitAngle += dt * 1.5; destX = target.x + Math.cos(this.orbitAngle) * 160; destY = target.y + Math.sin(this.orbitAngle) * 160; } // 安全距離繞圈
            
            // 避免離玩家太遠
            if (Math.hypot(player.x - this.x, player.y - this.y) > 350) { destX = player.x; destY = player.y; }
        } else {
            this.orbitAngle += dt * 1.0;
            destX = player.x + Math.cos(this.orbitAngle) * 80; destY = player.y + Math.sin(this.orbitAngle) * 80;
        }
        
        let dx = destX - this.x; let dy = destY - this.y; let dist = Math.hypot(dx, dy);
        let proposedX = this.x; let proposedY = this.y;
        if (dist > 5) { // 防抖動
            let speed = this.getMoveSpeed() * dt * 60; let moveDist = Math.min(dist, speed);
            proposedX += (dx/dist) * moveDist; proposedY += (dy/dist) * moveDist;
            this.dirX = dx/dist; this.dirY = dy/dist;
        }
        this.handleObstacles(proposedX, proposedY); this.updateSkills(dt);
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 15, this.radius, this.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0; ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if(this.dirX < 0) ctx.scale(-1, 1);
        ctx.fillText(this.emoji, 0, 0); ctx.restore();
        ctx.fillStyle = '#333'; ctx.fillRect(this.x - 15, this.y - 25, 30, 4);
        ctx.fillStyle = '#22c55e'; ctx.fillRect(this.x - 15, this.y - 25, 30 * (this.hp/this.getMaxHp()), 4);
    }
}

function recruitMercenary(emoji) {
    if (partyMercenaries.length >= 1) { // 限制只能帶一隻
        let old = partyMercenaries.shift();
        let mm = new MapMercenary(old.x, old.y); mm.emoji = old.emoji; mm.life = 10.0;
        mapMercenaries.push(mm);
    }
    partyMercenaries.push(new Mercenary(emoji));
}

function getTarget(casterX, casterY, faction, maxRange = Infinity, excludeSet = null) {
    let nearest = null; let minDist = Infinity; let candidates = [];
    if (faction === 'player') { candidates = enemies; if (arenaBoss && !arenaBoss.isDead) candidates.push(arenaBoss); } 
    else { candidates = [player, ...partyMercenaries]; }
    for(let e of candidates) {
        if(e && !e.isDead && (!excludeSet || !excludeSet.has(e))) {
            let dist = Math.hypot(e.x - casterX, e.y - casterY);
            if(dist < minDist && dist <= maxRange) { minDist = dist; nearest = e; }
        }
    }
    return nearest;
}

class Projectile {
    constructor(x, y, dx, dy, speed, dmg, aoe, type, color, faction) {
        this.x = x; this.y = y; this.dx = dx; this.dy = dy; this.speed = speed; this.dmg = dmg; this.aoeMult = aoe;
        this.type = type; this.color = color; this.faction = faction;
        this.radius = 5 * aoe; this.life = 2.0; this.isDead = false; this.pierce = 0;
        this.hitTargets = new Set(); this.bounces = 0;
    }
    update(dt) {
        if (this.boomerang) {
            if(this.life < this.returnTime && this.owner && !this.owner.isDead) {
                let bx = this.owner.x - this.x; let by = this.owner.y - this.y; let bdist = Math.hypot(bx, by);
                if(bdist < 20) { this.isDead = true; return; }
                this.dx = bx/bdist; this.dy = by/bdist; this.hitTargets.clear();
            }
        }
        
        this.x += this.dx * this.speed * dt; this.y += this.dy * this.speed * dt;
        this.life -= dt; if(this.life <= 0) this.isDead = true;

        for(let obs of obstacles) {
            if(Math.hypot(obs.x - this.x, obs.y - this.y) < this.radius + obs.radius) {
                if(this.type === 'magic_explosive') {
                    let expRange = 50 * this.aoeMult; createRingExplosion(this.x, this.y, '#ef4444', expRange);
                    let candidates = this.faction === 'player' ? [...enemies, arenaBoss] : [player, ...partyMercenaries];
                    candidates.forEach(e => { if(e && !e.isDead && Math.hypot(e.x - this.x, e.y - this.y) <= expRange) applyDamage(e, this.dmg*0.5, 'magic', this.faction); });
                    this.isDead = true; return;
                }
                if (this.tryRicochet()) return;
                this.isDead = true; return;
            }
        }

        let candidates = this.faction === 'player' ? [...enemies, arenaBoss] : [player, ...partyMercenaries];
        for(let e of candidates) {
            if(!e || e.isDead) continue;
            if(!this.hitTargets.has(e) && Math.hypot(e.x - this.x, e.y - this.y) < this.radius + e.radius) {
                let actualType = this.type.includes('magic') ? 'magic' : (this.type.includes('assassination') ? 'assassination' : 'melee');
                let finalDmg = this.dmg;
                if (this.faction === 'enemy' && e.mods && e.mods.passive_ranged_def && Math.random() < 0.25) { finalDmg *= 0.5; addFloatingText('防禦!', e.x, e.y - 30, '#94a3b8'); }
                
                applyDamage(e, finalDmg, actualType, this.faction); this.hitTargets.add(e);
                
                if (this.type === 'magic_explosive') {
                    let expRange = 50 * this.aoeMult; createRingExplosion(this.x, this.y, '#ef4444', expRange);
                    candidates.forEach(e2 => { if(e2 && !e2.isDead && e2 !== e && Math.hypot(e2.x - this.x, e2.y - this.y) <= expRange) applyDamage(e2, this.dmg*0.5, 'magic', this.faction); });
                    this.isDead = true; break;
                }
                if (this.tryRicochet()) continue;
                if(this.pierce > 0) this.pierce--; else { this.isDead = true; break; }
            }
        }
    }
    tryRicochet() {
        if(this.faction === 'player' && player.mods.passive_ricochet && this.bounces < 1 && !this.boomerang) {
            this.bounces++;
            let nextT = getTarget(this.x, this.y, this.faction, 400, this.hitTargets);
            if(nextT) {
                let ndx = nextT.x - this.x; let ndy = nextT.y - this.y; let ndist = Math.hypot(ndx, ndy);
                this.dx = ndx/ndist; this.dy = ndy/ndist; return true;
            }
        }
        return false;
    }
    draw() {
        ctx.fillStyle = this.color; ctx.beginPath();
        if(this.isKnife) {
            let angle = this.boomerang ? frameCount * 0.5 : Math.atan2(this.dy, this.dx);
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(angle);
            ctx.moveTo(10, 0); ctx.lineTo(-5, 5); ctx.lineTo(-5, -5); ctx.restore();
        } else { ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); }
        ctx.fill();
    }
}

class PersistentAoe {
    constructor(owner, radius, duration, dmgPerTick, type, color, faction, pull = false) {
        this.owner = owner; this.radius = radius; this.life = duration; this.dmg = dmgPerTick;
        this.type = type; this.color = color; this.faction = faction; this.pull = pull;
        this.tickRate = 0.25; this.tickTimer = 0; this.isDead = false;
    }
    update(dt) {
        this.life -= dt; if(this.life <= 0) { this.isDead = true; return; }
        this.tickTimer -= dt;
        if(this.tickTimer <= 0) {
            this.tickTimer = this.tickRate;
            let candidates = this.faction === 'player' ? [...enemies, arenaBoss] : [player, ...partyMercenaries];
            candidates.forEach(e => {
                if(e && !e.isDead && Math.hypot(e.x - this.owner.x, e.y - this.owner.y) <= this.radius + e.radius) {
                    applyDamage(e, this.dmg, this.type, this.faction);
                    if(this.pull && e.speedMod !== undefined) {
                        let pdx = this.owner.x - e.x; let pdy = this.owner.y - e.y; let pdist = Math.hypot(pdx, pdy);
                        if(pdist > 10) { e.x += (pdx/pdist)*10; e.y += (pdy/pdist)*10; }
                    }
                }
            });
        }
    }
    draw() {
        ctx.strokeStyle = this.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(this.owner.x, this.owner.y, this.radius, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = this.color.replace(')', ', 0.2)').replace('rgb', 'rgba'); ctx.fill();
    }
}

function applyDamage(target, baseDmg, type, attackerFaction) {
    let isCrit = false; let finalDmg = baseDmg;
    if (attackerFaction === 'player') {
        isCrit = Math.random() < player.getCritRate();
        finalDmg = isCrit ? baseDmg * player.getCritDmg() : baseDmg;
    }
    finalDmg = finalDmg * (0.9 + Math.random() * 0.2); finalDmg = Math.max(1, Math.floor(finalDmg));

    if (target.takeDamage) target.takeDamage(finalDmg);
    else { target.hp -= finalDmg; target.hitTimer = 0.1; if (target.hp <= 0) target.isDead = true; }
    
    if(isCrit) addParticle(target.x, target.y, '#fef08a', 4); else addParticle(target.x, target.y, '#fff', 2);

    if (attackerFaction === 'player') {
        if (type === 'melee' && player.mods.passive_lifesteal) player.heal(finalDmg * 0.05);
        if (type === 'melee' && player.mods.passive_tremor && Math.random() < 0.2) {
            createRingExplosion(target.x, target.y, '#92400e', 40);
            let candidates = [...enemies, arenaBoss];
            candidates.forEach(e => { if (e && e !== target && !e.isDead && Math.hypot(e.x - target.x, e.y - target.y) <= 40) applyDamage(e, baseDmg * 0.5, 'melee_tremor', 'player'); });
        }
        if (type === 'assassination' && player.mods.passive_poison) target.poisonTimer = 3.0;
        if (type === 'magic' && player.mods.passive_resonance && Math.random() < 0.2) {
            createRingExplosion(target.x, target.y, '#c084fc', 50);
            let candidates = [...enemies, arenaBoss];
            candidates.forEach(e => { if (e && e !== target && !e.isDead && Math.hypot(e.x - target.x, e.y - target.y) <= 50) applyDamage(e, baseDmg * 0.5, 'magic_resonance', 'player'); });
        }
    }

    if (target.isDead && target.type) { 
        if(attackerFaction === 'player') {
            player.gainXp(target.xpVal); gameState.kills++;
            if (player.mods.passive_mana_cascade && type.includes('magic') && Math.random() < 0.3) {
                addFloatingText('-1s CD!', player.x, player.y - 40, '#60a5fa', 18);
                player.skills.forEach(s => s.timer = Math.max(0, s.timer - 1.0));
            }
            if (player.mods.passive_toxic_bloom && target.poisonTimer > 0) {
                projectiles.push(new PersistentAoe({x: target.x, y: target.y}, 60 * player.getAoeMult(), 2.0, player.getAssassinationDmg() * 0.5, 'assassination', 'rgba(16, 185, 129, 0.4)', 'player'));
            }
            checkStageProgress();
        }
        addParticle(target.x, target.y, '#ef4444', 8);
    }
}

const AI_PATTERNS = {
    'chase': (e, target, dist, dt, proposedX, proposedY) => {
        let currentSpeed = e.speed;
        if (dist > 0) { proposedX += e.dirX * currentSpeed * e.speedMod * dt; proposedY += e.dirY * currentSpeed * e.speedMod * dt; }
        return {x: proposedX, y: proposedY};
    },
    'ranged': (e, target, dist, dt, proposedX, proposedY) => {
        let currentSpeed = e.speed;
        e.stateTimer -= dt;
        if(dist < 200) currentSpeed = 0; 
        if(e.stateTimer <= 0 && dist < 250) { projectiles.push(new Projectile(e.x, e.y, e.dirX, e.dirY, 200, e.dmg, 1, 'enemy_magic', '#d1d5db', 'enemy')); e.stateTimer = 2.0; }
        if (dist > 0 && currentSpeed > 0) { proposedX += e.dirX * currentSpeed * e.speedMod * dt; proposedY += e.dirY * currentSpeed * e.speedMod * dt; }
        return {x: proposedX, y: proposedY};
    },
    'dash': (e, target, dist, dt, proposedX, proposedY) => {
        let currentSpeed = e.speed; e.stateTimer -= dt;
        if(e.stateTimer <= 0) e.stateTimer = 3.0;
        if(e.stateTimer > 2.5) currentSpeed = e.speed * 4;
        if (dist > 0) { proposedX += e.dirX * currentSpeed * e.speedMod * dt; proposedY += e.dirY * currentSpeed * e.speedMod * dt; }
        return {x: proposedX, y: proposedY};
    }
};

const MONSTER_DB = [
    { type: 'normal', emoji: '🧟', radius: 14, speed: 60, hp: 20, dmg: 10, xp: 2, ai: 'chase' },
    { type: 'fast', emoji: '🦇', radius: 12, speed: 100, hp: 10, dmg: 5, xp: 3, ai: 'chase' },
    { type: 'tank', emoji: '👹', radius: 20, speed: 40, hp: 50, dmg: 20, xp: 5, ai: 'chase' },
    { type: 'ranged', emoji: '💀', radius: 14, speed: 50, hp: 15, dmg: 12, xp: 4, ai: 'ranged' },
    { type: 'dasher', emoji: '🐺', radius: 16, speed: 40, hp: 25, dmg: 15, xp: 4, ai: 'dash' },
    { type: 'slime', emoji: '🦠', radius: 12, speed: 50, hp: 15, dmg: 8, xp: 2, ai: 'chase' },
    { type: 'ghost', emoji: '👻', radius: 16, speed: 70, hp: 18, dmg: 12, xp: 3, ai: 'chase' },
    { type: 'goblin', emoji: '👺', radius: 14, speed: 80, hp: 20, dmg: 15, xp: 3, ai: 'chase' }
];

const BOSS_DB = [
    { type: 'boss_vampire', emoji: '🧛', radius: 30, speed: 55, hp: 600, dmg: 30, xp: 100 },
    { type: 'boss_dragon', emoji: '🐉', radius: 35, speed: 45, hp: 800, dmg: 40, xp: 150 },
    { type: 'boss_demon', emoji: '👿', radius: 32, speed: 70, hp: 700, dmg: 35, xp: 150 }
];

class Enemy {
    constructor(type, spawnX = null, spawnY = null) {
        if(spawnX !== null && spawnY !== null) { this.x = spawnX + (Math.random()-0.5)*100; this.y = spawnY + (Math.random()-0.5)*100; } 
        else { let spawnAngle = Math.random() * Math.PI * 2; let spawnDist = Math.max(GAME_WIDTH, GAME_HEIGHT)/2 + 100; this.x = player.x + Math.cos(spawnAngle)*spawnDist; this.y = player.y + Math.sin(spawnAngle)*spawnDist; }
        this.isDead = false; this.type = type; this.speedMod = 1.0; this.speedTimer = 0; this.poisonTimer = 0; this.poisonTick = 0; this.hitTimer = 0; this.stateTimer = 0; 
        let st = 1 + (gameState.stage - 1) * 0.5; let stDmg = 1 + (gameState.stage - 1) * 0.2;
        
        let mData = MONSTER_DB.find(m => m.type === type) || BOSS_DB.find(b => b.type === type);
        this.emoji = mData.emoji; this.radius = mData.radius; this.speed = mData.speed; 
        this.hp = mData.hp * st; this.dmg = mData.dmg * stDmg; this.xpVal = mData.xp; this.ai = mData.ai || 'chase';
        this.maxHp = this.hp; this.dirX = 0; this.dirY = 0;
    }
    update(dt) {
        if(this.hitTimer > 0) this.hitTimer -= dt;
        if(this.speedTimer > 0) { this.speedTimer -= dt; if(this.speedTimer <= 0) this.speedMod = 1.0; }
        if(this.poisonTimer > 0) {
            this.poisonTimer -= dt; this.poisonTick -= dt;
            if(this.poisonTick <= 0) {
                this.hp -= player.getAssassinationDmg() * 0.2; this.hitTimer = 0.1; this.poisonTick = 0.5;
                if(this.hp <= 0 && !this.isDead) { this.isDead = true; player.gainXp(this.xpVal); gameState.kills++; checkStageProgress(); }
            }
        }
        let target = getTarget(this.x, this.y, 'enemy') || player;
        let dx = target.x - this.x; let dy = target.y - this.y; let dist = Math.hypot(dx, dy);
        if (dist > 0) { this.dirX = dx/dist; this.dirY = dy/dist; }
        
        let proposedX = this.x; let proposedY = this.y;
        
        if (this.type.startsWith('boss')) {
            this.stateTimer -= dt;
            if(this.type === 'boss_vampire' && this.stateTimer <= 0) { enemies.push(new Enemy('fast', this.x, this.y)); this.stateTimer = 3.0; }
            if(this.type === 'boss_dragon' && this.stateTimer <= 0) { let p = new Projectile(this.x, this.y, this.dirX, this.dirY, 250, this.dmg, 2, 'enemy_magic', '#f97316', 'enemy'); p.radius = 12; projectiles.push(p); this.stateTimer = 2.5; }
            let currentSpeed = (this.type === 'boss_demon' && this.stateTimer <= 0) ? this.speed * 3 : this.speed;
            if(this.type === 'boss_demon' && this.stateTimer < -0.5) this.stateTimer = 2.0;
            if (dist > 0) { proposedX += this.dirX * currentSpeed * this.speedMod * dt; proposedY += this.dirY * currentSpeed * this.speedMod * dt; }
        } else {
            let res = AI_PATTERNS[this.ai](this, target, dist, dt, proposedX, proposedY);
            proposedX = res.x; proposedY = res.y;
        }

        if (dist < target.radius + this.radius) {
            if(target.takeDamage) target.takeDamage(this.dmg);
            if (target === player && player.mods.passive_counter) { applyDamage(this, player.getMeleeDmg() * 0.8, 'melee', 'player'); addParticle(this.x, this.y, '#fca5a5', 3); }
            proposedX -= this.dirX * 20; proposedY -= this.dirY * 20;
        }

        for(let obs of obstacles) {
            let odx = proposedX - obs.x; let ody = proposedY - obs.y; let odist = Math.hypot(odx, ody);
            if(odist < this.radius + obs.radius) {
                if (odist === 0) { odx = 1; odist = 1; }
                let overlap = this.radius + obs.radius - odist; proposedX += (odx/odist) * overlap; proposedY += (ody/odist) * overlap;
            }
        }
        this.x = proposedX; this.y = proposedY;
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        if (this.poisonTimer > 0) { ctx.beginPath(); ctx.arc(0, 0, this.radius + 5, 0, Math.PI*2); ctx.fillStyle = 'rgba(74, 222, 128, 0.4)'; ctx.fill(); }
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, this.radius, this.radius, this.radius*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = (this.hitTimer > 0) ? 0.5 : 1.0;
        ctx.font = (this.radius * 2) + 'px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if(player.x < this.x) ctx.scale(-1, 1);
        ctx.fillText(this.emoji, 0, 0); ctx.restore();
        if(this.type.startsWith('boss')) { ctx.fillStyle = '#333'; ctx.fillRect(this.x - 30, this.y - this.radius - 15, 60, 6); ctx.fillStyle = '#ef4444'; ctx.fillRect(this.x - 30, this.y - this.radius - 15, 60 * (this.hp/this.maxHp), 6); }
    }
}

function spawnEnemy() {
    if(gameState.bossSpawned || isArena) return;
    if(gameState.kills >= gameState.bossReq) {
        let bType = 'boss_vampire'; if (gameState.stage % 3 === 2) bType = 'boss_dragon'; if (gameState.stage % 3 === 0) bType = 'boss_demon';
        enemies.push(new Enemy(bType)); gameState.bossSpawned = true; addFloatingText('BOSS 出現!', player.x, player.y - 150, '#ef4444', 40); return;
    }
    let r = Math.random(); let pool = MONSTER_DB.filter(m => m.type !== 'boss');
    let m = pool[Math.floor(r * pool.length)]; enemies.push(new Enemy(m.type));
}

function spawnShrine() {
    if(isArena) return; let angle = Math.random() * Math.PI * 2; let dist = Math.max(GAME_WIDTH, GAME_HEIGHT) * 0.8; 
    shrines.push(new Shrine(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
}

function spawnMapMercenary() {
    if(isArena || partyMercenaries.length >= 1) return;
    let angle = Math.random() * Math.PI * 2; let dist = Math.max(GAME_WIDTH, GAME_HEIGHT) * 0.7; 
    mapMercenaries.push(new MapMercenary(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist));
}

function checkStageProgress() {
    if(isArena) return; updateUI(); let bossAlive = enemies.some(e => e.type.startsWith('boss') && !e.isDead);
    if (gameState.bossSpawned && !bossAlive) {
        gameState.stage++; gameState.kills = 0; gameState.bossReq = 50 + gameState.stage * 20; gameState.bossSpawned = false;
        gameState.stageColor = { h: Math.floor(Math.random()*360), s: 30 + Math.random()*40, l: 10 + Math.random()*15 };
        addFloatingText('關卡突破!', player.x, player.y - 100, '#3b82f6', 40);
        player.heal(player.getMaxHp() * 0.5); partyMercenaries.forEach(m => m.heal(m.getMaxHp()*0.5)); saveGame();
    }
}

function triggerGameOver(wonArena = false) {
    isGameRunning = false; document.getElementById('uiLayer').classList.add('hidden');

        document.getElementById('goDesc2').innerText = ''; document.getElementById('btnRespawn').classList.add('hidden');
    } else {

        document.getElementById('goDesc2').innerText = '將退回較弱的關卡重生...'; document.getElementById('btnRespawn').classList.remove('hidden');
    }
}

function respawn() {
    gameState.stage = Math.max(1, gameState.stage - 2); gameState.kills = 0; gameState.bossReq = 50 + gameState.stage * 20; gameState.bossSpawned = false;
    player.hp = player.getMaxHp(); player.x = 0; player.y = 0; partyMercenaries = []; mapMercenaries = [];
    enemies = []; projectiles = []; particles = []; floatingTexts = []; shrines = []; loadedChunks = {};
    document.getElementById('gameOverScreen').classList.add('hidden'); document.getElementById('uiLayer').classList.remove('hidden');
    isGameRunning = true; lastTime = performance.now(); requestAnimationFrame(gameLoop); updateUI();
}

function backToMainMenu() {
    isGameRunning = false; document.getElementById('gameOverScreen').classList.add('hidden'); document.getElementById('uiLayer').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden'); document.getElementById('bossHpBarContainer').style.display = 'none'; checkLocalSave();
}

function startGameEngine() {
    document.getElementById('classSelectionScreen').classList.add('hidden'); document.getElementById('mainMenu').classList.add('hidden'); document.getElementById('uiLayer').classList.remove('hidden');
    enemies = []; projectiles = []; particles = []; floatingTexts = []; shrines = []; loadedChunks = {}; partyMercenaries = []; mapMercenaries = [];
    if (isArena) { document.getElementById('uiStageContainer').classList.add('hidden'); document.getElementById('uiKillsContainer').classList.add('hidden'); gameState.stageColor = { h: 0, s: 80, l: 20 }; } 
    else { document.getElementById('uiStageContainer').classList.remove('hidden'); document.getElementById('uiKillsContainer').classList.remove('hidden'); }
    isGameRunning = true; lastTime = performance.now(); updateUI(); buildSkillTreeUI(); saveGame(); requestAnimationFrame(gameLoop);
}

function startGame(playerClass) {
    isArena = false; unlockedNodes = {}; player = new Player(playerClass);
    gameState = { stage: 1, kills: 0, bossReq: 50, bossSpawned: false, stageColor: { h: 220, s: 50, l: 15 } }; startGameEngine();
}

function drawOffscreenIndicator(targetX, targetY, bgColor, emoji) {
    let dx = targetX - camera.x - GAME_WIDTH/2; let dy = targetY - camera.y - GAME_HEIGHT/2; let dist = Math.hypot(dx, dy);
    if (dist < Math.min(GAME_WIDTH, GAME_HEIGHT)/2 - 30) return;
    let margin = 30; let hw = GAME_WIDTH/2 - margin; let hh = GAME_HEIGHT/2 - margin; let slope = dy / dx; let indX, indY;
    if (Math.abs(slope) > hh / hw) { indY = dy > 0 ? GAME_HEIGHT/2 + hh : GAME_HEIGHT/2 - hh; indX = GAME_WIDTH/2 + (indY - GAME_HEIGHT/2) / slope; } 
    else { indX = dx > 0 ? GAME_WIDTH/2 + hw : GAME_WIDTH/2 - hw; indY = GAME_HEIGHT/2 + (indX - GAME_WIDTH/2) * slope; }
    ctx.fillStyle = bgColor; ctx.beginPath(); ctx.arc(indX, indY, 18, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(emoji, indX, indY);
}

function gameLoop(timestamp) {
    if (!isGameRunning) return;
    if (isPaused) { lastTime = timestamp; requestAnimationFrame(gameLoop); return; }
    let dt = (timestamp - lastTime) / 1000; if (dt > 0.1) dt = 0.1; lastTime = timestamp; frameCount++;

    camera.x = player.x - GAME_WIDTH / 2; camera.y = player.y - GAME_HEIGHT / 2;
    updateMapChunks(player.x, player.y);

    if(!isArena) {
        if(frameCount % 60 === 0) spawnEnemy();
        if(gameState.stage >= 2 && frameCount % 45 === 0) spawnEnemy();
        if(gameState.stage >= 4 && frameCount % 30 === 0) spawnEnemy();
        if(frameCount % 600 === 0 && shrines.filter(s=>!s.used).length < 3) spawnShrine();
        if(frameCount % 900 === 0 && mapMercenaries.length < 2) spawnMapMercenary();
        autoSaveTimer += dt; if(autoSaveTimer > 10) { saveGame(); autoSaveTimer = 0; }
    }

    player.update(dt); if(arenaBoss && !arenaBoss.isDead) arenaBoss.update(dt);
    partyMercenaries.forEach(m => m.update(dt)); partyMercenaries = partyMercenaries.filter(m => !m.isDead);
    mapMercenaries.forEach(m => m.update(dt)); mapMercenaries = mapMercenaries.filter(m => !m.isDead);
    shrines.forEach(s => s.update(dt));
    enemies.forEach(e => e.update(dt)); enemies = enemies.filter(e => !e.isDead); 
    projectiles.forEach(p => p.update(dt)); projectiles = projectiles.filter(p => !p.isDead);

    // Draw Map & Entities
    let bg = `hsl(${gameState.stageColor.h}, ${gameState.stageColor.s}%, ${gameState.stageColor.l}%)`;
    ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1; let offsetX = (camera.x % 50 + 50) % 50; let offsetY = (camera.y % 50 + 50) % 50;
    ctx.beginPath();
    for(let x = -offsetX; x < GAME_WIDTH; x+=50) { ctx.moveTo(x, 0); ctx.lineTo(x, GAME_HEIGHT); }
    for(let y = -offsetY; y < GAME_HEIGHT; y+=50) { ctx.moveTo(0, y); ctx.lineTo(GAME_WIDTH, y); }
    ctx.stroke();

    ctx.save(); ctx.translate(-camera.x, -camera.y);
    if(isArena) { ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)'; ctx.lineWidth = 10; ctx.beginPath(); ctx.arc(0, 0, 800, 0, Math.PI*2); ctx.stroke(); } 
    else { obstacles.forEach(obs => { ctx.font = (obs.radius * 2.5) + 'px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(obs.type, obs.x, obs.y); }); }

    shrines.forEach(s => s.draw()); mapMercenaries.forEach(m => m.draw());
    projectiles.forEach(p => p.draw()); enemies.forEach(e => e.draw()); partyMercenaries.forEach(m => m.draw());
    if(arenaBoss && !arenaBoss.isDead) arenaBoss.draw(); player.draw();

    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i]; p.life -= dt; if(p.life <= 0) { particles.splice(i, 1); continue; }
        if(p.type === 'ring') {
            p.radius += (p.maxRadius / p.maxLife) * dt;
            ctx.strokeStyle = p.color; ctx.globalAlpha = p.life / p.maxLife; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.stroke(); ctx.globalAlpha = 1.0;
        } else if (p.type === 'line') {
            ctx.strokeStyle = p.color; ctx.globalAlpha = p.life / p.maxLife; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke(); ctx.globalAlpha = 1.0;
        } else {
            p.x += p.dx * dt; p.y += p.dy * dt; ctx.fillStyle = p.color; ctx.globalAlpha = p.life / p.maxLife; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0;
        }
    }
    for(let i=floatingTexts.length-1; i>=0; i--) {
        let ft = floatingTexts[i]; ft.life -= dt; if(ft.life <= 0) { floatingTexts.splice(i, 1); continue; }
        ft.y += ft.dy * dt; ctx.fillStyle = ft.color; ctx.font = `bold ${ft.size}px Arial`; ctx.globalAlpha = ft.life; 
        ctx.fillText(ft.text, ft.x - ctx.measureText(ft.text).width/2, ft.y); ctx.globalAlpha = 1.0;
    }
    ctx.restore(); 

    shrines.forEach(s => { if(!s.used) drawOffscreenIndicator(s.x, s.y, s.color, '⛩️'); });
    mapMercenaries.forEach(m => { if(!m.isDead) drawOffscreenIndicator(m.x, m.y, '#3b82f6', m.emoji); });
    requestAnimationFrame(gameLoop);
}

document.getElementById('btnNewGame').onclick = () => { document.getElementById('classSelectionScreen').classList.remove('hidden'); };
document.getElementById('btnCancelClass').onclick = () => { document.getElementById('classSelectionScreen').classList.add('hidden'); };
document.getElementById('btnContinue').onclick = () => { let save = localStorage.getItem(SAVE_KEY); if(save) { isArena = false; startFromData(JSON.parse(save)); } };
document.getElementById('btnBackToMenu').onclick = () => { saveGame(); backToMainMenu(); };
document.getElementById('btnExport').onclick = () => {
    let save = localStorage.getItem(SAVE_KEY); if (!save) return showModal({ title: '錯誤', msg: '沒有找到本地存檔！' });
    copyToClipboard(btoa(unescape(encodeURIComponent(save)))); showModal({ title: '匯出成功', msg: '存檔代碼已複製到剪貼簿！' });
};
document.getElementById('btnImport').onclick = () => {
    showModal({ title: '匯入存檔', msg: '請貼上存檔代碼：', type: 'prompt', onConfirm: (val) => {
        if(!val) return;
        try {
            let data = JSON.parse(decodeURIComponent(escape(atob(val))));
            if(data && data.playerClass) { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); checkLocalSave(); showModal({ title: '成功', msg: '存檔匯入成功！' }); } else throw 'Invalid';
        } catch(e) { showModal({ title: '失敗', msg: '無效的存檔代碼！' }); }
    }});
};
document.getElementById('btnArena').onclick = () => {
    showModal({ title: '競技場模式', msg: '請貼上對手的存檔代碼：', type: 'prompt', onConfirm: (val) => {
        if(!val) return;
        try {
            let friendData = JSON.parse(decodeURIComponent(escape(atob(val))));
            let localSave = localStorage.getItem(SAVE_KEY);
            if(!localSave) return showModal({title:'錯誤', msg:'你必須有自己的存檔！'});
            if(friendData && friendData.playerClass) { isArena = true; startFromData(JSON.parse(localSave)); arenaBoss = new ArenaBoss(friendData); } else throw 'Invalid';
        } catch(e) { showModal({ title: '失敗', msg: '無效的存檔代碼！' }); }
    }});
};

function updateUI() {
    if(!player) return;
    document.getElementById('uiLevel').innerText = player.level; document.getElementById('uiSp').innerText = player.sp;
    document.getElementById('hpBar').style.width = `${(player.hp / player.getMaxHp()) * 100}%`; document.getElementById('xpBar').style.width = `${(player.xp / player.reqXp) * 100}%`;
    document.getElementById('uiStage').innerText = gameState.stage; document.getElementById('uiKills').innerText = gameState.kills; document.getElementById('uiBossReq').innerText = gameState.bossReq;
    let buffText = '';
    if(player.buffs.frenzy > 0) buffText += `<span class="text-red-400">狂熱 ${Math.ceil(player.buffs.frenzy)}s</span>`;
    if(player.buffs.slow > 0) buffText += `<span class="text-purple-400">遲緩 ${Math.ceil(player.buffs.slow)}s</span>`;
    if(player.hasShield) buffText += `<span class="text-blue-400">護盾就緒</span>`;
    document.getElementById('buffStatus').innerHTML = buffText;
}

// Joystick & WASD unified input
const joyArea = document.getElementById('joystickArea'); const joyBase = document.getElementById('joystickBase'); const joyStick = document.getElementById('joystickStick');

function handleJoyStart(clientX, clientY) {
    if(isPaused || !isGameRunning) return;
    joystick.active = true; joystick.x = clientX; joystick.y = clientY;
    joyBase.style.display = 'block'; joyBase.style.left = `${joystick.x}px`; joyBase.style.top = `${joystick.y}px`; joyStick.style.transform = `translate(-50%, -50%)`;
}
function handleJoyMove(clientX, clientY) {
    if(!joystick.active) return;
    let dx = clientX - joystick.x; let dy = clientY - joystick.y;
    let dist = Math.hypot(dx, dy); let maxDist = 40; if(dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; }
    joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    if(dist > 0) { joystick.dx = dx / maxDist; joystick.dy = dy / maxDist; }
}
function handleJoyEnd() { joystick.active = false; joystick.dx = 0; joystick.dy = 0; joyBase.style.display = 'none'; }

joyArea.addEventListener('touchstart', (e) => handleJoyStart(e.touches[0].clientX, e.touches[0].clientY));
joyArea.addEventListener('touchmove', (e) => handleJoyMove(e.touches[0].clientX, e.touches[0].clientY));
joyArea.addEventListener('touchend', handleJoyEnd);
joyArea.addEventListener('touchcancel', handleJoyEnd);

joyArea.addEventListener('mousedown', (e) => handleJoyStart(e.clientX, e.clientY));
joyArea.addEventListener('mousemove', (e) => handleJoyMove(e.clientX, e.clientY));
joyArea.addEventListener('mouseup', handleJoyEnd);
joyArea.addEventListener('mouseleave', handleJoyEnd);

let keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

const btnOpenTree = document.getElementById('btnOpenTree'); const btnCloseTree = document.getElementById('btnCloseTree');
const skillTreeModal = document.getElementById('skillTreeModal'); const treeContainer = document.getElementById('treeContainer');
const treeLinesSvg = document.getElementById('treeLines'); const niTitle = document.getElementById('niTitle');
const niDesc = document.getElementById('niDesc'); const btnLearnNode = document.getElementById('btnLearnNode');
const nodeInfoPanel = document.getElementById('nodeInfoPanel'); const treeScrollWrapper = document.getElementById('treeScrollWrapper');

let isDraggingTree = false; let startX, startY, scrollLeft, scrollTop;
treeScrollWrapper.addEventListener('mousedown', (e) => { isDraggingTree = true; startX = e.pageX - treeScrollWrapper.offsetLeft; startY = e.pageY - treeScrollWrapper.offsetTop; scrollLeft = treeScrollWrapper.scrollLeft; scrollTop = treeScrollWrapper.scrollTop; });
treeScrollWrapper.addEventListener('mouseleave', () => { isDraggingTree = false; });
treeScrollWrapper.addEventListener('mouseup', () => { isDraggingTree = false; });
treeScrollWrapper.addEventListener('mousemove', (e) => {
    if(!isDraggingTree) return; e.preventDefault();
    const x = e.pageX - treeScrollWrapper.offsetLeft; const y = e.pageY - treeScrollWrapper.offsetTop;
    treeScrollWrapper.scrollLeft = scrollLeft - (x - startX); treeScrollWrapper.scrollTop = scrollTop - (y - startY);
});

btnOpenTree.addEventListener('click', () => {
    if(!isGameRunning || isArena) return; 
    isPaused = true; skillTreeModal.classList.remove('hidden'); updateTreeUI();
    let coreNode = SKILL_TREE['core'];
    treeScrollWrapper.scrollLeft = coreNode.x - window.innerWidth / 2; treeScrollWrapper.scrollTop = coreNode.y - window.innerHeight / 2;
});
btnCloseTree.addEventListener('click', () => { isPaused = false; skillTreeModal.classList.add('hidden'); nodeInfoPanel.classList.add('translate-y-full'); });

document.getElementById('btnResetTalents').addEventListener('click', () => {
    showModal({
        title: '重置天賦', msg: '確定要退回所有天賦點數嗎？', type: 'prompt', confirmText: '確認',
        onConfirm: () => {
            let startNode = player.playerClass === 'mage' ? 'm_start' : (player.playerClass === 'rogue' ? 'r_start' : 'b_start');
            let refund = 0; for(let id in unlockedNodes) { if(id !== startNode) refund += unlockedNodes[id]; }
            unlockedNodes = { [startNode]: 1 }; player.sp += refund; player.recalculateStats(); updateTreeUI(); saveGame();
        }
    });
});

function buildSkillTreeUI() {
    treeContainer.querySelectorAll('.skill-node').forEach(n => n.remove()); treeLinesSvg.innerHTML = ''; let drawnLines = new Set();
    for(let id in SKILL_TREE) {
        let node = SKILL_TREE[id];
        if(node.links) {
            node.links.forEach(targetId => {
                let target = SKILL_TREE[targetId];
                if(target) {
                    let lineKey = [id, targetId].sort().join('-');
                    if(!drawnLines.has(lineKey)) {
                        let line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line.setAttribute('x1', node.x); line.setAttribute('y1', node.y); line.setAttribute('x2', target.x); line.setAttribute('y2', target.y);
                        line.setAttribute('stroke', '#334155'); line.setAttribute('stroke-width', '4'); line.setAttribute('id', `line-${lineKey}`);
                        treeLinesSvg.appendChild(line); drawnLines.add(lineKey);
                    }
                }
            });
        }
        let el = document.createElement('div'); el.className = 'skill-node node-locked';
        if (id === 'core') el.classList.add('node-class-c'); else if (id.startsWith('m')) el.classList.add('node-class-m'); else if (id.startsWith('r')) el.classList.add('node-class-r'); else if (id.startsWith('b')) el.classList.add('node-class-b');
        el.style.left = `${node.x}px`; el.style.top = `${node.y}px`; el.id = `node-${id}`;
        let words = node.name.split(''); el.innerHTML = words.length >= 2 ? `${words[0]}${words[1]}<br>${words[2]||''}${words[3]||''}` : words[0];
        el.onmousedown = (e) => e.stopPropagation(); // 避免點擊與拖曳衝突
        el.onclick = () => selectNode(id); treeContainer.appendChild(el);
    }
}

function updateTreeUI() {
    document.getElementById('treeSp').innerText = player.sp; let availableNodes = new Set();
    if (player.sp > 0) {
        for(let id in SKILL_TREE) {
            if (unlockedNodes[id] > 0) continue;
            let node = SKILL_TREE[id]; let canUnlock = false;
            for (let linkId of (node.links || [])) { if (unlockedNodes[linkId] > 0) canUnlock = true; }
            for (let uid in unlockedNodes) { if (SKILL_TREE[uid].links && SKILL_TREE[uid].links.includes(id)) canUnlock = true; }
            if (canUnlock) availableNodes.add(id);
        }
    }
    for(let id in SKILL_TREE) {
        let el = document.getElementById(`node-${id}`); let level = unlockedNodes[id] || 0; let isSkill = SKILL_TREE[id].effects.skills !== undefined;
        el.className = 'skill-node';
        if (id === 'core') el.classList.add('node-class-c'); else if(id.startsWith('m')) el.classList.add('node-class-m'); else if(id.startsWith('r')) el.classList.add('node-class-r'); else if(id.startsWith('b')) el.classList.add('node-class-b');
        if(level > 0) el.classList.add('node-unlocked'); else if (availableNodes.has(id)) el.classList.add('node-available'); else el.classList.add('node-locked');
        let existingBadge = el.querySelector('.level-badge'); if (existingBadge) existingBadge.remove();
        if (level > 0 && isSkill) {
            let badge = document.createElement('div'); badge.className = 'level-badge absolute -top-2 -right-2 bg-blue-600 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center border-2 border-white shadow-md';
            badge.innerText = level; el.appendChild(badge);
        }
    }
    let drawnLines = new Set();
    for(let id in SKILL_TREE) {
        let node = SKILL_TREE[id];
        if(node.links) {
            node.links.forEach(targetId => {
                let lineKey = [id, targetId].sort().join('-');
                if(!drawnLines.has(lineKey)) {
                    let line = document.getElementById(`line-${lineKey}`);
                    if(line) { if(unlockedNodes[id] > 0 && unlockedNodes[targetId] > 0) line.setAttribute('stroke', '#eab308'); else line.setAttribute('stroke', '#334155'); }
                    drawnLines.add(lineKey);
                }
            });
        }
    }
    if(selectedNodeId) selectNode(selectedNodeId);
}

function selectNode(id) {
    selectedNodeId = id; let node = SKILL_TREE[id]; niTitle.innerText = node.name; niDesc.innerText = node.desc;
    nodeInfoPanel.classList.remove('translate-y-full');
    let level = unlockedNodes[id] || 0; let isSkill = node.effects.skills !== undefined; let isAvailable = false;
    for (let linkId of (node.links || [])) { if (unlockedNodes[linkId] > 0) isAvailable = true; }
    for (let uid in unlockedNodes) { if (SKILL_TREE[uid].links && SKILL_TREE[uid].links.includes(id)) isAvailable = true; }

    btnLearnNode.style.display = 'block';
    if (level > 0 && !isSkill) { btnLearnNode.innerText = '已學習'; btnLearnNode.disabled = true; btnLearnNode.className = 'px-6 py-3 bg-gray-600 text-white rounded-lg font-bold cursor-not-allowed'; } 
    else if ((isAvailable || (level > 0 && isSkill)) && player.sp > 0) {
        btnLearnNode.innerText = level > 0 ? `升級至 Lv.${level + 1} (消耗 1 點)` : '學習 (消耗 1 點)'; btnLearnNode.disabled = false;
        btnLearnNode.className = 'px-6 py-3 bg-blue-600 hover:bg-blue-400 text-white rounded-lg font-bold active:scale-95 transition-transform shadow-[0_0_15px_#3b82f6]';
        btnLearnNode.onclick = () => { player.sp--; unlockedNodes[id] = (unlockedNodes[id] || 0) + 1; player.recalculateStats(); updateTreeUI(); saveGame(); };
    } 
    else if (level > 0 && isSkill && player.sp === 0) { btnLearnNode.innerText = `目前 Lv.${level}`; btnLearnNode.disabled = true; btnLearnNode.className = 'px-6 py-3 bg-gray-600 text-white rounded-lg font-bold cursor-not-allowed'; } 
    else { btnLearnNode.style.display = 'none'; }
}

checkLocalSave();
</script>
