<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔物觀察日誌</title>
    <style>
        :root {
            --font-size: 18px;
            --bg-color: #f7f1eb; 
            --text-color: #6d5b5e;
            --primary: #ffb7b2;
            --secondary: #e2f0cb;
            --accent: #ffdac1;
            --danger: #ff9aa2;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --border: #f0e6e0;
            --pet-glow: rgba(92, 74, 77, 0.4);
            --gc1: #7F7FD5;
            --gc2: #86A8E7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        html, body {
            height: 100%; overflow: hidden;
            font-family: 'Helvetica Neue', 'Quicksand', 'Microsoft JhengHei', sans-serif;
            font-size: var(--font-size);
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text-color); display: flex; justify-content: center; touch-action: pan-y;
        }

        #app {
            width: 100%; max-width: 450px; height: 100%; display: flex;
            flex-direction: column; background: var(--bg-color);
            box-shadow: 0 0 30px rgba(0,0,0,0.06); position: relative;
        }

        .header {
            display: flex; justify-content: space-between; padding: 12px 15px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); align-items: center; flex-shrink: 0; z-index: 10;
        }
        
        .sys-btn {
            background: #fff; border: 1px solid var(--border); border-radius: 12px;
            padding: 8px 14px; font-size: 0.9em; color: var(--text-color);
            font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.03); transition: transform 0.1s;
        }
        .sys-btn:active { transform: scale(0.95); }

        /* 置頂全域狀態列與共用進度條 (極簡無數字版) */
        #pinned-status {
            padding: 12px 15px; background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 5;
            display: flex; flex-direction: column; gap: 8px;
        }
        .pin-row { display: flex; align-items: center; gap: 12px; }
        .pin-label { font-size: 0.8em; font-weight: 900; width: 65px; letter-spacing: 1px; }
        .bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.08); border-radius: 5px; overflow: hidden; flex: 1; }
        .bar-fill { height: 100%; border-radius: 5px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .screen { display: none; flex: 1; flex-direction: column; padding: 15px; overflow-y: auto; }
        .screen.active { display: flex; }

        .pet-container {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; border-radius: 24px;
            margin-bottom: 15px; padding: 10px 20px; border: 2px dashed rgba(200,180,180,0.5);
            text-align: center; overflow-y: auto; transition: background-color 0.8s ease;
        }

        .pet-wrapper { position: relative; margin: 10px 0; display: flex; align-items: center; justify-content: center; width: 120px; height: 120px; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes react { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2) translateY(-10px); } }
        @keyframes float-trait { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(2px, -4px) rotate(10deg); } }
        @keyframes floatUp { 0% { opacity:0; transform:translate(-50%, 10px); } 15% { opacity:1; transform:translate(-50%, 0); } 80% { opacity:1; transform:translate(-50%, -20px); } 100% { opacity:0; transform:translate(-50%, -30px); } }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* 戰鬥動畫 */
        @keyframes anim-atk { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(40px) scale(1.2); } }
        @keyframes anim-dmg { 0%, 100% { filter: brightness(1); transform: translateX(0); } 20%, 60% { filter: brightness(1.5) drop-shadow(0 0 15px red); transform: translateX(-5px); } 40%, 80% { filter: brightness(1.5) drop-shadow(0 0 15px red); transform: translateX(5px); } }
        @keyframes anim-jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px) scale(1.1); } }
        @keyframes anim-faint { 0% { opacity: 1; transform: scale(1) rotate(0deg); } 100% { opacity: 0.3; transform: scale(0.5) rotate(90deg); filter: grayscale(1); } }
        
        .anim-atk { animation: anim-atk 0.3s ease-out; }
        .anim-dmg { animation: anim-dmg 0.4s ease-out; }
        .anim-jump { animation: anim-jump 0.4s ease-out; }
        .anim-faint { animation: anim-faint 0.8s forwards; }
        
        .sprite-wrap { display:inline-block; font-size:4em; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }
        .sprite-wrap.flip { transform: scaleX(-1); } 

        .pet-face {
            font-size: calc(var(--font-size) * 4); line-height: 1;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 25px var(--pet-glow)); transition: filter 0.5s;
        }
        .pet-wrapper.react .pet-face { animation: react 0.4s ease-out; }

        .trait-icon {
            position: absolute; font-size: calc(var(--font-size) * 1.5);
            animation: float-trait 3s ease-in-out infinite alternate; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); z-index: 2;
        }
        
        .float-msg {
            position: absolute; top: 18%; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #444; padding: 10px 20px;
            border-radius: 20px; font-size: 0.9em; width: max-content; max-width: 85%;
            font-weight: bold; text-align: center; z-index: 150; pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); animation: floatUp 2.5s ease-out forwards;
        }

        .pet-name-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-bottom: 5px; }
        .pet-name {
            font-size: 1.25em; font-weight: 900; line-height: 1.3;
            background: linear-gradient(45deg, var(--gc1), var(--gc2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; word-break: break-word; text-align: center;
        }
        .pet-tags { font-size: 0.8em; color: #888; margin-bottom: 10px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 10px; flex-shrink: 0; }
        .btn {
            background: var(--primary); color: #5c4a4d; border: none; padding: 18px 10px;
            font-size: 1.1em; font-weight: 900; border-radius: 20px; cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.06); transition: transform 0.1s;
        }
        .btn:active { transform: translateY(6px); box-shadow: none; }
        .btn.explore { background: var(--secondary); }
        .btn.rest { background: var(--accent); }
        .btn.log { background: #b0c4de; color: white; }
        .btn.back { background: #e0e0e0; grid-column: span 2; margin-top: auto; flex-shrink: 0;}
        
        .list-btn {
            background: var(--panel-bg); border: 2px solid var(--border); padding: 15px;
            margin-bottom: 10px; border-radius: 16px; font-size: 1em; font-weight: bold;
            color: var(--text-color); display: flex; justify-content: space-between; cursor: pointer; transition: transform 0.1s;
        }
        .list-btn:active { background: var(--bg-color); transform: scale(0.98); }

        .log-entry { background: rgba(255,255,255,0.8); padding: 15px; border-radius: 16px; margin-bottom: 10px; border-left: 6px solid var(--primary); line-height: 1.5; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .log-date { font-size: 0.8em; color: #aaa; margin-bottom: 5px; }
        .battle-entry { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 5px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight:bold; }

        #alertBox {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 12px 24px;
            border-radius: 30px; font-size: 0.9em; opacity: 0; pointer-events: none;
            transition: opacity 0.3s; z-index: 250; white-space: nowrap; backdrop-filter: blur(5px);
        }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 15px; background: var(--panel-bg); border-radius: 16px; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 1em; border: 2px solid var(--border); border-radius: 12px; margin-top: 5px; outline:none; }
        
        .ending-box { text-align: center; margin-top: 50px; line-height: 1.6; }
        .ending-title { 
            font-size: 2.2em; font-weight: 900; margin-bottom: 20px;
            background: linear-gradient(45deg, var(--gc1), var(--gc2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 300; align-items: center; justify-content: center; }
        .modal-box { background: #fff; color: var(--text-color); padding: 30px 25px; border-radius: 24px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="app">

    <!-- Battle Screen -->

    </div>

    <!-- Screens -->
    <div id="screen-feed" class="screen"><h2 style="margin-bottom:15px; text-align:center; flex-shrink:0;">要餵什麼呢？</h2><div id="food-list" style="flex:1; overflow-y:auto; margin-bottom:10px; padding:5px;"></div><button class="btn back" onclick="UI.nav('main')">返回</button></div>
    <div id="screen-log" class="screen"><h2 style="margin-bottom:15px; text-align:center; flex-shrink:0;">觀察日誌</h2><div id="log-list" style="flex:1; overflow-y:auto; margin-bottom:10px; padding:5px;"></div><button class="btn back" onclick="UI.nav('main')">返回</button></div>
    <div id="screen-sys" class="screen">

        <div class="setting-row" style="flex-direction:column; align-items:stretch;"><span>繼承碼</span><input type="text" id="saveCode" placeholder="貼上代碼或點擊匯出"><div style="display:flex; gap:10px; margin-top:10px; justify-content: flex-end;"><button class="sys-btn" onclick="Save.exportCode()">匯出</button><button class="sys-btn" onclick="Save.importCode()">匯入</button></div></div>
        <button class="btn" style="background:var(--danger); color:white; flex-shrink:0;" onclick="Game.reset()">⚠️ 放棄本代並重來</button><button class="btn back" onclick="UI.nav('main')" style="margin-top:15px;">返回</button>
    </div>
    <div id="screen-ending" class="screen" style="background: #2a2a35; color: white;"><div class="ending-box" id="ending-content"></div><button class="btn" style="margin-top:40px; background:var(--accent); flex-shrink:0;" onclick="Game.startNew()">開啟新輪迴(繼承冠軍基因)</button></div>
    
    <!-- Modals -->

    <div id="confirmBox" class="modal-overlay"><div class="modal-box"><p id="confirmText" style="margin-bottom:20px; font-weight:bold; font-size:1.1em;"></p><div style="display:flex; gap:10px; justify-content:center;"><button class="sys-btn" onclick="UI.closeConfirm()" style="flex:1;">取消</button><button class="sys-btn" id="confirmYes" style="flex:1; background:var(--danger); color:white; border-color:var(--danger);">確定</button></div></div></div>
</div>

const fmtN = (n) => {
    if (n < 1000) return n;
    let e = Math.floor(Math.log10(n) / 3);
    return (n / Math.pow(1000, e)).toFixed(1).replace(/\.0$/, '') + ['','k','m','b','t'][e];
};

const RND = { i: (a) => a[Math.floor(Math.random() * a.length)], w: (a) => { let s = a.reduce((x, y) => x + y.w, 0), r = Math.random() * s; return a.find(v => (r -= v.w) < 0); }, c: (p) => Math.random() < p };

let state = {};

const Game = {
    init: () => {
        let f = RND.i(FACES.baby);
        let oldHeritage = typeof state.heritage === 'number' ? state.heritage : (Array.isArray(state.heritage) ? state.heritage.length : 0);
        oldHeritage += (state.trophies ? state.trophies.length : 0);

        state = {
            id: Date.now(), age: 0, day: 1, hp: 100, maxHp: 100, full: 80, maxFull: 100, mood: 80, maxMood: 100,
            genes: { beast: 0, magic: 0, machine: 0, toxic: 0, holy: 0 },
            traits: [], face: f[0], bName: f[1], stage: 'baby', 
            heritage: oldHeritage, trophies: [],
            pers: RND.i(PERSONALITIES), logs: [], bg: 'var(--panel-bg)'
        };
        Game.addLog(`新個體誕生。帶有【${state.pers.n}】特質。`);
    },
    
    startNew: () => { Game.init(); UI.nav('main'); UI.update(); Save.saveLocal(); },
    reset: () => { UI.showConfirm('確定要放棄這隻魔物，開啟新輪迴嗎？\n(本代已獲獎盃將化為傳承)', Game.startNew); },

    tick: (cost = 1) => {
        state.age += cost;
        if(state.age % 3 === 0) state.day++;
        let md = 5 * (state.pers.fx.mDecay || 1), fd = 8 * (state.pers.fx.fDecay || 1);
        state.mood = Math.max(0, Math.round(state.mood - md));
        state.full = Math.max(0, Math.round(state.full - fd));
        if (state.full === 0) state.hp = Math.round(state.hp - 10);
        if (state.age % 5 === 0) Game.autoLog();
        Game.checkEvo(); Game.checkEnd(); UI.update(); Save.saveLocal();
    },

    doAction: (type, pay) => {
        if(UI.isLocked || state.hp <= 0 || state.stage === 'end') return;
        UI.lock(500); 
        if(type === 'feed' && !pay) return UI.nav('feed');
        
        let msg = "";
        const ACT = {
            feed: (fId) => {
                let f = FOODS[fId];
                state.full = Math.min(state.maxFull || 100, Math.round(state.full + f.full));
                state.mood = Math.min(state.maxMood || 100, Math.round(state.mood + f.m));
                state.hp = Math.min(state.maxHp || 100, Math.round(state.hp + f.hp));
                for(let k in f.g) state.genes[k] += f.g[k];
                Game.checkMut(); return `餵食了 ${f.n}`;
            },
            explore: () => {
                if(state.full < 20) return "!肚子太餓了不想動..."; 
                state.full = Math.round(state.full - 15);
                let ev = RND.w(EXPLORE_EVENTS), ex = "";
                state.mood = Math.min(state.maxMood || 100, Math.max(0, Math.round(state.mood + ev.m)));
                state.hp = Math.min(state.maxHp || 100, Math.max(0, Math.round(state.hp + ev.hp)));
                state.bg = ev.bg || 'var(--panel-bg)'; 
                if(ev.item==='full') { state.full = state.maxFull || 100; ex = "(飽食滿!)"; }
                if(ev.item==='mutate') { Game.forceMut(); ex = "(變異!)"; }
                if(ev.item==='crystal') { state.genes.magic += 5; ex = "(魔力↑)"; }
                if(ev.item==='toxic') { state.genes.toxic += 5; ex = "(毒性↑)"; }
                if(ev.item==='holy') { state.genes.holy += 5; ex = "(神聖↑)"; }
                Game.addLog(`【探索】${ev.txt} ${ex}`); return `${ev.txt} ${ex}`;
            },
            rest: () => {
                let ev = RND.w(REST_EVENTS);
                state.hp = Math.min(state.maxHp || 100, Math.round(state.hp + ev.hp));
                state.mood = Math.min(state.maxMood || 100, Math.max(0, Math.round(state.mood + ev.m)));
                state.full = Math.max(0, Math.round(state.full + ev.f));
                return ev.txt;
            }
        };

        msg = ACT[type](pay);
        if(msg.startsWith('!')) return UI.floatMsg(msg.substring(1)); 
        if(type === 'feed') UI.nav('main');
        Game.tick(); UI.anim(); UI.floatMsg(msg);
    },

    getTags: () => { let t = state.traits.map(k => MUTATIONS[k].tag); t.push(GENE_TAG[Game.getTopGene()]); return [...new Set(t)]; },
    checkMut: () => { Object.keys(MUTATIONS).forEach(k => { if(!state.traits.includes(k) && RND.c(MUTATIONS[k].c)) { state.traits.push(k); Game.addLog(`【突變】獲得：${MUTATIONS[k].n}`); } }); },
    forceMut: () => { let a = Object.keys(MUTATIONS).filter(k => !state.traits.includes(k)); if(a.length > 0) { let m = RND.i(a); state.traits.push(m); for(let g in MUTATIONS[m].g) state.genes[g] += MUTATIONS[m].g[g]; } },
    getTopGene: () => { let t = Object.keys(state.genes).reduce((a, b) => state.genes[a] > state.genes[b] ? a : b); return state.genes[t] < 10 ? 'normal' : t; },
    getName: () => { let tr = state.traits.map(t => `[${MUTATIONS[t].n}]`).join(''); let top = Game.getTopGene(); let gn = state.stage === 'adult' && top !== 'normal' ? `[${GN[top]}]` : ''; return `${tr}${tr ? '的' : ''}${gn}${state.bName || '未知魔物'}`; },
    
    checkEvo: () => {
        const EVO_MAP = {
            10: () => { if(state.stage === 'baby') { let f = RND.i(FACES.child); state.stage = 'child'; state.face = f[0]; state.bName = f[1]; Game.addLog("【成長】體型變大了。"); } },
            20: () => { if(state.stage === 'child') { state.stage = 'adult'; let top = Game.getTopGene(); let f = RND.i(FACES.adult[top]); state.face = f[0]; state.bName = f[1]; Game.addLog(`【進化】呈現出 [${top}] 屬性。`); } }
        };
        if(EVO_MAP[state.age]) EVO_MAP[state.age]();
    },

    checkEnd: () => {
        if (state.hp <= 0) { state.stage = 'end'; Game.addLog("生命徵象消失。"); UI.showEnd("實驗失敗", "個體生命力耗盡死亡。"); } 
        else if (state.age >= MAX_AGE) { state.stage = 'end'; let end = ENDINGS.find(e => e.req(state.genes)); Game.addLog(`【終局】${end.t}`); UI.showEnd(end.t, end.d); }
    },
    autoLog: () => Game.addLog(`${RND.i(LOG_PARTS.time)}，牠${RND.i(LOG_PARTS.act)}，${RND.i(LOG_PARTS.feel)}。`),
    addLog: (txt) => { state.logs.unshift({ d: state.day, t: txt }); if(state.logs.length > 40) state.logs.pop(); }
};

const Arena = {
    fight: (aId) => {
        if(UI.isLocked || state.hp < 20) return UI.msg(state.hp < 20 ? '♥️體力不足，無法參賽！' : '');
        state.hp -= 20; UI.nav('battle');
        
        let a = ARENAS[aId], pTags = Game.getTags(), logs = [];
        let eTags = [...new Set([RND.i(Object.keys(TAG_ADV)), RND.i(Object.keys(TAG_ADV))])];
        let eFace = RND.i(Object.values(FACES.adult).flat())[0];
        
        let pScore = state.age * 1.5 + (state.heritage * 2) + (state.trophies.length * 5) + (state.pers.fx.bScore || 0) + (Math.random() * 15);
        let eScore = a.diff + (Math.random() * 15);

        logs.push({ t: `🏆 【${a.n}】正式開始！`, a: 'clash' });
        logs.push({ t: `⚡ ${Game.getName()} VS 野生${TAG_N[eTags[0]]}${eTags[1]?TAG_N[eTags[1]]:''}巨獸`, a: '' });
        logs.push({ t: `我們的特徵：${pTags.map(t=>TAG_N[t]).join(', ')}`, a: '' });

        let rare = BATTLE_EVENTS.rare.find(r => RND.c(r.c));
        if(rare) logs.push({ t: rare.t, a: 'clash' });

        pTags.forEach(t => { if(a.fav.includes(t)) { pScore += 30; logs.push({ t: `主場優勢！${TAG_N[t]}特徵在這裡如魚得水！`, a: 'p-buff' }); } });

        pTags.forEach(pt => eTags.forEach(et => {
            if(TAG_ADV[pt].includes(et)) { pScore += 40; logs.push({ t: `💥 施展【${RND.i(TAG_SK[pt])}】，摧毀了對手的${TAG_WK[et]}！`, a: 'p-atk' }); }
            if(TAG_ADV[et].includes(pt)) { eScore += 40; logs.push({ t: `⚠️ 糟糕！對手的【${RND.i(TAG_SK[et])}】，直擊了我們的${TAG_WK[pt]}！`, a: 'e-atk' }); }
        }));

        if(logs.length < 5) logs.push({ t: RND.i(BATTLE_EVENTS.normal), a: RND.i(['p-atk', 'e-atk', 'clash']) });

        let win = pScore >= eScore;
        logs.push({ t: win ? '🎉 壓倒性的勝利！' : '💀 遺憾地敗北了...', a: win ? 'p-win' : 'e-win' });

        if(win && !state.trophies.includes(a.win)) { state.trophies.push(a.win); logs.push({ t: `🌟 獲得了本代冠軍基因：【${a.win}】！`, a: 'p-buff' }); }

        UI.lock(logs.length * 1100 + 500); 
        UI.renderBattle(logs, state.face, eFace);
        Game.tick();
    }
};

const UI = {
    fSz: 18,
    isLocked: false,
    lock: (ms) => { UI.isLocked = true; setTimeout(() => UI.isLocked = false, ms); },
    init: () => {
        document.getElementById('food-list').innerHTML = Object.keys(FOODS).map(k => `<div class="list-btn" onclick="Game.doAction('feed', '${k}')"><div>${FOODS[k].n}<br><small style="color:#888">${FOODS[k].d}</small></div><div style="text-align:right"><span style="color:var(--danger)">+${FOODS[k].full}飽</span></div></div>`).join('');
    },
    nav: (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${id}`).classList.add('active');
        document.getElementById('pinned-status').style.display = (id === 'sys' || id === 'ending') ? 'none' : 'flex';
        if(id === 'log') UI.renderLogs();
        if(id === 'arena') UI.renderArena();
    },
    update: () => {
        if(state.stage === 'end') return;
        
        state.maxFull = state.maxFull || 100;
        state.maxMood = state.maxMood || 100;
        state.maxHp = state.maxHp || 100;
        state.trophies = state.trophies || [];
        state.heritage = typeof state.heritage === 'number' ? state.heritage : (Array.isArray(state.heritage) ? state.heritage.length : 0);
        
        let top = Game.getTopGene(), c = GENE_COLORS[top];
        document.documentElement.style.setProperty('--pet-glow', c.s); document.documentElement.style.setProperty('--gc1', c.g1); document.documentElement.style.setProperty('--gc2', c.g2);
        
        let hpPct = Math.max(0, Math.min(100, (state.hp / state.maxHp) * 100));
        let agePct = Math.max(0, Math.min(100, (state.age / MAX_AGE) * 100));
        let fullPct = Math.max(0, Math.min(100, (state.full / state.maxFull) * 100));
        let moodPct = Math.max(0, Math.min(100, (state.mood / state.maxMood) * 100));

        // 置頂全域狀態列 (極簡無數字版)
        document.getElementById('pin-hp-bar').style.width = `${hpPct}%`;
        document.getElementById('pin-age-bar').style.width = `${agePct}%`;

        let traitsHtml = state.traits.map((t, i) => {
            let pos = TRAIT_POSITIONS[i % TRAIT_POSITIONS.length], posStr = Object.keys(pos).map(k => `${k}:${pos[k]}`).join(';');
            let delay = (i * 0.3).toFixed(1), sz = 1 + ((t.charCodeAt(0) + i) % 4) * 0.3;
            return `<div class="trait-icon" style="${posStr}; animation-delay: ${delay}s; font-size: calc(var(--font-size) * ${sz});">${MUTATIONS[t].p}</div>`;
        }).join('');

        const container = document.getElementById('pet-display');
        if(!container) return; 
        container.style.background = `radial-gradient(circle at center, rgba(255,255,255,0.6), ${state.bg || 'var(--panel-bg)'})`;
        
        // 柔和地將飽食、心情、獎盃整合至怪物框內
        container.innerHTML = `
            <div class="pet-wrapper" id="pet-wrapper"><div class="pet-face">${state.face}</div>${traitsHtml}</div>
            <div class="pet-info" style="width:100%;">
                <div class="pet-name-wrap"><span style="font-size:0.8em; color:#999; font-weight:bold;">No.${state.id.toString().slice(-4)} (${state.pers.n})</span><div class="pet-name">${Game.getName()}</div></div>

                <div style="display:flex; flex-direction:column; gap:12px; width:100%; padding:12px 15px; background:rgba(255,255,255,0.6); border-radius:16px; border:1px solid rgba(255,255,255,0.8); box-shadow:0 4px 10px rgba(0,0,0,0.03);">
                    <div class="pin-row"><span class="pin-label" style="color:#e67e22;">🍖 飽食</span><div class="bar-bg"><div class="bar-fill" style="width:${fullPct}%; background:#ffd6a5;"></div></div></div>
                    <div class="pin-row"><span class="pin-label" style="color:#3498db;">✨ 心情</span><div class="bar-bg"><div class="bar-fill" style="width:${moodPct}%; background:#9bf6ff;"></div></div></div>
                    <div style="font-size:0.9em; font-weight:bold; color:#666; margin-top:4px;">🏆 獎盃  ${fmtN(state.heritage + state.trophies.length)}</div>
                </div>
            </div>`;
    },
    renderLogs: () => document.getElementById('log-list').innerHTML = state.logs.map(l => `<div class="log-entry"><div class="log-date">Day ${l.d}</div>${l.t}</div>`).join(''),
    renderArena: () => {
        let pTags = Game.getTags().map(t => TAG_N[t]).join('、') || '無';
        document.getElementById('arena-tags').innerHTML = `<span style="font-size:0.9em;color:#777">消耗 ♥️體力 進行戰鬥。祖先血統帶來微幅加成！</span><b>當前特徵：</b><span style="color:var(--primary)">${pTags}</span><b>本代獎盃：</b>${state.trophies.join('、') || '無'}`;
        document.getElementById('arena-list').innerHTML = Object.keys(ARENAS).map(k => `
            <div class="list-btn" onclick="Arena.fight('${k}')">
                <div>${ARENAS[k].n}<br><small style="color:#888">優勢：${ARENAS[k].fav.map(t=>TAG_N[t]).join(', ')}</small></div>
                <div style="text-align:right"><span style="color:var(--accent)">🏆 ${state.trophies.includes(ARENAS[k].win) ? '✅已稱霸' : ARENAS[k].win}</span></div>
            </div>`).join('');
    },
    renderBattle: (logs, pFace, eFace) => {
        let box = document.getElementById('battle-log'), btn = document.getElementById('battle-back');
        let pEl = document.getElementById('battle-p'), eEl = document.getElementById('battle-e');
        box.innerHTML = ''; btn.style.display = 'none';
        
        pEl.innerText = pFace; eEl.innerText = eFace;
        pEl.className = ''; eEl.className = '';

        const ANIM_MAP = {
            'p-atk': () => { pEl.classList.add('anim-atk'); eEl.classList.add('anim-dmg'); },
            'e-atk': () => { eEl.classList.add('anim-atk'); pEl.classList.add('anim-dmg'); },
            'clash': () => { pEl.classList.add('anim-atk'); eEl.classList.add('anim-atk'); },
            'p-buff': () => { pEl.classList.add('anim-jump'); },
            'p-win': () => { pEl.classList.add('anim-jump'); eEl.classList.add('anim-faint'); },
            'e-win': () => { eEl.classList.add('anim-jump'); pEl.classList.add('anim-faint'); }
        };

        logs.forEach((l, i) => {
            setTimeout(() => {
                let d = document.createElement('div'); d.className = 'battle-entry'; d.innerText = l.t;
                d.style.animation = 'fadeIn 0.5s ease-out forwards';
                box.appendChild(d); box.scrollTop = box.scrollHeight;
                
                pEl.classList.remove('anim-atk', 'anim-dmg', 'anim-jump', 'anim-faint');
                eEl.classList.remove('anim-atk', 'anim-dmg', 'anim-jump', 'anim-faint');
                void pEl.offsetWidth; void eEl.offsetWidth; 

                if(ANIM_MAP[l.a]) ANIM_MAP[l.a]();
                if(i === logs.length - 1) btn.style.display = 'block';
            }, i * 1100); 
        });
    },
    showEnd: (t, d) => {
        UI.nav('ending');
        document.getElementById('ending-content').innerHTML = `
            <div class="pet-face" style="font-size:5em; margin-bottom:20px; filter: drop-shadow(0 0 40px ${GENE_COLORS[Game.getTopGene()].s});">${state.face}</div>
            <div class="ending-title">${t}</div><div class="pet-name-wrap"><div class="pet-name" style="font-size:1.4em;">${Game.getName()}</div></div>
            <p style="margin-top:15px;">${d}</p>
            <p style="margin-top:30px; font-size:0.9em; color:#888;">存活週期: ${state.age} | 本代獲得獎盃: ${state.trophies.length} (將轉為傳承)</p>`;
    },
    floatMsg: (t) => { let d = document.createElement('div'); d.className = 'float-msg'; d.innerText = t; document.getElementById('app').appendChild(d); setTimeout(() => d.remove(), 2500); },
    msg: (t) => { if(!t) return; const b = document.getElementById('alertBox'); b.innerText = t; b.style.opacity = 1; setTimeout(() => b.style.opacity = 0, 2000); },
    anim: () => { const w = document.getElementById('pet-wrapper'); if(w) { w.classList.remove('react'); void w.offsetWidth; w.classList.add('react'); } },
    changeFont: (d) => { UI.fSz = Math.max(12, Math.min(26, UI.fSz + d * 2)); document.documentElement.style.setProperty('--font-size', `${UI.fSz}px`); },
    showConfirm: (msg, cb) => { document.getElementById('confirmText').innerText = msg; document.getElementById('confirmYes').onclick = () => { UI.closeConfirm(); cb(); }; document.getElementById('confirmBox').style.display = 'flex'; },
    closeConfirm: () => document.getElementById('confirmBox').style.display = 'none'
};

const Save = {
    saveLocal: () => localStorage.setItem('mon_log_save', JSON.stringify(state)),
    save: () => { Save.saveLocal(); UI.msg('已保存。'); },
    load: () => {
        let s = localStorage.getItem('mon_log_save');
        if(s) { 
            state = JSON.parse(s); 
            state.trophies = state.trophies || [];
            state.heritage = typeof state.heritage === 'number' ? state.heritage : (Array.isArray(state.heritage) ? state.heritage.length : 0);
            if (state.face && state.face.length > 4) { Game.init(); UI.msg('舊存檔自動重生。'); } else { UI.msg('讀檔成功。'); } 
            UI.update(); UI.nav('main'); 
        } else UI.msg('無本地存檔。');
    },
    exportCode: () => { document.getElementById('saveCode').value = btoa(encodeURIComponent(JSON.stringify(state))); UI.msg('代碼已生成，請複製保存。'); },
    importCode: () => { 
        try { 
            state = JSON.parse(decodeURIComponent(atob(document.getElementById('saveCode').value))); 
            state.trophies = state.trophies || [];
            state.heritage = typeof state.heritage === 'number' ? state.heritage : (Array.isArray(state.heritage) ? state.heritage.length : 0);
            if (state.face && state.face.length > 4) Game.init(); 
            Save.saveLocal(); UI.update(); UI.nav('main'); UI.msg('繼承成功！'); 
        } catch(e) { UI.msg('代碼無效！'); } 
    }
};

window.onload = () => {
    UI.init(); let saved = localStorage.getItem('mon_log_save');
    if (saved) { state = JSON.parse(saved); if(state.stage === 'end' || (state.face && state.face.length > 4)) Game.init(); } else Game.init();
    if(state.stage === 'end') Game.checkEnd(); else { UI.nav('main'); UI.update(); }
};
</script>
</body>
</html>
