<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>深淵漫步：無盡誓約 (Endless Oath RPG)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #000000;
      color: #ffffff;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .retro-font { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; }
    
    .ff-box {
      background-color: #0000a8;
      border: 3px solid #ffffff;
      border-radius: 2px;
      box-shadow: inset 0 0 0 1px #000, 0 0 0 2px #000;
      color: #ffffff;
    }
    .ff-box-dark {
      background-color: #000000;
      border: 2px solid #ffffff;
      border-radius: 2px;
      color: #ffffff;
    }
    
    .ff-btn {
      background-color: #000000;
      border: 2px solid #ffffff;
      color: #ffffff;
      border-radius: 0;
      transition: transform 0.1s, border-color 0.1s, background-color 0.1s;
      cursor: pointer;
    }
    .ff-btn:hover { border-color: #fde047; background-color: rgba(255,255,255,0.1); }
    .ff-btn:active { transform: scale(0.96); background-color: rgba(255,255,255,0.2); border-color: #fde047; }
    .ff-btn:disabled { border-color: #444; color: #555; pointer-events: none; background-color: #000; }
    .ff-btn-danger:hover { border-color: #ef4444; background-color: rgba(239,68,68,0.2); color: #fca5a5;}

    .screen-crt::after {
      content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
      background-size: 100% 4px; pointer-events: none; z-index: 10; opacity: 0.4;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      50% { transform: translateY(-12px) scale(1.3); opacity: 1; }
      100% { transform: translateY(-25px) scale(1.1); opacity: 0; }
    }
    .damage-float { animation: floatUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; z-index: 50;}
    
    @keyframes shakeAndFlash {
      0%, 100% { transform: translateX(0); filter: none; }
      20% { transform: translateX(-5px); filter: drop-shadow(0 0 8px rgba(255,0,0,0.9)) brightness(1.5); }
      40% { transform: translateX(5px); filter: drop-shadow(0 0 8px rgba(255,0,0,0.9)) brightness(1.5); }
      60% { transform: translateX(-3px); filter: drop-shadow(0 0 4px rgba(255,0,0,0.6)) brightness(1.2); }
      80% { transform: translateX(3px); filter: drop-shadow(0 0 4px rgba(255,0,0,0.6)) brightness(1.2); }
    }
    .animate-shake { animation: shakeAndFlash 0.35s ease-in-out; z-index: 20; position: relative; }

    @keyframes dodgeEffect {
      0%, 100% { transform: translateX(0); opacity: 1; filter: none; }
      50% { transform: translateX(-10px) skewX(-5deg); opacity: 0.5; filter: brightness(1.5); }
    }
    .animate-dodge { animation: dodgeEffect 0.35s ease-out; }

    @keyframes healPulse {
      0%, 100% { filter: none; transform: scale(1); }
      50% { filter: drop-shadow(0 0 10px #4ade80) brightness(1.2); transform: scale(1.05); }
    }
    .animate-heal { animation: healPulse 0.4s ease-out; z-index: 20; position: relative; }
    
    @keyframes targetGlow {
      0%, 100% { border-color: #ffffff; }
      50% { border-color: #ff0000; box-shadow: 0 0 12px #ff0000; }
    }
    .target-glow-enemy { animation: targetGlow 0.8s infinite; cursor: crosshair !important; border-width: 2px; border-style: dashed; }
    
    @keyframes allyGlow {
      0%, 100% { border-color: #ffffff; }
      50% { border-color: #0088ff; box-shadow: 0 0 12px #0088ff; }
    }
    .target-glow-ally { animation: allyGlow 0.8s infinite; cursor: pointer !important; border-width: 2px; border-style: dashed; }
    
    .info-glow:hover { border-color: #fde047; box-shadow: 0 0 8px #fde047; cursor: pointer; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .glow-text { text-shadow: 0 0 8px rgba(253, 224, 71, 0.8); }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen p-0 sm:p-2 overflow-hidden">

  <div id="game-container" style="font-size: 16px;" class="w-full max-w-md h-screen sm:h-[620px] bg-black border-0 sm:border-[4px] border-[#333] sm:rounded-md flex flex-col relative shadow-2xl overflow-hidden screen-crt">
    
    <!-- 1. 最上列 -->
    <div class="ff-box border-t-0 border-l-0 border-r-0 px-2 py-2 flex justify-between items-center z-20 shrink-0">
      <div class="flex items-center gap-1">
        <span id="txt-floor" class="font-bold text-white retro-font text-[0.8em]">B1-1</span>
      </div>
      <div class="flex-1 px-2 sm:px-3">
        <div class="w-full bg-black h-2.5 border-2 border-gray-500">
          <div id="floor-progress" class="bg-blue-400 h-full transition-all w-0"></div>
        </div>
      </div>
      <div class="flex gap-1.5 items-center">
        <button onclick="openSaveModal()" class="ff-btn px-2 py-1 text-[0.6em] retro-font uppercase shadow-md">SYSTEM</button>
        <div class="flex border-2 border-white bg-black">
          <button onclick="adjustFontSize(-1)" class="px-2 py-0.5 text-white hover:bg-white hover:text-black retro-font text-[0.7em] transition-colors">-</button>
          <div class="w-[2px] bg-white"></div>
          <button onclick="adjustFontSize(1)" class="px-2 py-0.5 text-white hover:bg-white hover:text-black retro-font text-[0.7em] transition-colors">+</button>
        </div>
      </div>
    </div>

    <!-- 2. 標籤頁 -->
    <div class="flex z-10 shrink-0 text-[0.75em] retro-font p-1 gap-1 border-b-2 border-white/20">
      <button id="tab-adventure" onclick="switchTab('adventure')" class="flex-1 py-2 border-2 border-white text-black bg-white transition-all">BATTLE</button>
      <button id="tab-status" onclick="switchTab('status')" class="flex-1 py-2 border-2 border-transparent text-gray-400 hover:text-white transition-all">STATUS</button>
      <button id="tab-log" onclick="switchTab('log')" class="flex-1 py-2 border-2 border-transparent text-gray-400 hover:text-white transition-all">LOGS</button>
    </div>

    <!-- 3. 主內容區 -->
    <div class="flex-1 flex flex-col overflow-hidden relative">
      
      <!-- TAB 1: 冒險 -->
      <!-- UI縮減：使用 p-1 gap-1 讓手機版顯示更緊湊 -->
      <div id="panel-adventure" class="flex-1 flex flex-col p-1 gap-1.5 overflow-y-auto no-scrollbar justify-start">
        
        <!-- 我方英雄區 -->
        <div class="grid grid-cols-2 gap-1 shrink-0">
          <div id="hero-mini-0"></div>
          <div id="hero-mini-1"></div>
          <div id="hero-mini-2"></div>
          <div id="hero-mini-3"></div>
        </div>

        <!-- 訊息欄 -->
        <!-- UI縮減：使用 min-h-[40px] -->
        <div class="ff-box p-1 min-h-[40px] flex flex-col justify-start text-center relative shrink-0 shadow-lg mx-1">
          <div id="animation-flash-bg" class="absolute inset-0 bg-white/0 pointer-events-none transition-all duration-100"></div>
          <p id="battle-latest-msg" class="text-[0.85em] text-white font-bold leading-relaxed tracking-wider">
            冒險者們整裝出發，進入無止盡的深淵。
          </p>
        </div>

        <!-- 怪物區 -->
        <!-- UI縮減：縮小最小高度 -->
        <div id="enemies-container" class="ff-box-dark p-1 relative flex flex-col justify-start items-center shrink-0 min-h-[200px] border-gray-700">
          <div id="enemies-grid" class="grid grid-cols-4 gap-1 h-full w-full"></div>
          <div id="floating-numbers" class="absolute inset-0 pointer-events-none z-30"></div>
        </div>

        <!-- 底部動作指令列 -->
        <div class="ff-box p-1.5 flex flex-col gap-1 shrink-0 relative mt-0">
          <div class="flex justify-start items-center text-[0.7em] px-1 min-h-[18px] retro-font text-yellow-300 border-b-2 border-white/30 pb-0.5 mb-0.5">
            <span class="tracking-widest">
                <span id="acting-hero-name" class="text-white"></span>
            </span>
            <span id="turn-phase-indicator" class="text-white transition-all duration-200">回合準備中</span>
          </div>
          <div id="action-main-buttons" class="grid grid-cols-2 gap-3 relative min-h-[120px]"></div>
        </div>

      </div>

      <!-- TAB 2: 狀態 -->
      <div id="panel-status" class="flex-1 p-2 overflow-y-auto hidden">
        <div id="status-full-list" class="space-y-3"></div>
      </div>

      <!-- TAB 3: 歷程 -->
      <div id="panel-log" class="flex-1 p-2 flex flex-col hidden overflow-hidden">
        <div class="flex justify-between items-center text-[0.75em] text-gray-400 mb-2 px-1 retro-font shrink-0">
          <span>BATTLE LOG</span>
          <button onclick="clearHistoryLogs()" class="ff-btn px-3 py-1.5">CLEAR</button>
        </div>
        <div id="log-history-scroll" class="flex-1 overflow-y-auto ff-box-dark p-3 text-[0.85em] font-mono text-gray-300 space-y-2 no-scrollbar border-gray-600 leading-relaxed min-h-0"></div>
      </div>

    </div>

    <!-- ACTION SELECT MODAL -->
    <div id="action-select-modal" class="absolute inset-0 bg-black/85 z-40 flex flex-col justify-end hidden text-[0.85em]">
      <div class="ff-box border-b-0 rounded-b-none max-h-[65vh] flex flex-col m-1 mb-0 shadow-2xl">
        <div class="p-3 border-b-2 border-white flex justify-start items-center">
          <div class="flex items-center gap-2 retro-font text-yellow-300"><span id="modal-icon"></span><span id="modal-title"></span></div>
          <button onclick="closeActionMenu()" class="ff-btn px-3 py-1.5 retro-font text-[0.75em]">CLOSE</button>
        </div>
        <div id="modal-equips-bar" class="hidden p-2 bg-black border-b-2 border-white text-[0.7em] text-gray-300 grid grid-cols-4 gap-1 text-center retro-font leading-tight"></div>
        <div id="modal-items-grid" class="flex-1 overflow-y-auto p-2 grid grid-cols-1 gap-2 no-scrollbar pb-6"></div>
      </div>
    </div>

    <!-- 替換技能 MODAL -->
    <div id="replace-modal" class="absolute inset-0 bg-black/90 z-50 flex flex-col justify-between hidden text-[0.85em] p-2">
      <div class="ff-box max-h-[80vh] flex flex-col shadow-2xl">
        <div class="p-3 border-b-2 border-white flex justify-between items-center bg-red-900">
          <div class="flex items-center gap-2 retro-font text-white">⚠️ 記憶/行囊已滿：請選擇替換</div>
        </div>
        <div class="p-3 text-center text-yellow-300 font-bold tracking-widest text-[0.9em] leading-relaxed">
          <span id="replace-new-skill-name" class="text-white"></span><br>但空間已達上限，請選擇一項覆蓋：
        </div>
        <div id="replace-items-grid" class="flex-1 overflow-y-auto p-2 grid grid-cols-1 gap-2 no-scrollbar"></div>
        <div class="p-2 border-t-2 border-white">
           <button onclick="cancelReplace()" class="ff-btn ff-btn-danger w-full py-3 retro-font text-[0.8em] text-gray-300">放棄物品/技能</button>
        </div>
      </div>
    </div>

    <!-- 戰術偵查面板 (Hero Info) -->
    <div id="hero-info-modal" class="absolute inset-0 bg-black/90 z-40 flex flex-col justify-center items-center hidden text-[0.9em] p-3 backdrop-blur-sm">
      <div class="ff-box p-4 w-full max-w-sm flex flex-col gap-3 shadow-2xl max-h-[85vh] overflow-y-auto no-scrollbar relative">
        <button onclick="closeHeroInfo()" class="absolute top-2 right-2 ff-btn px-2 py-1 text-[0.7em] retro-font text-white z-50">X</button>
        <!-- 動態渲染與 Status 頁面一致的角色卡片 -->
        <div id="hero-info-content" class="flex flex-col gap-2"></div>
      </div>
    </div>

    <!-- 戰術偵查面板 (Enemy Info) -->
    <div id="enemy-info-modal" class="absolute inset-0 bg-black/90 z-40 flex flex-col justify-center items-center hidden text-[0.9em] p-4 backdrop-blur-sm">
      <div class="ff-box p-5 w-full max-w-xs flex flex-col gap-4 shadow-2xl">
        <div class="border-b-2 border-white pb-2 flex justify-between items-center">
            <span class="retro-font text-red-400 text-[1em]" id="enemy-info-title">TITLE</span>
            <button onclick="closeEnemyInfo()" class="ff-btn px-2 py-1 text-[0.7em] retro-font text-white">X</button>
        </div>
        <div class="text-[0.85em] text-gray-300 font-sans font-bold tracking-widest leading-relaxed" id="enemy-info-desc"></div>
      </div>
    </div>

    <!-- 裝備/技能資訊彈窗 (Details Modal) -->
    <div id="details-modal" style="z-index: 60;" class="absolute inset-0 bg-black/90 flex flex-col p-4 justify-center items-center hidden text-[0.9em] backdrop-blur-md">
      <div class="ff-box p-5 w-full max-w-xs flex flex-col gap-4 shadow-2xl">
        <div id="details-title">TITLE</div>
        <div class="text-[0.85em] text-gray-300 font-sans font-bold tracking-widest leading-relaxed text-center" id="details-desc">DESCRIPTION</div>
        <button onclick="closeDetailsModal()" class="ff-btn mt-2 py-2 text-[0.8em] retro-font text-center w-full">CLOSE</button>
      </div>
    </div>

    <!-- DRAFT MODAL (戰後抽卡) -->
    <div id="draft-modal" class="absolute inset-0 bg-black/95 z-40 flex flex-col p-4 justify-start hidden">
      <div class="text-center mt-4 shrink-0">
        <h3 class="text-yellow-400 font-bold text-xl retro-font animate-pulse">VICTORY</h3>
        <p class="text-[0.85em] text-gray-400 mt-2 font-bold tracking-widest">獲得戰利品<br><span class="text-[0.9em] text-yellow-200/70">(重複獲得裝備/技能將升級)</span></p>
        
        <div id="draft-hero-queue" class="flex justify-start items-center gap-1.5 mt-4 w-full px-1"></div>
      </div>

      <div id="draft-cards-container" class="flex-1 flex flex-col justify-start gap-3 my-2 overflow-y-auto no-scrollbar"></div>

      <div class="grid grid-cols-2 gap-2 shrink-0 mb-4 px-3">
         <button onclick="rerollDraft()" class="ff-btn py-3 text-[0.7em] retro-font text-yellow-300 tracking-widest">重抽 (<span id="reroll-count-lbl">0</span>)</button>
         <button onclick="skipDraft()" class="ff-btn ff-btn-danger py-3 text-[0.7em] retro-font text-gray-400 tracking-widest">放棄</button>
      </div>
    </div>

    <!-- 過場動畫 Overlay -->
    <div id="transition-overlay" class="absolute inset-0 bg-black z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
       <h2 id="transition-title" class="text-4xl sm:text-5xl text-white retro-font mb-4 tracking-widest text-center leading-normal"></h2>
       <p id="transition-sub" class="text-xl text-gray-400 font-bold tracking-widest text-center"></p>
    </div>

    <!-- SAVE MODAL -->
    <div id="save-modal" class="absolute inset-0 bg-black/90 z-50 flex flex-col p-4 justify-center items-center hidden text-[0.9em]">
      <div class="ff-box p-5 w-full max-w-sm flex flex-col gap-4 shadow-2xl">
        <div class="flex justify-between items-center border-b-2 border-white pb-3 retro-font text-yellow-300 text-[1em]">
          <span>SYSTEM DATA</span>
          <button onclick="closeSaveModal()" class="ff-btn px-3 py-1.5 text-white text-[0.8em]">X</button>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[0.8em] text-white font-bold tracking-widest">回憶咒語 (輸入或產生)：</label>
          <textarea id="save-code-area" placeholder="請在此貼上咒語..." class="bg-black border-2 border-gray-500 p-2 text-[0.75em] text-green-400 h-24 resize-none font-mono focus:outline-none placeholder-gray-600"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-1">
          <button onclick="exportSaveCode()" class="ff-btn py-2.5 text-[0.75em] retro-font text-center">匯出咒語</button>
          <button onclick="importSaveCode()" class="ff-btn py-2.5 text-[0.75em] retro-font text-center text-yellow-200">匯入咒語</button>
        </div>
        <div class="grid grid-cols-2 gap-2 border-t-2 border-white pt-4 mt-1">
          <button onclick="quickSaveGame()" class="ff-btn py-2.5 text-[0.75em] retro-font text-center text-blue-300">QUICK SAVE</button>
          <button onclick="quickLoadGame()" class="ff-btn py-2.5 text-[0.75em] retro-font text-center text-blue-300">QUICK LOAD</button>
        </div>
      </div>
    </div>

    <!-- RENAME MODAL -->
    <div id="rename-modal" class="absolute inset-0 bg-black/90 z-50 flex flex-col p-4 justify-center items-center hidden text-[0.9em]">
      <div class="ff-box p-5 w-full max-w-xs text-center flex flex-col gap-4">
        <h4 class="text-yellow-300 retro-font text-[0.9em]">CHANGE NAME</h4>
        <input type="text" id="rename-input" maxlength="10" class="bg-black border-2 border-white p-2 text-center text-white retro-font focus:outline-none text-[1em]">
        <div class="flex gap-2 justify-center mt-2">
          <button onclick="confirmRename()" class="ff-btn px-4 py-2 text-[0.75em] retro-font">OK</button>
          <button onclick="closeRenameModal()" class="ff-btn px-4 py-2 text-[0.75em] retro-font">CANCEL</button>
        </div>
      </div>
    </div>
    
    <!-- SYSTEM MESSAGE MODAL (Replaces default alerts) -->
    <div id="system-message-modal" class="absolute inset-0 bg-black/90 z-[60] flex flex-col p-4 justify-center items-center hidden text-[0.9em]">
      <div class="ff-box p-5 w-full max-w-xs text-center flex flex-col gap-4 shadow-2xl">
        <h4 class="text-red-400 retro-font text-[0.9em]">SYSTEM MESSAGE</h4>
        <p id="system-message-text" class="text-white text-[0.85em] tracking-widest leading-relaxed"></p>
        <button onclick="closeSystemMessage()" class="ff-btn px-4 py-2 mt-2 text-[0.75em] retro-font">OK</button>
      </div>
    </div>

  </div>

  <script>
    const STORAGE_KEY = "endless_oath_v18_final";
    let baseFontSize = 16;

    // ==========================================
    // 基礎與工具函數
    // ==========================================
    function showSystemMessage(msg) {
        document.getElementById('system-message-text').innerText = msg;
        document.getElementById('system-message-modal').classList.remove('hidden');
    }
    function closeSystemMessage() {
        document.getElementById('system-message-modal').classList.add('hidden');
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));
    
    function formatNum(num) {
      if (num >= 1e12) return (num / 1e12).toFixed(1) + 'T';
      if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return num.toString();
    }
    
    function addLog(msg, colorClass = "text-white") {
      gameState.historyLogs.push({ msg: `[${new Date().toLocaleTimeString('zh-TW', { hour12: false })}] ${msg}`, color: colorClass });
      if (gameState.historyLogs.length > 200) gameState.historyLogs.shift();
      if (gameState.activeTab === 'log') renderHistoryLogs();
    }
    
    function updateAnimationMsg(txt) {
      document.getElementById('battle-latest-msg').innerText = txt;
      let f = document.getElementById('animation-flash-bg');
      f.className = "absolute inset-0 bg-white pointer-events-none opacity-20";
      setTimeout(() => f.className = "absolute inset-0 bg-white pointer-events-none transition-opacity duration-300 opacity-0", 80);
    }

    function animateElement(id, cls) { 
        let e = document.getElementById(id); 
        if(e){ e.classList.add(cls); setTimeout(()=>e.classList.remove(cls), 400); } 
    }
    
    function createFloatNum(txt, col, isH, idx) {
      let c = document.getElementById('floating-numbers'); let tgt = document.getElementById(isH ? `hero-mini-${idx}` : `enemy-card-${idx}`);
      if (!tgt || !c) return;
      let r = tgt.getBoundingClientRect(); let pr = c.getBoundingClientRect();
      let s = document.createElement('span'); s.className = `absolute font-black ${col} retro-font text-[14px] damage-float pointer-events-none text-shadow-md z-50`;
      s.style.left = `${r.left - pr.left + (r.width / 2) - 10}px`; s.style.top = `${r.top - pr.top + (r.height / 3)}px`; s.innerText = txt;
      c.appendChild(s); setTimeout(() => s.remove(), 900);
    }

    function getRoman(lvl) { return lvl === 3 ? 'III' : (lvl === 2 ? 'II' : 'I'); }

    function updateTopBar() {
      const floorTxt = document.getElementById('txt-floor');
      if (floorTxt) floorTxt.innerText = `B${gameState.floor}-${gameState.room}`;
      const progressEl = document.getElementById('floor-progress');
      if (progressEl) progressEl.style.width = `${(gameState.room / gameState.maxRooms) * 100}%`;
    }

    function switchTab(tabId) {
      gameState.activeTab = tabId;
      ['adventure', 'status', 'log'].forEach(id => {
        document.getElementById(`tab-${id}`).className = `flex-1 py-2 sm:py-3 transition-all border-2 border-white ${tabId === id ? 'text-black bg-white' : 'text-gray-400 bg-black hover:text-white border-transparent border-b-white/20'}`;
        document.getElementById(`panel-${id}`).classList.toggle('hidden', tabId !== id);
      });
      if (tabId === 'status') renderPartyManagementTab();
      if (tabId === 'log') renderHistoryLogs();
    }

    function adjustFontSize(dir) {
      baseFontSize = Math.max(12, Math.min(24, baseFontSize + dir));
      document.getElementById('game-container').style.fontSize = `${baseFontSize}px`;
    }

    // ==========================================
    // 遊戲庫資料
    // ==========================================

        this.currentRerolls = 1; 
      }
      getMult(id) { return 1.0 + ((this.cardMemory[id] || 1) - 1) * 0.2; }
      getMaxMagic() { return 5 + (this.cardMemory['p_11'] || 0); }
      getMaxSpecial() { return 5 + (this.cardMemory['p_12'] || 0); }
      getMaxItems() { return 10 + (this.cardMemory['p_15'] || 0); }
      getMaxRerolls() { return 1 + (this.cardMemory['p_10'] || 0); }
      getMaxPassives() { return 5 + (this.cardMemory['p_16'] || 0); }

      getMaxHp() {
        let val = this.baseMaxHp;
        if (this.equips.armor?.hp) val += Math.round(this.equips.armor.hp * this.getMult(this.equips.armor.id));
        if (this.equips.accessory?.bonusHp) val += Math.round(this.equips.accessory.bonusHp * this.getMult(this.equips.accessory.id));
        if (this.passives.find(x => x.id === 'p_01')) val += (this.cardMemory['p_01'] || 1) * 30;
        return val;
      }
      getAtk() {
        let val = this.baseAtk;
        if (this.equips.weapon?.val) val += Math.round(this.equips.weapon.val * this.getMult(this.equips.weapon.id));
        if (this.equips.armor?.atk) val += Math.round(this.equips.armor.atk * this.getMult(this.equips.armor.id));
        if (this.equips.accessory?.bonusAtk) val += Math.round(this.equips.accessory.bonusAtk * this.getMult(this.equips.accessory.id));
        if (this.passives.find(x => x.id === 'p_02')) val = Math.floor(val * (1 + (this.cardMemory['p_02'] || 1) * 0.15));
        if (this.passives.find(x => x.id === 'p_14')) val = Math.floor(val * 1.3);
        if (this.status.weak > 0) val = Math.floor(val * 0.7);
        if (this.status.berserk > 0) val = Math.floor(val * 1.5);
        return val;
      }
      getDef() {
        let val = this.baseDef;
        if (this.equips.armor?.val) val += Math.round(this.equips.armor.val * this.getMult(this.equips.armor.id));
        if (this.equips.accessory?.def) val += Math.round(this.equips.accessory.def * this.getMult(this.equips.accessory.id));
        if (this.equips.offhand && !this.equips.offhand.isWeapon && this.equips.offhand.val) val += Math.round(this.equips.offhand.val * this.getMult(this.equips.offhand.id));
        if (this.passives.find(x => x.id === 'p_07')) val += (this.cardMemory['p_07'] || 1) * 3;
        if (this.status.weak > 0) val = Math.floor(val * 0.7);
        if (this.status.berserk > 0) val = Math.floor(val * 0.5);
        return val;
      }
      getSpeed() {
        let val = this.baseSpeed;
        if (this.equips.weapon?.speed) val += Math.round(this.equips.weapon.speed * this.getMult(this.equips.weapon.id));
        if (this.equips.armor?.speed) val += Math.round(this.equips.armor.speed * this.getMult(this.equips.armor.id));
        if (this.equips.offhand?.speed) val += Math.round(this.equips.offhand.speed * this.getMult(this.equips.offhand.id));
        if (this.equips.accessory?.bonusSpeed) val += Math.round(this.equips.accessory.bonusSpeed * this.getMult(this.equips.accessory.id));
        if (this.passives.find(x => x.id === 'p_04')) val += (this.cardMemory['p_04'] || 1) * 4;
        return val;
      }
      getCritChance() {
        let val = 0.05;
        if (this.equips.weapon?.crit) val += this.equips.weapon.crit;
        if (this.equips.armor?.crit) val += this.equips.armor.crit;
        if (this.equips.accessory?.bonusCrit) val += this.equips.accessory.bonusCrit;
        return val;
      }
      getDodgeChance() {
        if (this.combatState.jumpTimer > 0) return 1.0; 
        let val = 0.05;
        if (this.equips.weapon?.dodge) val += this.equips.weapon.dodge;
        if (this.equips.armor?.dodge) val += this.equips.armor.dodge;
        if (this.equips.offhand?.dodge) val += this.equips.offhand.dodge;
        if (this.equips.accessory?.bonusDodge) val += this.equips.accessory.bonusDodge;
        if (this.passives.find(x => x.id === 'p_08')) val += (this.cardMemory['p_08'] || 1) * 0.05;
        return val;
      }
    }

    class Enemy {
      constructor(floor, isBoss = false, indexStr = "A") {
        this.isBoss = isBoss;
        const pool = MONSTERS_DB.filter(m => isBoss ? m.type === "boss" : m.type !== "boss");
        let base = pool[Math.floor(Math.random() * pool.length)];
        if (base.behavior === 'tonberry' && Math.random() < 0.85) base = pool[Math.floor(Math.random() * pool.length)];

        let tierRoll = Math.random(); let tierMult = 1.0;
        this.tierName = "普通"; this.colorClass = "text-white"; this.isMetal = base.isMetal || false;

        if (!isBoss && !this.isMetal) {
          if (floor >= 4) {
              if (tierRoll < 0.05) { this.tierName = "傳奇"; this.colorClass = "text-purple-400"; tierMult = 2.0; }
              else if (tierRoll < 0.15) { this.tierName = "稀有"; this.colorClass = "text-yellow-400"; tierMult = 1.5; }
              else if (tierRoll < 0.40) { this.tierName = "菁英"; this.colorClass = "text-blue-300"; tierMult = 1.2; }
          } else if (floor >= 3) {
              if (tierRoll < 0.1) { this.tierName = "稀有"; this.colorClass = "text-yellow-400"; tierMult = 1.5; }
              else if (tierRoll < 0.3) { this.tierName = "菁英"; this.colorClass = "text-blue-300"; tierMult = 1.2; }
          } else if (floor >= 2 && tierRoll < 0.2) { this.tierName = "菁英"; this.colorClass = "text-blue-300"; tierMult = 1.2; }
        } else if (isBoss) { this.tierName = "霸主"; this.colorClass = "text-red-500"; tierMult = 1.0; }
        else if (this.isMetal) { this.tierName = "稀有"; this.colorClass = "text-yellow-400"; tierMult = 1.0; }

        const floorMultiplier = 1 + (floor * 0.1); 
        const totalMult = 0.8 * floorMultiplier * tierMult;

        this.name = isBoss || this.isMetal ? `${base.name}` : `${base.name} ${indexStr}`; 
        this.maxHp = this.isMetal ? base.hp : Math.max(5, Math.floor(base.hp * totalMult));
        this.atk = Math.max(2, Math.floor(base.atk * totalMult));
        this.def = this.isMetal ? 999 : Math.max(0, Math.floor(base.def * 0.5 * floorMultiplier * tierMult));
        this.speed = Math.floor(base.spd * (1 + floor * 0.05));
        
        this.behavior = base.behavior; this.isLarge = isBoss; this.hp = this.maxHp; this.isDead = false;
        this.status = { poison: 0, blind: 0, paralyze: 0, sleep: 0, confuse: 0, silence: 0, weak: 0, bleed: 0, regen: 0, stun: 0, berserk: 0, reflect_buff: 0 };
        this.stunTimer = 0;
        this.immunity = null;
        if (this.isBoss || floor >= 5) {
            let roll = Math.random();
            if (roll < 0.1) this.immunity = 'magic'; else if (roll < 0.2) this.immunity = 'special'; else if (roll < 0.3) this.immunity = 'items';
        }
      }
    }

    function applyStatusEffects(entities, isHero) {
        for (let i = 0; i < entities.length; i++) {
            let t = entities[i];
            if (t.isDead) continue;
            
            if (t.status.poison > 0) {
                let pd = 5 + Math.floor(gameState.floor * 1.5);
                t.hp = Math.max(0, t.hp - pd);
                animateElement(isHero ? `hero-mini-${i}` : `enemy-card-${i}`, 'animate-shake'); 
                createFloatNum(`-${pd}`, 'text-green-500', isHero, i);
                t.status.poison--;
                if (t.hp <= 0) { t.isDead = true; if(isHero) addLog(`💀 毒發身亡！『${t.name}』倒下了！`, 'text-red-500'); }
            }
            
            ['blind', 'paralyze', 'sleep', 'confuse', 'silence', 'weak', 'berserk', 'reflect_buff'].forEach(s => { if (t.status[s] > 0) t.status[s]--; });
            if (t.status.stun > 0) t.status.stun--;
            if (!isHero && t.stunTimer > 0) { t.stunTimer--; t.status.stun = 0; }

            let reg = 0;
            if (t.status.regen > 0) { reg += Math.floor((isHero?t.getMaxHp():t.maxHp) * 0.05); t.status.regen--; }
            if (isHero) {
                ['weapon','armor','accessory','offhand'].forEach(eq => { if (t.equips[eq]?.regen) reg += Math.floor(t.equips[eq].regen * t.getMult(t.equips[eq].id)); });
            }
            if (reg > 0 && !t.isDead) {
                t.hp = Math.min((isHero?t.getMaxHp():t.maxHp), t.hp + reg);
                animateElement(isHero ? `hero-mini-${i}` : `enemy-card-${i}`, 'animate-heal'); 
                createFloatNum(`+${reg}`, 'text-green-300', isHero, i);
            }
        }
    }

    function triggerActionMenu(cat) {
      if (!gameState.isBattleActive || !gameState.isInputPhase) return;
      cancelTargeting(); 
      
      const hero = gameState.party[gameState.currentHeroIndex];
      const modal = document.getElementById('action-select-modal');
      const container = document.getElementById('modal-items-grid');
      const equips = document.getElementById('modal-equips-bar');
      
      const meta = { attack: 'ATTACK', magic: 'MAGIC', special: 'SKILL', items: 'ITEMS' };
      document.getElementById('modal-title').innerText = `${hero.name} - ${meta[cat]}`;
      document.getElementById('modal-icon').innerHTML = '';

      if (cat === 'attack') {
        const isAoe = hero.equips.weapon?.isAoe || false;
        const details = { type: 'attack', name: '普通攻擊', power: hero.getAtk(), isAoe, actor: hero, targetFriendly: false };
        if (isAoe) queueAction(details); 
        else {
            let alives = gameState.enemies.filter(e => !e.isDead);
            if(alives.length === 1) { details.target = alives[0]; queueAction(details); }
            else initiateTargeting(details);
        }
        return;
      }

    function confirmReplace(index) { let data = replaceTempData; let oldObj = data.list[index]; let oldCat = oldObj.isEquipItem ? oldObj.equipType : data.cat; let oldDbRef = DATABASE[oldCat].find(x => x.id === oldObj.id); let oldName = oldDbRef ? oldDbRef.name : "舊物件"; let newCat = data.newOpt.isEquipItem ? data.newOpt.equipType : data.cat; let newDbRef = DATABASE[newCat].find(x => x.id === data.newOpt.id); let newOptName = newDbRef ? newDbRef.name : "未知"; if (data.newOpt.isEquipItem) { data.list[index] = data.newOpt; } else if (data.newOpt.type === 'passive') { data.list[index] = { id: data.newOpt.id, type: data.newOpt.type }; } else { let pushUses = newDbRef?.isConsumable ? 1 : data.newOpt.maxUses; data.list[index] = { id: data.newOpt.id, type: data.newOpt.type, uses: pushUses, maxUses: pushUses }; } addLog(`♻️ 『${data.hero.name}』丟棄了 [${oldName}]，換取 [${newOptName}]！`, 'text-cyan-300'); document.getElementById('replace-modal').classList.add('hidden'); let cb = data.callback; replaceTempData = null; if (cb) cb(); }
    function cancelReplace() { document.getElementById('replace-modal').classList.add('hidden'); let cb = replaceTempData.callback; replaceTempData = null; if (cb) cb(); }
    async function proceedToNextRoom() { document.getElementById('draft-modal').classList.add('hidden'); let isNextFloor = false; if (gameState.room === gameState.maxRooms) { gameState.floor++; gameState.room = 1; isNextFloor = true; } else { gameState.room++; } gameState.party.forEach(h => { if (h.isDead) return; let pR = h.passives.find(p => p.id === 'p_05'); let armE = h.equips.armor?.endHeal || 0; let tot = (pR ? (h.cardMemory['p_05'] || 1) * 0.15 : 0) + armE; if (tot > 0) { let r = Math.floor(h.getMaxHp() * tot); h.hp = Math.min(h.getMaxHp(), h.hp + r); } }); await playTransition(isNextFloor ? '<span class="text-red-400 drop-shadow-md">FLOOR CLEARED</span>' : '<span class="text-white drop-shadow-md">NEXT ROOM</span>', isNextFloor ? `前往 B${gameState.floor}` : `B${gameState.floor}-${gameState.room}`, 1000); startRoom(); }
    async function triggerDefeatFlow() { addLog(`💀 眼前一片漆黑... 全軍覆沒。`, 'text-red-500 font-bold retro-font'); await playTransition('<span class="text-red-600">PARTY DEFEATED</span>', '撤退修整中...', 2000); gameState.floor = Math.max(1, gameState.floor - 1); gameState.room = 1; gameState.party.forEach(h => { h.isDead = false; h.hp = h.getMaxHp(); h.shield = 0; h.actionQueued = null; h.combatState = { charging: false, jumpTimer: 0, jumpTarget: null, defending: false }; h.status = { poison: 0, blind: 0, paralyze: 0, sleep: 0, confuse: 0, silence: 0, weak: 0, bleed: 0, regen: 0, berserk: 0, reflect_buff: 0, stun: 0 }; }); startRoom(); }
    function openSaveModal() { document.getElementById('save-code-area').value = ""; document.getElementById('save-modal').classList.remove('hidden'); }
    function closeSaveModal() { document.getElementById('save-modal').classList.add('hidden'); }
    function removeCircularRefs(key, value) { if (key === 'actionQueued' || key === 'jumpTarget' || key === 'target') return undefined; return value; }
    function exportSaveCode() { let d = JSON.stringify({ f: gameState.floor, r: gameState.room, p: gameState.party.map(h => ({ id: h.id, name: h.name, cardMemory: h.cardMemory, equips: h.equips, magic: h.magic, special: h.special, items: h.items, passives: h.passives, hp: h.hp, currentRerolls: h.currentRerolls }))}, removeCircularRefs); document.getElementById('save-code-area').value = btoa(encodeURIComponent(d)); addLog("代碼已產生！", "text-cyan-400"); }
    function importSaveCode() { let str = document.getElementById('save-code-area').value.trim(); if (!str) { showSystemMessage("請先貼上代碼！"); return; } try { let dec = JSON.parse(decodeURIComponent(atob(str))); gameState.floor = dec.f || 1; gameState.room = dec.r || 1; gameState.party = dec.p.map(x => { let h = new Hero(x.id || x.i, x.name || x.n); h.equips = x.equips || x.e; h.magic = x.magic || x.m; h.special = x.special || x.s; h.items = x.items || x.it; h.passives = x.passives || x.pa; h.hp = x.hp; h.currentRerolls = x.currentRerolls || x.rr || 1; h.cardMemory = x.cardMemory || x.cm || {}; return h; }); closeSaveModal(); startRoom(); } catch (e) { showSystemMessage("無法還原，請確認代碼完整度！"); } }
    function quickSaveGame() { let d = JSON.stringify({ f: gameState.floor, r: gameState.room, p: gameState.party.map(h => ({ id: h.id, name: h.name, cardMemory: h.cardMemory, equips: h.equips, magic: h.magic, special: h.special, items: h.items, passives: h.passives, hp: h.hp, currentRerolls: h.currentRerolls })) }, removeCircularRefs); localStorage.setItem(STORAGE_KEY, d); addLog("進度已保存。", "text-cyan-400"); closeSaveModal(); }
    function quickLoadGame() { let data = localStorage.getItem(STORAGE_KEY); if (!data) return showSystemMessage("無本機進度存檔！"); try { let dec = JSON.parse(data); gameState.floor = dec.f; gameState.room = dec.r; gameState.party = dec.p.map(x => { let h = new Hero(x.id || x.i, x.name || x.n); h.equips = x.equips || x.e; h.magic = x.magic || x.m; h.special = x.special || x.s; h.items = x.items || x.it; h.passives = x.passives || x.pa; h.hp = x.hp; h.currentRerolls = x.currentRerolls || x.rr || 1; h.cardMemory = x.cardMemory || x.cm || {}; return h; }); closeSaveModal(); startRoom(); } catch (e) { showSystemMessage("載入失敗！"); } }
    let rnId = null;
    function openRenameModal(id) { rnId = id; document.getElementById('rename-input').value = gameState.party.find(h=>h.id===id).name; document.getElementById('rename-modal').classList.remove('hidden'); }
    function confirmRename() { let v = document.getElementById('rename-input').value.trim(); if(v) { gameState.party.find(h=>h.id===rnId).name = v; renderPartyManagementTab(); resetActionInput(); } closeRenameModal(); }
    function closeRenameModal() { document.getElementById('rename-modal').classList.add('hidden'); rnId = null; }
    function calculateDmg(basePwr, targetDef, isCrit, isBlind) { if (basePwr <= 0) return 0; if (isBlind && Math.random() < 0.5) return 0; let dmg = Math.max(1, basePwr - Math.floor(targetDef * 0.5)); if (isCrit) dmg = Math.floor(dmg * 1.5); dmg = Math.floor(dmg * (0.9 + Math.random() * 0.2)); return Math.max(1, dmg); }
    function checkEnemiesWiped() { if (gameState.enemies.every(e => e.isDead)) { if (gameState.isBattleActive) { gameState.isBattleActive = false; setTimeout(() => triggerVictoryFlow(), 1000); } return true; } return false; }
    function checkPartyWiped() { if (gameState.party.every(h => h.isDead)) { if (gameState.isBattleActive) { gameState.isBattleActive = false; setTimeout(() => triggerDefeatFlow(), 1000); } return true; } return false; }
    async function playTransition(title, sub, delay) { const overlay = document.getElementById('transition-overlay'); document.getElementById('transition-title').innerHTML = title; document.getElementById('transition-sub').innerHTML = sub; overlay.classList.remove('opacity-0', 'pointer-events-none'); overlay.classList.add('opacity-100'); await sleep(delay); overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0', 'pointer-events-none'); await sleep(500); }
    function triggerKillRecovery(hero) {}
    function renderPartyManagementTab() { const list = document.getElementById('status-full-list'); if (!list) return; list.innerHTML = ''; gameState.party.forEach((h, idx) => { list.innerHTML += generateHeroCardHTML(h, idx, false); }); }
    function renderHistoryLogs() { const container = document.getElementById('log-history-scroll'); if (!container) return; container.innerHTML = gameState.historyLogs.map(l => `<div class="${l.color}">${l.msg}</div>`).join(''); setTimeout(() => { container.scrollTop = container.scrollHeight; }, 10); }
    function clearHistoryLogs() { gameState.historyLogs = []; renderHistoryLogs(); }
    function initGame() { gameState.party = [ new Hero('h_01', '阿爾法'), new Hero('h_02', '貝塔'), new Hero('h_03', '伽瑪'), new Hero('h_04', '德爾塔') ]; startRoom(); }
    window.onload = () => initGame();
  </script>
