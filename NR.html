<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹收割：程式模組系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; background-color: #030712; overflow: hidden; touch-action: none; }
        .neon-glow { text-shadow: 0 0 10px rgba(244, 63, 94, 0.6), 0 0 20px rgba(244, 63, 94, 0.4); }
        .text-glow-cyan { text-shadow: 0 0 8px rgba(34, 211, 238, 0.8); }
    </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between select-none bg-gray-950">

    <header class="w-full bg-gray-900/80 border-b border-cyan-500/30 p-2 flex justify-between items-center z-10 backdrop-blur-md">
        <div class="flex items-center space-x-3">
            <span class="text-rose-500 text-lg font-bold tracking-wider neon-glow">NEON REAPER v2.1</span>
            <span id="score-display" class="text-cyan-400 text-xs font-bold text-glow-cyan">分數: 0</span>
        </div>
        <div class="flex items-center space-x-2">
            <span id="wave-display" class="bg-purple-950/80 text-purple-300 border border-purple-500 px-2 py-1 rounded text-xs font-bold">波次 1</span>
            <button id="pause-btn" class="bg-gray-800 text-cyan-400 border border-cyan-500/50 px-3 py-1 rounded text-xs"><i class="fas fa-pause"></i></button>
        </div>
    </header>

    <div class="w-full bg-gray-950 h-1.5 relative z-10">
        <div id="xp-bar" class="h-full bg-gradient-to-r from-cyan-400 to-blue-600 transition-all duration-200" style="width: 0%"></div>
    </div>

    <main class="relative flex-grow w-full flex items-center justify-center overflow-hidden">
        <canvas id="game-canvas" class="absolute top-0 left-0 block z-0"></canvas>
        <div id="joystick-zone" class="absolute inset-0 z-10 hidden pointer-events-auto">
            <div id="joystick-base" class="absolute w-20 h-20 rounded-full border border-cyan-500/40 bg-cyan-950/20 hidden flex items-center justify-center pointer-events-none">
                <div id="joystick-stick" class="w-8 h-8 rounded-full bg-cyan-400/80 shadow-[0_0_10px_rgba(34,211,238,0.8)]"></div>
            </div>
        </div>

        <div class="absolute top-4 left-4 bg-gray-900/80 border border-rose-500/40 px-2 py-1 rounded flex items-center space-x-2 z-10 shadow-[0_0_10px_rgba(244,63,94,0.15)]">
            <i class="fas fa-heart text-rose-500 text-xs animate-pulse"></i>
            <div class="w-20 bg-gray-950 h-2 rounded-full overflow-hidden border border-gray-800">
                <div id="hp-bar" class="h-full bg-rose-500 transition-all" style="width: 100%"></div>
            </div>
        </div>

        <div id="build-status" class="absolute bottom-4 left-4 right-4 flex space-x-2 z-10 pointer-events-none flex-wrap gap-y-2"></div>

        <div id="start-overlay" class="absolute inset-0 bg-gray-950/95 z-20 flex flex-col items-center justify-center p-6 text-center">
            <h1 class="text-4xl md:text-5xl font-black text-rose-500 tracking-widest neon-glow mb-4">NEON REAPER</h1>
            <p class="text-cyan-400 text-sm mb-6">已修復模組載入錯誤。準備執行最新代碼。</p>
            <button id="start-btn" class="px-8 py-3 bg-rose-600 text-white font-bold rounded border border-rose-400 shadow-[0_0_15px_rgba(244,63,94,0.6)] hover:bg-rose-500 transition-all hover:scale-105">開始執行</button>
        </div>

        <div id="upgrade-overlay" class="absolute inset-0 bg-gray-950/95 z-20 hidden flex-col items-center justify-center p-4">
            <h2 class="text-2xl font-bold text-cyan-400 mb-2 tracking-widest">發現新補丁</h2>
            <p class="text-gray-400 text-xs mb-4">選擇模組安裝至武器，創造強大 Build</p>
            <div id="upgrade-cards" class="flex flex-col gap-3 w-full max-w-sm"></div>
        </div>

        <div id="gameover-overlay" class="absolute inset-0 bg-red-950/95 z-20 hidden flex-col items-center justify-center p-6 text-center">
            <h2 class="text-4xl font-black text-red-500 mb-2 animate-pulse">系統崩潰</h2>
            <p class="text-gray-400 text-sm mb-4">波次: <span id="final-wave" class="text-white"></span> | 分數: <span id="final-score" class="text-white"></span></p>
            <button id="restart-btn" class="px-8 py-3 bg-red-600 text-white font-bold rounded border border-red-400 hover:bg-red-500 transition-all hover:scale-105">重新啟動</button>
        </div>
    </main>

    <script>
        // --- 1. 資料驅動架構 ---
        const MODULES = {
            virus: { 
                id: 'virus', name: '病毒', color: '#a855f7', icon: 'fa-bug', desc: '擊中附加中毒(每秒扣血)',
                onHit: (b, e, s) => { e.effects.poison = { ticks: 5, dmg: Math.ceil(b.damage*0.3), last: s.gTime }; }
            },
            overclock: {
                id: 'overclock', name: '超頻', color: '#f59e0b', icon: 'fa-gauge-high', desc: '射速增快，子彈速度+50%',
                onEquip: (w) => { w.cooldown *= 0.7; },
                onFire: (b) => { b.vx *= 1.5; b.vy *= 1.5; }
            },
            firewall: {
                id: 'firewall', name: '防火牆', color: '#ef4444', icon: 'fa-fire-flame-curved', desc: '飛行路徑殘留火焰',
                onUpdate: (b, s) => {
                    if(Math.random() < 0.2) s.effs.push({ type: 'fire', x: b.x, y: b.y, r: b.size*1.5, c: '#ef4444', life: 1, dmg: b.damage*0.5 });
                }
            },
            duplicate: {
                id: 'duplicate', name: '複製', color: '#3b82f6', icon: 'fa-copy', desc: '每次開火額外分裂 2 發',
                onFire: (b, s) => {
                    if(b.isDup) return;
                    const angle = Math.atan2(b.vy, b.vx), speed = Math.hypot(b.vx, b.vy);
                    [-0.3, 0.3].forEach(off => { s.buls.push({...b, vx: Math.cos(angle+off)*speed, vy: Math.sin(angle+off)*speed, isDup: true}); });
                }
            },
            loop: {
                id: 'loop', name: '迴圈', color: '#10b981', icon: 'fa-rotate-right', desc: '極限距離或擊中時折返',
                onHit: (b, e, s) => { if(!b.ret) { b.ret = true; b.pierce = true; } },
                onUpdate: (b, s) => {
                    if (b.dist >= b.range * 0.9 && !b.ret) { b.ret = true; b.pierce = true; }
                    if (b.ret) {
                        const dx = s.p.x - b.x, dy = s.p.y - b.y, d = Math.hypot(dx, dy), spd = Math.hypot(b.vx, b.vy) || 5;
                        if(d < 20) b.dist = b.range + 1; else { b.vx = (dx/d)*spd; b.vy = (dy/d)*spd; b.dist = 0; }
                    }
                }
            },
            hack: {
                id: 'hack', name: '駭入', color: '#06b6d4', icon: 'fa-terminal', desc: '擊殺時引發電磁爆發',
                onKill: (b, e, s) => {
                    s.effs.push({ type: 'ring', x: e.x, y: e.y, r: 5, maxR: 80, color: '#06b6d4', life: 1 });
                    s.ens.forEach(en => { if(Math.hypot(en.x-e.x, en.y-e.y) < 80) en.hp -= b.damage; });
                }
            }
        };

        const WEAPONS = {
            laser: {
                id: 'laser', name: '雷射', level: 1, baseCd: 500, cooldown: 500, damage: 12, range: 400, color: '#22d3ee', lastShot: 0, mods: [],
                fire: (p, t, s, w) => {
                    const a = Math.atan2(t.y-p.y, t.x-p.x);
                    return { x: p.x, y: p.y, vx: Math.cos(a)*10, vy: Math.sin(a)*10, damage: w.damage, color: w.color, size: 4, range: w.range, dist: 0, mods: w.mods };
                }
            },
            missile: {
                id: 'missile', name: '飛彈', level: 0, baseCd: 1500, cooldown: 1500, damage: 30, range: 600, color: '#f59e0b', lastShot: 0, mods: [],
                fire: (p, t, s, w) => {
                    const a = Math.atan2(t.y-p.y, t.x-p.x);
                    return { x: p.x, y: p.y, vx: Math.cos(a)*4, vy: Math.sin(a)*4, damage: w.damage, color: w.color, size: 6, range: w.range, dist: 0, mods: w.mods, isMis: true, tg: t };
                }
            },
            nova: {
                id: 'nova', name: '脈衝', level: 0, baseCd: 2000, cooldown: 2000, damage: 15, range: 120, color: '#ec4899', lastShot: 0, mods: [],
                fire: (p, t, s, w) => {
                    s.effs.push({ type: 'ring', x: p.x, y: p.y, r: 10, maxR: w.range, color: w.color, life: 1 });
                    for(let i=0; i<8; i++) {
                        const a = (i/8)*Math.PI*2;
                        s.buls.push({ x: p.x, y: p.y, vx: Math.cos(a)*5, vy: Math.sin(a)*5, damage: w.damage, color: w.color, size: 5, range: w.range, dist: 0, mods: w.mods });
                    }
                    return null;
                }
            },
            chakram: {
                id: 'chakram', name: '迴旋刃', level: 0, baseCd: 1000, cooldown: 1000, damage: 20, range: 250, color: '#10b981', lastShot: 0, mods: [],
                fire: (p, t, s, w) => {
                    const a = Math.atan2(t.y-p.y, t.x-p.x);
                    return { x: p.x, y: p.y, vx: Math.cos(a)*6, vy: Math.sin(a)*6, damage: w.damage, color: w.color, size: 8, range: w.range, dist: 0, mods: w.mods, pierce: true, ret: false, isChak: true };
                }
            }
        };

        const ENEMY_TYPES = {
            bug: { hp: 15, spd: 1.5, dmg: 5, score: 10, col: '#f43f5e', sz: 10, xp: 5 },
            worm: { hp: 35, spd: 1.0, dmg: 15, score: 25, col: '#8b5cf6', sz: 14, xp: 12 },
            boss: { hp: 150, spd: 0.5, dmg: 30, score: 100, col: '#eab308', sz: 24, xp: 50 }
        };

        // --- 2. 狀態 ---
        const state = {
            run: false, pause: false, score: 0, wave: 1, nextW: 100, xp: 0, need: 20,
            p: { x:0, y:0, sz: 12, spd: 3.5, hp: 100, mhp: 100, arm: 0 },
            keys: {}, joy: { a: false, x: 0, y: 0, sx: 0, sy: 0 },
            ens: [], buls: [], gems: [], effs: [], texts: [],
            lastSpw: 0, spwInv: 1200, gTime: 0, lastTs: 0
        };

        // --- 3. 渲染器 ---
        const cvs = document.getElementById('game-canvas'), ctx = cvs.getContext('2d');
        function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; if(!state.run){state.p.x=cvs.width/2; state.p.y=cvs.height/2;} }
        window.addEventListener('resize', resize); resize();

        function addTxt(x,y,t,c='#fff') { state.texts.push({x, y:y-10, t, c, a:1, vy:-1}); }
        function explode(x,y,c,n) { for(let i=0;i<n;i++) state.effs.push({type:'p', x,y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, r:Math.random()*3+1, c, a:1, d:0.04}); }

        // --- 4. 控制 ---
        window.addEventListener('keydown', e => state.keys[e.key.toLowerCase()]=true); window.addEventListener('keyup', e => state.keys[e.key.toLowerCase()]=false);
        const jZ = document.getElementById('joystick-zone'), jB = document.getElementById('joystick-base'), jS = document.getElementById('joystick-stick');
        if('ontouchstart' in window) jZ.classList.remove('hidden');
        jZ.addEventListener('touchstart', e => { const t=e.touches[0]; state.joy.a=true; state.joy.sx=t.clientX; state.joy.sy=t.clientY; jB.style.left=`${t.clientX-40}px`; jB.style.top=`${t.clientY-40}px`; jB.style.display='flex'; jS.style.transform=`translate(0,0)`; });
        jZ.addEventListener('touchmove', e => { if(!state.joy.a) return; let dx=e.touches[0].clientX-state.joy.sx, dy=e.touches[0].clientY-state.joy.sy, d=Math.hypot(dx,dy), m=30; if(d>m){dx=dx/d*m; dy=dy/d*m;} jS.style.transform=`translate(${dx}px,${dy}px)`; state.joy.x=dx/m; state.joy.y=dy/m; });
        jZ.addEventListener('touchend', () => { state.joy.a=false; state.joy.x=0; state.joy.y=0; jB.style.display='none'; });

        // --- 5. 核心循環 ---
        function updateUI() {
            document.getElementById('score-display').innerText = `分數: ${state.score}`; document.getElementById('wave-display').innerText = `波次 ${state.wave}`;
            document.getElementById('hp-bar').style.width = `${Math.max(0, state.p.hp/state.p.mhp*100)}%`; document.getElementById('xp-bar').style.width = `${Math.min(100, state.xp/state.need*100)}%`;
            
            const bUI = document.getElementById('build-status'); bUI.innerHTML = '';
            Object.values(WEAPONS).filter(w=>w.level>0).forEach(w => {
                let mHtml = w.mods.map(m => `<i class="fas ${MODULES[m].icon}" style="color:${MODULES[m].color}"></i>`).join(' ');
                bUI.innerHTML += `<div class="bg-gray-900/80 border border-gray-700 rounded px-2 py-1 text-[10px] text-white flex items-center space-x-2"><span style="color:${w.color};font-weight:bold">${w.name}</span> ${mHtml!=='' ? '<span class="text-gray-500">|</span> '+mHtml : ''}</div>`;
            });
        }

        function triggerLevelUp() {
            state.pause = true; const ov = document.getElementById('upgrade-overlay'), cd = document.getElementById('upgrade-cards'); cd.innerHTML='';
            const opts = [], unWs = Object.values(WEAPONS).filter(w=>w.level>0), lkWs = Object.values(WEAPONS).filter(w=>w.level===0), mk = Object.keys(MODULES);

            if(lkWs.length > 0) {
                const w = lkWs[Math.floor(Math.random()*lkWs.length)];
                opts.push({ t: `解鎖武器：${w.name}`, d: '安裝新的攻擊程序', c: w.color, i: 'fa-cube', act: () => { w.level=1; } });
            } else {
                opts.push({ t: `核心升級：超導體`, d: '傷害與速度全面提升', c: '#fcd34d', i: 'fa-microchip', act: () => { unWs.forEach(w=>{w.damage+=5;}); state.p.spd+=0.5; } });
            }

            for(let i=0; i<2; i++) {
                const tw = unWs[Math.floor(Math.random()*unWs.length)], m = MODULES[mk[Math.floor(Math.random()*mk.length)]];
                opts.push({
                    t: `安裝模組：${m.name} <i class="fas fa-arrow-right mx-1 text-gray-500"></i> <span style="color:${tw.color}">${tw.name}</span>`,
                    d: m.desc, c: m.color, i: m.icon,
                    act: () => { 
                        if(!tw.mods.includes(m.id)) { tw.mods.push(m.id); if(m.onEquip) m.onEquip(tw); }
                        else { tw.damage += 5; addTxt(state.p.x, state.p.y, '模組升級!', m.color); }
                    }
                });
            }

            opts.forEach(o => {
                const d = document.createElement('div'); d.className = `bg-gray-900 border border-gray-700 p-3 rounded-lg cursor-pointer hover:bg-gray-800 transition flex items-center space-x-3`;
                d.innerHTML = `<div class="text-2xl w-8 text-center" style="color:${o.c}"><i class="fas ${o.i}"></i></div><div class="text-left flex-grow"><h3 class="font-bold text-white text-sm">${o.t}</h3><p class="text-gray-400 text-[10px] mt-0.5">${o.d}</p></div>`;
                d.onclick = () => { o.act(); ov.classList.add('hidden'); state.pause=false; state.xp=0; state.need=Math.floor(state.need*1.5); updateUI(); };
                cd.appendChild(d);
            });
            ov.classList.remove('hidden');
        }

        function loop(ts) {
            requestAnimationFrame(loop);
            const now = ts || performance.now(), dt = now - (state.lastTs || now); state.lastTs = now;
            if(!state.run || state.pause) return;
            state.gTime += dt; // 使用獨立遊戲時間，解決暫停後的時間跳躍問題

            ctx.fillStyle = 'rgba(3,7,18,0.3)'; ctx.fillRect(0,0,cvs.width,cvs.height);

            // 玩家
            let dx=0, dy=0;
            if(state.keys['w']||state.keys['arrowup']) dy-=1; if(state.keys['s']||state.keys['arrowdown']) dy+=1;
            if(state.keys['a']||state.keys['arrowleft']) dx-=1; if(state.keys['d']||state.keys['arrowright']) dx+=1;
            if(dx!==0&&dy!==0){let l=Math.hypot(dx,dy); dx/=l; dy/=l;}
            if(state.joy.a){dx=state.joy.x; dy=state.joy.y;}
            state.p.x = Math.max(state.p.sz, Math.min(cvs.width-state.p.sz, state.p.x+dx*state.p.spd));
            state.p.y = Math.max(state.p.sz, Math.min(cvs.height-state.p.sz, state.p.y+dy*state.p.spd));

            // 武器射擊
            if(state.ens.length>0) {
                let tg = state.ens.reduce((p,c)=>Math.hypot(c.x-state.p.x,c.y-state.p.y)<Math.hypot(p.x-state.p.x,p.y-state.p.y)?c:p);
                Object.values(WEAPONS).forEach(w => {
                    if(w.level>0 && state.gTime-w.lastShot>=w.cooldown) {
                        const b = w.fire(state.p, tg, state, w);
                        if(b) {
                            w.mods.forEach(m => { if(MODULES[m].onFire) MODULES[m].onFire(b, state); });
                            state.buls.push(b);
                        }
                        w.lastShot = state.gTime;
                    }
                });
            }

            // 敵人
            if(state.gTime-state.lastSpw > state.spwInv) {
                state.lastSpw = state.gTime; let t = ENEMY_TYPES.bug;
                if(state.wave>=3 && Math.random()>0.6) t=ENEMY_TYPES.worm;
                if(state.wave>=5 && Math.random()>0.9) t=ENEMY_TYPES.boss;
                let eg = Math.floor(Math.random()*4), ex = eg===0||eg===2?Math.random()*cvs.width:(eg===1?cvs.width+30:-30), ey = eg===1||eg===3?Math.random()*cvs.height:(eg===2?cvs.height+30:-30);
                state.ens.push({...t, x:ex, y:ey, hp: t.hp+(state.wave-1)*8, mhp: t.hp+(state.wave-1)*8, spd: t.spd*(1+(state.wave-1)*0.05), effects: {} });
            }

            for(let i=state.ens.length-1; i>=0; i--) {
                let e = state.ens[i], d = Math.hypot(state.p.x-e.x, state.p.y-e.y);
                if(d>2){ e.x+=((state.p.x-e.x)/d)*e.spd; e.y+=((state.p.y-e.y)/d)*e.spd; }
                
                if(e.effects.poison && state.gTime - e.effects.poison.last > 1000) {
                    e.hp -= e.effects.poison.dmg; addTxt(e.x, e.y, `-${e.effects.poison.dmg}`, '#a855f7');
                    e.effects.poison.ticks--; e.effects.poison.last = state.gTime;
                    if(e.effects.poison.ticks<=0) delete e.effects.poison;
                }

                if(d<state.p.sz+e.sz) {
                    state.p.hp-=e.dmg; addTxt(state.p.x, state.p.y, `-${e.dmg}`, '#ef4444'); explode(e.x, e.y, e.col, 5); state.ens.splice(i,1); updateUI();
                    if(state.p.hp<=0) { state.run=false; document.getElementById('final-wave').innerText=state.wave; document.getElementById('final-score').innerText=state.score; document.getElementById('gameover-overlay').classList.remove('hidden'); }
                    continue;
                }
                ctx.shadowBlur=8; ctx.shadowColor=e.col; ctx.fillStyle=e.col; ctx.beginPath();
                if(e.sz===10) { ctx.moveTo(e.x,e.y-e.sz); ctx.lineTo(e.x-e.sz,e.y+e.sz); ctx.lineTo(e.x+e.sz,e.y+e.sz); }
                else if(e.sz===14) { ctx.moveTo(e.x,e.y-e.sz); ctx.lineTo(e.x+e.sz,e.y); ctx.lineTo(e.x,e.y+e.sz); ctx.lineTo(e.x-e.sz,e.y); }
                else { ctx.arc(e.x,e.y,e.sz,0,Math.PI*2); }
                ctx.fill(); ctx.shadowBlur=0;
            }

            // 子彈
            for(let i=state.buls.length-1; i>=0; i--) {
                let b = state.buls[i];
                if(b.isMis && b.tg && state.ens.includes(b.tg)) {
                    const ta = Math.atan2(b.tg.y-b.y, b.tg.x-b.x), spd = Math.hypot(b.vx, b.vy);
                    b.vx = Math.cos(ta)*spd; b.vy = Math.sin(ta)*spd;
                } else if(b.isChak && !b.ret) {
                    b.vx *= 0.95; b.vy *= 0.95; if(Math.hypot(b.vx, b.vy) < 0.5) { b.ret = true; }
                }

                if(b.mods) b.mods.forEach(m => { if(MODULES[m].onUpdate) MODULES[m].onUpdate(b, state); });

                b.x+=b.vx; b.y+=b.vy; b.dist+=Math.hypot(b.vx,b.vy);
                if(b.dist>=b.range || b.x<0||b.x>cvs.width||b.y<0||b.y>cvs.height) { state.buls.splice(i,1); continue; }
                
                ctx.fillStyle=b.color; ctx.beginPath(); ctx.arc(b.x,b.y,b.size,0,Math.PI*2); ctx.fill();
                
                let hit=false;
                for(let j=state.ens.length-1; j>=0; j--) {
                    let e=state.ens[j];
                    if(Math.hypot(b.x-e.x,b.y-e.y)<b.size+e.sz) {
                        e.hp-=b.damage; addTxt(e.x,e.y,b.damage,b.color); explode(b.x,b.y,e.col,3);
                        if(b.mods) b.mods.forEach(m => { if(MODULES[m].onHit) MODULES[m].onHit(b, e, state); });
                        
                        if(e.hp<=0) {
                            state.score+=e.score; explode(e.x,e.y,e.col,8); state.gems.push({x:e.x,y:e.y,xp:e.xp}); state.ens.splice(j,1);
                            if(b.mods) b.mods.forEach(m => { if(MODULES[m].onKill) MODULES[m].onKill(b, e, state); });
                            if(state.score>=state.nextW){ state.wave++; state.nextW=Math.round(state.nextW*2); state.spwInv=Math.max(300,state.spwInv-100); addTxt(cvs.width/2,cvs.height/3,`波次 ${state.wave}`,'#f59e0b'); }
                        }
                        if(!b.pierce) hit=true; break;
                    }
                }
                if(hit) state.buls.splice(i,1);
            }

            // 寶石
            for(let i=state.gems.length-1; i>=0; i--) {
                let g=state.gems[i], d=Math.hypot(state.p.x-g.x,state.p.y-g.y);
                if(d<150){ g.x+=((state.p.x-g.x)/d)*6; g.y+=((state.p.y-g.y)/d)*6; }
                if(d<state.p.sz+5){ state.xp+=g.xp; state.gems.splice(i,1); updateUI(); if(state.xp>=state.need) triggerLevelUp(); continue; }
                ctx.shadowBlur=5; ctx.shadowColor='#10b981'; ctx.fillStyle='#34d399'; ctx.beginPath(); ctx.arc(g.x,g.y,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
            }

            // 特效
            for(let i=state.effs.length-1; i>=0; i--) {
                let f=state.effs[i];
                if(f.type==='p'){ f.x+=f.vx; f.y+=f.vy; f.a-=f.d; if(f.a<=0) {state.effs.splice(i,1);continue;} ctx.globalAlpha=f.a; ctx.fillStyle=f.c; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill(); }
                else if(f.type==='ring'){ f.r+=(f.maxR-f.r)*0.1; f.life-=0.05; if(f.life<=0){state.effs.splice(i,1);continue;} ctx.globalAlpha=f.life; ctx.strokeStyle=f.color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.stroke(); }
                else if(f.type==='fire'){ 
                    f.life-=0.02; if(f.life<=0){state.effs.splice(i,1);continue;}
                    ctx.globalAlpha=f.life; ctx.fillStyle=f.c; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
                    if(Math.floor(state.gTime)%10===0) { state.ens.forEach(e=>{if(Math.hypot(f.x-e.x,f.y-e.y)<f.r+e.sz) {e.hp-=f.dmg; addTxt(e.x,e.y,Math.floor(f.dmg),'#ef4444');} }); }
                }
            } ctx.globalAlpha=1;

            for(let i=state.texts.length-1; i>=0; i--) {
                let t=state.texts[i]; t.y+=t.vy; t.a-=0.02; if(t.a<=0){state.texts.splice(i,1);continue;}
                ctx.globalAlpha=t.a; ctx.fillStyle=t.c; ctx.font='12px "Share Tech Mono"'; ctx.textAlign='center'; ctx.fillText(t.t,t.x,t.y);
            } ctx.globalAlpha=1;

            ctx.shadowBlur=15; ctx.shadowColor='#06b6d4'; ctx.fillStyle='#22d3ee'; ctx.beginPath(); ctx.arc(state.p.x,state.p.y,state.p.sz,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(state.p.x,state.p.y,state.p.sz*0.4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
        }

        // --- 6. 啟動 ---
        function start() {
            resize();
            Object.assign(state, { run:true, pause:false, score:0, wave:1, nextW:100, xp:0, need:20, ens:[], buls:[], gems:[], effs:[], texts:[], gTime:0, lastTs:performance.now(), lastSpw:0 });
            state.p = { x:cvs.width/2, y:cvs.height/2, sz:12, spd:3.5, hp:100, mhp:100, arm:0 };
            Object.keys(WEAPONS).forEach(k => { WEAPONS[k].level=k==='laser'?1:0; WEAPONS[k].cooldown=WEAPONS[k].baseCd; WEAPONS[k].mods=[]; WEAPONS[k].lastShot=0; });
            document.getElementById('start-overlay').classList.add('hidden'); document.getElementById('gameover-overlay').classList.add('hidden');
            ctx.fillStyle='#030712'; ctx.fillRect(0,0,cvs.width,cvs.height); updateUI();
        }

        document.getElementById('start-btn').onclick = start; document.getElementById('restart-btn').onclick = start;
        document.getElementById('pause-btn').onclick = () => { if(!state.run)return; state.pause=!state.pause; document.getElementById('pause-btn').innerHTML = state.pause?'<i class="fas fa-play"></i>':'<i class="fas fa-pause"></i>'; };
        requestAnimationFrame(loop);
    </script>
</body>
</html>
