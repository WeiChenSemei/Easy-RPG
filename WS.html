<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>世界種子</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f4f8;
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            touch-action: none; /* 防止手機預設滑動行為 */
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            pointer-events: none;
            transition: opacity 2s ease-in-out;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }
        p {
            font-size: 16px;
            margin: 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>🌱 世界種子</h1>
        <p>觸控或拖曳來探索<br>觀察世界的誕生與演化</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const ui = document.getElementById('ui');

        let W, H;
        const TS = 60; // Tile Size (格子大小)
        const GEN_RADIUS = 12; // 視野生成半徑
        const MAX_ENTITIES = 100; // 最大實體數量限制

        // 地形種類: 0=泥土, 1=草地, 2=水域
        const TERRAIN_COLORS = ['#d2b48c', '#a9d18e', '#7caee3'];
        
        // 遊戲資料
        const map = new Map(); // key: "x,y", value: { t: terrain, f: feature_emoji, age: number }
        const entities = []; // 動態小生物
        const particles = []; // 情感與特效粒子

        // 玩家狀態
        let pX = 0, pY = 0; // 玩家世界座標
        let cX = 0, cY = 0; // 攝影機世界座標
        let targetX = 0, targetY = 0;
        let isMoving = false;
        let hasMoved = false;

        // 初始化畫布
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 初始生成起始點
        map.set('0,0', { t: 1, f: null, age: 0 });

        // --- 特效系統 ---
        function spawnParticle(x, y, emoji, lifeStr) {
            particles.push({
                x: x, y: y, emoji: emoji,
                life: lifeStr, maxLife: lifeStr,
                vy: -0.01 - Math.random() * 0.02
            });
        }

        // --- 輸入控制 ---
        function updateTarget(clientX, clientY) {
            // 螢幕座標轉世界座標
            targetX = cX + (clientX - W / 2) / TS;
            targetY = cY + (clientY - H / 2) / TS;
            isMoving = true;
            
            if (!hasMoved) {
                hasMoved = true;
                ui.style.opacity = '0'; // 隱藏提示
            }
        }

        canvas.addEventListener('pointerdown', e => updateTarget(e.clientX, e.clientY));
        canvas.addEventListener('pointermove', e => {
            if (e.buttons > 0 || e.touches?.length > 0) {
                updateTarget(e.clientX, e.clientY);
            }
        });
        canvas.addEventListener('pointerup', () => isMoving = false);
        canvas.addEventListener('pointercancel', () => isMoving = false);

        // --- 世界生成與演化邏輯 ---

        // 根據周圍地形決定新地形 (產生區塊感)
        function getNeighborTerrain(x, y) {
            const neighbors = [
                map.get(`${x-1},${y}`), map.get(`${x+1},${y}`),
                map.get(`${x},${y-1}`), map.get(`${x},${y+1}`)
            ];
            const valid = neighbors.filter(n => n !== undefined);
            if (valid.length > 0 && Math.random() < 0.85) {
                return valid[Math.floor(Math.random() * valid.length)].t;
            }
            return Math.floor(Math.random() * 3); // 隨機地形
        }

        // 探索生成地圖
        function generateWorld() {
            let prx = Math.floor(pX);
            let pry = Math.floor(pY);
            for (let dx = -GEN_RADIUS; dx <= GEN_RADIUS; dx++) {
                for (let dy = -GEN_RADIUS; dy <= GEN_RADIUS; dy++) {
                    if (dx * dx + dy * dy <= GEN_RADIUS * GEN_RADIUS) {
                        let gx = prx + dx;
                        let gy = pry + dy;
                        let key = `${gx},${gy}`;
                        if (!map.has(key)) {
                            let t = getNeighborTerrain(gx, gy);
                            let f = null;
                            // 偶爾生成初始石頭
                            if (t === 0 && Math.random() < 0.05) f = '🪨';
                            map.set(key, { t, f, age: 0 });
                        }
                    }
                }
            }
        }

        // 生成實體(小動物)
        function spawnEntity(x, y, emojis) {
            if (entities.length >= MAX_ENTITIES) return;
            let emoji = emojis[Math.floor(Math.random() * emojis.length)];
            entities.push({
                x: x, y: y, emoji: emoji,
                vx: (Math.random() - 0.5) * 0.04,
                vy: (Math.random() - 0.5) * 0.04,
                life: 600 + Math.random() * 600 // 存活時間
            });
        }

        // 蔓延地形
        function spreadTerrain(x, y, fromT, toT) {
            const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
            let dir = dirs[Math.floor(Math.random() * 4)];
            let nTile = map.get(`${x + dir[0]},${y + dir[1]}`);
            if (nTile && nTile.t === fromT && !nTile.f) {
                nTile.t = toT;
            }
        }

        // 世界自然演化 (定時觸發)
        function simulateEcosystem() {
            let prx = Math.floor(pX);
            let pry = Math.floor(pY);
            
            // 掃描玩家附近的格子進行演化
            for (let dx = -GEN_RADIUS; dx <= GEN_RADIUS; dx++) {
                for (let dy = -GEN_RADIUS; dy <= GEN_RADIUS; dy++) {
                    let gx = prx + dx;
                    let gy = pry + dy;
                    let tile = map.get(`${gx},${gy}`);
                    
                    if (tile) {
                        tile.age++; // 土地隨時間變老/成熟

                        if (Math.random() < 0.02) { // 2%機率該格發生生態事件
                            
                            // 1. 陪伴成長的植物 (依年齡進化)
                            if (tile.t === 1) { // 草地
                                if (!tile.f && tile.age > 20 && Math.random() < 0.1) {
                                    tile.f = '🌿'; // 長出嫩葉
                                } else if (tile.f === '🌿' && tile.age > 100) {
                                    tile.f = Math.random() < 0.3 ? '🌳' : '🌸'; // 長成樹或花
                                } else if (tile.f === '🌳' && tile.age > 500) {
                                    tile.f = '🌲'; // 隨著世界長大，變成古樹
                                }
                            }
                            else if (tile.t === 2 && !tile.f && tile.age > 50) { // 水域
                                if (Math.random() < 0.1) tile.f = Math.random() < 0.5 ? '🪷' : '🎋';
                            }
                            
                            // 2. 繁殖與吸引動物
                        }

                        // 3. 地貌蔓延
                        if (tile.t === 2 && Math.random() < 0.1) spreadTerrain(gx, gy, 0, 2); // 水淹沒泥土
                        if (tile.t === 1 && Math.random() < 0.1) spreadTerrain(gx, gy, 0, 1); // 草地覆蓋泥土
                    }
                }
            }

            // 更新實體(動物)狀態
            for (let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                e.x += e.vx;
                e.y += e.vy;
                e.life--;

                // 動物對玩家的陪伴與回應
                let distToPlayer = Math.sqrt(Math.pow(e.x - pX, 2) + Math.pow(e.y - pY, 2));
                if (distToPlayer < 3) {
                    // 靠近玩家時，動物會慢下來並冒出愛心或音符
                    e.vx *= 0.8;
                    e.vy *= 0.8;
                    if (Math.random() < 0.05) spawnParticle(e.x, e.y - 0.5, Math.random() > 0.5 ? '💖' : '🎵', 40);
                }

                // 隨機改變方向
                if (Math.random() < 0.05) {
                    e.vx += (Math.random() - 0.5) * 0.04;
                    e.vy += (Math.random() - 0.5) * 0.04;
                    // 限制最大速度
                    e.vx = Math.max(-0.03, Math.min(0.03, e.vx));
                    e.vy = Math.max(-0.03, Math.min(0.03, e.vy));
                }

                // 如果壽命耗盡或離玩家太遠則消失(回歸自然)
                let dist = Math.abs(e.x - pX) + Math.abs(e.y - pY);
                if (e.life <= 0 || dist > GEN_RADIUS + 5) {
                    entities.splice(i, 1);
                }
            }
        }
        setInterval(simulateEcosystem, 500); // 每0.5秒模擬一次生態

        // --- 主遊戲迴圈 ---
        function loop() {
            // 玩家移動
            if (isMoving) {
                let dx = targetX - pX;
                let dy = targetY - pY;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0.05) {
                    pX += (dx / dist) * 0.12; // 移動速度
                    pY += (dy / dist) * 0.12;
                }

                // 玩家(種子)走過泥土會長出草
                let curTileX = Math.floor(pX);
                let curTileY = Math.floor(pY);
                let curTile = map.get(`${curTileX},${curTileY}`);
                if (curTile) {
                    curTile.age += 5; // 玩家的陪伴會加速土地與植物的成長
                    if (curTile.t === 0) {
                        curTile.t = 1; // 轉為草地
                        if (Math.random() < 0.2 && !curTile.f) curTile.f = '🌱'; // 留下小芽
                        spawnParticle(pX, pY, '✨', 30); // 世界因你而閃耀
                    } else if (Math.random() < 0.02) {
                        spawnParticle(pX, pY, '✨', 20); // 待在草地上也會有微光回應
                    }
                }
                
                generateWorld();
            }

            // 平滑攝影機跟隨
            cX += (pX - cX) * 0.1;
            cY += (pY - cY) * 0.1;

            // 日夜交替 (溫柔的時間流逝)
            let timeOfDay = (Date.now() * 0.00005) % (Math.PI * 2); 
            let nightDarkness = Math.max(0, Math.sin(timeOfDay)) * 0.35; // 夜晚濾鏡透明度

            // 繪圖準備
            ctx.fillStyle = '#f0f4f8';
            ctx.fillRect(0, 0, W, H);
            
            ctx.save();
            ctx.translate(W / 2 - cX * TS, H / 2 - cY * TS);

            // 計算可視範圍，只渲染畫面內的區塊以提升效能
            let minX = Math.floor(cX - W / 2 / TS) - 1;
            let maxX = Math.ceil(cX + W / 2 / TS) + 1;
            let minY = Math.floor(cY - H / 2 / TS) - 1;
            let maxY = Math.ceil(cY + H / 2 / TS) + 1;

            // 繪製地圖
            for (let x = minX; x <= maxX; x++) {
                for (let y = minY; y <= maxY; y++) {
                    let tile = map.get(`${x},${y}`);
                    if (tile) {
                        // 畫背景地形 (+1像素避免接縫)
                        ctx.fillStyle = TERRAIN_COLORS[tile.t];
                        ctx.fillRect(x * TS - 0.5, y * TS - 0.5, TS + 1, TS + 1);

                        // 畫固定景物
                        if (tile.f) {
                            ctx.font = `${TS * 0.6}px sans-serif`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(tile.f, (x + 0.5) * TS, (y + 0.5) * TS);
                        }
                    }
                }
            }

            // 繪製動物實體
            ctx.font = `${TS * 0.45}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let e of entities) {
                // 若動物面向左，可以做翻轉，但Emoji簡單畫就好
                ctx.fillText(e.emoji, e.x * TS, e.y * TS);
            }

            // 繪製情感粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.y += p.vy;
                p.life--;
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.font = `${TS * 0.3}px sans-serif`;
                ctx.fillText(p.emoji, p.x * TS, p.y * TS);
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;

            // 繪製玩家(發光的種子)
            let pulse = 1 + Math.sin(Date.now() * 0.005) * 0.1;
            ctx.font = `${TS * 0.7 * pulse}px sans-serif`;
            
            // 增添發光特效
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 15;
            ctx.fillText('🌱', pX * TS, pY * TS);
            ctx.shadowBlur = 0; // 恢復

            ctx.restore();

            // 畫上日夜濾鏡 (世界陪伴你度過時光)
            if (nightDarkness > 0) {
                ctx.fillStyle = `rgba(10, 10, 40, ${nightDarkness})`;
                ctx.fillRect(0, 0, W, H);
            }

            requestAnimationFrame(loop);
        }

        // 啟動遊戲
        generateWorld();
        loop();

    </script>
</body>
</html>
