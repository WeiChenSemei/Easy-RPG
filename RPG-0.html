          nin: { id: 'nin', tier: 2, n: '忍者', e: '💨', req: { thf: 10, war: 10 }, s: { 1: ['s_bld'], 5: ['p_dod'], 10: ['s_asn'] } },
          asn: { id: 'asn', tier: 2, n: '刺客', e: '🗡️🩸', req: { thf: 10, mag: 10 }, s: { 1: ['m_pois'], 5: ['s_bld'], 10: ['s_asn'] } }, 
          mnk: { id: 'mnk', tier: 2, n: '武僧', e: '📿🥋', req: { thf: 10, clr: 10 }, s: { 1: ['s_stun'], 5: ['p_fcs'], 10: ['s_chk'] } }, 
          zer: { id: 'zer', tier: 3, n: '狂戰士', e: '🪓', req: { war: 15 }, s: { 1: ['s_ramp'], 5: ['p_brk'] } },
          wiz: { id: 'wiz', tier: 3, n: '巫師', e: '🔮', req: { mag: 15 }, s: { 1: ['m_met'], 5: ['p_eco'] } },
          bis: { id: 'bis', tier: 3, n: '主教', e: '⛪', req: { clr: 15 }, s: { 1: ['m_hwa'], 5: ['p_div'] } },
          rgr: { id: 'rgr', tier: 3, n: '遊俠', e: '🦅', req: { thf: 15 }, s: { 1: ['s_snp'], 5: ['p_swt'] } },
        };

        const INIT_PLAYER = {
          name: '無名冒險者', lvl: 1, hp: 60, bhp: 60, mp: 20, bmp: 20, batk: 8, bdef: 2, xp: 0, g: 50,
          x: 1, y: 1, mapLvl: 1, eq: { w: null, a: null, c: null }, inv: [], 
          pot: { hp: 3, mp: 1, cure: 1, mBoom: 0 }, upg: {}, st: {}, sUpg: {}, 
          job: 'nov', jLvl: { nov: 1 }, skills: ['s_def', 's_med'], defM: null, defS: null,
          meta: { deaths: 0, maxDmg: 0, maxJob: 'nov', maxJLvl: 1 } 
        };

        const getExpReq = (lvl) => Math.floor(25 * Math.pow(lvl, 1.25));
        const delay = ms => new Promise(r => setTimeout(r, ms));

        const StIcons = ({st}) => {
          if(!st || Object.keys(st).length===0) return null;
          return <span className="text-[10px] sm:text-xs ml-1 flex gap-0.5">{st.poison>0&&'🤢'}{st.burn>0&&'🔥'}{st.sleep>0&&'💤'}{st.freeze>0&&'🧊'}{st.stun>0&&'😵'}{st.bleed>0&&'🩸'}{st.stunImmune>0&&'🛡️'}</span>
        };

        function App() {
          const [scene, setScene] = useState('START'); 
          const [menu, setMenu] = useState('MAIN');    
          const [cMenu, setCMenu] = useState('MAIN');  
          
          const [p, setP] = useState({ ...INIT_PLAYER });
          const [mapData, setMapData] = useState([]);
          const [enemy, setEnemy] = useState(null);
          const [logs, setLogs] = useState([]);
          const [auto, setAuto] = useState(false);
          const [pwr, setPwr] = useState(false);
          
          const [editName, setEditName] = useState(false);
          const [tempN, setTempN] = useState('');
          const [infoModal, setInfoModal] = useState(null); 
          const [sellModal, setSellModal] = useState(false);
          const [logModal, setLogModal] = useState(false);
          const [saveCodeModal, setSaveCodeModal] = useState({ show: false, mode: '', code: '' });

          const generalLogRef = useRef(null);
          const fullLogEndRef = useRef(null);
          const isAnimating = useRef(false);

          const print = useCallback((msg) => { setLogs(prev => [...prev, `> ${msg}`].slice(-80)); }, []);
          useEffect(() => { if (generalLogRef.current) generalLogRef.current.scrollIntoView({ behavior: 'auto' }); }, [logs]);
          useEffect(() => { if (logModal && fullLogEndRef.current) fullLogEndRef.current.scrollIntoView({ behavior: 'auto' }); }, [logs, logModal]);

          // 🌟 全局字體大小狀態
          const [fontLevel, setFontLevel] = useState(1);
          useEffect(() => { document.documentElement.style.fontSize = ['14px', '16px', '18px'][fontLevel]; }, [fontLevel]);

          // 🌟 本地存讀檔與匯出匯入邏輯
          const saveLocal = () => { localStorage.setItem('rpg_save_v1', JSON.stringify(p)); print('💾 遊戲進度已儲存至瀏覽器本地端。'); };
          const loadLocal = () => {
            try {
              const s = localStorage.getItem('rpg_save_v1');
              if (s) {
                let parsed = JSON.parse(s);
                if(parsed && parsed.lvl) { setP(parsed); setScene('PLAY'); setMenu('MAIN'); setCMenu('MAIN'); setEnemy(null); genMap(); print('📂 已成功讀取本地存檔！'); }
              } else print('❌ 找不到本地存檔。');
            } catch(e) { print('❌ 讀檔失敗，存檔可能已毀損。'); }
          };
          const exportCode = () => {
            try {
              const code = btoa(unescape(encodeURIComponent(JSON.stringify(p))));
              setSaveCodeModal({ show: true, mode: 'export', code: code });
            } catch(e) { print('❌ 產生繼承碼失敗。'); }
          };
          
          const triggerImport = () => { setSaveCodeModal({ show: true, mode: 'import', code: '' }); };
          const handleImport = (code) => {
            if(!code) return;
            try {
              const parsed = JSON.parse(decodeURIComponent(escape(atob(code))));
              if(parsed && parsed.lvl) { setP(parsed); setScene('PLAY'); setMenu('MAIN'); setCMenu('MAIN'); setEnemy(null); genMap(); print('✨ 成功載入繼承碼，歡迎回來！'); }
              else print('❌ 繼承碼內容無效。');
            } catch(e) { print('❌ 解析繼承碼失敗，請確認複製的代碼是否完整無缺。'); }
            setSaveCodeModal({ show: false, mode: '', code: '' });
          };

          const getUpgVal = (id, lvl, isW) => id ? lvl * (parseInt(id.replace(/\D/g, '')) || 1) * (isW ? 5 : 3) : 0;

          const getAvailableSkills = useCallback((pl) => {
              return [...(pl.skills || [])];
          }, []);

          const getSk = useCallback((id, pl = p) => {
              if (!id || !SKILLS[id]) return null;
              let sk = { ...SKILLS[id] };
              if (pl?.sUpg?.[id] || (pl?.job === 'nov' && pl?.jLvl?.nov >= 99 && (id === 's_def' || id === 's_med'))) {
                  sk.n += '+'; 
                  if (sk.mul) sk.mul += 0.5; 
                  if (sk.isHeal) sk.isHeal += 0.2; 
                  if (sk.flat) sk.flat += 10; 
                  if (sk.lvlFlat) sk.lvlFlat += 5; 
                  if (sk.hits) sk.hits += 1; 
                  if (sk.instakill) sk.instakill += 0.1; 
                  if (sk.healMp) sk.healMp += 0.1; 
                  if (id === 's_def') sk.d = '受到的傷害降至 25%，並額外恢復少量 HP';
                  if (id === 's_med') sk.d = '瞬間爆發恢復 50 點 MP 與 20% HP';
              }
              return sk;
          }, [p]);

          const hasPsv = useCallback((id, pl = p) => getAvailableSkills(pl).includes(id), [p, getAvailableSkills]);
          const getPsvLvl = useCallback((id, pl = p) => hasPsv(id, pl) ? (pl.sUpg?.[id] ? 2 : 1) : 0, [hasPsv, p]);
          const getPsvMult = useCallback((pl = p) => hasPsv('p_ult', pl) ? 2.5 : 1, [hasPsv, p]); 

          const getMaxHp = useCallback((pl = p) => {
             let hpMul = 1 + (getPsvLvl('p_hp', pl) * 0.2) + (hasPsv('p_div', pl) ? 0.3 : 0);
             return Math.floor(((pl?.bhp || 60) + (pl?.eq?.c ? (ITEMS[pl.eq.c]?.hp||0) : 0)) * hpMul * getPsvMult(pl));
          }, [getPsvLvl, hasPsv, p, getPsvMult]);

          const getMaxMp = useCallback((pl = p) => {
             let mpMul = 1 + (getPsvLvl('p_mp', pl) * 0.2) + (hasPsv('p_div', pl) ? 0.3 : 0);
             return Math.floor((pl?.bmp || 20) * mpMul * getPsvMult(pl));
          }, [getPsvLvl, hasPsv, p, getPsvMult]);

          const getAtk = useCallback((pl = p) => {
             let atkPsv = getPsvLvl('p_atk', pl) * 5; let fcsPsv = getPsvLvl('p_fcs', pl) * 3; let brkPsv = hasPsv('p_brk', pl) ? 25 : 0;
             return Math.floor(((pl?.batk || 8) + (pl?.eq?.w ? (ITEMS[pl.eq.w]?.atk || 0) + getUpgVal(pl.eq.w, pl?.upg?.[pl.eq.w]||0, true) : 0) + (pl?.eq?.c ? (ITEMS[pl.eq.c]?.atk||0) : 0) + atkPsv + fcsPsv + brkPsv) * getPsvMult(pl));
          }, [getPsvLvl, hasPsv, p, getPsvMult]);

          const getDef = useCallback((pl = p) => {
             let defPsv = getPsvLvl('p_def', pl) * 5; let fcsPsv = getPsvLvl('p_fcs', pl) * 3;
             return Math.floor(((pl?.bdef || 2) + (pl?.eq?.a ? (ITEMS[pl.eq.a]?.def || 0) + getUpgVal(pl.eq.a, pl?.upg?.[pl.eq.a]||0, false) : 0) + (pl?.eq?.c ? (ITEMS[pl.eq.c]?.def||0) : 0) + defPsv + fcsPsv) * getPsvMult(pl));
          }, [getPsvLvl, hasPsv, p, getPsvMult]);

          const getMapName = (lvl) => (lvl && lvl <= 14) ? THEMES[lvl].name : `無盡異界 第${(lvl||15)-14}層`;
          const getTheme = (lvl) => THEMES[lvl] || { name: `無盡異界`, bg: 'bg-black', wall: '🌌', wallBg: 'bg-black', floorBg: 'bg-gradient-to-br from-indigo-950 via-purple-900 to-black' };

          const handleEquip = (id, isEquip) => {
             let pl = JSON.parse(JSON.stringify(p)); if(!pl.inv) pl.inv=[]; let t = ITEMS[id].t;
             if (isEquip) {
                let curr = pl.eq[t]; if (curr) pl.inv.push(curr); 
                let idx = pl.inv.indexOf(id); if (idx > -1) pl.inv.splice(idx, 1); 
                pl.eq[t] = id; print(`✅ 裝備了 [${ITEMS[id].n}]`);
             } else {
                pl.inv.push(id); pl.eq[t] = null; print(`🎒 卸下了 [${ITEMS[id].n}]`);
             }
             setP(pl); setInfoModal(null);
          };

          const setDefSkill = (type, id) => {
             const prop = type === 'm' ? 'defM' : 'defS';
             if (p[prop] === id) {
                 setP(pl => ({ ...pl, [prop]: null })); setInfoModal(null); print(`✅ 已取消預設${type==='m'?'魔法':'特技'}。`);
             } else {
                 setP(pl => ({ ...pl, [prop]: id })); setInfoModal(null); print(`✅ 已將 [${getSk(id, p).n}] 設為預設${type==='m'?'魔法':'特技'}。`);
             }
          };

          const useFieldItem = (type) => {
              if (auto || scene === 'COMBAT') return;
              let pl = JSON.parse(JSON.stringify(p));
              if (pl.pot[type] > 0) {
                  if (type === 'hp' && pl.hp < getMaxHp(pl)) {
                      pl.pot.hp--; pl.hp = Math.min(getMaxHp(pl), pl.hp + Math.floor(getMaxHp(pl)*0.4));
                      print(`🧪 飲用HP水，恢復生命。`); setP(pl);
                  } else if (type === 'mp' && pl.mp < getMaxMp(pl)) {
                      pl.pot.mp--; pl.mp = Math.min(getMaxMp(pl), pl.mp + Math.floor(getMaxMp(pl)*0.4));
                      print(`💧 飲用MP水，恢復魔力。`); setP(pl);
                  } else if (type === 'cure' && Object.keys(pl.st).length > 0) {
                      pl.pot.cure--; pl.st = {};
                      print(`✨ 飲用萬能藥，解除了所有異常狀態。`); setP(pl);
                  } else { print(`❌ 目前不需要使用。`); }
              }
          };

          const useFieldSkill = (skId) => {
              if (auto || scene === 'COMBAT') return;
              let pl = JSON.parse(JSON.stringify(p)); let sk = getSk(skId, pl);
              if (!sk || pl.mp < sk.mp) { print(`❌ MP 不足。`); return; }
              if (sk.isHeal || sk.isCure || sk.healMp) {
                  let used = false;
                  if (sk.isHeal && pl.hp < getMaxHp(pl)) { pl.hp = Math.min(getMaxHp(pl), pl.hp + Math.floor(getMaxHp(pl)*sk.isHeal)); used = true; }
                  if (sk.healMp && pl.mp < getMaxMp(pl)) { pl.mp = Math.min(getMaxMp(pl), pl.mp + Math.floor(getMaxMp(pl)*sk.healMp)); used = true; }
                  if (sk.isCure && Object.keys(pl.st).length > 0) { pl.st = {}; used = true; }
                  if (used) {
                      pl.mp -= sk.mp; print(`✨ 施放了 [${sk.n}]！`); setP(pl);
                  } else { print(`❌ 目前狀態不需要施放此技能。`); }
              }
          };

          const openInfo = (type, id, isEq) => {
            if (type === 'item') {
              const it = ITEMS[id]; const lvl = p.upg?.[id] || 0; if(!it) return;
              let stat = ''; let typeName = '';
              if(it.t === 'w'){ stat = `攻擊力: +${it.atk} ${lvl>0?`(強化加成: +${getUpgVal(id,lvl,true)})`:''}\n${it.sp?`【特殊效果】${it.sp==='poison'?'攻擊附帶中毒':it.sp==='lifesteal'?'攻擊吸血':''}`:''}`; typeName = '武器'; }
              else if(it.t === 'a'){ stat = `防禦力: +${it.def} ${lvl>0?`(強化加成: +${getUpgVal(id,lvl,false)})`:''}`; typeName = '防具'; }
              else if(it.t === 'c'){ stat = `附加能力: ` + (it.atk ? `攻擊 +${it.atk}` : it.def ? `防禦 +${it.def}` : it.hp ? `最大HP +${it.hp}` : '') + `\n${it.sp==='immune'?'【特殊效果】完全免疫所有異常狀態':it.sp==='burn'?'【特殊效果】攻擊附帶燃燒':''}`; typeName = '飾品'; }
              setInfoModal({ type: 'item', id, isEq, title: `${it.e} ${it.n} ${lvl>0?'+'+lvl:''}`, desc: `【${typeName}】\n\n${stat}\n賣出價值: ${it.sell} 🪙`, status: isEq ? '⚔️ 裝備中' : '🎒 存放於背包' });
            } else if (type === 'skill') {
              const sk = getSk(id, p); if(!sk) return; setInfoModal({ type: 'skill', id, title: `${sk.e} ${sk.n}`, desc: sk.d, status: sk.t==='p' ? '被動：自動生效' : `主ంటే動：消耗 ${sk.mp} 點 MP` });
            } else if (type === 'job') {
              const j = JOBS[id]; if(!j) return;
              let reqText = Object.keys(j.req).length > 0 ? Object.keys(j.req).map(r => `${JOBS[r]?.n||''} Lv.${j.req[r]}`).join(', ') : '無';
              let skillsText = Object.keys(j.s).map(lvl => `Lv.${lvl} 解鎖：${j.s[lvl].map(sId => SKILLS[sId]?.n||'').join('、')}`).join('\n');
              if(!skillsText) skillsText = '此職業無特殊技能，但基礎數值成長極高\n';
              if(id === 'nov') skillsText += '\n\nLv.99 解鎖：【大器晚成】(全屬性飆升 2.5倍！)';
              setInfoModal({ type: 'job', id, title: `${j.e} ${j.n}`, desc: `【解鎖條件】\n${reqText}\n\n【各等級習得技能】\n${skillsText}`, status: p.job === id ? '🟢 當前修行職業' : (p.jLvl?.[id] ? '🟢 已解鎖，可免費切換' : '⚪ 未解鎖轉職') });
            }
          };

          const getEnemyForLevel = useCallback((lvl) => {
            let base;
            if (lvl <= 14) { base = (ENEMIES[lvl] || ENEMIES[14])[Math.floor(Math.random() * (ENEMIES[lvl]||ENEMIES[14]).length)]; return { ...base, mhp: base.hp, isBoss: false, st: {} }; }
            const endlessLvl = lvl - 14;
            const statScale = Math.pow(1.08, endlessLvl); const rewardScale = Math.pow(1.04, endlessLvl); 
            const baseList = ENEMIES[14]; base = baseList[Math.floor(Math.random()*baseList.length)]; 
            let scaledHp = Math.floor(base.hp * statScale);
            return { n: `[界]${base.n}`, hp: scaledHp, mhp: scaledHp, atk: Math.floor(base.atk * statScale), def: Math.floor(base.def * statScale), xp: Math.floor(base.xp * rewardScale), g: Math.floor(base.g * rewardScale), e: base.e, weak: base.weak, isBoss: false, st: {} };
          }, []);
          
          const getBossForLevel = useCallback((lvl) => {
            if (lvl <= 14) { let b = { ...(BOSSES[lvl] || BOSSES[14]) }; return { ...b, mhp: b.hp, isBoss: true, st: {} }; }
            const endlessLvl = lvl - 14;
            const statScale = Math.pow(1.1, endlessLvl); const rewardScale = Math.pow(1.05, endlessLvl); 
            let scaledHp = Math.floor(28000 * statScale);
            return { n: `[淵]異界領主`, hp: scaledHp, mhp: scaledHp, atk: Math.floor(1900 * statScale), def: Math.floor(550 * statScale), xp: Math.floor(45000 * rewardScale), g: Math.floor(40000 * rewardScale), e:'🌀', weak:'m', isBoss: true, st: {} };
          }, []);

          const genMap = () => {
            let m = Array(MAP_H).fill(0).map(() => Array(MAP_W).fill('.'));
            for(let y=0; y<MAP_H; y++) for(let x=0; x<MAP_W; x++) {
               if(x===0||x===MAP_W-1||y===0||y===MAP_H-1) m[y][x] = '#'; 
               else if(Math.random()<0.15) m[y][x] = '#'; else if(Math.random()<0.35) m[y][x] = '"'; 
            }
            for(let i=1; i<MAP_W-1; i++) m[1][i] = '.'; for(let i=1; i<MAP_H-1; i++) m[i][MAP_W-2] = '.';
            m[1][1] = 'T'; m[MAP_H-2][MAP_W-2] = 'B';
            let spots = [];
            for(let y=1; y<MAP_H-1; y++) for(let x=1; x<MAP_W-1; x++) if(m[y][x]==='.') spots.push([x,y]);
            for(let i=spots.length-1; i>0; i--){ let j = Math.floor(Math.random()*(i+1)); [spots[i], spots[j]] = [spots[j], spots[i]]; }
            let c = Math.min(3, spots.length); for(let i=0; i<c; i++) m[spots[i][1]][spots[i][0]] = '$';
            
            if (Math.random() < 0.25 && spots.length > c) { let spot = spots[c]; m[spot[1]][spot[0]] = 'M'; }
            setMapData(m);
          };

          const startG = () => { 
            let oldMeta = p.meta || INIT_PLAYER.meta;
            isAnimating.current = false; setP({ ...JSON.parse(JSON.stringify(INIT_PLAYER)), name: p.name, meta: oldMeta }); genMap(); setEnemy(null); setAuto(false); setMenu('MAIN'); setCMenu('MAIN'); setLogs([]); print('系統啟動... 進入 ASCII 網格世界。'); setScene('PLAY'); 
          };
          const revive = () => { setP(pl => ({ ...pl, hp: getMaxHp(pl), mp: getMaxMp(pl), x: 1, y: 1, st: {} })); setEnemy(null); setAuto(false); setScene('PLAY'); setMenu('TOWN'); setLogs(l => [...l, '✨ 女神降下了奇蹟，你在城鎮中復活了，異常狀態已清除。'].slice(-80)); };

          const doCombat = async (act) => {
            if (isAnimating.current || !enemy) return;
            if (act !== 'ATTACK' && act !== 'FLEE' && !act.startsWith('ITEM_')) {
               if (SKILLS[act] && p.mp < SKILLS[act].mp) { print(`❌ MP 不足，無法施放 [${getSk(act).n}]！`); return; }
            }

            isAnimating.current = true;
            let pl = JSON.parse(JSON.stringify(p)); if(!pl.st) pl.st={}; if(!pl.meta) pl.meta = { deaths: 0, maxDmg: 0, maxJob: 'nov', maxJLvl: 1 };
            let en = JSON.parse(JSON.stringify(enemy)); if(!en.st) en.st={};
            let msg = [];
            
            const isImmune = (entity) => entity.eq?.c && ITEMS[entity.eq.c]?.sp === 'immune';
            const applySt = (tg, type, tns, isPl) => {
                if(type === 'stun' && tg.st.stunImmune) { msg.push(`🛡️ ${isPl?'你':'敵人'}對暈眩產生了短暫抗性！`); return; }
                if(isPl && isImmune(pl)) { msg.push('🛡️ 萬能護符免疫了異常狀態！'); return; }
                tg.st[type] = tns; msg.push(`⚠️ ${isPl?'你':'敵人'}陷入了[${ST_NAMES[type]}]狀態！`);
            };

            let pCanAct = true; let enDead = false; let defMult = 1; let pDealtDmg = 0;
            
            if (pl.st.sleep) { pCanAct = false; msg.push('💤 你正在沉睡，無法行動...'); pl.st.sleep--; }
            else if (pl.st.stun) { 
                pCanAct = false; msg.push('😵 你暈眩中無法行動！'); pl.st.stun--; 
                if(pl.st.stun <= 0) pl.st.stunImmune = 1; 
            }
            else if (pl.st.freeze) { pCanAct = false; msg.push('🧊 你被凍結了，無法行動！'); pl.st.freeze--; }

            if (pl.st.stunImmune) pl.st.stunImmune--;

            if (pCanAct && act !== 'FLEE') {
              if (act === 'ITEM_HP') { pl.pot.hp--; pl.hp=Math.min(getMaxHp(pl), pl.hp+Math.floor(getMaxHp(pl)*0.4)); msg.push(`🧪 飲用HP水。`); }
              else if (act === 'ITEM_MP') { pl.pot.mp--; pl.mp=Math.min(getMaxMp(pl), pl.mp+Math.floor(getMaxMp(pl)*0.4)); msg.push(`💧 飲用MP水。`); }
              else if (act === 'ITEM_CURE') { pl.pot.cure--; pl.st={}; msg.push(`✨ 飲用萬能藥，解除了所有異常狀態！`); }
              else if (act === 'ITEM_MBOOM') { 
                 pl.pot.mBoom--; msg.push(`🪃 扔出了金屬迴力鏢！`); 
                 if (en.isMetal) {
                     let dmg = en.hp; en.hp -= dmg; pDealtDmg = dmg;
                     msg.push(`💥 命中要害！對金屬史萊姆造成了一擊必殺！`);

                          </button>
                          <button onClick={() => p.eq?.a ? openInfo('item', p.eq.a, true) : null} className="bg-gray-800 border border-gray-600 p-2 rounded text-left active:bg-gray-700">
                             <div className="text-[10px] sm:text-[11px] text-gray-500 mb-0.5">防具</div><div className="text-orange-300 font-bold text-xs sm:text-sm truncate">{p.eq?.a ? `${ITEMS[p.eq.a]?.e||''} ${ITEMS[p.eq.a]?.n||''} +${p.upg?.[p.eq.a]||0}` : '布衣'}</div>
                          </button>
                          <button onClick={() => p.eq?.c ? openInfo('item', p.eq.c, true) : null} className="bg-gray-800 border border-purple-800 p-2 rounded text-left active:bg-gray-700">
                             <div className="text-[10px] sm:text-[11px] text-purple-400 mb-0.5">飾品</div><div className="text-pink-300 font-bold text-xs sm:text-sm truncate">{p.eq?.c ? `${ITEMS[p.eq.c]?.e||''} ${ITEMS[p.eq.c]?.n||''}` : '無裝備'}</div>
                          </button>
                        </div>
                      </div>
                      <div className="bg-black p-2 rounded border border-gray-700">
                        <div className="text-gray-400 mb-1.5 font-bold border-b border-gray-800 pb-1 text-xs sm:text-sm">【背包道具與藥水】 (可點擊使用)</div>
                        <div className="flex flex-wrap gap-1.5 mb-2">
                           <button onClick={()=>useFieldItem('hp')} className="flex-1 bg-pink-900/30 text-pink-300 border border-pink-800 rounded py-1 text-xs active:bg-pink-900/50">🧪 HP水 ({p.pot?.hp||0})</button>
                           <button onClick={()=>useFieldItem('mp')} className="flex-1 bg-blue-900/30 text-blue-300 border border-blue-800 rounded py-1 text-xs active:bg-blue-900/50">💧 MP水 ({p.pot?.mp||0})</button>
                           <button onClick={()=>useFieldItem('cure')} className="flex-1 bg-purple-900/30 text-purple-300 border border-purple-800 rounded py-1 text-xs active:bg-purple-900/50">✨ 萬能藥 ({p.pot?.cure||0})</button>
                           <div className="w-full">
                             <button className="w-full bg-orange-900/30 text-orange-300 border border-orange-800 rounded py-1 text-xs cursor-default">🪃 金屬迴力鏢 ({p.pot?.mBoom||0}) - 僅限戰鬥使用</button>
                           </div>
                        </div>
                        <div className="flex flex-wrap gap-1">
                           {sortedInvKeys.length === 0 ? <span className="text-gray-600 text-xs">裝備背包為空</span> : null}
                           {sortedInvKeys.map(id => { const count = currentInvCounts[id]; return <button key={id} onClick={() => openInfo('item', id)} className="bg-gray-800 border border-gray-600 px-2 py-1.5 rounded text-xs text-yellow-100 active:bg-gray-700">{ITEMS[id]?.n||'未知'} x{count}</button> })}
                        </div>
                      </div>
                      <div className="bg-black p-2 rounded border border-gray-700 space-y-1.5 pb-3">
                        <div className="text-gray-400 mb-1 font-bold border-b border-gray-800 pb-1 text-xs sm:text-sm">【習得技能】 <span className="text-[10px] font-normal text-indigo-400">(點擊查看或設為預設)</span></div>
                        <div><span className="text-gray-500 text-xs">被動:</span> <div className="flex flex-wrap gap-1 mt-0.5">{getAvailableSkills(p).filter(id=>SKILLS[id]?.t==='p').map(id=><button key={id} onClick={()=>openInfo('skill', id)} className="bg-gray-800 border border-green-900 text-green-400 px-2 py-1 rounded text-xs active:bg-gray-700">{getSk(id, p)?.n||'未知'}</button>)}</div></div>
                        <div><span className="text-gray-500 text-xs">魔法:</span> <div className="flex flex-wrap gap-1 mt-0.5">{getSortedSkills('m').map(id=><button key={id} onClick={()=>openInfo('skill', id)} className={`bg-gray-800 border px-2 py-1 rounded text-xs active:bg-gray-700 ${p.defM===id?'border-yellow-400 text-yellow-400 shadow-[0_0_5px_rgba(250,204,21,0.5)]':'border-purple-900 text-purple-400'}`}>{getSk(id, p)?.n||'未知'}</button>)}</div></div>
                        <div><span className="text-gray-500 text-xs">特技:</span> <div className="flex flex-wrap gap-1 mt-0.5">{getSortedSkills('s').map(id=><button key={id} onClick={()=>openInfo('skill', id)} className={`bg-gray-800 border px-2 py-1 rounded text-xs active:bg-gray-700 ${p.defS===id?'border-yellow-400 text-yellow-400 shadow-[0_0_5px_rgba(250,204,21,0.5)]':'border-indigo-900 text-indigo-400'}`}>{getSk(id, p)?.n||'未知'}</button>)}</div></div>
                      </div>
                    </div>
                  ) : (
                    <div className="relative w-full h-full">
                      <div className={`${getTheme(p.mapLvl).floorBg} p-1 md:p-2 rounded-sm w-full h-full`} style={{ display: 'grid', gridTemplateColumns: `repeat(${MAP_W}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${MAP_H}, minmax(0, 1fr))` }}>
                        {mapData.map((row, y) => row.map((cell, x) => {
                          let char = cell, color = 'text-gray-600';
                          if (cell === '#' && p.mapLvl >= 15) { char = ALL_WALLS[(x*3 + y*7 + p.mapLvl) % ALL_WALLS.length]; color = 'text-gray-500'; }
                          if (p.x === x && p.y === y) { char = '🤠'; color = 'text-yellow-300 drop-shadow-[0_0_6px_rgba(253,224,71,0.8)] z-10'; }
                          else if (cell === '#') color = 'text-gray-700'; else if (cell === '"') color = 'text-green-700'; else if (cell === '$') color = 'text-yellow-500 font-bold'; else if (cell === 'T') color = 'text-cyan-400 font-bold'; else if (cell === 'B') color = 'text-red-500 font-bold'; else if (cell === 'M') color = 'text-gray-300 font-black animate-pulse drop-shadow-[0_0_8px_rgba(209,213,219,0.9)]';
                          return <div key={`${x}-${y}`} className={`flex items-center justify-center text-xl sm:text-3xl ${color}`}>{char}</div>;
                        }))}
                      </div>
                      
                      {scene === 'COMBAT' && enemy && (
                         <div className="absolute inset-0 z-10 flex flex-col items-center justify-center bg-black/60 backdrop-blur-[2px]">
                           <div 
                              className="flex flex-col items-center cursor-pointer active:scale-95 transition-transform group" 
                              onClick={() => !auto && doCombat('ATTACK')}
                           >
                              <div className="text-6xl sm:text-7xl drop-shadow-[0_0_20px_rgba(255,0,0,0.8)] animate-bounce group-hover:drop-shadow-[0_0_30px_rgba(255,50,50,1)] transition-all">{enemy.e}</div>
                              <div className="text-red-400 font-bold text-sm bg-black/60 border border-red-800 px-3 py-1 rounded animate-pulse mt-2 mb-3 flex items-center gap-1 shadow-[0_0_10px_rgba(255,0,0,0.4)]">
                                 <span>⚔️</span> 點擊攻擊 <span>⚔️</span>
                              </div>
                           </div>
                           <div className="bg-gray-900/90 border-2 border-red-800 p-2 sm:p-3 rounded-lg w-4/5 max-w-[280px] shadow-[0_0_15px_rgba(0,0,0,0.8)]">
                             <div className="flex justify-between font-bold text-sm sm:text-base mb-1.5">
                                <span className="text-red-400">{enemy.n} <StIcons st={enemy.st}/></span>
                                <span className="text-xs text-gray-400 bg-gray-800 px-1.5 rounded flex items-center">ATK {enemy.atk}</span>
                             </div>
                             <div className="w-full bg-black rounded-full h-3.5 border border-gray-700 relative overflow-hidden">
                               <div className="bg-red-600 h-full transition-all duration-300" style={{width:`${Math.min(100, Math.max(0, enemy.hp)/enemy.mhp*100)}%`}}></div>
                               <div className="absolute inset-0 flex items-center justify-center text-[10px] sm:text-xs font-bold text-white tabular-nums">{Math.max(0, enemy.hp)}/{enemy.mhp}</div>
                             </div>
                           </div>
                         </div>
                      )}
                    </div>
                  )}
                </div>

                <div className="flex-1 min-h-0 border border-green-800 overflow-hidden flex flex-col bg-gray-950 rounded relative">
                   <div className="flex-1 overflow-y-auto p-2 text-sm sm:text-base leading-relaxed cursor-pointer hover:bg-gray-900 transition-colors" onClick={() => setLogModal(true)}>
                     <div className="absolute top-1 right-1 text-[10px] text-gray-600 font-bold bg-black/80 px-1.5 py-0.5 rounded pointer-events-none">點擊展開全紀錄</div>
                     {logs.map((l,i) => <div key={i} className={`mb-0.5 ${l.includes('***')?'text-yellow-400 font-bold':l.includes('受')||l.includes('陷入')||l.includes('❌')?'text-red-400':l.includes('獲得')||l.includes('換上')?'text-blue-400 font-bold':l.includes('###')||l.includes('🎉')?'text-purple-400 font-bold':'text-green-500'}`}>{l}</div>)}
                     <div ref={generalLogRef}/>
                   </div>
                </div>
              </div>

              <div className="flex-shrink-0 h-[150px] sm:h-[160px] border-t-2 border-green-800 p-1.5 bg-black pb-3 sm:pb-2 z-10">
                <div className="w-full h-full font-bold">
                  {scene === 'COMBAT' ? (
                    cMenu === 'MAIN' ? (
                      <div className="flex flex-col h-full gap-1.5">
                        <div className="grid grid-cols-2 grid-rows-2 gap-1.5 flex-1">
                          <button onClick={()=>setCMenu('MAGIC')} disabled={auto} className="border-2 border-purple-800 bg-purple-900/30 text-purple-300 text-lg sm:text-xl rounded active:bg-purple-800 flex items-center justify-center">
                             🔮 魔法
                          </button>
                          <button onClick={()=>setCMenu('SKILL')} disabled={auto} className="border-2 border-indigo-800 bg-indigo-900/30 text-indigo-300 text-lg sm:text-xl rounded active:bg-indigo-800 flex items-center justify-center">
                             ✨ 特技
                          </button>
                          <button onClick={()=>setCMenu('ITEM')} disabled={auto} className="border-2 border-teal-800 bg-teal-900/30 text-teal-300 text-lg sm:text-xl rounded active:bg-teal-800 flex flex-col items-center justify-center leading-none">
                             <span>🎒 道具</span><span className="text-[10px] text-teal-400 font-normal mt-1">共 {Object.values(p.pot).reduce((a,b)=>a+b,0)} 件</span>
                          </button>
                          <button onClick={()=>doCombat('FLEE')} disabled={auto} className="border-2 border-gray-700 bg-gray-900/50 text-gray-400 text-lg sm:text-xl rounded active:bg-gray-800">
                             🏃 逃跑
                          </button>
                        </div>
                        <button onClick={()=>{setAuto(!auto); if(!auto)print('>>> 啟動 BOT <<<');else print('>>> 終止 BOT <<<');}} className={`w-full py-2 border-2 rounded ${auto?'border-yellow-500 text-yellow-500 animate-pulse bg-yellow-900/20':'border-green-800 text-green-500'} text-sm sm:text-base font-bold uppercase shrink-0`}>
                           {auto?'STOP BOT':'AUTO BOT'}
                        </button>
                      </div>
                    ) : cMenu === 'ITEM' ? (
                      <div className="flex flex-col h-full gap-1.5">
                        <div className="grid grid-cols-2 gap-1.5 flex-1 overflow-y-auto">
                          <button onClick={()=>doCombat('ITEM_HP')} disabled={auto||(p.pot?.hp||0)<=0} className="border-2 border-pink-800 bg-pink-900/20 text-pink-300 text-sm sm:text-base active:bg-pink-900/50 rounded flex flex-col items-center justify-center"><span>🧪 HP水</span><span className="text-xs font-normal">持: {p.pot?.hp||0}</span></button>
                          <button onClick={()=>doCombat('ITEM_MP')} disabled={auto||(p.pot?.mp||0)<=0} className="border-2 border-blue-800 bg-blue-900/20 text-blue-300 text-sm sm:text-base active:bg-blue-900/50 rounded flex flex-col items-center justify-center"><span>💧 MP水</span><span className="text-xs font-normal">持: {p.pot?.mp||0}</span></button>
                          <button onClick={()=>doCombat('ITEM_CURE')} disabled={auto||(p.pot?.cure||0)<=0} className="border-2 border-purple-800 bg-purple-900/20 text-purple-300 text-sm sm:text-base active:bg-purple-900/50 rounded flex flex-col items-center justify-center"><span>✨ 萬能藥</span><span className="text-xs font-normal">持: {p.pot?.cure||0}</span></button>
                          <button onClick={()=>doCombat('ITEM_MBOOM')} disabled={auto||(p.pot?.mBoom||0)<=0} className="border-2 border-orange-800 bg-orange-900/20 text-orange-300 text-sm sm:text-base active:bg-orange-900/50 rounded flex flex-col items-center justify-center"><span>🪃 迴力鏢</span><span className="text-xs font-normal">持: {p.pot?.mBoom||0}</span></button>
                        </div>
                        <button onClick={()=>setCMenu('MAIN')} className="w-full border border-gray-700 bg-gray-800 text-white text-base active:bg-gray-700 rounded py-1.5 shrink-0">⬅️ 返回</button>
                      </div>
                    ) : (
                      <div className="flex flex-col h-full gap-1.5">
                        <div className="grid grid-cols-2 gap-1.5 overflow-y-auto flex-1 pr-1">
                          {getSortedSkills(cMenu==='MAGIC'?'m':'s').map(s=>(
                            <button key={s} onClick={()=>doCombat(s)} disabled={auto} className={`border px-1 py-1 rounded flex flex-col items-center justify-center active:bg-gray-800 ${s===p.defM || s===p.defS ? 'border-yellow-500 bg-yellow-900/20 text-yellow-300 shadow-[0_0_5px_rgba(234,179,8,0.4)]' : cMenu==='MAGIC' ? 'border-purple-800 bg-purple-900/10 text-purple-300' : 'border-indigo-800 bg-indigo-900/10 text-indigo-300'}`}>
                              <span className="truncate w-full text-center text-sm sm:text-base flex justify-center items-center gap-1">{s===p.defM || s===p.defS ? '⭐' : ''}{getSk(s, p).n}</span>
                              <span className="text-[10px] font-normal opacity-70">-{(SKILLS[s]?.mp||0)}MP</span>
                            </button>
                          ))}
                        </div>
                        <button onClick={()=>setCMenu('MAIN')} className="border border-gray-700 bg-gray-800 text-white text-base active:bg-gray-700 rounded py-1.5 shrink-0">⬅️ 返回</button>
                      </div>
                    )
                  ) : menu !== 'MAIN' ? (
                    <button onClick={()=>setMenu('MAIN')} disabled={auto} className="w-full h-full border-2 border-green-600 bg-green-900/30 text-center uppercase text-lg active:bg-green-800 rounded">[ 返回地圖 ]</button>
                  ) : (
                    <div className="grid grid-cols-4 gap-1.5 h-full">
                      <div className="col-span-2 grid grid-cols-3 gap-1.5">
                        <div/><button onClick={()=>move(0,-1)} disabled={auto} className="border-2 border-green-700 bg-green-900/30 text-lg sm:text-xl rounded active:bg-green-800 flex items-center justify-center leading-none pb-1">N</button><div/>
                        <button onClick={()=>move(-1,0)} disabled={auto} className="border-2 border-green-700 bg-green-900/30 text-lg sm:text-xl rounded active:bg-green-800 flex items-center justify-center leading-none pr-1">W</button>
                        <button onClick={()=>move(0,1)} disabled={auto} className="border-2 border-green-700 bg-green-900/30 text-lg sm:text-xl rounded active:bg-green-800 flex items-center justify-center leading-none pt-1">S</button>
                        <button onClick={()=>move(1,0)} disabled={auto} className="border-2 border-green-700 bg-green-900/30 text-lg sm:text-xl rounded active:bg-green-800 flex items-center justify-center leading-none pl-1">E</button>
                      </div>
                      <div className="col-span-2 grid grid-cols-2 gap-1.5">
                        <button onClick={()=>{if(p.x===1&&p.y===1)setMenu('TOWN');else print('需在 [T] 城鎮上方才能進入。');}} disabled={auto} className="border-2 border-cyan-800 bg-cyan-900/20 text-cyan-400 text-base rounded active:bg-cyan-900">城鎮</button>
                        <button onClick={()=>setMenu('SKILL')} disabled={auto} className="border-2 border-yellow-800 bg-yellow-900/20 text-yellow-400 text-base rounded active:bg-yellow-900">狀態</button>
                        <button onClick={()=>{setAuto(!auto); if(!auto)print('>>> 啟動 BOT <<<');else print('>>> 終止 BOT <<<');}} className={`col-span-2 border-2 rounded ${auto?'border-yellow-500 text-yellow-500 animate-pulse bg-yellow-900/20':'border-green-800 text-green-500'} text-base uppercase`}>{auto?'STOP BOT':'AUTO BOT'}</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
