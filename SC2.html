    prepareTargeting(skill, originalSkillId) {
        const panel = document.getElementById('action-panel');
        let dName = this.getSkillDisplayName(this.currentEntity, originalSkillId);
        panel.innerHTML = `<div style="text-align:center; font-size:var(--font-md); color:var(--warning); margin-bottom: 5px;">選擇施放目標</div><div style="font-size:var(--font-sm); text-align:center; color:var(--text-muted); margin-bottom:10px;">準備施放：《${dName}》</div>`;
        const backBtn = document.createElement('button'); backBtn.className = 'btn-back btn-main'; backBtn.innerText = '返回技能選單';
        backBtn.onclick = () => { this.clearTargeting(); this.showPlayerActions(); }; panel.appendChild(backBtn);

        let mods = this.currentEntity.skillModifiers[originalSkillId] || []; let isAoe = skill.target === 'all_enemies' || skill.target === 'all_allies' || mods.includes('aoe_spread');

        if (skill.target === 'any') {
            [...Game.state.enemies, ...Game.state.party].filter(e => e.hp > 0).forEach(e => {
                let div = this.entityNodes[e.id]; if (!div) return; div.classList.add('targetable');
                div.onclick = () => {
                    let tgts = [e];
                    if (isAoe) tgts = e.isPlayer ? Game.state.party.filter(x => x.hp > 0) : Game.state.enemies.filter(x => x.hp > 0);
                    this.executeAction(this.currentEntity, skill, tgts, originalSkillId);
                };
            });
        } else if (skill.target === 'enemy' || skill.target === 'all_enemies') {
            Game.state.enemies.filter(e => e.hp > 0).forEach(e => {
                let div = this.entityNodes[e.id]; if (!div) return; div.classList.add('targetable');
                div.onclick = () => this.executeAction(this.currentEntity, skill, isAoe ? Game.state.enemies.filter(x => x.hp > 0) : [e], originalSkillId);
            });
        } else if (skill.target === 'ally' || skill.target === 'all_allies' || skill.target === 'self') {
            let validTargets = skill.target === 'self' ? [this.currentEntity] : Game.state.party.filter(p => p.hp > 0);
            validTargets.forEach(p => {
                let div = this.entityNodes[p.id]; if (!div) return; div.classList.add('targetable');
                div.onclick = () => this.executeAction(this.currentEntity, skill, isAoe ? Game.state.party.filter(x => x.hp > 0) : [p], originalSkillId);
            });
        }
    },
    clearTargeting() { document.querySelectorAll('.entity').forEach(div => { div.classList.remove('targetable'); div.onclick = null; }); },

    async processAI(entity) {
        const panel = document.getElementById('action-panel');
        panel.innerHTML = `<div style="text-align:center; padding:15px; color:var(--text-muted); font-size:var(--font-md);">【${PERSONALITIES[entity.personality].name}】思考中...</div>`;
        await new Promise(r => setTimeout(r, 600));
        if (!this.isActive) return;

        let allies = entity.isEnemy ? Game.state.enemies : Game.state.party; let enemies = entity.isEnemy ? Game.state.party : Game.state.enemies;
        allies = allies.filter(a => a.hp > 0); enemies = enemies.filter(e => e.hp > 0);
        if (enemies.length === 0) return this.nextTurn();

        let allEnemiesStealth = enemies.every(e => e.hasBuff('stealth'));
        let targetableEnemies = allEnemiesStealth ? enemies : enemies.filter(e => !e.hasBuff('stealth'));

        if (entity.isBoss && entity.skills.includes('summon_minion') && entity.summonCount < 3) {
            if (Math.random() < 0.20 && allies.length < 5) {
                this.executeAction(entity, SKILLS['summon_minion'], [entity], 'summon_minion');
                return;
            }
        }

        let options = [];
        entity.skills.forEach(skillId => {
            if (skillId === 'summon_minion') return;

            const skill = SKILLS[skillId]; let costInfo = this.getSkillCost(entity, skillId);
            if (costInfo.isHp && entity.hp <= costInfo.amount) return; if (!costInfo.isHp && entity.mp < costInfo.amount) return;

            let mods = entity.skillModifiers[skillId] || []; let isAoe = skill.target === 'all_enemies' || skill.target === 'all_allies' || mods.includes('aoe_spread');

            if (skill.target === 'any') {
                if (isAoe) {
                    options.push({ skill, originalSkillId: skillId, targets: targetableEnemies, costInfo });
                    options.push({ skill, originalSkillId: skillId, targets: allies, costInfo });
                } else {
                    targetableEnemies.forEach(t => options.push({ skill, originalSkillId: skillId, targets: [t], costInfo }));
                    allies.forEach(t => options.push({ skill, originalSkillId: skillId, targets: [t], costInfo }));
                }
            }
            else if (skill.target === 'enemy') { if (isAoe) options.push({ skill, originalSkillId: skillId, targets: targetableEnemies, costInfo }); else targetableEnemies.forEach(t => options.push({ skill, originalSkillId: skillId, targets: [t], costInfo })); }
            else if (skill.target === 'all_enemies') options.push({ skill, originalSkillId: skillId, targets: targetableEnemies, costInfo });
            else if (skill.target === 'ally') { if (isAoe) options.push({ skill, originalSkillId: skillId, targets: allies, costInfo }); else allies.forEach(t => options.push({ skill, originalSkillId: skillId, targets: [t], costInfo })); }
            else if (skill.target === 'all_allies') options.push({ skill, originalSkillId: skillId, targets: allies, costInfo });
            else if (skill.target === 'self') options.push({ skill, originalSkillId: skillId, targets: [entity], costInfo });
        });

        if (options.length === 0 && targetableEnemies.length > 0) {
            options.push({ skill: SKILLS['attack'], originalSkillId: 'attack', targets: [targetableEnemies[0]], costInfo: { amount: 0, isHp: false } });
        }

        options.forEach(opt => {
            opt.score = 50 + Math.random() * 10;
            let skill = opt.skill; let target = opt.targets[0];
            let skillLv = entity.skillLevels[opt.originalSkillId] || 1; let actualPower = skill.power * (1 + (skillLv - 1) * 0.20);
            let mods = entity.skillModifiers[opt.originalSkillId] || []; if (mods.includes('blood_magic')) actualPower *= 1.2;

            let dmgEst = skill.type === 'attack' ? (entity.atk * actualPower) - target.def : 0;
            dmgEst = dmgEst * getElementMultiplier(skill.element, target.element);

            if (opt.originalSkillId === 'venom_blast' && target.hasBuff('poison')) dmgEst *= 1.5;
            if (skill.element === 'fire' && target.hasBuff('vine_wrapped')) dmgEst *= 1.8;

            let isKillEst = dmgEst > target.hp;

            switch (entity.personality) {
                case 'Brave': if (skill.type === 'attack') opt.score += (target.hp / target.maxHp) * 35; if (entity.hp < entity.maxHp * 0.4 && skill.type === 'attack') opt.score += 50; if (skill.type === 'defend') opt.score -= 40; break;
                case 'Conservative': if (entity.hp < entity.maxHp * 0.5) { if (skill.type === 'defend' || skill.type === 'heal') opt.score += 90; } if (skill.type === 'attack') { if (isKillEst) opt.score += 70; else opt.score -= 20; } break;
                case 'Greedy': opt.score += actualPower * 25; opt.score += opt.costInfo.amount * 1.5; if (isKillEst) opt.score += 80; if (skill.type === 'heal' || skill.type === 'defend') opt.score -= 30; break;
                case 'Teamwork': if (skill.type === 'heal' && target.hp < target.maxHp * 0.6) opt.score += 75; if (skill.type === 'buff') opt.score += 50; if (skill.type === 'attack') { let weakest = targetableEnemies.reduce((prev, curr) => prev.hp < curr.hp ? prev : curr, targetableEnemies[0]); if (target === weakest) opt.score += 40; } break;
                case 'Impulsive': opt.score = Math.random() * 110; if (opt.costInfo.amount > 0) opt.score += 25; break;
                case 'Calm': if (skill.type === 'attack') { let mul = getElementMultiplier(skill.element, target.element); if (mul > 1) opt.score += 60; if (mul < 1) opt.score -= 40; if (isKillEst) opt.score += 40; } if (skill.type === 'heal' && target.hp < target.maxHp * 0.35) opt.score += 70; break;
            }

            if (skill.special === 'purify') {
                let isTargetAlly = (target.isEnemy === entity.isEnemy);
                if (isTargetAlly) {
                    let hasDebuff = target.buffs.some(b => ['poison', 'bleed', 'atk_down', 'def_down', 'stun', 'paralyze', 'freeze', 'weakened', 'vine_wrapped', 'blind'].includes(b.type));
                    if (hasDebuff) opt.score += 80; else opt.score -= 50;
                } else {
                    let hasBuff = target.buffs.some(b => ['atk_up', 'def_up', 'regen'].includes(b.type));
                    if (hasBuff) opt.score += 80; else opt.score -= 50;
                }
            }
            if (skill.special === 'meditate') {
                if (entity.mp < entity.maxMp * 0.3) opt.score += 90; else if (entity.mp < entity.maxMp * 0.6) opt.score += 40; else opt.score -= 60;
            }
            if (skill.special === 'vine') {
                let partyHasFire = allies.some(a => a.skills.some(s => SKILLS[s] && SKILLS[s].element === 'fire'));
                if (partyHasFire) opt.score += 30;
            }
            if (skill.special && skill.special.startsWith('gamble')) {
                opt.score += 20;
            }

            if (opt.costInfo.isHp) opt.score -= (opt.costInfo.amount / entity.maxHp) * 100; else opt.score -= opt.costInfo.amount * 0.5;
        });

        options.sort((a, b) => b.score - a.score);
        let chosen = options[0]; this.executeAction(entity, chosen.skill, chosen.targets, chosen.originalSkillId);
    },

    async executeAction(actor, skill, targets, originalSkillId, comboCount = 0) {
        this.clearTargeting(); document.getElementById('action-panel').innerHTML = '';

        if (comboCount === 0) {
            let costInfo = this.getSkillCost(actor, originalSkillId);
            if (costInfo.isHp) { actor.hp -= costInfo.amount; this.floatText(actor.id, `-${costInfo.amount}`, 'var(--danger)'); }
            else { actor.mp -= costInfo.amount; }
        }

        // effectId：這次「實際生效」的技能是誰。平常等於 originalSkillId，
        // 但賭博技能會在下面重新抽一個真正的技能出來，此時 effectId 才是真正決定
        // 特殊效果（例如猛毒引爆、閃電麻痺）該不該觸發的依據；originalSkillId 則
        // 繼續代表「玩家按下的那個技能欄位」，用於熟練度、被動符文等歸屬判斷。
        let effectId = originalSkillId;

        if (skill.special === 'gamble_atk') {
            let atkSkills = Object.values(SKILLS).filter(s => s.type === 'attack' && s.id !== 'gamble_atk' && !s.special);
            skill = atkSkills[Math.floor(Math.random() * atkSkills.length)];
            effectId = skill.id;
            this.log(`> 🎲 賭博發動！抽出了攻擊技能：【${skill.name}】！`);
            let enemiesNow = actor.isEnemy ? Game.state.party.filter(e => e.hp > 0) : Game.state.enemies.filter(e => e.hp > 0);
            if (skill.target === 'all_enemies') targets = enemiesNow;
            else if (['enemy', 'any'].includes(skill.target)) {
                if (targets.length === 0 || targets[0].hp <= 0 || (targets[0].isEnemy === actor.isEnemy)) {
                    targets = [enemiesNow[Math.floor(Math.random() * enemiesNow.length)]];
                }
            }
        } else if (skill.special === 'gamble_def') {
            let defSkills = Object.values(SKILLS).filter(s => (s.type === 'heal' || s.type === 'buff') && s.id !== 'gamble_def' && !s.special);
            skill = defSkills[Math.floor(Math.random() * defSkills.length)];
            effectId = skill.id;
            this.log(`> 🎲 賭博發動！抽出了輔助技能：【${skill.name}】！`);
            let alliesNow = actor.isEnemy ? Game.state.enemies.filter(e => e.hp > 0) : Game.state.party.filter(e => e.hp > 0);
            if (skill.target === 'all_allies') targets = alliesNow;
            else if (skill.target === 'self') targets = [actor];
            else if (['ally', 'any'].includes(skill.target)) {
                if (targets.length === 0 || targets[0].hp <= 0 || (targets[0].isEnemy !== actor.isEnemy)) {
                    targets = [alliesNow[Math.floor(Math.random() * alliesNow.length)]];
                }
            }
        }

        if (skill.type !== 'defend' && Math.random() < 0.20 && comboCount === 0) {
            actor.skillLevels[originalSkillId] = (actor.skillLevels[originalSkillId] || 1) + 1;
            this.log(`🔥 <b>突破！</b>${actor.displayName} 對《${SKILLS[originalSkillId].name}》熟練度提升至 <span class="c-sys">Lv.${actor.skillLevels[originalSkillId]}</span>！`);
        }

        let pText = actor.personality ? `<span class="c-ai">【${PERSONALITIES[actor.personality].name}】</span>` : '';
        let targetNames = targets.map(t => t.displayName).join(', ');
        let dName = this.getSkillDisplayName(actor, originalSkillId);

        if (skill.special === 'summon' || originalSkillId.startsWith('gamble')) {
            if (skill.special === 'summon') this.log(`${pText}${actor.displayName} 施放了 <span class="c-skill">${dName}</span>`);
        } else {
            let actMsg = `${pText}${actor.displayName} 施放了 <span class="c-skill">${dName}</span>`;
            if (skill.target !== 'self') actMsg += ` (對標 ${targetNames})`;
            this.log(actMsg);
        }

        let mods = actor.skillModifiers[originalSkillId] || [];

        let baseHits = 1;
        if (effectId === 'gale_slash') {
            baseHits = SKILL_EFFECTS.gale_slash.getHitCount();
            this.log(`> 💨 <b>疾風斬發動！進行 ${baseHits} 連段刺擊！</b>`);
        }

        let triggerDouble = mods.includes('double_cast') && Math.random() < 0.5;
        let executionCount = triggerDouble ? 2 : 1;
        let powerMultiplier = 1 + ((actor.skillLevels[originalSkillId] || 1) - 1) * 0.20;
        if (mods.includes('blood_magic')) powerMultiplier += 0.20;

        if (skill.special === 'summon') {
            actor.summonCount++;
            let pool = Game.state.dungeonPool.filter(m => !m.isBoss && !m.isLarge && !m.isSupport);
            if (pool.length > 0 && Game.state.enemies.filter(e => e.hp > 0).length < 5) {
                let tpl = pool[Math.floor(Math.random() * pool.length)];
                let scale = 1 + (Game.state.floor * 0.15);
                let eData = { ...tpl, hp: Math.floor(tpl.hp * scale), atk: Math.floor(tpl.atk * scale), def: Math.floor(tpl.def * scale), isEnemy: true };
                let newMinion = new Entity(eData);
                Game.state.enemies.push(newMinion);
                this.turnQueue.push(newMinion);
                this.log(`> 🌀 黑影浮現... ${actor.displayName} 召喚了 ${newMinion.displayName} 加入戰局！(剩餘召喚次數: ${3 - actor.summonCount})`);
                this.updateUI();
            } else {
                this.log(`> 🌀 召喚失敗，場上空間已滿。`);
            }
            await new Promise(r => setTimeout(r, 650));
            if (!this.isActive) return;

            await this.processCombo(actor, originalSkillId, comboCount);
            return;
        }

        for (let loop = 1; loop <= executionCount; loop++) {
            if (loop === 2) { this.log(`💥 <b>觸發【二連擊】符文！技能二連爆發！</b>`); await new Promise(r => setTimeout(r, 400)); if (!this.isActive) return; }

            if (mods.includes('add_shield') && skill.type !== 'defend') {
                let shieldVal = Math.floor(actor.maxHp * 0.15); actor.shield += shieldVal;
                this.floatText(actor.id, `護盾+${shieldVal}`, 'var(--warning)');
                this.log(`🛡️ 獲得了 <span class="c-sys">${shieldVal}</span> 點附加護盾。`); this.updateUI();
            }

            let selfBuffApplied = false;

            for (let target of targets) {
                if (target.hp <= 0 && skill.type === 'attack') continue;

                let currentHits = (effectId === 'gale_slash') ? baseHits : 1;

                for (let hit = 1; hit <= currentHits; hit++) {
                    if (target.hp <= 0) break;

                    await new Promise(r => setTimeout(r, 250)); if (!this.isActive) return;
                    let isAoeSpread = mods.includes('aoe_spread') && targets.length > 1; let scaleFactor = isAoeSpread ? 0.7 : 1.0;

                    if (skill.type === 'attack') {
                        if (actor.hasBuff('blind') && Math.random() < 0.5) {
                            this.log(`> 😵 ${actor.displayName} 因為盲目而失去準頭，攻擊沒有命中 ${target.displayName}！`);
                            this.floatText(target.id, `MISS`, 'var(--text-muted)');
                            continue;
                        }

                        if (target.isEnemy && target.isBoss && !target.hasBuff('weakened')) {
                            let hitWeakness = false;
                            if (target.weakness) {
                                if (target.weakness.element && skill.element === target.weakness.element) hitWeakness = true;
                                if (target.weakness.skill && effectId === target.weakness.skill) hitWeakness = true;
                            }
                            if (hitWeakness) {
                                target.addBuff('weakened', 999);
                                this.log(`> ❗ <b style="color:var(--warning); font-size:16px;">弱點識破！</b> ${target.displayName} 的弱點被擊中，攻防大幅崩潰！`);
                                this.floatText(target.id, `弱點破壞!`, 'var(--warning)');
                                UI.screenShake();
                            }
                        }

                        let actualCritRate = mods.includes('crit_rate_up') ? 0.30 : actor.critRate;
                        let actualCritDmg = mods.includes('crit_dmg_up') ? 2.50 : actor.critDmg;
                        let isCrit = Math.random() < actualCritRate;

                        let baseDmg = Math.floor(actor.atk * (skill.power * powerMultiplier) * scaleFactor);

                        if (actor.hasBuff('stealth') && Math.random() < 0.5) {
                            baseDmg = Math.floor(baseDmg * 1.5);
                            this.log(`> 🗡️ 奇襲發動！傷害提升 1.5 倍！`);
                        }

                        let targetDef = Math.floor(target.def);
                        if (mods.includes('pierce')) targetDef = Math.floor(targetDef * 0.5);
                        if (target.hasBuff('freeze')) targetDef = Math.floor(targetDef * 0.5);

                        let eleMul = getElementMultiplier(skill.element, target.element);
                        let finalDmg = Math.max(2, Math.floor((baseDmg / Math.max(1, targetDef)) * eleMul * 10 * (0.85 + Math.random() * 0.3)));

                        if (isCrit) { finalDmg = Math.floor(finalDmg * actualCritDmg); }

                        // 技能專屬的傷害修正（例如猛毒爆發引爆中毒），以及跨技能的元素連動（例如烈焰引燃藤蔓）。
                        let dmgCtx = { actor, target, skill, damage: finalDmg, log: (m) => this.log(m) };
                        const skillFx = SKILL_EFFECTS[effectId];
                        if (skillFx && skillFx.modifyDamage) skillFx.modifyDamage(dmgCtx);
                        applyElementalSynergies(dmgCtx);
                        finalDmg = dmgCtx.damage;

                        if (eleMul > 1 && hit === 1) this.log(`> 💥 屬性強烈相剋！`);
                        if (eleMul < 0.8 && hit === 1) this.log(`> 🛡️ 屬性相抗性...`);

                        let died = target.takeDamage(finalDmg);
                        this.hitFlash(target.id);
                        if (isCrit) UI.screenShake();

                        let floatTextVal = isCrit ? `-${finalDmg} 爆擊!` : `-${finalDmg}`;
                        let floatColor = isCrit ? '#ff5722' : 'var(--danger)';
                        this.floatText(target.id, floatTextVal, floatColor, isCrit ? 'crit' : null);

                        let critLog = isCrit ? `<span style="color:var(--warning); font-weight:bold;">【爆擊】</span> ` : '';
                        if (effectId === 'gale_slash') {
                            this.log(`> 🗡️ ${SKILL_EFFECTS.gale_slash.hitLabel(hit)}${critLog}對 ${target.displayName} 造成 <span class="c-dmg">${finalDmg}</span> 點傷害。`);
                        } else {
                            this.log(`> ${critLog}對 ${target.displayName} 造成 <span class="c-dmg">${finalDmg}</span> 點傷害。`);
                        }

                        if (Game.state.mode === 'quest' && Game.state.activeQuest && Game.state.activeQuest.type === 'kill' && died && target.isEnemy) {
                            Game.state.activeQuest.progress++; Game.updateQuestTracker();
                        }

                        if (skill.applyBuff && !selfBuffApplied && !died) { actor.addBuff(skill.applyBuff, getBuffDuration(skill)); selfBuffApplied = true; }

                        // 技能專屬的「命中後」效果（例如吸血暗蝕的生命汲取、閃電術的麻痺機率、藤蔓術的纏繞）。
                        const onHitFx = SKILL_EFFECTS[effectId];
                        if (onHitFx && onHitFx.onHit) onHitFx.onHit({ actor, target, skill, damage: finalDmg, died, log: (m) => this.log(m), floatText: (id, t, c) => this.floatText(id, t, c) });

                        // 被動符文（命中觸發類）：poison_infuse / bleed_infuse / paralyze_chance / stun_chance / freeze_chance / curse_infuse / life_steal / steal_gold
                        runModifierHandlers('onHit', mods, { actor, target, skill, damage: finalDmg, died, log: (m) => this.log(m), floatText: (id, t, c) => this.floatText(id, t, c) });

                        let targetGrowth = target.tryGrow('def', 0.1); if (targetGrowth) this.log(targetGrowth);
                        if (skill.applyDebuff && !died) target.addBuff(skill.applyDebuff, getBuffDuration(skill));

                        if (died) {
                            if (target.isEnemy && target.isBoss) {
                                Meta.data.bossKills[target.name] = (Meta.data.bossKills[target.name] || 0) + 1;
                                Meta.save();
                            }
                            this.log(`> 💀 <b>${target.displayName} 被徹底擊敗了！</b>`);
                            let killGrowth = actor.tryGrow('atk', 0.5); if (killGrowth) this.log(killGrowth);
                        }

                    } else if (skill.type === 'heal' || skill.type === 'buff') {
                        if (skill.type === 'heal') {
                            let healAmt = Math.floor((actor.atk + actor.def) * (skill.power * powerMultiplier) * 0.7 * scaleFactor * (0.9 + Math.random() * 0.2));
                            target.heal(healAmt); this.floatText(target.id, `+${healAmt}`, 'var(--success)');
                            this.log(`> ${target.displayName} 恢復了 <span class="c-heal">${healAmt}</span> HP。`);
                            let healGrowth = target.tryGrow('hp', 0.15); if (healGrowth) this.log(healGrowth);
                        }
                        if (skill.applyBuff === 'shield_up') { let shieldVal = Math.floor(actor.maxHp * 0.35); target.shield += shieldVal; target.addBuff('def_up', getBuffDuration(skill)); this.log(`> ${target.displayName} 獲得防禦與護盾！`); }
                        else if (skill.applyBuff) { target.addBuff(skill.applyBuff, getBuffDuration(skill)); }

                        if (effectId === 'purify') {
                            let isTargetEnemy = (target.isEnemy !== actor.isEnemy);
                            if (isTargetEnemy) {
                                let buffsToRemove = ['atk_up', 'def_up', 'regen'];
                                let removed = false;
                                target.buffs = target.buffs.filter(b => { if (buffsToRemove.includes(b.type)) { removed = true; return false; } return true; });
                                if (removed) {
                                    this.log(`> ✨ 淨化之光閃耀，${target.displayName} 身上的增益狀態被完全驅散！`);
                                    this.floatText(target.id, `驅散`, 'var(--warning)');
                                } else {
                                    this.log(`> ✨ ${target.displayName} 身上沒有增益狀態。`);
                                }
                            } else {
                                let debuffs = ['poison', 'bleed', 'atk_down', 'def_down', 'stun', 'paralyze', 'freeze', 'weakened', 'vine_wrapped', 'blind'];
                                let removed = false;
                                target.buffs = target.buffs.filter(b => { if (debuffs.includes(b.type)) { removed = true; return false; } return true; });
                                if (removed) {
                                    this.log(`> ✨ 淨化之光閃耀，${target.displayName} 身上的負面狀態被完全淨化！`);
                                    this.floatText(target.id, `淨化`, 'var(--success)');
                                } else {
                                    this.log(`> ✨ ${target.displayName} 身上沒有任何負面狀態。`);
                                }
                            }
                        }

                        if (effectId === 'meditate') {
                            let recoverMp = Math.floor(actor.maxMp * 0.4) + 20;
                            actor.mp = Math.min(actor.maxMp, actor.mp + recoverMp);
                            this.log(`> 🧘 ${actor.displayName} 閉目冥想，大幅回復了 <span style="color:var(--mp-fill);">${recoverMp}</span> MP。`);
                            this.floatText(actor.id, `+${recoverMp}MP`, 'var(--mp-fill)');
                        }

                        runModifierHandlers('onCast', mods, { actor, target, skill, log: (m) => this.log(m) });
                    } else if (skill.type === 'defend') {
                        actor.isDefending = true; actor.mp = Math.min(actor.maxMp, actor.mp + Math.floor(actor.maxMp * 0.1) + 4);
                        this.log(`> ${actor.displayName} 進行防禦。`);
                        let defGrowth = actor.tryGrow('def', 0.3); if (defGrowth) this.log(defGrowth);
                    }
                    this.updateUI();
                }
            }
        }

        let actorGrowthMp = actor.tryGrow('mp', 0.15); if (actorGrowthMp) this.log(actorGrowthMp);
        let actorGrowthHp = actor.tryGrow('hp', 0.10); if (actorGrowthHp) this.log(actorGrowthHp);

        await new Promise(r => setTimeout(r, 650)); if (!this.isActive) return;

        await this.processCombo(actor, originalSkillId, comboCount);
    },

    async processCombo(actor, originalSkillId, comboCount) {
        let mods = actor.skillModifiers[originalSkillId] || [];
        if (mods.includes('combo') && comboCount < 2 && actor.hp > 0 && this.isActive) {
            let availableSkills = actor.skills.filter(s => {
                let c = this.getSkillCost(actor, s);
                return c.isHp ? actor.hp > c.amount : actor.mp >= c.amount;
            });
            let nextSkillId = 'attack';
            if (availableSkills.length > 0) {
                nextSkillId = availableSkills[Math.floor(Math.random() * availableSkills.length)];
            }

            let nextSkill = SKILLS[nextSkillId];
            let costInfo = this.getSkillCost(actor, nextSkillId);

            if (costInfo.isHp ? actor.hp <= costInfo.amount : actor.mp < costInfo.amount) {
                nextSkillId = 'attack'; nextSkill = SKILLS['attack']; costInfo = { amount: 0, isHp: false };
            }

            if (costInfo.isHp) { actor.hp -= costInfo.amount; this.floatText(actor.id, `-${costInfo.amount}`, 'var(--danger)'); }
            else { actor.mp -= costInfo.amount; }

            let nextTargets = [];
            let allies = actor.isEnemy ? Game.state.enemies.filter(e => e.hp > 0) : Game.state.party.filter(e => e.hp > 0);
            let enemies = actor.isEnemy ? Game.state.party.filter(e => e.hp > 0) : Game.state.enemies.filter(e => e.hp > 0);

            if (nextSkill.target === 'enemy') nextTargets = [enemies[Math.floor(Math.random() * enemies.length)]];
            else if (nextSkill.target === 'all_enemies') nextTargets = enemies;
            else if (nextSkill.target === 'ally') nextTargets = [allies[Math.floor(Math.random() * allies.length)]];
            else if (nextSkill.target === 'all_allies') nextTargets = allies;
            else if (nextSkill.target === 'self') nextTargets = [actor];
            else if (nextSkill.target === 'any') {
                let all = [...allies, ...enemies];
                nextTargets = [all[Math.floor(Math.random() * all.length)]];
            }

            if (nextTargets.length > 0 && nextTargets[0]) {
                this.log(`> 🔄 <b style="color:var(--success);">觸發【連續技】(${comboCount + 1}/2)！</b> 追加施放 ${nextSkill.name}！`);
                await new Promise(r => setTimeout(r, 400));
                if (!this.isActive) return;
                await this.executeAction(actor, nextSkill, nextTargets, nextSkillId, comboCount + 1);
                return;
            }
        }

        this.nextTurn();
    }
};
/* ============================================================
   SECTION 8：Game（畫面切換與遊戲流程狀態機）
   ============================================================ */
const Game = {
    state: { mode: 'endless', activeQuest: null, dungeonPool: [], dungeonName: '無盡地下城', floor: 1, startingFloor: 1, playerTags: [], party: [], enemies: [], miracleUsed: false, inCamp: false, hasTaughtThisFloor: false },

    init() {
        Meta.load();
        let savedRun = null;
        for (let key of RUN_KEYS) {
            savedRun = localStorage.getItem(key);
            if (savedRun) break;
        }
        if (savedRun) document.getElementById('btn-continue').style.display = 'block';
    },

    checkSave() {
        try {
            let save = null;
            for (let key of RUN_KEYS) {
                save = localStorage.getItem(key);
                if (save) break;
            }

            if (save) {
                this.state = JSON.parse(save);
                this.state.party = this.state.party.map(p => Entity.fromSaved(p));
                this.state.enemies = (this.state.enemies || []).map(e => Entity.fromSaved(e));

                if (this.state.inCamp) {
                    this.enterCamp(true);
                } else {
                    this.startFloor(true);
                }
            }
        } catch (e) { console.error(e); this.clearRunSave(); this.showScreen('menu'); }
    },

    saveData() { localStorage.setItem(RUN_KEYS[0], JSON.stringify(this.state)); },
    clearRunSave() {
        RUN_KEYS.forEach(k => localStorage.removeItem(k));
        document.getElementById('btn-continue').style.display = 'none';
    },

    async hardReset() {
        let confirm1 = await CustomDialog.show({ type: 'confirm', title: '重置遊戲', message: '確定要刪除所有進度，包含金幣、訓練所、神廟與酒館等級嗎？' });
        if (confirm1) {
            let confirm2 = await CustomDialog.show({ type: 'confirm', title: '【最終確認】', isDanger: true, message: '這將會完全清除所有存檔，無法恢復。確定要繼續嗎？' });
            if (confirm2) {
                Meta.resetAll();
                this.clearRunSave();
                Battle.isActive = false;

                Meta.updateUI();
                this.showScreen('menu');

                await CustomDialog.show({ type: 'alert', title: '重置完成', message: '所有遊戲進度已清空，請重新開始您的冒險。' });
                try { window.location.reload(); } catch (e) { /* 部分沙盒環境不支援重新載入，略過即可 */ }
            }
        }
    },

    async retreat() {
        let confirm1 = await CustomDialog.show({ type: 'confirm', title: '撤退確認', message: '確定要撤退嗎？這將放棄目前的地下城所有未完成的進度。' });
        if (confirm1) {
            let confirm2 = await CustomDialog.show({ type: 'confirm', title: '任務失敗確認', isDanger: true, message: '撤退等同於任務失敗，所有在地下城中臨時獲得的技能與屬性都會被抹除。確定要直接返回主選單嗎？' });
            if (confirm2) {
                this.returnToMenu();
            }
        }
    },

    returnToMenu() {
        Battle.isActive = false;
        this.clearRunSave();

        this.state.party = [];
        this.state.enemies = [];
        this.state.activeQuest = null;
        this.state.inCamp = false;

        Meta.updateUI();
        document.getElementById('header-floor').innerText = `主選單`;
        this.showScreen('menu');
    },

    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        if (id === 'battle' || id === 'reward' || id === 'camp') {
            document.getElementById('header-floor').innerText = `B${this.state.floor}F`;
            document.getElementById('btn-reset').style.display = 'none';
            document.getElementById('btn-retreat').style.display = 'block';
        } else {
            document.getElementById('btn-reset').style.display = 'block';
            document.getElementById('btn-retreat').style.display = 'none';
        }
    },

    openQuestBoard() {
        this.showScreen('quests');
        const list = document.getElementById('quest-list'); list.innerHTML = '';

        let questTypes = ['kill', 'floor'];
        if (Meta.data.questLevel >= 3) questTypes.push('boss_hunt');

        let shuffledDungeons = [...DUNGEONS].sort(() => 0.5 - Math.random());

        for (let i = 0; i < 3; i++) {
            let dg = shuffledDungeons[i];
            let type = questTypes[Math.floor(Math.random() * questTypes.length)];
            let q = { id: Math.random().toString(36).substr(2, 6), type: type, dungeon: dg, progress: 0 };
            let title = '';

            if (type === 'boss_hunt') {
                q.target = 3 + Math.floor(Meta.data.questLevel / 2);
                q.reward = 150 + (Meta.data.questLevel * 40);
                title = `去［${dg.name}］深處討伐魔王`;
            } else if (type === 'kill') {
                q.target = 5 + Math.floor(Math.random() * 5) + Meta.data.questLevel;
                q.reward = 50 + (Meta.data.questLevel * 20) + (q.target * 5);
                title = `去［${dg.name}］討伐 ${q.target} 隻魔物`;
            } else {
                q.target = 2 + Math.floor(Math.random() * 3) + Math.floor(Meta.data.questLevel / 2);
                q.reward = 50 + (Meta.data.questLevel * 20) + (q.target * 5);
                title = `去［${dg.name}］探索至第 ${q.target} 層尋寶`;
            }

            const card = document.createElement('div'); card.className = 'quest-card';
            if (type === 'boss_hunt') {
                card.innerHTML = `<div class="quest-title" style="color:#e74c3c;">👑 ${title}</div><div class="quest-reward">💰 任務報酬：${q.reward} G</div>`;
            } else {
                card.innerHTML = `<div class="quest-title">${title}</div><div class="quest-reward">💰 任務報酬：${q.reward} G</div>`;
            }
            card.onclick = () => this.startQuest(q); list.appendChild(card);
        }
    },

    startQuest(quest) {
        this.state.mode = 'quest';
        this.state.activeQuest = quest;
        this.state.dungeonPool = quest.dungeon.monsters;
        this.state.dungeonName = quest.dungeon.name;
        this.state.startingFloor = 1;
        this.showClassSelect();
    },

    async startEndless() {
        let startFl = 1;
        if (Meta.data.maxFloor > 1) {
            let res = await CustomDialog.show({
                type: 'prompt',
                title: '選擇起始樓層',
                message: `請輸入要挑戰的起始樓層 (最高可選 ${Meta.data.maxFloor}F)：`,
                defaultText: '1'
            });
            if (res === false) return;
            startFl = parseInt(res);
            if (isNaN(startFl) || startFl < 1) startFl = 1;
            if (startFl > Meta.data.maxFloor) startFl = Meta.data.maxFloor;
        }

        this.state.mode = 'endless';
        this.state.activeQuest = null;
        this.state.dungeonPool = ENDLESS_MONSTERS;
        this.state.dungeonName = `無盡地下城 (B${startFl}F 開始)`;
        this.state.startingFloor = startFl;
        this.showClassSelect();
    },

    showClassSelect() {
        this.showScreen('class'); document.getElementById('header-floor').innerText = `建立隊伍`; document.getElementById('target-dungeon-name').innerText = this.state.dungeonName;
        const list = document.getElementById('class-list'); list.innerHTML = '';
        CLASSES.forEach(c => {
            let pHP = c.hp + (Meta.data.pUpgrades.hp * 10); let pMP = c.mp + (Meta.data.pUpgrades.mp * 5);
            let pATK = c.atk + (Meta.data.pUpgrades.atk * 2); let pDEF = c.def + (Meta.data.pUpgrades.def * 2);
            const btn = document.createElement('div'); btn.className = 'card'; btn.style.cursor = 'pointer';
            btn.innerHTML = `<div class="card-title">${c.name}</div><div class="card-desc">${c.desc}</div><div style="font-size:var(--font-sm);">HP: <span style="color:var(--success)">${pHP}</span> | MP: <span style="color:var(--success)">${pMP}</span> | ATK: <span style="color:var(--success)">${pATK}</span> | DEF: <span style="color:var(--success)">${pDEF}</span></div><div style="margin-top:5px;">${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
            btn.onclick = () => this.startGame(c); list.appendChild(btn);
        });
    },

    startGame(classData) {
        this.state.floor = this.state.startingFloor || 1;
        this.state.startingFloor = 1;
        this.state.playerTags = [...classData.tags];
        this.state.party = [];

        let pData = { ...classData, hp: classData.hp + (Meta.data.pUpgrades.hp * 10), mp: classData.mp + (Meta.data.pUpgrades.mp * 5), atk: classData.atk + (Meta.data.pUpgrades.atk * 2), def: classData.def + (Meta.data.pUpgrades.def * 2), isPlayer: true, name: Meta.data.playerName };
        this.state.party.push(new Entity(pData));

        let customNames = Meta.data.customNames.filter(n => n.trim() !== ''); let availableRandomNames = DEFAULT_NAMES.filter(n => !customNames.includes(n)); availableRandomNames.sort(() => 0.5 - Math.random());
        let tavernMultiplier = 1 + (Meta.data.tavernLevel - 1) * 0.15;

        for (let i = 0; i < 3; i++) {
            let randomClass = CLASSES[Math.floor(Math.random() * CLASSES.length)];
            let aiName = customNames.length > 0 ? customNames.shift() : (availableRandomNames.shift() || ("無名戰士" + i));
            let aiData = { ...randomClass, hp: Math.floor(randomClass.hp * 0.8 * tavernMultiplier), atk: Math.floor(randomClass.atk * 0.8 * tavernMultiplier), def: Math.floor(randomClass.def * 0.8 * tavernMultiplier) };
            aiData.name = aiName; aiData.isPlayer = false; this.state.party.push(new Entity(aiData));
        }
        this.startFloor(false);
    },

    startFloor(isContinuing = false) {
        this.state.inCamp = false;
        if (!isContinuing) { this.state.party.forEach(p => { p.hp = p.maxHp; p.mp = p.maxMp; p.shield = 0; p.buffs = []; }); this.state.miracleUsed = false; }
        this.saveData(); this.state.enemies = [];

        let pool = this.state.dungeonPool;
        let isBossHuntTarget = (this.state.mode === 'quest' && this.state.activeQuest && this.state.activeQuest.type === 'boss_hunt' && this.state.floor >= this.state.activeQuest.target);
        let randomBossSpawn = (this.state.floor >= 10 && Math.random() < 0.10);
        let bosses = pool.filter(m => m.isBoss);

        if ((isBossHuntTarget || randomBossSpawn) && bosses.length > 0) {
            let bossTpl = bosses[Math.floor(Math.random() * bosses.length)];
            let scale = 1 + (this.state.floor * 0.15);
            let eData = { ...bossTpl, hp: Math.floor(bossTpl.hp * scale * 1.5), atk: Math.floor(bossTpl.atk * scale * 1.5), def: Math.floor(bossTpl.def * scale * 1.5), isEnemy: true, skillLevels: { 'attack': 1, [bossTpl.skills[1]]: Math.floor(1 + this.state.floor * 0.2) } };
            this.state.enemies.push(new Entity(eData));
        } else {
            let enemyCount = Math.min(5, 1 + Math.floor(Math.random() * 3) + (this.state.floor > 3 ? 1 : 0));
            let normalsAndSupports = pool.filter(m => !m.isBoss);
            for (let i = 0; i < enemyCount; i++) {
                let tpl = null;
                let r = Math.random();
                if (r < 0.2) {
                    let supports = normalsAndSupports.filter(m => m.isSupport);
                    if (supports.length > 0) tpl = supports[Math.floor(Math.random() * supports.length)];
                } else if (r < 0.4) {
                    let larges = normalsAndSupports.filter(m => m.isLarge);
                    if (larges.length > 0) tpl = larges[Math.floor(Math.random() * larges.length)];
                }

                if (!tpl) {
                    let normals = normalsAndSupports.filter(m => !m.isLarge && !m.isSupport);
                    tpl = normals.length ? normals[Math.floor(Math.random() * normals.length)] : normalsAndSupports[0];
                }

                let scale = 1 + (this.state.floor * 0.15);
                let eData = { ...tpl, hp: Math.floor(tpl.hp * scale), atk: Math.floor(tpl.atk * scale), def: Math.floor(tpl.def * scale), isEnemy: true, skillLevels: { 'attack': 1, [tpl.skills[1]]: Math.floor(1 + this.state.floor * 0.2) } };
                this.state.enemies.push(new Entity(eData));
            }
        }

        Battle.init(); this.showScreen('battle');
    },

    updateQuestTracker() {
        const tracker = document.getElementById('quest-tracker');
        if (this.state.mode === 'endless') { tracker.style.display = 'none'; return; }
        tracker.style.display = 'block'; let q = this.state.activeQuest;
        let text = '';
        if (q.type === 'kill') text = `討伐進度: ${q.progress} / ${q.target}`;
        else if (q.type === 'floor') text = `探索進度: B${this.state.floor}F / B${q.target}F`;
        else if (q.type === 'boss_hunt') text = `魔王討伐: 探索至 B${q.target}F`;
        tracker.innerHTML = `<span style="color:var(--warning);">[任務目標]</span> ${text}`;
    },

    generateRewards() {
        // 防止「已經撤退/重置」之後，先前排定的延遲呼叫還是把畫面跳去戰利品畫面。
        if (!Battle.isActive) return;

        if (this.state.mode === 'endless') { Meta.data.maxFloor = Math.max(Meta.data.maxFloor, this.state.floor); Meta.save(); }
        let earnedGold = Math.floor(20 * (1 + this.state.floor * 0.3)); Meta.addGold(earnedGold);
        document.getElementById('reward-loot').innerText = `獲得 ${earnedGold} 枚金幣！`;

        let skillPool = [];
        for (let key in SKILLS) {
            let skill = SKILLS[key]; if (['attack', 'defend', 'summon_minion'].includes(key)) continue; if (this.state.party[0].skills.includes(key)) continue;
            let weight = 1; let matchReq = true;
            if (skill.req && skill.req.length > 0) matchReq = skill.req.some(reqTag => this.state.playerTags.includes(reqTag));
            if (matchReq) { if (skill.tags) skill.tags.forEach(t => { if (this.state.playerTags.includes(t)) weight += 4; }); for (let i = 0; i < weight; i++) skillPool.push({ type: 'skill', data: skill }); }
        }

        let activeSkills = this.state.party[0].skills.filter(s => s !== 'defend'); let modifierPool = [];
        for (let modKey in MODIFIERS) {
            let mod = MODIFIERS[modKey];
            activeSkills.forEach(skillId => {
                let currentMods = this.state.party[0].skillModifiers[skillId] || [];
                if (!currentMods.includes(modKey)) {
                    let mainSkill = SKILLS[skillId]; let isOffensive = mainSkill.type === 'attack'; let isFriendly = mainSkill.type === 'heal' || mainSkill.type === 'buff'; let weight = 2;
                    if (mod.type === 'offensive' && !isOffensive) weight = 0; if (mod.type === 'friendly' && !isFriendly) weight = 0;
                    if (modKey === 'aoe_spread' && (mainSkill.target === 'all_enemies' || mainSkill.target === 'all_allies' || mainSkill.target === 'self')) weight = 0;
                    if (weight > 0) modifierPool.push({ type: 'modifier', data: mod, targetSkillId: skillId, targetSkillName: mainSkill.name });
                }
            });
        }

        let combinedPool = [...skillPool, ...modifierPool]; let choices = []; let attempts = 0;
        while (choices.length < 3 && attempts < 200 && combinedPool.length > 0) {
            let picked = combinedPool[Math.floor(Math.random() * combinedPool.length)];
            let isDuplicate = choices.some(c => { if (c.type !== picked.type) return false; if (c.type === 'skill') return c.data.id === picked.data.id; if (c.type === 'modifier') return c.data.id === picked.data.id && c.targetSkillId === picked.targetSkillId; return false; });
            if (!isDuplicate) choices.push(picked); attempts++;
        }
        while (choices.length < 3) {
            let validSkills = Object.values(SKILLS).filter(s => !this.state.party[0].skills.includes(s.id) && !['attack', 'defend', 'summon_minion'].includes(s.id) && !choices.some(c => c.type === 'skill' && c.data.id === s.id));
            if (validSkills.length > 0) {
                let randSkill = validSkills[Math.floor(Math.random() * validSkills.length)];
                choices.push({ type: 'skill', data: randSkill });
            } else { break; }
        }

        const list = document.getElementById('reward-list'); list.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('div'); btn.className = 'reward-card';
            if (choice.type === 'skill') {
                let eleTag = choice.data.element !== 'none' ? `<span class="element-tag" style="--ele-color:${ELEMENT_COLORS[choice.data.element]}">${ELEMENTS[choice.data.element]}</span>` : '';
                btn.innerHTML = `<div class="reward-header"><div class="card-title">${choice.data.name} ${eleTag}</div><span class="reward-type" style="background:#2980b9;">新技能</span></div><div class="card-desc">${choice.data.desc} <span style="color:var(--mp-fill)">耗魔: ${choice.data.mpCost}</span></div><div>${choice.data.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
                btn.onclick = () => this.selectSkillReward(choice.data);
            } else {
                btn.innerHTML = `<div class="reward-header"><div class="card-title" style="color:var(--success);">${choice.targetSkillName} ⚡ ${choice.data.name}</div><span class="reward-type" style="background:#8e44ad;">技能附魔</span></div><div class="card-desc">為《${choice.targetSkillName}》增加特性：<br><strong>${choice.data.desc}</strong></div>`;
                btn.onclick = () => this.selectModifierReward(choice.targetSkillId, choice.data.id);
            }
            list.appendChild(btn);
        });
        this.showScreen('reward');
    },

    selectSkillReward(skill) {
        this.state.party[0].skills.push(skill.id);
        skill.tags.forEach(t => { if (!this.state.playerTags.includes(t)) this.state.playerTags.push(t); });
        this.state.floor++;
        this.enterCamp(false);
    },
    selectModifierReward(skillId, modId) {
        if (!this.state.party[0].skillModifiers[skillId]) this.state.party[0].skillModifiers[skillId] = [];
        this.state.party[0].skillModifiers[skillId].push(modId);
        this.state.floor++;
        this.enterCamp(false);
    },

    // 隊伍整備（營地）系統
    enterCamp(isLoaded = false) {
        this.state.inCamp = true;
        if (!isLoaded) {
            this.state.hasTaughtThisFloor = false;
        }
        this.saveData();
        this.renderCamp();
        this.showScreen('camp');
    },

    renderCamp() {
        // 此時 this.state.floor 已經是「即將前往」的樓層（選完獎勵時就 +1 了），
        // 所以清空的樓層是 floor-1。兩個數字一起顯示，避免原本「深入 B?F 前」
        // 跟顯示數值語意對不起來的問題。
        const clearedFloor = Math.max(0, this.state.floor - 1);
        document.getElementById('camp-floor-cleared').innerText = clearedFloor;
        document.getElementById('camp-floor-next').innerText = this.state.floor;

        const container = document.getElementById('camp-party-list');
        container.innerHTML = '';

        this.state.party.forEach((p, idx) => {
            let isPlayer = (idx === 0);
            let skillHtml = p.skills.filter(sId => sId !== 'attack' && sId !== 'defend').map(sId => {
                let s = SKILLS[sId];
                let lv = p.skillLevels[sId] || 1;
                let mods = p.skillModifiers[sId] || [];
                let modStr = mods.length > 0 ? ` <span style="color:var(--warning); font-size:11px;">[${mods.map(m => MODIFIERS[m].name).join(', ')}]</span>` : '';
                return `<div style="font-size:13px; color:#ccc; margin-bottom:2px;">• ${s.name}(Lv.${lv})${modStr}</div>`;
            }).join('');

            if (skillHtml === '') skillHtml = '<div style="font-size:12px; color:#666;">無特殊技能</div>';

            container.innerHTML += `
                <div class="card" style="margin-bottom:0; padding:10px;">
                    <div class="card-title" style="font-size:16px;">${isPlayer ? '👑 ' : ''}${p.name}</div>
                    <div style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">HP: ${p.hp}/${p.maxHp} | MP: ${p.mp}/${p.maxMp} | 攻: ${p.atk} | 防: ${p.def}</div>
                    <div style="font-size:12px; font-weight:bold; margin-bottom:4px; color:var(--primary);">習得技能：</div>
                    ${skillHtml}
                </div>
            `;
        });

        const teachSection = document.getElementById('camp-teach-section');
        if (this.state.hasTaughtThisFloor) {
            teachSection.innerHTML = `<div style="color:var(--text-muted); font-size:14px; text-align:center;">本層已完成技能傳授。</div>`;
        } else {
            let pSkills = this.state.party[0].skills.filter(s => s !== 'attack' && s !== 'defend');
            if (pSkills.length === 0) {
                teachSection.innerHTML = `<div style="color:var(--text-muted); font-size:14px; text-align:center;">目前沒有可傳授的技能。</div>`;
            } else {
                let skillOpts = pSkills.map(sId => `<option value="${sId}">${SKILLS[sId].name}</option>`).join('');
                let allies = this.state.party.map((p, i) => i > 0 ? `<option value="${p.id}">${p.name}</option>` : '').join('');

                teachSection.innerHTML = `
                    <div style="font-size:14px; margin-bottom:10px; color:var(--warning); text-align:center; font-weight:bold;">✨ 傳授技能 (每層限1次)</div>
                    <select id="teach-skill-sel" class="name-input" style="width:100%; margin-bottom:8px;">${skillOpts}</select>
                    <select id="teach-target-sel" class="name-input" style="width:100%; margin-bottom:10px;">${allies}</select>
                    <button class="btn-main btn-success" onclick="Game.teachSkill()">確認傳授</button>
                `;
            }
        }
    },

    teachSkill() {
        let skillId = document.getElementById('teach-skill-sel').value;
        let targetId = document.getElementById('teach-target-sel').value;
        if (!skillId || !targetId) return;

        let target = this.state.party.find(p => p.id === targetId);
        let player = this.state.party[0];

        if (!target.skills.includes(skillId)) {
            target.skills.push(skillId);
            target.skillLevels[skillId] = 1;
        }
        target.skillModifiers[skillId] = player.skillModifiers[skillId] ? [...player.skillModifiers[skillId]] : [];

        this.state.hasTaughtThisFloor = true;
        this.saveData();
        this.renderCamp();
        CustomDialog.show({ type: 'alert', title: '傳授成功', message: `已將【${SKILLS[skillId].name}】與其附魔知識傳授給 ${target.name}！` });
    },

    leaveCamp() {
        this.state.inCamp = false;
        this.startFloor(false);
    },

    saveAndQuit() {
        this.saveData();
        Meta.updateUI();
        document.getElementById('header-floor').innerText = `主選單`;
        this.showScreen('menu');
    },

    questComplete() {
        if (!Battle.isActive) return;
        let q = this.state.activeQuest; Meta.addGold(q.reward); Meta.data.questsCompleted++;
        if (Meta.data.questsCompleted % 3 === 0) Meta.data.questLevel++; Meta.save();
        document.getElementById('qc-reward-text').innerText = `獲得任務報酬 ${q.reward} G !`;
        this.clearRunSave(); this.showScreen('quest-complete');
    },

    gameOver() {
        if (!Battle.isActive) return;
        document.getElementById('gameover-stats').innerText = `全軍覆沒... 止步於 B${this.state.floor}F。`;
        Battle.isActive = false;
        this.clearRunSave();
        this.showScreen('gameover');
    }
};
/* ============================================================
   SECTION 9：啟動
   ============================================================ */
Game.init();

// 保險措施：極少數行動裝置瀏覽器在頁面剛載入時，可能出現版面已經算好、
// 但尚未真正繪製上螢幕的狀況（要等到某次互動觸發重繪才會顯示）。
// 這裡在載入後主動製造一次無害的重繪，降低碰到這種狀況的機率。
(function nudgeInitialRepaint() {
    const el = document.body;
    requestAnimationFrame(() => {
        const prevTransform = el.style.transform;
        el.style.transform = 'translateZ(0.001px)';
        void el.offsetHeight; // 強制同步 reflow
        requestAnimationFrame(() => { el.style.transform = prevTransform; });
    });
})();
</script>
</body>
</html>
