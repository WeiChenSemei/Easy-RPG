<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>靈魂與選擇 V26 - 隊伍整備與神威版</title>
    <style>
:root {
    /* ---- 基礎色板：從通用的深灰改為偏靛藍的地城色調，並以「火把金」為主色 ---- */
    --bg-color: #0a0c11;
    --bg-color-2: #12141c;
    --panel-bg: #171a24;
    --panel-bg-raised: #1f2330;
    --border-color: #2a2f3f;
    --text-main: #e9e7e2;
    --text-muted: #8b90a3;

    --primary: #4a90e2;
    --primary-dim: #2f5f8f;
    --danger: #e6584f;
    --success: #45c98a;
    --warning: #e8b34d;
    --warning-2: #f1c40f;

    --hp-bg: #2b2020;
    --hp-fill: #e6584f;
    --hp-fill-crit: #ff3b3b;
    --mp-fill: #4aa3e0;

    /* ---- 元素寶石色系：貫穿技能標籤、屬性圖示、傷害連動效果的視覺語言 ---- */
    --ele-none: #9aa3b5;
    --ele-fire: #ff6b4a;
    --ele-water: #45c4ea;
    --ele-wood: #6bcf7f;
    --ele-lightning: #b98aff;

    --font-sm: 11px;
    --font-md: 13px;
    --font-lg: 16px;
    --font-xl: 18px;

    --radius: 10px;
    --miracle-color: #f1c40f;
}

* { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

html {
    background-color: var(--bg-color);
    color-scheme: dark;
    height: 100%;
}

body {
    margin: 0; padding: 0;
    background-color: var(--bg-color);
    background-image:
        radial-gradient(ellipse at 20% -10%, rgba(74, 144, 226, 0.10), transparent 55%),
        radial-gradient(ellipse at 100% 110%, rgba(232, 179, 77, 0.06), transparent 55%);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif;
    height: 100vh; min-height: 100%; display: flex; flex-direction: column; overflow: hidden;
    -webkit-font-smoothing: antialiased;
}

#game-container { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; width: 100%; position: relative; }

.header {
    padding: 10px 12px; background: linear-gradient(#000, #0a0a0a); border-bottom: 1px solid var(--border-color);
    flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
    font-size: var(--font-md); letter-spacing: 0.3px;
}
.header-controls { display: flex; gap: 6px; align-items: center; }
.icon-btn {
    background: #262a38; color: white; border: 1px solid #333a4d; width: 28px; height: 28px; border-radius: 6px;
    font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s ease, background 0.15s ease;
}
.icon-btn:active { background: #3a3f52; transform: scale(0.92); }

.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

.center-content { flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 16px 15px 24px; text-align: center; overflow-y: auto; gap: 10px; }

h1 { font-size: 25px; margin: 8px 0 2px 0; color: var(--warning); font-weight: 800; letter-spacing: 0.5px; text-shadow: 0 0 18px rgba(232, 179, 77, 0.35); }
h2 { font-size: 20px; margin: 4px 0; color: var(--primary); font-weight: 700; }
.subtitle { color: var(--text-muted); font-size: var(--font-md); margin-bottom: 15px; }

.eyebrow { font-size: var(--font-sm); color: var(--text-muted); letter-spacing: 2.5px; text-transform: uppercase; }

.card {
    background: linear-gradient(180deg, var(--panel-bg-raised), var(--panel-bg));
    border: 1px solid var(--border-color); border-radius: var(--radius); padding: 15px; width: 100%; max-width: 340px;
    text-align: left; box-shadow: 0 6px 14px rgba(0,0,0,0.35);
}
.card-title { font-size: var(--font-lg); font-weight: bold; margin-bottom: 5px; color: var(--warning); }
.card-desc { font-size: var(--font-md); color: var(--text-muted); margin-bottom: 10px; line-height: 1.45; }
.tag { display: inline-block; background: #262a38; border: 1px solid var(--border-color); color: #cfd3e0; padding: 2px 7px; border-radius: 4px; font-size: var(--font-sm); margin-right: 5px; margin-bottom: 5px; }

/* 元素標籤：貫穿技能/怪物/魔王弱點顯示的一致視覺語言 */
.element-tag {
    display: inline-block; font-size: var(--font-sm); font-weight: 700; padding: 1px 6px; border-radius: 999px;
    color: var(--ele-color, var(--ele-none)); border: 1px solid var(--ele-color, var(--ele-none));
    background: rgba(255, 255, 255, 0.06);
}

.btn-main {
    background: linear-gradient(180deg, #5b9ee8, var(--primary)); color: white; border: none; padding: 13px; border-radius: 8px;
    font-size: var(--font-lg); font-weight: bold; cursor: pointer; width: 100%; max-width: 340px;
    transition: transform 0.08s ease, filter 0.15s ease; flex-shrink: 0; box-shadow: 0 3px 0 rgba(0,0,0,0.25);
}
.btn-main:active { transform: translateY(2px) scale(0.99); filter: brightness(0.92); box-shadow: 0 1px 0 rgba(0,0,0,0.25); }
.btn-main:disabled { background: #3a3d47; color: #888; cursor: not-allowed; box-shadow: none; }
.btn-second { background: linear-gradient(180deg, #4c505f, #3a3d49); } .btn-second:active { filter: brightness(0.9); }
.btn-success { background: linear-gradient(180deg, #38c98d, #27ae60); } .btn-success:active { filter: brightness(0.92); }
.btn-warning { background: linear-gradient(180deg, #e88b3a, #d35400); } .btn-warning:active { filter: brightness(0.92); }
.btn-danger { background: linear-gradient(180deg, #e0574a, #c0392b); } .btn-danger:active { filter: brightness(0.92); }

.meta-box { border-radius: var(--radius); padding: 15px; width: 100%; max-width: 340px; text-align: left; flex-shrink: 0; }
.meta-box h3 { margin: 0 0 10px 0; font-size: var(--font-lg); }

.training-box { background: rgba(74, 144, 226, 0.08); border: 1px solid var(--primary-dim); }
.training-box h3 { color: #6fa8e8; }
.tavern-box { background: rgba(69, 201, 138, 0.08); border: 1px solid #2c8f63; }
.tavern-box h3 { color: var(--success); }
.temple-box { background: rgba(232, 179, 77, 0.10); border: 1px solid #a3792e; }
.temple-box h3 { color: var(--warning); }

.name-input { width: 100%; padding: 9px; margin-bottom: 6px; background: rgba(0,0,0,0.45); color: #fff; border: 1px solid var(--border-color); border-radius: 6px; font-size: var(--font-md); box-sizing: border-box; text-align: center; }
.name-input:focus { outline: none; border-color: var(--primary); }
.upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.upgrade-btn { background: #23415f; font-size: var(--font-sm); padding: 8px; border-radius: 6px; border: 1px solid #2f5273; color: white; display: flex; flex-direction: column; align-items: center; line-height: 1.3; transition: transform 0.08s; }
.upgrade-btn:active { transform: scale(0.96); }
.upgrade-btn:disabled { background: #2b2d36; border-color: #34363f; color: #6c6f7a; }
.up-val { color: var(--warning); font-weight: bold; }

.quest-card { background: linear-gradient(180deg, #232a38, #1c222e); border: 1px solid #333c4f; border-radius: 8px; padding: 11px; cursor: pointer; transition: transform 0.1s; }
.quest-card:active { transform: scale(0.98); background: #2a3244; }
.quest-title { font-size: var(--font-lg); font-weight: bold; color: var(--warning); margin-bottom: 4px; }
.quest-reward { font-size: var(--font-sm); color: var(--success); font-weight: bold; text-align: right; }

/* 冒險筆記：改用原生 details/summary 做可摺疊區塊，行動裝置上更容易瀏覽長清單 */
.notebook-section {
    text-align: left; background: #12141c; border: 1px solid var(--border-color); border-radius: var(--radius);
    padding: 0 12px; margin: 0 auto 10px auto; width: 100%; max-width: 340px; overflow: hidden;
    flex-shrink: 0;
}
.notebook-section summary {
    list-style: none; cursor: pointer; color: #b487e0; font-size: var(--font-lg); font-weight: 700;
    padding: 12px 0; display: flex; align-items: center; justify-content: space-between;
}
.notebook-section summary::-webkit-details-marker { display: none; }
.notebook-section summary::after { content: '▾'; font-size: 13px; color: var(--text-muted); transition: transform 0.2s ease; }
.notebook-section[open] summary::after { transform: rotate(180deg); }
.notebook-section summary:active { opacity: 0.7; }
.nb-item { font-size: var(--font-md); margin-bottom: 10px; line-height: 1.45; color: var(--text-main); border-top: 1px dashed var(--border-color); padding-top: 8px; }
.nb-item:first-of-type { border-top: none; padding-top: 0; }
.notebook-section > .nb-item:last-child { margin-bottom: 12px; }
.nb-keyword { color: var(--warning); font-weight: bold; font-size: var(--font-lg); }

.battle-area { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; gap: 8px; }
.battle-area.fx-shake { animation: battleShake 0.4s ease; }
@keyframes battleShake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
}

.team-container { display: flex; justify-content: space-between; gap: 5px; }
.entity {
    background: linear-gradient(180deg, var(--panel-bg-raised), var(--panel-bg));
    border: 1px solid var(--border-color); border-radius: 8px; padding: 6px; flex: 1; text-align: center; position: relative;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; min-width: 0;
}
.entity.active-turn { border-color: var(--warning); transform: translateY(-3px); box-shadow: 0 0 10px rgba(232, 179, 77, 0.45); }
.entity.dead { opacity: 0.32; filter: grayscale(1); transform: none; }
.entity.targetable { border-color: var(--success); cursor: pointer; animation: pulseTarget 1.4s infinite; }
@keyframes pulseTarget { 0% { box-shadow: 0 0 0 0 rgba(69, 201, 138, 0.45); } 70% { box-shadow: 0 0 0 7px rgba(69, 201, 138, 0); } 100% { box-shadow: 0 0 0 0 rgba(69, 201, 138, 0); } }
.entity.fx-hit { animation: hitFlash 0.3s ease; }
@keyframes hitFlash {
    0% { filter: brightness(1); }
    30% { filter: brightness(1.9) saturate(1.4); transform: translateX(-2px); }
    60% { transform: translateX(2px); }
    100% { filter: brightness(1); transform: translateX(0); }
}

.e-name { font-size: var(--font-md); font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.e-pers { font-size: var(--font-sm); color: var(--warning); margin-bottom: 4px; }
.e-pers.player-tag { color: var(--success); }
.e-stats { font-size: var(--font-sm); color: var(--text-muted); margin-bottom: 4px; }

.bar-container { background: var(--hp-bg); height: 10px; border-radius: 5px; margin-bottom: 4px; overflow: hidden; position: relative; }
.hp-bar { background: linear-gradient(90deg, #c94a42, var(--hp-fill)); height: 100%; width: 100%; transition: width 0.35s ease; }
.hp-bar.hp-critical { background: linear-gradient(90deg, #b8231c, var(--hp-fill-crit)); animation: hpCriticalPulse 1s infinite; }
@keyframes hpCriticalPulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }
.mp-bar { background: linear-gradient(90deg, #2f80c4, var(--mp-fill)); height: 100%; width: 100%; transition: width 0.35s ease; }
.bar-text { font-size: 9px; line-height: 10px; color: white; position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-weight: bold; text-shadow: 1px 1px 1px #000; }

.status-icons { display: flex; gap: 2px; justify-content: center; min-height: 14px; margin-top: 2px; flex-wrap: wrap; }
.s-icon { width: 14px; height: 14px; border-radius: 3px; display: inline-block; font-size: 10px; line-height: 14px; font-weight: bold; text-align: center; color: #fff; }
.s-atk { background: var(--danger); } .s-def { background: var(--primary); } .s-poi { background: #9b59b6; } .s-reg { background: var(--success); } .s-shd { background: #e0a13a; } .s-shk { background: var(--warning-2); color:#000; } .s-frz { background: #3498db; } .s-bld { background: #c0392b; } .s-brk { background: #8e44ad; }
.s-vin { background: #16a085; } .s-sth { background: #454b5e; color: #fff; } .s-bli { background: #5d6b73; }

.log-area { background: #07080b; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); height: 140px; overflow-y: auto; padding: 8px; font-size: var(--font-md); display: flex; flex-direction: column; gap: 4px; cursor: pointer; flex-shrink: 0; }
.log-area:active { background: #0d0f14; }
.log-entry { margin: 0; line-height: 1.45; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { transform: translateY(3px); } to { transform: translateY(0); } }
.c-sys { color: var(--warning); } .c-dmg { color: var(--danger); } .c-heal { color: var(--success); } .c-skill { color: var(--primary); } .c-ai { color: #e08a3d; font-weight: bold; } .c-growth { color: #1abc9c; font-weight: bold; }

.action-panel { padding: 10px; background: var(--panel-bg); display: flex; flex-direction: column; gap: 8px; min-height: 160px; flex-shrink: 0; border-top: 1px solid var(--border-color); }
.skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.skill-btn {
    background: #1a1d27; border: 1px solid #3a3f52; border-radius: 8px; color: #eee;
    text-align: left; padding: 10px; height: auto; font-size: var(--font-md);
    line-height: 1.35; display: flex; flex-direction: column; justify-content: center; gap: 2px;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.5); transition: background 0.1s, border-color 0.1s, transform 0.08s;
}
.skill-btn:active { background: #10121a; border-color: var(--warning); transform: scale(0.98); }
.skill-btn:disabled { background: #16171d; border-color: #262832; color: #555; cursor: not-allowed; }
.skill-btn strong { text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
.skill-btn .sk-mods { font-size: var(--font-sm); color: var(--warning); display: block; }

.action-panel .btn-back { background: linear-gradient(180deg, #4c505f, #3a3d49); margin-top: 5px; }

.reward-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 450px; padding-bottom: 10px; }
.reward-card {
    background: linear-gradient(155deg, #1c2833, #161d26); border: 2px solid #4b8fc4; border-radius: 10px; padding: 15px;
    text-align: left; cursor: pointer; box-shadow: 0 6px 14px rgba(0,0,0,0.5); transition: transform 0.1s, border-color 0.1s;
    position: relative; overflow: hidden;
}
.reward-card::before {
    content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.10), transparent);
    animation: rewardShine 2.6s ease-in-out infinite;
}
@keyframes rewardShine { 0% { left: -60%; } 40% { left: 130%; } 100% { left: 130%; } }
.reward-card:active { transform: scale(0.98); border-color: var(--warning); }
.reward-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 6px; }
.reward-type { font-size: var(--font-sm); background: #e67e22; padding: 3px 8px; border-radius: 4px; font-weight: bold; color: white; white-space: nowrap; }

.float-text {
    position: absolute; font-weight: 900; font-size: calc(var(--font-xl) + 5px); letter-spacing: 0.3px;
    text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0 0 10px rgba(0,0,0,0.9), 0px 3px 6px rgba(0,0,0,0.85);
    pointer-events: none; animation: floatAnim 3.8s ease-out forwards; z-index: 100;
}
.float-text-crit { font-size: calc(var(--font-xl) + 11px); animation: floatAnimCrit 3.8s ease-out forwards; }
@keyframes floatAnim {
    0% { transform: translate(-50%, 0) scale(0.8); opacity: 1; }
    8% { transform: translate(-50%, -18px) scale(1.3); opacity: 1; }
    18% { transform: translate(-50%, -26px) scale(1.05); opacity: 1; }
    90% { transform: translate(-50%, -42px) scale(1.05); opacity: 1; }
    100% { transform: translate(-50%, -60px) scale(1.05); opacity: 0; }
}
@keyframes floatAnimCrit {
    0% { transform: translate(-50%, 0) scale(0.6) rotate(-4deg); opacity: 1; }
    10% { transform: translate(-50%, -20px) scale(1.55) rotate(3deg); opacity: 1; }
    20% { transform: translate(-50%, -28px) scale(1.2) rotate(0deg); opacity: 1; }
    90% { transform: translate(-50%, -46px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -66px) scale(1.2); opacity: 0; }
}

/* 神威奇蹟降臨：全螢幕柔光特效（用 CSS 變數帶入該神祇的顏色） */
.fx-miracle-overlay {
    position: absolute; top: 0; right: 0; bottom: 0; left: 0; pointer-events: none; z-index: 90; opacity: 0;
    background: radial-gradient(ellipse at 50% 30%, var(--miracle-color), transparent 70%);
}
.fx-miracle-overlay.active { animation: miracleFlash 1.1s ease-out; }
@keyframes miracleFlash {
    0% { opacity: 0; }
    15% { opacity: 0.75; }
    100% { opacity: 0; }
}

/* Modals */
.modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
.modal.active { display: flex; }
.modal.active .modal-content { animation: modalPop 0.22s ease; }
@keyframes modalPop { from { transform: translateY(14px) scale(0.97); } to { transform: translateY(0) scale(1); } }
.modal-content { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 10px; width: 100%; max-width: 500px; max-height: 80%; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,0.5); }
.modal-header { padding: 11px 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: #000; font-size: var(--font-lg); font-weight: bold; }
.modal-body { padding: 15px; overflow-y: auto; font-size: var(--font-md); line-height: 1.55; }

/* 尊重使用者的「減少動態效果」系統設定 */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
}
    </style>
</head>
<body>
<div id="game-container">
    <div class="header">
        <div id="header-floor">主選單</div>
        <div id="header-gold" style="color:var(--warning); font-weight:bold;">💰 0</div>
        <div class="header-controls">
            <button class="icon-btn" onclick="UI.changeFontSize(-1)" aria-label="縮小字體">A-</button>
            <button class="icon-btn" onclick="UI.changeFontSize(1)" aria-label="放大字體">A+</button>
            <button id="btn-retreat" class="icon-btn" style="background: #b5651d; border-color:#8a4d16; font-size:10px; width:auto; padding:0 8px; display:none;" onclick="Game.retreat()">撤退</button>
            <button id="btn-reset" class="icon-btn" style="background: #a5362b; border-color:#7c2921; font-size:10px; width:auto; padding:0 8px;" onclick="Game.hardReset()">重置</button>
        </div>
    </div>

    <!-- Screen: Main Menu -->
    <div id="screen-menu" class="screen active">
        <div class="center-content">
            <h1>靈魂與選擇 V26</h1>
            <div class="subtitle" style="margin-bottom: 5px;">隊伍整備與神威奇蹟版</div>

            <div style="font-size:var(--font-md); margin-bottom: 15px; padding: 6px; border: 1px dashed #3a3f52; border-radius: 6px; width: 100%; max-width: 340px;">
                主角姓名：<span id="player-name-display" style="color:var(--success); font-weight:bold; cursor:pointer; text-decoration:underline;" onclick="Meta.editPlayerName()">冒險者</span>
            </div>

            <button class="btn-main btn-success" onclick="Game.checkSave()" id="btn-continue" style="display: none; margin-bottom:10px;">繼續中斷的冒險</button>

            <button class="btn-main btn-warning" onclick="Game.openQuestBoard()">📜 任務公會 (接取任務)</button>
            <button class="btn-main" onclick="Game.startEndless()">⚔️ 無盡地下城 (無限探索)</button>

            <!-- 神廟系統 -->
            <div class="meta-box temple-box" style="margin-top:15px;">
                <h3>🏛️ 祈願神廟 (Lv.<span id="menu-temple-lv">1</span>)</h3>
                <div style="font-size: var(--font-md); color: #ddd; margin-bottom: 10px;">投資神廟，戰局危險時，祈求七大神祇降下專屬奇蹟。</div>
                <button id="btn-upgrade-temple" class="btn-main btn-warning" onclick="Meta.upgradeTemple()" style="font-size: var(--font-md); padding: 8px;">升級神廟</button>
            </div>

            <div class="meta-box training-box">
                <h3>🏋️ 訓練所</h3>
                <div class="upgrade-grid">

 * 光／闇是「互剋」關係（雙方對彼此都是強勢），跟火/水/木的三角循環剋制不同。
 */
const ELEMENT_CHART = {
    fire:      { strongVs: ['wood'],           weakVs: ['water'] },

    water:     { strongVs: ['fire'],           weakVs: ['wood', 'lightning'] },
    lightning: { strongVs: ['water'],          weakVs: [] },
    light:     { strongVs: ['dark'],           weakVs: [] },
    dark:      { strongVs: ['light'],          weakVs: [] },
    none:      { strongVs: [],                 weakVs: [] }
};
const ELEMENT_MULT = { STRONG: 1.5, WEAK: 0.7, NEUTRAL: 1.0 };

function getElementMultiplier(atkEle, defEle) {
    const chart = ELEMENT_CHART[atkEle];
    if (!chart) return ELEMENT_MULT.NEUTRAL;
    if (chart.strongVs.includes(defEle)) return ELEMENT_MULT.STRONG;
    if (chart.weakVs.includes(defEle)) return ELEMENT_MULT.WEAK;
    return ELEMENT_MULT.NEUTRAL;
}

/* ============================================================
   SECTION 2：效果註冊表 (EFFECT REGISTRIES)
   ------------------------------------------------------------
   目的：把「特定技能才有的特殊效果」與「被動符文觸發的效果」
   都改成資料表 + 處理函式的組合，而不是散落在戰鬥流程各處的
   一堆 if (originalSkillId === 'xxx') 特判。

   以後要新增一個有特殊效果的技能，或一個新的被動符文，

   ============================================================ */

/**
 * 技能專屬特效。用 skill.id 當 key。
 * 可用的生命週期：
 *   getHitCount(ctx)      -> 這次施放要打幾下（預設 1 下）
 *   modifyDamage(ctx)     -> 在爆擊倍率套用之後、扣血之前，修改 ctx.damage
 *   onHit(ctx)            -> 命中後（已經扣血、已知道 ctx.died）觸發的額外效果
 * ctx 內容請見 runSkillEffect() 呼叫處的註解。
 */
const SKILL_EFFECTS = {
    gale_slash: {
        getHitCount: () => (Math.random() < 0.3 ? 3 : 2),
        hitLabel: (hitIndex) => `第 ${hitIndex} 擊：`
    },
    vine_spell: {
        // 修正：原本 special:'vine' 只影響 AI 評分，卻從未真的把「藤蔓纏繞」狀態
        // 套用到目標身上，導致技能說明裡「火屬性引燃」的連動效果永遠不會發生。
        // 另外補回說明文字提到、但先前沒有實裝的「30% 機率中毒或麻痺」。
        onHit: (ctx) => {
            if (ctx.died) return;
            ctx.target.addBuff('vine_wrapped', 1);
            ctx.log(`> 🌿 ${ctx.target.displayName} 被藤蔓纏繞了！`);
            if (Math.random() < 0.3) {
                if (Math.random() < 0.5) {
                    ctx.target.addBuff('poison', 3);
                    ctx.log(`> ☠️ 藤蔓的毒液滲入！${ctx.target.displayName} 中毒了！`);
                } else {
                    ctx.target.addBuff('paralyze', 2);
                    ctx.log(`> ⚡ 藤蔓纏住四肢！${ctx.target.displayName} 陷入麻痺！`);
                }
            }
        }
    },
    venom_blast: {
        modifyDamage: (ctx) => {
            if (!ctx.target.hasBuff('poison')) return;
            ctx.damage = Math.floor(ctx.damage * 1.5 + ctx.target.maxHp * 0.05);
            ctx.target.buffs = ctx.target.buffs.filter(b => b.type !== 'poison');
            ctx.log(`> 💥 <b>猛毒引爆！</b> 毒素瞬間在體內重擊！`);
        }
    },
    lightning_strike: {
        onHit: (ctx) => {
            if (ctx.died) return;
            if (Math.random() < 0.25) {
                ctx.target.addBuff('paralyze', 2);
                ctx.log(`> ⚡ 閃電麻痺！ ${ctx.target.displayName} 陷入麻痺狀態！`);
            }
        }
    },
    drain_strike: {
        onHit: (ctx) => {
            if (ctx.died) return;
            let amt = Math.floor(ctx.damage * 0.4);
            if (amt > 0) {
                ctx.actor.heal(amt);
                ctx.floatText(ctx.actor.id, `+${amt}`, 'var(--success)');
            }
        }
    },
    soul_drain: {
        onHit: (ctx) => {
            if (ctx.died) return;
            let amt = Math.min(ctx.target.mp, Math.floor(ctx.target.maxMp * 0.15) + 3);
            if (amt > 0) {
                ctx.target.mp -= amt;
                ctx.actor.mp = Math.min(ctx.actor.maxMp, ctx.actor.mp + amt);
                ctx.log(`> 🌑 ${ctx.actor.displayName} 吸取了 ${ctx.target.displayName} 的 ${amt} 點魔力！`);
                ctx.floatText(ctx.target.id, `-${amt}MP`, 'var(--mp-fill)');
                ctx.floatText(ctx.actor.id, `+${amt}MP`, 'var(--mp-fill)');
            }
        }
    }
};

/**
 * 跨技能的「元素連動」規則：不綁定特定技能 id，而是看攻擊元素 + 目標身上的狀態。
 * 新增新的元素連動（例如：水+感電 之類）只要在陣列裡加一筆。
 */
const ELEMENTAL_SYNERGIES = [
    {
        element: 'fire',
        targetBuff: 'vine_wrapped',
        multiplier: 1.8,
        consumeBuff: true,
        log: (target) => `> 🔥 <b>烈焰燃燒！</b> 附著在 ${target.displayName} 身上的藤蔓被引燃，造成極大額外傷害！`
    }
];

function applyElementalSynergies(ctx) {
    ELEMENTAL_SYNERGIES.forEach(syn => {
        if (ctx.skill.element === syn.element && ctx.target.hasBuff(syn.targetBuff)) {
            ctx.damage = Math.floor(ctx.damage * syn.multiplier);
            if (syn.consumeBuff) ctx.target.buffs = ctx.target.buffs.filter(b => b.type !== syn.targetBuff);
            ctx.log(syn.log(ctx.target));
        }
    });
}

        }
    },
    regen_infuse: {
        phase: 'onCast', chance: 1.0,
        apply: (ctx) => { ctx.target.addBuff('regen', 3); ctx.log(`> 🌱 ${ctx.target.displayName} 獲得了持續再生的效果。`); }
    },
    bless_infuse: {
        phase: 'onCast', chance: 1.0,
        apply: (ctx) => {
            ctx.target.addBuff('atk_up', 3);
            ctx.target.addBuff('def_up', 3);
            ctx.log(`> ✨ 神聖祝福：${ctx.target.displayName} 的攻防被大幅激發！`);
        }
    },
    blind_chance: {
        phase: 'onHit', chance: 0.3,
        apply: (ctx) => { ctx.target.addBuff('blind', 3); ctx.log(`> 😵 附加盲目：${ctx.target.displayName} 陷入盲目狀態，命中率大幅下降！`); }
    },
    mp_drain: {
        phase: 'onHit', chance: 1.0,
        apply: (ctx) => {
            let amt = Math.min(ctx.target.mp, Math.floor(ctx.target.maxMp * 0.10) + 2);
            if (amt > 0) {
                ctx.target.mp -= amt;
                ctx.actor.mp = Math.min(ctx.actor.maxMp, ctx.actor.mp + amt);
                ctx.floatText(ctx.target.id, `-${amt}MP`, 'var(--mp-fill)');
                ctx.floatText(ctx.actor.id, `+${amt}MP`, 'var(--mp-fill)');
            }

};

/**
 * 執行某個 phase 底下、actor 這次施放所帶的所有被動符文。
 * mods：actor.skillModifiers[technicalSkillId] 陣列（例如 ['life_steal','pierce']）
 */
function runModifierHandlers(phase, mods, ctx) {
    mods.forEach(modId => {
        const handler = MODIFIER_HANDLERS[modId];
        if (!handler || handler.phase !== phase) return;
        if (handler.requiresPlayer && !ctx.actor.isPlayer) return;
        if (handler.requiresAlive !== false && ctx.died) return;
        if (Math.random() < handler.chance) handler.apply(ctx);
    });
}

   SECTION 3：自訂對話框 (CUSTOM DIALOG)
   ============================================================ */
const CustomDialog = {
    show(opts) {
        return new Promise(resolve => {
            const modal = document.getElementById('custom-dialog');
            const title = document.getElementById('dialog-title');
            const msg = document.getElementById('dialog-message');
            const input = document.getElementById('dialog-input');
            const btnOk = document.getElementById('dialog-btn-ok');
            const btnCancel = document.getElementById('dialog-btn-cancel');

            title.innerText = opts.title || '提示';
            title.style.color = opts.isDanger ? 'var(--danger)' : 'var(--primary)';
            document.querySelector('#custom-dialog .modal-content').style.borderColor = opts.isDanger ? 'var(--danger)' : 'var(--primary)';

            msg.innerHTML = opts.message || '';

            if (opts.type === 'prompt') {
                input.style.display = 'block'; input.value = opts.defaultText || '';
                setTimeout(() => { input.focus(); input.select(); }, 50);
            } else {
                input.style.display = 'none';
            }

            if (opts.type === 'confirm' || opts.type === 'prompt') {
                btnCancel.style.display = 'block'; btnOk.className = opts.isDanger ? 'btn-main btn-danger' : 'btn-main btn-success';
            } else {
                btnCancel.style.display = 'none'; btnOk.className = 'btn-main btn-primary';
            }

            modal.classList.add('active');

            const cleanup = () => {
                modal.classList.remove('active');
                btnOk.onclick = null; btnCancel.onclick = null; input.onkeydown = null;
            };
            const confirmValue = () => { cleanup(); if (opts.type === 'prompt') resolve(input.value); else resolve(true); };
            const cancelValue = () => { cleanup(); resolve(false); };

            btnOk.onclick = confirmValue;
            btnCancel.onclick = cancelValue;
            input.onkeydown = (e) => { if (e.key === 'Enter') confirmValue(); };
        });
    }
};
/* ============================================================
   SECTION 4：Entity 類別（玩家 / 隊友 / 怪物 共用）
   ============================================================ */
class Entity {
    constructor(data) {
        this.id = Math.random().toString(36).substr(2, 9);
        this.name = data.name; this.isPlayer = data.isPlayer || false; this.isEnemy = data.isEnemy || false;

        this.isLarge = data.isLarge || false;
        this.isSupport = data.isSupport || false;
        this.isBoss = data.isBoss || false;
        this.weakness = data.weak || null;
        this.summonCount = 0;

        if (this.isEnemy && this.isSupport) {
            this.personality = 'Teamwork';
        } else {
            this.personality = this.isPlayer ? null : (data.personality || Object.keys(PERSONALITIES)[Math.floor(Math.random() * Object.keys(PERSONALITIES).length)]);
        }

        this.maxHp = data.hp; this.hp = data.hp;
        this.maxMp = data.mp; this.mp = data.mp;
        this.baseAtk = data.atk; this.baseDef = data.def; this.baseSpd = data.spd;

        this.critRate = 0.05;
        this.critDmg = 1.5;

        this.element = data.element || 'none';
        this.skills = data.skills ? [...data.skills] : ['attack'];
        this.skillModifiers = data.skillModifiers ? JSON.parse(JSON.stringify(data.skillModifiers)) : {};
        this.skillLevels = data.skillLevels ? JSON.parse(JSON.stringify(data.skillLevels)) : {};
        this.buffs = []; this.shield = 0; this.isDefending = false;
    }

    get displayName() { return this.name; }
    get atk() {
        let val = this.baseAtk;
        if (this.hasBuff('weakened')) val *= 0.3;
        return Math.floor(this.hasBuff('atk_up') ? val * 1.5 : (this.hasBuff('atk_down') ? val * 0.7 : val));
    }
    get def() {
        let val = this.baseDef;
        if (this.hasBuff('weakened')) val *= 0.3;
        return Math.floor(this.hasBuff('def_up') ? val * 1.5 : (this.hasBuff('def_down') ? val * 0.6 : val));
    }
    get spd() { return this.baseSpd; }

    hasBuff(type) { return this.buffs.some(b => b.type === type); }
    addBuff(type, duration, value = 0) {
        if (type === 'weakened') duration = 999;
        if (type === 'vine_wrapped') duration = 1;
        const existing = this.buffs.find(b => b.type === type);
        if (existing) existing.duration = Math.max(existing.duration, duration); else this.buffs.push({ type, duration, value });
    }

    updateBuffs() {
        this.isDefending = false; let msg = [];
        if (this.hasBuff('poison')) {
            let dmg = Math.floor(this.maxHp * 0.08) + 2; this.takeDamage(dmg); msg.push(`${this.displayName} 受到 <span class="c-dmg">${dmg}</span> 毒素傷害。`);
        }
        if (this.hasBuff('bleed')) {
            let dmg = Math.floor(this.maxHp * 0.06) + 3; this.takeDamage(dmg); msg.push(`${this.displayName} 受到 <span class="c-dmg">${dmg}</span> 流血傷害。`);
        }
        if (this.hasBuff('regen')) {
            let heal = Math.floor(this.maxHp * 0.1) + 2; this.heal(heal); msg.push(`${this.displayName} 治癒了 <span class="c-heal">${heal}</span> 生命。`);
        }
        this.buffs.forEach(b => b.duration--); this.buffs = this.buffs.filter(b => b.duration > 0);
        if (this.hp > 0 && this.mp < this.maxMp) this.mp = Math.min(this.maxMp, this.mp + Math.max(2, Math.floor(this.maxMp * 0.12)));
        return msg;
    }

    takeDamage(amount) {
        if (this.shield > 0) { if (this.shield >= amount) { this.shield -= amount; amount = 0; } else { amount -= this.shield; this.shield = 0; } }
        this.hp = Math.max(0, this.hp - Math.floor(amount));
        if (amount > 0 && this.hasBuff('stealth')) {
            this.buffs = this.buffs.filter(b => b.type !== 'stealth');
            Battle.log(`> 👁️ ${this.displayName} 遭到攻擊，隱形狀態被打破了！`);
        }
        return this.hp <= 0;
    }
    heal(amount) { this.hp = Math.min(this.maxHp, this.hp + Math.floor(amount)); }
    tryGrow(statName, chance = 0.2) {
        if (Math.random() > chance) return null;
        let upValue = 0; let statLabel = "";
        switch (statName) {
            case 'hp': upValue = Math.floor(this.maxHp * 0.03) + 2; this.maxHp += upValue; this.hp += upValue; statLabel = "最大生命"; break;
            case 'mp': upValue = Math.floor(this.maxMp * 0.04) + 2; this.maxMp += upValue; this.mp += upValue; statLabel = "最大魔力"; break;
            case 'atk': upValue = 1; this.baseAtk += 1; statLabel = "物理攻擊"; break;
            case 'def': upValue = 1; this.baseDef += 1; statLabel = "物理防禦"; break;
        }
        return `<span class="c-growth">🌟【實戰成長】</span>${this.displayName} 的 ${statLabel} +${upValue}！`;
    }

    // 從存檔還原的純資料物件重建出一個真正的 Entity（含所有原型方法）。
    static fromSaved(plain) {
        return Object.assign(new Entity({}), plain);
    }
}

/* ============================================================

function getBuffDuration(skill) { return skill.buffDuration || 3; }

const Battle = {
    turnQueue: [], currentEntity: null, historyLogs: [], isActive: false,
    entityNodes: {}, // entity.id -> 常駐 DOM 節點快取（讓 CSS transition 真正生效、避免整包重繪）
    MAX_HISTORY: 300, // historyLogs 上限，避免長時間無盡地下城把記錄陣列撐到無限大

    init() {
        this.historyLogs = [];
        document.getElementById('battle-log').innerHTML = '';
        document.getElementById('player-team').innerHTML = '';
        document.getElementById('enemy-team').innerHTML = '';
        this.entityNodes = {};
        Game.updateQuestTracker();
        this.isActive = true;
        this.updateUI();
        this.log("<span class='c-sys'>⚔️ 戰鬥開始 ⚔️</span>");
        this.buildQueue();
        setTimeout(() => this.nextTurn(), 800);
    },

    buildQueue() {
        let all = [...Game.state.party, ...Game.state.enemies].filter(e => e.hp > 0);
        all.forEach(e => e._tempSpd = e.spd + Math.random() * 3);
        all.sort((a, b) => b._tempSpd - a._tempSpd);
        this.turnQueue = all;
    },

    async nextTurn() {
        if (!this.isActive) return;
        if (this.checkEndCondition()) return;

        // 修正：把佇列最前面已經陣亡的角色直接丟棄。這一步「不算一個回合」，
        // 也不應該重新擲一次神威奇蹟的機率——原本的寫法是陣亡角色跳過會整個
        // 重新呼叫 nextTurn()，導致神威機率在屍體多的時候被連續擲好幾次。
        while (this.turnQueue.length > 0 && this.turnQueue[0].hp <= 0) {
            this.turnQueue.shift();
        }

        if (this.turnQueue.length === 0) {
            this.log("<span class='c-sys'>--- 回合結束 ---</span>");
            let msgs = [];
            [...Game.state.party, ...Game.state.enemies].filter(e => e.hp > 0).forEach(e => { msgs = msgs.concat(e.updateBuffs()); });
            msgs.forEach(m => this.log(m));
            this.updateUI();
            if (!this.isActive) return;
            if (this.checkEndCondition()) return;
            this.buildQueue();
        }

        if (await this.maybeTriggerMiracle()) return;

        this.currentEntity = this.turnQueue.shift();
        this.updateUI();

        if (this.currentEntity.hasBuff('stun') || this.currentEntity.hasBuff('paralyze')) {
            let blockType = this.currentEntity.hasBuff('stun') ? '暈眩' : '麻痺';
            this.log(`⚡ ${this.currentEntity.displayName} 受到 <span class="c-dmg">${blockType}</span> 影響，無法行動！`);
            let g = this.currentEntity.tryGrow('hp', 0.15); if (g) this.log(g);
            setTimeout(() => this.nextTurn(), 800);
            return;
        }

        if (this.currentEntity.isPlayer) this.showPlayerActions(); else this.processAI(this.currentEntity);
    },

    // 神威奇蹟判定：每個「真正輪到的角色回合」擲一次，而不是每次 nextTurn() 呼叫都擲。
    async maybeTriggerMiracle() {
        if (Game.state.miracleUsed) return false;
        let deadMembers = Game.state.party.filter(p => p.hp <= 0);
        let avgHp = Game.state.party.reduce((sum, p) => sum + (p.hp / p.maxHp), 0) / Game.state.party.length;

            if (b.type === 'def_up') { cls = 's-def'; txt = '防'; } if (b.type === 'def_down') { cls = 's-def'; txt = '脆'; }
            if (b.type === 'poison') { cls = 's-poi'; txt = '毒'; } if (b.type === 'regen') { cls = 's-reg'; txt = '癒'; }
            if (b.type === 'stun') { cls = 's-shk'; txt = '暈'; } if (b.type === 'paralyze') { cls = 's-shk'; txt = '麻'; }
            if (b.type === 'freeze') { cls = 's-frz'; txt = '凍'; } if (b.type === 'bleed') { cls = 's-bld'; txt = '血'; }
            if (b.type === 'weakened') { cls = 's-brk'; txt = '崩'; } if (b.type === 'vine_wrapped') { cls = 's-vin'; txt = '藤'; }
            if (b.type === 'stealth') { cls = 's-sth'; txt = '隱'; }
            if (b.type === 'blind') { cls = 's-bli'; txt = '盲'; }
            if (cls) buffsHtml.push(`<span class="s-icon ${cls}">${txt}</span>`);
        });
        r.icons.innerHTML = buffsHtml.join('');
        return div;
    },

    floatText(targetId, text, color, variant) {

    showPlayerActions() {
        const panel = document.getElementById('action-panel'); panel.innerHTML = '';
        const grid = document.createElement('div'); grid.className = 'skill-grid';

        this.currentEntity.skills.forEach(skillId => {
            const skill = SKILLS[skillId]; const btn = document.createElement('button'); btn.className = 'skill-btn';
            let dName = this.getSkillDisplayName(this.currentEntity, skillId);
            let mods = this.currentEntity.skillModifiers[skillId] || [];
            let modText = mods.length > 0 ? `<span class="sk-mods">被動：${mods.map(m => MODIFIERS[m].name).join(',')}</span>` : '';
            let costInfo = this.getSkillCost(this.currentEntity, skillId);
            let costColor = costInfo.isHp ? 'var(--danger)' : '#aaa'; let costLabel = costInfo.isHp ? 'HP' : 'MP';
            let eleTag = skill.element !== 'none' ? `<span class="element-tag" style="--ele-color:${ELEMENT_COLORS[skill.element]}">${ELEMENTS[skill.element]}</span>` : '';

            btn.innerHTML = `<strong style="color:var(--warning);">${dName}</strong> ${eleTag}${modText}<span style="font-size:var(--font-sm); color:${costColor}; margin-top:2px;">${costLabel}: ${costInfo.amount}</span>`;
            if (costInfo.isHp) { if (this.currentEntity.hp <= costInfo.amount) btn.disabled = true; } else { if (this.currentEntity.mp < costInfo.amount) btn.disabled = true; }
            btn.onclick = () => this.prepareTargeting(skill, skillId); grid.appendChild(btn);
        });
